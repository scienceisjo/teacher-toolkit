하는 사례에 흥미를 느낀다."}}},"화학-04":{"codes":{"12화학04-01":{"A":"물의 자동 이온화와 물의 이온화 상수를 설명하고, 수소 이온의 농도를 pH로 변환하여 서로 다른 용액의 pH를 비교하며, 몰 농도에 따른 pH 데이터를 수집하는 탐구를 설계 및 수행하고, 수집한 데이터를 디지털 탐구 도구를 활용 하여 그래프로 표현하며, 이를 해석하여 결론을 도출할 수 있다.","B":"물의 자동 이온화와 물의 이온화 상수를 설명하고, 수소 이온의 농도를 pH로 표현하며, 몰 농도에 따른 pH 데이터를 수집하는 탐구의 변인을 이해하고, 수집한 데이터를 디지털 탐구 도구를 활용해 그래프로 표현할 수 있다.","C":"물의 자동 이온화와 pH의 정의를 이해하고, 수소 이온의 농도를 pH로 표현하 며, 강산이나 강염기 희석 시 몰 농도에 따른 pH 데이터를 수집하여 그래프로 표현할 수 있다.","D":"pH의 정의를 알고, 제시된 절차에 따라 강산이나 강염기 희석 시 몰 농도에 따른 pH 데이터를 수집할 수 있다.","E":"pH가 수소 이온의 농도와 관련이 있음을 알고, 강산이나 강염기 희석 시 몰 농도에 따른 pH 데이터를 수집하는 실험에 참여할 수 있다."},"12화학04-02":{"A":"몰 농도의 의미와 용액의 농도를 몰 농도로 표현하는 방법을 설명하고, 적절한 실험 도구를 사용하여 원하는 농도의 표준 용액을 만드는 실험을 설계하고 수행하며, 용질의 몰수나 용매의 부피를 변경하여 특정한 몰 농도의 용액을 만 들 수 있 다.","B":"몰 농도의 의미와 용액의 농도를 몰 농도로 표현하는 방법을 이해하고, 용질의 몰수나 용매의 부피를 변경하여 특정한 몰 농도의 용액을 만들 수 있다.","C":"몰 농도의 의미와 용액의 농도를 몰 농도로 표현하는 방법을 알고, 주어진 몰 농도의 용액을 만드는 실험을 수행할 수 있다.","D":"몰 농도의 의미를 알고, 제시된 절차에 따라 표준 용액을 만들 수 있다.","E":"용액의 농도를 몰 농도로 표현할 수 있음을 알고, 표준 용액을 만드는 실험에 참여할 수 있다."},"12화학04-03":{"A":"강산과 강염기의 중화 반응을 산 염기의 가수, 몰 농도, 부피로 설명하고, 중화 반응에서의 양적 관계를 모형과 화학 반응식으로 계산하고 설명할 수 있다.","B":"강산과 강염기의 중화 반응을 산 염기의 가수, 몰 농도, 부피로 설명할 수 있음을 이해하고, 중화 반응에서의 양적 관계를 모형과 화학 반응식으로 설명 할 수 있다.","C":"강산과 강염기의 중화 반응을 이해하고, 중화 반응에서의 양적 관계를 모형으 로 설명할 수 있다.","D":"중화 반응에서 수소 이온과 수산화 이온이 1:1의 비로 반응함을 설명할 수 있다.","E":"중화 반응에서 수소 이온과 수산화 이온이 반응하여 물이 생성된다는 것을 말 할 수 있 다."},"12화학04-04":{"A":"다양한 변인을 고려하여 식초 속 아세트산의 함량을 구하는 실험을 계획하고 수행하며, 그 결과를 해석하고, 과학적 탐구 능력을 바탕으로 중화 반응에서의 양적 관계가 일상생활의 문제 해결에 활용됨을 인식하며, 탐구를 통한 문제 해결 활동의 즐거움을 느낀다.","B":"다양한 변인을 고려하여 식초 속 아세트산의 함량을 구하는 실험을 수행하고, 중화 반응에서의 양적 관계가 일상생활의 문제 해결에 활용됨을 인식하며, 탐구 활동에 즐거움을 느낀다.","C":"식초 속 아세트산의 함량을 구하는 실험을 수행하고, 중화 반응에서의 양적 관계가 일상생활의 문제 해결에 활용될 수 있음을 설명할 수 있다.","D":"제시된 절차에 따라 식초 속 아세트산의 함량을 구하는 실험을 수행하고, 중화 반응이 일상생활의 문제 해결에 활용될 수 있음을 설명할 수 있다.","E":"식초 속 아세트산의 함량을 구하는 실험에 참여하고, 중화 반응이 일상생활의 문제 해결과 관련이 있음을 말할 수 있다."}},"area":{"A":{"지식·이해":"물의 자동 이온화와 물의 이온화 상수를 설명하고, 수소 이온의 농도를 pH로 변 환 하 여 서로 다른 용액의 p H 를 비 교 하 며, 몰 농도의 의미와 용액의 농 도 를 몰 농도로 표현하는 방법을 설명할 수 있다. 강산과 강염기의 중화 반응을 산 염기의 가수, 몰 농도, 부피로 설명하고, 중화 반응에서의 양적 관계를 모형과 화학 반응식으로 계산하고 설명할 수 있다.","과정·기능":"몰 농도에 따른 pH 데이터를 수집하는 탐구를 설계 및 수행하고, 수집한 데이터 를 디지털 탐구 도구를 활용하여 그래프로 표현하며, 이를 해석하여 결론을 도출 할 수 있다. 적절한 실험 도구를 사용하여 원하는 농도의 표준 용액을 만드는 실험을 설계하고 수행하며, 용질의 몰수나 용매의 부피를 변경하여 특정한 몰 농도의 용액을 만들 수 있다. 다양한 변인을 고려하여 식초 속 아세트산의 함량을 구하는 실험을 계획하고 수행 하 며, 그 결과를 해석할 수 있 다.","가치·태도":"과학적 탐구 능력을 바탕으로 중화 반응에서의 양적 관계가 일상생활의 문제 해결 에 활용됨을 인식하며, 탐구를 통한 문제 해결 활동의 즐거움을 느낀다."},"B":{"지식·이해":"물의 자동 이온화와 물의 이온화 상수를 설명하고, 수소 이온의 농도를 pH로 표현하며, 몰 농도의 의미와 용액의 농도를 몰 농도로 표현하는 방법을 이해할 수 있다. 강산과 강염기의 중화 반응을 산 염기의 가수, 몰 농도, 부피로 설명할 수 있음을 이해하고, 중화 반응에서의 양적 관계를 모형과 화학 반응식으로 설명할 수 있다.","과정·기능":"몰 농도에 따른 pH 데이터를 수집하는 탐구의 변인을 이해하고, 수집한 데이터를 디지털 탐구 도구를 활용해 그래프로 표현하며, 용질의 몰수나 용매의 부피를 변경하여 특정한 몰 농도의 용액을 만들 수 있다. 다양한 변인을 고려하여 식초 속 아세트산의 함량을 구하는 실험을 수행할 수 있다.","가치·태도":"중화 반응에서의 양적 관계가 일상생활의 문제 해결에 활용됨을 인식하며, 탐구 활동에 즐거움을 느낀다."},"C":{"지식·이해":"물의 자동 이온화와 pH의 정의를 이해하고, 수소 이온의 농도를 pH로 표현하며, 몰 농도의 의미와 용액의 농도를 몰 농도로 표현하는 방법을 말할 수 있다. 강산과 강염기의 중화 반응을 이해하고, 중화 반응에서의 양적 관계를 모형으로 설명할 수 있다.","과정·기능":"강산이나 강염기 희석 시 몰 농도에 따른 pH 데이터를 수집하여 그래프로 표현하 고, 주어진 몰 농도의 용액을 만드는 실험과 식초 속 아세트산의 함량을 구하는 실험을 수행할 수 있다.","가치·태도":"중화 반응에서의 양적 관계가 일상생활의 문제 해결에 활용될 수 있음을 설명할 수 있다."},"D":{"지식·이해":"pH의 정의를 알고, 몰 농도의 의미를 말할 수 있다. 중화 반응에서 수소 이온과 수산화 이온이 1:1의 비로 반응함을 설명할 수 있다.","과정·기능":"제시된 절차에 따라 강산이나 강염기 희석 시 몰 농도에 따른 pH 데이터를 수집 하고, 제시된 절차에 따라 표준 용액을 만들며, 제시된 절차에 따라 식초 속 아세 트산의 함량을 구하는 실험을 수행할 수 있다.","가치·태도":"중화 반응이 일상생활의 문제 해결에 활용될 수 있음을 설명할 수 있다."},"E":{"지식·이해":"pH가 수소 이온의 농도와 관련이 있음을 알고, 용액의 농도를 몰 농도로 표현할 수 있음을 말할 수 있다. 중화 반응에서 수소 이온과 수산화 이온이 반응하여 물이 생성된다는 것을 말할 수 있다.","과정·기능":"강산이나 강염기 희석 시 몰 농도에 따른 pH 데이터를 수집하는 실험, 표준 용액 을 만드는 실험 및 식초 속 아세트산의 함량을 구하는 실험에 참여할 수 있다.","가치·태도":"중화 반응이 일상생활의 문제 해결과 관련이 있음을 말할 수 있다."}}},"생과-01":{"codes":{"12생과01-01":{"A":"생물의 특성을 이해하고, 생물과 비생물을 구분할 수 있는 특징에 대해 설명하 며, 생명과학의 성과가 여러 학문의 성과에 영향을 받았다는 사례 조사를 바탕 으로 생명과학의 특성과 성과에 대해 다양한 방식으로 표현하고 공유함으로써 생명 현상의 경이로움을 인식한다.","B":"생물과 생명과학의 특성을 이해하고, 생물과 비생물을 구분할 수 있는 특징과 생명과학의 성과에 대해 설명하며, 생명 현상에 대해 흥미와 호기심을 가진다.","C":"생물과 생명과학의 특성을 이해하고, 생물의 특성에 해당하는 생명현상의 예 와 생명과학의 성과를 제시하고, 생명 현상에 대한 흥미를 가진다.","D":"생물의 특성에 해당하는 생명 현상의 예와 생명과학의 성과를 말할 수 있다.","E":"생물의 특성과 생명과학의 성과를 나열할 수 있다."},"12생과01-02":{"A":"세포에서부터 생태계까지 생명 시스템을 구성하는 각 단계는 생명 시스템으로 서 기능하고 있음을 이해하고, 생명 시스템 구성 단계의 특징을 바탕으로 체계 적인 설명 자료를 만들어 공유하며, 생명 시스템의 신비로움과 경이로움을 인 식한다.","B":"세포에서부터 생태계까지 생명 시스템을 구성하는 단계가 각각 생명 시스템으 로서 기능하고 있음을 이해하고, 생명 시스템 구성 단계의 특징에 대한 설명 자료를 만들어 설명하고, 생명 시스템에 대해 흥미와 호기심을 가진다.","C":"생명 시스템을 이해하여 생명 시스템 구성 단계의 특징에 대한 설명 자료를 만들고, 생명 시스템에 대한 흥미를 가진다.","D":"생명 시스템의 구성 단계와 각 단계의 특징을 말할 수 있다.","E":"생명 시스템의 구성 단계를 나열할 수 있다."},"12생과01-03":{"A":"물질대사 과정에서 일어나는 에너지 전환을 통해 생명 활동에 사용되는 ATP 가 생성되는 것을 이해하고, 에너지가 사용되는 다양한 생명 활동을 추론하는 과정에서 자신의 생각과 주장을 표현하는 데 과학적 언어를 사용하며, 물질대 사의 경이로움을 인식한다.","B":"물질대사 과정에서 일어나는 에너지 전환을 통해 생명 활동에 사용되는 ATP 가 생성되는 것을 이해하고, 에너지가 사용되는 다양한 생명 활동을 추론하는 과정에서 물질대사에 대해 흥미와 호기심을 가진다.","C":"물질대사 과정에서 일어나는 에너지 전환 과정을 이해하고, 다양한 생명 활동 에서의 에너지 사용을 추론하는 과정에서 물질대사에 대해 흥미를 가진다.","D":"에너지가 사용되는 다양한 생명 활동을 물질대사 과정에서 일어나는 에너지 전환을 바탕으로 말할 수 있다.","E":"다양한 생명 활동의 물질대사 과정에서 에너지 전환이 일어남을 말할 수 있다."},"12생과01-04":{"A":"소화제와 소화 효소를 이용한 영양소 분해 실험을 수행하여 소화 과정을 추론 하고, 소화, 순환, 호흡, 배설 과정이 기관계의 통합적 작용으로 나타남을 이해 하며, 이 과정에서 일어나는 기관계의 통합적 작용을 신체의 생리적 변화와 연관지어 추론함으로써 기관계의 통합적 작용에 대한 신비로움을 인식한다.","B":"소화제와 소화 효소를 이용한 영양소 분해 실험을 수행하여 소화 과정을 추론 하고, 소화, 순환, 호흡, 배설 과정이 기관계의 통합적 작용으로 나타남을 신체 의 생리적 변화와 연관지어 설명하고, 기관계의 통합적 작용에 대한 흥미와 호기심을 가진다.","C":"소화, 순환, 호흡, 배설 과정에서 일어나는 기관계의 통합적 작용을 신체의 생리 적 변화와 연관지어 설명하고, 기관계의 통합적 작용에 대한 흥미를 가진다.","D":"소화, 순환, 호흡, 배설 과정에서 일어나는 기관계의 통합적 작용을 설명할 수 있다.","E":"소화, 순환, 호흡, 배설 과정이 기관계의 통합적 작용으로 나타남을 말할 수 있다."},"12생과01-05":{"A":"우리 몸에서 물질대사 이상에 따라 나타나는 질병 조사 방법을 고안하여 수행 하고, 물질대사 이상에 따른 대사성 질환의 종류와 이를 예방하기 위한 올바른 생활 습관에 대해 토의하며 협력적으로 소통하는 과정을 통해 과학이 일상생 활의 문제해결에 활용됨을 인식한다.","B":"물질대사 관련 질병 조사 방법을 고안하여 수행하고, 대사성 질환의 종류와 이를 예방하기 위한 올바른 생활 습관에 대해 협력적으로 소통하는 과정을 통해 과학에 흥미를 가진다.","C":"물질대사 관련 질병 조사 방법을 고안하여 수행하고, 대사성 질환을 예방하기 위한 올바른 생활 습관에 대해 다양한 형식으로 표현하고 공유할 수 있다.","D":"대사성 질환의 원인과 예, 예방하기 위한 생활 습관을 조사하여 설명할 수 있다.","E":"대사성 질환의 원인과 예를 말할 수 있다."},"12생과01-06":{"A":"생태계를 구성하는 생물요소와 비생물요소의 종류와 특징을 이해하고, 생태계 에서 일어나는 물질의 순환과 에너지의 흐름을 추론하여 생태계 구성 요소들 의 관계와 중요성을 설명할 수 있으며, 생태계 보전의 가치를 인식한다.","B":"생태계 구성 요소를 생물요소와 비생물요소로 구분하고, 생태계에서 일어나는 물질의 순환과 에너지 흐름을 이해하며, 생태계 구성 요소들의 중요성을 설명 하는 과정에서 생태계 구조에 대한 흥미와 호기심을 가진다.","C":"생태계의 구조를 바탕으로 생태계에서 일어나는 물질의 순환과 에너지의 흐름 을 설명할 수 있다.","D":"생태계의 구조를 설명할 수 있다.","E":"생태계 구성 요소를 말할 수 있다."},"12생과01-07":{"A":"개체군과 군집의 특성을 이해하고, 방형구법으로 식물 군집을 분석하며, 개체 군과 군집 내에서 일어나는 다양한 상호작용의 종류와 예를 조사하여 발표하 는 과정에서 생물의 상호작용에 대한 신비로움을 인식한다.","B":"개체군과 군집의 특성을 이해하고, 방형구법으로 식물 군집을 분석하며, 개체 군과 군집 내에서 일어나는 다양한 상호작용의 종류와 예를 발표하는 과정에 서 생물의 상호작용에 대한 흥미와 호기심을 가진다.","C":"개체군과 군집의 특성을 이해하고, 개체군과 군집 내에서 일어나는 상호작용 을 구분하여 설명할 수 있다.","D":"개체군과 군집의 특성을 설명하고 개체군과 군집 내에서 상호작용이 일어남을 말 할 수 있 다.","E":"개체군과 군집에서 다양한 상호작용이 일어남을 말할 수 있다."}},"area":{"A":{"지식·이해":"생물과 비생물을 구분할 수 있는 생물의 특성과 생명과학의 성과가 여러 학문의 성과에 영향을 받았다는 생명과학의 특성에 대한 이해를 바탕으로 세포에서 생태 계까지 생명 시스템을 구성하는 단계와 특징에 대해 설명하고, 생명 시스템을 구성하는 각 단계는 생명 시스템으로서의 기능을 하고 있음을 설명할 수 있다. 소화, 순환, 호흡, 배설 과정과 같은 기관계와 기관계에 속하는 기관의 통합적 작용을 통해 나타나고 이때 필요한 에너지는 ATP와 같은 물질의 물질대사 과정 에서 발생하는 에너지 전환 과정을 통해 공급받음을 이해하며, 물질대사 이상에 따른 여러 가지 대사성 질환의 예와 특징, 원인에 대한 이해를 바탕으로, 대사성 질환을 예방할 수 있는 생활 습관에 대해 설명할 수 있다. 생태계를 구성하는 생물요소와 비생물요소의 종류와 특징을 구분하여 이해하고, 생태계 구성요소 중 개체군과 군집 내에서 일어나는 다양한 상호작용의 종류와 특 징 및 생태계에서 일어나는 물질의 순환과 에너지의 흐름을 비교하여 설 명 할 수 있다.","과정·기능":"생물 및 생명과학의 특성에 대한 이해를 바탕으로 생명과학의 성과가 여러 학문의 성과에 영향을 받았다는 사례 조사에서 생명과학의 특성과 성과에 대해 협력적으 로 소통하고, 생명 시스템의 구성 단계와 특징에 대한 체계적인 설명 자료를 만들 어 공유할 수 있다. 물질대사 과정에서 일어나는 에너지 전환과 다양한 생명활동에서 에너지 전환에 따른 에너지 공급 과정을 이해하고, 물질대사 이상에 따라 나타나는 질병 조사 방법을 고안하여 수행하며, 소화제와 소화 효소를 이용한 영양소 분해 실험하기 탐구활동에서 소화계의 소화 과정을 추론하고, 소화, 순환, 호흡, 배설 과정에서 일어나는 기관계의 통합적 작용을 기관의 생리적 변화와 연관지어 추론하여 소통 할 수 있다. 방형구법으로 식물 군집 분석하기 탐구활동에서 군집의 특성 및 군집 내 우점종을 알아보고, 개체군과 군집의 특성에 대한 이해를 바탕으로 개체군과 군집 내에서 일어나는 다양한 상호작용의 종류와 예를 조사하여 제시할 수 있다.","가치·태도":"생명 시스템의 특성과 구성 단계의 경이로움을 인식하고, 생명활동에서의 에너지 사용을 추론하는 과정에서 자신의 생각과 주장을 과학적 언어를 사용하여 다양한 방식으로 표현하며, 발산적 사고로 다각적 접근을 시도한다. 생명활동 중 일어나는 기관계의 통합적 작용을 기관의 생리적 변화와 연관지어 협력적으로 소통하는 과정에서 생명의 신비로움을 인식하고, 대사성 질환을 예방 하기 위한 올바른 생활 습관을 찾아 실천하며, 과학이 일상생활의 문제해결에 활용됨을 인식한다. 생태계를 구성하는 요소들 사이에서 일어나는 물질의 순환과 에너지의 흐름, 개체 군과 군집에서 일어나는 다양한 상호작용에 흥미와 관심을 갖고, 방형구법으로 식물 군집 분석하기 탐구활동에 적용된 원리를 일상생활에 적용하고 설명하고, 생태계 구성요소들의 중요성을 인식하여 생태계 보전 방안을 찾아 실천한다."},"B":{"지식·이해":"생물과 비생물을 구분할 수 있는 생물의 특성과 생명과학의 성과는 여러 학문의 성과에 영향을 받았다는 생명과학의 특성에 대해 이해하고, 세포에서 생태계까지 생명 시스템을 구성하는 단계와 특징에 대해 설명할 수 있다. 소화, 순환, 호흡, 배설 과정과 같은 생명활동은 기관계의 통합적 작용을 통해 나타 나고 이때 필요한 에너지는 ATP와 같은 물질의 물질대사 과정에서 발생하는 에너 지 전환 과정을 통해 공급받음을 이해하며, 물질대사 이상에 따른 여러 가지 대사 성 질환의 예와 특징, 원인과 예방할 수 있는 생활 습관에 대해 설명할 수 있다. 생태계를 구성하는 생물요소와 비생물요소의 종류와 특징을 이해하고, 생태계 구 성요소 중 개체군과 군집 내에서 일어나는 다양한 상호작용의 종류와 특징 및 생태계에서 일어나는 물질의 순환과 에너지의 흐름을 말할 수 있다.","과정·기능":"생명과학의 성과가 여러 학문의 성과에 영향을 받았다는 사례 분석에 참여하여 생명과학의 성과에 대해 협력적으로 소통하고, 생명 시스템의 구성 단계와 특징에 대한 설명 자료를 만들 수 있다. 다양한 생명활동에서 일어나는 에너지 전환과 공급 과정을 이해하고, 물질대사 이상에 따른 질병을 조사하며, 소화제와 소화 효소를 이용한 영양소 분해 실험하 기 탐구활동에서 소화계의 소화 과정을 추론하고, 소화, 순환, 호흡, 배설 과정에 서 일어나는 기관계의 통합적 작용을 설명할 수 있다. 방형구법으로 식물 군집 분석하기 탐구활동에서 군집의 특성 및 군집 내 우점종을 알아보고, 개체군과 군집 내에서 일어나는 다양한 상호작용의 종류와 예를 조사하 여 말할 수 있다.","가치·태도":"생명 시스템의 경이로움을 인식하고, 생명활동에서의 에너지 사용을 추론하는 과 정에서 자신의 생각과 주장을 다양한 방식으로 표현하며, 발산적 사고로 다각적 접근을 시도한다. 생명활동 중 일어나는 기관계의 통합적 작용에 대해 소통하는 과정에서 생명의 신비로움을 인식하고, 대사성 질환을 예방하기 위한 올바른 생활 습관을 실천하 며, 과학이 일상생활의 문제해결에 활용됨을 인식한다. 생태계를 구성하는 요소들 사이에서 일어나는 상호작용에 관심을 갖고, 방형구법 으로 식물 군집의 우점종을 구할 때 사용된 원리를 일상생활에 적용할 수 있으며, 생태계 구성요소들의 중요성을 인식하여 생태계 보전 방안을 찾아 실천한다."},"C":{"지식·이해":"생물과 비생물을 구분할 수 있는 생물의 특성과 생명과학의 성과는 여러 학문의 성과에 영향을 받았다는 특성에 대해 이해하고, 생물을 구성하는 생명 시스템의 구성 단계와 특징에 대해 설명할 수 있다. 소화, 순환, 호흡, 배설 과정과 같은 생명활동은 기관계의 통합적 작용을 통해 나타나고 이때 필요한 에너지는 물질대사 과정에서 발생하는 에너지 전환 과정을 통해 공급받음을 이해하며, 물질대사 이상에 따른 대사성 질환의 예와 대사성 질환을 예방할 수 있는 생활 습관에 대해 밀할 수 있다. 생태계를 구성하는 요소가 있음을 알고, 생태계 구성요소 중 개체군과 군집 내에 서 일어나는 다양한 상호작용의 종류와 생태계에서 일어나는 물질의 순환과 에너 지의 흐름을 설명할 수 있다.","과정·기능":"생명과학의 성과가 여러 학문의 성과에 영향을 받았다는 사례 분석에 참여하고, 생명 시스템의 구성 단계와 특징에 대한 설명 자료를 만들 수 있다. 물질대사 이상에 따른 질병을 조사하고, 소화제와 소화 효소를 이용한 영양소 분해 실험하기 탐구활동에서 소화계의 소화 과정을 추론하며, 소화, 순환, 호흡, 배설 과정에서 일어나는 기관계의 통합적 작용을 설명할 수 있다. 방형구법으로 식물 군집 분석하기 탐구활동에서 군집의 특성 및 우점종을 알아보 고, 개체군과 군집 내에서 일어나는 상호작용을 조사할 수 있다.","가치·태도":"생명 시스템의 경이로움을 인식하고, 생명활동에서의 에너지 사용을 추론하는 과 정에서 발산적 사고로 다각적 접근을 시도한다. 생명활동 중 일어나는 기관계의 통합적 작용에 대해 소통하는 과정에서 생명의 신비로움을 인식하고, 대사성 질환을 예방하기 위한 올바른 생활 습관을 실천한다. 생태계를 구성하는 요소들 사이에서 일어나는 상호작용에 관심을 갖고, 생태계 구성요소들의 중요성을 인식하여 생태계 보전 방안을 찾아 실천한다."},"D":{"지식·이해":"생물 및 생명과학의 특성을 이해하고, 생명 시스템을 구성하는 단계를 말할 수 있다. 생명활동은 물질대사의 에너지 전환 과정을 통해 공급받은 에너지와 기관계의 통합적 작용을 통해 나타남을 이해하고, 물질대사 이상에 따른 대사성 질환의 종류와 이를 예방할 수 있는 생활 습관에 대해 말할 수 있다. 생태계를 구성하는 요소가 있음을 알고, 생태계 구성요소 중 개체군과 군집 내에 서 일어나는 다양한 상호작용과 생태예게서 일어나는 물질의 순환과 에너지의 흐름을 구분할 수 있다.","과정·기능":"생명과학의 성과 사례 분석에 참여하고, 생명 시스템의 구성 단계와 특징에 대한 설명 자료를 만들 수 있다. 물질대사 이상에 따른 질병을 조사하고, 소화제와 소화 효소를 이용한 영양소 분 해 실험하기 탐구활동을 수행할 수 있 다. 방형구법으로 식물 군집 분석하기 탐구활동에서 군집의 우점종을 구하고, 개체군 과 군집 내에서 일어나는 상호작용을 말할 수 있다.","가치·태도":"생명 및 생명 시스템의 경이로움을 인식하고, 생명활동에서의 에너지 사용을 추론 하는 과정에서 발산적 사고로 다각적 접근을 시도한다. 생태계를 구성하는 요소들 사이에서 일어나는 상호작용에 관심을 갖고, 생태계 구성요소들의 중요성을 인식하여 생태계 보전 방안을 찾아 실천한다."},"E":{"지식·이해":"생물 및 생명과학의 특성을 이해하고, 생명 시스템을 구성하는 여러 단계가 있음 을 말할 수 있다. 생명활동은 기관계의 통합적 작용을 통해 나타나고, 이때 필요한 에너지는 ATP 에 저장된 에너지가 사용되며, 물질대사 이상에 따라 질병이 발병할 수 있음을 말 할 수 있 다. 생태계는 생물요소와 비생물요소로 구성되고, 각 요소와 요소 사이에는 다양한 상호 작용이 일어남을 말할 수 있다.","과정·기능":"생명과학의 성과 사례 분석에 참여하고, 생명 시스템의 구성 단계에 대한 설명 자료를 만들 수 있다. 소화제와 소화 효소를 이용한 영양소 분해 실험활동을 수행할 수 있다. 방형구법으로 식물 군집 분석하기 탐구활동에서 군집 내 우점종을 구할 수 있다.","가치·태도":"생명 및 생명 시스템의 신비로움을 인식하고, 대사성 질환을 예방하고 해결하는데 과학이 활용됨을 인식한다. 생태계 구성요소들의 중요성을 인식한다."}}},"생과-02":{"codes":{"12생과02-01":{"A":"신경 세포의 구조와 종류를 바탕으로 기능을 설명하고, 전도 과정의 막전위 변화를 모식도로 표현하여 신경 세포 구조와 기능의 신비로움을 인식한다.","B":"신경 세포의 구조와 기능, 종류를 설명하고, 모식도로 표현된 신경 세포에서 전도 과정을 설명할 수 있다.","C":"신경 세포의 종류를 구조에 따라 구분하고, 신경 세포의 구조에 흥미와 호기심 을 가진다.","D":"신경 세포의 기능과 구조를 말할 수 있다.","E":"신경 세포의 기능을 알고, 신경 세포의 구조에 흥미를 가진다."},"12생과02-02":{"A":"시냅스에서 일어나는 신경 신호 전달 과정을 이해하고, 신호 전달 과정에 영향을 미치는 약물의 종류를 조사하며, 약물이 시냅스 전달에 미치는 영향과 사례를 다양한 방식으로 표현하고 공유하는 과정에서 신경 신호 전달 과정의 경이로움을 인식한다.","B":"시냅스에서 일어나는 신경 신호 전달 과정을 이해하고, 신경 신호 전달 과정에 영향을 미치는 약물의 특징과 사례 를 설명할 수 있 다.","C":"시냅스에서 신경 신호 전달 과정이 일어남을 알고, 신경 신호 전달에 영향을 미치는 약물이 있음에 관심을 가진다.","D":"시냅스의 구조를 이해하고, 시냅스 구조에 흥미를 가진다.","E":"시냅스에서 신경 신호 전달이 일어남을 말할 수 있다."},"12생과02-03":{"A":"사람 신경계의 구조와 기능에 대한 이해를 바탕으로 중추 신경계와 말초 신경계의 특징을 비교하고, 실감형 콘텐츠를 활용한 뇌 구조 탐구를 바탕으로 뇌의 구조와 기능을 설명하는 과정에서 사람 신경계의 정교함에 경이로움을 인식한다.","B":"사람의 신경계를 구성하는 중추 신경계와 말초 신경계의 구조와 기능을 이해 하고, 실감형 콘텐츠를 활용한 뇌 구조를 탐구하는 과정에서 사람 신경계 구조 에 흥미와 호기심을 가진다.","C":"사람의 신경계를 구성하는 중추 신경계와 말초 신경계의 구조와 기능을 이해 하고, 사람 신경계의 구조에 흥미를 가진다.","D":"사람의 신경계를 중추 신경계와 말초 신경계로 구분하고, 중추 신경계가 뇌와 척수로 구성되어 있음을 말할 수 있다.","E":"사람의 신경계를 중추 신경계와 말초 신경계로 구분됨을 말할 수 있다."},"12생과02-04":{"A":"내분비계와 신경계의 작용 원리와 상호작용의 이해를 바탕으로 항상성이 유지 되는 과정을 추론하고, 스마트 헬스케어를 활용한 항상성 유지 작용에 대해 탐구하고 항상성이 유지되는 과정을 설명하는 과정에서 항상성 유지 원리의 경이로움을 인식한다.","B":"내분비계와 신경계를 통해 우리 몸에서 일어나는 항상성 유지 기작을 이해하 고, 스마트 헬스케어를 활용한 항상성 유지 작용에 대해 탐구하는 과정에서 항상성 유지 과정에 흥미와 호기심을 가진다.","C":"우리 몸의 항상성 유지에 내분비계와 신경계가 관여함을 이해하고 항상성 유 지의 예를 알고 항상성 유지 원리에 대해 흥미와 호기심을 가진다.","D":"우리 몸이 내분비계와 신경계를 통해 항상성을 유지한다는 사실을 알고, 항상 성 유지 원리에 대해 흥미를 가진다.","E":"우리 몸의 항상성 유지에 내분비계와 신경계가 관여함을 말할 수 있다."},"12생과02-05":{"A":"선천적 면역과 후천적 면역의 과정을 비교하여 설명하고 공유하는 과정에서 우리 몸의 방어 작용에 대한 경이로움을 인식한다.","B":"질병의 원인이 되는 병원체의 종류와 특징을 이해하고, 우리 몸의 방어작용을 선천적 면역과 후천적 면역으로 구분하는 과정에서 우리 몸의 방어 작용에 흥미와 호기심을 가진다.","C":"병원체의 종류와 특징을 이해하고 우리 몸의 방어작용에 대해 흥미를 가진다.","D":"병원체의 종류를 구분할 수 있다.","E":"병원체가 감염성 질병의 원인이 됨을 말할 수 있다."},"12생과02-06":{"A":"항원 항체 반응의 원리를 이해하고 혈액 응집 반응의 원리를 이용하여 혈액형 을 판정하는 과정에서 항원 항체 반응의 특이성에 대해 경이로움을 인식한다.","B":"혈액 응집 반응의 원리를 이용하여 혈액형 검사 결과를 해석하여 결론을 도출 하는 과정에서 항원 항체 반응에 대해 흥미와 호기심을 가진다.","C":"혈액 응집 반응의 원리를 설명할 수 있다.","D":"항원 항체 반응의 특이성을 이해하고, 항원 항체 반응의 특이성에 흥미를 가진다.","E":"항원과 항체의 의미를 말할 수 있다."},"12생과02-07":{"A":"백신의 종류와 작용 원리를 조사하고 질병 예방 측면에서 백신의 필요성을 인식하며, 백신 관련 발표 자료 제작 과정에서 협력적으로 소통하며 백신 개발 에서의 과학의 유용성을 인식한다.","B":"백신의 종류와 작용 원리를 조사하고, 질병 예방 측면에서 백신의 필요성을 인식하고 백신의 원리에 흥미와 호기심을 가진다.","C":"백신의 종류와 작용 원리를 설명할 수 있다.","D":"백신의 종류를 알고 백신의 필요성을 인식한다.","E":"백신이 감염성 질병을 예방함을 말할 수 있다."}},"area":{"A":{"지식·이해":"신경 세포의 구조, 기능, 종류를 설명하고, 이를 활용하여 시냅스에서 일어나는 신경 신호 전달 과정을 설명할 수 있다. 사람 신경계의 구조와 기능을 이해하고, 내분비계와 신경계의 작용 원리와 상호작 용의 이해를 바탕으로 항상성이 유지됨을 추론할 수 있다. 질병을 일으키는 병원체의 종류와 특징을 구분하여 설명하고, 선천적 면역과 후천 적 면역을 비교할 수 있으며, 항원 항체 반응의 의미를 이해하여 이를 통해 혈액 응 집 반응의 원리를 추론할 수 있 다.","과정·기능":"신경 세포에서의 전도 과정을 모식도를 활용하여 표현하고, 시냅스에서 일어나는 신경 신호 전달 과정에 약물이 영향을 미치는 사례를 조사하여 다양한 방식으로 표 현 하 고 공유할 수 있 다. 실감형 콘텐츠를 활용하여 뇌 구조를 탐구하여 뇌 구조 모형을 제작하고, 스마트 헬스케어를 활용한 항상성 유지 작용 탐구 활동을 통해 일상생활에서 항상성이 유 지 되 는 과정을 다양한 도구로 표현할 수 있 다. 혈액형 판별하기 탐구활동에 참여하여 혈액형을 판정하고 도출된 결론을 일상생활 에 적용하고, 질병 예방을 위한 백신의 필요성에 대한 발표 자료를 제작할 수 있다.","가치·태도":"신경계와 내분비계의 상호작용을 통해 항상성이 유지된다는 사실을 이해하는 과 정에서 생명체의 복잡하고 정교한 작용에 신비로움과 경이로움을 인식한다. 혈액 응고 원리를 적용한 수혈 원리와 백신을 통한 질병 예방 등 인류의 건강한 삶에 기여하는 생명과학기술의 가치를 인식하고 중시하는 태도를 지닌다."},"B":{"지식·이해":"신경 세포의 구조, 기능, 종류를 이해하고, 시냅스에서 일어나는 신경 신호 전달 과정을 이해한다. 사람 신경계의 구조를 이해하고, 내분비계와 신경계의 작용 원리와 상호작용을 토대로 항상성이 유지됨을 설명할 수 있다. 병원체의 종류와 특징을 이해하고, 방어 작용을 선천적 면역과 후천적 면역으로 구분하여 설명할 수 있으며, 혈액 응집 반응의 원리를 설명할 수 있다.","과정·기능":"신경 세포에서의 전도 과정과 사람의 뇌 구조를 그림으로 표현할 수 있다. 시냅스에서 일어나는 신경 신호 전달 과정에 약물이 영향을 미치는 사례와 질병 예방을 위한 백신의 필요성에 대한 자료를 조사하여 발표할 수 있다. 스마트 헬스케어를 활용한 항상성 유지 작용 탐구와 혈액형 판별하기 탐구를 수행 하여 결과를 해석하고 결론을 도출할 수 있다.","가치·태도":"사람에서 항상성이 유지되는 원리를 알고 이에 흥미와 호기심을 가진다. 수혈 원리와 백신과 같은 생명과학기술의 가치를 인식한다."},"C":{"지식·이해":"신경 세포의 구조와 기능을 이해하고, 시냅스의 구조를 설명할 수 있다. 사람 신경계를 중추 신경계와 말초 신경계로 구분하고, 내분비계와 신경계가 상호 작용하여 항상성이 유지됨을 설명할 수 있다. 병원체에 의해 감염성 질병이 발생함을 이해하고, 방어 작용을 선천적 면역과 후천적 면역으로 구분하여 설명할 수 있다.","과정·기능":"시냅스에서 일어나는 신경 신호 전달 과정에 영향을 미치는 약물의 종류를 조사하 여 발표 자료를 제작할 수 있다. 혈액형 판별하기 탐구를 수행하여 결과를 도출하고 해석할 수 있다.","가치·태도":"실험을 통해 혈액형을 판별할 수 있음을 알고 탐구를 통한 문제 해결의 유용성을 인식한다."},"D":{"지식·이해":"신경 세포의 구조를 이해하고, 시냅스에서 신경 신호 전달이 일어남을 말할 수 있다. 사람 신경계가 중추 신경계와 말초 신경계로 구성됨을 말할 수 있고, 신경계의 작용을 통해 항상성이 유지됨을 설명할 수 있다. 질병을 일으키는 병원체를 알고, 방어 작용이 선천적 면역과 후천적 면역으로 구분됨을 말할 수 있다.","과정·기능":"시냅스에서 일어나는 신경 신호 전달 과정에 영향을 미치는 약물의 종류, 질병 예방을 위한 백신의 필요성에 대한 자료를 조사할 수 있다. 혈액형 판별하기 탐구를 수행하여 결과를 도출할 수 있다.","가치·태도":"스마트 헬스케어를 활용한 항상성 유지 작용 탐구에서 과학기술이 일상생활의문 제해결에 활용됨을 인식한다."},"E":{"지식·이해":"신경 세포가 신경계를 구성함을 알고, 신경계에는 중추 신경계와 말초 신경계가 있음을 말할 수 있다. 병원체가 감염성 질병을 일으킴을 말할 수 있고, 우리 몸에서 이를 방어하는 방어 작용이 일어남을 말할 수 있다.","과정·기능":"혈액형 판별하기 탐구에서 주어진 역할을 수행할 수 있다.","가치·태도":"사람에서 항상성이 유지된다는 사실 에 흥미와 호기심을 가 진 다."}}},"생과-03":{"codes":{"12생과03-01":{"A":"염색체의 구조, DNA, 유전자의 관계를 이해하고 염색체 모형을 이용한 핵형 분석 활동에서 핵형 분석 결과의 규칙성을 추론하는 과정에서 유전자와 염색 체의 신비로움을 인식한다.","B":"염색체의 구조, DNA, 유전자의 관계를 이해하고 염색체 모형을 이용한 핵형 분석 결과를 설명하는 과정에서 핵형 분석에 대한 흥미와 호기심을 가진다.","C":"염색체의 구조, DNA, 유전자의 관계를 이해하고, 염색체 모형을 이용하여 핵형을 분석하는 과정에서 핵형 분석에 대한 관심을 가진다.","D":"염색체, DNA, 유전자의 관계를 말할 수 있다.","E":"염색체의 구조를 말할 수 있다."},"12생과03-02":{"A":"생식세포 형성과정을 체세포분열 과정과 비교하여 설명하고, 생식세포 형성 과정을 창의적인 모델로 제작하여 발표하며, 생식세포 형성의 중요성을 생명 의 연속성 및 유전적 다양성과 관련지어 추론하는 과정에서 생식세포 형성 과정의 신비로움을 인식한다.","B":"생식세포 형성과정을 체세포분열 과정과 비교하여 설명하고, 생식세포 형성 의 중요성을 생명의 연속성 및 유전적 다양성과 관련한 독창적인 아이디어를 제시하여 설명하는 과정에서 생식세포 형성 과정에 대한 흥미와 호기심을 가진다.","C":"생식세포 형성과정을 모델로 표현하고, 생식세포 형성의 중요성을 생명의 연 속성과 관련지어 말하는 과정에서 생식세포 형성과정에 대해 관심을 가진다.","D":"생식세포 형성과정을 이해하고 생식세포 형성의 중요성을 말할 수 있다.","E":"생식세포 형성과정이 생명의 다양성 유지에 기여함을 말할 수 있다."},"12생과03-03":{"A":"변이와 자연선택에 의한 생물 진화의 원리를 이해하고, 생물 진화의 다양한 연구 사례를 조사하여 설명하는 과정에서 생물 진화의 신비로움을 인식하며, 사례 조사 결과에 대해 협력적으로 소통할 수 있다.","B":"생물 진화의 다양한 사례를 조사하고, 자연선택에 의한 생물 진화의 원리를 설명하는 과정에서 생물 진화에 대한 흥미와 호기심을 가진다.","C":"자연선택에 의한 생물 진화의 원리를 설명하며 진화에 대해 관심을 가진다.","D":"자연선택 과정을 설명할 수 있다.","E":"생물은 오랜 시간에 걸쳐 변화해 왔음을 말할 수 있다."},"12생과03-04":{"A":"생물의 분류체계를 바탕으로 각 생물 분류군의 주요 특징과 유연관계를 이해 하고, 각 생물 분류군을 분류체계에 따라 설명하는 과정에서 생물분류체계의 경이로움을 인식한다.","B":"생물의 분류체계에서 각 분류군의 주요 특징을 이해하고, 각 생물 분류군의 차이를 설명하는 과정에서 생물분류체계에 대한 흥미와 호기심을 가진다.","C":"생물의 분류체계의 특징을 설명하는 과정에서 생물분류체계에 대해 관심을 가진다.","D":"생물의 분류체계에 따른 각 분류군을 이루는 생물의 예를 말할 수 있다.","E":"생물의 분류체계에 따라 각 분류군의 차이가 있음을 말할 수 있다."},"12생과03-05":{"A":"동물과 식물 분류군의 특징을 문 수준에서 이해하고, 다양한 식물의 특징을 조사하여 온라인 식물도감을 제작하고, 생물 계통 분석 프로그램을 활용한 생 물의 유연관계를 계통수로 작성하여 발표하는 과정에서 생물 계통수의 신비로 움을 인식한다.","B":"동물과 식물 분류군의 특징을 문 수준에서 이해하고, 생물 계통 분석 프로그램 을 활용하여 생물의 유연관계를 계통수로 나타내고 설명하는 과정에서 생물 분류에 대해 흥미와 호기심을 가진다.","C":"동물과 식물의 문 수준에서의 분류군을 말할 수 있으며, 생물 분류에 관심을 가진다.","D":"동물과 식물 분류군의 문 수준에서 작성된 계통수의 의미를 말할 수 있다.","E":"동물과 식물 분류군의 유연관계가 나타남을 인식한다."}},"area":{"A":{"지식·이해":"염색체, DNA, 유전자의 관계를 설명하며, 염색체 모형을 이용한 핵형 분석 활동, 염색체 모형으로 유전적 다양성 획득 과정을 나타내는 모의 활동을 수행하고, 탐구 활동의 결과를 활용한 염색체 구조, DNA와 유전자의 관계, 염색체 조합의 생식세포 형성의 중요성과 생식 세포의 다양성을 과학적 탐구 능력을 발휘하여 설명할 수 있다. 과학적 사고력과 과학적 탐구 능력을 발휘하여 5계와 3역 6계의 생물분류체계를 바탕으로 다양한 생물 분류군의 공통점과 차이점 비교하기, 특정 형질에 기초한 생물 계통 분석 프로그램을 활용하여 생물 계통수 작성하기, 주변의 식물과 동물을 문 수준에서 분류하고 계통 유연관계를 파악하기 활동에 참여하여 발표할 수 있다. 탐구 활동의 결과를 활용한 3역 6계, 동물과 식물의 유연관계를 계통수로 표현하 고 설명하며, 생물 진화의 원리와 증거에 해당하는 사례를 조사하고 진화의 원리 를 설명할 수 있다.","과정·기능":"염색체, DNA, 유전자의 관계를 우리 생활에서 볼 수 있는 책이나 컴퓨터 파일 등에 비유하고, 염색체 모형을 이용한 염색체의 크기와 모양을 면밀히 구분하여 핵형 분석을 하며, 염색체 모형으로 유전적 다양성 획득 과정을 나타내는 모의 활동 과정을 수행할 수 있다. 체세포분열과 생식세포분열을 비교하여 차이점이 생물의 생장과 생식에서 갖는 의미를 인식하고, 생식세포 형성 과정에서 염색체 조합을 통해 생식세포 형성의 중요성과 생식세포의 다양성을 과학적 탐구 능력을 발휘하여 동영상 등의 창의적 인 모델로 제작할 수 있다. 생물 진화의 연구 사례를 조사하여 모둠원과 협력적으로 소통하고, 5계와 3역 6계 등의 생물분류체계를 바탕으로 각 생물 분류군의 공통점과 차이점 비교하기, 특정 형질에 기초한 생물 계통 분석 프로그램을 활용하여 생물 계통수 작성하기, 주변의 식물과 동물을 문 수준에서 분류하고 계통 유연관계를 파악하는 활동을 수행하며, 동물과 식물의 유연관계를 계통수로 표현하여 설명하고, 생물 진화의 원리와 증거에 해당하는 사례를 조사하고 모둠원과 소통할 수 있다.","가치·태도":"염색체 모형을 이용한 핵형 분석 활동, 염색체 모형으로 유전적 다양성 획득 과정 을 나타내는 모의 활동으로 모둠원의 의견을 존중하며 소통의 중요성을 인식하고 염색체 조합을 통해 생식세포 형성의 중요성과 생식세포의 다양성을 과학적 탐구 능력을 발휘하여 동영상으로 제작하는 과정에서 모둠원의 의견을 중시한다. 과학적 사고력과 과학적 탐구 능력을 발휘하여 다양한 생물 분류군의 공통점과 차이점 비교하기, 특정 형질에 기초한 생물 계통 분석 프로그램을 활용하여 생물 계통수 작성하기, 주변의 식물과 동물을 문 수준에서 분류하고 계통 유연관계를 파악하는 활동을 수행하며 창의적 사고의 중요성과 신비로움을 인식한다. 생물의 진화 과정을 체험할 수 있는 모의실험 활동을 함으로써 생물 진화의 원리 에 대해 협력적으로 소통하며, 우리 주변의 다양한 식물을 조사하여 식물도감을 제작하면서 생명의 가치를 인식하고, 생물 계통 분석 프로그램을 활용하면서 과학 발전의 유용성을 인식하며, 동물과 식물의 유연관계를 계통수로 표현하고 상대방 의 의견을 경청한다."},"B":{"지식·이해":"염색체 모형을 이용한 핵형 분석 활동, 염색체 모형으로 유전적 다양성 획득 과정 을 나타내는 모의 활동을 수행하며, 탐구 활동의 결과를 활용하여 염색체 구조, DNA와 유전자의 관계, 염색체 조합을 통한 생식세포 형성의 중요성과 생식 세포 의 다양성을 설명할 수 있다. 다양한 식물의 특징을 조사하고 정리하여 식물 계통수 작성하기, 주변의 식물과 동물을 문 수준에서 분류하고 계통 유연관계를 파악하기 활동을 수행할 수 있다. 모의실험 활동의 결과를 활용하여 3역 6계 분류체계의 역과 계를 나열하고, 계통 수를 보고 동물 분류군과 식물 분류군의 특징을 문 수준에서 설명하며 제시된 진화의 증거 사례를 이용하여 자연선택에 의한 진화의 원리를 설명할 수 있다.","과정·기능":"염색체 모형을 이용한 핵형 분석 활동, 염색체 모형으로 유전적 다양성 획득 과정 을 나타내는 모의 활동을 수행하며, 염색체, DNA, 유전자의 관계를 우리 생활에 서 볼 수 있는 소재를 찾아 비교하고, 염색체 조합을 통한 생식세포 형성의 중요성 과 생식세포의 다양성을 사진이나 동영상으로 제작할 수 있다. 다양한 식물의 특징을 조사하고 정리하여 식물 계통수 작성하기, 주변의 식물과 동물을 문 수준에서 분류하고 계통 유연관계를 파악하기 활동을 수행할 수 있다. 모의실험 활동의 결과를 활용하여 계통수를 보고 동물 분류군과 식물 분류군의 특징을 문 수준에서 설명하며. 제시된 진화의 증거 사례를 이용하여 자연선택에 의한 진화의 원리를 모둠원과 협력적으로 소통할 수 있다.","가치·태도":"염색체 모형을 이용한 핵형 분석 활동, 염색체 모형으로 유전적 다양성 획득 과정 을 나타내는 모의 활동을 수행하고 모둠원의 의견을 존중하며 경청하며, DNA와 유전자의 관계, 염색체 조합을 통한 생식세포 형성 과정을 동영상으로 제작하는 과정에서 모둠원의 의견을 존중하고 생식세포 형성의 중요성과 생식세포의 다양 성의 중요성을 인식한다. 생활 주변의 식물과 동물을 문 수준에서 분류하고 계통 유연관계를 파악하기 활동 을 수행하고, 모의실험 활동의 결과를 활용하여 3역 6계 분류체계의 역과 계를 나열하고 생명의 중요성과 신비로움을 인식한다. 제시된 진화의 증거 사례를 이용하여 자연선택에 의한 진화의 원리를 통해 자연현 상과 과학에 흥미와 호기심을 가진다."},"C":{"지식·이해":"핵형 분석 활동, 염색체 모형으로 유전적 다양성 획득 과정을 나타내는 모의 활동 을 수행할 수 있다. DNA와 유전자의 관계, 생식세포 형성 과정에서 염색체의 조합을 통해 유전적 다양성과 생식세포 형성의 중요성을 관련지어 설명할 수 있다. 생활 주변의 식물과 동물을 문 수준에서 계통 유연관계를 파악하기 활동에 참여하 며, 자연선택이 진화의 요인임을 말할 수 있다.","과정·기능":"염색체 모형을 활용한 핵형 분석 활동에서 자신이 분석한 핵형의 성별을 판별하고 그렇게 생각한 이유를 설명하며, 생식세포 형성 과정에서 유전적 다양성 획득 과정을 나타내는 모의 활동을 수행할 수 있다. 생물 진화의 연구 사례를 조사하면서 모둠원과 협력적으로 소통하고, 탐구 활동의 결과를 활용하여 생물 진화의 원리에 대해 토의할 수 있다. 생활 주변의 식물과 동물을 문 수준에서 계통 유연관계를 파악하기 활동에 참여하 며, 타인을 설득하는 주장을 말할 수 있다.","가치·태도":"염색체 모형으로 핵형 분석 활동, 생식세포 형성 과정에서 유전적 다양성 획득 과정을 나타내는 모의 활동의 즐거움을 체험한다. 생물 진화 과정을 체험할 수 있는 디지털 모의실험을 수행함으로써 과학의 유용성 을 인식한다. 다양한 생물 분류군의 공통점과 차이점을 분류체계에 따라 유연관계를 파악하는 활동에 참여하며, 과학 지식이 일상생활의 문제해결에 활용됨을 인식한다."},"D":{"지식·이해":"DNA와 유전자의 관계를 말할 수 있다. 모둠원의 도움을 받아 6계의 분류 체계를 이해하고 특정 형질에 기초한 생물 계통 수를 작성할 수 있다. 주변의 식물과 동물을 문 수준에서 분류의 원리를 말할 수 있다.","과정·기능":"염색체 모형을 활용한 핵형 분석 활동과 생물의 다양성을 나타내는 모의 활동에 참여할 수 있다. 모둠원의 도움을 받아 다양한 식물의 특징을 조사하여 모둠원과 협력적으로 소통 할 수 있다. 계통유연관계를 통해 계통수로 나타낼 수 있다.","가치·태도":"DNA와 유전자의 관계에 흥미와 호기심을 가진다. 모둠원의 도움을 받아 6계의 분류 체계를 이해하고 주변의 식물과 동물을 문 수준 에서 분류하기 활동에서 과학의 즐거움을 체험한다."},"E":{"지식·이해":"제시된 염색체 모형을 활용한 핵형 분석 활동에 참여할 수 있다. DNA와 유전자의 관계를 말할 수 있다. 다양한 식물의 특징을 통해 유연관계의 개념을 말할 수 있다.","과정·기능":"모둠원과 협력적으로 염색체 모형을 활용한 핵형 분석 활동에 참여하여 자신의 역할을 말할 수 있다. 다양한 식물의 특징을 통해 유연관계를 파악하는 활동에 참여할 수 있다.","가치·태도":"염색체 모형을 활용한 핵형 분석 활동에 참여하여 모둠원의 의견을 존중하고 경청 한다. 다양한 식물의 특징을 통해 유연관계를 파악하는 활동에서 자연의 가치를 인식한다."}}},"지구-01":{"codes":{"12지구01-01":{"A":"해수의 물리적, 화학적 성질에 영향을 미치는 요인과 그 특징을 설명하고, T-S 다이어그램을 이용하여 밀도를 구하며, 인공위성 및 ARGO의 디지털 실측 자료를 수온, 염분, 밀도, 용존 산소량 분포를 나타내는 그래프로 변환하 고 변환한 그래프를 해석하여 해수의 성질을 비교할 수 있다.","B":"해수의 물리적, 화학적 성질에 영향을 미치는 요인과 그 특징을 설명하고, T-S 다이어그램을 이용하여 밀도를 구하며, 인공위성 및 ARGO의 디지털 실측 자료를 수온, 염분, 밀도, 용존 산소량 분포를 나타내는 그래프로 변환할 수 있다.","C":"해수의 물리적, 화학적 성질에 영향을 미치는 요인과 그 특징을 설명하고, T-S 다이어그램을 이용하여 밀도를 구하며, 해수의 온도, 염분 분포 그래프를 해석할 수 있다.","D":"해수의 물리적, 화학적 성질에 영향을 미치는 요인을 제시하고, T-S 다이어그 램을 이용하여 밀도를 구할 수 있다.","E":"해수의 밀도가 주로 수온과 염분의 영향을 받음을 말할 수 있다."},"12지구01-02":{"A":"심층 순환의 발생 원리 및 심층 순환을 이루는 대표적인 수괴의 분포와 이동을 밀도 차와 관련지어 설명하고, 심층 순환과 표층 순환이 연결됨을 이해하여 해양 순환의 변화 양상과 기후변화의 관련성을 추론할 수 있다.","B":"심층 순환의 발생 원리 및 심층 순환을 이루는 대표적인 수괴의 분포와 이동을 밀도 차와 관련지어 설명하고, 심층 순환과 표층 순환이 연결되어 해수가 순환 함을 말할 수 있다.","C":"심층 순환의 발생 원리와 대표적인 침강 해역에서의 해수의 물리적 특성을 설명하고, 심층 순환과 표층 순환이 연결되어 해수가 순환함을 말할 수 있다.","D":"심층 순환이 밀도 차에 의해 발생함과 심층 순환과 표층 순환이 연결되어 해수 가 순환하고 있음을 말할 수 있다.","E":"심층 순환이 밀도 차에 의해 발생함을 말할 수 있다."},"12지구01-03":{"A":"중위도 저기압을 종관 규모와 중규모의 저기압으로 구분하여 설명하고, 중위 도 저기압과 고기압이 통과할 때 기상 요소의 변화를 우리나라 주변의 일기도, 위성 영상, 레이더 영상을 종합적으로 해석하여 예측하며, 날씨를 예측할 수 있는 과학의 유용성을 인식한다.","B":"중위도 저기압을 종관 규모와 중규모의 저기압으로 구분하여 설명하고, 중위 도 저기압과 고기압이 통과할 때 기상 요소의 변화를 일기도, 위성 영상, 레이 더 영상을 종합적으로 해석하여 설명할 수 있다.","C":"중위도 저기압을 종관 규모와 중규모의 저기압으로 구분하고, 중위도 저기압 과 고기압이 통과할 때 기상 요소의 변화를 일기도에서 설명할 수 있다.","D":"우리나라 주변의 일기도에서 중위도 저기압과 고기압을 찾고, 주변 날씨를 말 할 수 있 다.","E":"우리나라 주변의 일기도에서 중위도 저기압을 찾고, 주변 날씨를 말할 수 있다."},"12지구01-04":{"A":"태풍의 발생, 이동, 소멸 과정을 설명하고 태풍 영향권에서의 날씨 변화를 예 측하며, 주요 악기상의 특징, 피해 사례, 생성 메커니즘에 대한 이해를 바탕으 로 악기상의 피해를 최소화하기 위한 과학적 대처 방안을 제시할 수 있다.","B":"태풍의 발생 조건을 제시하고 태풍 영향권에서의 날씨 변화를 예측하며, 주요 악기상의 특징과 피해 사례에 대한 이해를 바탕으로 악기상의 피해를 최소화 하기 위한 사회적 관리의 중요성을 인식한다.","C":"태풍 영향권에서의 날씨 변화를 예측하고, 주요 악기상의 특징과 피해 사례에 대한 이해를 바탕으로 악기상의 피해를 최소화하기 위한 사회적 관리의 중요 성을 인식한다.","D":"태풍 영향권에서의 날씨 변화를 예측하고, 주요 악기상을 구분하며, 악기상으 로 인한 피해의 심각성을 인식한다.","E":"우리나라에 나타나는 주요 악기상의 종류를 제시하고, 악기상으로 인한 피해 의 심각성을 인식한다."},"12지구01-05":{"A":"해수의 용승과 침강, 엘니뇨-남방진동(ENSO)의 발생 및 진행 과정과 이와 관련되어 나타나는 현상을 대기와 해양의 상호작용의 관점에서 설명하고, 전 지구 규모의 빅데이터를 활용하여 엘니뇨-남방진동(ENSO)이 기후 시스템의 주기적인 변동성과 우리 생활에 미치는 영향을 조사하고, 이 과정에서 빅데이 터를 활용한 과학 연구의 유용성을 인식한다.","B":"해수의 용승과 침강, 엘니뇨-남방진동(ENSO)의 발생 및 진행 과정과 이와 관련되어 나타나는 현상을 대기와 해양의 상호작용의 관점에서 설명하고, 전 지구 규모의 빅데이터를 활용하여 엘니뇨-남방진동(ENSO)이 우리 생활에 미 치는 영향을 조사하고, 이 과정에서 빅데이터를 활용한 과학 연구의 유용성을 인식한다.","C":"대기와 해양의 상호작용의 관점에서 해수의 용승과 침강, 엘니뇨와 라니냐가 발생했을 때 나타나는 날씨 변화를 설명하고, 전 지구 규모의 빅데이터를 활용 하여 엘니뇨와 라니냐가 우리 생활에 미치는 영향을 조사하고, 이 과정에서 빅데이터를 활용한 과학 연구의 유용성을 인식한다.","D":"대기와 해양의 상호작용으로 해수의 용승과 침강이 나타남을 알고, 용승과 침강 지역의 날씨를 추론하며, 전 지구 규모의 빅데이터를 활용하여 엘니뇨와 라니냐가 우리 생활에 미치는 영향을 조사할 수 있다는 사실에 호기심을 가진 다.","E":"대기와 해양의 상호작용으로 해수의 용승과 침강이 나타남을 알고, 엘니뇨와 라니냐가 우리 생활에 영향을 미친다는 사실에 호기심을 가진다."},"12지구01-06":{"A":"기후변화의 원인을 설명하는 다양한 가설을 추론하고, 기후변화의 원인을 자 연적 요인과 인위적 요인으로 구분하여 설명하며, 인간 활동에 의한 기후변화 문제를 과학적으로 해결하는 방안을 제시할 수 있다.","B":"기후변화의 원인을 자연적 요인과 인위적 요인으로 구분하여 설명하고, 인간 활동에 의한 기후변화 문제를 과학적으로 해결하는 방안을 제시할 수 있다.","C":"기후변화의 인위적 요인을 설명하고, 인간 활동에 의한 기후변화 문제를 해결 하기 위한 과학기술의 역할을 인식한다.","D":"기후변화의 원인을 자연적 요인과 인위적 요인으로 구분하고, 기후변화 문제 의 심각성을 인식한다.","E":"기후변화의 원인이 자연적 요인과 인위적 요인으로 구분됨을 알고, 기후변화 문제의 심각성을 인식한다."}},"area":{"A":{"지식·이해":"해수의 물리적, 화학적 성질에 영향을 미치는 요인과 그 특징을 이해하고, 심층 순환의 발생 원리 및 심층 순환을 이루는 대표적인 수괴의 분포와 이동을 밀도 차와 관련지어 설명하며, 심층 순환과 표층 순환이 연결되어 해수가 순환함을 말 할 수 있 다. 중위도 저기압을 종관 규모와 중규모의 저기압으로 구분하여 설명하고, 중위도 저기압과 고기압이 통과할 때 기상 요소의 변화와 태풍 영향권에서의 날씨 변화를 이해하며, 태풍의 발생, 이동, 소멸 과정 및 주요 악기상의 특징, 피해 사례, 생성 메커니즘을 설명할 수 있다. 해수의 용승과 침강, 엘니뇨-남방진동(ENSO)의 발생 및 진행 과정과 이와 관련 되어 나타나는 현상을 대기와 해양의 상호작용의 관점에서 이해하고, 기후변화의 원인을 자연적 요인과 인위적 요인으로 구분하여 설명할 수 있다.","과정·기능":"T-S 다이어그램을 이용하여 밀도를 구하고, 인공위성 및 ARGO의 디지털 실측 자료를 수온, 염분,  인식하며, 인간 활동에 의한 기후변화 문제를 해결하기 위한 과학기술의 역할을 인식한다."},"D":{"지식·이해":"해수의 물 리 적, 화 학 적 성질에 영향을 미치는 요인을 제 시 하 고, 심 층 순환이 밀 도 차에 의해 발생함과 심층 순환과 표층 순환이 연결되어 해수가 순환하고 있음을 말 할 수 있 다. 중위도 저기압과 고기압의 주변 날씨와 태풍 영향권에서의 날씨 변화를 말할 수 있다. 대기와 해양의 상호작용으로 해수의 용승과 침강이 나타남을 알고, 용승과 침강 지역의 날씨를 설명하며, 기후변화의 원인을 자연적 요인과 인위적 요인으로 구분 할 수 있다.","과정·기능":"T-S 다이어그램을 이용하여 밀도를 구할 수 있다. 우리나라 주변의 일기도에서 중위도 저기압과 고기압을 찾고, 태풍 영향권에서의 날씨 변화를 예측할 수 있다. 해수의 용승 및 침강 지역의 날씨를 추론할 수 있다.","가치·태도":"주요 악기상으로 인한 피해의 심각성을 인식하고, 전 지구 규모의 빅데이터를 활용하여 엘니뇨와 라니냐가 우리 생활에 미치는 영향을 조사할 수 있다는 사실에 호기심을 가지며, 기후변화 문제의 심각성을 인식한다."},"E":{"지식·이해":"해수의 밀도가 주로 수온과 염분의 영향을 받음과 심층 순환이 밀도 차에 의해 발생함을 말할 수 있다. 중위도 저기압의 주변 날씨를 알고, 우리나라에 나타나는 주요 악기상의 종류를 제시할 수 있다. 대기와 해양의 상호작용으로 해수의 용승과 침강이 나타남을 알고, 기후변화의 원인이 자연적 요인과 인위적 요인으로 구분됨을 말할 수 있다.","과정·기능":"우리나라 주변의 일기도에서 중위도 저기압을 찾을 수 있다.","가치·태도":"악기상으로 인한 피해의 심각성을 인식하고, 엘니뇨와 라니냐가 우리 생활에 영향 을 미친다는 사실에 호기심을 가지며, 기후변화 문제의 심각성을 인식한다."}}},"지구-02":{"codes":{"12지구02-01":{"A":"동일과정의 원리를 바탕으로 지사학의 법칙들을 활용하여 지질단면도에서 지 층의 상대 연령을 비교하고 층서를 대비하여 지층에 기록된 지구의 역사를 설명하고, 광물에 포함된 방사성 동위 원소를 이용하여 암석의 절대 연령을 구할 수 있다.","B":"동일과정의 원리를 이해하고, 지사학의 법칙들을 활용하여 지질단면도에서 지 층 의 상대 연령을 비교하고 층서를 대 비 하 며, 광 물 에 포함된 방사성 동위 원 소 를 이용하여 암석의 절대 연령을 구할 수 있다.","C":"지사학의 법칙들을 활용하여 지질단면도에서 지층의 상대 연령을 비교하고, 암석의 절대 연령을 구하기 위해 방사성 동위 원소가 이용됨을 말할 수 있다.","D":"지사학의 법칙들을 활용하여 지질단면도에서 지층의 상대 연령을 비교하고, 이를 지층의 절대 연령과 구분할 수 있다.","E":"지층의 나이를 결정하는 상대 연령과 절대 연령을 구분할 수 있다."},"12지구02-02":{"A":"표준 화석을 통해 지질시대를 기 수준에서 구분하고, 지층의 퇴적 구조, 화석, 고기후 연구 방법에 대한 이해를 바탕으로 지질시대의 생물과 환경 변화를 해석하며, 한반도의 화석 분포를 지도에 표현하는 탐구를 통해 한반도의 지질 학적 가치를 인식한다.","B":"표준 화석을 통해 지질시대를 기 수준에서 구분하고, 지층의 퇴적 구조와 화석 을 통해 지질시대의 생물과 환경 변화를 해석하며, 한반도의 화석 분포를 지도 에 표현하는 탐구를 통해 한반도의 지질학적 가치를 인식한다.","C":"지질시대를 대 수준에서 구분하고, 지층의 퇴적 구조와 화석을 통해 지질시대 의 생물과 환경 변화를 해석하며, 한반도의 화석 분포를 지도에 표현하는 탐구 를 통해 우리 주변에 분포하는 다양한 화석에 흥미를 가진다.","D":"지층의 퇴적 구조와 화석을 통해 지질시대의 생물과 환경이 변화했음을 말하 고, 한반도의 화석 분포를 지도에 표현하는 탐구를 통해 우리 주변에 분포하는 다양한 화석에 흥미를 가진다.","E":"지층과 화석을 통해 지질시대의 생물과 환경이 변화했음을 알고, 안내된 절차 에 따라 한반도의 화석 분포를 지도에 표현할 수 있다."},"12지구02-03":{"A":"변동대에서 마그마가 생성되는 과정과 마그마의 조성에 따라 다양한 화성암이 생성됨을 이해하고, 화성암에 나타나는 다양한 지질 구조의 형성 과정을 설명 하며, 이를 한반도에 나타나는 대표적인 화성암 지형과 관련지을 수 있다.","B":"변동대에서 마그마가 생성되는 과정과 마그마의 조성에 따라 다양한 화성암이 생성됨을 이해하고, 화성암에 나타나는 다양한 지질 구조의 형성 과정을 설명 할 수 있다.","C":"변동대에서 마그마의 조성에 따라 다양한 화성암이 생성됨을 알고, 화성암에 나타나는 다양한 지질 구조를 구분할 수 있다.","D":"변동대에서 다양한 화성암이 생성됨을 알고, 화성암에 나타나는 다양한 지질 구 조 를 제시할 수 있 다.","E":"변동대에서 다양한 화성암이 생성됨을 말할 수 있다."},"12지구02-04":{"A":"변성작용의 종류와 지각 변동에 따라 나타나는 지질 구조의 생성 과정과 특징 을 변동대와 관련지어 설명하고, 지구시스템에서 다양한 사례를 통해 암석이 순환함을 추론할 수 있다.","B":"변동대에서 나타나는 변성작용의 종류를 구분하고, 지각 변동에 따라 나타나 는 지질 구조의 생성 과정을 변동대와 관련지으며, 지구시스템에서 암석이 순환함을 설명할 수 있다.","C":"변동대에서 나타나는 변성작용의 종류를 나열하고, 지각 변동에 따라 나타나 는 지질 구조를 구분하며, 암석이 순환함을 말할 수 있다.","D":"변동대에서 변성작용이 일어남을 알고, 습곡과 단층을 구분하며, 암석이 순환 함을 말할 수 있다.","E":"변동대에서 변성작용이 일어남과 암석이 순환함을 말할 수 있다."},"12지구02-05":{"A":"우리나라의 대표적인 지질공원에서 관찰 가능한 암석과 지질 구조의 특징을 탐구하여 지질학적 형성 과정을 종합적으로 추론하고, 이 과정에서 지질공원 의 경이로움을 인식하여 지질공원이 지역사회와 함께 지속가능하게 발전하기 위한 방안을 제안할 수 있다.","B":"우리나라의 대표적인 지질공원에서 관찰 가능한 암석과 지질 구조의 특징을 탐구하여 지질학적 형성 과정을 추론하고, 이 과정에서 지질공원의 경이로움 을 인식하여 지질공원이 지역사회와 함께 지속가능하게 발전하기 위한 방안을 제안할 수 있다.","C":"우리나라의 대표적인 지질공원에서 관찰 가능한 암석과 지질 구조의 특징을 설명하고, 지질공원의 소중함을 인식한다.","D":"우리나라의 대표적인 지질공원에 나타나는 지질 구조를 구분하고, 지질공원의 소중함을 인식한다.","E":"지질공원에 지질 구조가 나타남을 알고, 지질공원에 관심을 가진다."}},"area":{"A":{"지식·이해":"동일과정의 원리와 지사학의 법칙들을 이해하고, 암석의 상대 연령과 절대 연령을 구분하고 각각을 구하는 방법을 설명하며, 표준 화석을 통해 지질시대를 기 수준 에서 구분하고, 지층의 퇴적 구조, 화석, 고기후 연구 방법을 이해하여 지질시대의 생물과 환경 변화를 설명할 수 있다. 변동대에서 마그마가 생성되는 과정과 마그마의 조성에 따라 다양한 화성암이 생성됨 을 이해하고, 화성암에 나타나는 다양한 지질 구조의 형성 과정을 설명하며 이를 한반 도에 나타나는 대표적인 화성암 지형과 관련짓고, 변성작용의 종류와 지각 변동에 따라 나타나는 지질 구조의 생성 과정과 특징을 변동대와 관련지어 설명할 수 있다. 우리나라의 대표적인 지질공원에서 관찰 가능한 암석과 지질 구조의 특징과 지질 학적 형성 과정을 설명할 수 있다.","과정·기능":"동일과정의 원리를 바탕으로 지사학의 법칙들을 활용하여 지질단면도에서 지층의 상대 연령을 비교하고 층서를 대비하여 지층에 기록된 지구의 역사를 설명하며, 광물에 포함된 방사성 동위 원소를 이용하여 암석의 절대 연령을 구하고, 지층의 퇴적 구조, 화석, 고기후 연구 방법에 대한 이해를 바탕으로 지질시대의 생물과 환경 변화를 해석할 수 있다. 한반도의 화석 분포를 지도에 표현하고, 우리나라의 대표적인 지질공원에서 관찰 가능한 암석과 지질 구조의 특징을 탐구하여 지질학적 형성 과정을 종합적으로 추론할 수 일식과 월식을 천체 관측 프로그램으로 시뮬레이션하며, 별의 분광형과 광도 자료로 H-R도를 작성하여 별을 분류하고, 질량이 서로 다른 주계열성의 진화 과정에서의 물리량 변화를 해석할 수 있다. 다양한 질량을 가진 별의 진화 과정을 H-R도에서 구별하고, 인공지능을 이용하 여 허블의 은하 분류 체계에 따라 은하를 분류하고, 관측적 증거를 바탕으로 현대 우주론이 정립되기까지의 과정을 추론할 수 있다.","가치·태도":"식 현상, 행성의 운동 등 다양한 천문 현상의 경이로움을 인식하고, 별들의 진화 과정을 통해 인간을 이루는 원소의 근원을 인식하여 자연과 과학에 대한 감수성을 가진다."},"C":{"지식·이해":"태양계 모형을 바탕으로 내행성과 외행성의 겉보기 운동이 다르게 나타남을 알고, 일식과 월식을 구분하며, 별의 표면 온도와 스펙트럼을 대응하고, 별의 물리량을 설명할 수 있다. 태양과 비슷한 질량을 가진 별의 진화 과정을 이해하고, 특이 은하의 존재를 말할 수 있다. 허블-르메트르 법칙으로 우주의 팽창을 설명하고, 관측적 증거를 바탕으로 현대 우주론이 정립되기까지의 과정을 설명할 수 있다.","과정·기능":"태양계 모형을 바탕으로 내행성과 외행성의 겉보기 운동이 다르게 나타남을 알고, 천체 관측 프로그램에서 식 현상을 시뮬레이션하며, 스펙트럼 분석을 통해 별의 표면 온도를 추정하고, 별의 분광형과 광도 자료를 H-R도에 나타낼 수 있다. 다양한 질량을 가진 별의 진화 과정을 H-R도에서 구별하고, 인공지능을 이용하 여 허블의 은하 분류 체계에 따라 은하를 분류하며, 다양한 파장으로 관측한 외부 은 하 의 자료를 통해 특이 은하가 존재함을 파악할 수 있 다.","가치·태도":"식 현상, 행성의 운동 등 다양한 천문 현상에 관심을 가지고, 별들의 진화 과정을 통해 인간을 이루는 원소의 근원을 인식하고 자연과 과학에 대한 감수성을 가진다."},"D":{"지식·이해":"일식과 월식을 구분하고, 별의 표면 온도에 따라 스펙트럼이 다양하게 나타남과 별의 진화 과정이 질량에 따라 다름을 말할 수 있다. 우주 팽창의 증거로 허블-르메트르 법칙을 제시하고, 우주의 진화에 대한 다양한 설명 체계를 나열할 수 있다.","과정·기능":"천체 관측 프로그램에서 시뮬레이션된 행성의 운동과 식 현상을 관측하고, 별의 분광형과 광도 자료를 H-R도에 나타낼 수 있다. 태양과 비슷한 질량을 가진 별의 진화 과정을 H-R도에 나타내고, 인공지능을 이용하여 허블의 은하 분류 체계에 따라 은하를 분류할 수 있다.","가치·태도":"식 현상, 행성의 운동 등 다양한 천문 현상과 별의 진화에 관심을 가진다."},"E":{"지식·이해":"별의 표면 온도에 따라 스펙트럼이 다양하게 나타남과 별의 진화 과정이 질량에 따라 다름을 말할 수 있다. 허블의 은하 분류 체계가 형태에 따른 분류임을 말하고, 우주 팽창의 증거로 허블 -르메트르 법칙을 제시할 수 있다.","과정·기능":"천체 관측 프로그램에서 시뮬레이션된 식 현상을 관측할 수 있다.","가치·태도":"식 현상과 별의 진화에 관심을 가진다."}}},"역학-01":{"codes":{"12역학01-01":{"A":"2차원 평면상에서 물체에 작용하는 마찰력, 장력, 수직항력 등 여러 가지 힘의 합력을 벡터의 합성을 통해 구하고, 이를 활용하여 물체의 운동을 정량적으로 예측하며, 스마트폰을 이용하여 다양한 놀이 기구의 운동을 분석하는 탐구를 설 계 하 여 수행할 수 있 다.","B":"2차원 평면상에서 마찰력, 장력, 수직항력 등 여러 가지 힘이 물체에 작용할 때 벡터의 합성을 통해 힘의 합력을 구하고, 스마트폰을 이용하여 놀이 기구의 운동을 분석할 수 있다.","C":"2차원 평면상에서 물체에 두 힘이 작용할 때 합력의 크기와 방향을 화살표를 이용하여 나타내고, 물체의 운동은 물체에 작용하는 합력의 크기와 방향에 따 라 달라짐을 설명할 수 있다.","D":"2차원 평면상에서 물체에 두 힘이 작용할 때 합력의 크기와 방향을 화살표를 이 용 하 여 나타낼 수 있 다.","E":"물체에 두 힘이 나란하게 작용할 때 합력의 크기와 방향을 화살표를 이용하여 나타낼 수 있다."},"12역학01-02":{"A":"뉴턴 운동 법칙을 이용하여 물체의 포물선 운동을 정량적으로 설명하고, 포물 선 운동을 하는 물체의 동영상을 분석하여 물체의 운동 정보와 역학적 에너지 를 구하며, 역학적 에너지 보존을 확인할 수 있다.","B":"물체의 포물선 운동을 이해하기 위해 뉴턴 운동 법칙이 이용됨을 알고, 포물선 운동을 하는 물체의 동영상 분석 자료를 이용해 역학적 에너지를 구하며, 역학 적 에너지 보존을 확인할 수 있다.","C":"포물선 운동을 하는 물체의 동영상 분석 자료를 통해 역학적 에너지 보존을 확인할 수 있다.","D":"물체가 포물선 운동을 할 때 역학적 에너지가 보존됨을 말할 수 있다.","E":"비스듬히 던져진 물체는 포물선 운동을 함을 말할 수 있 다."},"12역학01-03":{"A":"물체의 운동 방향과 힘의 방향을 분석하여 물체의 운동을 예측하고, 물체에 작용하는 힘의 방향에 따라 물체의 운동 방향이 변할 수 있음을 원운동 등 다양한 예를 들어 설명할 수 있다.","B":"물체의 운동 방향에 비스듬하게 힘이 작용하거나 수직으로 힘이 작용하면 물 체의 운동 방향이 변하게 됨을 원운동 등의 예를 들어 설명할 수 있다.","C":"물체의 운동 방향에 수직으로 힘이 작용하면 물체의 운동 방향만 변하게 됨을 알고, 속력은 일정하고 방향만 변하는 운동에 등속 원운동이 있음을 말할 수 있다.","D":"원운동하는 물체에는 운동 방향에 수직으로 작용하는 힘이 있음을 말할 수 있다.","E":"원운동하는 물체에는 힘이 작용함을 말할 수 있다."},"12역학01-04":{"A":"케플러 법칙으로부터 중력의 존재가 밝혀지는 과학사적 배경을 이해하고, 구 심력으로서의 중력을 이용하여 인공위성과 행성의 원운동을 설명하며, 행성 관측 데이터를 활용하여 실제 행성의 운동을 분석하고, 케플러 법칙을 적용 및 확인하여, 이를 통해 얻은 결과를 과학적으로 해석할 수 있다.","B":"케플러 법칙으로부터 중력의 존재가 밝혀지는 과학사적 배경이 있음을 알고, 중력을 이용하여 인공위성과 행성의 운동을 이해하며, 분석된 행성 관측 데이 터 로 케플러 법칙을 확인할 수 있 다.","C":"행성 관측 데이터를 기반으로 한 케플러 법칙으로 중력의 존재가 밝혀졌음을 알고, 인공위성과 행성의 운동을 중력과 관련지어 설명할 수 있다.","D":"인공위성과 행성의 운동을 중력과 관련지어 설명할 수 있다.","E":"인공위성과 행성은 중력을 받으며 운동함을 말할 수 있다."},"12역학01-05":{"A":"역학적 에너지 보존을 이용하여 행성의 탈출 속도를 구하고, 행성별 탈출 속도 의 차이로 인해 행성별로 대기의 구성이 다름을 이해하며, 뉴턴 운동 법칙과 운동량 보존 법칙을 이용하여 우주선이 발사되어 궤도에 오르는 원리를 정성 적으로 설명할 수 있다.","B":"행성의 탈출 속도를 구할 때 역학적 에너지 보존이 이용되며 탈출 속도의 차이 로 행성마다 대기의 구성이 다름을 알고, 뉴턴 운동 법칙과 운동량 보존 법칙 이 우주선이 발사되어 궤도에 오르는 원리와 관계되어 있음을 말할 수 있다.","C":"탈출 속도의 차이로 행성마다 대기의 구성이 다름을 알고, 운동량 보존 법칙이 우주선이 발사되어 궤도에 오르는 원리와 관계되어 있음을 말할 수 있다.","D":"탈출 속도의 차이로 행성마다 대기의 구성이 다름을 말할 수 있다.","E":"탈출 속도의 뜻을 말할 수 있다."},"12역학01-06":{"A":"등가 원리와 시공간의 휘어짐을 이해하고, 이로 인해 블랙홀과 중력 시간 지연 이 나타남을 설명하고, 탈출 속도의 의미로부터 블랙홀의 의미를 설명하며, 위성 항법 장치(GPS) 등 중력 시간 지연이 실생활에서 활용되는 사례를 조사 하는 과정에서 일반 상대론에 호기심을 가진다.","B":"등가 원리 및 시공간의 휘어짐을 알고, 등가 원리와 시공간의 휘어짐으로 인해 블랙홀과 중력 시간 지연이 나타남을 말하며, 위성 항법 장치(GPS) 등 중력 시간 지연이 실생활에서 활용되는 사례를 찾고, 일반 상대론에 호기심을 가진다.","C":"등가 원리, 시공간의 휘어짐, 블랙홀이라는 용어가 일반 상대론과 관련이 있음 을 알고, 위성 항법 장치(GPS) 등 중력 시간 지연이 실생활에서 활용되는 사례를 통해 일반 상대론에 대한 흥미를 가진다.","D":"실생활에서 활용되는 위성 항법 장치(GPS) 등에 일반 상대론이 적용되었다는 것을 알고, 과학에 흥미를 가진다.","E":"일반 상대론이 실생활에서 활용됨을 말할 수 있고, 이에 관심을 가진다."}},"area":{"A":{"지식·이해":"2차원 평면상에서 물체에 작용하는 마찰력, 장력, 수직항력 등 여러 가지 힘의 합력을 벡터의 합성을 통해 구하고, 이를 활용하여 물체의 운동을 정량적으로 예측하며, 뉴턴 운동 법칙을 이용하여 물체의 포물선 운동을 정량적으로 설명하 고, 포물선 운동에서 역학적 에너지를 구하고 역학적 에너지 보존을 확인할 수 있다. 물체에 작용하는 힘의 방향에 따라 물체의 운동 방향이 변할 수 있음을 원운동 등 다양한 예를 들어 설명하고, 케플러 법칙으로부터 중력의 존재가 밝혀지는 과학사적 배경을 이해하며, 구심력으로서의 중력을 이용하여 인공위성과 행성의 원 운 동 을 설명할 수 있 다. 역학적 에너지 보존을 이용하여 행성에 따라 탈출 속도가 다르며 이 차이로 인해 행성별로 대기의 구성이 다름을 이해하고, 뉴턴 운동 법칙과 운동량 보존 법칙을 이용하여 우주선이 발사되어 궤도에 오르는 원리를 설명하며, 등가 원리와 시공간 의 휘어짐으로 인해 블랙홀과 중력 시간 지연이 나타남을 이해하며, 탈출 속도의 의미로부터 블랙홀의 의미를 설명할 수 있다.","과정·기능":"스마트폰을 이용하여 다양한 놀이 기구의 운동을 분석하는 탐구를 설계하여 수행 하고, 포물선 운동을 하는 물체의 동영상을 분석하여 역학적 에너지 보존을 확인 할 수 있다. 물체의 운동 방향과 힘의 방향을 분석하여 물체의 운동을 예측하고, 행성 관측 데이터를 활용하여 실제 행성의 운동을 분석할 수 있다. 케플러 법칙을 적용하여 확인하고, 이를 통해 얻은 결과를 과학적으로 해석하며, 위성 항법 장치(GPS) 등 중력 시간 지연이 실생활에서 활용되는 사례를 조사할 수 있다.","가치·태도":"위성 항법 장치(GPS) 등 중력 시간 지연이 실생활에서 활용되는 사례를 조사하는 과정에서 일반 상대론에 호기심을 가진다."},"B":{"지식·이해":"2차원 평면상에서 마찰력, 장력, 수직항력 등 여러 가지 힘이 물체에 작용할 때 벡터의 합성을 통해 힘의 합력을 구하고, 뉴턴 운동 법칙을 이용하여 물체의 포물 선 운동을 이해하며, 포물선 운동을 하는 역학적 에너지를 구할 수 있다. 물체의 운동 방향에 비스듬하게 힘이 작용하거나 수직으로 힘이 작용하면 물체의 운동 방향이 변하게 됨을 설명하고, 케플러 법칙으로부터 중력의 존재가 밝혀지는 과학사적 배경이 있음을 알며, 중력을 이용하여 인공위성과 행성의 운동을 이해할 수 있다. 역학적 에너지 보존으로 행성별 탈출 속도와 대기 구성 차이를 이해하고, 뉴턴 운동 법칙과 운동량 보존 법칙이 우주선이 발사되어 궤도에 오르는 원리와 관계되 어 있음을 알고, 등가 원리와 시공간의 휘어짐으로 인해 블랙홀과 중력 시간 지연 이 나타남을 말할 수 있다.","과정·기능":"스마트폰을 이용하여 놀이 기구의 운동을 분석하고, 포물선 운동을 하는 물체의 동영상 분석 자료를 이용해 역학적 에너지 보존을 확인할 수 있다. 물체의 운동 방향에 비스듬하게 힘이 작용하거나 수직으로 힘이 작용하면 물체의 운동 방향이 변하게 되는 예를 원운동 등으로 제시하고, 분석된 행성 관측 데이터 로 케플러 법칙을 확인할 수 있다. 위성 항법 장치(GPS) 등 중력 시간 지연이 실생활에서 활용되는 사례를 찾을 수 있다.","가치·태도":"위성 항법 장치(GPS) 등 중력 시간 지연이 실생활에서 활용되는 사례를 찾는 과정에서 일반 상대론에 호기심을 가진다."},"C":{"지식·이해":"물체의 운동은 물체에 작용하는 합력의 크기와 방향에 따라 달라짐을 알고, 포물 선 운동을 하는 물체의 역학적 에너지는 보존됨을 알며, 물체의 운동 방향에 수직 으로 힘이 작용하면 물체의 운동 방향만 변하게 됨을 말할 수 있다. 행성 관측 데이터를 기반으로 한 케플러 법칙으로 중력의 존재가 밝혀졌음을 알고, 인공위성과 행성의 운동을 중력과 관련지어 설명할 수 있다. 탈출 속도의 차이로 행성마다 대기의 구성이 다름을 알고, 운동량 보존 법칙이 우주선이 발사되어 궤도에 오르는 원리와 관계되어 있으며, 등가 원리, 시공간의 휘어짐, 블랙홀이라는 용어가 일반 상대론과 관련이 있음을 말할 수 있다.","과정·기능":"2차원 평면상에서 물체에 두 힘이 작용할 때 합력의 크기와 방향을 화살표를 이용 하여 나타내고, 포물선 운동을 하는 물체의 동영상 분석 자료를 통해 역학적 에너 지 보존을 확인할 수 있다. 속력은 일정하고 방향만 변하는 운동에 등속 원운동이 있고, 위성 항법 장치 (GPS) 등 중력 시간 지연이 실생활에서 활용되는 사례가 있음을 말할 수 있다.","가치·태도":"위성 항법 장치(GPS) 등 중력 시간 지연이 실생활에서 활용되는 사례를 통해 일반 상대론에 대한 흥미를 가진다."},"D":{"지식·이해":"물체가 포물선 운동을 할 때 역학적 에너지가 보존됨을 알고, 원운동하는 물체에 는 운동 방향에 수직으로 작용하는 힘이 있음을 말할 수 있다. 인공위성과 행성의 운동을 중력과 관련지어 설명하고, 탈출 속도의 차이로 행성마 다 대기의 구성이 다르며, 실생활에서 활용되는 위성 항법 장치(GPS) 등에 일반 상대론이 적용되었음을 말할 수 있다.","과정·기능":"2차원 평면상에서 물체에 두 힘이 작용할 때 합력의 크기와 방향을 화살표를 이용 하여 나타낼 수 있다.","가치·태도":"실생활에서 활용되는 위성 항법 장치(GPS) 등에 일반 상대론이 적용되었다는 것을 알고 이에 흥미를 가진다."},"E":{"지식·이해":"비스듬히 던져진 물체는 포물선 운동을 하고, 원운동하는 물체에는 힘이 작용하 며, 인공위성과 행성의 운동은 중력의 작용을 받음을 말할 수 있다. 탈출 속도의 뜻을 알고, 일반 상대론이 위성 항법 장치(GPS) 등 실생활에서 활용 되고 있음을 말할 수 있다.","과정·기능":"물체에 두 힘이 나란하게 작용할 때 합력의 크기와 방향을 화살표를 이용하여 나타낼 수 있다.","가치·태도":"일반 상대론과 같은 과학 지식이 실생활에서 활용되는 데 관심을 가진다."}}},"역학-02":{"codes":{"12역학02-01":{"A":"고체, 액체, 기체에서 전도, 대류, 복사 등 열전달 방식을 이해하고, 단열재의 종류에 따른 보온/보냉 효과를 비교하는 창의적인 실험을 설계하고 수행하며, 냉난방을 위한 건축물의 단열재 및 건축물의 구조 등 건축을 포함한 다양한 열에너지 관련 기술에 단열, 열팽창 등이 활용되는 사례를 조사하고, 이 과정 에서 과학의 유용성에 대한 가치를 인식하고 표현할 수 있다.","B":"고체, 액체, 기체에서의 열전달 방식을 이해하고, 실험을 통해 단열재의 종류에 따른 보온/보냉 효과를 비교하며, 건축 등 다양한 열에너지 관련 기술에서 단열과 열팽창의 활용 사례를 찾고, 이 과정에서 과학의 유용성에 대한 가치를 인식한다.","C":"열이 전도, 대류, 복사 등의 방법으로 전달됨을 알고, 단열재의 종류에 따른 보온/보냉 효과를 비교하며, 건축 등 다양한 열에너지 관련 기술에 단열, 열팽 창 등이 활용되는 사례에 호기심을 가진다.","D":"단열재가 보온/보냉 효과를 나타냄을 알고, 일상생활에서 단열, 열팽창 등이 활용되는 사례에 관심을 가진다.","E":"일상생활에서 단열, 열팽창 등의 활용에 관심을 가진다."},"12역학02-02":{"A":"물질의 고유한 특성인 비열 및 잠열과 관련하여 열에 의한 물질의 상태 변화를 이해하고, 센서를 이용하여 기체의 압력, 부피, 온도 관계를 분석하는 탐구를 설계 및 수행하고 그 결과를 해석하는 과정에서 이상 기체의 온도, 압력, 부피 의 관계를 이상 기체 법칙으로 설명하며, 이를 실생활에서의 다양한 열 현상에 적용하여 설명하는 과정에서 과학 지식의 유용성을 인식한다.","B":"열에 의한 물질의 상태 변화를 알고, 센서를 이용하여 기체의 압력, 부피, 온도 를 측정하여 이상 기체의 온도, 압력, 부피의 관계를 설명하며, 과학 지식의 유용성에 관심을 가진다.","C":"센서를 이용하여 기체의 압력, 부피, 온도를 측정하여 이상 기체의 온도, 압력, 부피가 서로 관련이 있음을 알고, 열에 의해 물질의 상태 변화가 일어남을 알며, 열 현상에 흥미를 가진다.","D":"센서를 이용하여 기체의 압력, 부피, 온도를 측정하고, 열에 의해 물질의 상태 변화가 일어남을 말할 수 있다.","E":"열에 의해 물질의 상태 변화가 일어남을 말할 수 있다."},"12역학02-03":{"A":"계에 가해진 열이 등압 과정, 등적 과정, 등온 과정 등 다양한 열역학 과정을 통해 계의 내부 에너지를 변화시키거나 외부에 일을 할 수 있음을 열역학 제1 법칙과 관련지어 이해하고, 열역학 제1법칙이 에너지 보존 법칙의 다른 표현 임을 알며, 이와 관련된 일상생활 속 예를 찾는 과정에서 흥미를 느낀다.","B":"계에 가해진 열이 계의 내부 에너지를 변화시키거나 외부에 일을 할 수 있으며 이것이 열역학 제1법칙과 관련됨을 알고, 일상생활 속 사례에 관심을 갖고 찾 을 수 있 다.","C":"계에 가해진 열이 계의 내부 에너지를 변화시키거나 외부에 일을 할 수 있음을 알 고, 이와 관련된 일상생활 속의 사례에 관심을 가진다.","D":"계에 가해진 열이 계의 내부 에너지를 변화시키거나 외부에 일을 할 수 있음을 말 할 수 있 다.","E":"계에 가해진 열이 계의 내부 에너지를 변화시키거나 외부에 일을 할 수 있다는 사실에 관심을 가진다."},"12역학02-04":{"A":"다양한 열기관에서의 순환 과정을 이해하고 열효율을 설명하며, 열기관의 개 발과 활용이 인류 공동체에 미친 영향을 산업발전과 환경 측면에서 종합적으 로 평가할 수 있다.","B":"열기관에서의 순환 과정과 열효율을 알고, 열기관의 개발과 활용이 인류 공동 체에 미친 영향을 산업발전과 환경 측면에서 조사할 수 있다.","C":"열이 일로 전환되는 비율로서의 열효율 개념을 알고, 열효율을 높이기 위한 인류의 노력 및 열의 활용으로 인한 지구온난화 등 지구 환경 문제 사이의 관계를 찾을 수 있다.","D":"열효율이 열이 일로 전환되는 비율임을 알고, 열의 활용이 지구온난화 등 지구 환경 문제와 관련됨을 말할 수 있다.","E":"열기관의 열효율을 높이는 것이 중요함을 말할 수 있다."},"12역학02-05":{"A":"엔트로피 개념을 이해하고, 열의 이동, 기체의 확산 등 다양한 비가역 현상을 엔트로피 개념의 이해를 바탕으로 열역학 제2법칙을 적용하여 설명할 수 있다.","B":"엔트로피 개념을 알고, 열의 이동, 기체의 확산과 같은 비가역 현상에 엔트로 피 개념을 적용할 수 있음을 말할 수 있다.","C":"엔트로피 개념을 알고, 열의 이동, 기체의 확산과 같은 비가역 현상에 엔트로 피 개념이 관련되어 있음을 말할 수 있다.","D":"엔트로피 개념을 알고, 열의 이동, 기체의 확산은 비가역 현상임을 말할 수 있다.","E":"열의 이동, 기체의 확산은 비가역 현상임을 말할 수 있다."}},"area":{"A":{"지식·이해":"고체, 액체, 기체에서 전도, 대류, 복사 등 열전달 방식을 이해하고, 냉난방을 위한 건축물의 단열재 및 건축물의 구조 등 건축을 포함한 다양한 열에너지 관련 기술 에 단열, 열팽창 등이 활용되는 사례를 설명할 수 있다. 물질의 고유한 특성인 비열 및 잠열과 관련하여 열에 의한 물질의 상태 변화를 이해 하고, 이상 기체의 온도, 압력, 부피의 관계를 이상 기체 법칙으로 설명하며, 계에 가해진 열이 등압 과정, 등적 과정, 등온 과정 등 다양한 열역학 과정을 통해 계의 내부 에너지를 변화시키거나 외부에 일을 할 수 있음을 열역학 제1법칙과 관련지어 이해하고, 열역학 제1법칙이 에너지 보존 법칙의 다른 표현임을 말할 수 있다. 다양한 열기관에서의 순환 과정을 이해하고 열효율을 설명하고, 엔트로피 개념을 이해하며, 열의 이동, 기체의 확산 등 다양한 비가역 현상을 엔트로피 개념의 이해 를 바탕으로 열역학 제2법칙을 적용하여 설명할 수 있다.","과정·기능":"단열재의 종류에 따른 보온/보냉 효과를 비교하는 창의적인 실험을 설계하고 수 행하며, 냉난방을 위한 건축물의 단열재 및 건축물의 구조 등 건축을 포함한 다양 한 열에너지 관련 기술에 단열, 열팽창 등이 활용되는 사례를 조사하고 과학의 유 용 성 을 표현할 수 있 다. 센서를 이용하여 기체의 압력, 부피, 온도 관계를 분석하는 탐구를 설계 및 수행하 고 그 결과를 논의하는 과정에서 이상 기체의 온도, 압력, 부피의 관계를 이상 기체 법칙으로 설명하고, 열역학 제1법칙과 관련된 일상생활 속 예를 찾을 수 있다. 열효율 향상을 위한 기술적 노력 및 열기관의 개발과 활용이 인류 공동체에 미친 영향을 산업발전과 환경 측면에서 조사할 수 있다.","가치·태도":"다양한 열에너지 관련 기술에 단열, 열팽창 등이 활용되는 사례를 조사하고, 이상 기체 법칙을 실생활에서의 다양한 열 현상에 적용하여 설명하는 과정에서 과학 지식의 유용성을 인식한다. 열역학 제1법칙과 관련된 일상생활 속 예를 찾는 과정에서 흥미를 느끼고, 열기관의 개발과 활용이 인류 공동체에 미친 영향을 산업발전과 환경 측면에서 평가할 수 있다."},"B":{"지식·이해":"고체, 액체, 기체에서의 열전달 방식을 설명하고, 열에 의한 물질의 상태 변화를 알며, 이상 기체의 온도, 압력, 부피의 관계를 말할 수 있다. 계에 가해진 열이 계의 내부 에너지를 변화시키거나 외부에 일을 할 수 있으며 이것이 열역학 제1법칙과 관련됨을 알고, 열기관에서의 순환 과정과 열효율을 이해할 수 있다. 엔트로피 개념을 알고, 열의 이동, 기체의 확산과 같은 비가역 현상에 엔트로피 개념을 적용할 수 있음을 말할 수 있다.","과정·기능":"실험을 통해 단열재의 종류에 따른 보온/보냉 효과를 비교하고, 건축 등 다양한 열에너지 관련 기술에서 단열과 열팽창의 활용 사례를 찾을 수 있다. 센서를 이용하여 기체의 압력, 부피, 온도를 측정하여 이상 기체의 온도, 압력, 부피의 관계를 알고, 열역학 제1법칙과 관련된 일상생활 속 예를 찾을 수 있다. 열기관의 개발과 활용이 인류 공동체에 미친 영향을 산업발전과 환경 측면에서 조사할 수 있다.","가치·태도":"다양한 열에너지 관련 기술에 단열, 열팽창 등이 활용되는 사례를 찾는 과정에서 과학의 유용성에 대한 가치를 인식한다. 이상 기체 법칙을 실생활에서의 다양한 열 현상에 적용하는 과정에서 과학 지식의 유용성에 호기심을 가진다. 열역학 제1법칙과 관련된 일상생활 속 사례에 관심을 갖고, 열기관의 개발과 활용 이 인류 공동체에 영향을 끼쳤음을 인식한다."},"C":{"지식·이해":"열이 전도, 대류, 복사 등의 방법으로 전달되고, 이상 기체의 온도, 압력, 부피가 서로 관련이 있음을 알고, 열에 의해 물질의 상태 변화가 일어남을 말할 수 있다. 계에 가해진 열이 계의 내부 에너지를 변화시키거나 외부에 일을 할 수 있음을 알고, 열이 일로 전환되는 비율로서의 열효율 개념을 말할 수 있다. 엔트로피 개념을 알고, 열의 이동, 기체의 확산과 같은 비가역 현상에 엔트로피 개념이 관련되어 있음을 말할 수 있다.","과정·기능":"단열재의 종류에 따른 보온/보냉 효과를 비교하고, 건축을 포함한 다양한 열에너 지 관련 기술에 단열, 열팽창 등이 활용됨을 말할 수 있다. 센서를 이용하여 기체의 압력, 부피, 온도를 측정하여 이상 기체의 온도, 압력, 부피가 서로 관련이 있음을 알아낼 수 있다. 열효율을 높이기 위한 인류의 노력 및 열의 활용으로 인한 지구온난화 등 지구 환경 문제 사이의 관계를 찾을 수 있다.","가치·태도":"다양한 열에너지 관련 기술에 단열, 열팽창 등이 활용되는 사례 및 실생활에서의 열 현상에 호기심을 가진다. 열역학 제1법칙과 관련된 일상생활 속의 사례와 열효율을 높이기 위한 인류의 노력 및 열의 활용이 지구온난화 등 지구 환경 문제에 끼친 영향에 흥미를 가진다."},"D":{"지식·이해":"열에 의해 물질의 상태 변화가 일어남을 알고, 계에 가해진 열이 계의 내부 에너지 를 변화시키거나 외부에 일을 할 수 있음을 말할 수 있다. 엔트로피 개념을 알고, 열의 이동, 기체의 확산은 비가역 현상임을 말할 수 있다.","과정·기능":"단열재가 보온/보냉 효과를 나타냄을 알고, 일상생활에서 단열, 열팽창 등이 활용 됨을 말할 수 있다. 센서를 이용하여 기체의 압력, 부피, 온도를 측정할 수 있다.","가치·태도":"일상생활에서 단열, 열팽창 등이 활용되는 사례와 실생활에서의 열 현상에 호기심 을 가진다. 열역학 제1법칙과 관련된 일상생활 속의 사례와 열의 활용과 관련하여 지구온난 화 등 지구 환경 문제에 흥미를 가진다."},"E":{"지식·이해":"열에 의해 물질의 상태 변화가 일어남을 알고, 열기관의 열효율을 높이는 것이 중요함을 말할 수 있다. 열의 이동, 기체의 확산은 비가역 현상임을 말할 수 있다.","과정·기능":"일상생활에서 단열, 열팽창 등이 활용됨을 말할 수 있다.","가치·태도":"일상생활에서 단열, 열팽창 등의 활용과 실생활에서의 열 현상에 관심을 가진다. 계에 가해진 열이 계의 내부 에너지를 변화시키거나 외부에 일을 할 수 있다는 사실에 관심을 가진다."}}},"역학-03":{"codes":{"12역학03-01":{"A":"용수철 진자의 운동을 통해 단진동하는 물체의 변위, 속도, 가속도의 시간에 따른 변화를 이해하고, 단진동에서 가속도와 변위 사이의 관계를 설명할 수 있다.","B":"용수철 진자의 운동을 통해 단진동하는 물체의 변위, 속도, 가속도의 시간에 따른 변화를 이해하고, 단진동에서 가속도와 변위 사이의 관계를 말할 수 있다.","C":"용수철 진자의 운동을 통해 단진동하는 물체의 변위, 속도, 가속도가 시간에 따라 변함을 알고, 단진동에서 가속도와 변위가 서로 관련됨을 말할 수 있다.","D":"용수철 진자의 운동이 단진동임을 알고, 단진동에서 변위, 속도, 가속도가 주 기적으로 변한다는 것을 말할 수 있다.","E":"용수철 진자의 운동이 단진동임을 말할 수 있다."},"12역학03-02":{"A":"탄성파의 진행을 파장, 진동수, 진행 속력으로 기술하고, 매질 경계면에서의 투과와 반사 시 위상 변화를 설명하며, 파동 용수철을 이용하여 탄성파의 진행 속력을 측정하고 탄성체의 연속적 결합으로 탄성파의 속성을 이해하며, 초음 파 영상, 비파괴 검사 등 다양한 예를 들어 탄성파의 활용을 설명하는 과정에 서 과학의 유용성을 인식한다.","B":"탄성파의 진행을 파장, 진동수, 진행 속력으로 기술하고, 매질 경계면에서의 투과와 반사 현상의 특징을 알며, 파동 용수철을 이용하여 탄성파의 진행 속력 을 측정하고, 초음파 영상, 비파괴 검사 등 다양한 예를 들어 탄성파의 활용을 설명하는 과정에서 과학의 유용성을 인식한다.","C":"탄성파의 진행을 파장, 진동수, 진행 속력으로 설명하고, 매질 경계면에서의 투과와 반사 현상의 특징을 알며, 파동 용수철을 이용하여 종파와 횡파를 구현 하고 탄성파가 활용되는 예를 찾는 과정에서 과학의 유용성에 흥미를 가진다.","D":"탄성파의 진행을 파장, 진동수, 진행 속력으로 말하고, 매질 경계면에서 투과 와 반사 현상이 일어남을 알며, 파동 용수철을 이용하여 종파와 횡파를 구현할 수 있다.","E":"탄성파가 진행할 때 매질 경계면에서 투과와 반사 현상이 일어남을 말하고, 파동 용수철을 이용하여 종파와 횡파를 구현할 수 있다."},"12역학03-03":{"A":"도플러 효과의 원리를 이해하고 물체의 속도 측정 등 다양한 장치에 이용됨을 설명하며, 스마트폰을 활용하여 음파의 특성을 분석하고 도플러 효과를 측정 하며 과학의 창의성과 유용성을 인식한다.","B":"도플러 효과의 원리를 이해하고 물체의 속도 측정 등 다양한 장치에 이용됨을 알며, 스마트폰을 활용한 도플러 효과 측정 실험을 수행하는 과정에서 과학의 창의성과 유용성을 인식한다.","C":"도플러 효과의 의미 및 도플러 효과가 속도 측정에 이용됨을 알고, 스마트폰 을 활용한 도플러 효과 측정 실험을 수행하는 과정에서 과학의 유용성을 인식 한다.","D":"도플러 효과의 의미를 알고, 안내된 절차에 따라 도플러 효과 측정 실험을 수행하는 과정에서 과학의 유용성을 느낀다.","E":"음원이나 관측자가 운동할 때 도플러 효과가 일어남을 말하고, 과학의 유용성 에 관심을 가진다."},"12역학03-04":{"A":"파동의 중첩과 간섭 현상을 설명하고, 음파의 간섭이 음향 장치와 실내외 공간 에서의 소음 제어에 적용됨을 이해하는 과정에서 과학의 유용성과 과학 문제 해결의 개방성을 인식하며, 실생활에 사용되는 사례를 조사할 수 있다.","B":"파동의 중첩과 간섭 현상을 각각 알고, 음파의 간섭이 음향 장치와 실내외 공간에서의 소음 제어에 적용됨을 아는 과정에서 과학의 유용성을 인식하며, 실생활에 사용되는 사례 를 조사할 수 있 다.","C":"음파의 간섭이 음향 장치와 실내외 공간에서의 소음 제어에 적용됨을 알고, 과학의 유용성에 흥미를 가지며, 실생활에 사용되는 사례를 조사할 수 있다.","D":"음파의 간섭이 음향 장치나 실내외 공간에서의 소음 제어에 활용됨을 말하고, 과학의 유용성에 관심을 가지며, 실생활에 사용되는 사례를 찾을 수 있다.","E":"둘 이상의 파원에서 만들어지는 파동은 중첩될 수 있음을 말하고, 과학의 유용 성에 관심을 가진다."},"12역학03-05":{"A":"파동의 간섭으로 형성되는 정상파의 원리를 이해하고, 이를 통해 현악기와 관 악기가 소리를 만들어 내는 과정을 설명하며, 현과 관의 길이 변화에 따라 정상파의 파장이 달라짐을 정량적으로 설명하고, 과학이 음악에 미치는 영향 을 인식하며, 스마트 기기를 이용하여 음파의 특성을 분석하고 정상파를 이용 하여 음파의 진행 속력을 측정할 수 있다.","B":"현악기와 관악기에서 정상파를 이용하여 소리가 발생함을 이해하고, 현과 관 의 길이에 따라 정상파의 파장이 달라짐을 설명하며, 과학이 음악에 미치는 영향을 인식하고, 스마트 기기를 이용하여 음파의 특성을 분석하고 정상파를 이용하여 음파의 진행 속력을 측정할 수 있다.","C":"정상파를 이용하여 현악기와 관악기에서 소리가 발생함을 알고, 현과 관의 길 이에 따라 정상파의 파장이 달라짐을 말하고, 과학이 음악에 미치는 영향에 흥미를 가지며, 안내된 절차에 따라 음파의 진행 속력을 측정할 수 있다.","D":"정상파를 이용하여 현악기와 관악기에서 소리가 발생함을 알고, 과학이 음악 에 미치는 영향에 관심을 가지며, 현과 관의 길이에 따라 정상파의 파장이 달라짐을 말할 수 있다.","E":"악기에서 소리를 내는 원리가 정상파와 관련 있음을 말하고, 과학과 음악에 관심을 가진다."}},"area":{"A":{"지식·이해":"용수철 진자의 운동을 통해 단진동하는 물체의 변위, 속도, 가속도의 시간에 따른 변화를 이해하고 단진동에서 가속도와 변위 사이의 관계를 설명하며, 탄성파의 진행을 파장, 진동수, 진행 속력으로 기술하고 매질 경계면에서의 투과와 반사 시 위상 변화를 설명하며, 탄성체의 연속적 결합으로 탄성파의 속성을 이해할 수 있다. 도플러 효과의 원리를 이해하고 물체의 속도 측정 등 다양한 장치에 이용됨을 설명할 수 있다. 파동의 중첩과 간섭 현상을 설명하고 음파의 간섭이 음향 장치와 실내외 공간에서 의 소음 제어에 적용됨을 이해하며 파동의 간섭으로 형성되는 정상파의 원리를 이해하고, 이를 통해 현악기와 관악기에서 소리를 만들어 내는 원리를 이해하며 현과 관의 길이에 따라 정상파의 파장이 달라짐을 정량적으로 설명할 수 있다.","과정·기능":"파동 용수철을 이용하여 탄성파의 진행 속력을 측정하고 초음파 영상, 비파괴 검사 등 다양한 탄성파 활용 예를 들 수 있다. 스마트폰을 활용하여 음파의 특성을 분석하고 도플러 효과를 측정하며 음파의 간섭이 실생활에 사용되는 사례를 조사하고 정상파를 이용하여 음파의 진행 속력 을 측정할 수 있다.","가치·태도":"탄성파의 활용을 설명하는 과정에서 과학의 유용성을 인식하고 스마트폰을 활용 하여 음파의 특성을 분석하고 도플러 효과를 측정하는 과정에서 과학의 창의성과 유용성을 인식한다. 음파의 간섭이 음향 장치와 실내외 공간에서의 소음 제어에 적용됨을 아는 과정에서 과학의 유용성과 과학 문제 해결의 개방성을 인식하고 정상파를 이용하여 악기에서 소리가 나는 원리를 이해하는 과정에서 과학이 음악에 미치는 영향을 인식한다."},"B":{"지식·이해":"용수철 진자의 운동을 통해 단진동하는 물체의 변위, 속도, 가속도의 시간에 따른 변화를 이해하고, 단진동에서 가속도와 변위 사이의 관계를 말하며 탄성파의 진행 을 파장, 진동수, 진행 속력으로 기술하고 매질 경계면에서의 투과와 반사 현상의 특징을 알며, 탄성체의 연속적 결합으로 파동의 진행을 이해할 수 있다. 도플러 효과의 원리를 이해하고 물체의 속도 측정 등 다양한 장치에 이용됨을 말 할 수 있 다. 파동의 중첩과 간섭 현상을 각각 알고 음파의 간섭이 음향 장치와 실내외 공간에 서의 소음 제어에 적용됨을 알며 현악기와 관악기에서 정상파를 이용해 소리가 발생함을 이해하고, 현과 관의 길이에 따라 정상파의 파장이 달라짐을 설명할 수 있다.","과정·기능":"파동 용수철을 이용하여 탄성파의 진행 속력을 측정하고 초음파 영상, 비파괴 검사 등 다양한 탄성파 활용 예를 들 수 있다. 스마트폰을 활용한 도플러 효과 측정 실험을 수행하고, 음파의 간섭이 실생활에 사용되는 사례를 조사하며 스마트 기기를 이용하여 음파의 특성을 분석하고 정상 파를 이용하여 음파의 진행 속력을 측정할 수 있다.","가치·태도":"탄성파의 활용을 설명하는 과정에서 과학의 유용성을 인식하고 스마트폰을 활용 한 도플러 효과 측정 실험을 수행하는 과정에서 과학의 창의성과 유용성을 인식 한다. 음파의 간섭이 음향 장치와 실내외 공간에서의 소음 제어에 적용됨을 아는 과정에 서 과학의 유용성을 인식하며, 정상파를 이용하여 악기에서 소리를 발생함을 아는 과정에서 과학이 음악에 미치는 영향을 인식한다."},"C":{"지식·이해":"용수철 진자의 운동을 통해 단진동하는 물체의 변위, 속도, 가속도가 시간에 따라 변함을 알고, 단진동에서 가속도와 변위가 서로 관련됨을 말하며 탄성파의 진행을 파장, 진동수, 진행 속력으로 설명하고 매질 경계면에서의 투과와 반사 현상의 특징을 알 수 있다. 도플러 효과의 의미 및 도플러 효과가 물체의 속도 측정에 이용됨을 알고, 음파의 간섭이 음향 장치와 실내외 공간에서의 소음 제어에 적용됨을 알며, 정상파를 이용하여 현악기와 관악기에서 소리가 발생함을 알고 현과 관의 길이에 따라 정상 파의 파장이 달라짐을 말할 수 있다.","과정·기능":"파동 용수철을 이용하여 종파와 횡파를 구현하고 탄성파가 활용되는 예를 찾으며, 스마트폰을 활용한 도플러 효과 측정 실험을 수행하고 음파의 간섭이 실생활에 사용되는 사례를 조사할 수 있으며, 안내된 절차에 따라 정상파를 이용하여 음파 의 진행 속력을 측정할 수 있다.","가치·태도":"탄성파가 활용되는 예를 찾는 과정과 스마트폰을 활용한 도플러 효과 측정 실험을 수행하는 과정에서 과학의 유용성에 흥미를 가진다. 음파의 간섭이 음향 장치와 실내외 공간에서의 소음 제어에 적용됨을 아는 과정과 정상파를 이용하여 악기에서 소리를 발생함을 아는 과정에서 과학이 음악에 미치 는 영향에 흥미를 가진다."},"D":{"지식·이해":"용수철 진자의 운동이 단진동임을 알고, 단진동에서 변위, 속도, 가속도가 주기적 으로 변한다는 것을 말하며 탄성파의 진행을 파장, 진동수, 진행 속력으로 말하고 매질 경계면에서 투과와 반사 현상이 일어남을 알 수 있다. 도플러 효과의 의미를 알고, 음파의 간섭이 음향 장치나 실내외 공간에서의 소음 제어에 활용됨을 말할 수 있고, 정상파를 이용하여 현악기와 관악기에서 소리가 발생함을 알며 현과 관의 길이에 따라 정상파의 파장이 달라짐을 말할 수 있다.","과정·기능":"파동 용수철을 이용하여 종파와 횡파를 구현하고 안내된 절차에 따라 도플러 효과 측정 실험을 수행하며, 음파의 간섭이 실생활에 사용되는 사례를 찾을 수 있다.","가치·태도":"도플러 효과 측정 실험에서 과학의 유용성을 느끼고, 음파의 간섭이 음향 장치나 실내외 공간에서의 소음 제어에 활용됨을 말하는 과정에서 과학의 유용성에 관심 을 가진다. 정상파를 이용하여 악기에서 소리를 발생함을 아는 과정에서 과학이 음악에 미치 는 영향에 흥미를 가진다."},"E":{"지식·이해":"용수철 진자의 운동이 단진동이고 탄성파가 진행할 때 매질 경계면에서 투과와 반사 현상이 일어남을 말할 수 있다. 음원이나 관측자가 운동할 때 도플러 효과가 일어나고 둘 이상의 파원에서 만들어 지는 파동은 중첩될 수 있으며 악기에서 소리를 내는 원리가 정상파와 관련 있음 을 말할 수 있다.","과정·기능":"파동 용수철을 이용하여 종파와 횡파를 구현할 수 있다.","가치·태도":"음원이나 관측자가 운동할 때 도플러 효과가 일어남과 파동의 중첩을 말하는 과정 에서 과학의 유용성에 관심을 가지며 악기와 정상파와 관련 있음을 말하는 과정에 서 과학과 음악에 관심을 가진다."}}},"전자-01":{"codes":{"12전자01-01":{"A":"전하 주위의 전기장을 정량적으로 구하고, 제시된 전기력선과 등전위면 그림 을 해석하여 전기장의 세기와 방향을 추리하며, 전기장을 통해 전하들 사이의 전기적 상호작용이 이루어짐을 알고 과학 지식의 경이로움을 인식한다.","B":"전하 주위의 전기장을 정량적으로 구하고, 제시된 전기력선 그림을 해석하여 전기장의 세기와 방향을 파악하며, 전기적 상호작용의 경이로움을 인식한다.","C":"전하 주위의 전기장을 정성적으로 설명하고, 제시된 전기력선 그림에서 전기 장의 방향을 찾으며, 전기장에 흥미와 호기심을 가진다.","D":"전하 주위의 전기장의 세기가 전하량과 거리에 따라 다름을 알고 전기장의 방향을 찾을 수 있으며, 전기장에 흥미와 호기심을 가진다.","E":"전하 주위의 전기장의 방향을 찾을 수 있으며, 전기장에 관심을 가진다."},"12전자01-02":{"A":"정전기 유도와 유전분극을 각각 설명하고, 일상생활과 다양한 산업 영역에서 이 원리들이 적용되는 예를 찾으며, 과학 지식이 일상생활의 문제해결에 유용 하게 활용됨을 인식한다.","B":"정전기 유도와 유전분극을 비교하고, 일상생활에서 적용되는 예를 찾는 과정 에서 과학 지식의 유용성을 인식한다.","C":"제시된 사례에서 정전기 유도와 유전분극을 구별할 수 있으며, 과학 지식에 흥미와 호기심을 가진다.","D":"정전기 유도와 유전분극이 일어날 때 물체가 부분적으로 전하를 띰을 말할 수 있으며, 과학 지식에 흥미와 호기심을 가진다.","E":"정전기 유도가 일어날 때 물체가 부분적으로 전하를 띰을 말할 수 있다."},"12전자01-03":{"A":"자기력선 그림을 해석하여 전류가 흐르는 도선 주위의 자기장의 세기와 방향 을 예상하며, 자기장을 통해 자기적 상호작용이 이루어짐을 알고 과학 지식의 경이로움을 인식한다.","B":"자기력선 그림에서 전류가 흐르는 도선 주위의 자기장의 세기와 방향을 찾고, 자기적 상호작용의 경이로움을 인식한다.","C":"전류가 흐르는 직선 도선 주위의 자기장의 세기와 방향을 찾고, 도선 주위의 자기장에 흥미와 호기심을 가진다.","D":"전류가 흐르는 직선 도선 주위의 자기장의 방향을 찾고, 자기장에 흥미와 호기 심을 가진다.","E":"전류가 흐르는 직선 도선 주위에 생기는 자기장의 대략적인 모양을 제시된 그림 중에서 고를 수 있으며, 자기장에 관심을 가진다."},"12전자01-04":{"A":"로런츠 힘이 발생하는 조건을 이해하고 로런츠 힘의 크기와 방향을 구하며, 도 선이 받는 힘, 입자 가속기, 토카막, 밴앨런대 등 로런츠 힘과 관련된 다양한 현상과 기술을 조사하여 설명하고, 이 과정에서 과학기술의 유용성을 인식한다.","B":"로런츠 힘이 발생하는 조건을 말하고, 도선이 받는 힘, 입자 가속기, 토카막, 밴앨런대 등을 로런츠 힘과 관련지어 말하며, 이를 이용한 과학기술의 유용성 을 인식한다.","C":"로런츠 힘이 발생하는 조건 및 로런츠 힘과 관련된 현상과 기술의 예를 말하 고, 로런츠 힘에 흥미와 호기심을 가진다.","D":"자기장에서 운동하는 전하는 로런츠 힘을 받으며, 로런츠 힘이 일상생활에 활용되고 있음을 이에 흥미와 호기심을 가진다.","E":"자기장에서 운동하는 전하는 로런츠 힘을 받음을 말할 수 있다."},"12전자01-05":{"A":"자기선속의 변화로 전자기 유도를 설명하고, 도체판과 자석을 이용하여 자기 브레이크의 원리를 전자기 유도로 분석하며, 변압기, 인덕터 등의 원리를 전자 기 유도로 설명할 수 있다.","B":"자기선속이 변할 때 전자기 유도가 발생함을 알고 도체판과 자석을 이용하여 자기 브레이크에서 전자기 유도가 일어남을 설명하며, 변압기, 인덕터 등이 전자기 유도를 활용한 기술임을 말할 수 있다.","C":"자기선속이 변할 때 전자기 유도가 일어남을 알고, 자기 브레이크, 변압기, 인덕터 등이 전자기 유도를 활용한 기술임을 말할 수 있다.","D":"자기선속이 변할 때 전자기 유도가 일어남을 말할 수 있다.","E":"자기장이 변할 때 자기선속이 변함을 말할 수 있다."},"12전자01-06":{"A":"저항, 축전기, 인덕터를 활용하는 다양한 장치들을 찾아 작동 과정과 원리를 에너지 저장과 전환 관점에서 정성적으로 설명하고, 이들 장치가 일상생활에 서 활용되는 방법을 찾으며 그 유용성을 인식한다.","B":"저항, 축전기, 인덕터를 활용하는 장치의 작동 원리를 에너지 관점에서 이해하 고, 일상생활에서 이들 장치의 유용성을 인식한다.","C":"일상생활에서 저항, 축전기, 인덕터를 활용하는 장치를 찾고, 이런 장치에 흥 미 와 호기심을 가 진 다.","D":"저항, 축전기, 인덕터에서 일어나는 에너지 전환을 말할 수 있으며, 이런 장치 에 흥미와 호기심을 가진다.","E":"제시된 장치들이 저항, 축전기, 인덕터를 활용함을 말할 수 있다."},"12전자01-07":{"A":"다이오드, 트랜지스터 등 반도체 소자를 활용하는 정류, 증폭, 기초 논리회로 등의 전자회로를 분석하고, 트랜지스터를 이용하여 스피커 소리를 증폭하는 탐구를 수행하며, 반도체 소자를 활용한 장치와 회로들의 작동 원리와 일상생 활에서 활용방안을 파악하고, 이를 통해 현대 문명에서 반도체의 중요성과 가치를 인식한다.","B":"다이오드, 트랜지스터 등 반도체 소자를 활용하는 정류, 증폭, 기초 논리회로 등의 전자회로의 작동 원리를 설명하고, 트랜지스터를 이용하여 스피커 소리 를 증폭하는 탐구를 수행하며, 현대 문명에서 반도체의 중요성을 인식한다.","C":"반도체 소자를 활용하는 장치와 회로를 찾아 일상생활에서 어떻게 활용되는지 설명하고, 트랜지스터를 이용하여 스피커 소리를 증폭할 수 있음을 말하며, 반도체의 활용에 흥미와 호기심을 가진다.","D":"반도체 소자를 활용하는 장치와 회로를 찾고 반도체의 활용에 흥미와 호기심 을 가진다.","E":"다양한 전자회로에 쓰이는 반도체에 관심을 가진다."}},"area":{"A":{"지식·이해":"전하 주위의 전기장을 정량적으로 구하고, 정전기 유도와 유전분극을 각각 설명하 며, 전류가 흐르는 도선 주위의 자기장의 세기와 방향을 설명하고 이를 통해 자기 장이 자기적 상호작용의 매개물이라는 것을 인식할 수 있다. 로런츠 힘이 발생하는 조건을 이해하고, 로런츠 힘의 크기와 방향을 구하며, 전자 기 유도 및 변압기, 인덕터 등의 원리를 전자기 유도로 설명할 수 있다. 저항, 축전기, 인덕터를 활용하는 다양한 장치들의 작동 과정과 원리를 에너지의 저장과 전환 관점에서 정성적으로 설명하고, 반도체 소자를 활용한 장치와 회로들 의 작동 원리와 일상생활에서 활용 방안을 파악할 수 있다.","과정·기능":"제시된 전기력선과 등전위면 그림을 해석하여 전기장의 세기와 방향을 추리하고, 일상생 활과 다양한 산업 영역에서 정전기 유도와 유전분극이 적용되는 예를 찾으며, 자기력선 그림을 해석하여 전류가 흐르는 도선 주위의 자기장의 세기와 방향을 추리할 수 있다. 도선이 받는 힘, 입자 가속기, 토카막, 밴앨런대 등 로런츠 힘과 관련된 현상과 기술을 조사하여 설명하고, 도체판과 자석을 이용하여 자기 브레이크의 원리를 전자기 유도로 분석할 수 있다. 저항, 축전기, 인덕터가 일상생활에서 활용되는 방법을 찾고, 다이오드, 트랜지스터 등 반도체 소자를 활용하는 정류, 증폭, 기초 논리회로 등의 전자회로를 분석하고, 트랜 지스터를 이용하여 스피커 소리를 증폭하는 탐구를 수행하고 결과를 분석할 수 있다.","가치·태도":"전기장과 자기장을 통해 전자기적 상호작용이 이루어짐을 알고, 정전기 유도와 유전분극 등의 과학 지식의 경이로움을 인식한다. 로런츠 힘과 관련된 현상과 기술을 조사하는 과정에서 과학 지식의 유용성을 인식 하며, 저항, 축전기, 인덕터의 유용성을 인식하며, 현대 문명에서 반도체의 중요성 을 인식한다."},"B":{"지식·이해":"전하 주위의 전기장을 정량적으로 구하고, 로런츠 힘이 발생하는 조건을 말하며, 도선이 받는 힘, 입자 가속기, 토카막, 밴앨런대 등을 로런츠 힘과 관련지어 이해 하며, 자기선속이 변할 때 전자기 유도가 일어남을 이해하고, 도체판과 자석을 이용하여 자기 브레이크에서 전자기 유도가 일어남을 설명할 수 있다. 변압기, 인덕터 등이 전자기 유도를 활용한 기술임을 말하고, 저항, 축전기, 인덕 터를 활용하는 장치의 작동 원리를 에너지 관점에서 이해하며, 다이오드, 트랜지 스터 등 반도체 소자를 활용하는 정류, 증폭, 기초 논리회로 등의 전자회로의 작동 원리를 설명할 수 있다.","과정·기능":"제시된 전기력선 그림을 해석하여 전기장의 세기와 방향을 파악하고, 정전기 유도 와 유전분극을 비교하고 일상생활에서 적용되는 예를 찾으며, 자기력선 그림에서 전류가 흐르는 도선 주위의 자기장의 세기와 방향을 찾을 수 있다. 도체판과 자석을 이용하여 자기 브레이크의 원리를 탐색하고, 트랜지스터를 이용 하여 스피커 소리를 증폭하는 탐구를 수행할 수 있다.","가치·태도":"전기적 상호작용과 자기적 상호작용에 경이로움을 인식하고, 로런츠 힘을 이용한 과학기술의 유용성을 인식하며, 저항, 축전기, 인덕터를 활용하는 장치의 유용성 을 인식하고 현대 문명에서 반도체의 중요성을 인식한다."},"C":{"지식·이해":"전하 주위의 전기장을 정성적으로 설명하고, 전류가 흐르는 직선 도선 주위의 자기장의 세기와 방향을 찾으며, 로런츠 힘이 발생하는 조건을 말할 수 있다. 자기선속이 변할 때 전자기 유도가 일어남을 알고, 자기 브레이크, 변압기, 인덕터 등이 전자기 유도를 활용한 기술임을 말하며, 반도체 소자를 활용하는 장치와 회로를 찾아 일상생활에서 어떻게 활용되는지 설명할 수 있다.","과정·기능":"제시된 전기력선 그림을 해석하여 전기장의 방향을 찾고, 제시된 사례에서 정전기 유도와 유전분극을 구별하며, 로런츠 힘과 관련된 현상과 기술의 예를 들며, 일상 생활에서 저항, 축전기, 인덕터를 활용하는 장치를 찾고, 트랜지스터를 이용하여 스피커 소리를 증폭할 수 있음을 말할 수 있다.","가치·태도":"전하 사이의 힘 및 도선 주위의 자기장과 로런츠 힘에 흥미와 호기심을 가지고, 일상생활에서 저항, 축전기, 인덕터를 활용한 장치에 흥미를 가지며, 반도체의 활용에 흥미와 호기심을 가진다."},"D":{"지식·이해":"전하 주위의 전기장의 세기가 전하량과 거리에 따라 다름을 알고 전기장의 방향을 찾고, 정전기 유도와 유전분극이 일어날 때 물체가 부분적으로 전하를 띰을 말하 며, 자기장에서 운동하는 전하는 로런츠 힘을 받음을 말할 수 있다. 자기선속이 변할 때 전자기 유도가 일어남을 말하고, 저항, 축전기, 인덕터에서 에너지 전환이 일어남을 말할 수 있다.","과정·기능":"전하 주위의 전기장의 방향과 전류가 흐르는 직선 도선 주위의 자기장의 방향을 찾고, 반도체 소자를 활용하는 장치와 회로를 찾을 수 있다.","가치·태도":"일상생활에서 로런츠 힘과 반도체가 활용되는 것에 흥미와 호기심을 가진다."},"E":{"지식·이해":"정전기 유도와 유전분극이 일어날 때 물체가 부분적으로 전하를 띰을 말하고, 자기장에서 운동하는 전하는 로런츠 힘을 받음을 말할 수 있다. 자기선속이 변할 때 전자기 유도가 일어남을 말하고, 제시된 장치들이 저항, 축전 기, 인덕터를 활용함을 말할 수 있다.","과정·기능":"전하 주위의 전기장의 방향을 찾고, 전류가 흐르는 직선 도선 주위에 생기는 자기 장의 대략적인 모양을 제시된 그림 중에서 고를 수 있다.","가치·태도":"다양한 전자회로에 쓰이는 반도체에 관심을 가진다."}}},"전자-02":{"codes":{"12전자02-01":{"A":"반사에 의한 위상변화를 포함하여 빛의 간섭을 이해하고 세워진 비누막에 의 한 빛의 간섭 양상을 관찰하고 설명하며, 회절과 분해능의 개념을 정성적으로 설명하고 홀로그램을 비롯한 다양한 현대 정밀 기술에서 빛의 간섭과 회절이 활용되는 예를 찾으며 과학의 심미적 가치를 인식한다.","B":"빛의 간섭과 회절을 알고 세워진 비누막에 의한 빛의 간섭 양상을 관찰하여 표현하며, 회절과 분해능의 개념을 알고 홀로그램 등 현대 정밀 기술에서 빛의 간섭과 회절이 활용되는 예를 찾으며 과학의 심미적 가치를 인식한다.","C":"빛의 간섭을 알고 세워진 비누막에 의한 빛의 간섭 양상을 관찰하며, 홀로그램 이 빛의 간섭과 회절을 이용한 기술임을 알고 현대 정밀 기술의 예를 찾으며 과학의 심미적 가치에 흥미와 호기심을 가진다.","D":"세워진 비누막에 의한 빛의 간섭 양상을 관찰하고 홀로그램이 빛의 성질을 이용한 기술임을 알며 과학의 심미적 가치에 흥미와 호기심을 가진다.","E":"세워진 비누막에 나타나는 무늬가 빛의 간섭에 의한 현상임을 말할 수 있다."},"12전자02-02":{"A":"렌즈와 거울에서 물체의 위치에 따른 상의 변화를 정량적으로 설명하고 렌즈, 거울, 프리즘 등이 광학 기기에서 활용되는 원리와 수차를 정성적으로 설명하 며 과학의 유용성을 인식한다.","B":"렌즈와 거울에서 물체의 위치에 따른 상의 변화를 정량적으로 설명하고 렌즈, 거울, 프리즘 등이 광학 기기에서 사용됨을 말하며 과학의 유용성을 인식한다.","C":"렌즈와 거울에서 물체의 위치에 따른 상의 변화를 정성적으로 설명하고 렌즈, 거울, 프리즘 등이 광학 기기에서 사용됨을 말하고 과학의 유용성에 흥미와 호기심을 가진다.","D":"렌즈와 거울에서 각각 빛이 굴절, 반사되어 상이 만들어짐을 말하고 과학의 유용성에 흥미와 호기심을 가진다.","E":"렌즈와 거울이 광학 기기에서 활용되는 데 관심을 가진다."},"12전자02-03":{"A":"편광의 원리를 이해하고 편광판을 지나는 빛의 투과량 변화를 정성적으로 설 명하며, 센서와 편광판을 이용하여 다양한 디스플레이에서 나오는 빛의 편광 상태를 조사하고 편광을 활용한 다양한 디지털 정보 기술의 사례를 조사하는 과정에서 과학의 유용성을 인식한다.","B":"편광의 원리를 알고 센서와 편광판을 이용하여 다양한 디스플레이에서 나오는 빛의 편광 상태를 조사하며 편광을 활용한 디지털 정보 기술의 사례를 조사하 는 과정에서 과학의 유용성을 인식한다.","C":"센서와 편광판을 이용하여 디스플레이에서 나오는 빛의 편광 상태를 확인하며 편광을 활용한 디지털 정보 기술의 사례를 말하고 과학의 유용성에 흥미와 호기심을 가진다.","D":"센서와 편광판을 이용하여 디스플레이에서 나오는 빛의 편광 상태를 확인하고 과학의 유용성에 흥미와 호기심을 가진다.","E":"편광이 빛의 특성 중 하나임을 말할 수 있다."},"12전자02-04":{"A":"광전효과에서 빛과 물질의 상호작용은 흡수와 방출임을 이해하고 디지털 영상 정보, 광센서, 태양전지 등 광전효과와 관련된 다양한 기술 사례를 조사하여 현대사회에서의 광전효과의 유용성과 과학의 창의성을 인식한다.","B":"광전효과가 빛과 물질의 상호작용임을 알고 디지털 영상 정보, 광센서, 태양전 지 등 광전효과와 관련된 다양한 기술이 현대사회에서 이용되는 사례를 조사 하여 과학의 유용성을 인식한다.","C":"광전효과가 빛과 물질의 상호작용과 관련 있다는 것을 말하고 디지털 영상 정보, 광센서, 태양전지 등 광전효과가 활용되는 다양한 기술 사례를 찾는 과 정에서 과학의 유용성에 흥미와 호기심을 가진다.","D":"디지털 영상 정보, 광센서, 태양전지 등 다양한 기술에 광전효과가 활용됨을 말하고 과학의 유용성에 관심을 가진다.","E":"광전효과의 의미를 말할 수 있다."},"12전자02-05":{"A":"레이저의 특징과 레이저에서 빛이 증폭되는 원리를 빛의 흡수와 방출 과정으 로 설명하고, 디지털 광통신 등 여러 영역에서 레이저가 활용되는 사례를 조사 하여 현대사회에서 레이저의 중요성을 인식한다.","B":"레이저의 특징을 이해하고 디지털 광통신 등 여러 영역에서 레이저가 활용되 는 사례를 찾는 과정에서 현대사회에서 레이저의 중요성을 인식한다.","C":"레이저의 특징을 말하고 디지털 광통신에 레이저가 중요하게 활용됨을 말하 며, 레이저의 활용에 흥미와 호기심을 가진다.","D":"레이저가 빛의 증폭을 이용한 기술임을 말하고, 레이저의 활용에 흥미를 가 진다.","E":"디지털 광통신에서 레이저가 중요하게 활용됨을 말할 수 있다."}},"area":{"A":{"지식·이해":"반사에 의한 위상변화를 포함하여 빛의 간섭을 이해하고 세워진 비누막에 의한 빛의 간섭 양상을 설명하며, 회절과 분해능의 개념을 정성적으로 설명하고 렌 즈와 거울에서 물체의 위치에 따른 상의 변화를 정량적으로 설명하며 렌즈, 거울, 프리즘 등이 광학 기기에서 활용되는 원리와 수차를 정성적으로 설명할 수 있다. 편광의 원리를 이해하고 편광판을 지나는 빛의 투과량 변화를 정성적으로 설명하 고, 광전효과에서 빛과 물질의 상호작용은 흡수와 방출임을 이해하며 레이저의 특징과 레이저에서 빛이 증폭되는 원리를 빛의 흡수와 방출 과정으로 설명할 수 있다.","과정·기능":"세워진 비누막에 의한 빛의 간섭 양상을 관찰하고 홀로그램을 비롯한 다양한 현대 정밀 기술에서 빛의 간섭과 회절이 활용되는 예를 찾을 수 있다. 센서와 편광판을 이용하여 다양한 디스플레이에서 나오는 빛의 편광 상태와 편광 을 활용한 다양한 디지털 정보 기술의 사례 그리고 디지털 영상 정보, 광센서, 태양전지 등 광전효과와 관련된 다양한 기술 사례를 조사하며 디지털 광통신 등 여러 영역에서 레이저가 활용되는 사례를 조사할 수 있다.","가치·태도":"홀로그램을 비롯한 다양한 현대 정밀 기술에서 빛의 간섭과 회절이 활용되는 예를 찾는 과정에서 과학의 심미적 가치를 인식하고, 렌즈, 거울, 프리즘 등이 광학 기기에서의 활용되는 원리를 이해하는 과정에서 과학의 유용성을 인식한다. 편광이 다양한 디스플레이와 디지털 정보 기술에 활용되는 것을 이해하는 과정에 서 과학의 유용성을 인식하고 현대사회에서 광전효과와 레이저의 유용성 및 중요 성을 인식한다."},"B":{"지식·이해":"빛의 간섭과 회절을 알고 세워진 비누막에 의한 빛의 간섭 양상을 표현하며, 회절 과 분해능의 개념을 알 수 있다. 렌즈와 거울에서 물체의 위치에 따른 상의 변화를 정량적으로 설명하고, 렌즈, 거울, 프리즘 등이 광학 기기에서 사용됨을 말할 수 있다. 편광의 원리를 알고 광전효과가 빛과 물질의 상호작용임을 알며 레이저의 특징을 이해할 수 있다.","과정·기능":"세워진 비누막에 의한 빛의 간섭 양상을 관찰하고 홀로그램 등 현대 정밀 기술에 서 빛의 간섭과 회절이 활용되는 예를 찾을 수 있다. 센서와 편광판을 이용하여 다양한 디스플레이에서 나오는 빛의 편광 상태와 편광 을 활용한 디지털 정보 기술의 사례 그리고 디지털 영상 정보, 광센서, 태양전지 등 광전효과와 관련된 다양한 기술이 현대사회에서 이용되는 사례를 조사하며 디지털 광통신 등 여러 영역에서 레이저가 활용되는 사례를 찾을 수 있다.","가치·태도":"홀로그램 등 현대 정밀 기술에서 빛의 간섭과 회절이 활용되는 예를 찾는 과정에 서 과학의 심미적 가치를 인식하고 렌즈, 거울, 프리즘 등이 광학 기기에서 사용되 는 원리를 아는 과정에서 과학의 유용성을 인식한다. 편광이 다양한 디스플레이와 디지털 정보 기술에 활용되는 사례 및 광전효과와 관련된 다양한 기술이 현대사회에서 이용되는 사례를 조사하는 과정에서 과학의 유용성을 인식하고 현대사회에서 레이저의 중요성을 인식한다."},"C":{"지식·이해":"빛의 간섭을 알고 홀로그램이 빛의 간섭과 회절을 이용한 기술임을 알며 렌즈와 거울에서 물체의 위치에 따른 상의 변화를 정성적으로 설명하고 렌즈, 거울, 프리 즘 등이 광학 기기에서 사용됨을 말하며 광전효과가 빛과 물질의 상호작용과 관련 있다는 것을 말하고 레이저의 특징을 말할 수 있다.","과정·기능":"세워진 비누막에 의한 빛의 간섭 양상을 관찰하며, 홀로그램 등 현대 정밀 기술의 예를 찾을 수 있다. 센서와 편광판을 이용하여 디스플레이에서 나오는 빛의 편광 상태를 확인하며 편광을 활용한 디지털 정보 기술의 사례와 디지털 영상 정보, 광센서, 태양전지 등 광전효과가 활용되는 다양한 기술 사례를 찾을 수 있다.","가치·태도":"홀로그램 등 현대 정밀 기술의 예를 찾는 과정에서 과학의 심미적 가치에 흥미와 호기심을 갖고 렌즈, 거울, 프리즘 등이 광학 기기에서 사용됨을 말하는 과정에서 과학의 유용성에 흥미를 가진다. 편광의 이용 사례와 광전효과가 활용되는 다양한 기술 사례를 찾는 과정에서 과학 의 유용성에 관심을 가지며 디지털 광통신에 레이저가 중요하게 활용됨을 인식하 고 과학의 유용성에 흥미와 호기심을 가진다."},"D":{"지식·이해":"홀로그램이 빛의 성질을 이용한 기술임을 알고 빛이 렌즈와 거울에서 각각 굴절, 반사되어 상이 만들어짐을 말하며, 디지털 영상 정보, 광센서, 태양전지 등 다양한 기술에 광전효과가 활용됨과 레이저가 빛의 증폭을 이용한 기술임을 말할 수 있다.","과정·기능":"센서와 편광판을 이용하여 다양한 디스플레이에서 나오는 빛의 편광 상태를 확인 하고, 세워진 비누막에 의한 빛의 간섭 양상을 관찰할 수 있다.","가치·태도":"홀로그램이 빛의 성질을 이용한 기술임을 아는 과정에서 과학의 심미적 가치와 렌즈와 거울에서 각각 빛이 굴절, 반사되어 상이 만들어짐을 말하는 과정에서 과학의 유용성에 관심을 가진다. 다양한 디스플레이에서 나오는 빛의 편광 상태를 확인하는 과정과 다양한 기술에 광전효과가 활용됨을 말하는 과정에서 과학의 유용성에 관심을 가지며 레이저가 빛의 증폭을 이용한 기술임을 말하는 과정에서 과학의 유용성에 관심을 가진다."},"E":{"지식·이해":"편광이 빛의 특성 중 하나임을 말하고 광전효과의 의미와 디지털 광통신에서 레이 저가 중요하게 활용됨을 말할 수 있다.","과정·기능":"세워진 비누막에 나타나는 무늬가 빛의 간섭에 의한 현상임을 말할 수 있다.","가치·태도":"렌즈와 거울이 광학 기기에서 활용되는 데 관심을 가진다."}}},"전자-03":{"codes":{"12전자03-01":{"A":"컴퓨터 모의실험으로 단일 양자 수준의 이중 슬릿 실험을 수행하여 입자-파동 이중성을 확인하고, 단일 양자의 분포에 대한 실험 결과를 확률 파동의 간섭을 토대로 해석하며, 드브로이 관계식을 바탕으로 단일 양자 수준의 이중 슬릿 실험에서 나타나는 입자-파동 이중성의 기묘함을 인식하고 양자 현상과 양자 물리의 경이로움을 인식한다.","B":"컴퓨터 모의실험으로 단일 양자 수준의 이중 슬릿 실험 결과를 관찰하여 입자 -파동 이중성을 확인하고, 단일 양자의 분포에 대한 실험 결과를 확률 파동의 간섭을 토대로 해석하며, 단일 양자 수준의 이중 슬릿 실험에서 나타나는 입자 -파동 이중성의 기묘함을 인식하고 양자 현상의 경이로움을 인식한다.","C":"단일 양자 수준의 이중 슬릿 실험에 관한 컴퓨터 모의실험에서 입자-파동 이중성을 관찰하고, 실험 결과를 확률 파동의 간섭을 토대로 해석할 수 있음을 이해하고, 단일 양자 수준의 이중 슬릿 실험에서 나타나는 입자-파동 이중성 의 기묘함에 흥미와 호기심을 가진다.","D":"단일 양자 수준의 이중 슬릿 실험 결과를 바탕으로 입자가 파동성을 가짐을 진술하고, 그 기묘함에 흥미와 호기심을 가진다.","E":"입자가 파동성을 갖는다는 것에 관심을 가진다."},"12전자03-02":{"A":"중첩된 상태에서 측정이 이루어질 때 확률적 상태 변화가 일어남을 이해하고, 양자컴퓨터, 양자암호통신과 같은 양자 기술과의 관련성에 대해 정성적으로 설명하며, 양자 기술이 일상생활과 미래 사회에 미칠 영향을 양자컴퓨터, 양자 암호통신과 관련지어 구체적으로 인식한다.","B":"중첩된 상태에서 측정이 이루어질 때 확률적 상태 변화가 일어남을 알고, 이와 관련된 양자 기술로 양자컴퓨터, 양자암호통신 중 1가지 이상을 제시하며, 양자 기술이 일상생활과 미래 사회에 미칠 영향을 인식한다.","C":"중첩된 상태에서 측정이 이루어질 때 확률적 상태 변화가 일어남을 알고, 이를 활용한 양자 기술이 일상생활과 미래 사회에 미칠 영향에 흥미와 호기심을 가진다.","D":"중첩이란 용어를 알고 양자 기술이 일상생활과 미래 사회에 영향을 미칠 수 있음에 흥미와 호기심을 가진다.","E":"양자 기술이 미래 사회에 영향을 미칠 수 있음에 관심을 가진다."},"12전자03-03":{"A":"터널 효과를 확률적 현상으로 설명하고, 주사 터널링 현미경 등 터널 효과와 관련된 현상과 기술을 조사하여 해당 사례가 확률적 현상임을 과학적 언어를 사용하여 설명하고 발표하며, 양자물리의 기묘함을 인식한다.","B":"터널 효과를 확률적 현상으로 이해하고, 주사 터널링 현미경 등 터널 효과와 관련된 현상과 기술을 찾으며 양자물리의 기묘함을 인식한다.","C":"터널 효과를 알고, 이와 관련된 현상과 기술을 찾으며 양자물리에 흥미와 호기 심을 가진다.","D":"터널 효과가 나타나는 여러 현상과 기술에 흥미와 호기심을 가진다.","E":"터널 효과와 같은 양자적 현상에 관심을 가진다."},"12전자03-04":{"A":"현대의 원자모형을 불확정성 원리와 확률을 기반으로 설명하고 보어의 원자모 형과의 차이점과 공통점을 비교하며, 스펙트럼 관찰 실험을 통해 에너지 준위 를 확인하고, 이를 원자모형과 연관 지어 해석할 수 있다.","B":"현대의 원자모형을 불확정성 원리와 확률을 기반으로 이해하고 보어의 원자모 형과의 차이점을 설명하며, 스펙트럼 관찰 실험을 통해 에너지 준위를 확인할 수 있다.","C":"현대의 원자모형이 보어의 원자모형과 달리 불확정성 원리와 확률을 기반으로 하고 있으며 보어의 원자모형이 불확정성 원리를 만족시킬 수 없음을 말할 수 있다.","D":"현대의 원자모형을 불확정성 원리와 확률을 이용해 말로 표현할 수 있다.","E":"현대의 원자모형이 불확정성 원리에 기반함을 말할 수 있다."},"12전자03-05":{"A":"별에서 핵융합에 의해 에너지가 생성되고 빛이 방출되는 원리를 설명하고, 별빛의 스펙트럼에 기반하여 별의 구성 원소를 추리하며, 이 과정에서 탐구를 통해 궁금증을 해소하려는 태도를 가진다.","B":"별에서 에너지 생성 및 빛의 방출이 핵융합과 관련됨을 이해하고, 별빛의 스펙 트럼을 이용해 별의 구성 원소를 찾으며, 이 과정에서 탐구를 통해 궁금증을 해소하려는 태도를 가진다.","C":"별에서 에너지가 생성되어 빛이 방출됨을 알고, 별빛의 스펙트럼을 이용해 별의 구성 원소를 찾으며, 이 과정에서 자연현상에 흥미와 호기심을 가진다.","D":"별빛의 스펙트럼을 이용하여 별의 구성 원소를 찾으며, 이 과정에서 자연현상 에 흥미를 가진다.","E":"별빛의 스펙트럼이 다름을 통해 별의 구성 원소가 다름을 말할 수 있다."}},"area":{"A":{"지식·이해":"드브로이 관계식을 바탕으로 단일 양자 수준의 이중 슬릿 실험에서 나타나는 입자 -파동 이중성을 설명하고, 중첩된 상태에서 측정이 이루어질 때 확률적 상태 변화 가 일어남을 이해하며, 양자컴퓨터, 양자암호통신과 같은 양자 기술과의 관련성에 대해 정성적으로 설명할 수 있다. 터널 효과를 확률적 현상으로 설명하고, 터널 효과와 관련된 현상과 기술이 확률 적 현상임을 과학적 언어를 사용하여 설명할 수 있다. 현대의 원자모형을 불확정성 원리와 확률을 기반으로 설명하고 보어의 원자모형 과의 차이점과 공통점을 비교하며, 별에서 핵융합에 의해 에너지가 생성되고 빛이 방출되는 원리를 설명할 수 있다.","과정·기능":"컴퓨터 모의실험으로 단일 양자 수준의 이중 슬릿 실험을 수행하여 입자-파동 이중성을 확인하고, 단일 양자의 분포에 대한 실험 결과를 확률 파동의 간섭을 토대로 해석하며, 주사 터널링 현미경 등 터널 효과와 관련된 현상과 기술을 조사 하여 과학적 언어를 사용하여 설명하고 발표할 수 있다. 스펙트럼 관찰 실험을 통해 에너지 준위를 확인하고, 이를 원자모형과 연관 지어 해석하며, 별빛의 스펙트럼에 기반하여 별의 구성 원소를 추리할 수 있다.","가치·태도":"양자 기술이 일상생활과 미래 사회에 미칠 영향을 양자컴퓨터, 양자암호통신과 관련지어 구체적으로 인식하며, 양자-파동 이중성 등 양자 현상과 이를 설명하는 양자물리의 경이로움을 인식한다. 별의 구성 원소를 추리하는 과정에서 탐구를 통해 궁금증을 해소하려는 태도를 가진다."},"B":{"지식·이해":"단일 양자 수준의 이중 슬릿 실험을 이해하고, 중첩된 상태에서 측정이 이루어질 때 확률적 상태 변화가 일어남을 이해하고, 이와 관련된 양자 기술로 양자컴퓨터, 양자암호통신 중 1가지 이상을 제시할 수 있다. 터널 효과를 확률적 현상으로 이해하며, 현대의 원자모형을 불확정성 원리와 확률 을 기반으로 설명하고 보어의 원자모형과의 차이점과 공통점을 비교할 수 있다. 별에서 에너지 생성 및 빛의 방출이 핵융합과 관련됨을 이해할 수 있다.","과정·기능":"컴퓨터 모의실험으로 단일 양자 수준의 이중 슬릿 실험 결과를 관찰하여 입자-파 동 이중성을 확인하고, 단일 양자의 분포에 대한 실험 결과를 확률 파동의 간섭을 토대로 해석하며, 주사 터널링 현미경 등 터널 효과와 관련된 현상과 기술을 찾을 수 있다. 스펙트럼 관찰 실험을 통해 에너지 준위를 확인할 수 있고, 별빛의 스펙트럼을 이용해 별의 구성 원소를 찾을 수 있다.","가치·태도":"양자 기술이 일상생활과 미래 사회에 미칠 영향을 인식하고, 입자-파동 이중성 등 양자 현상의 경이로움을 인식한다. 별의 구성 원소를 찾는 과정에서 탐구를 통해 궁금증을 해소하려는 태도를 가 진다."},"C":{"지식·이해":"단일 양자 수준의 이중 슬릿 실험에서 나타나는 입자-파동 이중성을 말하고, 중첩 된 상태에서 측정이 이루어질 때 확률적 상태 변화가 일어남을 말할 수 있다. 터널 효과를 알고, 현대의 원자모형이 보어의 원자모형과 달리 불확정성 원리와 확률을 기반으로 하고 있으며 보어의 원자모형이 불확정성 원리를 만족시킬 수 없음을 말할 수 있다. 별에서 에너지가 생성되어 빛이 방출됨을 말할 수 있다.","과정·기능":"단일 양자 수준의 이중 슬릿 실험에 관한 컴퓨터 모의실험에서 입자-파동 이중성 을 관찰하고, 실험 결과를 확률 파동의 간섭을 토대로 해석할 수 있음을 이해하며, 터널 효과와 관련된 현상과 기술을 찾고, 별빛의 스펙트럼을 이용해 별의 구성 원소를 찾을 수 있다.","가치·태도":"입자-파동 이중성의 기묘함에 흥미를 가지고, 양자 기술이 일상생활과 미래 사회 에 미칠 영향을 인식하며, 양자물리에 흥미와 호기심을 가진다."},"D":{"지식·이해":"입자가 파동성을 가짐을 말하고, 중첩과 터널 효과라는 용어를 알며, 현대의 원자 모형을 불확정성 원리와 확률을 이용해 말로 표현할 수 있다.","과정·기능":"단일 양자 수준의 이중 슬릿 실험 결과를 바탕으로 입자가 파동성을 가짐을 관찰 하고, 별빛의 스펙트럼을 이용하여 별의 구성 원소를 찾을 수 있다.","가치·태도":"입자-파동 이중성의 기묘함과 양자 기술이 미래 사회에 영향을 미칠 수 있음에 흥미를 가지고, 터널 효과가 나타나는 여러 현상과 기술에 흥미를 가진다."},"E":{"지식·이해":"입자가 파동성을 가짐을 알고, 현대의 원자모형이 불확정성 원리에 기반함을 말할 수 있다.","과정·기능":"별빛의 스펙트럼이 다름을 통해 별의 구성 원소가 다름을 말할 수 있다.","가치·태도":"입자의 파동성, 양자 기술이 미래 사회에 미치는 영향, 터널 효과에 관심을 가진다."}}},"물에-01":{"codes":{"12물에01-01":{"A":"기체의 온도, 압력, 부피, 몰수 사이의 자료를 이용하여 각각의 관계를 찾아 법칙으로 나타내고, 이를 통합적으로 이해하여 이상 기체 방정식으로 유도하며, 이상 기체 방정식을 활용하여 기체의 분자량을 확인할 수 있는 실험을 설계하고 수행하여 실험 결과로부터 기체의 종류를 설명하고, 일상생활에서 이상 기체 방정식을 활용하는 사례를 조사하고 발표하여 화학의 유용성을 인식한다.","B":"기체의 온도, 압력, 부피, 몰수 사이의 관계를 법칙으로 나타내고, 이를 통합적으로 이해하여 이상 기체 방정식으로 유도하며, 이상 기체 방정식을 활용하여 기체의 분자 량을 확인할 수 있는 실험을 수행하여 실험 결과로부터 기체의 종류를 설명하고, 일상 생활에서 이상 기체 방정식을 활용하는 사례를 조사하여 화학의 유용성을 인식한다.","C":"기체의 온도, 압력, 부피, 몰수 사이의 관련 법칙을 통합하여 이상 기체 방정식으 로 유도할 수 있음을 알고, 이상 기체 방정식을 활용하여 기체의 분자량을 확인 할 수 있는 실험을 수행하며, 일상생활에서 이상 기체 방정식을 활용하는 사례 를 조사하여 화학에 흥미를 느낀다.","D":"기체의 온도, 압력, 부피, 몰수 사이의 관계를 이상 기체 방정식으로 나타낼 수 있음을 말하고, 제시된 절차에 따라 이상 기체 방정식을 활용하여 기체의 분자량을 확인할 수 있는 실험을 수행하며, 일상생활에서 이상 기체 방정식을 활용하는 사례를 보고 화학에 흥미를 느낀다.","E":"기체의 부피가 온도, 압력, 몰수에 의해 달라질 수 있음을 일상생활의 사례를 통해 인식한다."},"12물에01-02":{"A":"혼합 기체에서 각 기체의 부분 압력과 몰 분율의 관계를 설명하고, 일상생활에 서 유용하게 사용되는 혼합 기체의 다양한 사례를 조사하여 부분 압력과 몰 분율의 관계를 찾아 화학의 유용성을 발표하며 혼합 기체에 호기심을 가진다.","B":"혼합 기체에서 각 기체의 부분 압력과 몰 분율의 관계를 알고, 일상생활에서 유용 하게 사용되는 혼합 기체의 다양한 사례를 조사하여 혼합 기체에 호기심을 가진다.","C":"혼합 기체에서 각 기체의 부분 압력과 몰 분율의 의미를 알고, 일상생활에서 유용하게 사용되는 혼합 기체의 사례를 조사하며 혼합 기체에 흥미를 느낀다.","D":"혼합 기체에서 전체 압력을 각 기체의 부분 압력의 합으로 나타내고, 일상생활 에서 유용하게 사용되는 혼합 기체의 사례를 보며 혼합 기체에 흥미를 느낀다.","E":"혼합 기체에서 각 기체의 부분 압력의 합이 전체 압력임을 알고, 일상생활에서 유용하게 사용되는 혼합 기체의 사례를 보며 혼합 기체에 관심을 가진다."},"12물에01-03":{"A":"액체에서 분자 간 상호작용의 의미를 이해하고, 물질이 액체로 존재할 수 있는 이유를 분자 간 상호작용의 종류와 그에 따른 크기를 통해 설명하며, 액체의 종류에 따라 끓는점이 달라짐을 분자 간 상호작용으로 비교하여 설명하고, 수소 화합물의 끓는점 자료를 이용하여 액체의 종류에 따라 끓는점에 영향을 주는 요 인 을 추론할 수 있 다.","B":"물질이 액체로 존재할 수 있는 이유를 분자 간 상호작용의 종류와 그에 따른 크기를 통해 이해하고, 액체의 종류에 따라 끓는점이 달라짐을 분자 간 상호작 용으로 설명하며, 수소 화합물의 끓는점 자료를 통해 액체의 끓는점에 영향을 주는 요인을 설명할 수 있다.","C":"액체에서 분자 간 상호작용의 종류와 그에 따른 크기를 알고, 액체의 종류에 따라 끓는점이 달라짐을 분자 간 상호작용으로 설명할 수 있다.","D":"액체에서 분자 간 상호작용의 크기와 끓는점의 관계를 알 고, 이를 통해 서 로 다른 액체의 끓는점을 비교할 수 있다.","E":"액체에서 분자 간 상호작용의 크기에 따라 끓는점이 달라짐을 말할 수 있다."},"12물에01-04":{"A":"고체를 결정과 비결정으로 구분하고, 결정성 고체에서 화학 결합의 종류에 따른 특성의 차이를 바탕으로 분류 기준을 만들어 결정성 고체를 이온 결정, 분자 결정, 공유 결정, 금속 결정으로 분류할 수 있다.","B":"고체를 결정과 비결정으로 구분하고, 결정성 고체에서 화학 결합의 종류에 따라 특성이 달라짐을 이해하여 결정성 고체를 이온 결정, 분자 결정, 공유 결정, 금속 결정으로 분류할 수 있다.","C":"고체를 결정과 비결정으로 구분하고, 결정성 고체를 화학 결합의 종류에 따라 이온 결정, 분자 결정, 공유 결정, 금속 결정으로 분류할 수 있다.","D":"고체를 결정과 비결정으로 구분하고, 결정성 고체의 종류를 화학 결합의 종류에 따라 구분할 수 있음을 말할 수 있다.","E":"결정성 고체와 비결정성 고체의 예를 말할 수 있 다."}},"area":{"A":{"지식·이해":"기체의 온도, 압력, 부피, 몰수 사이의 자료를 이용하여 각각의 관계를 찾아 법칙 으로 나타내고, 이를 통합적으로 이해하여 이상 기체 방정식으로 유도하며, 혼합 기체에서 각 기체의 부분 압력과 몰 분율의 관계를 설명할 수 있다. 액체에서 분자 간 상호작용의 의미를 이해하고, 물질이 액체로 존재할 수 있는 이유를 분자 간 상호작용의 종류와 그에 따른 크기를 통해 설명하며, 액체의 종류 에 따라 끓는점이 달라짐을 분자 간 상호작용으로 비교하여 설명할 수 있다. 고체를 결정과 비결정으로 구분할 수 있다.","과정·기능":"이상 기체 방정식을 활용하여 기체의 분자량을 확인할 수 있는 실험을 설계하고 수행하여 실험 결과로부터 기체의 종류를 설명하고, 수소 화합물의 끓는점 자료를 이용하여 액체의 종류에 따라 끓는점에 영향을 주는 요인을 추론할 수 있다. 결정성 고체에서 화학 결합의 종류에 따른 특성의 차이를 바탕으로 분류 기준을 만들 어 결정성 고체를 이온 결정, 분자 결정, 공유 결정, 금속 결정으로 분류할 수 있다.","가치·태도":"일상생활에서 이상 기체 방정식을 활용하는 사례를 조사하고 발표하여 화학의 유용성을 인식한다. 일상생활에서 유용하게 사용되는 혼합 기체의 다양한 사례를 조사하여 부분 압력과 몰 분율의 관계를 찾아 화학의 유용성을 발표하며 혼합 기체에 호기심을 가진다."},"B":{"지식·이해":"기체의 온도, 압력, 부피, 몰수 사이의 관계를 법칙으로 나타내고, 이를 통합적으 로 이해하여 이상 기체 방정식으로 유도하며, 혼합 기체에서 각 기체의 부분 압력 과 몰 분율의 관계를 말할 수 있다. 물질이 액체로 존재할 수 있는 이유를 분자 간 상호작용의 종류와 그에 따른 크기 를 통해 이해하고, 액체의 종류에 따라 끓는점이 달라짐을 분자 간 상호작용으로 설명할 수 있다. 고체를 결정과 비결정으로 구분할 수 있다.","과정·기능":"이상 기체 방정식을 활용하여 기체의 분자량을 확인할 수 있는 실험을 수행하여 실험 결과로부터 기체의 종류를 설명하고, 수소 화합물의 끓는점 자료를 통해 액체의 끓는점에 영향을 주는 요인을 설명할 수 있다. 결정성 고체에서 화학 결합의 종류에 따라 특성이 달라짐을 이해하여 결정성 고체 를 이온 결정, 분자 결정, 공유 결정, 금속 결정으로 분류할 수 있다.","가치·태도":"일상생활에서 이상 기체 방정식을 활용하는 사례를 조사하여 화학의 유용성을 인식한다. 일상생활에서 유용하게 사용되는 혼합 기체의 다양한 사례를 조사하며 혼합 기체 에 호기심을 가진다."},"C":{"지식·이해":"기체의 온도, 압력, 부피, 몰수 사이의 관련 법칙을 통합하여 이상 기체 방정식으 로 유도할 수 있음과 혼합 기체에서 각 기체의 부분 압력과 몰 분율의 의미를 말 할 수 있 다. 액체에서 분자 간 상호작용의 종류와 그에 따른 크기를 알고, 액체의 종류에 따라 끓는점이 달라짐을 분자 간 상호작용으로 설명할 수 있다. 고체를 결정과 비결정으로 구분할 수 있다.","과정·기능":"이상 기체 방정식을 활용하여 기체의 분자량을 확인할 수 있는 실험을 수행할 수 있다. 결정성 고체를 화학 결합의 종류에 따라 이온 결정, 분자 결정, 공유 결정, 금속 결 정 으 로 분류할 수 있 다.","가치·태도":"일상생활에서 이상 기체 방정식을 활용하는 사례를 조사하며 화학에 흥미를 느 낀다. 일상생활에서 유용하게 사용되는 혼합 기체의 사례를 조사하며 혼합 기체에 흥미 를 느낀다."},"D":{"지식·이해":"기체의 온도, 압력, 부피, 몰수 사이의 관계를 이상 기체 방정식으로 나타낼 수 있음을 말하고, 혼합 기체에서 전체 압력을 각 기체의 부분 압력의 합으로 나타낼 수 있다. 액체에서 분자 간 상호작용의 크기와 끓는점의 관계를 알고, 이를 통해 서로 다른 액체의 끓는점을 비교할 수 있다. 고체를 결정과 비결정으로 구분할 수 있다.","과정·기능":"제시된 절차에 따라 이상 기체 방정식을 활용하여 기체의 분자량을 확인할 수 있는 실험을 수행할 수 있다. 결정성 고체의 종류를 화학 결합의 종류에 따라 구분할 수 있음을 말할 수 있다.","가치·태도":"일상생활에서 이상 기체 방정식을 활용하는 사례를 보고 화학에 흥미를 느낀다. 일상생활에서 유용하게 사용되는 혼합 기체의 사례를 보며 혼합 기체에 흥미를 느낀다."},"E":{"지식·이해":"기체의 부피가 온도, 압력, 몰수에 의해 달라질 수 있음을 일상생활의 사례를 통해 인식하고, 혼합 기체에서 각 기체의 부분 압력의 합이 전체 압력임을 말할 수 있다. 액체에서 분자 간 상호작용의 크기에 따라 끓는점이 달라짐을 말할 수 있다.","과정·기능":"결정성 고체와 비결정성 고체의 예를 말할 수 있다.","가치·태도":"일상생활에서 유용하게 사용되는 혼합 기체의 사례를 보며 혼합 기체에 관심을 가진다."}}},"물에-02":{"codes":{"12물에02-01":{"A":"물 분자의 구조와 물의 수소 결합으로 인해 나타나는 물의 특성을 설명하고, 물의 밀도, 열용량, 표면 장력 등의 특성을 다른 액체와 구별하여 이해하며, 이와 관련된 다양한 자연 현상을 조사하여 물의 경이로움을 느낀다.","B":"물의 특성을 물 분자의 구조와 수소 결합으로 설명하고, 물의 밀도, 열용량, 표면 장력 등의 특성을 이해하며, 이와 관련된 자연 현상을 조사하여 물의 경이 로움을 느낀다.","C":"물의 밀도, 열용량, 표면 장력 등의 특성이 수소 결합과 관련되어 있음을 설명하 고, 이와 관련된 자연 현상의 사례를 보며 물의 성질에 흥미를 느낀다.","D":"물의 밀도, 열용량, 표면 장력 등의 특성이 수소 결합과 관련되어 있음을 말할 수 있다.","E":"자연 현상에서 나타나는 물의 성질이 수소 결합과 관련되어 있음을 말할 수 있다."},"12물에02-02":{"A":"실험 데이터를 분석하여 용액의 농도에 따른 증기압, 끓는점, 어는점의 변화를 비교하고 규칙을 추론하며, 이와 관련되어 일상생활에서 나타나는 다양한 사례 를 조사하고 설명하며, 온도 센서를 이용하여 다양한 농도 조건에서 설탕물의 끓는점과 어는점을 측정할 수 있다.","B":"실험 데이터를 이용하여 용액의 농도에 따른 증기압, 끓는점, 어는점의 변화를 비교 하고, 이와 관련되어 일상생활에서 나타나는 사례를 조사하고 설명하며, 온도 센서 를 이용하여 다양한 농도 조건에서 설탕물의 끓는점과 어는점을 측정할 수 있다.","C":"용액의 농도에 따른 증기압, 끓는점, 어는점의 변화를 이해하고, 이와 관련된 일상생활의 예를 알며, 온도 센서를 이용하여 설탕물의 끓는점과 어는점을 측정 할 수 있다.","D":"용액의 농도에 따른 증기압, 끓는점, 어는점의 변화 중 일부를 이해하고, 일상생 활의 예를 보고 이와 관련이 있음을 알며, 온도 센서를 이용하여 설탕물의 끓는 점 또는 어는점을 측정할 수 있 다.","E":"용액의 농도에 따라 증기압, 끓는점, 어는점이 변할 수 있음을 말하고, 온도 센서를 이용하여 설탕물의 끓는점과 어는점을 측정할 수 있음을 말할 수 있다."},"12물에02-03":{"A":"용액의 농도에 따른 다양한 삼투현상을 이해하여 삼투의 원리를 설명하고, 용액 의 농도와 삼투현상의 관계를 찾는 실험을 설계하고 수행하며, 일상생활에서 삼투현상이 나타나는 여러 가지 사례를 찾아 발표하며 화학 원리가 유용하게 적용됨을 인식한다.","B":"용액의 농도에 따른 삼투현상을 이해하여 삼투의 원리를 설명하고, 용액의 농도 와 삼투현상의 관계를 찾는 실험을 수행하며, 일상생활에서 삼투현상이 나타나 는 여러 가지 사례를 찾아 화학 원리가 유용하게 적용됨을 인식한다.","C":"용액의 농도에 따른 삼투현상을 이해하고, 용액의 농도에 따른 삼투현상을 확인 하는 실험을 수행하며, 일상생활에서 삼투현상이 나타나는 여러 가지 사례를 찾아 화학 원리에 관심을 가진다.","D":"삼투현상이 용액의 농도와 관련이 있음을 알고, 용액
