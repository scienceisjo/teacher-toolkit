<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학 나선 교육과정 지도</title>
<style>
:root{
  --bg:#f6f7f9; --card:#ffffff; --ink:#212529; --sub:#868e96; --line:#dee2e6;
  --energy:#e03131; --matter:#f08c00; --life:#2f9e44; --earth:#1971c2; --society:#9c36b5; --integrated:#495057;
  --amber:#f59f00; --blue:#339af0;
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:'Pretendard','Segoe UI','Malgun Gothic',system-ui,sans-serif;
  background:var(--bg); color:var(--ink); display:flex; flex-direction:column; height:100vh; overflow:hidden;
}
/* ---------- 헤더 ---------- */
header{
  display:flex; align-items:center; gap:14px; padding:10px 18px; background:#fff;
  border-bottom:1px solid var(--line); flex-wrap:wrap; z-index:30;
}
header h1{font-size:19px; letter-spacing:-.3px; white-space:nowrap}
header h1 .spiral{display:inline-block; margin-right:4px}
header .tagline{font-size:12px; color:var(--sub); white-space:nowrap}
/* 담당 학년 프리셋 + 도구 버튼 */
.hbtn{
  padding:7px 12px; border:1.5px solid var(--line); background:#fff; border-radius:18px;
  font-size:12.5px; font-family:inherit; cursor:pointer; white-space:nowrap; transition:all .12s; color:var(--ink);
}
.hbtn:hover{border-color:#868e96; background:var(--bg)}
.hbtn.on{background:#212529; border-color:#212529; color:#fff}
select.hbtn{appearance:auto; padding:6px 8px}
#q{
  flex:1; min-width:160px; max-width:340px; padding:8px 12px; border:1.5px solid var(--line);
  border-radius:20px; font-size:13.5px; font-family:inherit; outline:none; transition:border .15s;
}
#q:focus{border-color:var(--blue)}
#qCount{font-size:12px; color:var(--sub); min-width:70px}
.legend{display:flex; gap:6px; flex-wrap:wrap; margin-left:auto}
.legend button{
  display:flex; align-items:center; gap:5px; font-size:12px; color:#495057; white-space:nowrap;
  border:1.5px solid transparent; background:none; border-radius:14px; padding:4px 9px;
  font-family:inherit; cursor:pointer; transition:all .12s;
}
.legend button:hover{background:var(--bg); border-color:var(--line)}
.legend button.on{border-color:var(--c); background:color-mix(in srgb, var(--c) 10%, #fff); font-weight:700; color:var(--ink)}
.legend i{width:11px; height:11px; border-radius:50%; display:inline-block; flex:none}
/* ---------- 본문 레이아웃 (허브 / 지도 / 집중) ---------- */
#main{flex:1; display:flex; overflow:hidden; position:relative}
#hubView{flex:1; overflow-y:auto; display:none}
body.v-hub #hubView{display:block}
#browseView{flex:1; display:flex; flex-direction:column; overflow:hidden}
body:not(.v-map) #browseView{display:none}
#focusView{flex:1; display:flex; overflow:hidden}
body:not(.v-focus) #focusView{display:none !important}
/* 허브에서는 지도용 헤더 도구를 감춤 */
body.v-hub #q, body.v-hub #qCount, body.v-hub #legend,
body.v-hub #denseBtn, body.v-hub #clearBtn, body.v-hub #miscBtn{display:none}
body.v-hub #homeBtn{display:none}
#homeBtn{font-weight:700}

/* ---------- 허브 ---------- */
.hubWrap{max-width:1080px; margin:0 auto; padding:34px 24px 60px}
.hubHead{text-align:center; margin-bottom:30px}
.hubHead h2{
  font-size:clamp(23px,3.4vw,31px); letter-spacing:-.6px; margin-bottom:12px; line-height:1.35;
}
.hubHead p{font-size:15px; color:#495057; line-height:1.8; max-width:660px; margin:0 auto}
.hubHead .nums{
  display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:16px;
}
.hubHead .nums span{
  background:#fff; border:1px solid var(--line); border-radius:20px; padding:5px 14px;
  font-size:12.5px; color:var(--sub);
}
.hubHead .nums b{color:var(--ink); font-weight:800}
/* 카드 */
.hubCards{display:grid; grid-template-columns:repeat(auto-fit,minmax(232px,1fr)); gap:14px; margin-bottom:12px}
.hubCard{
  position:relative; overflow:hidden; text-align:left; cursor:pointer; font-family:inherit; color:var(--ink);
  background:#fff; border:1.5px solid var(--line); border-radius:18px; padding:22px 20px 20px;
  transition:transform .14s, box-shadow .14s, border-color .14s;
}
.hubCard::before{
  content:''; position:absolute; inset:0 auto 0 0; width:5px; background:var(--c);
}
.hubCard:hover{transform:translateY(-3px); border-color:var(--c); box-shadow:0 12px 28px rgba(0,0,0,.10)}
.hubCard .ic{font-size:26px; line-height:1; margin-bottom:10px; display:block}
.hubCard h3{font-size:18px; margin-bottom:5px; letter-spacing:-.3px}
.hubCard .cnt{font-size:12px; color:var(--c); font-weight:800; margin-bottom:9px; display:block}
.hubCard p{font-size:12.8px; color:#6b7280; line-height:1.65}
.hubCard .go{margin-top:12px; font-size:12.5px; font-weight:700; color:var(--c)}
.hubCard.all{
  grid-column:1/-1; background:linear-gradient(135deg,#1b2836,#0f1a24); border-color:#0f1a24; color:#fff;
  display:flex; align-items:center; gap:22px; padding:24px 26px;
}
.hubCard.all::before{
  width:100%; height:5px; inset:0 0 auto 0;
  background:linear-gradient(90deg,var(--energy) 0 25%,var(--matter) 25% 50%,var(--life) 50% 75%,var(--earth) 75% 100%);
}
.hubCard.all:hover{border-color:#000}
.hubCard.all h3{color:#fff; font-size:19px}
.hubCard.all p{color:#c3ccd6}
.hubCard.all .go{color:#fff}
.hubCard.all .ic{font-size:34px; margin:0}
.hubExtra{
  display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:38px; font-size:12.5px;
}
.hubExtra button{
  background:#fff; border:1px solid var(--line); border-radius:20px; padding:7px 15px;
  font-family:inherit; font-size:12.5px; cursor:pointer; color:#495057;
}
.hubExtra button:hover{border-color:var(--c,#868e96); background:var(--bg)}
/* 설명 섹션 */
.hubSec{
  background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px 28px; margin-bottom:16px;
}
.hubSec > h3{
  font-size:17.5px; margin-bottom:6px; letter-spacing:-.3px; display:flex; align-items:center; gap:8px;
}
.hubSec > .sub{font-size:13px; color:var(--sub); margin-bottom:18px}
.hubSec p{font-size:14px; line-height:1.85; color:#343a40; margin-bottom:12px}
.hubSec p:last-child{margin-bottom:0}
.hubSec b{color:#212529}
/* 나선 예시 */
.spiral{display:flex; align-items:stretch; gap:0; flex-wrap:wrap; margin:16px 0 6px}
.spStep{
  flex:1 1 158px; background:var(--bg); border-radius:12px; padding:13px 14px; position:relative; margin-right:20px;
}
.spStep:last-child{margin-right:0}
.spStep::after{
  content:'▶'; position:absolute; right:-16px; top:50%; transform:translateY(-50%);
  color:#ced4da; font-size:11px;
}
.spStep:last-child::after{display:none}
.spStep small{display:block; font-size:10.5px; font-weight:800; color:var(--c); margin-bottom:4px}
.spStep b{display:block; font-size:13px; margin-bottom:3px}
.spStep span{font-size:11.5px; color:#6b7280; line-height:1.55}
/* 근거 목록 */
.whyList{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:13px; margin-top:6px}
.whyItem{border-left:3px solid var(--c,#adb5bd); padding:2px 0 2px 14px}
.whyItem h4{font-size:14px; margin-bottom:5px}
.whyItem .th{font-size:11px; color:var(--sub); font-weight:600; margin-bottom:5px}
.whyItem p{font-size:13px; line-height:1.72; color:#495057; margin:0}
.hubNote{
  background:#f8f9fa; border:1px dashed #ced4da; border-radius:12px; padding:13px 16px;
  font-size:12.8px; line-height:1.75; color:#5c636a; margin-top:14px;
}
.hubNote b{color:#343a40}
.hubQuote{
  border-left:4px solid var(--matter); background:#fffbf2; border-radius:0 12px 12px 0;
  padding:14px 18px; font-size:14px; line-height:1.8; color:#343a40; margin:14px 0;
}
.hubQuote cite{display:block; font-style:normal; font-size:12px; color:var(--sub); margin-top:7px}
.hubFoot{text-align:center; margin-top:26px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap}
.hubFoot a{
  text-decoration:none; background:#fff; border:1.5px solid var(--line); border-radius:22px;
  padding:10px 20px; font-size:13.5px; color:var(--ink); font-weight:600;
}
.hubFoot a:hover{border-color:#868e96}
@media (max-width:640px){
  .spStep{margin-right:0; margin-bottom:22px}
  .spStep::after{content:'▼'; right:auto; left:50%; top:auto; bottom:-17px; transform:translateX(-50%)}
  .hubCard.all{flex-direction:column; align-items:flex-start; gap:12px}
}
#hint{
  padding:9px 18px; font-size:12.5px; color:#495057; background:#fff;
  border-bottom:1px solid var(--line); display:flex; gap:16px; flex-wrap:wrap; align-items:center;
}
#hint b{color:var(--ink)}
#hint .sep{color:var(--line)}
@keyframes mapOut{ to{ opacity:0; transform:scale(.97) } }
#browseView.leaving{animation:mapOut .26s ease forwards}
/* 계보 레일 */
#lineage{
  width:300px; flex:none; overflow-y:auto; padding:18px 16px 40px; background:#fff;
  border-right:1px solid var(--line);
}
.lnBack{
  width:100%; padding:8px; border:1.5px solid var(--line); background:#fff; border-radius:10px;
  font-family:inherit; font-size:12.5px; cursor:pointer; margin-bottom:16px; color:#495057;
}
.lnBack:hover{border-color:#868e96; background:var(--bg)}
.lnLabel{font-size:11px; font-weight:800; color:var(--sub); margin:4px 0 7px; letter-spacing:.02em}
@keyframes lnIn{ from{ opacity:0; transform:translateY(-18px) } to{ opacity:1; transform:none } }
.lnCard{
  display:block; width:100%; text-align:left; border:1.5px solid var(--line); background:#fff;
  border-radius:12px; padding:9px 12px; margin-bottom:7px; font-family:inherit; cursor:pointer;
  line-height:1.35; transition:border-color .12s, transform .12s;
  animation:lnIn .4s cubic-bezier(.22,1,.36,1) backwards; color:var(--ink);
}
.lnCard:hover{border-color:#868e96; transform:translateX(2px)}
.lnCard small{display:block; font-size:10.5px; color:var(--sub); margin-bottom:1px}
.lnCard b{font-size:13px; font-weight:600}
.lnCard.p{border-left:4px solid var(--amber)}
.lnCard.n{border-left:4px solid var(--blue)}
.lnCard.r{border-left:4px solid #adb5bd; border-style:dashed}
.lnCard.cur{
  background:var(--c); border-color:var(--c); color:#fff; padding:13px 14px;
  box-shadow:0 6px 18px color-mix(in srgb, var(--c) 35%, transparent);
}
.lnCard.cur small{color:rgba(255,255,255,.85)}
.lnCard.cur b{font-size:15.5px; font-weight:800}
.lnArrow{text-align:center; color:#ced4da; font-size:15px; line-height:1; margin:1px 0 6px;
  animation:lnIn .4s cubic-bezier(.22,1,.36,1) backwards}
.lnNone{font-size:11.5px; color:var(--sub); background:var(--bg); border-radius:9px; padding:8px 10px; margin-bottom:7px}
/* 브리핑 본문 */
#briefWrap{flex:1; overflow-y:auto; padding:0 0 50px}
#brief{max-width:1060px; margin:0 auto; padding:0 26px}
@keyframes brIn{ from{ opacity:0; transform:translateY(14px) } to{ opacity:1; transform:none } }
.brAnim{animation:brIn .42s cubic-bezier(.22,1,.36,1) backwards}
.bGrid{display:grid; grid-template-columns:repeat(auto-fit, minmax(310px,1fr)); gap:14px; margin-bottom:14px}
.bCard{background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px 19px}
.bCard.full{grid-column:1/-1}
.bCard>h4{
  font-size:13px; margin-bottom:10px; display:flex; align-items:center; gap:6px; color:#343a40;
}
.bCard>h4 .cnt{font-weight:400; color:var(--sub); font-size:11.5px}
/* 수업 전 확인 */
.preCard{
  background:#fff; border:2px solid #212529; border-radius:16px; padding:18px 22px; margin-bottom:14px;
}
.preCard h4{font-size:14.5px; margin-bottom:12px; display:flex; align-items:baseline; gap:9px; flex-wrap:wrap}
.preCard h4 span{font-size:11.5px; font-weight:400; color:var(--sub)}
.preCard ol{margin:0; padding:0; counter-reset:pc; list-style:none}
.preCard li{
  counter-increment:pc; position:relative; padding-left:30px; margin-bottom:10px;
  font-size:13.5px; line-height:1.72; color:#343a40;
}
.preCard li::before{
  content:'☐'; position:absolute; left:0; top:-1px; font-size:15px; color:#868e96;
}
.preCard li b{color:#212529}
/* 기여 카드 */
.contribCard{border:1.5px dashed #adb5bd; background:linear-gradient(135deg,#f8f9fa,#fff)}
.contribCard p{font-size:13.5px; line-height:1.7; color:#495057; margin-bottom:11px}
.contribBtn{background:#17395c !important; color:#fff !important; border-color:#17395c !important; font-weight:700}
.contribBtn:hover{background:#0f2740 !important}
.bigIdea{
  background:linear-gradient(135deg, color-mix(in srgb, var(--ac) 9%, #fff), #fff);
  border:1.5px solid color-mix(in srgb, var(--ac) 26%, #fff); border-radius:16px;
  padding:18px 22px; margin-bottom:14px;
}
.bigIdea h4{font-size:12px; color:var(--ac); font-weight:800; margin-bottom:7px; letter-spacing:.02em}
.bigIdea p{font-size:15px; line-height:1.75; color:#212529}
.misList li{list-style:none; font-size:13px; line-height:1.7; margin-bottom:9px; padding-left:20px; text-indent:-20px; color:#343a40}
.misList li::before{content:'⚠️ '; }
.misList li b{color:#c2255c}
#mapWrap{flex:1; overflow:auto; padding:18px 14px 40px}
#mapInner{position:relative; min-width:1540px; max-width:1800px; margin:0 auto}
#wires{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:5}
#mapGrid{
  display:grid; position:relative; z-index:2;
  grid-template-columns:72px repeat(3, minmax(185px,1fr)) 168px 336px;
  gap:0 10px;
}
.gradeHead{
  text-align:center; font-weight:700; font-size:14px; padding:8px 4px 12px; color:#343a40;
  background:none; border:1.5px solid transparent; border-radius:12px; font-family:inherit; cursor:pointer;
  transition:all .12s;
}
.gradeHead:hover{background:#fff; border-color:var(--line)}
.gradeHead.on{background:#212529; color:#fff; border-color:#212529}
.gradeHead.on small{color:rgba(255,255,255,.8)}
.gradeHead small{display:block; font-weight:400; font-size:11px; color:var(--sub); margin-top:2px}
.areaLabel{
  display:flex; flex-direction:column; justify-content:center; align-items:flex-start; gap:6px; padding:8px 4px;
  background:none; border:1.5px solid transparent; border-radius:12px; font-family:inherit; cursor:pointer;
  text-align:left; transition:all .12s; color:var(--ink);
}
.areaLabel:hover{background:#fff; border-color:var(--line)}
.areaLabel.on{background:color-mix(in srgb, var(--c) 10%, #fff); border-color:var(--c)}
.areaLabel b{font-size:13px; letter-spacing:-.3px}
.areaLabel i{width:34px; height:6px; border-radius:3px; display:block}
/* 컴팩트 밀도 */
#mapGrid.compact .cell{padding:8px 8px; min-height:52px; gap:5px 7px}
#mapGrid.compact .st{font-size:12px; padding:4px 9px 4px 6px}
#mapGrid.compact .st.cmp{font-size:10.5px; padding:2px 7px 2px 5px}
#mapGrid.compact .ecell{gap:6px; padding:8px 8px 8px 12px}
#mapGrid.compact .esubh{font-size:10px; margin-bottom:3px}
#mapGrid.compact #hcell{gap:6px; padding:10px 8px}
.cell{
  position:relative; display:flex; flex-wrap:wrap; align-content:center; gap:7px 9px;
  padding:14px 12px; min-height:76px;
}
.cell::before{ /* 노선 트랙 */
  content:''; position:absolute; left:-5px; right:-5px; top:50%; height:5px; margin-top:-2.5px;
  background:var(--c); opacity:.14; border-radius:3px;
}
.rowband{background:transparent}
/* 통합과학 세로 트랙 */
#hcell{
  grid-column:5; grid-row:2 / span 5; position:relative;
  display:flex; flex-direction:column; justify-content:center; gap:10px; padding:16px 12px;
  background:color-mix(in srgb, var(--integrated) 5%, #fff);
  border:1px solid color-mix(in srgb, var(--integrated) 14%, #fff); border-radius:16px;
}
#hcell::before{
  content:''; position:absolute; top:8px; bottom:8px; left:50%; width:5px; margin-left:-2.5px;
  background:var(--integrated); opacity:.15; border-radius:3px;
}
#hcell .subhead{font-size:11.5px; font-weight:800; color:var(--integrated); text-align:center; position:relative; opacity:.85}
/* 고2~3 선택과목 열 */
.ecell{
  grid-column:6; position:relative; display:flex; flex-direction:column; justify-content:center;
  gap:10px; padding:12px 12px 12px 16px; margin:5px 0;
  background:color-mix(in srgb, var(--c) 4%, #fff);
  border:1px solid color-mix(in srgb, var(--c) 13%, #fff); border-radius:14px;
}
.ecell::before{
  content:''; position:absolute; left:-5px; top:12px; bottom:12px; width:5px;
  background:var(--c); opacity:.16; border-radius:3px;
}
.esub{position:relative}
.esubh{font-size:10.5px; font-weight:800; color:#495057; margin-bottom:4px; display:flex; align-items:center; gap:5px; letter-spacing:-.2px}
.epills{display:flex; flex-wrap:wrap; gap:4px}
.trk{font-size:9px; font-weight:800; padding:1px 5px 2px; border-radius:6px; color:#fff; letter-spacing:0; flex:none}
.trk-g{background:#4c6ef5}
.trk-c{background:#9775fa}
.trk-v{background:#f06595}
.st.cmp{font-size:11px; padding:3px 8px 3px 6px; border-radius:15px; gap:5px}
.st.cmp .dot{width:7px; height:7px; outline-width:1.5px}
.st.hasq::after{content:'✓'; font-size:8px; font-weight:800; color:#fff; background:#2f9e44;
  width:12px; height:12px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  position:absolute; top:-3px; right:-3px; border:1.5px solid #fff}
.st.sel.hasq::after{background:#fff; color:var(--c); border-color:var(--c)}
/* 예시 문항 */
.qitem{border:1px solid var(--line); border-radius:12px; padding:11px 13px; margin-bottom:9px; background:#fff}
.qhead{display:flex; align-items:center; gap:6px; margin-bottom:7px; flex-wrap:wrap}
.qno{font-size:11px; font-weight:800; color:#fff; background:var(--ac,#495057); border-radius:9px; padding:2px 8px}
.qtype{font-size:10.5px; font-weight:700; color:#868e96; border:1px solid var(--line); border-radius:8px; padding:1px 7px}
.qlv{font-size:10.5px; font-weight:800; color:#fff; border-radius:8px; padding:2px 8px}
.qlv-상{background:#e03131}.qlv-중{background:#f59f00}.qlv-하{background:#2f9e44}
.qcode{font-size:10px; font-weight:700; color:var(--ac,#495057); background:color-mix(in srgb,var(--ac,#495057) 10%,#fff);
  border:1px solid color-mix(in srgb,var(--ac,#495057) 28%,#fff); border-radius:7px; padding:1px 6px}
.qbody{font-size:13.5px; line-height:1.7; white-space:pre-wrap; color:#212529}
.qchoices{margin:7px 0 0; font-size:13px; line-height:1.85; color:#343a40}
.qmeta{margin-top:8px; border-top:1px dashed var(--line); padding-top:7px; font-size:12.5px; line-height:1.65}
.qmeta div{margin-bottom:3px}
.qmeta b{color:#495057}
.qans{color:#1864ab}
.qmis{color:#c2255c}
.qsrc{font-size:12px; color:var(--sub); background:var(--bg); border-radius:9px; padding:7px 11px; margin-bottom:9px; line-height:1.6}
.qtools{display:flex; gap:7px; margin-top:2px}
.qtools button{flex:1; padding:7px; border:1.5px solid var(--line); background:#fff; border-radius:9px;
  font-size:12px; font-family:inherit; cursor:pointer}
.qtools button:hover{border-color:#868e96; background:var(--bg)}
.answers-off .qmeta{display:none}
/* 성취수준 */
.lvtabs{display:flex; gap:5px; margin:9px 0 10px}
.lvtab{
  flex:1; padding:7px 4px; border:1.5px solid var(--line); background:#fff; border-radius:9px;
  font-family:inherit; font-size:14px; font-weight:800; color:#868e96; cursor:pointer; transition:all .12s;
}
.lvtab:hover{border-color:#adb5bd}
.lvtab.on{color:#fff; border-color:transparent}
.lvtab.on[data-lv="A"]{background:#c92a2a}
.lvtab.on[data-lv="B"]{background:#e8590c}
.lvtab.on[data-lv="C"]{background:#f59f00}
.lvtab.on[data-lv="D"]{background:#2f9e44}
.lvtab.on[data-lv="E"]{background:#1971c2}
.lvhead{display:flex; align-items:center; gap:8px; margin-bottom:8px}
.lvbadge{
  width:26px; height:26px; border-radius:8px; color:#fff; font-weight:800; font-size:14px;
  display:flex; align-items:center; justify-content:center; flex:none;
}
.lv-A{background:#c92a2a}.lv-B{background:#e8590c}.lv-C{background:#f59f00}
.lv-D{background:#2f9e44}.lv-E{background:#1971c2}
.lvpct{font-size:11.5px; color:var(--sub); background:var(--bg); padding:2px 9px; border-radius:10px}
.lvcat{margin-bottom:9px; border-left:3px solid var(--line); padding-left:10px}
.lvcat b{display:block; font-size:12px; color:#495057; margin-bottom:3px}
.lvcat p{font-size:13px; line-height:1.7; color:#212529}
.lvstd{padding:8px 12px}
.lvstd summary{font-size:12.5px; font-weight:500; color:#495057; display:flex; align-items:center; gap:6px}
.lvstd summary .qcode{flex:none}
.lvtable{width:100%; border-collapse:collapse; margin-top:8px}
.lvtable td{padding:6px 8px; font-size:12.5px; line-height:1.6; border-top:1px solid var(--line); vertical-align:top}
.lvcell{
  width:22px; text-align:center; font-weight:800; color:#fff; border-radius:6px;
  padding:2px !important; font-size:12px;
}
.lvtable tr td:first-child{border-top:none; padding-right:0 !important}
/* ---------- 역(단원) 핀 ---------- */
.st{
  position:relative; display:inline-flex; align-items:center; gap:7px;
  background:var(--card); border:1.6px solid var(--line); border-radius:20px;
  padding:6px 12px 6px 8px; font-size:13px; font-family:inherit; cursor:pointer;
  transition:all .15s; line-height:1.25; text-align:left; color:var(--ink);
  box-shadow:0 1px 2px rgba(0,0,0,.05);
}
.st .dot{width:10px; height:10px; border-radius:50%; background:var(--c); flex:none; border:2px solid #fff; outline:2px solid var(--c)}
.st .pf{font-size:10px; color:var(--sub); margin-left:2px}
.st:hover{border-color:var(--c); transform:translateY(-1px); box-shadow:0 3px 8px rgba(0,0,0,.1)}
.st.sel{background:var(--c); border-color:var(--c); color:#fff; font-weight:700; box-shadow:0 4px 12px rgba(0,0,0,.25)}
.st.sel .pf{color:rgba(255,255,255,.8)}
.st.sel .dot{outline-color:#fff}
.st.prev{border-color:var(--amber); box-shadow:0 0 0 3px rgba(245,159,0,.25)}
.st.next{border-color:var(--blue); box-shadow:0 0 0 3px rgba(51,154,240,.25)}
.st.rel{border-style:dashed; border-color:#adb5bd; box-shadow:0 0 0 3px rgba(173,181,189,.2)}
.st.dim{opacity:.28; filter:saturate(.4)}
/* ---------- 상세 패널 ---------- */
#brief .empty{color:var(--sub); font-size:14px; line-height:1.8; padding-top:30px; text-align:center}
#brief .empty .big{font-size:40px; margin-bottom:10px}
#hint .stats{display:flex; gap:10px; flex-wrap:wrap}
#hint .stats div{background:var(--bg); border-radius:9px; padding:3px 10px; font-size:11.5px; color:var(--sub)}
#hint .stats b{color:var(--ink); font-weight:800}
/* 고정 헤더 */
.pTop{
  position:sticky; top:0; z-index:6; background:#fff; margin:-20px -22px 12px; padding:14px 22px 10px;
  border-bottom:1px solid var(--line);
}
.pTop .chips{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px}
.pTop h2{font-size:20px; letter-spacing:-.5px; margin:0 0 3px}
.modeRow{display:flex; align-items:center; gap:8px; margin-top:8px}
.modeTog{display:flex; border:1.5px solid var(--line); border-radius:10px; overflow:hidden}
.modeTog button{
  padding:5px 13px; border:none; background:#fff; font-size:12.5px; font-family:inherit;
  cursor:pointer; color:var(--sub); transition:all .12s;
}
.modeTog button.on{background:#212529; color:#fff; font-weight:700}
.jumps{display:flex; gap:5px; flex-wrap:wrap; margin-top:8px}
.jumps button{
  font-size:11.5px; padding:3px 9px; border:1px solid var(--line); background:var(--bg);
  border-radius:12px; font-family:inherit; cursor:pointer; color:#495057;
}
.jumps button:hover{border-color:#868e96; background:#fff}
/* 간단히 보기 블록 */
.sBlk{margin-bottom:14px}
.sBlk>h4{font-size:12.5px; color:var(--sub); margin-bottom:7px; font-weight:700; letter-spacing:-.2px}
.sFlow{display:flex; align-items:center; gap:6px; flex-wrap:wrap; font-size:12.5px}
.sFlow .arw{color:#adb5bd; font-weight:700}
.sChip{
  border:1.5px solid var(--line); background:#fff; border-radius:14px; padding:5px 11px;
  font-family:inherit; font-size:12.5px; cursor:pointer; line-height:1.3; text-align:left; color:var(--ink);
}
.sChip small{display:block; font-size:10px; color:var(--sub)}
.sChip:hover{border-color:#868e96}
.sChip.p{border-left:4px solid var(--amber)}
.sChip.n{border-left:4px solid var(--blue)}
.sChip.cur{background:var(--ac); border-color:var(--ac); color:#fff; font-weight:700; cursor:default}
.sChip.cur small{color:rgba(255,255,255,.8)}
.limitBox{
  background:#fff4e6; border:1px solid #ffd8a8; border-left:4px solid #f76707; border-radius:10px;
  padding:11px 14px; font-size:13px; line-height:1.75;
}
.limitBox li{margin-bottom:5px; list-style:none; text-indent:-13px; padding-left:13px}
.limitBox li::before{content:'✕ '; color:#e8590c; font-weight:800}
.limitBox.focusBox{background:#e7f5ff; border-color:#a5d8ff; border-left-color:#1971c2}
.limitBox.focusBox li::before{content:'◎ '; color:#1971c2}
.sStd{display:flex; gap:7px; margin-bottom:6px; font-size:13px; line-height:1.6; cursor:pointer}
.sStd .qcode{flex:none}
.sStd:hover{background:var(--bg); border-radius:6px}
.goalBox{
  background:var(--bg); border-radius:10px; padding:10px 13px; font-size:12.5px; line-height:1.7;
}
.goalBox b{color:#f59f00}
/* 오개념 모아보기 */
#miscView{
  position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:60; display:none;
  align-items:center; justify-content:center; padding:24px;
}
#miscView.open{display:flex}
#miscBox{
  background:#fff; border-radius:18px; width:min(920px,100%); max-height:100%; display:flex; flex-direction:column;
  overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.3);
}
#miscBox .mh{display:flex; align-items:center; gap:10px; padding:16px 20px; border-bottom:1px solid var(--line); flex-wrap:wrap}
#miscBox .mh h3{font-size:17px}
#miscBox .mb{overflow-y:auto; padding:14px 20px 22px}
.mGroup{margin-bottom:18px}
.mGroup>h5{font-size:13px; margin-bottom:8px; display:flex; align-items:center; gap:6px}
.mGroup>h5::before{content:''; width:4px; height:14px; border-radius:2px; background:var(--c)}
.mItem{border:1px solid var(--line); border-radius:10px; padding:9px 12px; margin-bottom:7px; font-size:12.5px; line-height:1.65}
.mItem .mu{font-weight:700; font-size:11.5px; color:#495057; cursor:pointer}
.mItem .mu:hover{text-decoration:underline}
.mItem .mc{color:#868e96; font-size:11px; margin-left:4px}
.mItem p{margin-top:4px; color:#c2255c}
.pHead{display:flex; align-items:flex-start; gap:8px; margin-bottom:4px}
.pHead .chips{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px}
.chip{display:inline-block; font-size:11.5px; font-weight:700; padding:3px 10px; border-radius:12px; color:#fff}
.chip.gr{background:#868e96}
#brief h2{font-size:24px; letter-spacing:-.5px; margin:2px 0 4px}
#brief .coderange{font-size:12px; color:var(--sub); margin-bottom:14px}
.pbtns{display:flex; gap:8px; margin:10px 0 18px}
.pbtns button{
  flex:1; padding:8px 10px; border:1.5px solid var(--line); background:#fff; border-radius:10px;
  font-size:12.5px; font-family:inherit; cursor:pointer; transition:all .15s;
}
.pbtns button:hover{border-color:#868e96; background:var(--bg)}
section.blk{margin-bottom:18px}
section.blk>h3{
  font-size:13.5px; margin-bottom:8px; display:flex; align-items:center; gap:6px; color:#343a40;
}
section.blk>h3::before{content:''; width:4px; height:15px; border-radius:2px; background:var(--ac,#495057)}
.std{display:flex; gap:8px; margin-bottom:8px; font-size:13.5px; line-height:1.65}
.std .code{
  flex:none; font-size:11px; font-weight:700; color:var(--ac,#495057);
  background:color-mix(in srgb, var(--ac,#495057) 10%, #fff);
  border:1px solid color-mix(in srgb, var(--ac,#495057) 30%, #fff);
  padding:2px 7px; border-radius:8px; height:fit-content; margin-top:2px; white-space:nowrap;
}
details{border:1px solid var(--line); border-radius:12px; padding:10px 14px; margin-bottom:8px; background:#fcfcfd}
details summary{font-size:13px; font-weight:700; cursor:pointer; color:#495057; user-select:none}
details ul{margin:8px 0 2px 16px}
details li{font-size:13px; line-height:1.7; margin-bottom:6px; color:#343a40}
details li .code{font-weight:700; color:var(--ac,#495057)}
details li.linkline{background:#fff9db; border-radius:8px; padding:6px 8px; list-style-position:inside; margin-left:-14px}
.tchips{display:flex; flex-wrap:wrap; gap:6px}
.tchips span{font-size:12px; background:var(--bg); border:1px solid var(--line); padding:4px 10px; border-radius:14px; color:#495057}
/* 배움의 흐름 */
.flow{display:flex; flex-direction:column; gap:6px}
.flow .fgroup{display:flex; flex-wrap:wrap; gap:6px}
.fcard{
  display:flex; flex-direction:column; border-radius:10px; padding:7px 11px; font-size:12.5px;
  border:1.5px solid var(--line); background:#fff; cursor:pointer; font-family:inherit; text-align:left;
  transition:all .12s; line-height:1.35;
}
.fcard small{font-size:10.5px; color:var(--sub)}
.fcard:hover{transform:translateY(-1px); box-shadow:0 2px 6px rgba(0,0,0,.1)}
.fcard.p{border-left:4px solid var(--amber)}
.fcard.n{border-left:4px solid var(--blue)}
.fcard.r{border-left:4px solid #adb5bd; border-style:dashed}
.fcard.cur{background:var(--ac); color:#fff; border-color:var(--ac); cursor:default; font-weight:700}
.fcard.cur small{color:rgba(255,255,255,.8)}
.flow .arrow{color:var(--sub); font-size:13px; padding-left:6px}
.fnote{font-size:11.5px; color:var(--sub); margin-top:6px}
/* AI */
.ai{display:flex; gap:8px}
.ai button{
  flex:1; padding:11px 8px; border:none; border-radius:12px; font-size:13px; font-weight:700;
  font-family:inherit; cursor:pointer; color:#fff; transition:transform .12s, box-shadow .12s;
}
.ai button:hover{transform:translateY(-1px); box-shadow:0 4px 10px rgba(0,0,0,.2)}
.ai .diag{background:linear-gradient(135deg,#f59f00,#e8590c)}
.ai .form{background:linear-gradient(135deg,#339af0,#1864ab)}
.ainote{font-size:11.5px; color:var(--sub); margin-top:8px; line-height:1.6}
.notice{
  font-size:12.5px; background:#e7f5ff; border:1px solid #a5d8ff; color:#1864ab;
  border-radius:10px; padding:9px 12px; line-height:1.6;
}
/* 토스트 */
#toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(80px);
  background:#212529; color:#fff; font-size:13.5px; padding:11px 22px; border-radius:24px;
  transition:transform .25s; z-index:99; box-shadow:0 6px 20px rgba(0,0,0,.3); max-width:90vw; text-align:center;
}
#toast.show{transform:translateX(-50%) translateY(0)}
/* 좁은 화면: 계보 레일을 가로 스크롤 띠로 */
@media (max-width:900px){
  #focusView{flex-direction:column}
  #lineage{width:auto; border-right:none; border-bottom:1px solid var(--line); padding:12px 14px;
    max-height:none; display:flex; gap:8px; overflow-x:auto; overflow-y:hidden; align-items:stretch}
  #lineage .lnBack{width:auto; margin:0; flex:none}
  #lineage .lnLabel, #lineage .lnArrow, #lineage .lnNone{display:none}
  .lnCard{margin:0; min-width:170px; flex:none}
  #brief{padding:0 16px}
}
/* 인쇄: 단원 브리핑 1장(간단히 보기 내용만) */
@media print{
  *{animation:none !important; transition:none !important}
  body{overflow:visible; height:auto}
  header, #browseView, #hubView, footer, .pbtns, .ai, .ainote, #miscView, .lnBack,
  .modeRow, .jumps, .qtools, .lvtabs{display:none !important}
  .d-only{display:none !important}          /* 자세히 전용 블록은 인쇄 제외 */
  #main{overflow:visible; display:block}
  #focusView{display:block !important; overflow:visible}
  #lineage{width:100%; border:none; padding:0 0 10px; overflow:visible}
  #briefWrap{overflow:visible; padding:0}
  #brief{max-width:100%; padding:0}
  .bGrid{display:block}
  .bCard{border:none; padding:0 0 10px; page-break-inside:avoid}
  .pTop{position:static; margin:0 0 10px; padding:0 0 8px; border-bottom:2px solid #212529}
  .sBlk, .limitBox, details{page-break-inside:avoid}
  .limitBox{background:#fff !important; border:1.5px solid #333 !important}
  .goalBox{background:#fff !important; border:1px solid #999}
  a[href]::after{content:''}
}
footer#app-credit{flex:none}
</style>
</head>
<body>
<header>
  <h1><span class="spiral">🌀</span>과학 나선 교육과정 지도</h1>
  <span class="tagline">2022 개정 · 초3 ~ 고3 전 과정</span>
  <button class="hbtn" id="homeBtn" onclick="goHub()" title="첫 화면으로">🏠 허브</button>
  <input id="q" type="search" placeholder="단원명·성취기준 코드·키워드 검색 (예: 빛, 4과01, 밀도)">
  <span id="qCount"></span>
  <button class="hbtn" id="miscBtn" onclick="openMisc()" title="모든 단원의 오개념 지도 포인트를 한 번에">⚠️ 오개념</button>
  <button class="hbtn" id="denseBtn" onclick="toggleDense()" title="지도를 조밀하게">⇕ 밀도</button>
  <a class="hbtn" href="about/" style="text-decoration:none" title="이 지도 소개 · 함께 만들기">🤝 소개</a>
  <button class="hbtn" id="clearBtn" onclick="clearFilters()" hidden>✕ 필터 해제</button>
  <div class="legend" id="legend"></div>
</header>

<div id="main">
  <!-- 허브: 첫 화면 -->
  <div id="hubView"><div class="hubWrap" id="hubBody"></div></div>
  <!-- 탐색 모드: 지도 전체 폭 -->
  <div id="browseView">
    <div id="hint"></div>
    <div id="mapWrap"><div id="mapInner">
      <svg id="wires"></svg>
      <div id="mapGrid"></div>
    </div></div>
  </div>
  <!-- 집중 모드: 계보 레일 + 넓은 브리핑 -->
  <div id="focusView" hidden>
    <aside id="lineage"></aside>
    <div id="briefWrap"><div id="brief"></div></div>
  </div>
</div>

<div id="miscView" onclick="if(event.target===this)closeMisc()">
  <div id="miscBox">
    <div class="mh">
      <h3>⚠️ 오개념 모아보기</h3>
      <span id="miscCount" style="font-size:12px;color:var(--sub)"></span>
      <input id="miscQ" class="hbtn" style="flex:1;min-width:140px;max-width:260px;border-radius:18px"
             placeholder="오개념 검색 (예: 무게, 광합성)" oninput="renderMisc()">
      <button class="hbtn" onclick="copyMisc()">📋 복사</button>
      <button class="hbtn" onclick="closeMisc()">✕ 닫기</button>
    </div>
    <div class="mb" id="miscBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const DATA = {"gradeNames":{"e34":"초등 3~4학년","e56":"초등 5~6학년","m13":"중학교 1~3학년","h1":"통합과학1 (고1)","h2":"통합과학2 (고1)","물리":"물리학 (고2~3)","화학":"화학 (고2~3)","생과":"생명과학 (고2~3)","지구":"지구과학 (고2~3)","역학":"역학과 에너지 (고2~3)","전자":"전자기와 양자 (고2~3)","물에":"물질과 에너지 (고2~3)","반응":"화학 반응의 세계 (고2~3)","세포":"세포와 물질대사 (고2~3)","유전":"생물의 유전 (고2~3)","지시":"지구시스템과학 (고2~3)","행우":"행성우주과학 (고2~3)","과사":"과학의 역사와 문화 (고2~3)","기환":"기후변화와 환경생태 (고2~3)","융탐":"융합과학 탐구 (고2~3)"},"subjects":{"물리":{"name":"물리학","area":"energy","track":"일반선택"},"화학":{"name":"화학","area":"matter","track":"일반선택"},"생과":{"name":"생명과학","area":"life","track":"일반선택"},"지구":{"name":"지구과학","area":"earth","track":"일반선택"},"역학":{"name":"역학과 에너지","area":"energy","track":"진로선택"},"전자":{"name":"전자기와 양자","area":"energy","track":"진로선택"},"물에":{"name":"물질과 에너지","area":"matter","track":"진로선택"},"반응":{"name":"화학 반응의 세계","area":"matter","track":"진로선택"},"세포":{"name":"세포와 물질대사","area":"life","track":"진로선택"},"유전":{"name":"생물의 유전","area":"life","track":"진로선택"},"지시":{"name":"지구시스템과학","area":"earth","track":"진로선택"},"행우":{"name":"행성우주과학","area":"earth","track":"진로선택"},"과사":{"name":"과학의 역사와 문화","area":"society","track":"융합선택"},"기환":{"name":"기후변화와 환경생태","area":"society","track":"융합선택"},"융탐":{"name":"융합과학 탐구","area":"society","track":"융합선택"}},"units":[{"id":"e34-01","grade":"e34","num":1,"title":"힘과 우리 생활","standards":[{"code":"4과01-01","text":"일상생활에서 힘과 관련된 현상에 흥미를 갖고, 물체를 밀거나 당길 때 나타나는 현상을 관찰할 수 있다."},{"code":"4과01-02","text":"수평잡기 활동을 통해 물체의 무게를 비교할 수 있다."},{"code":"4과01-03","text":"무게를 정확히 비교하기 위해서는 저울이 필요함을 알고, 저울을 사용해 무게를 비교할 수 있다."},{"code":"4과01-04","text":"지레, 빗면과 같은 도구를 이용하면 물체를 들어 올릴 때 드는 힘의 크기가 달라짐을 알고, 도구가 일상생활에서 어떻게 쓰이는지 조사하여 공유할 수 있다."}],"tamgu":["무거운 물체를 밀 때와 가벼운 물체를 밀 때의 특징 탐구하기"],"haeseol":[{"code":"4과01-01","text":"무거운 물체를 밀고 당길 때와 가벼운 물체를 밀고 당길 때 드는 힘의 크기를 느끼는 데 중점을 둔다."},{"code":"4과01-03","text":"무게와 질량을 구분하지 않으며 무게를 비교하는 단위로 g, ㎏을 사용한다."},{"code":"4과01-04","text":"지레, 빗면과 같은 간단한 도구를 이용할 때 힘의 크기가 달라진다는 점을 관찰하는 데 중점을 두며, 도구의 원리나 구조적 특성을 다루지 않는다."}],"goryeo":["초등학교 5∼6학년군 ‘물체의 운동’, 중학교 1∼3학년군 ‘힘의 작용’과 연계된다.","무게를 비교할 때는 용수철저울이나 전자저울 등을 사용하고, 분동을 사용하는 윗접시저울은 다루지 않는다.","조사한 내용을 공유할 때 사회 관계망 서비스 (SNS)를 활용할 수 있으며, 글과 그림으로 표현한 발표 자료 만들기를 할 수 있다."],"area":"energy","electives":[],"prev":[],"next":["e56-10","m13-05"],"related":[],"materials":[],"limits":["지레, 빗면과 같은 간단한 도구를 이용할 때 힘의 크기가 달라진다는 점을 관찰하는 데 중점을 두며, 도구의 원리나 구조적 특성을 다루지 않는다.","무게를 비교할 때는 용수철저울이나 전자저울 등을 사용하고, 분동을 사용하는 윗접시저울은 다루지 않는다."],"focus":[],"guide":[]},{"id":"e34-02","grade":"e34","num":2,"title":"동물의 생활","standards":[{"code":"4과02-01","text":"여러 가지 동물을 관찰하여 특징에 따라 동물을 분류할 수 있다."},{"code":"4과02-02","text":"다양한 환경에 서식하는 동물을 조사하여 동물의 생김새와 생활 방식이 환경과 관련되어 있음을 설명할 수 있다."},{"code":"4과02-03","text":"동물의 특징을 이용하여 일상생활에서 활용할 수 있는 생활용품을 설계하여 협력적으로 소 통 할 수 있다."}],"tamgu":["동물 분류 기준 정하기"],"haeseol":[{"code":"4과02-01","text":"동물의 형태적 특징을 찾고 그 특징에 따라 분류 기준을 정하여 분류하는 활동을 하도록 하며 생물학적 분류 체계는 다루지 않는다."},{"code":"4과02-02","text":"서식지에 따른 동물의 생김새와 생활 방식의 다양성을 다루고, 적응 개념은 다루지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘생물의 한살이’, ‘생물과 환경’, 5∼6학년군 ‘우리 몸의 구조와 기능’과 중학교 1∼3학년군 ‘생물의 구성과 다양성’, ‘동물과 에너지’와 연계된다.","‘동물의 생활’에서는 여러 가지 동물의 형태적 특징을 중심으로 관찰, 분류 활동을 한다."],"area":"life","electives":[],"prev":[],"next":["e56-04","m13-02","m13-13","m13-21"],"related":["e34-04","e34-12","e34-14"],"materials":[],"limits":["동물의 형태적 특징을 찾고 그 특징에 따라 분류 기준을 정하여 분류하는 활동을 하도록 하며 생물학적 분류 체계는 다루지 않는다.","서식지에 따른 동물의 생김새와 생활 방식의 다양성을 다루고, 적응 개념은 다루지 않는다."],"focus":[],"guide":[]},{"id":"e34-03","grade":"e34","num":3,"title":"식물의 생활","standards":[{"code":"4과03-01","text":"여러 가지 식물을 관찰하여 특징에 따라 식물을 분류할 수 있다."},{"code":"4과03-02","text":"다양한 환경에 서식하는 식물을 조사하여 식물의 생김새와 생활 방식이 환경과 관련되어 있음을 설명할 수 있다."},{"code":"4과03-03","text":"식물의 특징을 이용하여 일상생활에서 활용할 수 있는 생활용품을 설계하여 협력적으로 소 통 할 수 있다."}],"tamgu":["식물 분류 기준 정하기"],"haeseol":[{"code":"4과03-01","text":"여러 가지 식물의 잎을 채집해 생김새 등과 같은 외형적 특징에 따라 기준을 세워 분류하는 활동을 하며 생물학적 분류 체계는 다루지 않는다."},{"code":"4과03-02","text":"서식지에 따른 식물의 생김새와 생활 방식의 다양성을 다루고, 적응 개념은 다루지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘생물의 한살이’, ‘생물과 환경’, 5∼6학년군 ‘식물의 구조와 기능’과 중학교 1∼3학년군 ‘생물의 구성과 다양성’, ‘식물과 에너지’와 연계된다.","여러 가지 식물을 줄기, 잎, 꽃 등으로 분류 활동을 할 수 있으나, 주변에서 쉽게 구할 수 있는 식물의 잎을 대상으로 활동하도록 한다.","초등학교 5∼6학년군 ‘식물의 구조와 기능 ’에서 각 부위의 구조와 기능을 이해하는 데 중점을 두고 다루므로 ‘식물의 생활’에서는 여러 가지 식물의 잎을 중심으로 관찰, 분류 활동을 한다."],"area":"life","electives":[],"prev":[],"next":["e56-11","m13-02","m13-12"],"related":["e34-04","e34-12","e34-14"],"materials":[],"limits":["여러 가지 식물의 잎을 채집해 생김새 등과 같은 외형적 특징에 따라 기준을 세워 분류하는 활동을 하며 생물학적 분류 체계는 다루지 않는다.","서식지에 따른 식물의 생김새와 생활 방식의 다양성을 다루고, 적응 개념은 다루지 않는다."],"focus":["초등학교 5∼6학년군 ‘식물의 구조와 기능 ’에서 각 부위의 구조와 기능을 이해하는 데 중점을 두고 다루므로 ‘식물의 생활’에서는 여러 가지 식물의 잎을 중심으로 관찰, 분류 활동을 한다."],"guide":[]},{"id":"e34-04","grade":"e34","num":4,"title":"생물의 한살이","standards":[{"code":"4과04-01","text":"동물의 한살이를 직접 관찰하고, 관찰한 내용을 글과 그림으로 표현할 수 있다."},{"code":"4과04-02","text":"식물이 자라는 데 필요한 조건을 찾는 실험을 설계하여 수행할 수 있다."},{"code":"4과04-03","text":"생물의 한살이 과정을 조사하여 생물에 따라 한살이의 유형이 다양함을 소개하는 자료를 만들어 공유할 수 있다."}],"tamgu":["곤충의 한살이 관찰하기"],"haeseol":[{"code":"4과04-02","text":"씨가 싹트는데 필요한 조건은 물과 온도로 한정하고, 식물이 자라는데 필요한 조건은 물과 햇빛으로 제한한다."},{"code":"4과04-03","text":"한살이의 유형을 이해하는 생물의 범위는 동물과 식물에 한정하여 다루고, 식물의 한살이 유형은 한해살이와 여러해살이로 구분하여 이해하도록 한다."}],"goryeo":["초등학교 3∼4학년군 ‘동물의 생활’, ‘식물의 생활’, ‘생물과 환경’, 5∼6학년군 ‘식물의 구조와 기능’, ‘우리 몸의 구조와 기능’, 중학교 1∼3학년군 ‘식물과 에너지’, ‘동물과 에너지’와 연계된다.","동물의 한살이 관찰을 위해서는 주변에서 쉽게 구할 수 있으며, 한살이 기간이 짧은 동물(예: 배추흰나비)을 선택하는 것이 좋다.","동물의 한살이 관찰을 통하여 동물에 대한 관심과 호기심을 증대시키는 것도 중요한 목표이므로 동물을 직접 관찰하는 활동을 권장하며, 보조 학습 자료로 동영상이나 누리망을 활용할 수 있다. 다양한 도구를 활용하여 글과 그림으로 한살이를 표현해 보도록 지도할 수 있다.","동물의 한살이 관찰에는 시간이 많이 소요되므로 학습이 시작되기 전에 관찰 대상을 미리 준비해야 하며, 교수⋅학습 전개 시 수업 차시에 따라 연속하여 진행하기에는 무리가 있으므로 동물의 한살이 정도에 맞추어 융통성 있게 수업 시간을 재구성하는 것이 좋다."],"area":"life","electives":[],"prev":[],"next":["e56-04","e56-11","m13-12","m13-13","m13-21"],"related":["e34-02","e34-03","e34-14"],"materials":[],"limits":["씨가 싹트는데 필요한 조건은 물과 온도로 한정하고, 식물이 자라는데 필요한 조건은 물과 햇빛으로 제한한다.","한살이의 유형을 이해하는 생물의 범위는 동물과 식물에 한정하여 다루고, 식물의 한살이 유형은 한해살이와 여러해살이로 구분하여 이해하도록 한다."],"focus":[],"guide":[]},{"id":"e34-05","grade":"e34","num":5,"title":"물체와 물질","standards":[{"code":"4과05-01","text":"물체를 이루는 여러 가지 물질의 성질을 비교하고, 물질의 종류에 따라 물체를 분류할 수 있다."},{"code":"4과05-02","text":"물질의 세 가지 상태인 고체, 액체, 기체의 성질을 관찰하여 비교할 수 있다."},{"code":"4과05-03","text":"다양한 물질의 성질을 이용하여 쓰임새 있는 물체를 설계할 수 있다."}],"tamgu":["용기에 따른 고체와 액체의 모양과 부피 변화 관찰하기","기체가 공간을 차지하고 있음을 알아보는 실험하기"],"haeseol":[{"code":"4과05-01","text":"나무, 철, 유리, 플라스틱 등 학생들이 일상생활에서 쉽게 접할 수 있는 물질의 다양한 성질을 관찰하고 비교하는 활동에 중점을 두고, 이를 바탕으로 여러 가지 물체를 물질의 종류에 따라 분류하도록 한다."},{"code":"4과05-02","text":"물질의 세 가지 상태인 고체, 액체, 기체의 성질을 관찰하고 비교하는 활동에 중점을 두고, 한 가지 물질이 여러 가지 상태로 존재한다는 것은 다루지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘물의 상태 변화 ’, ‘ 여러 가지 기체 ’, 5∼6학년군 ‘혼합물의 분리’, 중학교 1∼3학년군 ‘물질의 특성’과 연계된다.","일상생활에서 사용할 수 있는 물체를 기초적인 아이디어 수준에서 설계하며, 물체의 쓰임새에 적합한 성질을 지닌 물질을 이용하는 데 중점을 두고 지도한다."],"area":"matter","electives":[],"prev":[],"next":["e56-05","e56-09","e56-14","m13-08","m13-16"],"related":["e34-10","e34-15"],"materials":[],"limits":["물질의 세 가지 상태인 고체, 액체, 기체의 성질을 관찰하고 비교하는 활동에 중점을 두고, 한 가지 물질이 여러 가지 상태로 존재한다는 것은 다루지 않는다."],"focus":["나무, 철, 유리, 플라스틱 등 학생들이 일상생활에서 쉽게 접할 수 있는 물질의 다양한 성질을 관찰하고 비교하는 활동에 중점을 두고, 이를 바탕으로 여러 가지 물체를 물질의 종류에 따라 분류하도록 한다.","일상생활에서 사용할 수 있는 물체를 기초적인 아이디어 수준에서 설계하며, 물체의 쓰임새에 적합한 성질을 지닌 물질을 이용하는 데 중점을 두고 지도한다."],"guide":[]},{"id":"e34-06","grade":"e34","num":6,"title":"지구와 바다","standards":[{"code":"4과06-01","text":"지구가 대기로 둘러싸여 있음을 알고, 지구 표면을 구성하는 육지와 바다의 특징을 비교할 수 있다."},{"code":"4과06-02","text":"바닷물의 특징을 육지의 물과 비교하고, 바닷가에서 볼 수 있는 다양한 지형을 조사할 수 있다."},{"code":"4과06-03","text":"밀물과 썰물의 차이를 알고, 갯벌의 가치와 보전의 필요성을 설득⋅홍보할 수 있다."}],"tamgu":["지구의 육지와 바다 면적 비교하기","육지의 물과 바닷물을 가열하여 남는 물질 탐구하기"],"haeseol":[{"code":"4과06-02","text":"바닷물의 침식, 운반, 퇴적 작용에 대해서는 다루지 않는다."},{"code":"4과06-03","text":"밀물과 썰물은 바닷물의 높이 변화를 다루는 수준이며, 조석 용어와 원인에 대해서는 다루지 않는다."}],"goryeo":["초등학교 5∼6학년군 ‘날씨와 우리 생활’, 중학교 1∼3학년군 ‘날씨와 기후변화’, ‘수권과 해수의 순환’과 연계된다.","여행에서 촬영한 사진 자료나 스마트 기기를 활용하여 육지와 바다의 다양한 모습과 지형을 탐색하여 수업에 활용할 수 있다.","지구의 물은 바닷물과 육지의 물로 구분하며, 지구 표면에서 바다가 차지하는 비율은 정성적으로 다룬다. 지구의 육지와 바다 면적을 시각적으로 비교할 수 있는 자료를 활용할 수 있다.","육지의 물과 바닷물을 가열할 때는 끓임쪽을 넣고 가열하는 등 안전에 유의한다.","우리나라의 대표적인 갯벌의 위치, 갯벌에 사는 생물의 다양성, 갯벌 보전의 필요성을 알아보는 활동을 통해 환경과 생명의 가치를 알고 생태감수성을 기르도록 한다."],"area":"earth","electives":[],"prev":[],"next":["e56-06","m13-17","m13-18"],"related":[],"materials":[],"limits":["바닷물의 침식, 운반, 퇴적 작용에 대해서는 다루지 않는다.","밀물과 썰물은 바닷물의 높이 변화를 다루는 수준이며, 조석 용어와 원인에 대해서는 다루지 않는다."],"focus":[],"guide":[]},{"id":"e34-07","grade":"e34","num":7,"title":"소리의 성질","standards":[{"code":"4과07-01","text":"여러 가지 물체를 이용하여 소리를 내보고, 소리가 나는 물체는 떨림이 있음을 설명할 수 있다."},{"code":"4과07-02","text":"큰 소리와 작은 소리, 높은 소리와 낮은 소리를 구분하고, 세기와 높낮이가 다른 소리를 낼 수 있다."},{"code":"4과07-03","text":"여러 가지 물질을 통하여 소리가 전달되는 것을 관찰하고, 소음을 줄이는 방법을 찾아 일상생활에서 실천할 수 있다."}],"tamgu":["소리가 나는 소리굽쇠의 떨림 관찰하기","물체의 길이에 따른 소리의 높낮이 비교하기"],"haeseol":[{"code":"4과07-03","text":"소리가 여러 가지 물질을 통해 전달되는 현상을 관찰하는 데 중점을 두며, 소리 전달의 과학적 원리는 다루지 않도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘빛과 파동’과 연계된다.","소리를 관찰하기 위해 청각뿐만 아니라 시각, 촉각 등의 다양한 감각을 활용할 수 있도록 한다.","큰 소리로 인해 청각이 손상될 수 있으므로 안전에 유의한다.","소리의 세기와 높낮이를 탐구할 때 디지털 탐구 도구를 활용할 수 있다.","소음을 줄이는 방법을 찾아 실천해 봄으로써 공동체의 문제 해결에 참여하는 민주 시민으로서의 소양을 기르되, 소리 자체에 대한 부정적 인식이 형성되지 않도록 유의한다."],"area":"energy","electives":[],"prev":[],"next":["m13-10"],"related":[],"materials":[],"limits":["소리가 여러 가지 물질을 통해 전달되는 현상을 관찰하는 데 중점을 두며, 소리 전달의 과학적 원리는 다루지 않도록 한다."],"focus":[],"guide":[]},{"id":"e34-08","grade":"e34","num":8,"title":"감염병과 건강한 생활","standards":[{"code":"4과08-01","text":"생활 속 감염병의 사례를 알고, 다양한 질병과 그 위험성에 대해 토의할 수 있다."},{"code":"4과08-02","text":"감염병으로부터 안전한 사회에 관심을 가지고, 여러 감염 과정을 통해 생활 습관과 감염병 유행과의 연관성을 설명할 수 있다."},{"code":"4과08-03","text":"건강한 생활을 위해 필요한 감염병 예방 수칙을 공유하고, 생활 속에서 실천할 수 있다."}],"tamgu":["감염 과정과 감염병 예방 방법 탐구하기"],"haeseol":[{"code":"4과08-01","text":"질병은 예방접종이나 범유행 상황 등 학생이 경험하거나 인지할 수 있는 생활 속 질병을 다룬다."},{"code":"4과08-02","text":"감염 과정은 생활 습관과 관련지을 수 있는 접촉 감염, 비말 감염, 공기 감염, 수인 감염, 타액 감염 등의 사례로 한정하여 다루며, 감염병의 특성과 면역 반응을 구체적으로 다루지 않는다."}],"goryeo":["중학교 1∼3학년군 ‘재해⋅재난과 안전’과 연계된다.","예방접종의 경험이나 범유행 상황 등을 통해 생활 속에서 다양한 감염 사례가 있음을 인식할 수 있도록 한다.","다양한 감염 과정을 놀이, 역할극, 그림, 표, 책 만들기 공예 등 다양한 시각화 방법을 통해 표현할 수 있다. 단, 단순한 표현 활동보다는 생활 속 습관과 감염병 유행과의 연관성을 탐구하도록 지도한다.","건강한 생활을 위해 지켜야 하는 수칙은 감염 과정과 생활 습관을 관련지어 학생들이 실천 가능한 수준으로 제시하도록 한다."],"area":"society","electives":[],"prev":[],"next":["m13-22"],"related":[],"materials":[],"limits":["감염 과정은 생활 습관과 관련지을 수 있는 접촉 감염, 비말 감염, 공기 감염, 수인 감염, 타액 감염 등의 사례로 한정하여 다루며, 감염병의 특성과 면역 반응을 구체적으로 다루지 않는다."],"focus":[],"guide":[]},{"id":"e34-09","grade":"e34","num":9,"title":"자석의 이용","standards":[{"code":"4과09-01","text":"자석과 여러 가지 물체를 가까이했을 때 나타나는 현상을 관찰하고, 자석과 자석에 붙는 물체 사이에 작용하는 힘의 특징을 말할 수 있다."},{"code":"4과09-02","text":"자석과 자석을 가까이했을 때 나타나는 현상을 관찰하여 그 특징을 자석의 극과 관련지어 설 명 할 수 있다."},{"code":"4과09-03","text":"자석을 이용하여 일상생활을 편리하게 하는 장치를 설계할 수 있다."}],"tamgu":["자석의 극을 찾고 서로 같은 극과 다른 극을 가까이했을 때의 특징 비교하기","나침반과 자석을 가까이했을 때 나타나는 현상 관찰하기"],"haeseol":[{"code":null,"text":"[4과09-01∼02] 자석과 물체, 자석과 자석 사이의 상호작용을 다루되, 자기장의 개념은 도입하지 않는다."}],"goryeo":["초등학교 5∼6학년군 ‘전기의 이용’, 중학교 1∼3학년군 ‘전기와 자기’와 연계된다.","자석을 이용한 장치 설계하기 활동은 학습한 자석의 성질을 이용하여 생활을 편리하게 만드는 장치를 구상해볼 수 있도록 하기 위한 것으로, 설계한 것이 반드시 만들기로 이어져야 함을 의미하는 것은 아니다."],"area":"energy","electives":[],"prev":[],"next":["e56-15","m13-14"],"related":[],"materials":["나침반","자석"],"limits":[],"focus":[],"guide":["[4과09-01∼02] 자석과 물체, 자석과 자석 사이의 상호작용을 다루되, 자기장의 개념은 도입하지 않는다."]},{"id":"e34-10","grade":"e34","num":10,"title":"물의 상태 변화","standards":[{"code":"4과10-01","text":"물이 세 가지 상태로 변할 수 있음을 알고, 우리 주변에서 예를 찾을 수 있다."},{"code":"4과10-02","text":"물이 얼 때, 얼음이 녹을 때, 물이 증발할 때와 끓을 때, 수증기가 응결할 때의 변화를 관 찰 할 수 있다."},{"code":"4과10-03","text":"물의 상태 변화를 이용하여 물을 얻을 수 있는 장치를 설계하고 만들 수 있다."}],"tamgu":["물이 얼 때와 얼음이 녹을 때의 무게와 부피 변화 관찰하기","물이 증발할 때와 끓을 때의 특징 관찰하기","얼음이 든 비커의 바깥 면 관찰하기"],"haeseol":[{"code":"4과10-01","text":"물의 상태 변화는 관찰 가능한 현상 수준에서만 다루고, 물의 상태가 변하는 까닭은 다루지 않는다."},{"code":"4과10-02","text":"물이 얼 때와 얼음이 녹을 때의 부피 변화는 물기둥의 높이 변화로 관찰하도록 한다. 물의 증발과 끓음을 비교할 때는 물이 수증기로 상태가 변하는 현상이라는 공통점에 중점을 둔다."}],"goryeo":["초등학교 3∼4학년군 ‘물체와 물질’, 중학교 1∼3학년군 ‘물질의 상태 변화’와 연계된다.","실험 전에 학생들에게 물을 가열하거나 얼음을 다룰 때 주의할 점과 안전사고 대처 방법을 지도한다.","생태전환교육과 연계하여 물의 중요성과 물 부족 현상을 다룬다. 물을 얻는 여러 가지 사례나 장치를 조사하고, 이를 바탕으로 물을 얻을 수 있는 장치를 창의적으로 고안하도록 한다.","물을 얻을 수 있는 장치를 설계할 때는 물의 상태 변화를 이용하는 데 중점을 두고, 우리 주변에서 쉽게 구할 수 있는 재료를 이용하여 간단한 장치를 만드는 수준에서 지도한다."],"area":"matter","electives":[],"prev":[],"next":["e56-07","m13-04"],"related":["e34-05"],"materials":["비커"],"limits":["물의 상태 변화는 관찰 가능한 현상 수준에서만 다루고, 물의 상태가 변하는 까닭은 다루지 않는다."],"focus":["물을 얻을 수 있는 장치를 설계할 때는 물의 상태 변화를 이용하는 데 중점을 두고, 우리 주변에서 쉽게 구할 수 있는 재료를 이용하여 간단한 장치를 만드는 수준에서 지도한다."],"guide":[]},{"id":"e34-11","grade":"e34","num":11,"title":"땅의 변화","standards":[{"code":"4과11-01","text":"흐르는 물의 작용과 강 주변 지형의 특징을 관련지을 수 있다."},{"code":"4과11-02","text":"화산의 의미와 화산 활동으로 나오는 물질을 알고, 화산 활동을 모형으로 표현할 수 있다."},{"code":"4과11-03","text":"화성암을 관찰하고 분류할 수 있다."},{"code":"4과11-04","text":"화산 활동과 지진이 우리 생활에 미치는 영향을 조사하여, 대 처 방법을 실천할 수 있다."}],"tamgu":["흙 언덕을 만들고 물을 흘려보낸 후, 깎이는 곳과 쌓이는 곳 관찰하기","지진의 피해 사례를 조사하고 대처 방법 탐구하기"],"haeseol":[{"code":"4과11-01","text":"강 주변 지형은 흐르는 물에 의한 침식, 운반, 퇴적 작용을 중심으로 다룬다."},{"code":"4과11-02","text":"화산 활동과 화산 분출물을 중심으로 학습한다."},{"code":"4과11-03","text":"화성암은 현무암과 화강암만 다룬다."},{"code":"4과11-04","text":"화산 활동의 피해와 이로운 점을 함께 다루며, 지진 발생 원인은 다루지 않는다."}],"goryeo":["초등학교 5∼6학년군 ‘지층과 화석’, 중학교 1∼3학년군 ‘지권의 변화’와 연계된다.","휴화산이나 활화산과 같은 화산의 상태에 대해서는 다루지 않으며, 화산과 화산이 아닌 산을 비교하여 화산의 의미를 살펴볼 수 있다.","학생들이 화산 활동과 지진을 직접 관찰하기 어려우므로, 화산 활동이나 지진과 관련된 영상을 스마트 기기로 조사하는 활동이 필요하다.","화산 활동을 모형실험으로 지도하는 경우 안전사고가 발생하지 않도록 유의하며, 실제 화산 활동과 모형실험의 공통점과 차이점을 비교할 수 있다."],"area":"earth","electives":[],"prev":[],"next":["e56-01","m13-09"],"related":[],"materials":[],"limits":["화산 활동의 피해와 이로운 점을 함께 다루며, 지진 발생 원인은 다루지 않는다.","휴화산이나 활화산과 같은 화산의 상태에 대해서는 다루지 않으며, 화산과 화산이 아닌 산을 비교하여 화산의 의미를 살펴볼 수 있다."],"focus":[],"guide":[]},{"id":"e34-12","grade":"e34","num":12,"title":"다양한 생물과 우리 생활","standards":[{"code":"4과12-01","text":"균류⋅원생생물⋅세균을 관찰하여 특징과 사는 곳을 설명할 수 있다."},{"code":"4과12-02","text":"균류⋅원생생물⋅세균이 우리 생활에 미치는 영향을 조사하여 발표할 수 있다."},{"code":"4과12-03","text":"우리 생활에 생명과학이 이용되는 사례를 소개하는 자료를 만들어 공유할 수 있다."}],"tamgu":["버섯과 곰팡이 관찰하기"],"haeseol":[{"code":"4과12-03","text":"우리 생활에 생명과학이 이용되는 사례는 균류, 원생생물, 세균을 중심으로 학생들이 생활 속에서 경험하고 인지할 수 있는 수준으로 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘동물의 생활’, ‘식물의 생활’, ‘생물과 환경’과 중학교 1∼3학년군 ‘생물의 구성과 다양성’과 연계된다.","주변에서 쉽게 구할 수 있는 버섯, 곰팡이, 해캄, 짚신벌레를 디지털현미경이나 실체현미경 등 학생들이 다룰 수 있는 다양한 도구를 사용하여 직접 관찰하도록 하고, 지역의 특성에 따라 관찰 가능한 소재로 변경하여 다룰 수 있다.","세균은 사진 자료나 동영상 자료 등을 활용하여 관찰할 수 있게 한다.","세균이나 곰팡이 등이 우리 생활에 미치는 영향이나 생명과학의 이용 사례는 실생활에 많이 반영된 자료들을 중심으로 한다.","우리 생활에 생명과학이 이용되는 사례는 관련 도서와 누리망 자료를 활용하고, 발표 자료를 만들고 공유하는 활동은 디지털 소양 교육과 연계하여 지도할 수 있다."],"area":"life","electives":[],"prev":[],"next":["m13-02"],"related":["e34-02","e34-03","e34-14"],"materials":[],"limits":[],"focus":[],"guide":["우리 생활에 생명과학이 이용되는 사례는 균류, 원생생물, 세균을 중심으로 학생들이 생활 속에서 경험하고 인지할 수 있는 수준으로 다룬다."]},{"id":"e34-13","grade":"e34","num":13,"title":"밤하늘 관찰","standards":[{"code":"4과13-01","text":"달의 모양과 표면, 달의 위상변화를 관찰하여 밤하늘 관찰에 흥미를 가질 수 있다."},{"code":"4과13-02","text":"태양계 구성원을 알고, 태양과 행성을 조사할 수 있다."},{"code":"4과13-03","text":"별의 정의를 알고, 북극성 주변의 별자리를 관찰할 수 있다."}],"tamgu":["여러 날 동안 보이는 달의 모양 관찰하기","태양계 행성 모형 만들기"],"haeseol":[{"code":"4과13-01","text":"달의 위상변화 원인을 다루지 않고, 달의 모양이 주기적으로 바뀌는 현상을 관찰하여 확인하는 데 초점을 둔다."},{"code":"4과13-02","text":"태양계를 구성하는 행성들의 표면적인 특징 위주로 조사하고, 태양과 행성의 실제 크기나 태양에서 행성까지의 실제 거리, 행성의 질량, 자전 속도, 대기 성분 등과"},{"code":null,"text":"해캄과 짚신벌레 관찰하기같은 구체적인 물리량은 다루지 않는다."},{"code":"4과13-03","text":"별의 정의는 행성과 비교하여 스스로 빛을 내는 천체라는 수준에서만 다룬다. 별자리는 학생들이 쉽게 관찰할 수 있는 북극성 주변의 별자리를 다루며, 계절별 별자리와 관련짓지 않는다."}],"goryeo":["초등학교 5∼6학년군 ‘지구의 운동’, ‘계절의 변화’, 중학교 1∼3학년군 ‘태양계’, ‘별과 우주’와 연계된다.","여러 날 동안 달의 모양 변화 등은 관찰 시기와 방법을 안내한 후 관찰하도록 한다.","모형이나 시청각 자료, 천체 관측 프로그램 등을 이용하여 천체에 대한 호기심을 유도하고 공간적 이해를 도울 수 있다.","야간에 달, 행성, 별 등을 관찰할 경우 안전 사항을 준수하도록 한다."],"area":"earth","electives":[],"prev":[],"next":["e56-12","e56-13","m13-07","m13-15"],"related":[],"materials":[],"limits":["달의 위상변화 원인을 다루지 않고, 달의 모양이 주기적으로 바뀌는 현상을 관찰하여 확인하는 데 초점을 둔다.","해캄과 짚신벌레 관찰하기같은 구체적인 물리량은 다루지 않는다."],"focus":[],"guide":[]},{"id":"e34-14","grade":"e34","num":14,"title":"생물과 환경","standards":[{"code":"4과14-01","text":"생태계의 구성 요소를 조사하여 생물 요소와 비생물 요소로 분류할 수 있다."},{"code":"4과14-02","text":"생물 요소들의 먹고 먹히는 관계를 조사하여 먹이그물로 표현할 수 있다."},{"code":"4과14-03","text":"인간 활동이 생태계에 미치는 영향을 조사하고, 생태계 보전을 위해 우리가 할 수 있는 일을 토의하여 실천할 수 있다."}],"tamgu":["양분을 얻는 방법에 따라 생물 요소 분류하기","먹이 관계 모형 만들기"],"haeseol":[{"code":"4과14-01","text":"숲, 바다, 강 등 다양한 생태계를 다루고, 각 생태계에서 생물 요소와 비생물 요소를 분류할 수 있게 한다."},{"code":"4과14-02","text":"생태계에서 다양한 먹이 관계를 알아보고 먹이 관계가 복잡할수록 생물이 생존하는 데 유리함을 이해하게 한다."},{"code":"4과14-03","text":"대기오염, 수질오염, 토양오염 등의 환경오염에 관한 사례를 중심으로 다루고, 생태계 보전을 위해 우리가 해야 할 일을 조사하여 실천함으로써 생태계 보전에 대한 의식을 가지게 한다."}],"goryeo":["초등학교 3∼4학년군 ‘동물의 생활’, ‘식물의 생활’, ‘생물의 한살이’, ‘다양한 생물과 우리 생활’과 중학교 1∼3학년군 ‘생물의 구성과 다양성’과 연계된다.","먹이사슬 놀이, 먹이그물 모형 만들기 등과 같은 모의 활동을 통하여 생태계의 구성 요소들이 상호 관련되어 있음을 인식하게 한다.","생태전환교육과 연계하여 생태계 보전 또는 복원을 위한 활동을 학생 스스로 계획하고 실천함으로써 생태계 보전과 관련한 문제해결력을 기르도록 지도할 수 있다."],"area":"life","electives":[],"prev":[],"next":["m13-02"],"related":["e34-02","e34-03","e34-04","e34-12"],"materials":[],"limits":[],"focus":[],"guide":["숲, 바다, 강 등 다양한 생태계를 다루고, 각 생태계에서 생물 요소와 비생물 요소를 분류할 수 있게 한다.","생태계에서 다양한 먹이 관계를 알아보고 먹이 관계가 복잡할수록 생물이 생존하는 데 유리함을 이해하게 한다."]},{"id":"e34-15","grade":"e34","num":15,"title":"여러 가지 기체","standards":[{"code":"4과15-01","text":"실험을 통해 기체가 무게가 있음을 설명할 수 있다."},{"code":"4과15-02","text":"온도나 압력에 따라 기체의 부피가 달라지는 현상을 관찰하고, 우리 주변에서 예를 찾을 수 있다."},{"code":"4과15-03","text":"일상생활에서 이용되는 기체의 종류와 성질을 조사하고, 여러 가지 기체에 대해 흥미를 느 낄 수 있다."},{"code":"4과15-04","text":"기체의 성질을 이용하여 작동시킬 수 있는 장치를 설계하고 만들 수 있다."}],"tamgu":["공기를 넣거나 뺄 때의 무게 변화 관찰하기","온도나 압력에 따른 기체의 부피 변화 관찰하기"],"haeseol":[{"code":"4과15-01","text":"부피가 같은 용기에 공기를 1기압으로 담은 상태와 이 상태에서 공기를 넣거나 뺀 상태의 무게를 비교하는 실험을 바탕으로 기체가 무게가 있음을 설명한다."},{"code":"4과15-02","text":"온도를 높일 때와 낮출 때 공기의 부피 변화, 압력을 높일 때와 낮출 때 공기의 부피 변화를 관찰하도록 한다. 온도나 압력에 따라 기체의 부피가 어떻게 변하는지를 정성적으로 이해하도록 하고, 입자 모형으로 기체의 부피가 변하는 까닭은 설명하지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘물체와 물질’, 중학교 1∼3학년군 ‘기체의 성질’과 연계된다.","질소, 산소, 이산화 탄소 등 여러 가지 기체의 성질과 일상생활 속 이용 사례를 조사하여 발표하도록 지도한다.","장치를 작동시키는 기체로는 공기를 사용하고, 장치를 평가할 때는 기체의 어떤 성질을 이용했는지에 중점을 둔다."],"area":"matter","electives":[],"prev":[],"next":["e56-14","m13-06"],"related":["e34-05"],"materials":[],"limits":[],"focus":[],"guide":["부피가 같은 용기에 공기를 1기압으로 담은 상태와 이 상태에서 공기를 넣거나 뺀 상태의 무게를 비교하는 실험을 바탕으로 기체가 무게가 있음을 설명한다.","온도를 높일 때와 낮출 때 공기의 부피 변화, 압력을 높일 때와 낮출 때 공기의 부피 변화를 관찰하도록 한다. 온도나 압력에 따라 기체의 부피가 어떻게 변하는지를 정성적으로 이해하도록 하고, 입자 모형으로 기체의 부피가 변하는 까닭은 설명하지 않는다."]},{"id":"e34-16","grade":"e34","num":16,"title":"기후변화와 우리 생활","standards":[{"code":"4과16-01","text":"기후변화 현상의 예를 알고, 기후변화가 인간의 활동과 관련되어 있음을 토의할 수 있다."},{"code":"4과16-02","text":"기후변화의 심각성에 관심을 가지고, 기후변화가 우리 생활과 환경에 미치는 영향을 설명 할 수 있다."},{"code":"4과16-03","text":"기후변화 대응 방법을 조사하고, 생활 속에서 기후변화 대응 방법을 실천할 수 있다."}],"tamgu":["해수면 상승으로 인한 피해 모형실험하기"],"haeseol":[{"code":"4과16-01","text":"기후변화의 과학적 원인은 다루지 않으며 기온, 강수량 등 기후요소가 평년값에 비해 현저히 높거나 낮은 사례(가뭄, 폭설, 폭염, 한파, 홍수 등)를 탐구하도록 한다."},{"code":"4과16-02","text":"인간의 삶에 부정적인 영향을 미치는 기후변화 현상의 사례를 모형이나 실험 활동을 통해 알아보고, 이에 기반하여 기후변화로 인한 인간의 피해를 예측하고 설명할 수 있도록 한다."}],"goryeo":["초등학교 5∼6학년군 ‘날씨와 우리 생활’, 중학교 1∼3학년군 ‘날씨와 기후변화’, ‘재해⋅재난과 안전’과 연계된다.","기후라는 용어를 설명하는 데 중점을 두기보다는 기후변화의 사례를 주로 다룬다.","기후변화에 대응하는 방법은 기후변화로 인한 자연환경의 변화를 인간이 완화하는 방안, 혹은 변화에 적응하는 방안으로 생각해볼 수 있으나, 이를 구분하여 지도하지 않도록 한다.","기후변화가 우리 생활과 환경에 끼치는 영향을 학습하면서 지나친 불안감이나 무기력함을 느끼기보다는 기후위기를 해결하기 위한 진취적인 실천 의지를 다지도록 한다."],"area":"society","electives":[],"prev":[],"next":["e56-06","m13-01","m13-17","m13-22"],"related":[],"materials":[],"limits":["기후변화의 과학적 원인은 다루지 않으며 기온, 강수량 등 기후요소가 평년값에 비해 현저히 높거나 낮은 사례(가뭄, 폭설, 폭염, 한파, 홍수 등)를 탐구하도록 한다."],"focus":["기후라는 용어를 설명하는 데 중점을 두기보다는 기후변화의 사례를 주로 다룬다."],"guide":[]},{"id":"e56-01","grade":"e56","num":1,"title":"지층과 화석","standards":[{"code":"6과01-01","text":"지층의 특징을 알고, 지층의 형성 과정을 모형으로 표현할 수 있다."},{"code":"6과01-02","text":"지층이 퇴적암으로 이루어짐을 알고, 퇴적암을 알갱이의 크기에 따라 분류할 수 있다."},{"code":"6과01-03","text":"화석의 생성 과정을 모형으로 설명하고, 지구의 과거 생물과 환경을 추리하는 활동을 통해 화석의 가치를 인식할 수 있다."}],"tamgu":["이암, 사암, 역암 관찰하기","화석을 관찰하고 화석 모형 만들기"],"haeseol":[{"code":"6과01-01","text":"지층의 두께나 색 등을 다루고, 지층이 휘어지거나 끊어진 모습을 소개하되 생성 원리는 다루지 않는다."},{"code":"6과01-02","text":"퇴적암은 이암, 사암, 역암만 다룬다."},{"code":"6과01-03","text":"화석 표본은 동물과 식물의 특징이 분명하게 드러나는 것을 사용한다."}],"goryeo":["초등학교 3∼4학년군 ‘땅의 변화’, 중학교 1∼3학년군 ‘지권의 변화’와 연계된다.","여러 가지 지층, 퇴적암, 화석 등을 관찰하여 그 특징을 찾아 생성 과정을 추리하는 활동이 필요하다. 이때, 학생들이 직접 조사한 자료를 활용할 수 있다. 학생들이 박물관에서 찍은 사진이나 여행지에서 찍은 사진을 이용하여 관련 특징을 설명하면 학습 효과를 높일 수 있을 것이다.","디지털 소양 교육과 관련하여 실감형 자료를 활용한 화석 관찰도 가능하다."],"area":"earth","electives":[],"prev":["e34-11"],"next":["m13-09"],"related":[],"materials":[],"limits":["지층의 두께나 색 등을 다루고, 지층이 휘어지거나 끊어진 모습을 소개하되 생성 원리는 다루지 않는다."],"focus":[],"guide":[]},{"id":"e56-02","grade":"e56","num":2,"title":"빛의 성질","standards":[{"code":"6과02-01","text":"물체를 보기 위해서 빛이 있어야 함을 알고, 빛의 성질에 대해 흥미를 느낄 수 있다."},{"code":"6과02-02","text":"빛이 나아가는 현상을 관찰하여 빛이 직진, 반사, 굴절하는 성질이 있음을 말할 수 있다."},{"code":"6과02-03","text":"거울과 렌즈의 쓰임새를 조사하고 거울이나 렌즈를 이용한 장치를 창의적으로 만들 수 있다."}],"tamgu":["어둠상자 속의 물체 관찰하기","평면거울에서 빛의 반사 실험하기"],"haeseol":[{"code":"6과02-02","text":"빛이 직진, 반사, 굴절하는 성질은 햇빛이나 레이저 광선의 진행으로 나타나는 현상을 관찰하여 알 수 있도록 하되, 반사와 굴절의 법칙은 다루지 않는다. 또, 볼록렌즈와 물체 사이의 거리, 볼록렌즈와 눈 사이의 거리에 따른 물체의 모습 차이는 다루지 않는다."}],"goryeo":["중학교 1∼3학년군 ‘빛과 파동’과 연계된다.","물체를 보기 위해서는 빛이 필요하며 빛이 없을 때 불편한 점을 과학 글쓰기, 그림 그리기, 역할 놀이 등의 다양한 활동으로 융합하여 전개할 수 있다.","빛의 직진, 반사, 굴절 현상을 관찰할 때 컴퓨터 시뮬레이션, 가상 현실, 증강 현실 등을 이용하여 관찰을 보조할 수 있다."],"area":"energy","electives":[],"prev":[],"next":["m13-10"],"related":[],"materials":["평면거울"],"limits":["빛이 직진, 반사, 굴절하는 성질은 햇빛이나 레이저 광선의 진행으로 나타나는 현상을 관찰하여 알 수 있도록 하되, 반사와 굴절의 법칙은 다루지 않는다.","또, 볼록렌즈와 물체 사이의 거리, 볼록렌즈와 눈 사이의 거리에 따른 물체의 모습 차이는 다루지 않는다."],"focus":[],"guide":[]},{"id":"e56-03","grade":"e56","num":3,"title":"용해와 용액","standards":[{"code":"6과03-01","text":"용해 현상의 의미를 알고, 용질의 종류와 물의 온도에 따라 물에 녹는 용질의 양이 달라짐 을 비교할 수 있다."},{"code":"6과03-02","text":"용질이나 용매의 양에 따라 용액의 진하기가 달라짐을 관찰하고, 용액의 상대적인 진하기 를 비교할 수 있다."},{"code":"6과03-03","text":"일상생활에서 용액이 쓰이는 사례를 조사하여 용액의 필요성을 알리는 자료를 만들고 공유 할 수 있다."}],"tamgu":["용해 전과 후의 무게 측정하기","물에 녹는 용질의 양에 영향을 미치는 요인 탐구하기","진하기가 다른 용액에서 물체의 뜨는 정도 비교하기"],"haeseol":[{"code":"6과03-01","text":"용질, 용매, 용액, 용해의 개념을 다루되, 입자 모형으로 용해 현상을 설명하거나 용해 현상이 일어나는 과학적 이유나 원리를 설명하지 않는다. 용해 전과 후의 무게를 비교하여 용해 과정에서 물질이 사라지지 않음을 이해하도록 한다."},{"code":null,"text":"렌즈를 이용하여 빛의 굴절 실험하기"},{"code":"6과03-02","text":"진하기가 다른 두 용액에서 같은 물체의 뜨는 정도가 다름을 이용하여 용액의 상대적인 진하기를 비교하도록 한다."}],"goryeo":["초등학교 5∼6학년군의 ‘혼합물의 분리’, ‘산과 염기’, 중학교 1∼3학년군의 ‘물질의 특성’과 연계된다.","일상생활에서 용액의 사용 사례를 조사하여 우리 주변에서 용액의 중요성과 필요성을 이해할 수 있도록 한다. 디지털 소양 교육과 연계하여 포스터, 동영상 등 다양한 형태로 디지털 자료를 제작하여 누리망이나 사회 관계망 서비스 등에서 공유하도록 한다."],"area":"matter","electives":[],"prev":[],"next":["m13-08","m13-11"],"related":["e56-05","e56-09"],"materials":[],"limits":[],"focus":[],"guide":["용질, 용매, 용액, 용해의 개념을 다루되, 입자 모형으로 용해 현상을 설명하거나 용해 현상이 일어나는 과학적 이유나 원리를 설명하지 않는다. 용해 전과 후의 무게를 비교하여 용해 과정에서 물질이 사라지지 않음을 이해하도록 한다.","렌즈를 이용하여 빛의 굴절 실험하기"]},{"id":"e56-04","grade":"e56","num":4,"title":"우리 몸의 구조와 기능","standards":[{"code":"6과04-01","text":"뼈와 근육의 생김새를 관찰하고 모형을 만들어 몸이 움직이는 원리를 설명할 수 있다."},{"code":"6과04-02","text":"소화, 순환, 호흡, 배설 기관의 구조와 기능을 알아보고, 우리 몸의 여러 기관이 서로 관련되어 있음을 설명할 수 있다."},{"code":"6과04-03","text":"우리 몸의 여러 기관과 관련된 질병을 조사하고, 건강을 유지하기 위한 생활 방식을 실천 할 수 있다."}],"tamgu":["운동할 때 몸에서 일어나는 변화 관찰하기"],"haeseol":[{"code":"6과04-01","text":"중학교와 고등학교 과정에서는 뼈와 근육에 대해서 학습하지 않으므로, 뼈와 근육의 구조와 기능을 기초적으로 이해하는 데 중점을 둔다."},{"code":"6과04-02","text":"우리 몸의 각 기관은 종류, 위치, 생김새, 기능을 중심으로 탐구한다."},{"code":"6과04-03","text":"질병은 소화, 순환, 호흡, 배설 기관과 관련된 것으로 조사하고 건강을 유지하기 위한 생활 방식은 각 질병의 예방법을 중심으로 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘동물의 생활’, ‘생물의 한살이’와 중학교 1∼3학년군 ‘동물과 에너지’와 연계된다.","우리 몸의 각 기관의 위치와 생김새는 그림과 모형 등을 통해 관찰하게 하고, 각 기관의 기능은 기관계의 역할을 위주로 이해하게 한다.","일상생활에서 우리 몸의 각 기관에 발생하는 질병과 예방법을 책이나 발표 자료 등의 다양한 형태로 만들어 공유함으로써 학생들의 건강을 유지하기 위한 실천 의지를 다진다. 또한, 발표 자료를 만들거나 공유하는 활동은 디지털 소양 교육과 연계하여 지도할 수 있다."],"area":"life","electives":[],"prev":["e34-02","e34-04"],"next":["m13-13","m13-20"],"related":[],"materials":[],"limits":[],"focus":[],"guide":["중학교와 고등학교 과정에서는 뼈와 근육에 대해서 학습하지 않으므로, 뼈와 근육의 구조와 기능을 기초적으로 이해하는 데 중점을 둔다.","우리 몸의 각 기관은 종류, 위치, 생김새, 기능을 중심으로 탐구한다."]},{"id":"e56-05","grade":"e56","num":5,"title":"혼합물의 분리","standards":[{"code":"6과05-01","text":"알갱이의 크기가 다른 고체 혼합물과 골고루 섞이지 않는 액체 혼합물을 분리할 수 있다."},{"code":"6과05-02","text":"물에 용해되는 성질을 이용하여 고체 혼합물을 분리하고, 물을 증발시켜 물에 용해된 고체 물질을 분리할 수 있다."},{"code":"6과05-03","text":"지속가능한 삶을 위한 과학기술 사례 중 혼합물의 분리를 이용한 장치를 조사하여 공유할 수 있다."}],"tamgu":["모래와 자갈의 혼합물 분리하기","물과 기름의 혼합물 분리하기","소금과 모래의 혼합물 분리하기"],"haeseol":[{"code":"6과05-01","text":"혼합물의 의미를 학습한 뒤 혼합물의 분리 실험을 진행하도록 한다. 혼합물은 두 가지 이상의 물질이 성질이 변하지 않고 섞여 있는 상태라는 수준에서 다룬다. 골고루 섞이지 않는 액체 혼합물 분리에서 액체가 골고루 섞이지 않는 까닭은 다루지 않는다."}],"goryeo":["초등학교 3∼4학년군의 ‘물체와 물질’, 5∼6학년군의 ‘용해와 용액’, 중학교 1∼3학년군의 ‘물질의 특성’과 연계된다.","대부분 물질은 혼합물 상태이기 때문에 필요한 물질을 얻기 위해서는 혼합물을 분리할 필요가 있음을 이해하도록 지도한다.","혼합물의 분리 실험을 할 때는 우리 주변에서 쉽게 구할 수 있는 물질을 사용하고, 실험이 끝난 뒤 남은 물질은 과학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다.","유리 기구를 사용하거나 거름 장치와 증발 장치로 실험할 때는 실험 전에 학생들에게 주의할 점과 안전사고 대처 방법을 지도한다.","생태전환교육과 연계하여 오염된 물을 정화할 수 있는 장치 등과 같이 경제적, 사회적, 지역적 상황을 고려하여 개발된 과학기술 사례를 중심으로 조사하도록 한다. 디지털 소양 교육과 연계하여 조사 결과를 누리망이나 사회 관계망 서비스 등에서 공유하도록 한다."],"area":"matter","electives":[],"prev":["e34-05"],"next":["m13-08"],"related":["e56-03"],"materials":[],"limits":["골고루 섞이지 않는 액체 혼합물 분리에서 액체가 골고루 섞이지 않는 까닭은 다루지 않는다."],"focus":[],"guide":[]},{"id":"e56-06","grade":"e56","num":6,"title":"날씨와 우리 생활","standards":[{"code":"6과06-01","text":"기상 요소를 조사하고, 날씨가 우리 생활에 주는 영향을 인식할 수 있다."},{"code":"6과06-02","text":"이슬, 안개, 구름을 관찰하고, 공통점과 차이점을 찾을 수 있다."},{"code":"6과06-03","text":"고기압과 저기압의 분포에 따른 날씨의 특징을 기상 요소로 표현할 수 있다."}],"tamgu":["이슬, 안개 발생 실험하기","바람 발생에 대한 모형실험하기"],"haeseol":[{"code":"6과06-01","text":"기상 요소는 기온, 바람, 습도, 구름의 양, 강수량을 중심으로 다루고, 기상 자료에서 규칙성을 파악하도록 한다."},{"code":"6과06-02","text":"구름에서 비와 눈이 내리는 과정을 다루지 않고 현상을 중심으로 다루며, 단열 팽창과 관련된 구름의 생성 과정은 다루지 않는다."},{"code":"6과06-03","text":"고기압과 저기압의 날씨와 고기압에서 저기압으로 부는 바람의 방향을 이해하는 수준에서 현상 중심으로 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘지구와 바다’, 중학교 1∼3학년군 ‘날씨와 기후변화’, ‘수권과 해수의 순환’과 연계된다.","날씨는 학생들이 매일 접하는 자연 현상으로, 관찰과 실험을 중심으로 한 탐구 활동의 좋은 소재가 된다. 따라서 관찰과 실험을 중심으로 여러 가지 기상 요소의 특징을 이해하고, 우리 생활과 관련짓도록 한다.","이슬, 안개 발생 실험 과정에서 응결 현상을 중심으로 설명하고, 단열 팽창 실험 기구를 활용하지 않는다.","바람 발생에 대한 모형실험은 해륙풍 모형으로 제시하며, 가열에 따른 육지와 바다의 온도 차이에 의해 고기압에서 저기압으로 바람이 부는 것으로 설명한다."],"area":"earth","electives":[],"prev":["e34-06","e34-16"],"next":["m13-17","m13-18"],"related":["e56-07"],"materials":[],"limits":["구름에서 비와 눈이 내리는 과정을 다루지 않고 현상을 중심으로 다루며, 단열 팽창과 관련된 구름의 생성 과정은 다루지 않는다."],"focus":[],"guide":[]},{"id":"e56-07","grade":"e56","num":7,"title":"열과 우리 생활","standards":[{"code":"6과07-01","text":"물체의 따뜻하고 차가운 정도를 온도로 표현함을 알고, 온도계를 이용하여 온도를 측정할 수 있다."},{"code":"6과07-02","text":"온도가 다른 두 물체가 접촉했을 때 두 물체의 온도 변화를 관찰하고 그 원인을 추리할 수 있다."},{"code":"6과07-03","text":"주위에서 열의 이동으로 나타나는 현상을 관찰하여 열의 이동 방식이 다양함을 설명할 수 있다."},{"code":"6과07-04","text":"일상생활에서 단열을 이용하는 사례를 조사하고, 온도를 오랫동안 일정하게 유지할 수 있는 장치를 창의적으로 만들 수 있다."}],"tamgu":["온도가 다른 두 물체가 접촉할 때 두 물체의 온도 변화 측정하기","열이 이동하는 여러 방식의 특징 비교하기"],"haeseol":[{"code":"6과07-02","text":"온도가 다른 두 물체를 접촉하는 탐구에서는 두 물체의 온도 변화를 측정하는 데 중점을 두고, 물체의 온도가 변하는 원인이 온도가 높은 물체에서 온도가 낮은 물체로 열이 이동하기 때문이라는 사실을 추리하도록 한다. 단, 열평형이라는 용어는 사용하지 않는다."},{"code":"6과07-03","text":"전도, 대류, 복사는 고체, 액체, 기체에서의 열의 이동과, 빛에 의한 열 이동 현상을 관찰하는 데 중점을 두고 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘물의 상태 변화’, 5∼6학년군 ‘날씨와 우리 생활’, 중학교 1∼3학년군 ‘열’과 연계된다.","일상생활의 열과 관련된 현상을 과학 글쓰기, 그림 그리기, 역할 놀이, 장치 만들기 등의 다양한 활동으로 융합하여 다룰 수 있다.","뜨거운 물질이나 물체 등을 다룰 때 화상, 화재 등의 안전사고에 유의한다."],"area":"energy","electives":[],"prev":["e34-10"],"next":["m13-03"],"related":["e56-06"],"materials":[],"limits":[],"focus":["온도가 다른 두 물체를 접촉하는 탐구에서는 두 물체의 온도 변화를 측정하는 데 중점을 두고, 물체의 온도가 변하는 원인이 온도가 높은 물체에서 온도가 낮은 물체로 열이 이동하기 때문이라는 사실을 추리하도록 한다.","전도, 대류, 복사는 고체, 액체, 기체에서의 열의 이동과, 빛에 의한 열 이동 현상을 관찰하는 데 중점을 두고 다룬다."],"guide":[]},{"id":"e56-08","grade":"e56","num":8,"title":"자원과 에너지","standards":[{"code":"6과08-01","text":"우리가 생활에서 이용하는 다양한 자원을 조사하고, 자원의 유한함을 설명할 수 있다."},{"code":"6과08-02","text":"재생에너지의 종류를 조사하고, 에너지를 지속가능하게 이용하는 방법에 관심을 갖는다."},{"code":"6과08-03","text":"자원과 에너지의 효율적인 이용 방법에 대해 탐색하고, 생활 속에서 실천할 수 있는 다양한 사례를 공유할 수 있다."}],"tamgu":["효율적으로 에너지를 이용하는 집 모형의 효과 탐구하기"],"haeseol":[{"code":"6과08-02","text":"재생에너지는 태양 에너지, 풍력, 수력, 해양 에너지, 지열 에너지, 바이오 에너지 등을 의미한다."},{"code":"6과08-03","text":"효율적인 자원의 이용 방법에서 물 자원과 산림 자원, 광물 자원을 종합적으로 다루며, 학생들이 배운 내용을 바탕으로 생활 속에서 자원의 소중함을 느끼고, 효율적인 이용 방법을 공유하고 실천할 수 있도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘식물과 에너지’, ‘동물과 에너지’, ‘전기와 자기’, ‘운동과 에너지’와 연계된다.","재활용된 자원이 순환 과정을 거치는 사례가 있으나, 이러한 사례로 인해 자원이 무한한 것이라는 인식을 갖지 않도록 유의한다.","일상생활에서 이용하는 에너지를 알아보고, 지속가능한 에너지 이용이 필요한 까닭을 알 수 있도록 한다."],"area":"society","electives":[],"prev":[],"next":["m13-01","m13-12","m13-13","m13-14","m13-19","m13-22"],"related":[],"materials":[],"limits":[],"focus":[],"guide":["재생에너지는 태양 에너지, 풍력, 수력, 해양 에너지, 지열 에너지, 바이오 에너지 등을 의미한다.","효율적인 자원의 이용 방법에서 물 자원과 산림 자원, 광물 자원을 종합적으로 다루며, 학생들이 배운 내용을 바탕으로 생활 속에서 자원의 소중함을 느끼고, 효율적인 이용 방법을 공유하고 실천할 수 있도록 한다."]},{"id":"e56-09","grade":"e56","num":9,"title":"산과 염기","standards":[{"code":"6과09-01","text":"여러 가지 용액에 지시약을 넣었을 때의 변화를 관찰하여 용액을 산성 용액과 염기성 용액으로 분류할 수 있다."},{"code":"6과09-02","text":"산성 용액과 염기성 용액의 성질을 관찰하고, 산성 용액과 염기성 용액을 섞을 때 용액의 성질 변화를 실험을 통해 추론할 수 있다."},{"code":"6과09-03","text":"우리 주변에서 산성 용액과 염기성 용액을 이용하는 예를 찾아서 설명할 수 있다."},{"code":"6과09-04","text":"산성화로 인한 환경의 피해 사례를 소개하는 자료를 만들고 공유할 수 있다."}],"tamgu":["지시약을 이용하여 용액 분류하기","묽은 염산과 묽은 수산화 나트륨 용액을 섞을 때 용액의 색깔 변화 관찰하기"],"haeseol":[{"code":"6과09-01","text":"리트머스 시험지, 페놀프탈레인 용액, 붉은 양배추 용액 등과 같은 지시약의 색깔 변화를 이용하여 여러 가지 용액을 산성 용액과 염기성 용액으로 분류하도록 한다."},{"code":"6과09-02","text":"산성 용액은 탄산 칼슘과 반응하고 염기성 용액은 단백질과 반응하는 성질을 중심으로 다룬다. 산성 용액과 염기성 용액을 섞을 때 용액의 성질 변화에서 지시약이 들어 있는 용액의 색깔이 변하는 현상을 관찰하는 수준에서만 다루고 중성, pH, 중화 개념은 다루지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘물체와 물질’, 5∼6학년군 ‘물질의 연소’, 중학교 1∼3학년군 ‘화학 반응의 규칙성’과 연계된다.","겉보기 성질이 비슷한 여러 가지 용액의 분류 활동 결과를 바탕으로, 용액을 분류하는 새로운 기준이 필요함을 인식하도록 한다.","산성 용액이나 염기성 용액을 사용할 때는 실험실 안전 수칙에 따라 실험하고, 실험이 끝난 뒤 남은 물질은 과학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다.","생태전환교육과 연계하여 산성비, 해양 산성화, 토양 산성화 등 산성화로 인한 생태계의 피해 사례 및 관련 자료를 수집하여 분석하도록 한다. 디지털 소양 교육과 연계하여 환경 파괴의 원인, 현황, 전망, 대책 등을 포함한 조사 결과를 누리망이나 사회 관계망 서비스 등에서 공유하도록 한다."],"area":"matter","electives":[],"prev":["e34-05"],"next":["m13-16"],"related":["e56-03","e56-14"],"materials":["수산화 나트륨","묽은 염산","지시약"],"limits":["산성 용액과 염기성 용액을 섞을 때 용액의 성질 변화에서 지시약이 들어 있는 용액의 색깔이 변하는 현상을 관찰하는 수준에서만 다루고 중성, pH, 중화 개념은 다루지 않는다."],"focus":[],"guide":[]},{"id":"e56-10","grade":"e56","num":10,"title":"물체의 운동","standards":[{"code":"6과10-01","text":"운동하는 물체는 시간에 따라 위치가 변화함을 알고 그 변화를 표현할 수 있다."},{"code":"6과10-02","text":"물체의 이동 거리와 걸린 시간을 측정하여 속력을 구하고 빠르기를 비교할 수 있다."},{"code":"6과10-03","text":"속력과 관련된 안전 수칙과 안전장치를 조사한 결과를 공유하고 일상생활에서 교통안전을 실천할 수 있다."}],"tamgu":["운동하는 물체의 공통된 특징 탐구하기"],"haeseol":[{"code":"6과10-01","text":"시간에 따라 위치가 변하는 다양한 운동을 다루면서 처음 위치와 나중 위치를 간단한 좌표 평면 위에 표현하되 두 위치 사이의 거리는 구하지 않는다."},{"code":"6과10-02","text":"물체의 속력을 구할 때 물체가 한 길을 따라 한 방향으로 운동하는 경우만 다루며, 속력의 단위 변환에 중점을 두지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘힘과 우리 생활’, 중학교 1∼3학년군 ‘운동과 에너지’와 연계된다.","속력의 산술적 계산 능력보다는 속력의 의미를 이해하고 물체의 빠르기를 정량적으로 표현하여 소통할 수 있는 과학적인 의사소통 능력 평가에 중점을 둔다.","물체의 속력을 측정하고 계산할 때 디지털 탐구 도구나 계산기 등을 활용할 수 있다.","속력과 관련된 안전 수칙과 안전장치를 조사한 결과를 발표하거나 사회 관계망 서비스 등을 통해 공유하고, 교통안전의 실천은 실천적 습관 형성에 주안점을 둔다."],"area":"energy","electives":[],"prev":["e34-01"],"next":["m13-19"],"related":[],"materials":[],"limits":["물체의 속력을 구할 때 물체가 한 길을 따라 한 방향으로 운동하는 경우만 다루며, 속력의 단위 변환에 중점을 두지 않는다."],"focus":[],"guide":[]},{"id":"e56-11","grade":"e56","num":11,"title":"식물의 구조와 기능","standards":[{"code":"6과11-01","text":"생물을 이루고 있는 기본 단위인 세포를 현미경으로 관찰할 수 있다."},{"code":"6과11-02","text":"식물의 각 기관의 구조를 관찰하고, 기능을 알아보는 실험을 수행하여 식물 각 기관의 구조와 기능을 설명할 수 있다."},{"code":"6과11-03","text":"여러 가지 식물의 특징을 설명하는 자료를 만들어 공유할 수 있다."}],"tamgu":["줄기에서 물의 이동 실험하기","광합성 산물 확인 실험하기","증산 작용 확인 실험하기"],"haeseol":[{"code":"6과11-01","text":"세포 관찰은 식물 세포로 하고, 세포의 구조는 핵, 세포막, 세포벽을 용어 수준에서 다룬다."},{"code":"6과11-02","text":"식물의 기관에서 물과 양분의 이동을 탐구하면서 식물의 기관이 서로 연결되어 있음을 다룬다."},{"code":null,"text":"같은 시간 동안에 물체가 이동한 거리 비교하기"},{"code":"6과11-03","text":"학생들이 관심 있는 식물의 구조와 기능을 관찰하거나 조사하고 이를 설명하는 자료를 만들어 발표하고 공유하게 한다."}],"goryeo":["초등학교 3∼4학년군 ‘식물의 생활’, ‘생물의 한살이’, 중학교 1∼3학년군 ‘생물의 구성과 다양성’, ‘식물과 에너지’와 연계된다.","식물 세포 현미경 표본을 만들어 직접 관찰하되 학교 사정에 따라 이미 만들어진 현미경 표본을 이용하여 관찰할 수도 있다.","식물의 구조와 기능을 설명하는 자료를 만들어 공유하는 활동은 디지털 소양 교육과 연계하여 지도할 수 있다.","초등학교 3∼4학년군 ‘식물의 생활’과 ‘생물의 한살이’에서는 식물들의 특징을 관찰하고 비교하는 데 중점을 두지만, ‘ 식물의 구조와 기능’에서는 식물 각 기관의 구조와 기능에 중점을 두는 만큼 실험을 통해 탐구하도록 한다."],"area":"life","electives":[],"prev":["e34-03","e34-04"],"next":["m13-02","m13-12"],"related":[],"materials":[],"limits":[],"focus":["초등학교 3∼4학년군 ‘식물의 생활’과 ‘생물의 한살이’에서는 식물들의 특징을 관찰하고 비교하는 데 중점을 두지만, ‘ 식물의 구조와 기능’에서는 식물 각 기관의 구조와 기능에 중점을 두는 만큼 실험을 통해 탐구하도록 한다."],"guide":[]},{"id":"e56-12","grade":"e56","num":12,"title":"지구의 운동","standards":[{"code":"6과12-01","text":"하루 동안 태양과 별을 관찰하여 위치 변화의 규칙성을 찾을 수 있다."},{"code":"6과12-02","text":"지구의 자전을 알고, 낮과 밤이 생기는 이유를 설명할 수 있다."},{"code":"6과12-03","text":"지구의 공전을 알고, 계절에 따라 달라지는 별자리를 관찰할 수 있다."}],"tamgu":["낮과 밤이 생기는 이유 모형실험하기","천체 관측 프로그램을 이용하여 계절별 대표적인 별자리 관찰하기"],"haeseol":[{"code":"6과12-01","text":"남쪽 하늘을 바라보는 관측자 관점에서 태양과 별의 위치가 달라지는 현상을 중심으로 다룬다."},{"code":"6과12-02","text":"지구의 자전에서는 지구가 자전축이 기울어진 채 하루에 한 바퀴 도는 것을 중심으로 다룬다."},{"code":"6과12-03","text":"별자리 명칭보다는 계절에 따라 보이는 별자리와 별자리의 위치가 달라지는 까닭을 이해하는 데 초점을 둔다."}],"goryeo":["초등학교 3∼4학년군 ‘밤하늘 관찰’, 5∼6학년군 ‘계절의 변화’, 중학교 1∼3학년군 ‘태양계’, ‘별과 우주’와 연계된다.","관찰과 실험을 중심으로 지구의 운동과 관련된 개념을 이해하고 지구의 자전과 공전에 의하여 일어나는 현상을 지구의 관측자 중심으로 탐구할 수 있는 활동이 필요하다.","탐구 활동을 하기 전, 교실이나 운동장 등의 공간에서 관측자가 남쪽을 바라볼 때를 기준으로 방위를 설정할 필요가 있다.","디지털 소양 교육 관련하여, 계절별 대표적인 별자리는 남쪽 하늘의 별자리를 중심으로 천체 관측 프로그램이나 실감형 자료를 활용하여 조사할 수 있다."],"area":"earth","electives":[],"prev":["e34-13"],"next":["m13-07","m13-15"],"related":["e56-13"],"materials":[],"limits":[],"focus":[],"guide":["남쪽 하늘을 바라보는 관측자 관점에서 태양과 별의 위치가 달라지는 현상을 중심으로 다룬다.","지구의 자전에서는 지구가 자전축이 기울어진 채 하루에 한 바퀴 도는 것을 중심으로 다룬다."]},{"id":"e56-13","grade":"e56","num":13,"title":"계절의 변화","standards":[{"code":"6과13-01","text":"태양 고도 측정기로 하루 동안 태양 고도, 그림자 길이, 기온을 측정하여 이들의 관계를 찾 을 수 있다."},{"code":"6과13-02","text":"계절에 따른 태양의 남중 고도와 낮의 길이 사이의 관계를 자료에 근거하여 추론할 수 있다."},{"code":"6과13-03","text":"계절 변화의 원인을 지구의 자전축이 기울어진 채 공전하는 것으로 설명할 수 있다."}],"tamgu":["태양 고도 측정기 만들기","디지털 자료를 활용하여 계절별 태양의 남중 고도, 낮의 길이 관계 탐구하기"],"haeseol":[{"code":"6과13-03","text":"지구 자전축이 기울어진 채 공전하기 때문에 계절에 따라 태양의 남중 고도가 달라져 지표가 받는 태양 에너지의 차이로 계절의 변화가 생김을 이해하게 한다."}],"goryeo":["초등학교 3∼4학년군 ‘밤하늘 관찰’, 5∼6학년군 ‘지구의 운동’과 중학교 1∼3학년군 ‘태양계’, ‘별과 우주’와 연계된다.","태양 고도 측정기 만들기 활동에서는 단순하게 그림자의 길이를 이용하는 장치, 정확한 태양 고도값을 측정하는 장치 등 다양한 태양 고도 측정 장치를 설계하고 만들 수 있다. 또한, 하루 동안 태양 고도와 그림자 길이를 직접 측정하여, 표와 그래프로 나타내는 활동이 필요하다.","디지털 소양 교육과 관련하여, 누리집을 활용하여 계절에 따른 태양의 남중 고도와 낮의 길이 자료를 수집하고 해석할 수 있다."],"area":"earth","electives":[],"prev":["e34-13"],"next":["m13-07","m13-15"],"related":["e56-12"],"materials":[],"limits":[],"focus":[],"guide":["지구 자전축이 기울어진 채 공전하기 때문에 계절에 따라 태양의 남중 고도가 달라져 지표가 받는 태양 에너지의 차이로 계절의 변화가 생김을 이해하게 한다."]},{"id":"e56-14","grade":"e56","num":14,"title":"물질의 연소","standards":[{"code":"6과14-01","text":"물질의 성질이 달라지는 변화와 달라지지 않는 변화를 관찰하여 비교할 수 있다."},{"code":"6과14-02","text":"물질이 연소할 때 나타나는 공통적인 현상을 관찰하고, 연소의 조건을 찾을 수 있다."},{"code":"6과14-03","text":"연소 전과 후의 물질을 비교하여 연소 과정에서 물질의 성질이 달라짐을 설명할 수 있다."},{"code":"6과14-04","text":"연소 과정에서 생성되는 물질로 인한 생태계의 피해 사례를 수집하고 분석하여 해결책을 제안하고 공유할 수 있다."}],"tamgu":["서로 다른 물질을 섞었을 때 물질의 성질 변화 관찰하기","양초와 알코올이 탈 때 나타나는 공통적인 현상 관찰하기","연소 후 생성되는 물질 확인하는 실험하기"],"haeseol":[{"code":"6과14-01","text":"서로 다른 물질을 섞었을 때 물질의 성질이 달라지는 변화를 활용한 재미있고 간단한 실험을 실시한다. 물질을 섞은 후 물질의 성질이 달라지는 까닭은 다루지 않으며, 물리 변화나 화학 변화 용어를 도입하지 않는다."},{"code":"6과14-02","text":"양초, 알코올, 나무 등과 같은 물질의 연소를 중심으로 다룬다."},{"code":"6과14-03","text":"물이나 이산화 탄소와 같은 연소 생성물은 염화 코발트 종이나 석회수 등을 이용한 실험으로 확인하고, 그을음은 연소 생성물로 다루지 않는다."},{"code":"6과14-04","text":"생태계의 피해 사례는 연소 생성물 중 이산화 탄소로 인한 피해 사례를 중심으로 조사한다."}],"goryeo":["초등학교 3∼4학년군 ‘물체와 물질’, ‘여러 가지 기체’, 5∼6학년군 ‘산과 염기’, 중학교 1∼3학년군 ‘화학 반응의 규칙성’과 연계된다.","연소 과정에 필요한 물질이나 연소 후 생성되는 물질을 지도할 때 초등학교 3∼4학년군 ‘여러 가지 기체’에서 학습한 산소나 이산화 탄소의 성질을 상기시킨다.","실험할 때는 학생들이 적절한 안전 장구를 착용하도록 하고, 실험 전에 학생들에게 주의할 점과 안전사고 대처 방법을 지도한다.","생태전환교육과 연계하여 연소 생성물 중 이산화 탄소로 인한 생태계의 피해 사례를 수집하여 분석하도록 한다. 디지털 소양 교육과 연계하여 피해의 원인, 현황, 전망 등을 바탕으로 실천 가능한 해결책이나 행동 방식을 제안하고, 누리망이나 사회 관계망 서비스 등에서 공유하도록 한다."],"area":"matter","electives":[],"prev":["e34-05","e34-15"],"next":["m13-16"],"related":["e56-09"],"materials":[],"limits":["물질을 섞은 후 물질의 성질이 달라지는 까닭은 다루지 않으며, 물리 변화나 화학 변화 용어를 도입하지 않는다.","물이나 이산화 탄소와 같은 연소 생성물은 염화 코발트 종이나 석회수 등을 이용한 실험으로 확인하고, 그을음은 연소 생성물로 다루지 않는다."],"focus":[],"guide":[]},{"id":"e56-15","grade":"e56","num":15,"title":"전기의 이용","standards":[{"code":"6과15-01","text":"전지와 전구, 전선을 연결하여 전구에 불을 켜보고, 불이 켜지는 전기 회로의 특징을 말할 수 있다."},{"code":"6과15-02","text":"전지 한 개를 연결한 전기 회로와 전지 두 개를 직렬연결한 전기 회로의 특징을 비교할 수 있다."},{"code":"6과15-03","text":"전자석을 만들어 전자석의 성질을 탐색하고 전자석이 사용되는 예를 조사할 수 있다."},{"code":"6과15-04","text":"전기를 효율적이고 안전하게 사용하는 방법을 조사하여 실천 계획을 세우고 일상생활에서 실천할 수 있다."}],"tamgu":["전구에 불이 켜지는 전기 회로와 불이 켜지지 않는 전기 회로 비교하기","전지 한 개를 연결한 전기 회로와 전지 두 개를 직렬연결한 전기 회로에서 전구의 밝기 비교하기","전자석의 성질을 영구 자석과 비교하여 탐색하기"],"haeseol":[{"code":"6과15-02","text":"전구의 직렬연결과 병렬연결은 다루지 않고, 전지의 연결은 직렬연결만 다룬다."},{"code":"6과15-03","text":"전자석은 전지를 이용하여 제작하고, 전지의 수에 따라 전자석의 세기가 달라지는 현상, 전지의 연결 방향에 따라 전자석의 극이 달라지는 현상을 관찰하여 영구 자석과의 차이를 비교하도록 하되, 전류에 의한 자기장 개념은 도입하지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘자석의 이용’, 중학교 1∼3학년군 ‘전기와 자기’와 연계된다.","탐구 활동 등의 학습 과정에서 전기 안전에 유의하도록 한다.","전지와 전구, 전선을 연결하여 전구에 불이 켜지는 전기 회로를 구성하여 도체와 부도체를 구별하는 활동을 진행할 수 있다.","전지 한 개를 연결한 회로와 전지 두 개를 직렬연결한 회로의 특징을 비교하기 위해 발광다이오드, 전동기, 버저 등의 다양한 전기 부품을 이용할 수 있다.","전구 등의 전기 부품은 전지의 연결을 고려하여 알맞은 규격을 사용한다.","전기를 효율적이고 안전하게 사용하는 방법에 대한 학습을 생활 규칙 만들기, 과학 글쓰기, 그림 그리기, 역할 놀이 등의 다양한 활동으로 융합하여 전개할 수 있다."],"area":"energy","electives":[],"prev":["e34-09"],"next":["m13-14"],"related":[],"materials":["전자석","전구","전지"],"limits":["전구의 직렬연결과 병렬연결은 다루지 않고, 전지의 연결은 직렬연결만 다룬다."],"focus":[],"guide":[]},{"id":"e56-16","grade":"e56","num":16,"title":"과학과 나의 진로","standards":[{"code":"6과16-01","text":"미래 사회에 일어날 수 있는 문제를 조사하고, 문 제 를 해결하는 데 과학이 기여할 수 있 는 방법을 토의할 수 있다."},{"code":"6과16-02","text":"다양한 진로가 과학과 관련됨을 알고, 자신의 진로를 과학과 관련지어 설명할 수 있다."}],"tamgu":["우리의 진로에 영향을 미치는 과학적 요소 탐구하기"],"haeseol":[{"code":"6과16-01","text":"단순한 상상이 아니라 현재의 다양한 정보를 기반으로 미래 사회의 문제를 예상해보도록 한다."},{"code":"6과16-02","text":"과학자와 관련된 직업을 다루는 것이 아니라 학생이 희망하는 다양한 직업을 기준으로 하여 해당 직업과 관련된 과학적 요소를 찾도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘과학과 나의 미래’와 연계된다.","인구 문제, 환경 문제 등 미래 사회에 일어날 수 있는 문제의 해결과 관련하여 과학의 유용성을 다룰 때는 과학이 모든 문제를 해결할 수는 없다는 것도 함께 지도한다.","과학기술의 발달이 가지고 올 미래 사회의 모습에 맞춰 새로운 진로의 탐색이나 미래의 나를 위한 준비의 필요성을 느낄 수 있도록 지도한다."],"area":"society","electives":[],"prev":[],"next":["m13-23"],"related":[],"materials":[],"limits":[],"focus":[],"guide":["단순한 상상이 아니라 현재의 다양한 정보를 기반으로 미래 사회의 문제를 예상해보도록 한다.","과학자와 관련된 직업을 다루는 것이 아니라 학생이 희망하는 다양한 직업을 기준으로 하여 해당 직업과 관련된 과학적 요소를 찾도록 한다."]},{"id":"m13-01","grade":"m13","num":1,"title":"과학과 인류의 지속가능한 삶","standards":[{"code":"9과01-01","text":"과학적 탐구 방법을 이해하고, 일상생활의 문제에 대한 과학적 해결 방안을 제안할 수 있다."},{"code":"9과01-02","text":"과학의 발전이 인류 문명에 미친 영향을 이해하고, 인공지능 등 첨단 과학기술이 가져올 미래 사회의 변화를 조사하여 발표할 수 있다."},{"code":"9과01-03","text":"인류의 지속가능한 삶을 위한 과학기술의 중요성과 역할에 대해 토의하고, 개인과 사회 차원의 활동 방안을 찾아 실천할 수 있다."}],"tamgu":["주변에서 탐구할 문제를 발견하고 탐구 계획서 작성하기"],"haeseol":[{"code":"9과01-01","text":"간단한 탐구 실험을 제시하여 탐구 절차 및 방법을 익히도록 하며, 학생이 스스로 발견한 문제를 일정 기간 동안 지속적으로 탐구하여 해결해 보는 기회를 제공할 수 있다."},{"code":"9과01-02","text":"과학적 탐구 방법을 통해 얻은 과학 지식과 방법이 인류 문명과 문화 발달에 미친 영향을 중심으로 학습하고, 원리보다는 활용 측면에서 첨단 과학기술 사례를 함께 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘기후변화와 우리 생활’, 5∼6학년군 ‘자원과 에너지’와 연계된다.","인류 문명 발달 과정에서 과학적 원리 발견, 기술 발달, 기기 발명에 관한 자료를 수집하고 토의하도록 지도할 수 있다. 과학 개념과 원리가 기술, 공학, 예술, 수학 등 과학 외의 교과와 관련 있음을 사례를 통해 이해하도록 한다.","조사와 토의⋅토론 등의 교수⋅학습 방법을 활용하여 첨단 과학기술 사례를 찾고, 이 과정에서 과학이 사회에 미치는 영향을 알게 한다. 조사한 자료를 바탕으로 미래 생활의 모습을 예측하도록 하고, 이를 글이나 그림으로 표현하도록 하여 관련 내용을 평 가 할 수 있다.","인류가 직면한 에너지나 환경 문제와 같은 과학 관련 쟁점을 알고 이에 대한 자신의 의견을 과학적으로 제시하게 한다."],"area":"society","electives":[],"prev":["e34-16","e56-08"],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["간단한 탐구 실험을 제시하여 탐구 절차 및 방법을 익히도록 하며, 학생이 스스로 발견한 문제를 일정 기간 동안 지속적으로 탐구하여 해결해 보는 기회를 제공할 수 있다.","과학적 탐구 방법을 통해 얻은 과학 지식과 방법이 인류 문명과 문화 발달에 미친 영향을 중심으로 학습하고, 원리보다는 활용 측면에서 첨단 과학기술 사례를 함께 다룬다."]},{"id":"m13-02","grade":"m13","num":2,"title":"생물의 구성과 다양성","standards":[{"code":"9과02-01","text":"세포는 생명 활동이 일어나는 기본 단위임을 이해하고, 세포의 구조와 기능의 관계를 추론할 수 있다."},{"code":"9과02-02","text":"생물의 유기적 구성 단계를 이해하고, 동물과 식물을 비교하여 분석할 수 있다."},{"code":"9과02-03","text":"생물다양성을 이해하고, 변이와 생물다양성의 관계를 추론할 수 있다."},{"code":"9과02-04","text":"종의 개념과 분류 체계를 이해하고, 생물을 계 수준에서 분류할 수 있다."},{"code":"9과02-05","text":"생물다양성 보전의 필요성을 이해하고, 생물다양성 유지를 위한 방안을 조사하고 실천할 수 있다."}],"tamgu":["세포 관찰하기","생물다양성 보전 놀이 활동하기"],"haeseol":[{"code":"9과02-01","text":"세포의 구조는 세포벽, 세포막, 핵, 엽록체, 미토콘드리아를, 세포의 특징으로는 생명 활동을 유추할 수 있는 세포 (적혈구, 신경세포, 상피세포 등)를 다룬다."},{"code":"9과02-04","text":"종은 생물학적 종 개념만을, 생물 분류 체계는 5계만을 다루도록 한다."}],"goryeo":["초등학교 3∼4학년군 ‘다양한 생물과 우리 생활’, ‘생물과 환경’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘통합과학2’의 변화와 다양성과 연계된다.","생물다양성 이해를 위해 우리 학교 (마을)의 생물을 관찰하여, 우리 학교(마을) 생태 지도 만들기 및 생물 분류 활동을 할 수 있다.","생물다양성 보전 놀이 활동을 통해 생물다양성 보전의 필요성을 이해하도록 하고, 개인적, 사회적 차원에서 이루어질 수 있는 생물다양성 유지 방안을 조사하고 이를 실천하며, 이 과정에서 지속가능성을 고려한 생태전환교육이 이루어질 수 있도록 한다."],"area":"life","electives":["통합과학1","통합과학2"],"prev":["e34-02","e34-03","e34-12","e34-14","e56-11"],"next":["h1-03","h2-01","생과-01","생과-03","세포-01","세포-03"],"related":[],"materials":[],"limits":["종은 생물학적 종 개념만을, 생물 분류 체계는 5계만을 다루도록 한다."],"focus":[],"guide":[]},{"id":"m13-03","grade":"m13","num":3,"title":"열","standards":[{"code":"9과03-01","text":"온도와 열평형 과정을 물질을 구성하는 입자들의 배치나 움직임 등으로 설명할 수 있다."},{"code":"9과03-02","text":"열은 전도, 대류, 복사로 전달됨을 알고, 열전달 과정을 모형 등을 사용하여 다양하게 표현할 수 있다."},{"code":"9과03-03","text":"물질에 따라 비열과 열팽창 정도가 다름을 알고, 이러한 성질이 일상생활에서 유용하게 활용됨을 인식할 수 있다."}],"tamgu":["열화상 카메라를 이용하여 물체에서 열의 전도 비교하기","온도 센서를 이용하여 여러 가지 액체의 비열 비교하기"],"haeseol":[{"code":"9과03-01","text":"온도가 다른 두 물체가 열평형에 도달하는 과정을 시간 -온도 그래프 등을 활용하여 설명할 수 있도록 한다."},{"code":"9과03-02","text":"열의 이동 방식을 주변 도구나 신체를 이용하여 비유적으로 다양하게 표현하고, 그 차이를 설명할 수 있도록 한다."}],"goryeo":["초등학교 5∼6학년군 ‘열과 우리 생활’, 고등학교 ‘역학과 에너지’의 열과 에너지와 연계된다.","온도를 측정하거나 열의 전도를 관찰하는 활동에서 온도 센서 등 디지털 탐구 도구를 활용하도록 한다.","비열과 열팽창 실험에서 가열 장치로 실험할 때 화상이나 화재 등 안전사고에 유의하도록 안전 교육을 실시하고, 안전장치나 안전 장구가 갖추어진 상태에서 실시하도록 한다."],"area":"energy","electives":["역학과 에너지"],"prev":["e56-07"],"next":["역학-02"],"related":[],"materials":["열화상 카메라","온도 센서"],"limits":[],"focus":[],"guide":["온도가 다른 두 물체가 열평형에 도달하는 과정을 시간 -온도 그래프 등을 활용하여 설명할 수 있도록 한다.","열의 이동 방식을 주변 도구나 신체를 이용하여 비유적으로 다양하게 표현하고, 그 차이를 설명할 수 있도록 한다."]},{"id":"m13-04","grade":"m13","num":4,"title":"물질의 상태 변화","standards":[{"code":"9과04-01","text":"확산 및 증발 현상을 관찰하여 물질을 구성하는 입자가 운동하고 있음을 추론할 수 있다."},{"code":"9과04-02","text":"물질의 세 가지 상태의 특징을 설명하고, 이를 입자 모형으로 표현할 수 있다."},{"code":"9과04-03","text":"여러 가지 물질의 상태 변화를 관찰하고, 이를 입자 모형으로 설명할 수 있다."},{"code":"9과04-04","text":"물질의 상태 변화와 열에너지 출입 관계를 이해하고, 이를 실생활에 적용하여 과학의 유용성을 인식할 수 있다."}],"tamgu":["확산 현상 관찰하기","물질의 상태 변화 시 질량과 부피 변화 측정하기","상태 변화 실험에서 가열 곡선 또는 냉각 곡선 그리기"],"haeseol":[{"code":"9과04-02","text":"물질의 상태를 나타내는 입자 모형은 입자 사이의 상대적 거리, 입자 배열의 불규칙한 정도, 입자의 운동성 등을 비교한 내용을 포함한다."},{"code":"9과04-03","text":"여러 가지 물질의 상태 변화를 관찰하여 융해, 응고, 기화, 액화, 승화를 구분하고, 물질의 상태가 변할 때 부피는 변하고 질량과 물질의 성질은 변하지 않는 이유를 입자 모형으로 설명한다."},{"code":"9과04-04","text":"물질의 상태 변화 시 온도가 일정한 이유를 상태 변화 과정에서 출입하는 열에너지와 관련지어 설명한다."}],"goryeo":["초등학교 3∼4학년군 ‘물의 상태 변화 ’, 고등학교 ‘물질과 에너지’의 물질의 세 가지 상태와 연계된다.","질량은 물질이 가지고 있는 고유한 양임을 설명한다. 질량은 무게를 측정하여 확인하고, 기체의 질량을 저울로 측정할 때는 부력이 측정값에 영향을 줄 수 있음을 유의한다.","상태 변화 시 열에너지의 출입으로 입자의 배열과 운동이 달라지는 실험 결과를 입자 모형을 사용하여 설명하도록 한다.","녹는점, 끓는점, 어는점의 정확한 개념은 중학교 1∼3학년군 ‘물질의 특성’에서 학습하므로 각 상태 변화가 일어나는 온도라는 측면에 주안점을 둔다."],"area":"matter","electives":["물질과 에너지"],"prev":["e34-10"],"next":["물에-01","물에-02","물에-03"],"related":[],"materials":[],"limits":[],"focus":[],"guide":["물질의 상태를 나타내는 입자 모형은 입자 사이의 상대적 거리, 입자 배열의 불규칙한 정도, 입자의 운동성 등을 비교한 내용을 포함한다.","여러 가지 물질의 상태 변화를 관찰하여 융해, 응고, 기화, 액화, 승화를 구분하고, 물질의 상태가 변할 때 부피는 변하고 질량과 물질의 성질은 변하지 않는 이유를 입자 모형으로 설명한다."]},{"id":"m13-05","grade":"m13","num":5,"title":"힘의 작용","standards":[{"code":"9과05-01","text":"물체에 작용하는 힘을 화살표를 이용하여 나타내고, 힘의 평형을 이루는 조건을 설명할 수 있다."},{"code":"9과05-02","text":"중력, 탄성력, 마찰력, 부력을 이해하고, 각 힘의 특징을 크기와 방향으로 설명할 수 있다."},{"code":"9과05-03","text":"알짜힘이 0이 아닐 때 물체의 운동 상태가 변함을 알고, 그 예를 조사하여 분류할 수 있다."},{"code":"9과05-04","text":"다양한 사례에서 작용하는 힘과 힘의 평형 관계를 설명하고, 일상생활에서 힘의 특징을 이용한 기구나 장치를 설계할 수 있다."}],"tamgu":["용수철의 탄성력 측정하기","물속에서 부력 측정하기","장난감이나 놀이 기구에서 힘의 작용 탐구하기"],"haeseol":[{"code":"9과05-01","text":"힘의 정의를 알고 힘을 크기와 방향으로 나타낼 수 있도록 하며, 나란한 힘의 합력만을 다루도록 한다."},{"code":"9과05-02","text":"중력을 지도할 때, 질량과 무게를 구별하도록 한다."},{"code":"9과05-03","text":"물체가 힘을 받았을 때 물체의 운동을 속력이 변하거나 운동 방향이 바뀌거나 두 가지가 모두 변하는 사례로 분류하도록 한다."},{"code":"9과05-04","text":"바닥에 놓인 물체에 작용하는 힘을 설명할 때, 중력과 함께 바닥이 물체를 떠받치는 힘을 도입한다."}],"goryeo":["초등학교 3∼4학년군 ‘힘과 우리 생활’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘ 물리학’의 힘과 에너지와 연계된다.","학생들이 일상적으로 경험하는 힘의 개념을 글, 그림 등 다양한 형태로 표현하도록 하여 과학적인 힘의 개념이 형성되도록 지도한다.","힘의 작용에 대한 이해 정도를 평가하기 위해 일상생활에서 물체가 힘을 받았을 때 속력이 변하거나 운동 방향이 바뀌거나 두 가지가 모두 변하는 사례를 조사하고, 포스터 발표, 보고서 작성 등 다양한 형태의 산출물을 제작하도록 할 수 있다."],"area":"energy","electives":["물리학","통합과학1"],"prev":["e34-01"],"next":["h1-03","물리-01","역학-01"],"related":[],"materials":["용수철"],"limits":["힘의 정의를 알고 힘을 크기와 방향으로 나타낼 수 있도록 하며, 나란한 힘의 합력만을 다루도록 한다."],"focus":[],"guide":[]},{"id":"m13-06","grade":"m13","num":6,"title":"기체의 성질","standards":[{"code":"9과06-01","text":"압력의 의미를 알고, 기체의 압력을 입자의 운동으로 설명할 수 있다."},{"code":"9과06-02","text":"기체의 압력과 부피 관계를 실험 결과로부터 알아내고, 이 를 입자 모형으로 해석할 수 있다."},{"code":"9과06-03","text":"기체의 온도와 부피 관계를 실험 결과로부터 알아내고, 이 를 입자 모형으로 해석할 수 있다."}],"tamgu":["기체의 압력과 부피 관계와 기체의 온도와 부피 관계를 실험으로 알아보기"],"haeseol":[{"code":"9과06-01","text":"압력의 의미는 일상생활에서 경험할 수 있는 예시
