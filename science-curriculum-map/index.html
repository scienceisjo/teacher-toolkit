발한다.<통합과학2>가. 내용 체계핵심 아이디어⋅지구와 생명의 역사에 포함된 화학 반응에는 산화⋅환원 반응, 산⋅염기 반응이 있으며, 화학 변화에는 에너지가 출입한다.⋅지질시대를 통해 지질 구조를 포함한 환경과 생명체는 끊임없이 변천해왔으며, 변이의 발생과 자연선택의 과정을 통해 생명체가 진화하고 생물다양성이 형성된다.⋅생태계 구성 요소 사이의 균형적인 상호 관계가 생태계 평형 유지를 위해 중요함을 인식하고, 환경 보전을 위한 노력을 실천한다.⋅지구의 기후시스템은 태양복사와 지구복사의 영향을 받으며, 인간 활동에 의한 대기 중의 이산화 탄소 농도 증가가 기후에 영향을 미친다.⋅에너지는 여러 형태로 존재하면서 끊임없이 형태를 전환하는데, 이를 활용하여 전기 에너지를 얻을 수 있으며, 에너지의 지속가능하고 효율적인 활용이 중요하다.⋅인공지능과 로봇이 미래 사회에서 인간의 삶과 문명에 막대한 영향을 준다는 것과 과학기술 발전의 양면성을 인식하고, 건전한 가치 판단에 따라 책임 있게 과학기술을 사회에 적용하고 활용한다.구분범주 내용 요소지식⋅이해변화와 다양성⋅지질시대의 생물과 화석 ⋅지질시대 환경 변화와 대멸종⋅자연선택 ⋅생물다양성 ⋅산화와 환원 ⋅산성과 염기성⋅중화 반응 ⋅물질 변화에서 에너지 출입환경과 에너지⋅생태계 구성 요소 ⋅생태계 평형⋅대기와 해양의 상호작용 ⋅온실기체와 지구온난화⋅핵융합 ⋅발전 ⋅에너지 전환과 효율과학과 미래 사회⋅감염병과 병원체⋅인공지능과 과학 탐구 ⋅로봇⋅과학기술과 윤리과정⋅기능⋅자연 현상에서 문제를 인식하고 가설을 설정하기⋅변인을 조작적으로 정의하여 탐구 설계하기⋅다양한 도구를 활용하여 정보를 조사⋅수집⋅해석하기⋅수학적 사고와 모형을 활용하여 통합 및 융합 과학 관련 현상 설명하기⋅증거에 기반한 과학적 사고를 통해 자료를 과학적으로 분석 ⋅평가⋅추론하기⋅결론을 도출하고 자연 현상 및 융복합 문제 상황에 적용 ⋅설명하기⋅과학적 주장을 다양한 방법으로 소통하고, 의사결정을 위해 과학적 지식 활용하기"],"area":"integrated","electives":["물리학","생명과학","생물의 유전","세포와 물질대사","역학과 에너지","지구시스템과학"],"prev":["m13-02","m13-05","m13-19","m13-21"],"next":[],"related":[]},{"id":"h2-01","grade":"h2","num":1,"title":"변화와 다양성","standards":[{"code":"10통과2-01-01","text":"지질시대를 통해 지구 환경이 끊임없이 변화해 왔으며 이러한 환경 변화가 생물다양성에 미치는 영향을 추론할 수 있다."},{"code":"10통과2-01-02","text":"변이의 발생과 자연선택 과정을 통해 생물의 진화가 일어나고, 진화의 과정을 통해 생물다양성이 형성되었음을 추론할 수 있다."},{"code":"10통과2-01-03","text":"자연과 인류의 역사에 큰 변화를 가져온 광합성, 화석 연료 사용, 철의 제련 등에서 공통점을 찾아 산화와 환원을 이해하고, 생활 주변의 다양한 변화를 산화와 환원의 특징과 규칙성으로 분석할 수 있다."},{"code":"10통과2-01-04","text":"대표적인 산⋅염기 물질의 특징을 알고, 산과 염기를 혼합할 때 나타나는 중화 반응을 생활 속에서 이용할 수 있다."},{"code":"10통과2-01-05","text":"생활 주변에서 에너지를 흡수하거나 방출하는 현상을 찾아 에너지의 흡수 방출이 우리 생활에 어떻게 이용되는지 토의할 수 있다."}],"tamgu":["생물 대멸종의 원인과 그 이후의 변화를 설명하는 여러 가설들의 타당성 평가하기","자연선택 과정에 대한 모의실험하기","산과 염기를 혼합할 때 용액의 온도를 측정하여 그래프로 나타내기","가열장치 없이 물과 산화 칼슘을 이용한 음식 조리 방법 설계하고 실험하기"],"haeseol":[{"code":"10통과2-01-02","text":"변이의 발생과 자연선택 과정에 대한 모의실험을 수행하고 다윈의 자연선택설을 중심으로 생물의 진화를 학습한다. 생물다양성을 유전적 다양성, 종 다양성, 생태계 다양성으로 설명하고, 생물다양성을 보전하기 위한 구체적인 사례와 실천 방안을 탐색한다."},{"code":"10통과2-01-03","text":"산화⋅환원 반응을 산소와 전자의 이동으로 설명하되, 산화수는 다루지 않는다.가치⋅태도⋅과학의 심미적 가치⋅과학 유용성⋅자연과 과학에 대한 감수성⋅과학 창의성⋅과학 활동의 윤리성⋅과학 문제해결에 대한 개방성⋅안전⋅지속가능 사회에 기여⋅과학 문화 향유"},{"code":"10통과2-01-04","text":"산⋅염기 정의는 아레니우스 정의만 다루고, 중화 반응 과정에서의 변화는 용액의 온도 변화와 지시약의 색 변화만을 다룬다."},{"code":"10통과2-01-05","text":"화학 반응의 열 출입에서 열화학 반응식, 엔탈피를 다루지 않는다."}],"goryeo":["중학교 1∼3학년군 ‘생물의 구성과 다양성’, ‘지권의 변화’, ‘화학 반응의 규칙성’, 고등학교 ‘통합과학1’의 물질과 규칙성, ‘ 생명과학’의 생명의 연속성과 다양성, ‘ 지구과학’의 지구의 역사와 한반도의 암석, ‘화학’의 역동적인 화학 반응과 연계된다.","산화⋅환원 반응과 산 ⋅염기 반응을 화학 반응의 예시로 이해하기보다는 우리 주변에서 경험하는 다양한 변화와 다양성의 예시로 이해할 수 있도록 한다.","에너지를 흡수하거나 방출하는 현상은 초⋅중학교 과학에서 다룬 다양한 화학 변화와 물리 변화에 근거하여 예시를 찾도록 지도하고, 학습한 내용이 이후 다양한 지구 및 생명 현상에 적용됨을 이해하게 한다."],"area":"integrated","electives":["생명과학","지구과학","통합과학1","화학"],"prev":["m13-02","m13-09","m13-16"],"next":[],"related":[]},{"id":"h2-02","grade":"h2","num":2,"title":"환경과 에너지","standards":[{"code":"10통과2-02-01","text":"생태계 구성요소를 이해하고 생물과 환경 사이의 상호 관계를 설명할 수 있다."},{"code":"10통과2-02-02","text":"먹이 관계와 생태 피라미드를 중심으로 생태계 평형이 유지되는 과정을 이해하고, 환경의 변화가 생태계에 미칠 수 있는 영향에 대해 협력적으로 소통할 수 있다."},{"code":"10통과2-02-03","text":"온실효과 강화로 인한 지구온난화의 메커니즘을 이해하고, 엘니뇨, 사막화 등과 같은 현상이 지구 환경과 인간 생활에 미치는 영향과 대처 방안을 분석할 수 있다."},{"code":"10통과2-02-04","text":"태양에서 수소 핵융합 반응을 통해 질량 일부가 에너지로 바뀌고, 그중 일부가 지구에서 에너지 흐름을 일으키며 다양한 에너지로 전환되는 과정을 추론할 수 있다."},{"code":"10통과2-02-05","text":"발전기에서 운동 에너지가 전기 에너지로 전환되는 과정을 이해하고, 열원으로서 화석 연료, 핵에너지를 이용하는 발전소가 인간 생활에 미치는 영향을 조사⋅발표할 수 있다."},{"code":"10통과2-02-06","text":"에너지 효율의 의미와 중요성을 이해하고, 지속가능한 발전과 지구 환경 문제 해결에 신재생 에너지 기술을 활용하는 방안을 탐색할 수 있다."}],"tamgu":["개체군 변동 모의실험하기","지구온난화에 따른 지구 열수지 변동 탐구하기","기후변화로 인한 생태계와 지구계의 미래 시나리오 구상하기","자석과 코일의 상대 운동에 의해 운동 에너지가 전기 에너지로 전환되는 과정 탐구하기"],"haeseol":[{"code":"10통과2-02-01","text":"생태계 구성요소들이 서로 영향을 주고받음을 생물과 환경 사이의 상호 관계를 중심으로 학습한다."},{"code":"10통과2-02-04","text":"태양에서 수소가 헬륨으로 핵융합하는 과정에서 질량이 줄어서 태양 에너지가 생성됨을 정성적으로만 다룬다."},{"code":"10통과2-02-05","text":"코일을 통과하는 자기장의 세기가 변할 때 유도되는 전류를 관찰하여 전자기 유도 현상을 정성적으로 이해하고, 이를 이용한 간이 발전기를 만들어 발전소에서 전기 에너지를 만드는 방법을 설명한다."},{"code":"10통과2-02-06","text":"에너지가 다양한 형태로 존재하고, 에너지가 다른 형태로 전환되는 과정에서 에너지의 총량이 보존됨을 일상생활의 사례 중심으로 설명한다. 에너지가 사용되는 과정에서 열이 발생하며 특히 화석 연료의 사용 과정에서 버려지는 열에너지로 인해 에너지 이용의 효율이 낮아진다는 것을 설명한다."}],"goryeo":["중학교 1∼3학년군의 ‘날씨와 기후변화’, ‘수권과 해수의 순환’, ‘운동과 에너지’, 고등학교 ‘생명과학’의 생명 시스템의 구성, ‘지구과학’의 대기와 해양의 상호작용, ‘물리학’의 전기와 자기, ‘역학과 에너지’의 열과 에너지, ‘화학반응의 세계’의 산화⋅환원 반응과 연계된다.","이 영역에서는 인류가 환경과 에너지 문제에 어떻게 대처하고 있는지를 탐색하기 위해 탐구실험 학습, 조사 학습, 프로젝트 학습 등을 활용하는 수업을 계획하여 전개할 수 있다.","지구 환경, 신재생 에너지 등과 같은 인류가 당면한 주요 문제에 대해 세계시민으로서 관심과 책임감을 느끼고, 이를 해결하기 위해 과학적 언어로 이해하고 과학 지식과 방법에 기초하여 해결 방안을 창의적으로 탐구⋅실천하도록 지도한다."],"area":"integrated","electives":["물리학","생명과학","역학과 에너지","지구과학","화학반응의 세계"],"prev":["m13-17","m13-18","m13-19"],"next":[],"related":[]},{"id":"h2-03","grade":"h2","num":3,"title":"과학과 미래 사회","standards":[{"code":"10통과2-03-01","text":"감염병의 진단, 추적 등을 사례로 과학의 유용성을 설명하고, 미래 사회 문제 해결에서 과학의 필요성에 대해 논증할 수 있다."},{"code":"10통과2-03-02","text":"빅데이터를 과학기술사회에서 사용하고 있는 사례를 조사하고, 빅 데 이 터 활용의 장점과 문제점을 추론할 수 있다."},{"code":"10통과2-03-03","text":"인공지능 로봇, 사물인터넷 등과 같이 과학기술의 발전을 인간 삶과 환경 개선에 활용하는 사례를 찾고, 이러한 과학기술의 발전이 미래 사회에 미치는 유용성과 한계를 예측할 수 있다."},{"code":"10통과2-03-04","text":"과학기술의 발전 과정에서 발생할 수 있는 과학 관련 사회적 쟁점(SSI)과 과학기술 이용에서 과학 윤리의 중요성에 대해 논증할 수 있다."}],"tamgu":["핵산과 단백질을 이용한 감염병 진단 기술 체험하기","디지털 탐구 도구를 활용한 실시간 생활 데이터 측정하기","일상생활에 활용되는 로봇의 특징 분석 및 개선방안 고안하기"],"haeseol":[{"code":"10통과2-03-02","text":"과학 실험, 기상 관측, 유전체 분석, 신약 개발 등과 같은 분야에서 많은 정보를 디지털 형태로 전환하여 대량의 데이터를 축적할 수 있게 되면서, 일상생활의 다양한 분야에서 폭넓게 활용할 수 있음을 소개한다."}],"goryeo":["이 영역을 지도할 때 디지털 탐구 도구를 활용하여 자신에게 필요한 정보를 선별하고 자신이 찾은 정보를 비판적으로 평가하는 디지털 소양 함양에 초점을 둔다.","과학기술의 발전이 미래 사회에서 인류의 삶에 어떠한 영향을 미치는지 탐색하기 위해 탐구실험 학습, 조사 학습, 프로젝트 학습 등을 활용하는 수업을 계획⋅전개할 수 있다.","마이크로프로세서를 탑재한 피지컬 컴퓨팅 기기 등 최신 디지털 탐구 도구를 적극적으로 이용하여 학생들이 생활 주변의 문제를 해결하기 위해 실시간 데이터를 수집, 저장, 처리하고 이를 바탕으로 창의적인 문제해결 방안을 도출하도록 지도한다."],"area":"integrated","electives":[],"prev":[],"next":[],"related":[]},{"id":"물리-01","grade":"물리","num":1,"title":"힘과 에너지","standards":[{"code":"12물리01-01","text":"물체에 작용하는 알짜힘과 돌림힘이 0일 때 평형을 이룸을 알고, 다양한 구조물의 안정성을 분석할 수 있다."},{"code":"12물리01-02","text":"뉴턴 운동 법칙으로 등가속도 운동을 설명하고, 교통안전 사고 예방에 적용할 수 있다."},{"code":"12물리01-03","text":"작용과 반작용 관계와 운동량 보존 법칙을 알고, 스포츠, 교통수단, 발사체 등에 적용할 수 있다."},{"code":"12물리01-04","text":"일과 운동 에너지의 관계를 이해하고, 위치 에너지와 역학적 에너지 보존 법칙을 설명할 수 있다."},{"code":"12물리01-05","text":"역학적 에너지가 열의 형태로 전환될 때 에너지 총량이 변하지 않음을 설명할 수 있다."},{"code":"12물리01-06","text":"열이 역학적 에너지로 전환되는 과정의 효율을 정성적으로 이해하고, 영구기관이 불가능함을 사례를 통해 논증할 수 있다."}],"tamgu":["동영상을 활용하여 물체의 등가속도 운동 분석하기","일차원 충돌 상황에서 운동량 보존 확인하기"],"haeseol":[{"code":"12물리01-01","text":"일상생활에서 접할 수 있는 다양한 상황에서 돌림힘을 적용하되, 동역학적 상황이나 돌림힘의 기준점이 2개 이상이 되는 등 현실에서 찾기 힘든 복잡한 상황은 다루지 않는다."},{"code":"12물리01-04","text":"역학적 에너지 보존의 예로 지표 근처의 중력에 의한 위치 에너지와 탄성력에 의한 위치 에너지를 포함한다."},{"code":"12물리01-05","text":"열역학 과정을 명시적으로 다루지 않고, 열의 형태로 에너지가 전환되면서 발생하는 다양한 현상으로 열전달, 물질의 상태 변화, 기상 현상 등 중학교 과정에서 다룬 내용을 정성적으로 설명한다."}],"goryeo":["중학교 1∼3학년군 ‘힘의 작용’과 ‘운동과 에너지’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘역학과 에너지’의 시공간과 운동 및 열과 에너지와 연계된다.","고등학교에서 물리학을 처음 시작하는 영역으로서, 물리학이란 무엇이며 인류 문명과 일상생활에서 어떤 의의가 있는지를 소개하는 내용을 포함하여 수업을 구성할 수 있다.","뉴턴 역학과 운동량, 충격량을 다룰 때는 동영상을 분석하거나 마이크로프로세서 기반 장치 등 디지털 탐구 도구를 활용하여 창의적으로 설계하는 경험을 제공하고 학생의 흥미를 유발하여 적극적으로 수업에 참여할 수 있도록 한다.","학생들이 역학 실험을 실제로 수행하여 예상 값과 결과 값이 일치하거나 다르게 나오는 이유에 대해서 추론하고 근거를 제시하며 토의하게 할 수 있다.","열역학 법칙, 열역학 과정, 열기관은 고등학교 ‘역학과 에너지’에서 정량적으로 다루므로, 이 영역에서는 에너지 전환 과정에서 출입하는 열을 고려할 때 에너지 총량이 보존된다는 점에 초점을 맞추어 정성적으로 접근한다."],"area":"energy","track":"일반선택","subject":"물리학","electives":["역학과 에너지","통합과학1"],"prev":["m13-05","m13-19"],"next":[],"related":[]},{"id":"물리-02","grade":"물리","num":2,"title":"전기와 자기","standards":[{"code":"12물리02-01","text":"전하를 띤 입자들이 전기장과 전위차를 형성하여 서로 전기적으로 상호작용함을 설명할 수 있다."},{"code":"12물리02-02","text":"전기 회로에서 저항의 연결에 따라 소비 전력이 달라짐을 알고, 다양한 전기 기구에서 적용되는 사례를 찾을 수 있다."},{"code":"12물리02-03","text":"축전기에서 전기 에너지를 저장하는 원리가 각종 센서와 전기 신호 입력 장치 등 실생활 제품에서 활용됨을 설명할 수 있다."},{"code":"12물리02-04","text":"자성체의 종류를 알고 일상생활과 산업 기술에서 자성체가 활용되는 예를 찾을 수 있다."},{"code":"12물리02-05","text":"전류의 자기 작용을 이용하여 에너지를 전환하는 장치의 원리를 알고, 스피커와 전동기 등을 설계할 수 있다."},{"code":"12물리02-06","text":"전자기 유도 현상이 센서, 무선통신, 무선충전 등 에너지 전달 기술에 적용되어 현대 문명에 미친 영향을 인식할 수 있다."}],"tamgu":["저항의 직렬연결과 병렬연결에서 전류와 전압 측정하여 비교하기","다양한 재료를 활용하여 스피커를 설계하고 제작하여 음성 정보의 전기적 재생 과정 탐색하기","전자기 유도 작용을 이용한 무선 충전 원리를 이해하고 구현하기"],"haeseol":[{"code":"12물리02-02","text":"저항의 연결에 따른 차이를 설명하는 사례로 가정에서 여러 개의 전기 제품을 병렬연결하여 사용하는 상황 등을 제시하고, 전기 안전과 연관지어 안전한 전기 사용 방안을 도출하도록 한다."},{"code":"12물리02-03","text":"축전기에서 전기 에너지가 저장되는 원리와 활용 방안을 다루되, 축전기의 전기 용량, 연결, 유전체는 포함하지 않는다."},{"code":"12물리02-05","text":"전류의 자기 작용의 예시로 스피커와 전동기의 원리를 에너지 전환 관점에서 설명하고, 학생들이 스피커를 공학적으로 설계하고 제작하도록 지도한다."},{"code":"12물리02-06","text":"전자기 유도 법칙 자체보다는 에너지와 신호 전달 기술에 초점을 맞추어 내용을 전개한다."}],"goryeo":["중학교 1∼3학년군 ‘전기와 자기’, 고등학교 ‘통합과학1’의 물질과 규칙성, ‘ 전자기와 양자’의 전자기적 상호작용과 연계된다.","이 영역에서는 전기와 자기의 상호작용을 에너지 관점으로 해석하여 전자기 현상이 전기 회로와 전자 제품 등 실생활에 활용되는 예를 중심으로 접근한다.","전기장을 전기력선으로 표현하고 전기장을 정량적으로 구하는 것은 고등학교 ‘전자기와 양자’에서 다루고 있음을 고려할 때, 이 영역에서는 전하에 의해서 전기장이 생성된다는 점을 정성적으로 다룬다.","전자기학 원리가 적용된 기기나 제품의 기초 과학 원리를 파악하고, 공학적 설계를 바탕으로 창의적 산출물을 만들어내기 위한 탐구 활동이 포함되도록 기획할 수 있다."],"area":"energy","track":"일반선택","subject":"물리학","electives":["전자기와 양자","통합과학1"],"prev":["m13-14"],"next":[],"related":[]},{"id":"물리-03","grade":"물리","num":3,"title":"빛과 물질","standards":[{"code":"12물리03-01","text":"빛의 중첩과 간섭을 통해 빛의 파동성을 알고, 이를 이용한 기술과 현상을 예를 들어 설 명 할 수 있다."},{"code":"12물리03-02","text":"빛의 굴절을 이용하여 볼록렌즈에서 상이 맺히는 과정을 설명하고, 반도체와 디스플레이 제작 공정에서 중요하게 활용됨을 인식할 수 있다."},{"code":"12물리03-03","text":"빛과 물질의 이중성이 전자 현미경과 영상 정보 저장 등 다양한 분야에 활용됨을 설명할 수 있다."},{"code":"12물리03-04","text":"원자 내의 전자는 양자화된 에너지 준위를 가지고 있음을 스펙트럼 관찰 증거를 바탕으 로 논증할 수 있다."},{"code":"12물리03-05","text":"고체의 에너지띠 구조로부터 도체와 부도체의 차이를 알고, 반도체 소자의 원리를 설명할 수 있다."},{"code":"12물리03-06","text":"모든 관성계에서 빛의 속력이 동일하다는 원리로부터 시간 팽창, 길이 수축 현상이 나타남을 알고, 이러한 지식이 사회에 미친 영향을 조사할 수 있다."}],"tamgu":["이중 슬릿에 의한 빛의 간섭 관찰하기","볼록렌즈에 의한 실상을 관찰하여 상의 위치와 초점거리 찾기"],"haeseol":[{"code":"12물리03-02","text":"상이 맺히는 과정을 설명하기 위해 광선 추적법을 도입하며, 결상 공식이나 렌즈 제작자 공식, 복합 렌즈 등 복잡한 상황은 다루지 않는다. 광학 기술이 반도체 제작 공정에서 매우 정밀한 회로 기판을 인쇄하는 데 사용됨을 포토 리소그래피(photo-lithography) 과정을 중심으로 개략적으로 소개한다."},{"code":"12물리03-04","text":"수소 선스펙트럼 결과를 바탕으로 보어(Bohr)의 수소 원자 모형을 제시하고, 보어 모형의 한계를 언급한다."},{"code":"12물리03-05","text":"반도체 소자의 원리를 설명하는 사례로 p - n 접합과 다이오드를 다룬다."},{"code":"12물리03-06","text":"특수 상대성 이론은 광속 불변의 결과로 시간 팽창과 길이 수축이 일어나는 현상 위주로 설명하고, 동시성의 상대성과 정량적 계산은 다루지 않는다."}],"goryeo":["중학교 1∼3학년군 ‘빛과 파동’, 고등학교 ‘전자기와 양자’의 빛과 정보 통신과 양자와 미시세계와 연계된다.","빛의 반사, 굴절, 간섭, 중첩과 관련된 현상들을 생활 속에서 찾고 탐구 활동을 통해 직접 경험하도록 지도한다."],"area":"energy","track":"일반선택","subject":"물리학","electives":["전자기와 양자"],"prev":["m13-10"],"next":[],"related":[]},{"id":"화학-01","grade":"화학","num":1,"title":"화학의 언어","standards":[{"code":"12화학01-01","text":"화학이 현대 과학⋅기술⋅사회의 발전에 기여한 사례를 조사⋅발표하며 화학에 흥미와 호기심을 가질 수 있다."},{"code":"12화학01-02","text":"다양한 단위를 몰로 환산할 수 있음을 이해하고, 물질의 양을 몰 단위로 표현할 수 있다."},{"code":"12화학01-03","text":"여러 가지 반응을 화학 반응식으로 나타내고, 화학 반응에서 물질의 양적 관계를 설명할 수 있다."}],"tamgu":["다양한 물질의 몰질량을 탐색하고, 특정한 몰수에 해당하는 물질의 질량 측정하기","화학 반응에서의 양적 관계를 확인할 수 있는 실험을 계획하고 수행하기"],"haeseol":[{"code":"12화학01-03","text":"화학 반응식의 계수비는 반응하는 물질의 몰수비임을 강조하고, 화학 반응의 양적 관계를 다룰 때는 몰질량을 이용하여 몰수로 표현하면 반응물과 생성물의 양적 관계를 쉽게 이해할 수 있음을 강조한다."}],"goryeo":["중학교 1∼3학년군의 ‘물질의 구성과 화학 반응의 규칙성’, 고등학교 ‘통합과학1’의 물질과 규칙성, ‘물질과 에너지’의 용액의 성질, ‘화학반응의 세계’의 산 염기 평형과 연계된다.","화학이 인류의 문제를 해결하는 데 기여한 다양한 사례를 조사하여 화학을 학습해야 하는 이유와 중요성을 깨닫도록 지도한다.","몰은 물질의 양을 나타내는 기본 물리량으로 학생들이 수치적 계산에 치우치지 않고 물질의 양 표현에 대한 편리성이 있음을 인식할 수 있도록 지도한다."],"area":"matter","track":"일반선택","subject":"화학","electives":["물질과 에너지","통합과학1","화학반응의 세계"],"prev":[],"next":[],"related":[]},{"id":"화학-02","grade":"화학","num":2,"title":"물질의 구조와 성질","standards":[{"code":"12화학02-01","text":"실험을 통해 화학 결합의 전기적 성질을 설명할 수 있다."},{"code":"12화학02-02","text":"전기 음성도의 주기적 변화를 이해하고, 결합한 원소들의 전기 음성도 차이와 쌍극자 모멘트를 이용하여 결합의 극성을 판단할 수 있다."},{"code":"12화학02-03","text":"원자와 분자를 루이스 전자점식으로 표현하고, 전자쌍 반발 이론을 근거로 분자의 구조를 추론하여 모형으로 나타낼 수 있다."},{"code":"12화학02-04","text":"물질의 물리적, 화학적 성질을 분자의 구조와 연관 짓고, 이에 대한 호기심을 가질 수 있다."}],"tamgu":["물의 전기 분해 실험하기","소프트웨어를 활용하여 분자 구조 모델링하기"],"haeseol":[{"code":"12화학02-02","text":"쌍극자 모멘트는 정성적으로 다룬다."},{"code":"12화학02-03","text":"중심 원자는 2, 3주기 전형 원소 중 Be, B와 옥텟 규칙을 따르는 경우로 한정한다."}],"goryeo":["중학교 1∼3학년군의 ‘물질의 구성’, 고등학교 ‘통합과학1’의 물질과 규칙성, ‘ 물질과 에너지’의 물질의 세 가지 상태, 용액의 성질과 연계된다.","분자 구조를 이해하면 공유 결합 화합물의 성질을 예측하고 설명할 수 있음을 학습함으로써 화학의 유용성을 깨닫도록 지도한다.","소프트웨어를 활용하여 분자 구조를 모델링하는 경험을 통해 디지털 소양을 함양하도록 지도한다.","물의 전기 분해 실험을 할 때는 개인 보호 장구를 착용한 후 실험실 안전 수칙에 따라 실험하고, 실험이 끝난 뒤 남은 물질은 화학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다."],"area":"matter","track":"일반선택","subject":"화학","electives":["물질과 에너지","통합과학1"],"prev":["m13-11"],"next":[],"related":[]},{"id":"화학-03","grade":"화학","num":3,"title":"화학 평형","standards":[{"code":"12화학03-01","text":"가역 반응에서 나타나는 화학 평형 상태의 특징을 설명할 수 있다."},{"code":"12화학03-02","text":"화학 반응에서 반응물과 생성물의 농도 자료를 통해 평형 상수의 의미를 설명할 수 있다."},{"code":"12화학03-03","text":"반응 지수의 의미를 알고, 이를 평형 상수와 비교하여 반응의 진행 방향을 예측할 수 있다."},{"code":"12화학03-04","text":"농도, 압력, 온도 변화에 따른 화학 평형의 이동을 이해하고, 이를 일상생활 속 현상을 설명하는 데 적용하여 화학의 유용함을 느낄 수 있다."}],"tamgu":["자료 해석을 통해 화학 평형에서 농도비의 규칙성을 찾는 탐구하기","농도, 압력, 온도 변화에 따른 화학 평형 이동 실험하기"],"haeseol":[{"code":"12화학03-01","text":"가역 반응의 예시를 들 때 거시적으로 관찰 가능한 화학 평형 상태의 특징과 동적 평형 상태를 구분하여 다룬다."},{"code":"12화학03-02","text":"몰 농도 개념에 대한 설명은 평형 상수의 의미를 이해하는 데 필요한 정도로만 하고 자세한 내용은 ‘역동적인 화학 반응’에서 다룬다. 압력 평형 상수는 다루지 않는다."}],"goryeo":["중학교 1∼3학년군의 ‘화학 반응의 규칙성’, 고등학교 ‘통합과학2’의 변화와 다양성, ‘ 물질과 에너지’의 화학 변화의 자발성, ‘화학반응의 세계’의 산 염기 평형과 연계된다.","우리 주변의 다양한 가역 반응의 예시를 들어 화학 평형이 일상생활과 가까운 현상임을 느낄 수 있게 지도한다.","생명 현상에서 일어나는 화학 평형, 산업 현장에서 수득률을 높이기 위해 화학 평형을 이용한 사례를 조사하여 진로 탐색에 도움을 준다.","실험을 직접 수행하기 어려운 경우 모의실험 등을 활용하여 지도한다.","실험을 할 때는 개인 보호 장구를 착용한 후 실험실 안전 수칙에 따라 실험하고, 실험이 끝난 뒤 남은 물질은 화학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다."],"area":"matter","track":"일반선택","subject":"화학","electives":["물질과 에너지","통합과학2","화학반응의 세계"],"prev":["m13-16"],"next":[],"related":[]},{"id":"화학-04","grade":"화학","num":4,"title":"역동적인 화학 반응","standards":[{"code":"12화학04-01","text":"물의 자동 이온화와 물의 이온화 상수를 이해하고, 수소 이온의 농도를 pH로 표현할 수 있다."},{"code":"12화학04-02","text":"몰 농도의 의미를 이해하고, 원하는 몰 농도의 용액을 만들 수 있다."},{"code":"12화학04-03","text":"중화 반응을 이해하고, 중화 반응에서의 양적 관계를 설명할 수 있다."},{"code":"12화학04-04","text":"중화 적정 실험을 계획하고 수행하여 미지 시료의 농도를 찾을 수 있다."}],"tamgu":["강산이나 강염기 희석 시 몰 농도에 따른 pH 데이터를 수집하여 그래프로 표현하고 해석하기","적절한 실험 도구를 사용하여 표준 용액 만들기","식초 속 아세트산 함량 구하는 실험하기"],"haeseol":[{"code":"12화학04-03","text":"중화 반응에서의 양적 관계는 강산과 강염기의 반응으로 제한한다."},{"code":"12화학04-04","text":"중화 적정 곡선은 다루지 않는다."}],"goryeo":["중학교 1∼3학년군의 ‘화학 반응의 규칙성’, 고등학교 ‘통합과학2’의 변화와 다양성, ‘ 화학반응의 세계’의 산 염기 평형과 연계된다.","산과 염기 수용액을 다룰 때는 개인 보호 장구를 착용한 후 실험실 안전 수칙에 따라 실험하고, 실험이 끝난 뒤 남은 물질은 화학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다."],"area":"matter","track":"일반선택","subject":"화학","electives":["통합과학2","화학반응의 세계"],"prev":["m13-16"],"next":[],"related":[]},{"id":"생과-01","grade":"생과","num":1,"title":"생명 시스템의 구성","standards":[{"code":"12생과01-01","text":"생물 및 생명과학의 특성을 이해하고 생명과학의 성과를 협력적으로 소통할 수 있다."},{"code":"12생과01-02","text":"세포에서부터 생태계까지 생명 시스템의 구성 단계의 특징을 바탕으로 체계적인 설명 자료를 만들 수 있다."},{"code":"12생과01-03","text":"물질대사 과정에서의 에너지 전환 과정을 바탕으로 다양한 생명 활동에서의 에너지 사용을 추론할 수 있다."},{"code":"12생과01-04","text":"소화, 순환, 호흡, 배설 과정이 기관계의 통합적 작용으로 나타남을 신체의 생리적 변화와 연관지어 추론할 수 있다."},{"code":"12생과01-05","text":"물질대사 관련 질병 조사를 위한 방법을 고안하여 수행하고 대사성 질환을 예방하기 위한 올바른 생활 습관에 대해 토의하며 협력적으로 소통할 수 있다."},{"code":"12생과01-06","text":"생태계의 구조를 이해하고 물질의 순환과 에너지의 흐름을 추론하여 생태계 구성 요소들의 중요성을 설명할 수 있다."},{"code":"12생과01-07","text":"개체군과 군집의 특성을 이해하고 이들의 상호작용의 예를 조사하여 발표할 수 있다."}],"tamgu":["소화제와 소화 효소를 이용한 영양소 분해 실험하기","방형구법으로 식물 군집 분석하기"],"haeseol":[{"code":"12생과01-01","text":"생물과 비생물의 특성을 비교하고, 생명과학 분야의 학문적 특징은 간략하게 다루며, 현대 생명과학 분야의 성과는 여러 학문 분야의 성과와 결합되어 나타난다는 것에 초점을 두도록 한다."},{"code":"12생과01-02","text":"세포로부터 개체, 그리고 생태계에 이르기까지 생물의 구성 단계들이 구조적 체계를 이루고 있으며, 각각이 생명 시스템으로서 기능을 하고 있다는 것을 다룬다."},{"code":"12생과01-03","text":"ATP 구조를 구체적으로 다루기보다는 모든 살아있는 세포는 물질대사 과정에서 에너지가 ATP로 저장되고 사용된다는 수준에서 다루도록 한다."},{"code":"12생과01-04","text":"기관계의 통합적 작용을 실제 인체 활동 과정에서 나타나는 생리적 변화의 사례를 바탕으로 설명하도록 한다."},{"code":"12생과01-06","text":"생태계를 하나의 살아있는 유기체와 같은 개념으로서 이해하도록 하여 외부 환경의 변화에 의해 생태계 평형이 깨질 수 있음을 다룬다."},{"code":"12생과01-07","text":"개체군 내의 상호작용은 텃세, 순위제, 리더제, 사회생활, 가족생활을, 군집 내의 상호작용은 종간 경쟁, 분서, 공생, 기생, 포식과 피식을 다룬다."}],"goryeo":["중학교 1∼3학년군 ‘생물의 구성과 다양성’, ‘동물과 에너지’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘ 통합과학2’의 환경과 에너지, ‘ 세포와 물질대사’의 세포, 물질대사와 에너지와 연계된다.","생물과 비생물의 특성 이해를 위한 활동에서는 바이러스와 휴머노이드의 구조와 기능을 모식도나 모형으로 설명하도록 지도한다.","사람 기관계의 통합적 작용은 정보 그림, 영상, 역할놀이 등 다양한 방법을 활용하여 표현할 수 있도록 지도한다.","‘생태전환교육’의 차원에서 생태계 구조와 기능의 중요성을 설명한다."],"area":"life","track":"일반선택","subject":"생명과학","electives":["세포와 물질대사","통합과학1","통합과학2"],"prev":["m13-02","m13-13"],"next":[],"related":[]},{"id":"생과-02","grade":"생과","num":2,"title":"항상성과 몸의 조절","standards":[{"code":"12생과02-01","text":"신경 세포의 구조와 기능을 이해하고, 신경 세포에서의 전도 과정을 모식도로 표현할 수 있다."},{"code":"12생과02-02","text":"시냅스를 통한 신경 신호의 전달 과정을 이해하고, 약물이 시냅스 전달에 영향을 미치는 사례를 조사하여 발표할 수 있다."},{"code":"12생과02-03","text":"사람 신경계의 구조와 기능을 이해하고 중추 신경계와 말초 신경계의 특징을 설명할 수 있다."},{"code":"12생과02-04","text":"내분비계와 신경계 작용 원리와 상호작용의 이해를 바탕으로 우리 몸의 항상성이 유지되는 과정을 추론할 수 있다."},{"code":"12생과02-05","text":"병원체의 종류와 특징을 이해하고 우리 몸의 방어 작용을 선천적 면역과 후천적 면역으로 구분하여 설명할 수 있다."},{"code":"12생과02-06","text":"항원 항체 반응의 특이성을 이해하고, 혈액의 응집 반응 원리를 이용하여 혈액형을 판 정 할 수 있다."},{"code":"12생과02-07","text":"백신의 종류와 작용 원리를 조사하고 질병의 예방 측면에서 백신의 필요성을 인식하여 협력적으로 소통할 수 있다."}],"tamgu":["실감형 콘텐츠를 활용한 뇌 구조 탐구하기","스마트 헬스케어를 활용한 항상성 유지 작용 탐구하기","혈액형 검사를 통해 혈액형 판별하기"],"haeseol":[{"code":"12생과02-03","text":"중학교 수준에서 다루었던 자극과 반응 사이에 정보를 전달하는 신경계의 구조와 종류보다는 중추 신경계의 핵심인 대뇌 중심으로 뇌의 구조와 기능을 설명하고 중뇌, 소뇌, 연수, 간뇌는 간략하게 다루도록 한다."},{"code":"12생과02-04","text":"내분비계는 호르몬의 종류에 초점을 두기보다는 신경계와 호르몬의 통합적 작용에 의한 항상성 조절에 초점을 두어 다루도록 한다."},{"code":"12생과02-07","text":"백신 제조 방법에 따른 다양한 종류의 백신을 조사하고 감염성 질병을 일으키는 병원체들의 특징을 감염이나 예방과 관련지어 이해하도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘자극과 반응’, 고등학교 ‘통합과학 2’의 과학과 미래 사회와 연계된다.","다양한 가상 현실, 증강 현실 기술을 적용한 실감형 콘텐츠를 활용하여 뇌 구조를 탐구한다. 또한, 최신의 뇌 연구 관련 영상들을 시청하여 뇌과학 분야에 대한 흥미를 높인다.","휴대용 또는 착용형 간단한 장비나 센서로 스마트 헬스케어 시스템을 활용한 항상성 유지 작용을 탐구할 수 있는 실험을 스스로 설계하여 수행한다.","동영상 공유 플랫폼의 백신 연구 전문가들의 영상을 시청하고, 다양한 종류의 백신의 작용원리를 탐구하도록 지도한다."],"area":"life","track":"일반선택","subject":"생명과학","electives":["통합과학 2"],"prev":["m13-20"],"next":[],"related":[]},{"id":"생과-03","grade":"생과","num":3,"title":"생명의 연속성과 다양성","standards":[{"code":"12생과03-01","text":"염색체의 구조를 이해하고, DNA, 유전자의 관계를 설명할 수 있다."},{"code":"12생과03-02","text":"생식세포 형성과정을 체세포분열 과정과 비교하고, 생식세포 형성의 중요성을 생명의 연속성 및 다양성과 관련지어 추론할 수 있다."},{"code":"12생과03-03","text":"생물 진화의 원리를 이해하고, 생물 진화 연구의 다양한 사례를 조사하여 협력적으로 소 통 할 수 있다."},{"code":"12생과03-04","text":"생물의 분류 체계를 바탕으로 각 분류군의 차이를 이해하고 생물군을 분류 체계에 따라 설명할 수 있다."},{"code":"12생과03-05","text":"동물과 식물 분류군의 특징을 문 수준에서 이해하고, 생물의 유연관계를 계통수로 나타낼 수 있다."}],"tamgu":["염색체 모형을 이용한 핵형 분석하기","생식세포 형성과정을 창의적인 모델로 제작하기"],"haeseol":[{"code":"12생과03-01","text":"염색체, DNA, 유전자의 개념을 단계적으로 다루고, 이들 간의 상호 관계를 이해하도록 한다."},{"code":"12생과03-03","text":"진화에 대한 다윈의 아이디어를 조사하는 활동 등 자연선택에 의한 진화 과정을 중심으로 다루며, 하디-바인베르크 법칙은 다루지 않고 진화의 사례를 조사하여 변이와 자연선택에 의한 진화의 원리를 이해하도록 한다."},{"code":"12생과03-04","text":"생물의 분류 체계를 역과 계 수준에서만 다루도록 하고 세부적인 분류기준들을 설명하지 않는다."},{"code":"12생과03-05","text":"동물과 식물의 분류군의 특징을 문 수준에서 다루도록 하며, 식물과 동물의 계통수를 통해 유연관계를 이해하도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘생물의 구성과 다양성’과 ‘생식과 유전’, 고등학교 ‘통합과학1’의 물질과 규칙성, 시스템과 상호작용, 고등학교 ‘세포와 물질대사’의 세포, ‘생물의 유전’의 유전자와 유전물질과 연계된다.","생식세포 형성과정 모델을 창의적인 방법으로 제작하기 위해 간단한 디지털 프로그램이나 앱 도구를 소개하여 디지털 활용 능력도 키울 수 있도록 한다.","주변의 식물을 분류할 때에는 디지털 플랫폼을 활용하는 방법을 중심으로 안내한다.","온라인 식물도감 만들기","생물 분류 프로그래밍을 이용하여 계통수 작성하기"],"area":"life","track":"일반선택","subject":"생명과학","electives":["생물의 유전","세포와 물질대사","통합과학1"],"prev":["m13-02","m13-21"],"next":[],"related":[]},{"id":"지구-01","grade":"지구","num":1,"title":"대기와 해양의 상호작용","standards":[{"code":"12지구01-01","text":"해수의 물리적, 화학적 성질을 이해하고, 실측 자료를 활용하여 해수의 온도, 염분, 밀도, 용존 산소량 등의 분포를 분석⋅해석할 수 있다."},{"code":"12지구01-02","text":"심층 순환의 발생 원리와 분포를 알고, 표층 순환 및 기후변화의 관련성을 추론할 수 있다."},{"code":"12지구01-03","text":"중위도 저기압과 고기압이 통과할 때 날씨의 변화를 일기도, 위상 영상, 레이더 영상을 종합하여 예측할 수 있다."},{"code":"12지구01-04","text":"태풍의 발생, 이동, 소멸 과정 및 태풍 영향권에서 날씨를 예측하고, 뇌우, 집중호우, 폭설, 강풍, 황사 등 주요 악기상의 생성 메커니즘과 대처 방안을 제시할 수 있다."},{"code":"12지구01-05","text":"대기와 해양의 상호작용의 사례로서 해수의 용승과 침강, 엘니뇨-남방진동(ENSO)의 현상의 진행 과정 및 관련 현상을 설명할 수 있다."},{"code":"12지구01-06","text":"기후변화의 원인을 자연적 요인과 인위적 요인으로 구분하여 설명하고, 인간 활동에 의한 기후변화 문제를 과학적으로 해결하는 방법을 탐색할 수 있다."}],"tamgu":["인공위성 및 ARGO 자료로 해수의 성질 비교하기","일기도와 위성 및 레이더 영상 등을 이용하여 기압계와 연관된 과거 날씨 분석하기","기후변화의 원인을 설명하는 다양한 가설 추론하기"],"haeseol":[{"code":null,"text":"[12지구01-01∼02] 해수의 밀도가 수온과 염분에 따라 결정된다는 것을 T-S 다이어그램을 통해서 이해시키고, 심층 순환에서 주요 해류는 단순화시킨 바다 단면을 이용해서 다루며, 실제 해저 지형이나 대륙의 분포 등이 해류의 방향이나 해수의 대순환에 미치는 영향은 다루지 않는다."},{"code":"12지구01-03","text":"온대 저기압이란 용어는 중위도 저기압(mid-latitude Low)으로 표현한다. 저기압은 규모에 따라 전선을 동반한 저기압 (중위도 종관 규모 저기압)과 중규모 저기압(소나기(스콜)를 만드는 저기압)으로 구분한다는 것을 다룬다. 실제 우리나라 주변의 일기도와 관련지어 중위도 저기압이 통과하면서 나타나는 날씨의 변화를 설명한다."},{"code":"12지구01-04","text":"최근에 발생한 사례를 중심으로 태풍이 우리나라에 준 피해와 영향 및 위력을 간략하게 다루면서, 대기와 해양 및 대기와 육지의 상호작용 등에 초점을 둔다. 뇌우, 집중호우, 강풍, 폭설, 우박 등과 같은 우리나라의 주요 악기상을 소개하고 이들의 생성 메커니즘을 간단히 다룬다."},{"code":"12지구01-05","text":"대기와 해양의 상호작용과 기후시스템의 주기적인 변동성에 초점을 맞추어 엘니뇨-남방진동(ENSO)의 영향을 다루고, 엘니뇨와 라니냐 시기에 나타나는 현상을 중심으로 설명한다."}],"goryeo":["중학교 1∼3학년군 ‘수권과 해수의 순환’, 고등학교 ‘통합과학2’의 환경과 에너지, ‘ 지구시스템과학’의 해수의 운동과 연계된다.","해수의 운동 관련 내용은 중학교 내용을 심화하여 표층 순환과 심층 순환까지 다루되, 역학적 원리에 대한 설명은 배제하고 정성적으로 다룬다.","실제 일기도를 해석하거나 위성 영상을 활용하여 유체 지구인 대기와 해양에서 발생하는 다양한 현상들이 우리 생활에 미치는 영향을 조사하고, 이를 통해 지구계 내에서 기권 및 수권, 지권, 생물권의 상호작용을 이해하도록 지도할 수 있다.","인공위성 자료를 이용한 해수의 성질 조사, 일기도나 위성 영상 등을 이용하여 날씨 변화 예상, 남방진동이 우리 생활에 주는 영향 조사 등의 경우 전 지구 규모의 빅데이터 관측 자료를 활용하여 지구시스템 차원의 연결성과 상호작용을 파악하고, 데이터의 디지털화와 시뮬레이션 등을 체험함으로써 디지털 소양을 함양하도록 지도할 수 있다.","일기도나 위성 영상을 장기간 추적하는 프로젝트 학습 등의 형태로 탐구를 수행하도록 지도함으로써 과학적 태도와 탐구 과정을 체험하도록 지도할 수 있다."],"area":"earth","track":"일반선택","subject":"지구과학","electives":["지구시스템과학","통합과학2"],"prev":["m13-18"],"next":[],"related":[]},{"id":"지구-02","grade":"지구","num":2,"title":"지구의 역사와 한반도의 암석","standards":[{"code":"12지구02-01","text":"지층 형성의 선후 관계를 결정짓는 법칙들을 활용하여 상대 연령을 비교하고, 방사성 동위 원소를 이용한 광물의 절대 연령 자료로 암석의 절대 연령을 구할 수 있다."},{"code":"12지구02-02","text":"지질시대를 기(紀) 수준에서 구분하고, 지층과 화석을 통해 지질시대의 생물과 환경 변화를 해석할 수 있다."},{"code":"12지구02-03","text":"변동대에서 마그마가 생성되고, 그 조성에 따라 다양한 화성암이 생성됨을 설명할 수 있다."},{"code":"12지구02-04","text":"변성작용의 종류와 지각 변동에 따른 구조를 변동대와 관련지어 설명하고, 지구시스템에서 암석이 순환함을 추론할 수 있다."},{"code":"12지구02-05","text":"우리나라의 대표적인 지질공원의 지질학적 형성 과정을 추론하고, 지역사회와 함께하는 지질공원의 지속가능한 발전방안을 제안할 수 있다."}],"tamgu":["지질단면도에서 층서 대비하기","고기후 연구 방법 비교⋅평가하기","한반도에서 산출되는 화석 분포 지도 그리기","한반도 지질 명소(국가지질공원)에서 관찰 가능한 암석과 지질 구조 탐구하기"],"haeseol":[{"code":"12지구02-01","text":"지층 형성의 선후 관계를 결정짓는 법칙들 (수평퇴적의 법칙, 지층누중의 법칙, 동물군 천이의 법칙, 관입의 법칙, 부정합의 법칙 등)을 이해하고, 시간과 암석에 따라 층의 순서를 결정하고 지구의 역사에 대해 설명한다. 지층의 나이를 결정하는 데 상대 연령과 절대 연령이 있음을 이해하고 절대 연령의 경우 방사성 동위 원소를 이용하는 원리를 설명하고 간단한 계산을 통해 적용해 본다."},{"code":"12지구02-02","text":"지층에서는 퇴적암의 퇴적 구조와 퇴적 환경을 함께 다루고, 지질시대의 환경을 다루면서 표준 화석으로 살펴본 고생물, 지질시대를 결정하는 생물의 변천, 지구 환경의 변화 등을 다룬다. 또한, 지구의 역사를 통하여 기후가 어떻게 변해왔는지를 고기후 연구 방법을 조사하여 설명하되, 고기후 연구 방법만 소개하고 자세한 메커니즘은 다루지 않는다."},{"code":"12지구02-05","text":"우리나라의 모든 국가지질공원에 대해 각각의 특성을 열거하는 방식으로 다루는 것은 지양하며, 주변의 지질공원을 방문할 때 관찰 가능한 내용을 중심으로 다루도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘지권의 변화’, 고등학교 ‘지구시스템과학’의 지구 탄생과 생동하는 지구와 연계된다.","지사학의 법칙들을 다루기 전에 지사학의 기본 원리인 동일과정의 원리에 대해 다룬다. 또한, 지질시대의 기후변화를 다양한 고기후 연구 방법을 통해 다룬다.","화성암의 종류보다는 화성암이 생성되는 고유의 환경이 가지는 의미를 이해하는 데 중점을 두며, 한반도에 나타나는 대표적인 지형과 연계해서 수업을 전개한다.","암석에서 나타나는 다양한 지질 구조(퇴적암의 층리, 점이층리, 연흔 등, 화성암의 관입과 포획, 절리, 변성암의 습곡, 단층 등)의 생성 과정과 특징을 함께 다룬다."],"area":"earth","track":"일반선택","subject":"지구과학","electives":["지구시스템과학"],"prev":["m13-09"],"next":[],"related":[]},{"id":"지구-03","grade":"지구","num":3,"title":"태양계 천체와 별과 우주의 진화","standards":[{"code":"12지구03-01","text":"태양-지구-달 시스템에서의 식 현상을 이해하고 모형을 이용하여 태양계 행성의 겉보기 운동을 설명할 수 있다."},{"code":"12지구03-02","text":"별의 분광형 결정 및 별의 분류 과정을 이해하고, 흑체복사 법칙을 이용하여 별의 물리량을 추론할 수 있다."},{"code":"12지구03-03","text":"다양한 질량을 가진 별의 진화 과정을 H-R도에 나타내고 해석할 수 있다."},{"code":"12지구03-04","text":"허블의 은하 분류 체계에 따른 은하의 특징을 비교하고 외부은하의 자료를 이용하여 특이 은하의 관측적 특징을 추론할 수 있다."},{"code":"12지구03-05","text":"허블-르메트르 법칙으로 우주의 팽창을 이해하고 우주의 진화에 대한 다양한 설명 체계의 의의를 현대 우주론의 관점에서 비교할 수 있다."}],"tamgu":["천체 관측 프로그램으로 행성의 운동과 식 현상 시뮬레이션하기","별의 분광형과 광도 자료를 분석하여 H-R도 작성하기","빅데이터와 인공지능을 이용하여 은하 분류하기"],"haeseol":[{"code":"12지구03-01","text":"천체의 운동을 3차원 공간에서 이해할 수 있도록 천체 관측 시뮬레이션 프로그램을 활용한다. 식 현상은 중학교의 ‘태양계’에서 학습한 내용을 심화하여 천체의 공전 궤도 특징으로부터 식 현상의 원리를 설명하며, 일식은 지표면에 드리워진 달 그림자의 이동 궤적과 개기, 금환, 부분, 혼성 일식을, 월식은 개기, 부분 월식과 반영식을 다룬다."},{"code":"12지구03-03","text":"다양한 질량을 가진 별들의 진화 경로를 H-R도상에 제시하고, 영년 주계열을 기준으로 전주계열과 후주계열을 비교하여 이해한다. 별이 진화의 마지막 단계를 거쳐 다시 성간 물질로 되돌아가는 과정을 다룬다."},{"code":"12지구03-04","text":"허블의 은하 분류 체계가 형태학적 분류임을 이해하고 은하의 유형에 따른 성간 물질의 비율, 구성 천체의 나이 등의 특징을 비교하여 다룬다. 다양한 파장으로 관측한 외부은하의 관측 자료로부터 특이 은하의 스펙트럼을 이해할 수 있도록 지도한다."},{"code":"12지구03-05","text":"우주에 대한 관측적 증거를 바탕으로 현대 우주론이 정립되기까지의 과정에서 정적 우주, 팽창 우주, 급팽창, 가속 팽창의 개념을 다루며, 관측 가능한 우주의 개념을 도입한다."}],"goryeo":["중학교 1∼3학년군 ‘태양계’와 ‘별과 우주’, 고등학교 ‘통합과학1’의 물질과 규칙성, ‘ 행성우주과학’의 태양과 별의 관측과 은하와 우주와 연계된다.","천구와 좌표계의 개념은 도입하지 않으며, 디지털⋅인공지능 소양 함양과 관련하여 천체 관측 프로그램을 활용한 시뮬레이션 과정에 대한 수행평가를 실시할 수 있다.","질량이 서로 다른 주계열성의 물리량과 별이 진화하는 과정에서의 물리량 변화를 흑체복사 법칙을 이용하여 해석하는 과정에 초점을 맞춘다.","다양한 질량을 가진 별의 진화 과정에서 핵융합에 의한 에너지 생성과 내부구조의 차이를 다루되, 주계열 이후의 단계에서 구체적인 핵반응 메커니즘은 다루지 않는다.","우주에 대한 관측적 증거를 제시하여 이론이 정립되는 과정을 귀납적으로 추론하도록 지도하고, 표준 모형과 관련된 개념은 다루지 않는다."],"area":"earth","track":"일반선택","subject":"지구과학","electives":["통합과학1","행성우주과학"],"prev":["m13-07","m13-15"],"next":[],"related":[]},{"id":"역학-01","grade":"역학","num":1,"title":"시공간과 운동","standards":[{"code":"12역학01-01","text":"물체에 작용하는 여러 가지 힘의 합력을 구하여 물체의 운동을 정량적으로 예측할 수 있다."},{"code":"12역학01-02","text":"뉴턴 운동 법칙을 이용하여 물체의 포물선 운동을 정량적으로 설명하고, 포물선 운동에서의 역학적 에너지를 구할 수 있다."},{"code":"12역학01-03","text":"물체에 작용하는 힘의 방향에 따라 물체의 운동 방향이 변할 수 있음을 원운동 등 다양한 예를 들어 설명할 수 있다."},{"code":"12역학01-04","text":"케플러 법칙으로부터 중력의 존재가 밝혀지는 과학사적 배경을 이해하고, 중력을 이용하여 인공위성과 행성의 운동을 분석하고 설명할 수 있다."},{"code":"12역학01-05","text":"역학적 에너지 보존을 이용하여 행성에 따라 탈출 속도가 다름을 이해하고, 운동량 보존을 이용하여 우주선이 발사되어 궤도에 오르는 원리를 설명할 수 있다."},{"code":"12역학01-06","text":"등가 원리와 시공간의 휘어짐으로 인해 블랙홀과 중력 시간 지연이 나타남을 이해하고, 일반 상대론에 흥미를 느낄 수 있다."}],"tamgu":["스마트폰을 이용하여 다양한 놀이 기구의 운동 분석하기","포물선 운동을 하는 물체의 동영상을 분석하여 역학적 에너지 보존 확인하기","행성 관측 데이터를 이용하여 케플러 법칙 확인하기"],"haeseol":[{"code":"12역학01-01","text":"마찰력, 장력, 수직항력 등 물체에 작용하는 여러 가지 힘은 2차원 평면상에서 작용하는 힘으로만 다루도록 제한하고, 벡터의 합성을 통해 힘의 합력을 구하여 물체의 운동 예측에 활용할 수 있게 한다."},{"code":"12역학01-04","text":"태양과 행성 사이의 중력이 구심력이 됨을 이용하여 케플러 법칙을 설명할 수 있으며, 이러한 과학적 사고가 중력의 존재를 설명하는 데 과학사적으로 활용되었음을 이해하게 한다. 인공위성과 천체의 운동은 원운동에만 한정하여 정량적으로 설명하게 하며, 타원 운동에 대한 정량적인 설명은 도입하지 않는다."},{"code":"12역학01-05","text":"탈출 속도의 차이로 인해 행성별로 대기의 구성이 다름을 정성적으로 소개하고, 우주선이 발사되어 궤도에 오르는 원리를 정량적으로 다루지 않고 뉴턴 운동 법칙과 운동량 보존 법칙을 이용하여 정성적으로 설명한다."},{"code":"12역학01-06","text":"중력 질량과 관성 질량의 등가 원리 및 시공간의 휘어짐에 대한 기초적인 설명과 함께, 탈출 속도의 의미로부터 블랙홀의 의미를 기초적으로 설명하고, 위성 항법 장치(GPS) 시간 보정 등 중력 시간 지연이 실생활에서 활용되는 사례를 찾을 수 있게 한다."}],"goryeo":["중학교 1∼3학년군 ‘힘의 작용’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘ 물리학’의 힘과 에너지와 연계된다.","물체의 다양한 운동을 센서, 동영상 분석, 공공 데이터 활용 등을 통해 정량적으로 분석함으로써 데이터를 활용한 탐구 활동이 이루어지도록 한다."],"area":"energy","track":"진로선택","subject":"역학과 에너지","electives":["물리학","통합과학1"],"prev":["m13-05"],"next":[],"related":[]},{"id":"역학-02","grade":"역학","num":2,"title":"열과 에너지","standards":[{"code":"12역학02-01","text":"건축을 포함한 다양한 열에너지 관련 기술에 단열, 열팽창 등이 활용된 예를 조사함으로써 과학의 유용성에 대한 가치를 인식할 수 있다."},{"code":"12역학02-02","text":"열에 의한 물질의 상태 변화를 이해하고, 이상 기체의 온도, 압력, 부피의 관계를 설명 할 수 있다."},{"code":"12역학02-03","text":"계에 가해진 열이 계의 내부 에너지를 변화시키거나 외부에 일을 할 수 있음을 이해하고, 일상생활 속의 예를 찾음으로써 흥미를 느낄 수 있다."},{"code":"12역학02-04","text":"다양한 열기관에서의 순환 과정과 열효율을 설명하고, 열기관의 개발과 활용이 인류 공동체에 미친 영향을 산업발전과 환경 측면에서 평가할 수 있다."},{"code":"12역학02-05","text":"열의 이동, 기체의 확산과 같은 비가역 현상을 엔트로피를 이용하여 설명할 수 있다."}],"tamgu":["단열재의 종류에 따른 보온/보냉 효과 비교하기","센서를 이용하여 기체의 압력, 부피, 온도 관계 분석하기"],"haeseol":[{"code":"12역학02-01","text":"고체뿐만 아니라 액체, 기체와 같은 유체에서 열이 전도, 대류, 복사 등의 방법으로 전달되는 과정을 이해하고, 냉난방을 위한 건축물의 단열재 및 건축물의 구조 등 실생활에 활용되는 사례를 조사하고 설명할 수 있게 한다."},{"code":"12역학02-02","text":"물질의 고유한 특성인 비열과 잠열을 정량적으로 이해할 수 있게 하고, 이상 기체 법칙을 실생활에서의 다양한 열 현상에 적용할 수 있게 한다."},{"code":"12역학02-03","text":"등압 과정, 등적 과정, 등온 과정 등 다양한 열역학 과정을 통해 이상 기체에 가해진 열과 일, 내부 에너지의 변화 등 열역학 제 1법칙의 기초를 이해할 수 있게 하고, 열역학 제1법칙이 에너지 보존 법칙의 다른 표현임을 이해할 수 있게 한다."}],"goryeo":["중학교 1∼3학년군 ‘열’, 고등학교 ‘통합과학2’의 환경과 에너지, ‘물리학’의 힘과 에너지와 연계된다.","열기관 등에서의 열 현상의 정량적인 계산은 지양하고, 다양한 사례를 통하여 열역학 법칙의 활용 및 열효율을 높이기 위한 인류의 노력을 조사하게 하고, 특히 열의 활용으로 인한 지구온난화 등 지구 환경 문제 사이의 관계를 인식하게 한다.","변인 간의 간단한 관계를 확인하는 실험보다는 학생의 흥미를 북돋고 창의적 설계를 유도할 수 있는 탐구 활동을 진행하도록 한다."],"area":"energy","track":"진로선택","subject":"역학과 에너지","electives":["물리학","통합과학2"],"prev":["m13-03"],"next":[],"related":[]},{"id":"역학-03","grade":"역학","num":3,"title":"탄성파와 소리","standards":[{"code":"12역학03-01","text":"용수철 진자를 통해 단진동을 이해하고, 가속도와 변위 사이의 관계를 설명할 수 있다."},{"code":"12역학03-02","text":"탄성파의 진행, 투과, 반사를 이해하고, 탄성파가 활용되는 예를 찾음으로써 과학의 유용성을 인식할 수 있다."},{"code":"12역학03-03","text":"도플러 효과를 이해하고 물체의 속도 측정 등 다양한 장치에 이용됨을 설명할 수 있다."},{"code":"12역학03-04","text":"음향 장치 또는 실내외 공간에서의 소음 제어에 음파의 간섭이 활용됨을 이해하고, 실생활에 사용되는 사례를 조사할 수 있다."},{"code":"12역학03-05","text":"현악기, 관악기 등에서 소리를 내는 원리를 정상파를 이용하여 설명할 수 있다."}],"tamgu":["파동 용수철을 이용하여 종파와 횡파를 구현하고, 각 탄성파의 진행 속력 측정하기","스마트폰을 활용하여 도플러 효과 측정하기","정상파를 이용한 음파의 진행 속력 측정하기"],"haeseol":[{"code":"12역학03-02","text":"탄성파의 진행을 파장, 진동수, 진행 속력으로 기술하도록 한다. 탄성파가 매질의 경계면에서 투과 또는 반사를 할 때 탄성파의 위상이 변화됨을 다루고, 탄성파가 활용되는 예로 초음파 영상, 비파괴 검사 등을 이용한다."},{"code":"12역학03-04","text":"둘 이상의 파원에서 만들어지는 파동은 중첩될 수 있으며, 특히 중첩이 일정한 형태로 지속될 때 간섭 현상이 발생함을 알게 하여, 이를 활용한 소음 제거, 소리의 증폭 등 다양한 활용이 가능함을 알게 한다."},{"code":"12역학03-05","text":"정상파의 특성을 악기를 이용하여 이해하게 하고, 현 또는 관의 길이에 따라 정상파의 파장이 달라짐을 정량적으로 설명할 수 있게 한다."}],"goryeo":["중학교 1∼3학년군 ‘빛과 파동’, 고등학교 ‘물리학’의 빛과 물질, ‘전자기와 양자’의 빛과 정보 통신과 연계된다.","파동 방정식을 도입하지 않고, 탄성체의 연속적 결합을 통하여 파동의 진행과 파동의 속성을 설명할 수 있음을 탐구 활동을 통하여 이해할 수 있게 지도한다.","스마트 기기나 소리 센서 등을 이용하여 진폭 또는 진동수와 같은 음파의 특성을 분석하고 탐구를 수행하도록 지도한다."],"area":"energy","track":"진로선택","subject":"역학과 에너지","electives":["물리학","전자기와 양자"],"prev":["m13-10"],"next":[],"related":[]},{"id":"전자-01","grade":"전자","num":1,"title":"전자기적 상호작용","standards":[{"code":"12전자01-01","text":"전하 주위의 전기장을 정량적으로 구하고, 전기력선과 등전위면으로부터 전기장의 세기와 방향을 추리할 수 있다."},{"code":"12전자01-02","text":"정전기 유도와 유전분극을 설명하고, 일상생활에서 적용되는 예를 찾을 수 있다."},{"code":"12전자01-03","text":"자기력선을 이용하여 전류가 흐르는 도선 주위의 자기장의 세기와 방향을 추리할 수 있다."},{"code":"12전자01-04","text":"로런츠 힘이 발생하는 조건을 알고, 로런츠 힘과 관련된 현상과 기술을 설명할 수 있다."},{"code":"12전자01-05","text":"자기선속의 변화로 전자기 유도를 이해하고, 변압기, 인덕터 등 전자기 유도의 활용 기술을 설명할 수 있다."},{"code":"12전자01-06","text":"저항, 축전기, 인덕터를 활용하는 장치를 찾아 에너지 관점에서 정성적으로 설명할 수 있다."},{"code":"12전자01-07","text":"다이오드, 트랜지스터 등 반도체 소자를 활용하는 전자회로를 분석하고, 현대 문명에서 반도체의 중요성을 인식할 수 있다."}],"tamgu":["도체판과 자석을 이용하여 자기 브레이크 탐색하기","트랜지스터를 이용하여 스피커 소리 증폭하기"],"haeseol":[{"code":null,"text":"[12전자01-01,03] 등전위면, 전기력선, 자기력선을 그리는 방법 대신 이미 그려진 그림을 해석하여 전기장과 자기장에 대한 정보를 추리하는 방식으로 다룬다."},{"code":"12전자01-04","text":"도선이 받는 힘, 입자 가속기, 토카막, 밴앨런대 등 로런츠 힘과 관련된 다양한 현상과 사례를 다룬다."},{"code":"12전자01-07","text":"반도체 소자를 활용한 정류, 증폭, 기 초 논리회로 등을 회로 위주로 다루며, 미시적 작동 원리에 초점을 맞추지 않도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘전기와 자기’, 고등학교 ‘통합과학1, 2’의 물질과 규칙성, 환경과 에너지, ‘물리학’의 전기와 자기와 연계된다.","전기장과 자기장을 다룰 때, 입자가 장을 만들고 장이 만들어진 곳에 놓인 다른 입자가 힘을 받는다는 의미에서 장이 상호작용의 매개물이라는 것을 인식하게 한다.","전자기 상호작용을 다룰 때, 자연 현상 이외에 전자기 상호작용을 이용한 기술들이 다양한 산업 영역에서 활용됨을 소개한다.","저항, 축전기, 인덕터, 다이오드, 트랜지스터 등의 소자를 활용한 장치와 회로들이 어떻게 작동하고 일상생활에서 어떻게 활용되는지를 인식하도록 지도한다."],"area":"energy","track":"진로선택","subject":"전자기와 양자","electives":["물리학"],"prev":["m13-14"],"next":[],"related":[]},{"id":"전자-02","grade":"전자","num":2,"title":"빛과 정보 통신","standards":[{"code":"12전자02-01","text":"빛의 간섭과 회절을 알고, 홀로그램 등 현대의 정밀 기술에 활용되는 예를 찾을 수 있다."},{"code":"12전자02-02","text":"렌즈와 거울을 이용한 광학 기기의 원리와 수차를 설명할 수 있다."},{"code":"12전자02-03","text":"편광의 원리를 이해하고, 이를 활용한 디지털 정보 기술의 사례를 조사할 수 있다."},{"code":"12전자02-04","text":"광전효과에서 빛과 물질이 상호작용하는 방식을 알고, 디지털 영상 정보, 광센서, 태양전지 등 광전효과와 관련된 다양한 기술을 조사할 수 있다."},{"code":"12전자02-05","text":"레이저의 특징과 빛이 증폭되는 원리를 알고, 레이저가 디지털 광통신 등 여러 영역에서 활용됨을 조사하여 현대 문명에서 레이저의 중요성을 인식할 수 있다."}],"tamgu":["세워진 비누막에 의한 빛의 간섭 양상 관찰하고 설명하기","센서와 편광판을 이용하여 다양한 디스플레이에서 나오는 빛의 편광 상태 조사하기"],"haeseol":[{"code":"12전자02-01","text":"반사에 의한 위상변화를 포함하여 간섭 현상을 다루며, 회절과 분해능은 정성적으로만 다룬다."},{"code":"12전자02-02","text":"카메라, 망원경, 현미경 등의 광학 기기는 정성적 원리 위주로 다루며, 렌즈, 거울, 프리즘 등이 광학 기기에서 어떻게 활용되며 어떤 원리가 관련되는지를 설명할 수 있도록 지도한다. 수차는 구면수차와 색수차에 대한 용어 도입 없이 정성적으로 다룬다."},{"code":"12전자02-03","text":"편광판을 지나는 빛의 투과량 변화는 정성적으로 다룬다."}],"goryeo":["중학교 1∼3학년군 ‘빛과 파동’, 고등학교 ‘물리학’의 빛과 물질과 연계된다.","레이저 등 광학 기기를 실물로 다룰 때 빛의 특성에서 유래하는 위험 요인을 설명하고 안전에 유의한다.","빛과 물질이 상호작용하는 기본 방식인 흡수와 방출을 이해하고, 광전효과와 레이저가 현대사회에서 어떻게 이용되는지 인식할 수 있도록 지도한다."],"area":"energy","track":"진로선택","subject":"전자기와 양자","electives":["물리학"],"prev":["m13-10"],"next":[],"related":[]},{"id":"전자-03","grade":"전자","num":3,"title":"양자와 미시세계","standards":[{"code":"12전자03-01","text":"단일 양자 수준의 이중 슬릿 실험을 통해서 입자-파동 이중성을 확인하고, 단일 양자의 분포에 대한 실험 결과를 확률 파동의 간섭을 토대로 해석할 수 있다."},{"code":"12전자03-02","text":"중첩과 측정을 통한 확률적 상태 변화를 이해하고, 이를 이용한 양자컴퓨터, 양자암호통신 등의 양자 기술이 일상생활과 미래 사회에 미칠 영향을 인식할 수 있다."},{"code":"12전자03-03","text":"터널 효과를 설명하고, 관련된 현상과 기술을 조사하여 발표할 수 있다."},{"code":"12전자03-04","text":"현대의 원자모형을 불확정성 원리와 확률을 기반으로 설명하고, 보어의 원자모형과 비교할 수 있다."},{"code":"12전자03-05","text":"별에서 핵융합에 의해 에너지가 생성되고 빛이 방출되는 원리를 알고, 별빛의 스펙트럼에 기반하여 별의 구성 원소를 추리할 수 있다."}],"tamgu":["전자의 이중 슬릿 실험에 대한 컴퓨터 모의실험하기","스펙트럼 관찰을 통해 에너지 준위 확인하기"],"haeseol":[{"code":"12전자03-01","text":"드브로이 관계식을 바탕으로 단일 전자나 광자 수준의 이중 슬릿 실험에서 나타나는 입자-파동 이중성의 기묘함을 학생들이 인식할 수 있도록 정성적으로 다룬다."},{"code":"12전자03-02","text":"양자 기술은 물리적 원리보다는 사회에 미치는 영향을 중심으로 다룬다."},{"code":"12전자03-03","text":"터널 효과가 고전적으로 불가능하지만 전자소자 소형화에 따른 터널 효과 발생 문제와 주사 터널링 현미경(STM) 등 다양한 현상과 기술에서 나타나는 확률적 현상임을 정성적으로 설명하여 지도한다."},{"code":"12전자03-04","text":"현대의 원자모형에서 오비탈은 다루지 않는다."}],"goryeo":["고등학교 ‘물리학’의 빛과 물질과 연계된다.","양자물리 개념에 대한 엄밀한 설명보다는 양자물리의 기묘함을 학생들이 인식하게 하고, 학생들의 상상력을 북돋우는 데 초점을 맞추어 지도한다.","양자현상에 대한 직접 관찰과 실험 대신 컴퓨터 모의실험을 활용하여 지도한다."],"area":"energy","track":"진로선택","subject":"전자기와 양자","electives":["물리학"],"prev":[],"next":[],"related":[]},{"id":"물에-01","grade":"물에","num":1,"title":"물질의 세 가지 상태","standards":[{"code":"12물에01-01","text":"기체의 온도, 압력, 부피, 몰수 사이의 관계를 통합적으로 이해하고, 이상 기체 방정식을 근사적으로 활용하는 사례를 조사하여 화학의 유용함을 인식할 수 있다."},{"code":"12물에01-02","text":"혼합 기체의 부분 압력과 몰 분율의 관계를 알고, 일상생활에서 유용하게 사용되는 혼합 기체에 호기심을 가질 수 있다."},{"code":"12물에01-03","text":"물질이 액체로 존재할 수 있는 이유를 분자 간 상호작용으로 이해하고, 액체의 종류에 따라 끓는점이 달라짐을 설명할 수 있다."},{"code":"12물에01-04","text":"고체를 결정과 비결정으로 구분하고, 결정성 고체를 화학 결합의 종류에 따라 분류할 수 있다."}],"tamgu":["이상 기체 방정식을 활용하여 기체의 종류를 확인할 수 있는 실험 설계하고 수행하기","수소 화합물의 끓는점에 영향을 주는 요인 추론하기"],"haeseol":[{"code":"12물에01-04","text":"결정 구조는 다루지 않고, 이온 결합, 공유 결합, 금속 결합을 이용하여 결정성 고체를 이온 결정, 분자 결정, 공유 결정, 금속 결정으로 구분하는 수준으로 다룬다."}],"goryeo":["중학교 1∼3학년군의 ‘물질의 상태 변화’, ‘기체의 성질’, ‘물질의 특성’, 고등학교 ‘통합과학1’의 물질과 규칙성, ‘화학’의 화학의 언어, 물질의 구조와 성질과 연계된다.","모의실험을 통해 기체의 압력과 부피, 온도와 부피, 몰수와 부피 관계 등을 파악하여 디지털 소양을 함양하도록 지도한다.","물질이 온도와 압력에 따라 기체상, 액체상, 고체상으로 존재할 수 있음을 지도한다.","실험을 할 때는 개인 보호 장구를 착용한 후 실험실 안전 수칙에 따라 실험하고, 실험이 끝난 뒤 남은 물질은 화학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다."],"area":"matter","track":"진로선택","subject":"물질과 에너지","electives":["통합과학1","화학"],"prev":["m13-04","m13-06","m13-08"],"next":[],"related":[]},{"id":"물에-02","grade":"물에","num":2,"title":"용액의 성질","standards":[{"code":"12물에02-01","text":"다른 액체와 구별되는 물의 성질을 수소 결합으로 설명하고, 경이로운 물의 성질에 흥미를 느낄 수 있다."},{"code":"12물에02-02","text":"실험 데이터를 이용하여 용액의 농도에 따른 증기압, 끓는점, 어는점의 변화를 비교하고, 일상생활에서 나타나는 사례와 연관 지어 설명할 수 있다."},{"code":"12물에02-03","text":"용액의 농도에 따른 삼투현상을 이해하고, 일상생활에서 삼투현상이 나타나는 사례를 찾아 화학 원리가 유용하게 적용됨을 인식할 수 있다."}],"tamgu":["온도 센서를 이용하여 다양한 농도 조건에서 설탕물의 끓는점과 어는점 측정하기","농도와 삼투현상의 관계를 찾기 위한 실험 설계하고 수행하기"],"haeseol":[{"code":"12물에02-02","text":"끓는점 오름과 어는점 내림은 몰랄 농도 또는 몰 분율을 도입하여 다룬다."}],"goryeo":["중학교 1∼3학년군의 ‘물질의 상태 변화’, ‘물질의 특성’, 고등학교 ‘화학’의 물질의 구조와 성질과 연계된다.","디지털 센서를 이용한 온도 데이터의 수집과 저장, 처리를 통해 데이터 기반 탐구 활동을 하도록 지도한다.","실험을 할 때는 개인 보호 장구를 착용한 후 실험실 안전 수칙에 따라 실험하고, 실험이 끝난 뒤 남은 물질은 화학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다."],"area":"matter","track":"진로선택","subject":"물질과 에너지","electives":["화학"],"prev":["m13-04","m13-08"],"next":[],"related":[]},{"id":"물에-03","grade":"물에","num":3,"title":"화학 변화의 자발성","standards":[{"code":"12물에03-01","text":"엔탈피의 의미를 알고, 엔탈피를 이용하여 열화학 반응식을 표현할 수 있다."},{"code":"12물에03-02","text":"측정하기 어려운 화학 반응의 엔탈피를 헤스 법칙으로 구하여 화학 법칙의 유용성을 인식할 수 있다."},{"code":"12물에03-03","text":"엔트로피의 의미를 이해하고, 엔탈피와 엔트로피의 변화로 화학 변화의 자발성을 설명할 수 있다."}],"tamgu":["대체 연료와 화석 연료의 효율성을 비교하는 탐구하기","중화 반응으로 헤스 법칙을 확인하는 실험하기"],"haeseol":[{"code":"12물에03-01","text":"화학 반응에서 열의 출입에 관련된 내용으로 제한하며, 열역학 함수로서의 엔탈피는 다루지 않는다."},{"code":"12물에03-03","text":"깁스 자유 에너지는 다루지 않으며, 엔트로피는 정성적으로 다룬다."}],"goryeo":["중학교 1∼3학년군의 ‘물질의 상태 변화’와 ‘화학 반응의 규칙성’, 고등학교 ‘통합과학2’의 변화와 다양성과 연계된다.","화학 반응의 엔탈피 변화 그림, 열화학 반응식 등 다양한 자료를 활용하여 헤스 법칙을 해석하도록 지도한다.","대체 연료는 수소, 에탄올 등과 같이 간단한 물질을 다루고, 연소 시 단위 질량이나 단위 부피당 반응 엔탈피를 화석 연료와 비교하여 연료의 효율성을 판단하도록 지도한다.","실험을 할 때는 개인 보호 장구를 착용한 후 실험실 안전 수칙에 따라 실험하고, 실험이 끝난 뒤 남은 물질은 화학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다."],"area":"matter","track":"진로선택","subject":"물질과 에너지","electives":["통합과학2"],"prev":["m13-04","m13-16"],"next":[],"related":[]},{"id":"물에-04","grade":"물에","num":4,"title":"반응 속도","standards":[{"code":"12물에04-01","text":"화학 반응 속도를 반응물의 농도로 표현할 수 있음을 알고, 자료 해석을 통하여 반응 속도식을 구할 수 있다."},{"code":"12물에04-02","text":"1차 반응의 반감기가 반응물의 농도에 의존하지 않음을 이해하고, 1차 반응의 반감기가 활용되는 사례를 조사⋅발표할 수 있다."},{"code":"12물에04-03","text":"화학 반응에서 유효 충돌과 활성화 에너지의 의미를 알고, 화학 반응이 일어나기 위한 조건에 관심을 가질 수 있다."},{"code":"12물에04-04","text":"농도, 온도, 촉매에 따라 반응 속도가 달라짐을 이해하고, 일상생활에서 각각의 예를 찾아 화학의 유용성을 인식할 수 있다."}],"tamgu":["센서를 활용하여 반응 속도를 측정하는 실험 설계하고 수행하기","농도, 온도, 촉매와 반응 속도의 관계를 탐구하는 실험하기"],"haeseol":[{"code":"12물에04-02","text":"적분 속도식을 유도하는 것은 다루지 않으며, 자료 해석을 통해 반감기를 찾도록 한다."}],"goryeo":["중학교 1∼3학년군의 ‘화학 반응의 규칙성’, 고등학교 ‘통합과학2’의 변화와 다양성, ‘ 화학’의 역동적인 화학 반응과 연계된다.","디지털 탐구 도구를 이용하여 학생들이 문제를 해결하기 위해 실시간 데이터를 수집, 저장, 처리함으로써 디지털 소양을 함양하도록 지도한다.","생태전환교육과 연계하여 토양 오염, 수질 오염, 대기 오염 등 인류가 당면한 환경 문제의 심각성을 인지하고, 촉매나 효소를 사용하여 이를 해결하는 방법을 통해 지속가능한 지구에 대한 책임감을 갖도록 지도한다.","실험을 할 때는 개인 보호 장구를 착용한 후 실험실 안전 수칙에 따라 실험하고, 실험이 끝난 뒤 남은 물질은 화학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다."],"area":"matter","track":"진로선택","subject":"물질과 에너지","electives":["통합과학2","화학"],"prev":["m13-16"],"next":[],"related":[]},{"id":"반응-01","grade":"반응","num":1,"title":"산 염기 평형","standards":[{"code":"12반응01-01","text":"브뢴스테드-라우리 산과 염기의 정의를 이해하고, 이에 따라 산과 염기를 구별할 수 있다."},{"code":"12반응01-02","text":"이온화 상수를 이용하여 산과 염기의 상대적인 세기를 추론하고, 약산과 약염기 수용액의 pH를 구할 수 있다."},{"code":"12반응01-03","text":"중화 적정 실험의 pH 변화를 데이터에 근거하여 해석할 수 있다."},{"code":"12반응01-04","text":"이온화 상수를 이용하여 염의 가수 분해를 설명할 수 있다."},{"code":"12반응01-05","text":"화학 평형으로 생체 내 완충 작용을 설명하고, 화학 원리의 신비로움을 느낄 수 있다."}],"tamgu":["0.1M의 강산, 강염기, 약산, 약염기 수용액의 pH를 측정하고 이론값과 비교하기","실험 데이터에 근거하여 중화 적정 곡선 시각화하기","짝산 짝염기의 이온화 상수를 바탕으로 염 수용액의 액성을 예측하고 실험 결과와 비교하기","강산이나 강염기를 첨가할 때 물과 완충 용액의 pH 변화 비교하기"],"haeseol":[{"code":"12반응01-01","text":"브뢴스테드-라우리 산과 염기 정의의 확장성과 유용성을 다룬다."},{"code":"12반응01-05","text":"완충 작용을 설명할 때 복잡한 pH 계산은 지양하고, 생체 내 화학 반응에서 완충 용액의 중요성을 중심으로 다룬다."}],"goryeo":["중학교 1∼3학년군의 ‘물질의 구성’, ‘화학 반응의 규칙성’, 고등학교 ‘통합과학2’의 변화와 다양성, ‘화학’의 화학 평형, 역동적인 화학 반응과 연계된다.","브뢴스테드-라우리 정의에서부터 약산, 약염기 수용액의 pH를 구하기까지 화학 평형의 개념이 바탕이 됨을 인지하도록 지도한다.","중화 적정 곡선을 다룰 때 학생들이 수학적 사고에 기반한 컴퓨팅 사고력과 디지털 소양을 함양하도록 수업을 구성하여 지도할 수 있다.","산과 염기 수용액을 다룰 때는 개인 보호 장구를 착용한 후 실험실 안전 수칙에 따라 실험하고, 실험이 끝난 뒤 남은 물질은 화학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다."],"area":"matter","track":"진로선택","subject":"화학 반응의 세계","electives":["통합과학2","화학"],"prev":["m13-11","m13-16"],"next":[],"related":[]},{"id":"반응-02","grade":"반응","num":2,"title":"산화⋅환원 반응","standards":[{"code":"12반응02-01","text":"전자의 이동과 산화수 변화로 산화⋅환원 반응을 이해하고, 반쪽 반응식을 활용하여 산화⋅환원 반응식을 완성할 수 있다."},{"code":"12반응02-02","text":"화학 전지의 발전 과정을 조사하여 실용 전지의 구조적 공통점을 추론할 수 있다."},{"code":"12반응02-03","text":"화학 전지의 원리를 산화⋅환원 반응으로 설명하고, 표준 환원 전위를 이용하여 전위차를 구할 수 있다."},{"code":"12반응02-04","text":"전기 분해의 원리를 산화⋅환원 반응으로 설명하고, 산업 현장에서 활용되는 전기 분해의 예를 조사하여 발표할 수 있다."},{"code":"12반응02-05","text":"생명 현상 및 화학 전지에서 이용되는 다양한 산화 ⋅환원 반응과 그 반응에 이용된 물질의 역할을 조사하여 화학의 신비로움을 느낄 수 있다."}],"tamgu":["금속판과 전해질을 이용하여 전지를 구성하고, 효율적인 전지가 갖추어야 하는 조건 탐색하기","염 수용액과 전원 장치를 이용하여 금속 제품 표면에 도금하기","지속가능한 발전을 위한 미래 전지 설계하기"],"haeseol":[{"code":"12반응02-01","text":"산화⋅환원 반응은 동시에 일어남을 다룬다. 산화제와 환원제가 따로 정해져 있는 것이 아니라 특정 산화 ⋅환원 반응에서 상대적 세기에 의해 결정되는 것임을 강조한다."},{"code":"12반응02-03","text":"산화⋅환원 반응을 통하여 화학 에너지가 전기 에너지로 전환되는 원리를 다룬다."}],"goryeo":["중학교 1∼3학년군의 ‘화학 반응의 규칙성’, 고등학교 ‘통합과학2’의 변화와 다양성, ‘화학’의 화학의 언어와 연계된다.","학생들이 조사한 과제를 발표하는 과정에서 다양한 의견들을 서로 검토하도록 동료 평가를 실시할 수 있다.","화학 전지 만들기 및 도금 실험을 수행할 때 개인 보호 장구를 착용한 후 실험실 안전 수칙에 따라 실험하고, 실험이 끝난 뒤 남은 물질은 화학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다."],"area":"matter","track":"진로선택","subject":"화학 반응의 세계","electives":["통합과학2","화학"],"prev":["m13-16"],"next":[],"related":[]},{"id":"반응-03","grade":"반응","num":3,"title":"탄소 화합물과 반응","standards":[{"code":"12반응03-01","text":"일상생활에 유용한 탄소 화합물을 작용기에 따라 분류할 수 있다."},{"code":"12반응03-02","text":"간단한 탄소 화합물의 화학 반응 예를 찾아 작용기의 변화로 설명할 수 있다."},{"code":"12반응03-03","text":"단위체의 중합 반응으로 다양한 고분자가 합성되는 것을 이해하여 화학 반응의 유용성을 인식할 수 있다."},{"code":"12반응03-04","text":"탄소 화합물의 반응을 통해 합성된 새로운 물질이 과학⋅기술⋅사회 발전에 끼친 영향을 조사하여 화학의 유용성을 깨달을 수 있다."}],"tamgu":["간단한 알코올, 알데하이드, 카복실산 분자를 화학식으로 표현하고 성질 탐구하기","음주 측정기 만들기, 은거울 반응 등 실험을 통해 작용기의 변화 탐구하기","탄소 화합물의 반응을 이용하여 의약품, 인공 향, 고분자 등 새로운 물질 만들기"],"haeseol":[{"code":null,"text":"[12반응03-01∼02] 작용기는 알코올, 알데하이드, 카복실산만 다루고 작용기가 바뀌면 화합물의 성질도 바뀐다는 수준으로 다룬다."},{"code":"12반응03-03","text":"단백질, 핵산과 같은 천연 고분자뿐만 아니라 합성 고분자도 단위체의 반복적 결합으로 만들어진다는 것을 이해하는 수준으로 다룬다."}],"goryeo":["중학교 1∼3학년군의 ‘물질의 구성’, 고등학교 ‘통합과학1, 2’의 물질과 규칙성, 과학과 미래 사회, ‘화학’의 물질의 구조와 성질과 연계된다.","탄소 화합물의 반응의 종류를 학습하기보다는 탄소 화합물의 반응을 활용하여 인간의 삶을 윤택하게 하는 화합물을 개발할 수 있다는 점을 중점으로 지도한다.","탄소 화합물의 반응 관련 실험을 수행할 때 개인 보호 장구를 착용한 후 실험실 안전 수칙에 따라 실험하고, 실험이 끝난 뒤 남은 물질은 화학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다."],"area":"matter","track":"진로선택","subject":"화학 반응의 세계","electives":["화학"],"prev":["m13-11"],"next":[],"related":[]},{"id":"세포-01","grade":"세포","num":1,"title":"세포","standards":[{"code":"12세포01-01","text":"탄수화물과 지질의 종류와 주요 기능을 이해하고 생물체에 들어있는 탄수화물과 지질을 관찰할 수 있다."},{"code":"12세포01-02","text":"핵산과 단백질의 기본 구조와 세포에서의 주요 기능을 조사하여 설명할 수 있다."},{"code":"12세포01-03","text":"동물세포와 식물세포를 구성하는 세포 소기관의 구조와 기능을 이해하고, 세포 소기관들의 유기적 관계를 추론하여 협력적으로 소통할 수 있다."},{"code":"12세포01-04","text":"원핵세포와 진핵세포의 공통점과 차이점을 설명할 수 있다."},{"code":"12세포01-05","text":"세포막의 구조와 특성을 이해하고, 세포막을 통한 물질 수송 과정을 추론할 수 있다."}],"tamgu":["핵산과 단백질의 모형 제작하기","현미경을 이용하여 세포의 크기 측정하기","간이 원심분리기구 제작하기","세포에서 삼투현상 관찰하기"],"haeseol":[{"code":null,"text":"[12세포01-01∼02] 탄수화물과 지질 관찰은 주변 생물 재료를 활용하도록 하며, 탄수화물, 지질, 핵산, 단백질의 화학적 구조는 화학식으로 다루기보다는 간단한 형태로 다루고, 물질들의 중요 특성과 기능을 이해하는 수준에서 다룬다."},{"code":"12세포01-03","text":"세포 소기관의 구조와 기능은 전자현미경을 포함한 다양한 현미경의 이용, 세포 분획법, 자기 방사법 등의 방법으로 알아낼 수 있음을 이해하도록 하고, 세포 소기관의 유기적 관계는 물질의 합성과 분비를 중심으로 다루도록 한다."},{"code":"12세포01-04","text":"원핵세포와 진핵세포의 차이를 DNA, 세포내막구조, 리보솜, 세포벽을 중심으로 다룬다."}],"goryeo":["중학교 1∼3학년군 ‘생물의 구성과 다양성’, 고등학교 ‘통합과학1’의 물질과 규칙성, 시스템과 상호작용, ‘생명과학’의 생명 시스템의 구성, 생명의 연속성과 다양성과 연계된다.","현미경으로 관찰할 때 탄수화물과 지질임을 확인하는 방법에 대해서도 다루도록 한다.","현미경을 이용한 세포의 크기 측정은 마이크로미터 이외에도 현미경용 이미지 분석 소프트웨어를 이용하여 측정할 수 있다.","다양한 생물 재료를 사용하여 흥미를 느끼도록 유도하며, 세포 또는 생물체 내의 물질 관찰 시에는 실험실 안전교육을 실시하고 생물 재료 및 화학 약품 처리 방법에 따라 분리하여 수거하고 처리하여 학생 안전 및 환경을 오염시키지 않도록 유의한다."],"area":"life","track":"진로선택","subject":"세포와 물질대사","electives":["생명과학","통합과학1"],"prev":["m13-02"],"next":[],"related":[]},{"id":"세포-02","grade":"세포","num":2,"title":"물질대사와 에너지","standards":[{"code":"12세포02-01","text":"물질대사는 생명체에서 생명을 유지하기 위해 일어나는 화학 반응임을 이해하고 에너지의 출입이 동반됨을 추론할 수 있다."},{"code":"12세포02-02","text":"생명 활동에 필요한 에너지를 공급하는 과정에서 광합성과 세포호흡 그리고 ATP의 역할을 설명할 수 있다."},{"code":"12세포02-03","text":"효소의 종류와 특성을 이해하고 효소의 활성에 영향을 미치는 요인에 대한 실험을 설계하여 수행할 수 있다."},{"code":"12세포02-04","text":"효소의 작용 기작을 이해하고, 생명체 내에서 일어나는 효소 작용의 중요성에 대해 다양한 매체를 활용하여 협력적으로 소통할 수 있다."},{"code":"12세포02-05","text":"효소가 우리 생활이나 산업에 다양하게 이용되는 사례를 조사하여 발표할 수 있다."}],"tamgu":["1일 칼로리 섭취량과 소비량 조사하여 에너지 섭취량과 소비량 비교하기","발아 중인 콩의 물질대사와 에너지대사 탐구하기"],"haeseol":[{"code":"12세포02-01","text":"물질대사 과정에서 효소를 이용한 화학 반응이 일어나며, 에너지 출입을 통한 생명 활동 과정에서 균형있는 에너지 섭취와 소비의 중요성을 다룬다."},{"code":"12세포02-02","text":"세포호흡을 통한 물질 분해 및 에너지 생성 과정, 광합성에서는 물질 합성 및 에너지 저장 과정에 중점을 두어 다룬다."},{"code":"12세포02-03","text":"효소의 작용에 영향을 미치는 요인들에 대해 스스로 변인을 설정하여 실험을 설계하고 수행할 수 있도록 지도한다."}],"goryeo":["중학교 1∼3학년군 ‘식물과 에너지’와 ‘동물과 에너지’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘생명과학’의 생명 시스템의 구성과 연계된다.","조사하는 활동에서 다양한 디지털 탐구 도구나 디지털 플랫폼을 활용하여 디지털 소양을 함양할 수 있도록 지도한다."],"area":"life","track":"진로선택","subject":"세포와 물질대사","electives":["생명과학","통합과학1"],"prev":["m13-12","m13-13"],"next":[],"related":[]},{"id":"세포-03","grade":"세포","num":3,"title":"세포호흡과 광합성","standards":[{"code":"12세포03-01","text":"미토콘드리아의 구조를 이해하고 생명체 내에서의 미토콘드리아의 기능을 추론할 수 있다."},{"code":"12세포03-02","text":"세포호흡 과정의 단계별 특징을 다양한 매체를 활용하여 협력적으로 소통할 수 있다."},{"code":"12세포03-03","text":"세포호흡 과정에서의 인산화 과정을 기질 수준의 인산화와 산화적 인산화 과정으로 구 분 할 수 있다."},{"code":"12세포03-04","text":"산소호흡과 발효의 공통점과 차이점을 이해하고, 실생활에서 발효를 이용한 사례 조사 계획을 세워 조사할 수 있다."},{"code":"12세포03-05","text":"엽록체의 구조를 이해하고 기능과 관련지어 설명할 수 있다."},{"code":"12세포03-06","text":"광합성의 명반응과 탄소 고정반응을 단계별로 구분하여 특징을 이해하고 두 반응의 상호 관계를 추론할 수 있다."},{"code":"12세포03-07","text":"광합성과 세포호흡의 전자 전달계를 비교하여 공통점과 차이점을 다양한 매체를 활용하여 설명할 수 있다."},{"code":"12세포03-08","text":"광합성 관련 과학사적 연구 결과를 조사하여 시각화 자료를 창의적으로 제작하여 협력적으로 소통할 수 있다."}],"tamgu":["미토콘드리아와 엽록체 내부구조 모형 제작하기","발효 실험 설계하여 수행하기","크로마토그래피로 식물의 잎에서 광합성 색소 분리하기"],"haeseol":[{"code":null,"text":"[12세포03-02∼07] 세포호흡과 광합성 과정이 효소에 의해 조절되는 일련의 화학 반응임을 이해하도록 하며, 세포호흡과 광합성의 탄소 고정반응 과정에서 유기물의 분자 구조식은 다루지 않도록 한다."},{"code":"12세포03-03","text":"산화적 인산화 과정에서 화학 삼투에 의해 ATP가 합성된다는 수준 정도를 다루도록 한다."},{"code":"12세포03-07","text":"광합성과 세포호흡의 전자 전달 과정에서 이루어지는 인산화 반응을 에너지, 효소, 산화⋅환원 반응 중심으로 다루도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘생물의 구성과 다양성’, ‘식물과 에너지’, ‘동물과 에너지’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘생명과학’의 생명 시스템의 구성과 연계된다.","미토콘드리아와 엽록체의 내부구조에 대한 수업에서는 다양한 도구나 매체를 활용하며, 가상 현실이나 증강 현실을 활용하여 탐구하도록 하여 디지털 소양을 함양할 수 있도록 지도한다.","실생활에서의 발효 사례와 광합성 관련 과학사 연대표 발표에서는 시각화할 수 있는 도구를 활용하도록 안내하며, 영상 제작이나 다양한 디지털 기기나 디지털 플랫폼을 활용하여 디지털 소양를 함양할 수 있도록 지도한다."],"area":"life","track":"진로선택","subject":"세포와 물질대사","electives":["생명과학","통합과학1"],"prev":["m13-02","m13-12","m13-13"],"next":[],"related":[]},{"id":"유전-01","grade":"유전","num":1,"title":"유전자와 유전물질","standards":[{"code":"12유전01-01","text":"유전 형질이 유전자를 통해 자손에게 유전됨을 이해하고, 상염색체 유전과 성염색체 유전 양상의 차이를 설명할 수 있다."},{"code":"12유전01-02","text":"사람 유전 연구 방법의 어려움을 이해하고, 사람의 유전 현상 분석을 근거로 유전 형질의 유전적 특성을 추론할 수 있다."},{"code":"12유전01-03","text":"사람의 다유전자유전에 대해 이해하고, 유전 현상의 다양성 사례를 조사하여 과학적 근거를 활용하여 협력적으로 소통할 수 있다."},{"code":"12유전01-04","text":"염색체와 유전자 이상에 대해 이해하고, 사람의 유전병을 발병 원인별 조사 계획을 세워 조사할 수 있다."},{"code":"12유전01-05","text":"DNA의 구조와 유전물질 규명 관련 과학사적 연구 결과를 설명하기 위한 발표 자료를 창의적으로 제작할 수 있다."},{"code":"12유전01-06","text":"원핵세포와 진핵세포의 유전자 구조와 유전체 구성을 이해하고, 공통점과 차이점을 비교하여 설명할 수 있다."},{"code":"12유전01-07","text":"반보존적 DNA 복제 과정을 이해하고 그 의미를 추론하여 협력적으로 소통할 수 있다."}],"tamgu":["가계도 분석하기","DNA를 추출하여 관찰하기","DNA 복제 모의실험하기"],"haeseol":[{"code":"12유전01-01","text":"유전 형질을 다룰 때, 과학적으로 명확하게 증명된 사례를 도입하여 유전자와 유전 형질의 관계를 다루도록 한다."},{"code":"12유전01-03","text":"사람의 다유전자유전 사례에 초점을 두기보다는 사람의 유전 대부분이 다유전자유전에 의해 이루어지고 있다는 의미에 초점을 두도록 한다."},{"code":"12유전01-07","text":"반보존적 복제의 구체적인 분자생물학적 기작보다는 반보존적 복제가 갖는 의미를 중심으로 다루며, DNA의 반보존적 복제를 다룰 때, RNA 프라이머나 관여하는 효소의 기능 등을 상세히 다루기보다는 용어 수준에서 다루도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘생식과 유전’, 고등학교 ‘통합과학1’의 물질과 규칙성, 시스템과 상호작용, ‘생명과학’의 생명의 연속성과 다양성과 연계된다.","협력적으로 소통하기 위한 설명 자료 및 발표 자료는 정보 그림, 시청각 설명 자료, 영상, 디지털 플랫폼 등 다양한 매체를 활용할 수 있도록 지도한다."],"area":"life","track":"진로선택","subject":"생물의 유전","electives":["생명과학","통합과학1"],"prev":["m13-21"],"next":[],"related":[]},{"id":"유전-02","grade":"유전","num":2,"title":"유전자의 발현","standards":[{"code":"12유전02-01","text":"전사와 번역 과정을 거쳐 유전자가 발현되는 중심원리를 이해하고, 모형을 이용하여 유전자 발현 과정을 설명할 수 있다."},{"code":"12유전02-02","text":"유전 부호를 이해하고, 유전 부호 표를 사용하여 유전 정보를 해독할 수 있다."},{"code":"12유전02-03","text":"원핵생물과 진핵생물의 유전자 발현 조절 과정을 비교하기 위한 설명 자료를 다양한 매체를 활용하여 제작할 수 있다."},{"code":"12유전02-04","text":"생물의 발생 과정에서 세포 분화가 유전자 발현 조절 과정을 통해 일어남을 추론할 수 있다."},{"code":"12유전02-05","text":"생물의 유전자 발현 조절 및 발생에 대한 연구가 인류 복지에 기여한 사례를 조사하여 협력적으로 소통할 수 있다."}],"tamgu":["단백질 합성 과정 모의실험하기"],"haeseol":[{"code":"12유전02-03","text":"원핵생물의 전사 조절 과정을 주로 다루고, 진핵생물의 경우는 원핵생물의 전사 조절과의 다른 점만을 간략하게 다루도록 한다."},{"code":"12유전02-04","text":"생물의 발생 초기 단계의 유전자 발현 조절 과정을 다루도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘생식과 유전’, 고등학교 ‘통합과학1’의 물질과 규칙성, 시스템과 상호작용, ‘생명과학’의 생명의 연속성과 다양성과 연계된다.","생물의 유전과 발생 관련 역사적 사건에 대한 영상 시청을 통해 생물의 유전에 대한 흥미와 호기심을 유발한다.","유전자 발현 조절과 발현 관련 최신 연구를 조사하는 과정에서 생명과학 분야에서 인공지능을 어떻게 이용할 수 있는지를 조사하도록 지도한다."],"area":"life","track":"진로선택","subject":"생물의 유전","electives":["생명과학","통합과학1"],"prev":["m13-21"],"next":[],"related":[]},{"id":"유전-03","grade":"유전","num":3,"title":"생명공학기술","standards":[{"code":"12유전03-01","text":"생명공학기술 발달 과정에서의 주요 사건을 조사하고 다양한 매체를 활용하여 발표할 수 있다."},{"code":"12유전03-02","text":"단일클론항체, 줄기세포, 유전자 편집 기술이 난치병 치료에 활용된 사례를 조사하고, 이러한 치료법의 전망에 대해 협력적으로 소통할 수 있다."},{"code":"12유전03-03","text":"생명공학기술 관련 학문 분야를 이해하고 우리 생활과 산업에 활용 사례를 조사하여 창의적으로 설명 자료를 제작할 수 있다."},{"code":"12유전03-04","text":"유전자 변형 생물체(LMO)의 특징을 이해하고 인간과 생태계에 미치는 영향을 추론할 수 있다."},{"code":"12유전03-05","text":"생명공학기술의 활용 과정에서 나타나는 문제점과 이에 대한 사회적 책임을 인식하고 생명윤리 쟁점에 대해 의사 결정할 수 있다."}],"tamgu":["단백질 화합물 상호작용 가상 실험하기"],"haeseol":[{"code":"12유전03-01","text":"생명공학기술의 발달 과정에서의 주요 사건이 가져온 기술 발달뿐만 아니라 성과를 우리 생활과 관련된 사례를 중심으로 다루어 흥미를 유발하도록 한다."},{"code":null,"text":"[12유전03-02∼03] 생명공학기술의 원리 중심보다는 우리 생활과 밀접한 사례를 중심으로 생명공학기술 활용 사례 및 관련 새로운 학문 분야와 직업을 조사하도록 하여 학생들의 흥미를 유도하도록 한다."},{"code":null,"text":"[12유전03-04∼05] 생명공학의 발달 과정에서 나타나는 생태적, 윤리적, 제도적, 사회적 문제점을 이해하고, 미래 사회에 미칠 영향을 예측하여 발표하도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘생식과 유전’, 고등학교 ‘통합과학2’의 과학과 미래 사회, ‘생명과학’의 생명 시스템의 구성, 생명의 연속성과 다양성과 연계된다.","생명공학기술 발달 과정의 주요 사건 및 생명공학기술 활용 사례 조사 결과를 정보 그림 및 시청각 설명 자료 제작, 영상 제작 등 다양한 방법을 사용하여 발표하도록 하여 디지털 소양을 함양할 수 있도록 지도한다."],"area":"life","track":"진로선택","subject":"생물의 유전","electives":["생명과학","통합과학2"],"prev":["m13-21"],"next":[],"related":[]},{"id":"지시-01","grade":"지시","num":1,"title":"지구 탄생과 생동하는 지구","standards":[{"code":"12지시01-01","text":"지구의 탄생 이후 지구 대기, 원시 바다, 생명체 탄생 등의 과정을 통한 지구시스템 각 권역의 형성 과정을 추론할 수 있다."},{"code":"12지시01-02","text":"지구시스템이 진화해온 역사에서 물, 탄소, 산소의 순환 과정을 통해 지권, 수권, 기권이 변화해 왔음을 추적할 수 있다."},{"code":"12지시01-03","text":"판구조론의 발달사와 관련지어 판을 움직이는 맨틀의 상부 운동과 플룸에 의한 구조 운동을 구분할 수 있다."},{"code":"12지시01-04","text":"암석의 순환 과정에서 화산 활동의 역할과 화산 활동으로 생성되는 암석의 특성을 추론 할 수 있다."},{"code":"12지시01-05","text":"지진파의 종류와 특성을 이해하고, 지진파를 이용하여 지구 내부구조를 알아내는 과정을 탐구할 수 있다."}],"tamgu":["지구가 역동적 행성으로 진화한 이유를 다른 고체 행성의 진화 과정과 비교하기","관측 기기의 발달과 관련지어 판구조론 정립의 역사 추적하기","한반도 지진의 분포 특성과 지진 발생 가능성 예측하기","지진파 자료를 활용하여 지각의 두께 구하기","편광현미경으로 화산암과 심성암의 조직 비교⋅관찰하기"],"haeseol":[{"code":"12지시01-01","text":"지구 생명체 탄생 이전의 권역 형성을 다룬다. 원시 태양계 성운에서 행성계인 태양계가 형성되는 물리적 과정(응축, 집적, 분화)을 알아보고, 행성으로서 지구가 탄생하고 진화하는 모습을 설명한다. 마그마 바다에서 화성암이 형성됨을 다루고 이후 냉각 과정에서의 상호작용을 다룬다."},{"code":"12지시01-02","text":"생명체 탄생 이후 생명체와 지구계의 상호작용을 중심으로 다룬다. 산소의 순환은 남세균과 호상철광층의 형성, 탄소의 순환은 얼음덩어리 지구와 석회암의 퇴적, 물의 순환은 풍화, 침식, 퇴적 작용과 지형의 형성을 다룬다. 그리고 이 과정에서 생명과 행성의 공진화 개념을 다루어 환경과 생명의 소중함을 인식하도록 한다."},{"code":"12지시01-03","text":"상부 맨틀의 대류에 의한 판 운동과 맨틀 -핵의 경계에서 올라오는 플룸 운동을 구분하여 이해하며, 플룸 상승류의 사례로 열점을 설명한다. 판을 움직이는 힘의 경우, 맨틀 대류에 의한 수동적인 움직임으로 설명하기보다는, 판을 움직이는 능동적인 힘(섭입하는 판이 당기는 힘, 해령에서 미는 힘 등)에 관해 다룬다."},{"code":"12지시01-04","text":"마그마의 특성에 따라 순상화산과 성층화산으로 화산체의 형태를 분류하며, 분출되는 물질의 종류가 달라짐을 다룬다. 편광현미경을 이용한 화산암과 심성암 박편 관찰을 통해 화산암의 유리질, 반상조직과 심성암의 조립질을 비교⋅관찰하는 정도만 다루며, 광학적 성질에 대해서는 다루지 않는다."},{"code":"12지시01-05","text":"지진파 단층 촬영 결과를 이용하여 알아낸 지구 내부구조를 함께 다룬다."}],"goryeo":["중학교 1∼3학년군 ‘지권의 변화’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘지구과학’의 지구의 역사와 한반도의 암석과 연계된다.","고체 지구 영역의 지구계와 지구 구성 물질, 그리고 판구조론에 해당하는 내용으로, 빅데이터와 시뮬레이션 등을 활용한 탐구 활동을 통해 지구시스템 차원의 연계성을 확인하고 디지털 소양을 함양한다."],"area":"earth","track":"진로선택","subject":"지구시스템과학","electives":["지구과학","통합과학1"],"prev":["m13-09"],"next":[],"related":[]},{"id":"지시-02","grade":"지시","num":2,"title":"해수의 운동","standards":[{"code":"12지시02-01","text":"에크만 수송과 관련지어 지형류의 발생 원리를 설명할 수 있다."},{"code":"12지시02-02","text":"해파의 발생 과정을 이해하고, 천해파와 심해파의 차이점을 비교⋅설 명 할 수 있다."},{"code":"12지시02-03","text":"해일이 발생하는 여러 가지 원인을 이해하고, 피해 사례와 대처 방안을 제안할 수 있다."},{"code":"12지시02-04","text":"조석의 발생 과정을 이해하고 자료 해석을 통해 각 지역에서의 조석 양상을 설명할 수 있다."}],"tamgu":["해파 발생 및 전파 실험하기","실시간 자료를 이용한 조석 현상의 패턴 추론하기"],"haeseol":[{"code":"12지시02-01","text":"지구 규모의 해수 순환에 대한 정성적 이해를 바탕으로, 수압 경도력과 전향력에 의한 정역학 평형을 학습하여 해수를 움직이는 힘을 정량적으로 이해하도록 한다."},{"code":"12지시02-02","text":"해파는 해수면이 주기적으로 상하 운동하면서 에너지를 전파하는 현상으로 바닷물이 직접 이동하는 것은 아니라는 사실을 이해시킨다. 이때 심해파와 천해파의 중간 영역(전이파)에 대한 개념을 간단히 다룬다."},{"code":"12지시02-03","text":"해일 발생 당시의 기압, 만조 시기, 해안 및 해저 지형에 따라서도 해일의 피해가 달라질 수 있음을 이해한다."},{"code":"12지시02-04","text":"기조력을 정성적으로 도입하고 평형 조석론 정도만 다루며, 달에 의한 기조력이 태양보다 2배 정도 크다는 것을 다룬다."}],"goryeo":["중학교 1∼3학년군 ‘수권과 해수의 순환’, 고등학교 ‘통합과학2’의 환경과 에너지, ‘ 지구과학’의 대기와 해양의 상호작용과 연계된다.","실시간 자료를 이용한 조석 현상 분석, 쓰나미 피해 사례와 대처 방안 조사 및 발표 등을 프로젝트 학습의 형태로 진행함으로써 과학 탐구의 전체 과정을 체험하게 하고, 전 지구 규모의 빅데이터와 시뮬레이션을 통해 지구시스템 차원의 연계성을 확인하고 디지털 소양을 함양한다."],"area":"earth","track":"진로선택","subject":"지구시스템과학","electives":["지구과학","통합과학2"],"prev":["m13-18"],"next":[],"related":[]},{"id":"지시-03","grade":"지시","num":3,"title":"강수 과정과 대기의 운동","standards":[{"code":"12지시03-01","text":"대기를 구성하는 기체들이 선택적 흡수체임을 이해하고, 온실효과 및 태양 자외선 차단 효과, 물의 존재 등으로 지구 생명체 존재 조건을 추론할 수 있다."},{"code":"12지시03-02","text":"지표와 대기의 열 출입과 관련된 물리 과정 및 전 지구 평균 열수지를 해석할 수 있다."},{"code":"12지시03-03","text":"기온의 연직 분포와 대기의 안정도와의 관계를 이해하고, 단열변화를 통해 안개나 구름이 생성되는 과정 및 강수 과정을 분석할 수 있다."},{"code":"12지시03-04","text":"기압의 연직 분포로 정역학적 균형을 이해하고, 대기 중 연직 운동의 발생 원인을 추론할 수 있다."},{"code":"12지시03-05","text":"지균풍, 경도풍, 지상풍의 발생 원리와 관련된 힘의 작용을 설명할 수 있다."},{"code":"12지시03-06","text":"행성파의 발달 과정을 이해하고, 지상 고⋅저기압 발달에서 편서풍 파동의 역할을 평가할 수 있다."}],"tamgu":["단열선도를 이용하여 대기 안정도 해석하기","회전원판을 이용한 전향 효과 실험하기","편서풍 파동 및 제트류와 관련지어 상층 일기도 해석하기","행성파 시뮬레이션 실험하기"],"haeseol":[{"code":"12지시03-01","text":"생명가능지대로서의 지구, 즉 지구에 물이 존재함으로써 생명체가 발생하고 존재할 수 있는 이유에 대한 근거를 다룬다."},{"code":"12지시03-02","text":"지표와 대기의 열 출입을 물리 과정, 즉 산란, 반사, 흡수, 굴절 등으로 설명한다. 에너지(열) 수지를 다루면서 잠열의 효과가 가장 크다는 것을 파악함으로써 구름 생성을 위한 단열변화로 연결한다."},{"code":"12지시03-03","text":"단열변화에서 기온과 습도의 변화를 이해하고, 단열변화와 단열 감률을 고려한 대기의 안정도를 구름의 생성과 관련지어 다룬다."},{"code":null,"text":"[12지시03-04∼05] 수평 운동으로서 대기의 운동을 이해하기 위해 정역학 평형, 바람에 작용하는 힘들에 관한 개념 학습을 토대로 지상풍, 지균풍, 경도풍, 태양 상수, 편서풍 파동 등의 개념을 이해하고, 지상과 상층의 바람, 편서풍 파동(제트류), 대기 대순환 등을 시스템적으로 설명한다."}],"goryeo":["중학교 1∼3학년군 ‘날씨와 기후변화’, 고등학교 ‘통합과학2’의 환경과 에너지, ‘지구과학’의 대기와 해양의 상호작용과 연계된다.","지구 열수지와 지구온난화의 관련성 시뮬레이션 등의 활동을 통해 디지털 ⋅인공지능 소양을 함양한다.","상층 일기도를 확보하기 어려운 경우에는 보다 짧은 기간 동안의 일기를 예측하도록 한다.","편서풍 파동 실험으로 사용하던 회전 원통 실험은 로스비파인 편서풍 파동에 대한 오개념을 유발할 수 있으므로, 이 실험을 다룰 때는 실험이 갖는 한계점에 유의하여 활동을 구성한다."],"area":"earth","track":"진로선택","subject":"지구시스템과학","electives":["지구과학","통합과학2"],"prev":["m13-17"],"next":[],"related":[]},{"id":"행우-01","grade":"행우","num":1,"title":"우주탐사와 행성계","standards":[{"code":"12행우01-01","text":"태양계 탐사선의 활동을 통해 알아낸 성과를 이해하고, 인공위성을 활용한 우주탐사의 필요성을 토론할 수 있다."},{"code":"12행우01-02","text":"태양 활동 감시 시스템과 지구 접근 천체를 비롯한 지구를 위협하는 우주 위험 감시 기술의 중요성을 우주 재난 측면에서 인식할 수 있다."},{"code":"12행우01-03","text":"태양계를 지배하는 힘이 태양의 중력임을 이해하고, 케플러의 세 가지 법칙을 이용하여 태양계 구성 천체들의 운동을 설명할 수 있다."},{"code":"12행우01-04","text":"행성과 소천체의 정의를 구분하여 이해하고, 소천체 탐사 자료를 통해 이들의 특징을 추 론 할 수 있다."},{"code":"12행우01-05","text":"외계 행성계 탐사의 원리를 이해하고, 외계 행성에 생명체가 존재할 수 있는 조건과 외계 생명체의 존재 가능성에 대해 논증할 수 있다."}],"tamgu":["태양 활동 감시 시스템의 실생활 관련성 조사하기","천체 망원경을 이용하여 행성 관측하기","중심별의 표면 온도에 따른 생명가능지대 추론하기"],"haeseol":[{"code":"12행우01-01","text":"최근의 태양계 탐사선 탐사 결과로부터 새롭게 밝혀진 사실을 중심으로 다룬다. 태양계 탐사선과 관련하여 행성 탐사선, 소천체 탐사선 등의 활동과 성과를 다룬다. 우리나라의 우주개발 성과와 계획을 간략히 소개한다."},{"code":"12행우01-02","text":"우주 위험 감시 기술과 관련하여 우주기상, 소천체 충돌, 우주 쓰레기 등의 문제를 다룬다."},{"code":"12행우01-03","text":"케플러의 세 가지 법칙에서 각 법칙의 물리적 의미를 다루고, 태양계의 모든 천체에 케플러의 법칙이 적용된다는 사실을 설명할 수 있도록 한다."},{"code":"12행우01-04","text":"소천체에 속하는 왜소행성, 소행성, 혜성, 운석 등을 설명하고, 이들을 태양계 원시 물질로 구성된 천체와 분화된 천체로 구분할 수 있음을 다룬다."},{"code":"12행우01-05","text":"외계 행성계에서의 생명가능지대가 중심별의 표면 온도 등에 의해 결정된다는 것을 설명하며, 생명가능지대가 액체 상태의 물이 존재할 수 있는 범위로 설정된다는 사실을 통해 물이 생명 현상의 중요한 요소임을 이해하도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘태양계’, 고등학교 ‘통합과학1’의 물질과 규칙성, ‘지구과학’의 태양계 천체와 별과 우주의 진화와 연계된다.","인공위성을 이용한 태양계 탐사의 역사를 시간순으로 나열하여 다루지는 않으며, 우주탐사 프로젝트를 조사하고 여러 모둠의 데이터를 공유하는 탐구 활동을 수행함으로써 디지털⋅인공지능 소양을 함양할 수 있다.","태양의 광구와 대기에서 관측할 수 있는 현상보다는 우주 환경 변화에 따른 우주 재난의 예측 가능성에 초점을 두며, 우주 환경까지 포함하는 생태주의 관점을 함양하도록 지도한다.","케플러의 법칙을 이용하여 태양계 천체의 데이터를 해석하는 탐구 활동과 수행평가를 실시할 수 있다.","탐사선이 관측한 표면 사진을 이용하여 태양계 행성과 소천체의 지질학적 특징을 조사하고 여러 모둠의 데이터를 공유하고 소통하는 탐구 활동을 수행할 수 있다."],"area":"earth","track":"진로선택","subject":"행성우주과학","electives":["지구과학","통합과학1"],"prev":["m13-07"],"next":[],"related":[]},{"id":"행우-02","grade":"행우","num":2,"title":"태양과 별의 관측","standards":[{"code":"12행우02-01","text":"태양의 광구와 대기에서 나타나는 현상을 설명하고, 이러한 현상이 다양한 파장의 관측 자료에서 어떻게 나타나는지 비교⋅분석할 수 있다."},{"code":"12행우02-02","text":"별의 시차와 밝기를 이용하여 거리를 측정하는 다양한 방법을 비교⋅평가할 수 있다."},{"code":"12행우02-03","text":"별의 시선속도와 접선속도의 합으로 공간 운동이 나타남을 이해하고, 별자리를 구성하는 별들의 장시간에 걸친 형태 변화를 추론할 수 있다."},{"code":"12행우02-04","text":"쌍성의 관측 자료를 이용하여 항성의 질량을 직접적으로 구할 수 있음을 이해하고, 질량-광도 관계를 이용하여 쌍성이 아닌 별의 질량을 구할 수 있다."},{"code":"12행우02-05","text":"광도곡선의 특징을 비교하여 맥동변광성과 폭발 변광성을 구분하고, 폭발 변광성 중 초신성 관측 자료를 통해 알 수 있는 과학적 사실을 추론할 수 있다."}],"tamgu":["망원경으로 태양 광구를 관측하고 태양 흑점의 이동 자료를 이용하여 태양의 자전주기 구하기","별자리를 구성하는 별들의 공간 분포를 입체적으로 표현하기","쌍성의 질량과 절대등급 자료를 이용하여 주계열성의 질량-광도 관계 구하기"],"haeseol":[{"code":"12행우02-01","text":"태양 광구에서 흑점과 쌀알 무늬가 나타나는 이유를 이해하고, 흑점의 관측 자료로부터 태양 활동의 주기와 차등 자전을 설명한다. 태양의 위성 영상자료를 컴퓨터로 합성하는 활동을 통해 태양의 차등 자전을 이해한다."},{"code":"12행우02-02","text":"별의 연주시차를 이용하여 거리를 계산하는 방법을 다루고, 별의 겉보기 등급과 절대등급을 이용하여 거리를 계산하는 방법(거리지수)을 설명한다."},{"code":"12행우02-03","text":"별의 접선속도와 시선속도를 관측하여 공간 운동을 계산할 수 있음을 소개하고, 별자리를 구성하는 별들이 물리적인 연관성은 없지만, 시선 방향의 범위가 비슷한 별들의 집단임을 이해하도록 한다."},{"code":"12행우02-04","text":"케플러의 법칙을 쌍성계에 적용하여 쌍성계의 주기와 장반경으로부터 쌍성계를 구성하는 별의 질량을 구하는 과정을 이상적인 조건에 대해서만 다룬다."},{"code":"12행우02-05","text":"변광성의 관측 자료를 제시하여 맥동변광성과 폭발 변광성을 구분하게 하며, 맥동변광성의 맥동 기작은 다루지 않는다. 초신성의 종류와 초신성 폭발 과정은 다루지 않는다."}],"goryeo":["중학교 1∼3학년군 ‘태양계’와 ‘별과 우주’, 고등학교 ‘지구과학’의 태양계 천체와 별과 우주의 진화와 연계된다.","태양을 관측할 때는 태양 관측용 망원경을 사용하거나 망원경에 필터를 장착하여 안전하게 관측할 수 있도록 지도한다.","태양 광구를 주기적으로 관측한 자료를 분석하여 스프레드시트나 파이썬 등의 프로그램으로 태양의 위도에 따른 자전주기를 계산하는 탐구 활동과 수행평가를 실시할 수 있다.","별자리를 구성하는 별들의 데이터를 이용하여 별자리의 입체적인 공간 분포를 시각적으로 표현하는 탐구 활동을 실시할 수 있다."],"area":"earth","track":"진로선택","subject":"행성우주과학","electives":["지구과학"],"prev":["m13-07","m13-15"],"next":[],"related":[]},{"id":"행우-03","grade":"행우","num":3,"title":"은하와 우주","standards":[{"code":"12행우03-01","text":"성단의 C-M도를 이용하여 성단의 나이와 거리를 비교하고, 맥동변광성의 주기-광도 관계를 이용하여 우리은하의 구조와 규모를 추론할 수 있다."},{"code":"12행우03-02","text":"성간 소광 자료를 통해 성간 티끌의 존재를 추론하고, 성간 티끌의 특징을 설명할 수 있다."},{"code":"12행우03-03","text":"은하의 회전 속도 곡선을 이용하여 질량 분포를 이해하고 은하에 빛을 내지 않는 물질의 존재를 추론할 수 있다."},{"code":"12행우03-04","text":"대규모로 이루어진 외부은하의 적색 편이 탐사의 성과를 이해하고, 은하의 공간 분포를 파악함에 있어서 분광 관측 자료의 중요성을 인식할 수 있다."},{"code":"12행우03-05","text":"은하의 공간 분포 자료를 통해 은하의 집단을 이해하고, 은하 장성, 보이드 등 우주의 거시적인 구조를 현대 우주론과 관련지어 설명할 수 있다."}],"tamgu":["주계열 맞추기를 이용하여 성단의 거리 구하기","세페이드 변광성을 이용하여 우리은하의 중심 찾기와 크기 구하기","전천 탐사를 통해 얻은 은하의 공간 분포 자료에서 은하단, 보이드 등 다양한 구조 식별하기"],"haeseol":[{"code":"12행우03-01","text":"성단은 C-M도를 도입하여 설명하며, 성단의 주계열 맞추기를 이용하여 거리를 구하는 방법을 다룬다. 세페이드 변광성의 주기-광도 관계를 이용하여 우리은하의 규모를 계산하는 방법을 이해할 수 있도록 한다."},{"code":"12행우03-02","text":"성간 기체가 다양한 상태로 분포하고 있음을 설명하고, 성간 소광에 의해 천체의 거리가 실제와 다르게 측정될 수 있음을 알고 관측 결과를 보정해야 하는 이유를 다룬다."},{"code":"12행우03-03","text":"우리은하의 회전 속도 곡선으로부터 계산된 질량과 별의 광도로부터 추정한 은하의 질량이 일치하지 않는다는 사실로부터 빛을 내지 않는 물질의 존재 가능성을 이해할 수 있도록 한다."},{"code":null,"text":"[12행우03-04~05] 다양한 전천 탐사의 성과를 간략히 소개하고, 이로부터 알아낸 은하의 공간 분포를 이해할 수 있도록 한다. 은하군 및 은하단, 초은하단의 특징을 설명하고, 초은하단과 보이드는 우주 팽창의 영향을 받는 규모임을 간략히 다룬다."}],"goryeo":["중학교 1∼3학년군 ‘태양계’와 ‘별과 우주’, 고등학교 ‘지구과학’의 태양계 천체와 별과 우주의 진화와 연계된다.","천체의 거리를 구하는 과정이 거리 규모에 따라 다른 이유를 이해하도록 한다.","성단의 H-R도와 세페이드 변광성의 관측 자료를 이용하여 천체의 거리를 계산하는 탐구 활동과 수행평가를 실시할 수 있다.","우리은하와 외부은하의 회전 속도 곡선을 제시하고 공통적인 특징을 파악하는 모둠별 탐구 활동과 보고서 평가를 실시할 수 있다."],"area":"earth","track":"진로선택","subject":"행성우주과학","electives":["지구과학"],"prev":["m13-07","m13-15"],"next":[],"related":[]},{"id":"과사-01","grade":"과사","num":1,"title":"과학과 문명의 탄생과 통합","standards":[{"code":"12과사01-01","text":"인류 문명의 탄생 과정에서 인류의 지혜가 담긴 과학적 사례를 발견하고, 이를 통해 과학이 인류 문명의 형성 과정에 기여하였음을 이해할 수 있다."},{"code":"12과사01-02","text":"고대 그리스 철학자의 과학적 사고나 주장 등을 조사하고, 그리스 문명이 고대에서 현대에 이르기까지 인간의 삶에 미친 영향을 설명할 수 있다."},{"code":"12과사01-03","text":"중세 시대 유럽과 중동 지역을 중심으로 종교나 문화가 과학에 기여한 바를 이해하고, 고대 그리스의 과학과 중세 과학의 특징을 비교할 수 있다."},{"code":"12과사01-04","text":"르네상스와 과학혁명이 일어난 사회문화적 배경을 조사하고, 과학과 예술 사이의 융합적 사례를 설명할 수 있다."},{"code":"12과사01-05","text":"과학 지식의 형성 과정에서 과학자의 신념이나 세계관이 영향을 준 사례를 조사하여 발표할 수 있다."}],"tamgu":["르네상스와 과학혁명 시기의 예술 작품에 포함된 과학적 원리 분석하기"],"haeseol":[{"code":"12과사01-02","text":"고대 그리스 시대의 우주관과 자연관을 이해하고, 고대 그리스 철학자들의 생각이 오늘날 과학이나 예술, 철학 등 다양한 분야에서 어떻게 활용되고 있는지 조사하도록 한다."},{"code":"12과사01-04","text":"예술 작품에 등장하는 과학적 소재나 창작 과정에서 나타난 과학적 개념이나 원리를 탐색하도록 한다."}],"goryeo":["고대 그리스 시대의 과학과 16~17세기 과학혁명 시기의 과학을 서로 비교함으로써 고대 그리스 철학이 미친 영향을 이해할 수 있도록 지도한다. 플라톤과 아리스토텔레스의 철학적 관점이 과학과 예술 등 다양한 분야에서 적용된 사례를 이해하고, 오늘날 융합적 사고와는 어떤 차이점이 있는지 생각할 기회를 제공한다.⋅과학 활동의 윤리성⋅과학 문제 해결에 대한 개방성⋅과학 문제 해결의 학문 간 융합적 접근⋅안전⋅지속가능 사회에 기여⋅과학 문화 향유","과거에 있었던 사례나 사건을 조사하는 것에서 그치지 않고, 과거 과학자나 예술가의 아이디어나 사고 과정이 오늘날에 적용된다면 어떤 일이 일어날 것인지 예측하고 토론하도록 한다."],"area":"society","track":"융합선택","subject":"과학의 역사와 문화","electives":[],"prev":[],"next":[],"related":[]},{"id":"과사-02","grade":"과사","num":2,"title":"변화하는 과학과 세계","standards":[{"code":"12과사02-01","text":"상대성 이론 등과 같은 현대 과학의 등장이 당시의 사회문화에 끼친 영향을 이해함으로써 과학의 사회적 가치를 느낄 수 있다."},{"code":"12과사02-02","text":"현대 과학의 등장 과정에서 나타난 과학자들의 논쟁이나 토론 사례를 조사하고, 과학적 의사소통에서 지켜야 할 규범과 태도를 이해할 수 있다."},{"code":"12과사02-03","text":"현대 예술 작품이나 건축물에 과학적 원리가 적용된 사례를 조사하고, 과학과 문화의 관련성을 추론할 수 있다."},{"code":"12과사02-04","text":"감염병이 사회에 영향을 미친 대표적인 사례를 찾고, 과학이 사회 문제 해결에 기여함을 인식할 수 있다."},{"code":"12과사02-05","text":"과학기술이 교통수단의 발달에 미친 영향을 인식하고, 교통수단의 발전이 가져올 미래 사회의 변화를 예측할 수 있다."},{"code":"12과사02-06","text":"산업혁명 이후 나타난 과학기술이 인류 문명에 미친 긍정적 효과와 부정적 효과에 대해 토론할 수 있다."}],"tamgu":["상대성 이론의 관점에서 미래주의 예술 작품 분석하기"],"haeseol":[{"code":"12과사02-04","text":"근대 사회 등장 이래 우리나라뿐만 아니라 유럽 및 세계 전역에서 유행했던 감염병을 조사하고, 감염병 등장이 미친 사회 변화와 이러한 문제를 극복하는 과정에서 과학의 역할을 조사하여 능동적으로 문제를 발견하고 해결하는 자세를 갖도록 한다."},{"code":"12과사02-06","text":"산업혁명 이후 화학 무기, 원자력, 유전자 재조합 등의 과학기술 발전으로 발생한 사회적 갈등을 알아봄으로써 과학기술이 갖는 양면성을 이해하고, 새롭게 등장하는 과학기술에 대해 균형적으로 판단할 수 있는 시야를 갖도록 한다."}],"goryeo":["현대 과학의 등장으로 인해 나타나는 장단점에 대해 근거를 가지고 추론하며, 서로 다른 관점을 가진 경우에도 이해하고 배려할 수 있는 마음을 가질 수 있도록 한다."],"area":"society","track":"융합선택","subject":"과학의 역사와 문화","electives":[],"prev":[],"next":[],"related":[]},{"id":"과사-03","grade":"과사","num":3,"title":"과학과 인류의 미래","standards":[{"code":"12과사03-01","text":"과학기술의 발전을 통해 새롭게 나타난 문화적 변화를 찾아보고, 과학을 주제로 하는 예술 작품이나 콘텐츠를 제작하여 발표할 수 있다."},{"code":"12과사03-02","text":"일상생활이나 미디어에서 사용되는 과학 용어를 조사하고, 과 학 용어가 우리 사회에 미치는 파급효과를 설명할 수 있다."},{"code":"12과사03-03","text":"과학기술의 발전이 음악에 영향을 끼친 사례를 탐색하고 인공지능으로 음악을 창작하거나 로봇을 활용한 연주를 통해 과학의 심미적 가치를 느낄 수 있다."},{"code":"12과사03-04","text":"인간과 기계, 사물 등을 연결하는 과학기술의 발전 동향을 파악하고 미래 사회의 변화를 예측할 수 있다."},{"code":"12과사03-05","text":"가상 현실이나 증강 현실을 활용한 우리 주변의 사례를 조사하고, 이러한 기술이 미래 사회에 미칠 수 있는 영향에 대해 토론할 수 있다."},{"code":"12과사03-06","text":"집단적 의사결정을 통해 과학기술과 관련된 사회적 문제를 해결한 사례를 조사하여 과학기술에 대한 시민의 이해와 균형 있는 가치 판단의 필요성을 인식할 수 있다."}],"tamgu":["가상 현실이나 증강 현실을 이용한 과학문화 콘텐츠 제작하기"],"haeseol":[{"code":"12과사03-02","text":"에너지나 DNA와 같은 과학 용어를 뉴스나 미디어 속에서 어떻게 활용하는지 찾아보고 과학적 맥락과 그 밖의 맥락에서 활용하는 용어의 의미를 서로 비교하여 차이점을 이해하도록 한다. 또한, 새로운 과학 용어를 다양한 사회 또는 자연 현상 설명에 활용한다는 점을 통해 과학적 아이디어를 다양한 상황이나 맥락에 적용하도록 한다."},{"code":"12과사03-06","text":"핵발전소 가동 연장이나 자동차의 안전성 논란 등 과학과 관련된 사회적 쟁점의 사례를 조사하여 대중의 과학적 시각과 균형적인 가치 판단이 중요함을 깨닫도록 한다."}],"goryeo":["과학기술이 인류의 발전에 올바른 방향으로 기여하도록 학생들의 능동적 참여를 유도하고 과학기술이 가져올 변화에 대해 균형적인 시각과 비판적인 자세를 견지할 수 있도록 지도한다."],"area":"society","track":"융합선택","subject":"과학의 역사와 문화","electives":[],"prev":[],"next":[],"related":[]},{"id":"기환-01","grade":"기환","num":1,"title":"기후와 환경생태의 특성","standards":[{"code":"12기환01-01","text":"날씨와 기후의 특성을 이해하고, 이를 비교하여 설명할 수 있다."},{"code":"12기환01-02","text":"기후시스템이 유지되는 되먹임 과정을 이해하고 생물권과 다른 권역 간 상호작용을 설 명 할 수 있다."},{"code":"12기환01-03","text":"기후변화가 생태계와 우리의 생활환경에 영향을 미친 사례를 조사하여 발표할 수 있다."}],"tamgu":["우리 지역 생태지도 제작하기"],"haeseol":[{"code":"12기환01-01","text":"기후를 결정하는 기후요소와 기후인자를 구분하여 이해하도록 한다."},{"code":"12기환01-02","text":"지구시스템의 기권, 수권, 지권과 생물권 간 상호작용을 이해하도록 한다."}],"goryeo":["기후와 환경생태에 대한 과도한 개념 설명으로 흥미를 잃지 않도록 하고, 대중 매체를 통해 학생들이 쉽게 접할 수 있는 사례를 중심으로 예상되는 문제점, 또는 파급효과 등을 토의함으로써 우리 주변에서 일어나는 다양한 기후변화 사례에 대해 관심을 가질 수 있도록 지도한다."],"area":"society","track":"융합선택","subject":"기후변화와 환경생태","electives":[],"prev":[],"next":[],"related":[]},{"id":"기환-02","grade":"기환","num":2,"title":"기후위기와 환경생태 변화","standards":[{"code":"12기환02-01","text":"기후위기가 일어나는 주요 원인을 이해하고, 기후위기의 심각성을 인식할 수 있다."},{"code":"12기환02-02","text":"빙상의 융해와 열팽창으로 인한 해수면 상승을 기후변화와 연계하여 설명할 수 있다."},{"code":"12기환02-03","text":"극한 기상 현상의 종류와 원인을 이해하고 극한 기상 현상이 환경생태에 미친 영향을 사례를 들어 설명할 수 있다."},{"code":"12기환02-04","text":"기후변화 시나리오에 따른 미래 생태계 변화 예측 보고서를 찾아보고, 미래의 기후와 생태계의 변화 양상을 추론할 수 있다."},{"code":"12기환02-05","text":"꽃의 개화 시기 변화 자료를 조사하고, 꽃의 개화 시기 변화가 우리 생활에 끼치는 영향을 추론할 수 있다."},{"code":"12기환02-06","text":"꿀벌을 비롯한 곤충의 개체 수 감소 원인을 기후변화와 연계하여 설명할 수 있다."},{"code":"12기환02-07","text":"수생태계의 물꽃 현상을 이해하고, 기후변화가 수생태계의 생물다양성에 끼치는 영향을 추 론 할 수 있다."}],"tamgu":[],"haeseol":[{"code":"12기환02-03","text":"극한 기상 현상은 슈퍼 태풍이나 메가 가뭄과 같은 대표적인 사례들을 중심으로 다룬다."},{"code":"12기환02-04","text":"기후변화 시나리오에 따른 생물의 분포 변화와 관련된 다양한 보고서나 자료들을 안내하고, 자기주도적으로 자료를 분석하고 해석한 후 토론이나 발표를 하도록 한다."}],"goryeo":["기후와 환경생태에 대한 개념은 핵심 내용을 중심으로 간략히 다루고, 다양한 사례들을 중심으로 흥미를 유발하도록 한다."],"area":"society","track":"융합선택","subject":"기후변화와 환경생태","electives":[],"prev":[],"next":[],"related":[]},{"id":"기환-03","grade":"기환","num":3,"title":"기후위기에 대응하는 우리의 노력","standards":[{"code":"12기환03-01","text":"산호의 멸종으로 인한 백화현상의 예를 통해 기후변화가 해양생태계에 미치는 영향을 살펴보고, 바다 사막화를 예방하거나 복원할 수 있는 과학기술의 사례를 제시할 수 있다."},{"code":"12기환03-02","text":"기후변화에 따라 가속화되는 사막화, 대형산불, 지역적 가뭄과 홍수 등을 이해하고, 이를 극복하기 위한 인류의 노력에 대해 토의할 수 있다."},{"code":"12기환03-03","text":"탄소중립 사회를 이루기 위한 탄소 저감 관련 과학기술 개발 현황을 알아보고, 이의 적용 사례를 제시할 수 있다."},{"code":"12기환03-04","text":"기후위기와 환경생태 변화에 대응하기 위한 국제사회의 노력을 알아보고, 민주 시민으로서 참여 방안을 제안할 수 있다."}],"tamgu":["탄소 저감 과학기술 고안하기","기후변화 시나리오에 따른 미래 한반도 생물의 분포 변화 시각화 자료 작성하기"],"haeseol":[{"code":"12기환03-04","text":"국제사회의 생물다양성 협약, 기후변화에 관한 정부 간 협의체나 국제기구를 소개하고, 이들의 노력이나 체결된 국제 협약 등을 다룬다.[12기환02-08] 모기나 파리와 같은 곤충 매개 감염병이 새롭게 출현하거나 급격히 확산되는 현상을 기후변화와 연계하여 설명할 수 있다."}],"goryeo":["기후와 환경생태의 변화가 우리의 삶에 직접적인 영향을 미칠 수 있음을 관련된 다양한 사례를 통해 알아볼 수 있도록 지도한다."],"area":"society","track":"융합선택","subject":"기후변화와 환경생태","electives":[],"prev":[],"next":[],"related":[]},{"id":"융탐-01","grade":"융탐","num":1,"title":"융합과학 탐구의 이해","standards":[{"code":"12융탐01-01","text":"과학이 다양한 분야와 연계하여 인류 사회의 문제해결에 기여하였음을 이해하고, 융합적 탐구의 유용성을 느낄 수 있다."},{"code":"12융탐01-02","text":"예술에서의 창작이나 사회과학적 탐구 과정을 이해하고, 과학적 탐구 과정과의 공통점과 차이점을 비교할 수 있다."},{"code":"12융탐01-03","text":"과학적 탐구 과정에서 사용되는 다양한 데이터의 종류를 이해하고, 지식의 창출 과정에서 데이터의 가치와 중요성을 인식할 수 있다."},{"code":"12융탐01-04","text":"인공지능을 포함한 디지털 탐구 도구나 기술의 활용 사례를 조사하고, 과학적 탐구 과정에서 디지털 탐구 도구와 기술 활용의 의의를 평가할 수 있다."}],"tamgu":["디지털 탐구 도구를 활용하여 가정의 전력 소모량 계산하기"],"haeseol":[{"code":"12융탐01-01","text":"현미경을 이용한 물질의 구조에 대한 분석, X-선 분광학 기술을 이용한 DNA 구조의 발견 등과 같이 다양한 분야의 과학기술이 서로 결합하여 과학의 발전을 가져온 사례 등을 다룬다."}],"goryeo":["과학적 발견의 사례나 사회 문제 해결을 소개할 때 ‘통합과학1, 2’ 수준에서 이해할 수 있는 사례를 중심으로 소개하며, 새로운 과학 개념이나 이론을 설명하는 것을 지양한다.","인공지능이나 빅데이터가 과학 연구에 활용되고, 다 양 한 사회 문제를 해결하거나 그 원 인 을 밝히는 데 기여하였음을 소개하도록 한다."],"area":"society","track":"융합선택","subject":"융합과학 탐구","electives":[],"prev":[],"next":[],"related":[]},{"id":"융탐-02","grade":"융탐","num":2,"title":"융합과학 탐구의 과정","standards":[{"code":"12융탐02-01","text":"실생활에서 관찰이나 경험을 통해 직접 얻은 데이터나 공개된 데이터를 가공하여 융합적 탐구 문제를 스스로 발견할 수 있다."},{"code":"12융탐02-02","text":"융합적 탐구 문제해결을 위한 가설이나 모형을 고안하고, 문제를 해결할 수 있는 방법이나 절차 등을 설계할 수 있다."},{"code":"12융탐02-03","text":"디지털 탐구 도구를 포함한 다양한 도구를 활용하여 데이터를 수집하고, 수집한 데이터의 타당성과 신뢰성을 평가할 수 있다."},{"code":"12융탐02-04","text":"융합적 탐구 과정을 통해 얻은 데이터를 탐구 목적이나 맥락에 맞게 시각 자료로 표현할 수 있다."},{"code":"12융탐02-05","text":"평균, 표준편차 등을 바탕으로 데이터의 특성을 파악하고, 이를 토대로 가설이나 모형 을 평가할 수 있다."},{"code":"12융탐02-06","text":"데이터 분석 결과를 바탕으로 결론을 도출하고 평가할 수 있다."},{"code":"12융탐02-07","text":"다양한 표현 방법을 활용하여 융합적 탐구 문제, 과정, 결과, 결론 등을 효과적으로 발표하고 토론할 수 있다."}],"tamgu":["공개 데이터셋을 활용하여 데이터를 수집하고 시각화하기","인공지능을 활용하여 미세먼지 농도 예측하기"],"haeseol":[{"code":"12융탐02-03","text":"센서나 기기가 데이터를 측정 또는 수집하는 방법을 경험함으로써 데이터 수집의 한계나 어려움을 이해할 수 있도록 한다."},{"code":"12융탐02-04","text":"표, 막대그래프, 히스토그램, 분산형 그래프 등 다양한 시각 자료의 특성을 이해하고 수집한 데이터를 적절한 형태로 시각화하도록 한다."}],"goryeo":["자기 주도적으로 융합과학 탐구에 적절한 문제를 선정하고 융합과학 탐구의 과정을 수행하여 과학의 가치와 유용성을 느낄 수 있도록 지도한다.","학생이 자신의 관심과 진로, 여건 등을 고려하여 스스로 탐구 주제를 선정 ⋅수행할 수 있도록 하며, 융합적 탐구 목적에 따라 스마트 기기, 인공지능 등과 같은 다양한 디지털 탐구 도구를 활용할 수 있도록 한다.","인공지능이나 빅데이터, 사물인터넷 등 디지털 기술을 활용해서 과학 및 다양한 분야의 문제해결에 도움이 될 수 있음을 설명하며, 이를 통해 디지털 탐구 도구의 활용과 판단을 위해 갖추어야 할 소양과 기본 원칙 등을 포함하여 지도한다.","디지털 탐구 도구 활용을 위해 갖추어야 할 소양과 기본 원칙 등을 다루고, 인공지능이나 빅데이터, 사물인터넷 등 디지털 기술을 과학 및 다양한 분야의 문제해결에 활용할 수 있음을 설명한다.","학생들이 유의미한 자료 탐색을 할 수 있도록 정부출연연구기관이나 학술기관 소장 데이터셋 등을 소개하고, 지능형 과학실을 활용할 수 있다."],"area":"society","track":"융합선택","subject":"융합과학 탐구","electives":[],"prev":[],"next":[],"related":[]},{"id":"융탐-03","grade":"융탐","num":3,"title":"융합과학 탐구의 전망","standards":[{"code":"12융탐03-01","text":"과학기술의 변화와 발전을 고려하여 미래 사회에 등장할 새로운 융합과학기술을 예측할 수 있다."},{"code":"12융탐03-02","text":"오늘날 인류가 겪고 있는 난제를 융합과학기술을 활용하여 해결할 수 있는 방안에 대해 토의할 수 있다."},{"code":"12융탐03-03","text":"융합과학 탐구 과정에서 준수해야 할 윤리에 대해 알아보고, 과학기술의 발달에 따라 발생할 수 있는 윤리적 쟁점을 토론할 수 있다."},{"code":"12융탐03-04","text":"융합과학기술을 활용하여 사회 문제를 해결하는 과정에서 시민참여가 문제해결에 도움을 준 사례를 제시할 수 있다."}],"tamgu":["식량자원 부족 및 대기오염 문제해결을 위한 융합과학기술 고안하기"],"haeseol":[{"code":"12융탐03-02","text":"오늘날 인류가 직면한 식량이나 물 부족, 각종 자원의 고갈, 기후변화나 싱크홀 등과 같은 난제에 대해 융합과학기술을 통한 간학문적 문제 해결 방안에 대해 토의하도록 한다."}],"goryeo":["융합과학 탐구를 수행하는 과정에서 사회적, 경제적, 윤리적 관점 등에 따라 긍정적인 면과 부정적인 면을 분석할 수 있도록 지도한다."],"area":"society","track":"융합선택","subject":"융합과학 탐구","electives":[],"prev":[],"next":[],"related":[]}]};

const SUBJECTS = DATA.subjects || {};

const TRACK_ORDER = {'일반선택':0, '진로선택':1, '융합선택':2};
const TRACK_CLASS = {'일반선택':'g', '진로선택':'c', '융합선택':'v'};
const TRACK_SHORT = {'일반선택':'일반', '진로선택':'진로', '융합선택':'융합'};
// 영역별 선택과목(과목유형 순) 목록
function subjectsOf(areaId){
  return Object.entries(SUBJECTS).filter(([k,s])=>s.area===areaId)
    .sort((a,b)=>TRACK_ORDER[a[1].track]-TRACK_ORDER[b[1].track])
    .map(([k,s])=>({key:k, ...s}));
}
