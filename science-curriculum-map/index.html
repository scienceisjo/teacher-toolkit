  GRADES.forEach((gr,i)=>{
    const n = DATA.units.filter(u=>u.grade===gr).length;
    H.push(`<div class="gradeHead" style="grid-row:1;grid-column:${2+i}">${GRADE_LABEL[gr].replace('군','')}<small>${n}개 단원</small></div>`);
  });
  H.push(`<div class="gradeHead" style="grid-row:1;grid-column:5">고1 공통<small>통합과학 · 합류 ⤵</small></div>`);
  H.push(`<div class="gradeHead" style="grid-row:1;grid-column:6">고2~3 선택<small>15과목 47단원</small></div>`);
  // 영역 행
  AREAS.forEach((a,i)=>{
    const row = 2+i;
    H.push(`<div class="areaLabel" style="grid-row:${row};grid-column:1"><i style="background:${a.color}"></i><b>${a.name}</b></div>`);
    GRADES.forEach((gr,ci)=>{
      H.push(`<div class="cell" style="--c:${a.color};grid-row:${row};grid-column:${2+ci}">${unitsOf(gr,a.id).map(u=>pill(u)).join('')}</div>`);
    });
    // 고2~3 선택 열 (과목별 그룹)
    let inner='';
    for(const s of subjectsOf(a.id)){
      const us = unitsOf(s.key).map(u=>pill(u,true)).join('');
      inner += `<div class="esub"><div class="esubh"><span class="trk trk-${TRACK_CLASS[s.track]}">${TRACK_SHORT[s.track]}</span>${s.name}</div><div class="epills">${us}</div></div>`;
    }
    H.push(`<div class="ecell" style="--c:${a.color};grid-row:${row};grid-column:6">${inner}</div>`);
  });
  // 통합과학 세로 트랙 (col5, 전 영역행 span)
  H.push(`<div id="hcell" style="--c:var(--integrated);grid-column:5;grid-row:2 / span ${AREAS.length}">
    <div class="subhead">통합과학 1</div>${unitsOf('h1').map(u=>pill(u)).join('')}
    <div class="subhead" style="margin-top:6px">통합과학 2</div>${unitsOf('h2').map(u=>pill(u)).join('')}
  </div>`);
  g.innerHTML = H.join('');
  g.querySelectorAll('.st').forEach(b=>b.addEventListener('click',()=>select(b.dataset.id)));
}
function pill(u, compact){
  const c = AREA_BY[u.area].color;
  const pf = (!compact && u.standards[0]) ? u.standards[0].code.split('-')[0] : '';
  return `<button class="st${compact?' cmp':''}" data-id="${u.id}" style="--c:${c}"><span class="dot"></span>${esc(u.title)}${pf?`<span class="pf">${pf}</span>`:''}</button>`;
}

/* ---------- 선택 & 하이라이트 ---------- */
function select(id){
  selected = id;
  const u = byId[id];
  document.querySelectorAll('.st').forEach(b=>{
    b.className = 'st';
    const bid = b.dataset.id;
    if(bid===id) b.classList.add('sel');
    else if(u.prev.includes(bid)) b.classList.add('prev');
    else if(u.next.includes(bid)) b.classList.add('next');
    else if(u.related.includes(bid)) b.classList.add('rel');
    else b.classList.add('dim');
  });
  renderPanel(u);
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel').scrollTop = 0;
  const el = document.querySelector(`.st[data-id="${id}"]`);
  if(el) el.scrollIntoView({block:'nearest', inline:'nearest', behavior:'smooth'});
  requestAnimationFrame(drawWires);
}
function clearSel(){
  selected = null;
  document.querySelectorAll('.st').forEach(b=>b.className='st');
  document.getElementById('wires').innerHTML='';
  renderWelcome();
  document.getElementById('panel').classList.remove('open');
}

/* ---------- 연결선 ---------- */
function drawWires(){
  const svg = document.getElementById('wires');
  svg.innerHTML='';
  if(!selected) return;
  const inner = document.getElementById('mapInner').getBoundingClientRect();
  svg.setAttribute('viewBox', `0 0 ${inner.width} ${inner.height}`);
  const u = byId[selected];
  const selEl = document.querySelector(`.st[data-id="${selected}"]`);
  if(!selEl) return;
  const s = center(selEl, inner);
  const groups = [[u.prev,'#f59f00',''],[u.next,'#339af0',''],[u.related,'#adb5bd','6 5']];
  let paths='';
  for(const [ids,color,dash] of groups){
    for(const tid of ids){
      const tEl = document.querySelector(`.st[data-id="${tid}"]`);
      if(!tEl) continue;
      const t = center(tEl, inner);
      const mx = (s.x+t.x)/2;
      paths += `<path d="M${s.x},${s.y} C${mx},${s.y} ${mx},${t.y} ${t.x},${t.y}"
        fill="none" stroke="${color}" stroke-width="2.6" stroke-linecap="round" opacity=".8"
        ${dash?`stroke-dasharray="${dash}"`:''}/>
        <circle cx="${t.x}" cy="${t.y}" r="4" fill="${color}"/>`;
    }
  }
  svg.innerHTML = paths + `<circle cx="${s.x}" cy="${s.y}" r="5" fill="#212529"/>`;
}
function center(el, ref){
  const r = el.getBoundingClientRect();
  return {x:r.left - ref.left + r.width/2, y:r.top - ref.top + r.height/2};
}

/* ---------- 상세 패널 ---------- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function renderPanel(u){
  const a = AREA_BY[u.area];
  const codes = u.standards.map(s=>s.code);
  const range = codes.length ? `[${codes[0]}] ~ [${codes[codes.length-1]}] · 성취기준 ${codes.length}개` : '';
  let h = `<button id="pClose" onclick="clearSel()">✕</button>
  <div class="chips">
    <span class="chip" style="background:${a.color}">${a.name}</span>
    <span class="chip gr">${GRADE_LABEL[u.grade]}</span>
    ${u.track?`<span class="chip trk-${TRACK_CLASS[u.track]}" style="color:#fff">${u.track}</span>`:''}
  </div>
  <h2>${esc(u.title)}</h2>
  <div class="coderange">${range}</div>
  <div class="pbtns">
    <button onclick="window.print()">🖨 단원 브리핑 인쇄</button>
    <button onclick="clearSel()">지도 전체 보기</button>
  </div>`;

  h += `<section class="blk" style="--ac:${a.color}"><h3>성취기준</h3>` +
    u.standards.map(s=>`<div class="std"><span class="code">${s.code}</span><p>${esc(s.text)}</p></div>`).join('') + `</section>`;

  if(u.haeseol.length){
    h += `<section class="blk" style="--ac:${a.color}"><h3>성취기준 해설</h3><details open><summary>해설 ${u.haeseol.length}개</summary><ul>` +
      u.haeseol.map(x=>`<li>${x.code?`<span class="code">[${x.code}]</span> `:''}${esc(x.text)}</li>`).join('') + `</ul></details></section>`;
  }
  if(u.goryeo.length){
    h += `<section class="blk" style="--ac:${a.color}"><h3>성취기준 적용 시 고려사항</h3><details open><summary>고려사항 ${u.goryeo.length}개</summary><ul>` +
      u.goryeo.map(x=>`<li${x.includes('연계')? ' class="linkline"':''}>${esc(x)}</li>`).join('') + `</ul></details></section>`;
  }
  if(u.tamgu.length){
    h += `<section class="blk" style="--ac:${a.color}"><h3>탐구 활동 예시</h3><div class="tchips">` +
      u.tamgu.map(t=>`<span>🔬 ${esc(t)}</span>`).join('') + `</div></section>`;
  }

  // 배움의 흐름
  h += `<section class="blk" style="--ac:${a.color}"><h3>배움의 흐름 (나선 연계)</h3><div class="flow">`;
  if(u.prev.length){
    h += `<div class="fgroup">` + u.prev.map(id=>fcard(id,'p')).join('') + `</div><div class="arrow">↓ 선수 학습을 딛고</div>`;
  } else {
    h += `<div class="fnote">⭐ 이 개념의 첫 도입 단원입니다 — 학생의 일상 경험(선개념)에서 출발하세요.</div>`;
  }
  h += `<div class="fgroup"><span class="fcard cur" style="--ac:${a.color}"><small>${GRADE_LABEL[u.grade]}</small>${esc(u.title)}</span></div>`;
  if(u.next.length){
    h += `<div class="arrow">↓ 이후에 이렇게 자랍니다</div><div class="fgroup">` + u.next.map(id=>fcard(id,'n')).join('') + `</div>`;
  }
  if(u.related.length){
    h += `<div class="arrow">≈ 같은 시기 연계 단원</div><div class="fgroup">` + u.related.map(id=>fcard(id,'r')).join('') + `</div>`;
  }
  h += `</div><div class="fnote">카드를 누르면 그 단원으로 이동합니다 · 교육과정 원문의 '연계된다' 문장을 그대로 그래프화했습니다.</div></section>`;

  const elect = u.electives.filter(e=>!e.replace(/\s/g,'').startsWith('통합과학'));
  if(elect.length){
    h += `<section class="blk" style="--ac:${a.color}"><h3>진로 연계 (고교 선택과목)</h3><div class="tchips">` +
      elect.map(e=>`<span>🎓 ${esc(e)}</span>`).join('') +
      `</div><div class="fnote">"이 단원이 재미있었다면?" — 고교학점제 과목 선택 상담에 활용하세요.</div></section>`;
  }

  h += `<section class="blk" style="--ac:${a.color}"><h3>성취수준</h3>
    <div class="notice">성취기준별 성취수준(A·B·C) 데이터는 KICE 「성취수준」 자료를 확보하는 대로 추가할 예정입니다.
    그 전까지는 아래 <b>형성평가 프롬프트</b>가 성취수준 차등 문항을 대신 생성해 드립니다.</div></section>`;

  h += `<section class="blk" style="--ac:${a.color}"><h3>AI 문항 도우미</h3>
    <div class="ai">
      <button class="diag" onclick="copyPrompt('diag')">🩺 진단평가 프롬프트 복사</button>
      <button class="form" onclick="copyPrompt('form')">📝 형성평가 프롬프트 복사</button>
    </div>
    <div class="ainote">진단평가 = <b>선수 학습 단원의 성취기준</b>을 자동으로 묶어 수업 전 진단 문항 생성 ·
    형성평가 = 이 단원 성취기준 + 해설의 범위 제한을 반영한 수준별 문항 생성.<br>복사 후 Claude 등 AI에 붙여넣으면 됩니다.</div></section>`;

  document.getElementById('panel').innerHTML = h;
}
function fcard(id, cls){
  const t = byId[id];
  return `<button class="fcard ${cls}" onclick="select('${id}')"><small>${GRADE_LABEL[t.grade]}</small>${esc(t.title)}</button>`;
}
function renderWelcome(){
  const nStd = DATA.units.reduce((s,u)=>s+u.standards.length,0);
  const nLink = DATA.units.reduce((s,u)=>s+u.prev.length+u.related.length,0);
  document.getElementById('panel').innerHTML = `<div class="empty">
    <div class="big">🌀</div>
    <b style="font-size:16px;color:#343a40">단원(역)을 클릭해 보세요</b><br>
    성취기준 · 해설 · 고려사항 · 선수/후속 연계 ·<br>AI 진단/형성평가 프롬프트가 한 번에 나옵니다.
    <div class="stats">
      <div><b>${DATA.units.length}</b>단원</div>
      <div><b>${nStd}</b>성취기준</div>
      <div><b>${nLink}</b>연계 링크</div>
    </div>
    <div style="font-size:12.5px; text-align:left; background:var(--bg); border-radius:12px; padding:12px 16px; line-height:2">
      <span style="color:#f59f00">●</span> 노란 테두리 = 선수 학습 (이전에 배움)<br>
      <span style="color:#339af0">●</span> 파란 테두리 = 후속 연계 (앞으로 배움)<br>
      <span style="color:#adb5bd">◌</span> 점선 = 같은 시기 연계 단원<br>
      🚉 오른쪽 끝 <b>고2~3 선택</b> 열까지 노선이 이어집니다<br>
      🔍 위 검색창: 단원명·코드·키워드로 바로 찾기
    </div>
  </div>`;
}

/* ---------- AI 프롬프트 ---------- */
function stdLines(u){ return u.standards.map(s=>`- [${s.code}] ${s.text}`).join('\n'); }
function buildPrompt(kind){
  const u = byId[selected];
  const head = `당신은 한국 2022 개정 과학과 교육과정에 정통한 평가 전문가입니다.\n\n[수업 단원] ${GRADE_LABEL[u.grade]} 「${u.title}」\n이 단원의 성취기준:\n${stdLines(u)}\n`;
  if(kind==='diag'){
    let prevTxt = u.prev.length
      ? u.prev.map(id=>{const p=byId[id]; return `▶ ${GRADE_LABEL[p.grade]} 「${p.title}」\n${stdLines(p)}`;}).join('\n\n')
      : '(공식 선수 단원 없음 — 이 개념의 첫 도입 단원입니다. 학생들이 일상 경험으로 갖고 있을 선개념·오개념을 진단 대상으로 삼아 주세요.)';
    return head + `\n[선수 학습] 학생들이 이전에 배운 연계 단원과 성취기준:\n${prevTxt}\n
[요청] 위 단원 수업을 시작하기 전에 실시할 **진단평가**를 만들어 주세요.
1. 선수 학습 내용의 이해도를 확인하는 문항 5개 (선택형 3 + 서답형 2)
2. 각 문항마다: ① 확인하려는 선수 개념 ② 정답과 해설 ③ 오답 선택 시 의심되는 오개념과 보충 지도 포인트
3. 중학생 눈높이의 일상 소재를 사용하고, 1문항은 그림/상황 묘사형으로
4. 마지막에 '오개념 빠른 진단표'(문항–선수개념–오개념–보충지도)를 표로 정리해 주세요.`;
  }
  const hae = u.haeseol.length ? `\n[지도 범위·유의사항] 교육과정 해설 (이 범위를 절대 넘지 마세요):\n${u.haeseol.map(x=>`- ${x.code?`[${x.code}] `:''}${x.text}`).join('\n')}\n` : '';
  return head + hae + `
[요청] 이 단원의 **형성평가** 문항을 만들어 주세요.
1. 성취기준별로 성취수준 상/중/하 각 1문항씩 (수준 차이가 분명하게)
2. 위 해설에 명시된 범위 제한(다루지 않는 내용)을 반드시 지킬 것
3. 각 문항마다: 정답, 수준별 도달 판단 기준(채점 기준), 학생 피드백 문구
4. 마지막에 교사용 '수준별 지도 한 줄 팁'을 정리해 주세요.`;
}
function copyPrompt(kind){
  const txt = buildPrompt(kind);
  const done = ()=>toast(kind==='diag' ? '🩺 진단평가 프롬프트 복사 완료! AI에 붙여넣으세요.' : '📝 형성평가 프롬프트 복사 완료! AI에 붙여넣으세요.');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt, done));
  } else fallbackCopy(txt, done);
}
function fallbackCopy(txt, done){
  const ta = document.createElement('textarea');
  ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){ alert('복사 실패 — 수동으로 복사해 주세요:\n\n'+txt); }
  document.body.removeChild(ta);
}
let toastTimer=null;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ---------- 검색 ---------- */
const qEl = document.getElementById('q');
qEl.addEventListener('input', ()=>{
  const q = qEl.value.trim().toLowerCase().replace(/\s+/g,'');
  const cnt = document.getElementById('qCount');
  if(!q){
    cnt.textContent='';
    if(selected) select(selected); else document.querySelectorAll('.st').forEach(b=>b.className='st');
    return;
  }
  document.getElementById('wires').innerHTML='';
  let n=0;
  document.querySelectorAll('.st').forEach(b=>{
    const u = byId[b.dataset.id];
    const hay = (u.title + u.standards.map(s=>s.code+s.text).join('') ).toLowerCase().replace(/\s+/g,'');
    const hit = hay.includes(q);
    b.className = 'st' + (hit ? '' : ' dim');
    if(hit) n++;
  });
  cnt.textContent = `${n}개 단원`;
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ qEl.value=''; qEl.dispatchEvent(new Event('input')); clearSel(); }});

/* ---------- 범례 & 초기화 ---------- */
document.getElementById('legend').innerHTML =
  AREAS.concat([AREA_BY.integrated]).map(a=>`<span><i style="background:${a.color}"></i>${a.name}</span>`).join('');
buildMap();
renderWelcome();
window.addEventListener('resize', ()=>requestAnimationFrame(drawWires));
</script>
