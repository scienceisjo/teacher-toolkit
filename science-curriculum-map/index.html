<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학 나선 교육과정 지도</title>
<style>
:root{
  --bg:#f6f7f9; --card:#ffffff; --ink:#212529; --sub:#868e96; --line:#dee2e6;
  --energy:#e03131; --matter:#f08c00; --life:#2f9e44; --earth:#1971c2; --society:#9c36b5; --integrated:#495057;
  --amber:#f59f00; --blue:#339af0;
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:'Pretendard','Segoe UI','Malgun Gothic',system-ui,sans-serif;
  background:var(--bg); color:var(--ink); display:flex; flex-direction:column; height:100vh; overflow:hidden;
}
/* ---------- 헤더 ---------- */
header{
  display:flex; align-items:center; gap:14px; padding:10px 18px; background:#fff;
  border-bottom:1px solid var(--line); flex-wrap:wrap; z-index:30;
}
header h1{font-size:19px; letter-spacing:-.3px; white-space:nowrap}
header h1 .spiral{display:inline-block; margin-right:4px}
header .tagline{font-size:12px; color:var(--sub); white-space:nowrap}
#q{
  flex:1; min-width:160px; max-width:340px; padding:8px 12px; border:1.5px solid var(--line);
  border-radius:20px; font-size:13.5px; font-family:inherit; outline:none; transition:border .15s;
}
#q:focus{border-color:var(--blue)}
#qCount{font-size:12px; color:var(--sub); min-width:70px}
.legend{display:flex; gap:10px; flex-wrap:wrap; margin-left:auto}
.legend span{display:flex; align-items:center; gap:5px; font-size:12px; color:#495057; white-space:nowrap}
.legend i{width:11px; height:11px; border-radius:50%; display:inline-block}
/* ---------- 본문 레이아웃 ---------- */
#main{flex:1; display:flex; overflow:hidden}
#mapWrap{flex:1; overflow:auto; padding:18px 14px 40px}
#mapInner{position:relative; min-width:1150px; max-width:1600px; margin:0 auto}
#wires{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:5}
#mapGrid{
  display:grid; position:relative; z-index:2;
  grid-template-columns:86px repeat(3, minmax(250px,1fr)) 235px;
  gap:0 10px;
}
.gradeHead{
  text-align:center; font-weight:700; font-size:14px; padding:8px 4px 12px; color:#343a40;
}
.gradeHead small{display:block; font-weight:400; font-size:11px; color:var(--sub); margin-top:2px}
.areaLabel{
  display:flex; flex-direction:column; justify-content:center; align-items:flex-start; gap:6px; padding:8px 2px;
}
.areaLabel b{font-size:13px; letter-spacing:-.3px}
.areaLabel i{width:34px; height:6px; border-radius:3px; display:block}
.cell{
  position:relative; display:flex; flex-wrap:wrap; align-content:center; gap:8px 10px;
  padding:16px 12px; min-height:86px;
}
.cell::before{ /* 노선 트랙 */
  content:''; position:absolute; left:-5px; right:-5px; top:50%; height:5px; margin-top:-2.5px;
  background:var(--c); opacity:.16; border-radius:3px;
}
.rowband{background:transparent}
/* 통합과학 세로 트랙 */
#hcell{
  grid-column:5; grid-row:2 / span 5; position:relative;
  display:flex; flex-direction:column; justify-content:center; gap:11px; padding:10px 14px;
}
#hcell::before{
  content:''; position:absolute; top:-4px; bottom:-4px; left:50%; width:5px; margin-left:-2.5px;
  background:var(--integrated); opacity:.16; border-radius:3px;
}
#hcell .subhead{font-size:11.5px; font-weight:700; color:var(--sub); text-align:center; position:relative}
/* ---------- 역(단원) 핀 ---------- */
.st{
  position:relative; display:inline-flex; align-items:center; gap:7px;
  background:var(--card); border:1.6px solid var(--line); border-radius:20px;
  padding:6px 12px 6px 8px; font-size:13px; font-family:inherit; cursor:pointer;
  transition:all .15s; line-height:1.25; text-align:left; color:var(--ink);
  box-shadow:0 1px 2px rgba(0,0,0,.05);
}
.st .dot{width:10px; height:10px; border-radius:50%; background:var(--c); flex:none; border:2px solid #fff; outline:2px solid var(--c)}
.st .pf{font-size:10px; color:var(--sub); margin-left:2px}
.st:hover{border-color:var(--c); transform:translateY(-1px); box-shadow:0 3px 8px rgba(0,0,0,.1)}
.st.sel{background:var(--c); border-color:var(--c); color:#fff; font-weight:700; box-shadow:0 4px 12px rgba(0,0,0,.25)}
.st.sel .pf{color:rgba(255,255,255,.8)}
.st.sel .dot{outline-color:#fff}
.st.prev{border-color:var(--amber); box-shadow:0 0 0 3px rgba(245,159,0,.25)}
.st.next{border-color:var(--blue); box-shadow:0 0 0 3px rgba(51,154,240,.25)}
.st.rel{border-style:dashed; border-color:#adb5bd; box-shadow:0 0 0 3px rgba(173,181,189,.2)}
.st.dim{opacity:.28; filter:saturate(.4)}
/* ---------- 상세 패널 ---------- */
#panel{
  width:475px; max-width:44vw; background:#fff; border-left:1px solid var(--line);
  overflow-y:auto; padding:20px 22px 30px; z-index:20;
}
#panel .empty{color:var(--sub); font-size:14px; line-height:1.8; padding-top:30px; text-align:center}
#panel .empty .big{font-size:40px; margin-bottom:10px}
#panel .stats{display:flex; justify-content:center; gap:18px; margin:18px 0; flex-wrap:wrap}
#panel .stats div{background:var(--bg); border-radius:12px; padding:10px 16px; font-size:12px; color:var(--sub)}
#panel .stats b{display:block; font-size:20px; color:var(--ink)}
.pHead{display:flex; align-items:flex-start; gap:8px; margin-bottom:4px}
.pHead .chips{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px}
.chip{display:inline-block; font-size:11.5px; font-weight:700; padding:3px 10px; border-radius:12px; color:#fff}
.chip.gr{background:#868e96}
#panel h2{font-size:22px; letter-spacing:-.5px; margin:2px 0 4px}
#panel .coderange{font-size:12px; color:var(--sub); margin-bottom:14px}
.pbtns{display:flex; gap:8px; margin:10px 0 18px}
.pbtns button{
  flex:1; padding:8px 10px; border:1.5px solid var(--line); background:#fff; border-radius:10px;
  font-size:12.5px; font-family:inherit; cursor:pointer; transition:all .15s;
}
.pbtns button:hover{border-color:#868e96; background:var(--bg)}
section.blk{margin-bottom:18px}
section.blk>h3{
  font-size:13.5px; margin-bottom:8px; display:flex; align-items:center; gap:6px; color:#343a40;
}
section.blk>h3::before{content:''; width:4px; height:15px; border-radius:2px; background:var(--ac,#495057)}
.std{display:flex; gap:8px; margin-bottom:8px; font-size:13.5px; line-height:1.65}
.std .code{
  flex:none; font-size:11px; font-weight:700; color:var(--ac,#495057);
  background:color-mix(in srgb, var(--ac,#495057) 10%, #fff);
  border:1px solid color-mix(in srgb, var(--ac,#495057) 30%, #fff);
  padding:2px 7px; border-radius:8px; height:fit-content; margin-top:2px; white-space:nowrap;
}
details{border:1px solid var(--line); border-radius:12px; padding:10px 14px; margin-bottom:8px; background:#fcfcfd}
details summary{font-size:13px; font-weight:700; cursor:pointer; color:#495057; user-select:none}
details ul{margin:8px 0 2px 16px}
details li{font-size:13px; line-height:1.7; margin-bottom:6px; color:#343a40}
details li .code{font-weight:700; color:var(--ac,#495057)}
details li.linkline{background:#fff9db; border-radius:8px; padding:6px 8px; list-style-position:inside; margin-left:-14px}
.tchips{display:flex; flex-wrap:wrap; gap:6px}
.tchips span{font-size:12px; background:var(--bg); border:1px solid var(--line); padding:4px 10px; border-radius:14px; color:#495057}
/* 배움의 흐름 */
.flow{display:flex; flex-direction:column; gap:6px}
.flow .fgroup{display:flex; flex-wrap:wrap; gap:6px}
.fcard{
  display:flex; flex-direction:column; border-radius:10px; padding:7px 11px; font-size:12.5px;
  border:1.5px solid var(--line); background:#fff; cursor:pointer; font-family:inherit; text-align:left;
  transition:all .12s; line-height:1.35;
}
.fcard small{font-size:10.5px; color:var(--sub)}
.fcard:hover{transform:translateY(-1px); box-shadow:0 2px 6px rgba(0,0,0,.1)}
.fcard.p{border-left:4px solid var(--amber)}
.fcard.n{border-left:4px solid var(--blue)}
.fcard.r{border-left:4px solid #adb5bd; border-style:dashed}
.fcard.cur{background:var(--ac); color:#fff; border-color:var(--ac); cursor:default; font-weight:700}
.fcard.cur small{color:rgba(255,255,255,.8)}
.flow .arrow{color:var(--sub); font-size:13px; padding-left:6px}
.fnote{font-size:11.5px; color:var(--sub); margin-top:6px}
/* AI */
.ai{display:flex; gap:8px}
.ai button{
  flex:1; padding:11px 8px; border:none; border-radius:12px; font-size:13px; font-weight:700;
  font-family:inherit; cursor:pointer; color:#fff; transition:transform .12s, box-shadow .12s;
}
.ai button:hover{transform:translateY(-1px); box-shadow:0 4px 10px rgba(0,0,0,.2)}
.ai .diag{background:linear-gradient(135deg,#f59f00,#e8590c)}
.ai .form{background:linear-gradient(135deg,#339af0,#1864ab)}
.ainote{font-size:11.5px; color:var(--sub); margin-top:8px; line-height:1.6}
.notice{
  font-size:12.5px; background:#e7f5ff; border:1px solid #a5d8ff; color:#1864ab;
  border-radius:10px; padding:9px 12px; line-height:1.6;
}
/* 토스트 */
#toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(80px);
  background:#212529; color:#fff; font-size:13.5px; padding:11px 22px; border-radius:24px;
  transition:transform .25s; z-index:99; box-shadow:0 6px 20px rgba(0,0,0,.3); max-width:90vw; text-align:center;
}
#toast.show{transform:translateX(-50%) translateY(0)}
/* 모바일 */
#pClose{display:none}
@media (max-width:1000px){
  #panel{position:fixed; right:0; top:0; bottom:0; width:min(480px,94vw); max-width:94vw;
    box-shadow:-8px 0 30px rgba(0,0,0,.2); transform:translateX(105%); transition:transform .25s}
  #panel.open{transform:none}
  #pClose{display:block; position:sticky; top:0; float:right; border:none; background:var(--bg);
    width:34px; height:34px; border-radius:50%; font-size:16px; cursor:pointer; z-index:5}
}
/* 인쇄: 상세 패널만 A4 브리핑으로 */
@media print{
  body{overflow:visible; height:auto}
  header, #mapWrap, footer, .pbtns, .ai, .ainote, #pClose{display:none !important}
  #main{overflow:visible; display:block}
  #panel{width:100%; max-width:100%; border:none; overflow:visible; transform:none; position:static; padding:0}
  details{page-break-inside:avoid}
}
footer#app-credit{flex:none}
</style>
</head>
<body>
<header>
  <h1><span class="spiral">🌀</span>과학 나선 교육과정 지도</h1>
  <span class="tagline">2022 개정 · 초3 ~ 고1 공통과정</span>
  <input id="q" type="search" placeholder="단원명·성취기준 코드·키워드 검색 (예: 빛, 4과01, 밀도)">
  <span id="qCount"></span>
  <div class="legend" id="legend"></div>
</header>

<div id="main">
  <div id="mapWrap"><div id="mapInner">
    <svg id="wires"></svg>
    <div id="mapGrid"></div>
  </div></div>
  <aside id="panel"></aside>
</div>

<div id="toast"></div>

<footer id="app-credit" style="width:100%;box-sizing:border-box;margin:0;padding:10px 12px;text-align:center;font-size:12.5px;line-height:1.6;color:#8a8f98;font-family:system-ui,-apple-system,'Segoe UI','Malgun Gothic',sans-serif;border-top:1px solid rgba(128,128,128,.25);background:#fff;">© 2026 조승재(과학이조선생) · 해누리중학교 · All rights reserved<br><span style="font-size:11px;opacity:.85;">최종 업데이트: 2026-07-22</span></footer>

<script>
const DATA = {"gradeNames":{"e34":"초등 3~4학년","e56":"초등 5~6학년","m13":"중학교 1~3학년","h1":"통합과학1 (고1)","h2":"통합과학2 (고1)"},"units":[{"id":"e34-01","grade":"e34","num":1,"title":"힘과 우리 생활","standards":[{"code":"4과01-01","text":"일상생활에서 힘과 관련된 현상에 흥미를 갖고, 물체를 밀거나 당길 때 나타나는 현상을 관찰할 수 있다."},{"code":"4과01-02","text":"수평잡기 활동을 통해 물체의 무게를 비교할 수 있다."},{"code":"4과01-03","text":"무게를 정확히 비교하기 위해서는 저울이 필요함을 알고, 저울을 사용해 무게를 비교할 수 있다."},{"code":"4과01-04","text":"지레, 빗면과 같은 도구를 이용하면 물체를 들어 올릴 때 드는 힘의 크기가 달라짐을 알고, 도구가 일상생활에서 어떻게 쓰이는지 조사하여 공유할 수 있다."}],"tamgu":["무거운 물체를 밀 때와 가벼운 물체를 밀 때의 특징 탐구하기"],"haeseol":[{"code":"4과01-01","text":"무거운 물체를 밀고 당길 때와 가벼운 물체를 밀고 당길 때 드는 힘의 크기를 느끼는 데 중점을 둔다."},{"code":"4과01-03","text":"무게와 질량을 구분하지 않으며 무게를 비교하는 단위로 g, ㎏을 사용한다."},{"code":"4과01-04","text":"지레, 빗면과 같은 간단한 도구를 이용할 때 힘의 크기가 달라진다는 점을 관찰하는 데 중점을 두며, 도구의 원리나 구조적 특성을 다루지 않는다."}],"goryeo":["초등학교 5∼6학년군 ‘물체의 운동’, 중학교 1∼3학년군 ‘힘의 작용’과 연계된다.","무게를 비교할 때는 용수철저울이나 전자저울 등을 사용하고, 분동을 사용하는 윗접시저울은 다루지 않는다.","조사한 내용을 공유할 때 사회 관계망 서비스 (SNS)를 활용할 수 있으며, 글과 그림으로 표현한 발표 자료 만들기를 할 수 있다."],"area":"energy","electives":[],"prev":[],"next":["e56-10","m13-05"],"related":[]},{"id":"e34-02","grade":"e34","num":2,"title":"동물의 생활","standards":[{"code":"4과02-01","text":"여러 가지 동물을 관찰하여 특징에 따라 동물을 분류할 수 있다."},{"code":"4과02-02","text":"다양한 환경에 서식하는 동물을 조사하여 동물의 생김새와 생활 방식이 환경과 관련되어 있음을 설명할 수 있다."},{"code":"4과02-03","text":"동물의 특징을 이용하여 일상생활에서 활용할 수 있는 생활용품을 설계하여 협력적으로 소 통 할 수 있다."}],"tamgu":["동물 분류 기준 정하기"],"haeseol":[{"code":"4과02-01","text":"동물의 형태적 특징을 찾고 그 특징에 따라 분류 기준을 정하여 분류하는 활동을 하도록 하며 생물학적 분류 체계는 다루지 않는다."},{"code":"4과02-02","text":"서식지에 따른 동물의 생김새와 생활 방식의 다양성을 다루고, 적응 개념은 다루지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘생물의 한살이’, ‘생물과 환경’, 5∼6학년군 ‘우리 몸의 구조와 기능’과 중학교 1∼3학년군 ‘생물의 구성과 다양성’, ‘동물과 에너지’와 연계된다.","‘동물의 생활’에서는 여러 가지 동물의 형태적 특징을 중심으로 관찰, 분류 활동을 한다."],"area":"life","electives":[],"prev":[],"next":["e56-04","m13-02","m13-13","m13-21"],"related":["e34-04","e34-12","e34-14"]},{"id":"e34-03","grade":"e34","num":3,"title":"식물의 생활","standards":[{"code":"4과03-01","text":"여러 가지 식물을 관찰하여 특징에 따라 식물을 분류할 수 있다."},{"code":"4과03-02","text":"다양한 환경에 서식하는 식물을 조사하여 식물의 생김새와 생활 방식이 환경과 관련되어 있음을 설명할 수 있다."},{"code":"4과03-03","text":"식물의 특징을 이용하여 일상생활에서 활용할 수 있는 생활용품을 설계하여 협력적으로 소 통 할 수 있다."}],"tamgu":["식물 분류 기준 정하기"],"haeseol":[{"code":"4과03-01","text":"여러 가지 식물의 잎을 채집해 생김새 등과 같은 외형적 특징에 따라 기준을 세워 분류하는 활동을 하며 생물학적 분류 체계는 다루지 않는다."},{"code":"4과03-02","text":"서식지에 따른 식물의 생김새와 생활 방식의 다양성을 다루고, 적응 개념은 다루지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘생물의 한살이’, ‘생물과 환경’, 5∼6학년군 ‘식물의 구조와 기능’과 중학교 1∼3학년군 ‘생물의 구성과 다양성’, ‘식물과 에너지’와 연계된다.","여러 가지 식물을 줄기, 잎, 꽃 등으로 분류 활동을 할 수 있으나, 주변에서 쉽게 구할 수 있는 식물의 잎을 대상으로 활동하도록 한다.","초등학교 5∼6학년군 ‘식물의 구조와 기능 ’에서 각 부위의 구조와 기능을 이해하는 데 중점을 두고 다루므로 ‘식물의 생활’에서는 여러 가지 식물의 잎을 중심으로 관찰, 분류 활동을 한다."],"area":"life","electives":[],"prev":[],"next":["e56-11","m13-02","m13-12"],"related":["e34-04","e34-12","e34-14"]},{"id":"e34-04","grade":"e34","num":4,"title":"생물의 한살이","standards":[{"code":"4과04-01","text":"동물의 한살이를 직접 관찰하고, 관찰한 내용을 글과 그림으로 표현할 수 있다."},{"code":"4과04-02","text":"식물이 자라는 데 필요한 조건을 찾는 실험을 설계하여 수행할 수 있다."},{"code":"4과04-03","text":"생물의 한살이 과정을 조사하여 생물에 따라 한살이의 유형이 다양함을 소개하는 자료를 만들어 공유할 수 있다."}],"tamgu":["곤충의 한살이 관찰하기"],"haeseol":[{"code":"4과04-02","text":"씨가 싹트는데 필요한 조건은 물과 온도로 한정하고, 식물이 자라는데 필요한 조건은 물과 햇빛으로 제한한다."},{"code":"4과04-03","text":"한살이의 유형을 이해하는 생물의 범위는 동물과 식물에 한정하여 다루고, 식물의 한살이 유형은 한해살이와 여러해살이로 구분하여 이해하도록 한다."}],"goryeo":["초등학교 3∼4학년군 ‘동물의 생활’, ‘식물의 생활’, ‘생물과 환경’, 5∼6학년군 ‘식물의 구조와 기능’, ‘우리 몸의 구조와 기능’, 중학교 1∼3학년군 ‘식물과 에너지’, ‘동물과 에너지’와 연계된다.","동물의 한살이 관찰을 위해서는 주변에서 쉽게 구할 수 있으며, 한살이 기간이 짧은 동물(예: 배추흰나비)을 선택하는 것이 좋다.","동물의 한살이 관찰을 통하여 동물에 대한 관심과 호기심을 증대시키는 것도 중요한 목표이므로 동물을 직접 관찰하는 활동을 권장하며, 보조 학습 자료로 동영상이나 누리망을 활용할 수 있다. 다양한 도구를 활용하여 글과 그림으로 한살이를 표현해 보도록 지도할 수 있다.","동물의 한살이 관찰에는 시간이 많이 소요되므로 학습이 시작되기 전에 관찰 대상을 미리 준비해야 하며, 교수⋅학습 전개 시 수업 차시에 따라 연속하여 진행하기에는 무리가 있으므로 동물의 한살이 정도에 맞추어 융통성 있게 수업 시간을 재구성하는 것이 좋다."],"area":"life","electives":[],"prev":[],"next":["e56-04","e56-11","m13-12","m13-13","m13-21"],"related":["e34-02","e34-03","e34-14"]},{"id":"e34-05","grade":"e34","num":5,"title":"물체와 물질","standards":[{"code":"4과05-01","text":"물체를 이루는 여러 가지 물질의 성질을 비교하고, 물질의 종류에 따라 물체를 분류할 수 있다."},{"code":"4과05-02","text":"물질의 세 가지 상태인 고체, 액체, 기체의 성질을 관찰하여 비교할 수 있다."},{"code":"4과05-03","text":"다양한 물질의 성질을 이용하여 쓰임새 있는 물체를 설계할 수 있다."}],"tamgu":["용기에 따른 고체와 액체의 모양과 부피 변화 관찰하기","기체가 공간을 차지하고 있음을 알아보는 실험하기"],"haeseol":[{"code":"4과05-01","text":"나무, 철, 유리, 플라스틱 등 학생들이 일상생활에서 쉽게 접할 수 있는 물질의 다양한 성질을 관찰하고 비교하는 활동에 중점을 두고, 이를 바탕으로 여러 가지 물체를 물질의 종류에 따라 분류하도록 한다."},{"code":"4과05-02","text":"물질의 세 가지 상태인 고체, 액체, 기체의 성질을 관찰하고 비교하는 활동에 중점을 두고, 한 가지 물질이 여러 가지 상태로 존재한다는 것은 다루지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘물의 상태 변화 ’, ‘ 여러 가지 기체 ’, 5∼6학년군 ‘혼합물의 분리’, 중학교 1∼3학년군 ‘물질의 특성’과 연계된다.","일상생활에서 사용할 수 있는 물체를 기초적인 아이디어 수준에서 설계하며, 물체의 쓰임새에 적합한 성질을 지닌 물질을 이용하는 데 중점을 두고 지도한다."],"area":"matter","electives":[],"prev":[],"next":["e56-05","e56-09","e56-14","m13-08","m13-16"],"related":["e34-10","e34-15"]},{"id":"e34-06","grade":"e34","num":6,"title":"지구와 바다","standards":[{"code":"4과06-01","text":"지구가 대기로 둘러싸여 있음을 알고, 지구 표면을 구성하는 육지와 바다의 특징을 비교할 수 있다."},{"code":"4과06-02","text":"바닷물의 특징을 육지의 물과 비교하고, 바닷가에서 볼 수 있는 다양한 지형을 조사할 수 있다."},{"code":"4과06-03","text":"밀물과 썰물의 차이를 알고, 갯벌의 가치와 보전의 필요성을 설득⋅홍보할 수 있다."}],"tamgu":["지구의 육지와 바다 면적 비교하기","육지의 물과 바닷물을 가열하여 남는 물질 탐구하기"],"haeseol":[{"code":"4과06-02","text":"바닷물의 침식, 운반, 퇴적 작용에 대해서는 다루지 않는다."},{"code":"4과06-03","text":"밀물과 썰물은 바닷물의 높이 변화를 다루는 수준이며, 조석 용어와 원인에 대해서는 다루지 않는다."}],"goryeo":["초등학교 5∼6학년군 ‘날씨와 우리 생활’, 중학교 1∼3학년군 ‘날씨와 기후변화’, ‘수권과 해수의 순환’과 연계된다.","여행에서 촬영한 사진 자료나 스마트 기기를 활용하여 육지와 바다의 다양한 모습과 지형을 탐색하여 수업에 활용할 수 있다.","지구의 물은 바닷물과 육지의 물로 구분하며, 지구 표면에서 바다가 차지하는 비율은 정성적으로 다룬다. 지구의 육지와 바다 면적을 시각적으로 비교할 수 있는 자료를 활용할 수 있다.","육지의 물과 바닷물을 가열할 때는 끓임쪽을 넣고 가열하는 등 안전에 유의한다.","우리나라의 대표적인 갯벌의 위치, 갯벌에 사는 생물의 다양성, 갯벌 보전의 필요성을 알아보는 활동을 통해 환경과 생명의 가치를 알고 생태감수성을 기르도록 한다."],"area":"earth","electives":[],"prev":[],"next":["e56-06","m13-17","m13-18"],"related":[]},{"id":"e34-07","grade":"e34","num":7,"title":"소리의 성질","standards":[{"code":"4과07-01","text":"여러 가지 물체를 이용하여 소리를 내보고, 소리가 나는 물체는 떨림이 있음을 설명할 수 있다."},{"code":"4과07-02","text":"큰 소리와 작은 소리, 높은 소리와 낮은 소리를 구분하고, 세기와 높낮이가 다른 소리를 낼 수 있다."},{"code":"4과07-03","text":"여러 가지 물질을 통하여 소리가 전달되는 것을 관찰하고, 소음을 줄이는 방법을 찾아 일상생활에서 실천할 수 있다."}],"tamgu":["소리가 나는 소리굽쇠의 떨림 관찰하기","물체의 길이에 따른 소리의 높낮이 비교하기"],"haeseol":[{"code":"4과07-03","text":"소리가 여러 가지 물질을 통해 전달되는 현상을 관찰하는 데 중점을 두며, 소리 전달의 과학적 원리는 다루지 않도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘빛과 파동’과 연계된다.","소리를 관찰하기 위해 청각뿐만 아니라 시각, 촉각 등의 다양한 감각을 활용할 수 있도록 한다.","큰 소리로 인해 청각이 손상될 수 있으므로 안전에 유의한다.","소리의 세기와 높낮이를 탐구할 때 디지털 탐구 도구를 활용할 수 있다.","소음을 줄이는 방법을 찾아 실천해 봄으로써 공동체의 문제 해결에 참여하는 민주 시민으로서의 소양을 기르되, 소리 자체에 대한 부정적 인식이 형성되지 않도록 유의한다."],"area":"energy","electives":[],"prev":[],"next":["m13-10"],"related":[]},{"id":"e34-08","grade":"e34","num":8,"title":"감염병과 건강한 생활","standards":[{"code":"4과08-01","text":"생활 속 감염병의 사례를 알고, 다양한 질병과 그 위험성에 대해 토의할 수 있다."},{"code":"4과08-02","text":"감염병으로부터 안전한 사회에 관심을 가지고, 여러 감염 과정을 통해 생활 습관과 감염병 유행과의 연관성을 설명할 수 있다."},{"code":"4과08-03","text":"건강한 생활을 위해 필요한 감염병 예방 수칙을 공유하고, 생활 속에서 실천할 수 있다."}],"tamgu":["감염 과정과 감염병 예방 방법 탐구하기"],"haeseol":[{"code":"4과08-01","text":"질병은 예방접종이나 범유행 상황 등 학생이 경험하거나 인지할 수 있는 생활 속 질병을 다룬다."},{"code":"4과08-02","text":"감염 과정은 생활 습관과 관련지을 수 있는 접촉 감염, 비말 감염, 공기 감염, 수인 감염, 타액 감염 등의 사례로 한정하여 다루며, 감염병의 특성과 면역 반응을 구체적으로 다루지 않는다."}],"goryeo":["중학교 1∼3학년군 ‘재해⋅재난과 안전’과 연계된다.","예방접종의 경험이나 범유행 상황 등을 통해 생활 속에서 다양한 감염 사례가 있음을 인식할 수 있도록 한다.","다양한 감염 과정을 놀이, 역할극, 그림, 표, 책 만들기 공예 등 다양한 시각화 방법을 통해 표현할 수 있다. 단, 단순한 표현 활동보다는 생활 속 습관과 감염병 유행과의 연관성을 탐구하도록 지도한다.","건강한 생활을 위해 지켜야 하는 수칙은 감염 과정과 생활 습관을 관련지어 학생들이 실천 가능한 수준으로 제시하도록 한다."],"area":"society","electives":[],"prev":[],"next":["m13-22"],"related":[]},{"id":"e34-09","grade":"e34","num":9,"title":"자석의 이용","standards":[{"code":"4과09-01","text":"자석과 여러 가지 물체를 가까이했을 때 나타나는 현상을 관찰하고, 자석과 자석에 붙는 물체 사이에 작용하는 힘의 특징을 말할 수 있다."},{"code":"4과09-02","text":"자석과 자석을 가까이했을 때 나타나는 현상을 관찰하여 그 특징을 자석의 극과 관련지어 설 명 할 수 있다."},{"code":"4과09-03","text":"자석을 이용하여 일상생활을 편리하게 하는 장치를 설계할 수 있다."}],"tamgu":["자석의 극을 찾고 서로 같은 극과 다른 극을 가까이했을 때의 특징 비교하기","나침반과 자석을 가까이했을 때 나타나는 현상 관찰하기"],"haeseol":[{"code":null,"text":"[4과09-01∼02] 자석과 물체, 자석과 자석 사이의 상호작용을 다루되, 자기장의 개념은 도입하지 않는다."}],"goryeo":["초등학교 5∼6학년군 ‘전기의 이용’, 중학교 1∼3학년군 ‘전기와 자기’와 연계된다.","자석을 이용한 장치 설계하기 활동은 학습한 자석의 성질을 이용하여 생활을 편리하게 만드는 장치를 구상해볼 수 있도록 하기 위한 것으로, 설계한 것이 반드시 만들기로 이어져야 함을 의미하는 것은 아니다."],"area":"energy","electives":[],"prev":[],"next":["e56-15","m13-14"],"related":[]},{"id":"e34-10","grade":"e34","num":10,"title":"물의 상태 변화","standards":[{"code":"4과10-01","text":"물이 세 가지 상태로 변할 수 있음을 알고, 우리 주변에서 예를 찾을 수 있다."},{"code":"4과10-02","text":"물이 얼 때, 얼음이 녹을 때, 물이 증발할 때와 끓을 때, 수증기가 응결할 때의 변화를 관 찰 할 수 있다."},{"code":"4과10-03","text":"물의 상태 변화를 이용하여 물을 얻을 수 있는 장치를 설계하고 만들 수 있다."}],"tamgu":["물이 얼 때와 얼음이 녹을 때의 무게와 부피 변화 관찰하기","물이 증발할 때와 끓을 때의 특징 관찰하기","얼음이 든 비커의 바깥 면 관찰하기"],"haeseol":[{"code":"4과10-01","text":"물의 상태 변화는 관찰 가능한 현상 수준에서만 다루고, 물의 상태가 변하는 까닭은 다루지 않는다."},{"code":"4과10-02","text":"물이 얼 때와 얼음이 녹을 때의 부피 변화는 물기둥의 높이 변화로 관찰하도록 한다. 물의 증발과 끓음을 비교할 때는 물이 수증기로 상태가 변하는 현상이라는 공통점에 중점을 둔다."}],"goryeo":["초등학교 3∼4학년군 ‘물체와 물질’, 중학교 1∼3학년군 ‘물질의 상태 변화’와 연계된다.","실험 전에 학생들에게 물을 가열하거나 얼음을 다룰 때 주의할 점과 안전사고 대처 방법을 지도한다.","생태전환교육과 연계하여 물의 중요성과 물 부족 현상을 다룬다. 물을 얻는 여러 가지 사례나 장치를 조사하고, 이를 바탕으로 물을 얻을 수 있는 장치를 창의적으로 고안하도록 한다.","물을 얻을 수 있는 장치를 설계할 때는 물의 상태 변화를 이용하는 데 중점을 두고, 우리 주변에서 쉽게 구할 수 있는 재료를 이용하여 간단한 장치를 만드는 수준에서 지도한다."],"area":"matter","electives":[],"prev":[],"next":["e56-07","m13-04"],"related":["e34-05"]},{"id":"e34-11","grade":"e34","num":11,"title":"땅의 변화","standards":[{"code":"4과11-01","text":"흐르는 물의 작용과 강 주변 지형의 특징을 관련지을 수 있다."},{"code":"4과11-02","text":"화산의 의미와 화산 활동으로 나오는 물질을 알고, 화산 활동을 모형으로 표현할 수 있다."},{"code":"4과11-03","text":"화성암을 관찰하고 분류할 수 있다."},{"code":"4과11-04","text":"화산 활동과 지진이 우리 생활에 미치는 영향을 조사하여, 대 처 방법을 실천할 수 있다."}],"tamgu":["흙 언덕을 만들고 물을 흘려보낸 후, 깎이는 곳과 쌓이는 곳 관찰하기","지진의 피해 사례를 조사하고 대처 방법 탐구하기"],"haeseol":[{"code":"4과11-01","text":"강 주변 지형은 흐르는 물에 의한 침식, 운반, 퇴적 작용을 중심으로 다룬다."},{"code":"4과11-02","text":"화산 활동과 화산 분출물을 중심으로 학습한다."},{"code":"4과11-03","text":"화성암은 현무암과 화강암만 다룬다."},{"code":"4과11-04","text":"화산 활동의 피해와 이로운 점을 함께 다루며, 지진 발생 원인은 다루지 않는다."}],"goryeo":["초등학교 5∼6학년군 ‘지층과 화석’, 중학교 1∼3학년군 ‘지권의 변화’와 연계된다.","휴화산이나 활화산과 같은 화산의 상태에 대해서는 다루지 않으며, 화산과 화산이 아닌 산을 비교하여 화산의 의미를 살펴볼 수 있다.","학생들이 화산 활동과 지진을 직접 관찰하기 어려우므로, 화산 활동이나 지진과 관련된 영상을 스마트 기기로 조사하는 활동이 필요하다.","화산 활동을 모형실험으로 지도하는 경우 안전사고가 발생하지 않도록 유의하며, 실제 화산 활동과 모형실험의 공통점과 차이점을 비교할 수 있다."],"area":"earth","electives":[],"prev":[],"next":["e56-01","m13-09"],"related":[]},{"id":"e34-12","grade":"e34","num":12,"title":"다양한 생물과 우리 생활","standards":[{"code":"4과12-01","text":"균류⋅원생생물⋅세균을 관찰하여 특징과 사는 곳을 설명할 수 있다."},{"code":"4과12-02","text":"균류⋅원생생물⋅세균이 우리 생활에 미치는 영향을 조사하여 발표할 수 있다."},{"code":"4과12-03","text":"우리 생활에 생명과학이 이용되는 사례를 소개하는 자료를 만들어 공유할 수 있다."}],"tamgu":["버섯과 곰팡이 관찰하기"],"haeseol":[{"code":"4과12-03","text":"우리 생활에 생명과학이 이용되는 사례는 균류, 원생생물, 세균을 중심으로 학생들이 생활 속에서 경험하고 인지할 수 있는 수준으로 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘동물의 생활’, ‘식물의 생활’, ‘생물과 환경’과 중학교 1∼3학년군 ‘생물의 구성과 다양성’과 연계된다.","주변에서 쉽게 구할 수 있는 버섯, 곰팡이, 해캄, 짚신벌레를 디지털현미경이나 실체현미경 등 학생들이 다룰 수 있는 다양한 도구를 사용하여 직접 관찰하도록 하고, 지역의 특성에 따라 관찰 가능한 소재로 변경하여 다룰 수 있다.","세균은 사진 자료나 동영상 자료 등을 활용하여 관찰할 수 있게 한다.","세균이나 곰팡이 등이 우리 생활에 미치는 영향이나 생명과학의 이용 사례는 실생활에 많이 반영된 자료들을 중심으로 한다.","우리 생활에 생명과학이 이용되는 사례는 관련 도서와 누리망 자료를 활용하고, 발표 자료를 만들고 공유하는 활동은 디지털 소양 교육과 연계하여 지도할 수 있다."],"area":"life","electives":[],"prev":[],"next":["m13-02"],"related":["e34-02","e34-03","e34-14"]},{"id":"e34-13","grade":"e34","num":13,"title":"밤하늘 관찰","standards":[{"code":"4과13-01","text":"달의 모양과 표면, 달의 위상변화를 관찰하여 밤하늘 관찰에 흥미를 가질 수 있다."},{"code":"4과13-02","text":"태양계 구성원을 알고, 태양과 행성을 조사할 수 있다."},{"code":"4과13-03","text":"별의 정의를 알고, 북극성 주변의 별자리를 관찰할 수 있다."}],"tamgu":["여러 날 동안 보이는 달의 모양 관찰하기","태양계 행성 모형 만들기"],"haeseol":[{"code":"4과13-01","text":"달의 위상변화 원인을 다루지 않고, 달의 모양이 주기적으로 바뀌는 현상을 관찰하여 확인하는 데 초점을 둔다."},{"code":"4과13-02","text":"태양계를 구성하는 행성들의 표면적인 특징 위주로 조사하고, 태양과 행성의 실제 크기나 태양에서 행성까지의 실제 거리, 행성의 질량, 자전 속도, 대기 성분 등과"},{"code":null,"text":"해캄과 짚신벌레 관찰하기같은 구체적인 물리량은 다루지 않는다."},{"code":"4과13-03","text":"별의 정의는 행성과 비교하여 스스로 빛을 내는 천체라는 수준에서만 다룬다. 별자리는 학생들이 쉽게 관찰할 수 있는 북극성 주변의 별자리를 다루며, 계절별 별자리와 관련짓지 않는다."}],"goryeo":["초등학교 5∼6학년군 ‘지구의 운동’, ‘계절의 변화’, 중학교 1∼3학년군 ‘태양계’, ‘별과 우주’와 연계된다.","여러 날 동안 달의 모양 변화 등은 관찰 시기와 방법을 안내한 후 관찰하도록 한다.","모형이나 시청각 자료, 천체 관측 프로그램 등을 이용하여 천체에 대한 호기심을 유도하고 공간적 이해를 도울 수 있다.","야간에 달, 행성, 별 등을 관찰할 경우 안전 사항을 준수하도록 한다."],"area":"earth","electives":[],"prev":[],"next":["e56-12","e56-13","m13-07","m13-15"],"related":[]},{"id":"e34-14","grade":"e34","num":14,"title":"생물과 환경","standards":[{"code":"4과14-01","text":"생태계의 구성 요소를 조사하여 생물 요소와 비생물 요소로 분류할 수 있다."},{"code":"4과14-02","text":"생물 요소들의 먹고 먹히는 관계를 조사하여 먹이그물로 표현할 수 있다."},{"code":"4과14-03","text":"인간 활동이 생태계에 미치는 영향을 조사하고, 생태계 보전을 위해 우리가 할 수 있는 일을 토의하여 실천할 수 있다."}],"tamgu":["양분을 얻는 방법에 따라 생물 요소 분류하기","먹이 관계 모형 만들기"],"haeseol":[{"code":"4과14-01","text":"숲, 바다, 강 등 다양한 생태계를 다루고, 각 생태계에서 생물 요소와 비생물 요소를 분류할 수 있게 한다."},{"code":"4과14-02","text":"생태계에서 다양한 먹이 관계를 알아보고 먹이 관계가 복잡할수록 생물이 생존하는 데 유리함을 이해하게 한다."},{"code":"4과14-03","text":"대기오염, 수질오염, 토양오염 등의 환경오염에 관한 사례를 중심으로 다루고, 생태계 보전을 위해 우리가 해야 할 일을 조사하여 실천함으로써 생태계 보전에 대한 의식을 가지게 한다."}],"goryeo":["초등학교 3∼4학년군 ‘동물의 생활’, ‘식물의 생활’, ‘생물의 한살이’, ‘다양한 생물과 우리 생활’과 중학교 1∼3학년군 ‘생물의 구성과 다양성’과 연계된다.","먹이사슬 놀이, 먹이그물 모형 만들기 등과 같은 모의 활동을 통하여 생태계의 구성 요소들이 상호 관련되어 있음을 인식하게 한다.","생태전환교육과 연계하여 생태계 보전 또는 복원을 위한 활동을 학생 스스로 계획하고 실천함으로써 생태계 보전과 관련한 문제해결력을 기르도록 지도할 수 있다."],"area":"life","electives":[],"prev":[],"next":["m13-02"],"related":["e34-02","e34-03","e34-04","e34-12"]},{"id":"e34-15","grade":"e34","num":15,"title":"여러 가지 기체","standards":[{"code":"4과15-01","text":"실험을 통해 기체가 무게가 있음을 설명할 수 있다."},{"code":"4과15-02","text":"온도나 압력에 따라 기체의 부피가 달라지는 현상을 관찰하고, 우리 주변에서 예를 찾을 수 있다."},{"code":"4과15-03","text":"일상생활에서 이용되는 기체의 종류와 성질을 조사하고, 여러 가지 기체에 대해 흥미를 느 낄 수 있다."},{"code":"4과15-04","text":"기체의 성질을 이용하여 작동시킬 수 있는 장치를 설계하고 만들 수 있다."}],"tamgu":["공기를 넣거나 뺄 때의 무게 변화 관찰하기","온도나 압력에 따른 기체의 부피 변화 관찰하기"],"haeseol":[{"code":"4과15-01","text":"부피가 같은 용기에 공기를 1기압으로 담은 상태와 이 상태에서 공기를 넣거나 뺀 상태의 무게를 비교하는 실험을 바탕으로 기체가 무게가 있음을 설명한다."},{"code":"4과15-02","text":"온도를 높일 때와 낮출 때 공기의 부피 변화, 압력을 높일 때와 낮출 때 공기의 부피 변화를 관찰하도록 한다. 온도나 압력에 따라 기체의 부피가 어떻게 변하는지를 정성적으로 이해하도록 하고, 입자 모형으로 기체의 부피가 변하는 까닭은 설명하지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘물체와 물질’, 중학교 1∼3학년군 ‘기체의 성질’과 연계된다.","질소, 산소, 이산화 탄소 등 여러 가지 기체의 성질과 일상생활 속 이용 사례를 조사하여 발표하도록 지도한다.","장치를 작동시키는 기체로는 공기를 사용하고, 장치를 평가할 때는 기체의 어떤 성질을 이용했는지에 중점을 둔다."],"area":"matter","electives":[],"prev":[],"next":["e56-14","m13-06"],"related":["e34-05"]},{"id":"e34-16","grade":"e34","num":16,"title":"기후변화와 우리 생활","standards":[{"code":"4과16-01","text":"기후변화 현상의 예를 알고, 기후변화가 인간의 활동과 관련되어 있음을 토의할 수 있다."},{"code":"4과16-02","text":"기후변화의 심각성에 관심을 가지고, 기후변화가 우리 생활과 환경에 미치는 영향을 설명 할 수 있다."},{"code":"4과16-03","text":"기후변화 대응 방법을 조사하고, 생활 속에서 기후변화 대응 방법을 실천할 수 있다."}],"tamgu":["해수면 상승으로 인한 피해 모형실험하기"],"haeseol":[{"code":"4과16-01","text":"기후변화의 과학적 원인은 다루지 않으며 기온, 강수량 등 기후요소가 평년값에 비해 현저히 높거나 낮은 사례(가뭄, 폭설, 폭염, 한파, 홍수 등)를 탐구하도록 한다."},{"code":"4과16-02","text":"인간의 삶에 부정적인 영향을 미치는 기후변화 현상의 사례를 모형이나 실험 활동을 통해 알아보고, 이에 기반하여 기후변화로 인한 인간의 피해를 예측하고 설명할 수 있도록 한다."}],"goryeo":["초등학교 5∼6학년군 ‘날씨와 우리 생활’, 중학교 1∼3학년군 ‘날씨와 기후변화’, ‘재해⋅재난과 안전’과 연계된다.","기후라는 용어를 설명하는 데 중점을 두기보다는 기후변화의 사례를 주로 다룬다.","기후변화에 대응하는 방법은 기후변화로 인한 자연환경의 변화를 인간이 완화하는 방안, 혹은 변화에 적응하는 방안으로 생각해볼 수 있으나, 이를 구분하여 지도하지 않도록 한다.","기후변화가 우리 생활과 환경에 끼치는 영향을 학습하면서 지나친 불안감이나 무기력함을 느끼기보다는 기후위기를 해결하기 위한 진취적인 실천 의지를 다지도록 한다."],"area":"society","electives":[],"prev":[],"next":["e56-06","m13-01","m13-17","m13-22"],"related":[]},{"id":"e56-01","grade":"e56","num":1,"title":"지층과 화석","standards":[{"code":"6과01-01","text":"지층의 특징을 알고, 지층의 형성 과정을 모형으로 표현할 수 있다."},{"code":"6과01-02","text":"지층이 퇴적암으로 이루어짐을 알고, 퇴적암을 알갱이의 크기에 따라 분류할 수 있다."},{"code":"6과01-03","text":"화석의 생성 과정을 모형으로 설명하고, 지구의 과거 생물과 환경을 추리하는 활동을 통해 화석의 가치를 인식할 수 있다."}],"tamgu":["이암, 사암, 역암 관찰하기","화석을 관찰하고 화석 모형 만들기"],"haeseol":[{"code":"6과01-01","text":"지층의 두께나 색 등을 다루고, 지층이 휘어지거나 끊어진 모습을 소개하되 생성 원리는 다루지 않는다."},{"code":"6과01-02","text":"퇴적암은 이암, 사암, 역암만 다룬다."},{"code":"6과01-03","text":"화석 표본은 동물과 식물의 특징이 분명하게 드러나는 것을 사용한다."}],"goryeo":["초등학교 3∼4학년군 ‘땅의 변화’, 중학교 1∼3학년군 ‘지권의 변화’와 연계된다.","여러 가지 지층, 퇴적암, 화석 등을 관찰하여 그 특징을 찾아 생성 과정을 추리하는 활동이 필요하다. 이때, 학생들이 직접 조사한 자료를 활용할 수 있다. 학생들이 박물관에서 찍은 사진이나 여행지에서 찍은 사진을 이용하여 관련 특징을 설명하면 학습 효과를 높일 수 있을 것이다.","디지털 소양 교육과 관련하여 실감형 자료를 활용한 화석 관찰도 가능하다."],"area":"earth","electives":[],"prev":["e34-11"],"next":["m13-09"],"related":[]},{"id":"e56-02","grade":"e56","num":2,"title":"빛의 성질","standards":[{"code":"6과02-01","text":"물체를 보기 위해서 빛이 있어야 함을 알고, 빛의 성질에 대해 흥미를 느낄 수 있다."},{"code":"6과02-02","text":"빛이 나아가는 현상을 관찰하여 빛이 직진, 반사, 굴절하는 성질이 있음을 말할 수 있다."},{"code":"6과02-03","text":"거울과 렌즈의 쓰임새를 조사하고 거울이나 렌즈를 이용한 장치를 창의적으로 만들 수 있다."}],"tamgu":["어둠상자 속의 물체 관찰하기","평면거울에서 빛의 반사 실험하기"],"haeseol":[{"code":"6과02-02","text":"빛이 직진, 반사, 굴절하는 성질은 햇빛이나 레이저 광선의 진행으로 나타나는 현상을 관찰하여 알 수 있도록 하되, 반사와 굴절의 법칙은 다루지 않는다. 또, 볼록렌즈와 물체 사이의 거리, 볼록렌즈와 눈 사이의 거리에 따른 물체의 모습 차이는 다루지 않는다."}],"goryeo":["중학교 1∼3학년군 ‘빛과 파동’과 연계된다.","물체를 보기 위해서는 빛이 필요하며 빛이 없을 때 불편한 점을 과학 글쓰기, 그림 그리기, 역할 놀이 등의 다양한 활동으로 융합하여 전개할 수 있다.","빛의 직진, 반사, 굴절 현상을 관찰할 때 컴퓨터 시뮬레이션, 가상 현실, 증강 현실 등을 이용하여 관찰을 보조할 수 있다."],"area":"energy","electives":[],"prev":[],"next":["m13-10"],"related":[]},{"id":"e56-03","grade":"e56","num":3,"title":"용해와 용액","standards":[{"code":"6과03-01","text":"용해 현상의 의미를 알고, 용질의 종류와 물의 온도에 따라 물에 녹는 용질의 양이 달라짐 을 비교할 수 있다."},{"code":"6과03-02","text":"용질이나 용매의 양에 따라 용액의 진하기가 달라짐을 관찰하고, 용액의 상대적인 진하기 를 비교할 수 있다."},{"code":"6과03-03","text":"일상생활에서 용액이 쓰이는 사례를 조사하여 용액의 필요성을 알리는 자료를 만들고 공유 할 수 있다."}],"tamgu":["용해 전과 후의 무게 측정하기","물에 녹는 용질의 양에 영향을 미치는 요인 탐구하기","진하기가 다른 용액에서 물체의 뜨는 정도 비교하기"],"haeseol":[{"code":"6과03-01","text":"용질, 용매, 용액, 용해의 개념을 다루되, 입자 모형으로 용해 현상을 설명하거나 용해 현상이 일어나는 과학적 이유나 원리를 설명하지 않는다. 용해 전과 후의 무게를 비교하여 용해 과정에서 물질이 사라지지 않음을 이해하도록 한다."},{"code":null,"text":"렌즈를 이용하여 빛의 굴절 실험하기"},{"code":"6과03-02","text":"진하기가 다른 두 용액에서 같은 물체의 뜨는 정도가 다름을 이용하여 용액의 상대적인 진하기를 비교하도록 한다."}],"goryeo":["초등학교 5∼6학년군의 ‘혼합물의 분리’, ‘산과 염기’, 중학교 1∼3학년군의 ‘물질의 특성’과 연계된다.","일상생활에서 용액의 사용 사례를 조사하여 우리 주변에서 용액의 중요성과 필요성을 이해할 수 있도록 한다. 디지털 소양 교육과 연계하여 포스터, 동영상 등 다양한 형태로 디지털 자료를 제작하여 누리망이나 사회 관계망 서비스 등에서 공유하도록 한다."],"area":"matter","electives":[],"prev":[],"next":["m13-08","m13-11"],"related":["e56-05","e56-09"]},{"id":"e56-04","grade":"e56","num":4,"title":"우리 몸의 구조와 기능","standards":[{"code":"6과04-01","text":"뼈와 근육의 생김새를 관찰하고 모형을 만들어 몸이 움직이는 원리를 설명할 수 있다."},{"code":"6과04-02","text":"소화, 순환, 호흡, 배설 기관의 구조와 기능을 알아보고, 우리 몸의 여러 기관이 서로 관련되어 있음을 설명할 수 있다."},{"code":"6과04-03","text":"우리 몸의 여러 기관과 관련된 질병을 조사하고, 건강을 유지하기 위한 생활 방식을 실천 할 수 있다."}],"tamgu":["운동할 때 몸에서 일어나는 변화 관찰하기"],"haeseol":[{"code":"6과04-01","text":"중학교와 고등학교 과정에서는 뼈와 근육에 대해서 학습하지 않으므로, 뼈와 근육의 구조와 기능을 기초적으로 이해하는 데 중점을 둔다."},{"code":"6과04-02","text":"우리 몸의 각 기관은 종류, 위치, 생김새, 기능을 중심으로 탐구한다."},{"code":"6과04-03","text":"질병은 소화, 순환, 호흡, 배설 기관과 관련된 것으로 조사하고 건강을 유지하기 위한 생활 방식은 각 질병의 예방법을 중심으로 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘동물의 생활’, ‘생물의 한살이’와 중학교 1∼3학년군 ‘동물과 에너지’와 연계된다.","우리 몸의 각 기관의 위치와 생김새는 그림과 모형 등을 통해 관찰하게 하고, 각 기관의 기능은 기관계의 역할을 위주로 이해하게 한다.","일상생활에서 우리 몸의 각 기관에 발생하는 질병과 예방법을 책이나 발표 자료 등의 다양한 형태로 만들어 공유함으로써 학생들의 건강을 유지하기 위한 실천 의지를 다진다. 또한, 발표 자료를 만들거나 공유하는 활동은 디지털 소양 교육과 연계하여 지도할 수 있다."],"area":"life","electives":[],"prev":["e34-02","e34-04"],"next":["m13-13","m13-20"],"related":[]},{"id":"e56-05","grade":"e56","num":5,"title":"혼합물의 분리","standards":[{"code":"6과05-01","text":"알갱이의 크기가 다른 고체 혼합물과 골고루 섞이지 않는 액체 혼합물을 분리할 수 있다."},{"code":"6과05-02","text":"물에 용해되는 성질을 이용하여 고체 혼합물을 분리하고, 물을 증발시켜 물에 용해된 고체 물질을 분리할 수 있다."},{"code":"6과05-03","text":"지속가능한 삶을 위한 과학기술 사례 중 혼합물의 분리를 이용한 장치를 조사하여 공유할 수 있다."}],"tamgu":["모래와 자갈의 혼합물 분리하기","물과 기름의 혼합물 분리하기","소금과 모래의 혼합물 분리하기"],"haeseol":[{"code":"6과05-01","text":"혼합물의 의미를 학습한 뒤 혼합물의 분리 실험을 진행하도록 한다. 혼합물은 두 가지 이상의 물질이 성질이 변하지 않고 섞여 있는 상태라는 수준에서 다룬다. 골고루 섞이지 않는 액체 혼합물 분리에서 액체가 골고루 섞이지 않는 까닭은 다루지 않는다."}],"goryeo":["초등학교 3∼4학년군의 ‘물체와 물질’, 5∼6학년군의 ‘용해와 용액’, 중학교 1∼3학년군의 ‘물질의 특성’과 연계된다.","대부분 물질은 혼합물 상태이기 때문에 필요한 물질을 얻기 위해서는 혼합물을 분리할 필요가 있음을 이해하도록 지도한다.","혼합물의 분리 실험을 할 때는 우리 주변에서 쉽게 구할 수 있는 물질을 사용하고, 실험이 끝난 뒤 남은 물질은 과학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다.","유리 기구를 사용하거나 거름 장치와 증발 장치로 실험할 때는 실험 전에 학생들에게 주의할 점과 안전사고 대처 방법을 지도한다.","생태전환교육과 연계하여 오염된 물을 정화할 수 있는 장치 등과 같이 경제적, 사회적, 지역적 상황을 고려하여 개발된 과학기술 사례를 중심으로 조사하도록 한다. 디지털 소양 교육과 연계하여 조사 결과를 누리망이나 사회 관계망 서비스 등에서 공유하도록 한다."],"area":"matter","electives":[],"prev":["e34-05"],"next":["m13-08"],"related":["e56-03"]},{"id":"e56-06","grade":"e56","num":6,"title":"날씨와 우리 생활","standards":[{"code":"6과06-01","text":"기상 요소를 조사하고, 날씨가 우리 생활에 주는 영향을 인식할 수 있다."},{"code":"6과06-02","text":"이슬, 안개, 구름을 관찰하고, 공통점과 차이점을 찾을 수 있다."},{"code":"6과06-03","text":"고기압과 저기압의 분포에 따른 날씨의 특징을 기상 요소로 표현할 수 있다."}],"tamgu":["이슬, 안개 발생 실험하기","바람 발생에 대한 모형실험하기"],"haeseol":[{"code":"6과06-01","text":"기상 요소는 기온, 바람, 습도, 구름의 양, 강수량을 중심으로 다루고, 기상 자료에서 규칙성을 파악하도록 한다."},{"code":"6과06-02","text":"구름에서 비와 눈이 내리는 과정을 다루지 않고 현상을 중심으로 다루며, 단열 팽창과 관련된 구름의 생성 과정은 다루지 않는다."},{"code":"6과06-03","text":"고기압과 저기압의 날씨와 고기압에서 저기압으로 부는 바람의 방향을 이해하는 수준에서 현상 중심으로 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘지구와 바다’, 중학교 1∼3학년군 ‘날씨와 기후변화’, ‘수권과 해수의 순환’과 연계된다.","날씨는 학생들이 매일 접하는 자연 현상으로, 관찰과 실험을 중심으로 한 탐구 활동의 좋은 소재가 된다. 따라서 관찰과 실험을 중심으로 여러 가지 기상 요소의 특징을 이해하고, 우리 생활과 관련짓도록 한다.","이슬, 안개 발생 실험 과정에서 응결 현상을 중심으로 설명하고, 단열 팽창 실험 기구를 활용하지 않는다.","바람 발생에 대한 모형실험은 해륙풍 모형으로 제시하며, 가열에 따른 육지와 바다의 온도 차이에 의해 고기압에서 저기압으로 바람이 부는 것으로 설명한다."],"area":"earth","electives":[],"prev":["e34-06","e34-16"],"next":["m13-17","m13-18"],"related":["e56-07"]},{"id":"e56-07","grade":"e56","num":7,"title":"열과 우리 생활","standards":[{"code":"6과07-01","text":"물체의 따뜻하고 차가운 정도를 온도로 표현함을 알고, 온도계를 이용하여 온도를 측정할 수 있다."},{"code":"6과07-02","text":"온도가 다른 두 물체가 접촉했을 때 두 물체의 온도 변화를 관찰하고 그 원인을 추리할 수 있다."},{"code":"6과07-03","text":"주위에서 열의 이동으로 나타나는 현상을 관찰하여 열의 이동 방식이 다양함을 설명할 수 있다."},{"code":"6과07-04","text":"일상생활에서 단열을 이용하는 사례를 조사하고, 온도를 오랫동안 일정하게 유지할 수 있는 장치를 창의적으로 만들 수 있다."}],"tamgu":["온도가 다른 두 물체가 접촉할 때 두 물체의 온도 변화 측정하기","열이 이동하는 여러 방식의 특징 비교하기"],"haeseol":[{"code":"6과07-02","text":"온도가 다른 두 물체를 접촉하는 탐구에서는 두 물체의 온도 변화를 측정하는 데 중점을 두고, 물체의 온도가 변하는 원인이 온도가 높은 물체에서 온도가 낮은 물체로 열이 이동하기 때문이라는 사실을 추리하도록 한다. 단, 열평형이라는 용어는 사용하지 않는다."},{"code":"6과07-03","text":"전도, 대류, 복사는 고체, 액체, 기체에서의 열의 이동과, 빛에 의한 열 이동 현상을 관찰하는 데 중점을 두고 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘물의 상태 변화’, 5∼6학년군 ‘날씨와 우리 생활’, 중학교 1∼3학년군 ‘열’과 연계된다.","일상생활의 열과 관련된 현상을 과학 글쓰기, 그림 그리기, 역할 놀이, 장치 만들기 등의 다양한 활동으로 융합하여 다룰 수 있다.","뜨거운 물질이나 물체 등을 다룰 때 화상, 화재 등의 안전사고에 유의한다."],"area":"energy","electives":[],"prev":["e34-10"],"next":["m13-03"],"related":["e56-06"]},{"id":"e56-08","grade":"e56","num":8,"title":"자원과 에너지","standards":[{"code":"6과08-01","text":"우리가 생활에서 이용하는 다양한 자원을 조사하고, 자원의 유한함을 설명할 수 있다."},{"code":"6과08-02","text":"재생에너지의 종류를 조사하고, 에너지를 지속가능하게 이용하는 방법에 관심을 갖는다."},{"code":"6과08-03","text":"자원과 에너지의 효율적인 이용 방법에 대해 탐색하고, 생활 속에서 실천할 수 있는 다양한 사례를 공유할 수 있다."}],"tamgu":["효율적으로 에너지를 이용하는 집 모형의 효과 탐구하기"],"haeseol":[{"code":"6과08-02","text":"재생에너지는 태양 에너지, 풍력, 수력, 해양 에너지, 지열 에너지, 바이오 에너지 등을 의미한다."},{"code":"6과08-03","text":"효율적인 자원의 이용 방법에서 물 자원과 산림 자원, 광물 자원을 종합적으로 다루며, 학생들이 배운 내용을 바탕으로 생활 속에서 자원의 소중함을 느끼고, 효율적인 이용 방법을 공유하고 실천할 수 있도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘식물과 에너지’, ‘동물과 에너지’, ‘전기와 자기’, ‘운동과 에너지’와 연계된다.","재활용된 자원이 순환 과정을 거치는 사례가 있으나, 이러한 사례로 인해 자원이 무한한 것이라는 인식을 갖지 않도록 유의한다.","일상생활에서 이용하는 에너지를 알아보고, 지속가능한 에너지 이용이 필요한 까닭을 알 수 있도록 한다."],"area":"society","electives":[],"prev":[],"next":["m13-01","m13-12","m13-13","m13-14","m13-19","m13-22"],"related":[]},{"id":"e56-09","grade":"e56","num":9,"title":"산과 염기","standards":[{"code":"6과09-01","text":"여러 가지 용액에 지시약을 넣었을 때의 변화를 관찰하여 용액을 산성 용액과 염기성 용액으로 분류할 수 있다."},{"code":"6과09-02","text":"산성 용액과 염기성 용액의 성질을 관찰하고, 산성 용액과 염기성 용액을 섞을 때 용액의 성질 변화를 실험을 통해 추론할 수 있다."},{"code":"6과09-03","text":"우리 주변에서 산성 용액과 염기성 용액을 이용하는 예를 찾아서 설명할 수 있다."},{"code":"6과09-04","text":"산성화로 인한 환경의 피해 사례를 소개하는 자료를 만들고 공유할 수 있다."}],"tamgu":["지시약을 이용하여 용액 분류하기","묽은 염산과 묽은 수산화 나트륨 용액을 섞을 때 용액의 색깔 변화 관찰하기"],"haeseol":[{"code":"6과09-01","text":"리트머스 시험지, 페놀프탈레인 용액, 붉은 양배추 용액 등과 같은 지시약의 색깔 변화를 이용하여 여러 가지 용액을 산성 용액과 염기성 용액으로 분류하도록 한다."},{"code":"6과09-02","text":"산성 용액은 탄산 칼슘과 반응하고 염기성 용액은 단백질과 반응하는 성질을 중심으로 다룬다. 산성 용액과 염기성 용액을 섞을 때 용액의 성질 변화에서 지시약이 들어 있는 용액의 색깔이 변하는 현상을 관찰하는 수준에서만 다루고 중성, pH, 중화 개념은 다루지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘물체와 물질’, 5∼6학년군 ‘물질의 연소’, 중학교 1∼3학년군 ‘화학 반응의 규칙성’과 연계된다.","겉보기 성질이 비슷한 여러 가지 용액의 분류 활동 결과를 바탕으로, 용액을 분류하는 새로운 기준이 필요함을 인식하도록 한다.","산성 용액이나 염기성 용액을 사용할 때는 실험실 안전 수칙에 따라 실험하고, 실험이 끝난 뒤 남은 물질은 과학 실험실 폐수 및 폐기물 처리 기준과 방법에 따라 처리할 수 있도록 한다.","생태전환교육과 연계하여 산성비, 해양 산성화, 토양 산성화 등 산성화로 인한 생태계의 피해 사례 및 관련 자료를 수집하여 분석하도록 한다. 디지털 소양 교육과 연계하여 환경 파괴의 원인, 현황, 전망, 대책 등을 포함한 조사 결과를 누리망이나 사회 관계망 서비스 등에서 공유하도록 한다."],"area":"matter","electives":[],"prev":["e34-05"],"next":["m13-16"],"related":["e56-03","e56-14"]},{"id":"e56-10","grade":"e56","num":10,"title":"물체의 운동","standards":[{"code":"6과10-01","text":"운동하는 물체는 시간에 따라 위치가 변화함을 알고 그 변화를 표현할 수 있다."},{"code":"6과10-02","text":"물체의 이동 거리와 걸린 시간을 측정하여 속력을 구하고 빠르기를 비교할 수 있다."},{"code":"6과10-03","text":"속력과 관련된 안전 수칙과 안전장치를 조사한 결과를 공유하고 일상생활에서 교통안전을 실천할 수 있다."}],"tamgu":["운동하는 물체의 공통된 특징 탐구하기"],"haeseol":[{"code":"6과10-01","text":"시간에 따라 위치가 변하는 다양한 운동을 다루면서 처음 위치와 나중 위치를 간단한 좌표 평면 위에 표현하되 두 위치 사이의 거리는 구하지 않는다."},{"code":"6과10-02","text":"물체의 속력을 구할 때 물체가 한 길을 따라 한 방향으로 운동하는 경우만 다루며, 속력의 단위 변환에 중점을 두지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘힘과 우리 생활’, 중학교 1∼3학년군 ‘운동과 에너지’와 연계된다.","속력의 산술적 계산 능력보다는 속력의 의미를 이해하고 물체의 빠르기를 정량적으로 표현하여 소통할 수 있는 과학적인 의사소통 능력 평가에 중점을 둔다.","물체의 속력을 측정하고 계산할 때 디지털 탐구 도구나 계산기 등을 활용할 수 있다.","속력과 관련된 안전 수칙과 안전장치를 조사한 결과를 발표하거나 사회 관계망 서비스 등을 통해 공유하고, 교통안전의 실천은 실천적 습관 형성에 주안점을 둔다."],"area":"energy","electives":[],"prev":["e34-01"],"next":["m13-19"],"related":[]},{"id":"e56-11","grade":"e56","num":11,"title":"식물의 구조와 기능","standards":[{"code":"6과11-01","text":"생물을 이루고 있는 기본 단위인 세포를 현미경으로 관찰할 수 있다."},{"code":"6과11-02","text":"식물의 각 기관의 구조를 관찰하고, 기능을 알아보는 실험을 수행하여 식물 각 기관의 구조와 기능을 설명할 수 있다."},{"code":"6과11-03","text":"여러 가지 식물의 특징을 설명하는 자료를 만들어 공유할 수 있다."}],"tamgu":["줄기에서 물의 이동 실험하기","광합성 산물 확인 실험하기","증산 작용 확인 실험하기"],"haeseol":[{"code":"6과11-01","text":"세포 관찰은 식물 세포로 하고, 세포의 구조는 핵, 세포막, 세포벽을 용어 수준에서 다룬다."},{"code":"6과11-02","text":"식물의 기관에서 물과 양분의 이동을 탐구하면서 식물의 기관이 서로 연결되어 있음을 다룬다."},{"code":null,"text":"같은 시간 동안에 물체가 이동한 거리 비교하기"},{"code":"6과11-03","text":"학생들이 관심 있는 식물의 구조와 기능을 관찰하거나 조사하고 이를 설명하는 자료를 만들어 발표하고 공유하게 한다."}],"goryeo":["초등학교 3∼4학년군 ‘식물의 생활’, ‘생물의 한살이’, 중학교 1∼3학년군 ‘생물의 구성과 다양성’, ‘식물과 에너지’와 연계된다.","식물 세포 현미경 표본을 만들어 직접 관찰하되 학교 사정에 따라 이미 만들어진 현미경 표본을 이용하여 관찰할 수도 있다.","식물의 구조와 기능을 설명하는 자료를 만들어 공유하는 활동은 디지털 소양 교육과 연계하여 지도할 수 있다.","초등학교 3∼4학년군 ‘식물의 생활’과 ‘생물의 한살이’에서는 식물들의 특징을 관찰하고 비교하는 데 중점을 두지만, ‘ 식물의 구조와 기능’에서는 식물 각 기관의 구조와 기능에 중점을 두는 만큼 실험을 통해 탐구하도록 한다."],"area":"life","electives":[],"prev":["e34-03","e34-04"],"next":["m13-02","m13-12"],"related":[]},{"id":"e56-12","grade":"e56","num":12,"title":"지구의 운동","standards":[{"code":"6과12-01","text":"하루 동안 태양과 별을 관찰하여 위치 변화의 규칙성을 찾을 수 있다."},{"code":"6과12-02","text":"지구의 자전을 알고, 낮과 밤이 생기는 이유를 설명할 수 있다."},{"code":"6과12-03","text":"지구의 공전을 알고, 계절에 따라 달라지는 별자리를 관찰할 수 있다."}],"tamgu":["낮과 밤이 생기는 이유 모형실험하기","천체 관측 프로그램을 이용하여 계절별 대표적인 별자리 관찰하기"],"haeseol":[{"code":"6과12-01","text":"남쪽 하늘을 바라보는 관측자 관점에서 태양과 별의 위치가 달라지는 현상을 중심으로 다룬다."},{"code":"6과12-02","text":"지구의 자전에서는 지구가 자전축이 기울어진 채 하루에 한 바퀴 도는 것을 중심으로 다룬다."},{"code":"6과12-03","text":"별자리 명칭보다는 계절에 따라 보이는 별자리와 별자리의 위치가 달라지는 까닭을 이해하는 데 초점을 둔다."}],"goryeo":["초등학교 3∼4학년군 ‘밤하늘 관찰’, 5∼6학년군 ‘계절의 변화’, 중학교 1∼3학년군 ‘태양계’, ‘별과 우주’와 연계된다.","관찰과 실험을 중심으로 지구의 운동과 관련된 개념을 이해하고 지구의 자전과 공전에 의하여 일어나는 현상을 지구의 관측자 중심으로 탐구할 수 있는 활동이 필요하다.","탐구 활동을 하기 전, 교실이나 운동장 등의 공간에서 관측자가 남쪽을 바라볼 때를 기준으로 방위를 설정할 필요가 있다.","디지털 소양 교육 관련하여, 계절별 대표적인 별자리는 남쪽 하늘의 별자리를 중심으로 천체 관측 프로그램이나 실감형 자료를 활용하여 조사할 수 있다."],"area":"earth","electives":[],"prev":["e34-13"],"next":["m13-07","m13-15"],"related":["e56-13"]},{"id":"e56-13","grade":"e56","num":13,"title":"계절의 변화","standards":[{"code":"6과13-01","text":"태양 고도 측정기로 하루 동안 태양 고도, 그림자 길이, 기온을 측정하여 이들의 관계를 찾 을 수 있다."},{"code":"6과13-02","text":"계절에 따른 태양의 남중 고도와 낮의 길이 사이의 관계를 자료에 근거하여 추론할 수 있다."},{"code":"6과13-03","text":"계절 변화의 원인을 지구의 자전축이 기울어진 채 공전하는 것으로 설명할 수 있다."}],"tamgu":["태양 고도 측정기 만들기","디지털 자료를 활용하여 계절별 태양의 남중 고도, 낮의 길이 관계 탐구하기"],"haeseol":[{"code":"6과13-03","text":"지구 자전축이 기울어진 채 공전하기 때문에 계절에 따라 태양의 남중 고도가 달라져 지표가 받는 태양 에너지의 차이로 계절의 변화가 생김을 이해하게 한다."}],"goryeo":["초등학교 3∼4학년군 ‘밤하늘 관찰’, 5∼6학년군 ‘지구의 운동’과 중학교 1∼3학년군 ‘태양계’, ‘별과 우주’와 연계된다.","태양 고도 측정기 만들기 활동에서는 단순하게 그림자의 길이를 이용하는 장치, 정확한 태양 고도값을 측정하는 장치 등 다양한 태양 고도 측정 장치를 설계하고 만들 수 있다. 또한, 하루 동안 태양 고도와 그림자 길이를 직접 측정하여, 표와 그래프로 나타내는 활동이 필요하다.","디지털 소양 교육과 관련하여, 누리집을 활용하여 계절에 따른 태양의 남중 고도와 낮의 길이 자료를 수집하고 해석할 수 있다."],"area":"earth","electives":[],"prev":["e34-13"],"next":["m13-07","m13-15"],"related":["e56-12"]},{"id":"e56-14","grade":"e56","num":14,"title":"물질의 연소","standards":[{"code":"6과14-01","text":"물질의 성질이 달라지는 변화와 달라지지 않는 변화를 관찰하여 비교할 수 있다."},{"code":"6과14-02","text":"물질이 연소할 때 나타나는 공통적인 현상을 관찰하고, 연소의 조건을 찾을 수 있다."},{"code":"6과14-03","text":"연소 전과 후의 물질을 비교하여 연소 과정에서 물질의 성질이 달라짐을 설명할 수 있다."},{"code":"6과14-04","text":"연소 과정에서 생성되는 물질로 인한 생태계의 피해 사례를 수집하고 분석하여 해결책을 제안하고 공유할 수 있다."}],"tamgu":["서로 다른 물질을 섞었을 때 물질의 성질 변화 관찰하기","양초와 알코올이 탈 때 나타나는 공통적인 현상 관찰하기","연소 후 생성되는 물질 확인하는 실험하기"],"haeseol":[{"code":"6과14-01","text":"서로 다른 물질을 섞었을 때 물질의 성질이 달라지는 변화를 활용한 재미있고 간단한 실험을 실시한다. 물질을 섞은 후 물질의 성질이 달라지는 까닭은 다루지 않으며, 물리 변화나 화학 변화 용어를 도입하지 않는다."},{"code":"6과14-02","text":"양초, 알코올, 나무 등과 같은 물질의 연소를 중심으로 다룬다."},{"code":"6과14-03","text":"물이나 이산화 탄소와 같은 연소 생성물은 염화 코발트 종이나 석회수 등을 이용한 실험으로 확인하고, 그을음은 연소 생성물로 다루지 않는다."},{"code":"6과14-04","text":"생태계의 피해 사례는 연소 생성물 중 이산화 탄소로 인한 피해 사례를 중심으로 조사한다."}],"goryeo":["초등학교 3∼4학년군 ‘물체와 물질’, ‘여러 가지 기체’, 5∼6학년군 ‘산과 염기’, 중학교 1∼3학년군 ‘화학 반응의 규칙성’과 연계된다.","연소 과정에 필요한 물질이나 연소 후 생성되는 물질을 지도할 때 초등학교 3∼4학년군 ‘여러 가지 기체’에서 학습한 산소나 이산화 탄소의 성질을 상기시킨다.","실험할 때는 학생들이 적절한 안전 장구를 착용하도록 하고, 실험 전에 학생들에게 주의할 점과 안전사고 대처 방법을 지도한다.","생태전환교육과 연계하여 연소 생성물 중 이산화 탄소로 인한 생태계의 피해 사례를 수집하여 분석하도록 한다. 디지털 소양 교육과 연계하여 피해의 원인, 현황, 전망 등을 바탕으로 실천 가능한 해결책이나 행동 방식을 제안하고, 누리망이나 사회 관계망 서비스 등에서 공유하도록 한다."],"area":"matter","electives":[],"prev":["e34-05","e34-15"],"next":["m13-16"],"related":["e56-09"]},{"id":"e56-15","grade":"e56","num":15,"title":"전기의 이용","standards":[{"code":"6과15-01","text":"전지와 전구, 전선을 연결하여 전구에 불을 켜보고, 불이 켜지는 전기 회로의 특징을 말할 수 있다."},{"code":"6과15-02","text":"전지 한 개를 연결한 전기 회로와 전지 두 개를 직렬연결한 전기 회로의 특징을 비교할 수 있다."},{"code":"6과15-03","text":"전자석을 만들어 전자석의 성질을 탐색하고 전자석이 사용되는 예를 조사할 수 있다."},{"code":"6과15-04","text":"전기를 효율적이고 안전하게 사용하는 방법을 조사하여 실천 계획을 세우고 일상생활에서 실천할 수 있다."}],"tamgu":["전구에 불이 켜지는 전기 회로와 불이 켜지지 않는 전기 회로 비교하기","전지 한 개를 연결한 전기 회로와 전지 두 개를 직렬연결한 전기 회로에서 전구의 밝기 비교하기","전자석의 성질을 영구 자석과 비교하여 탐색하기"],"haeseol":[{"code":"6과15-02","text":"전구의 직렬연결과 병렬연결은 다루지 않고, 전지의 연결은 직렬연결만 다룬다."},{"code":"6과15-03","text":"전자석은 전지를 이용하여 제작하고, 전지의 수에 따라 전자석의 세기가 달라지는 현상, 전지의 연결 방향에 따라 전자석의 극이 달라지는 현상을 관찰하여 영구 자석과의 차이를 비교하도록 하되, 전류에 의한 자기장 개념은 도입하지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘자석의 이용’, 중학교 1∼3학년군 ‘전기와 자기’와 연계된다.","탐구 활동 등의 학습 과정에서 전기 안전에 유의하도록 한다.","전지와 전구, 전선을 연결하여 전구에 불이 켜지는 전기 회로를 구성하여 도체와 부도체를 구별하는 활동을 진행할 수 있다.","전지 한 개를 연결한 회로와 전지 두 개를 직렬연결한 회로의 특징을 비교하기 위해 발광다이오드, 전동기, 버저 등의 다양한 전기 부품을 이용할 수 있다.","전구 등의 전기 부품은 전지의 연결을 고려하여 알맞은 규격을 사용한다.","전기를 효율적이고 안전하게 사용하는 방법에 대한 학습을 생활 규칙 만들기, 과학 글쓰기, 그림 그리기, 역할 놀이 등의 다양한 활동으로 융합하여 전개할 수 있다."],"area":"energy","electives":[],"prev":["e34-09"],"next":["m13-14"],"related":[]},{"id":"e56-16","grade":"e56","num":16,"title":"과학과 나의 진로","standards":[{"code":"6과16-01","text":"미래 사회에 일어날 수 있는 문제를 조사하고, 문 제 를 해결하는 데 과학이 기여할 수 있 는 방법을 토의할 수 있다."},{"code":"6과16-02","text":"다양한 진로가 과학과 관련됨을 알고, 자신의 진로를 과학과 관련지어 설명할 수 있다."}],"tamgu":["우리의 진로에 영향을 미치는 과학적 요소 탐구하기"],"haeseol":[{"code":"6과16-01","text":"단순한 상상이 아니라 현재의 다양한 정보를 기반으로 미래 사회의 문제를 예상해보도록 한다."},{"code":"6과16-02","text":"과학자와 관련된 직업을 다루는 것이 아니라 학생이 희망하는 다양한 직업을 기준으로 하여 해당 직업과 관련된 과학적 요소를 찾도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘과학과 나의 미래’와 연계된다.","인구 문제, 환경 문제 등 미래 사회에 일어날 수 있는 문제의 해결과 관련하여 과학의 유용성을 다룰 때는 과학이 모든 문제를 해결할 수는 없다는 것도 함께 지도한다.","과학기술의 발달이 가지고 올 미래 사회의 모습에 맞춰 새로운 진로의 탐색이나 미래의 나를 위한 준비의 필요성을 느낄 수 있도록 지도한다."],"area":"society","electives":[],"prev":[],"next":["m13-23"],"related":[]},{"id":"m13-01","grade":"m13","num":1,"title":"과학과 인류의 지속가능한 삶","standards":[{"code":"9과01-01","text":"과학적 탐구 방법을 이해하고, 일상생활의 문제에 대한 과학적 해결 방안을 제안할 수 있다."},{"code":"9과01-02","text":"과학의 발전이 인류 문명에 미친 영향을 이해하고, 인공지능 등 첨단 과학기술이 가져올 미래 사회의 변화를 조사하여 발표할 수 있다."},{"code":"9과01-03","text":"인류의 지속가능한 삶을 위한 과학기술의 중요성과 역할에 대해 토의하고, 개인과 사회 차원의 활동 방안을 찾아 실천할 수 있다."}],"tamgu":["주변에서 탐구할 문제를 발견하고 탐구 계획서 작성하기"],"haeseol":[{"code":"9과01-01","text":"간단한 탐구 실험을 제시하여 탐구 절차 및 방법을 익히도록 하며, 학생이 스스로 발견한 문제를 일정 기간 동안 지속적으로 탐구하여 해결해 보는 기회를 제공할 수 있다."},{"code":"9과01-02","text":"과학적 탐구 방법을 통해 얻은 과학 지식과 방법이 인류 문명과 문화 발달에 미친 영향을 중심으로 학습하고, 원리보다는 활용 측면에서 첨단 과학기술 사례를 함께 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘기후변화와 우리 생활’, 5∼6학년군 ‘자원과 에너지’와 연계된다.","인류 문명 발달 과정에서 과학적 원리 발견, 기술 발달, 기기 발명에 관한 자료를 수집하고 토의하도록 지도할 수 있다. 과학 개념과 원리가 기술, 공학, 예술, 수학 등 과학 외의 교과와 관련 있음을 사례를 통해 이해하도록 한다.","조사와 토의⋅토론 등의 교수⋅학습 방법을 활용하여 첨단 과학기술 사례를 찾고, 이 과정에서 과학이 사회에 미치는 영향을 알게 한다. 조사한 자료를 바탕으로 미래 생활의 모습을 예측하도록 하고, 이를 글이나 그림으로 표현하도록 하여 관련 내용을 평 가 할 수 있다.","인류가 직면한 에너지나 환경 문제와 같은 과학 관련 쟁점을 알고 이에 대한 자신의 의견을 과학적으로 제시하게 한다."],"area":"society","electives":[],"prev":["e34-16","e56-08"],"next":[],"related":[]},{"id":"m13-02","grade":"m13","num":2,"title":"생물의 구성과 다양성","standards":[{"code":"9과02-01","text":"세포는 생명 활동이 일어나는 기본 단위임을 이해하고, 세포의 구조와 기능의 관계를 추론할 수 있다."},{"code":"9과02-02","text":"생물의 유기적 구성 단계를 이해하고, 동물과 식물을 비교하여 분석할 수 있다."},{"code":"9과02-03","text":"생물다양성을 이해하고, 변이와 생물다양성의 관계를 추론할 수 있다."},{"code":"9과02-04","text":"종의 개념과 분류 체계를 이해하고, 생물을 계 수준에서 분류할 수 있다."},{"code":"9과02-05","text":"생물다양성 보전의 필요성을 이해하고, 생물다양성 유지를 위한 방안을 조사하고 실천할 수 있다."}],"tamgu":["세포 관찰하기","생물다양성 보전 놀이 활동하기"],"haeseol":[{"code":"9과02-01","text":"세포의 구조는 세포벽, 세포막, 핵, 엽록체, 미토콘드리아를, 세포의 특징으로는 생명 활동을 유추할 수 있는 세포 (적혈구, 신경세포, 상피세포 등)를 다룬다."},{"code":"9과02-04","text":"종은 생물학적 종 개념만을, 생물 분류 체계는 5계만을 다루도록 한다."}],"goryeo":["초등학교 3∼4학년군 ‘다양한 생물과 우리 생활’, ‘생물과 환경’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘통합과학2’의 변화와 다양성과 연계된다.","생물다양성 이해를 위해 우리 학교 (마을)의 생물을 관찰하여, 우리 학교(마을) 생태 지도 만들기 및 생물 분류 활동을 할 수 있다.","생물다양성 보전 놀이 활동을 통해 생물다양성 보전의 필요성을 이해하도록 하고, 개인적, 사회적 차원에서 이루어질 수 있는 생물다양성 유지 방안을 조사하고 이를 실천하며, 이 과정에서 지속가능성을 고려한 생태전환교육이 이루어질 수 있도록 한다."],"area":"life","electives":["통합과학1","통합과학2"],"prev":["e34-02","e34-03","e34-12","e34-14","e56-11"],"next":["h1-03","h2-01"],"related":[]},{"id":"m13-03","grade":"m13","num":3,"title":"열","standards":[{"code":"9과03-01","text":"온도와 열평형 과정을 물질을 구성하는 입자들의 배치나 움직임 등으로 설명할 수 있다."},{"code":"9과03-02","text":"열은 전도, 대류, 복사로 전달됨을 알고, 열전달 과정을 모형 등을 사용하여 다양하게 표현할 수 있다."},{"code":"9과03-03","text":"물질에 따라 비열과 열팽창 정도가 다름을 알고, 이러한 성질이 일상생활에서 유용하게 활용됨을 인식할 수 있다."}],"tamgu":["열화상 카메라를 이용하여 물체에서 열의 전도 비교하기","온도 센서를 이용하여 여러 가지 액체의 비열 비교하기"],"haeseol":[{"code":"9과03-01","text":"온도가 다른 두 물체가 열평형에 도달하는 과정을 시간 -온도 그래프 등을 활용하여 설명할 수 있도록 한다."},{"code":"9과03-02","text":"열의 이동 방식을 주변 도구나 신체를 이용하여 비유적으로 다양하게 표현하고, 그 차이를 설명할 수 있도록 한다."}],"goryeo":["초등학교 5∼6학년군 ‘열과 우리 생활’, 고등학교 ‘역학과 에너지’의 열과 에너지와 연계된다.","온도를 측정하거나 열의 전도를 관찰하는 활동에서 온도 센서 등 디지털 탐구 도구를 활용하도록 한다.","비열과 열팽창 실험에서 가열 장치로 실험할 때 화상이나 화재 등 안전사고에 유의하도록 안전 교육을 실시하고, 안전장치나 안전 장구가 갖추어진 상태에서 실시하도록 한다."],"area":"energy","electives":["역학과 에너지"],"prev":["e56-07"],"next":[],"related":[]},{"id":"m13-04","grade":"m13","num":4,"title":"물질의 상태 변화","standards":[{"code":"9과04-01","text":"확산 및 증발 현상을 관찰하여 물질을 구성하는 입자가 운동하고 있음을 추론할 수 있다."},{"code":"9과04-02","text":"물질의 세 가지 상태의 특징을 설명하고, 이를 입자 모형으로 표현할 수 있다."},{"code":"9과04-03","text":"여러 가지 물질의 상태 변화를 관찰하고, 이를 입자 모형으로 설명할 수 있다."},{"code":"9과04-04","text":"물질의 상태 변화와 열에너지 출입 관계를 이해하고, 이를 실생활에 적용하여 과학의 유용성을 인식할 수 있다."}],"tamgu":["확산 현상 관찰하기","물질의 상태 변화 시 질량과 부피 변화 측정하기","상태 변화 실험에서 가열 곡선 또는 냉각 곡선 그리기"],"haeseol":[{"code":"9과04-02","text":"물질의 상태를 나타내는 입자 모형은 입자 사이의 상대적 거리, 입자 배열의 불규칙한 정도, 입자의 운동성 등을 비교한 내용을 포함한다."},{"code":"9과04-03","text":"여러 가지 물질의 상태 변화를 관찰하여 융해, 응고, 기화, 액화, 승화를 구분하고, 물질의 상태가 변할 때 부피는 변하고 질량과 물질의 성질은 변하지 않는 이유를 입자 모형으로 설명한다."},{"code":"9과04-04","text":"물질의 상태 변화 시 온도가 일정한 이유를 상태 변화 과정에서 출입하는 열에너지와 관련지어 설명한다."}],"goryeo":["초등학교 3∼4학년군 ‘물의 상태 변화 ’, 고등학교 ‘물질과 에너지’의 물질의 세 가지 상태와 연계된다.","질량은 물질이 가지고 있는 고유한 양임을 설명한다. 질량은 무게를 측정하여 확인하고, 기체의 질량을 저울로 측정할 때는 부력이 측정값에 영향을 줄 수 있음을 유의한다.","상태 변화 시 열에너지의 출입으로 입자의 배열과 운동이 달라지는 실험 결과를 입자 모형을 사용하여 설명하도록 한다.","녹는점, 끓는점, 어는점의 정확한 개념은 중학교 1∼3학년군 ‘물질의 특성’에서 학습하므로 각 상태 변화가 일어나는 온도라는 측면에 주안점을 둔다."],"area":"matter","electives":["물질과 에너지"],"prev":["e34-10"],"next":[],"related":[]},{"id":"m13-05","grade":"m13","num":5,"title":"힘의 작용","standards":[{"code":"9과05-01","text":"물체에 작용하는 힘을 화살표를 이용하여 나타내고, 힘의 평형을 이루는 조건을 설명할 수 있다."},{"code":"9과05-02","text":"중력, 탄성력, 마찰력, 부력을 이해하고, 각 힘의 특징을 크기와 방향으로 설명할 수 있다."},{"code":"9과05-03","text":"알짜힘이 0이 아닐 때 물체의 운동 상태가 변함을 알고, 그 예를 조사하여 분류할 수 있다."},{"code":"9과05-04","text":"다양한 사례에서 작용하는 힘과 힘의 평형 관계를 설명하고, 일상생활에서 힘의 특징을 이용한 기구나 장치를 설계할 수 있다."}],"tamgu":["용수철의 탄성력 측정하기","물속에서 부력 측정하기","장난감이나 놀이 기구에서 힘의 작용 탐구하기"],"haeseol":[{"code":"9과05-01","text":"힘의 정의를 알고 힘을 크기와 방향으로 나타낼 수 있도록 하며, 나란한 힘의 합력만을 다루도록 한다."},{"code":"9과05-02","text":"중력을 지도할 때, 질량과 무게를 구별하도록 한다."},{"code":"9과05-03","text":"물체가 힘을 받았을 때 물체의 운동을 속력이 변하거나 운동 방향이 바뀌거나 두 가지가 모두 변하는 사례로 분류하도록 한다."},{"code":"9과05-04","text":"바닥에 놓인 물체에 작용하는 힘을 설명할 때, 중력과 함께 바닥이 물체를 떠받치는 힘을 도입한다."}],"goryeo":["초등학교 3∼4학년군 ‘힘과 우리 생활’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘ 물리학’의 힘과 에너지와 연계된다.","학생들이 일상적으로 경험하는 힘의 개념을 글, 그림 등 다양한 형태로 표현하도록 하여 과학적인 힘의 개념이 형성되도록 지도한다.","힘의 작용에 대한 이해 정도를 평가하기 위해 일상생활에서 물체가 힘을 받았을 때 속력이 변하거나 운동 방향이 바뀌거나 두 가지가 모두 변하는 사례를 조사하고, 포스터 발표, 보고서 작성 등 다양한 형태의 산출물을 제작하도록 할 수 있다."],"area":"energy","electives":["물리학","통합과학1"],"prev":["e34-01"],"next":["h1-03"],"related":[]},{"id":"m13-06","grade":"m13","num":6,"title":"기체의 성질","standards":[{"code":"9과06-01","text":"압력의 의미를 알고, 기체의 압력을 입자의 운동으로 설명할 수 있다."},{"code":"9과06-02","text":"기체의 압력과 부피 관계를 실험 결과로부터 알아내고, 이 를 입자 모형으로 해석할 수 있다."},{"code":"9과06-03","text":"기체의 온도와 부피 관계를 실험 결과로부터 알아내고, 이 를 입자 모형으로 해석할 수 있다."}],"tamgu":["기체의 압력과 부피 관계와 기체의 온도와 부피 관계를 실험으로 알아보기"],"haeseol":[{"code":"9과06-01","text":"압력의 의미는 일상생활에서 경험할 수 있는 예시로 설명하고, 기체의 압력은 일정한 면적에 입자의 충돌로 가해지는 힘의 수준에서 다룬다."},{"code":null,"text":"[9과06-02∼03] 기체의 압력과 부피, 기체의 온도와 부피를 측정한 각각의 실험 결과에서 두 변인 간 관계를 찾고 그 이유를 입자 모형으로 설명한다."}],"goryeo":["초등학교 3∼4학년군 ‘여러 가지 기체 ’, 고등학교 ‘물질과 에너지’의 물질의 세 가지 상태와 연계된다.","기체의 압력과 부피, 온도와 부피 관계를 확인할 수 있는 생활 속 현상을 찾아 발표하는 활동을 할 수 있다. 또한, 수식을 활용하여 변인 사이의 양적 관계를 계산하는 정량적 내용은 고등학교 '물질과 에너지'에서 다루므로 입자 모형을 이용한 정성적 설명에 주안점을 둔다.","탐구 활동 수행 시, 의사소통과 협업 능력을 키우기 위해 여러 모둠의 데이터를 공유하여 탐구 활동을 수행할 수 있으며, 데이터 공유 시 공유 플랫폼을 활용할 수 있다.","데이터를 수집하거나 시각화할 때 다양한 센서와 소프트웨어를 활용하여 디지털 소양을 함양하도록 지도한다."],"area":"matter","electives":["물질과 에너지"],"prev":["e34-15"],"next":[],"related":[]},{"id":"m13-07","grade":"m13","num":7,"title":"태양계","standards":[{"code":"9과07-01","text":"태양계를 구성하는 천체의 특징을 알고, 행성을 목성형 행성과 지구형 행성으로 구분할 수 있다."},{"code":"9과07-02","text":"태양의 표면과 대기에서 일어나는 현상을 알고, 태양의 활동이 지구에 미치는 영향을 추론할 수 있다."},{"code":"9과07-03","text":"지구 자전에 의한 천체의 겉보기 운동과 지구 공전에 의한 별자리 변화를 이해하고, 밤하늘 천체에 호기심을 가진다."},{"code":"9과07-04","text":"달을 관측하여 달의 위상변화 원리를 이해하고, 일식과 월식을 설명할 수 있다."}],"tamgu":["망원경을 이용하여 달, 행성 관측하기","태양계 천체 자료 수집 및 분석하기","모형을 이용하여 달의 위상변화 관찰하기"],"haeseol":[{"code":"9과07-01","text":"태양계를 구성하는 천체인 태양, 행성, 왜소행성, 소행성, 위성, 혜성을 개괄적으로 학습하며, 자세한 특징은 다루지 않는다."},{"code":"9과07-03","text":"관측자의 위치(고위도, 저위도, 중위도)에 따른 일주운동은 다루지 않는다. 지구의 자전과 공전을 우주에서 바라보는 관점으로 설명한다."}],"goryeo":["초등학교 3∼4학년군 ‘밤하늘 관찰’, 5∼6학년군 ‘지구의 운동’, ‘계절의 변화’, 고등학교 ‘통합과학1’의 물질과 규칙성, ‘ 지구과학’의 태양계 천체와 별과 우주의 진화, ‘ 행성우주과학’의 우주탐사와 행성계와 연계된다.","태양, 달, 행성을 천체 망원경으로 관측할 기회를 제공하도록 한다. 지역 천문대나 과학교육원 등을 활용할 수 있다.","야간에 별이나 행성 등을 관측할 때 안전 사항을 준수하도록 하고, 특히 태양의 흑점, 일식 등을 관찰할 때는 눈으로 직접 보지 않고 필터 등을 사용하도록 지도한다.","태양계 학습 시 디지털 탐구 도구, 최신 관측 자료, 천체 관측 프로그램, 앱 등을 적절하게 활용하도록 한다.","일식과 월식은 천체 관측 프로그램이나 모형 등으로 수업을 진행할 수 있으며, 작도 중심의 수업 활동은 지양한다."],"area":"earth","electives":["지구과학","통합과학1","행성우주과학"],"prev":["e34-13","e56-12","e56-13"],"next":["h1-02"],"related":[]},{"id":"m13-08","grade":"m13","num":8,"title":"물질의 특성","standards":[{"code":"9과08-01","text":"물질의 특성의 의미를 알고, 실험을 통해 밀도, 용해도, 녹는점, 끓는점 등을 설명할 수 있다."},{"code":"9과08-02","text":"물질의 특성을 근거로 우리 주변의 물질을 순물질과 혼합물로 분류할 수 있다."},{"code":"9과08-03","text":"물질의 특성을 이용하여 혼합물이 분리되는 원리를 이해하고, 이를 이용한 사례를 주변에서 찾을 수 있다."}],"tamgu":["혼합물 분리 실험을 설계하고 수행하기"],"haeseol":[{"code":"9과08-01","text":"물질의 특성은 특정한 조건에서 항상 일정한 값을 가지며 물질의 양에 따라 달라지지 않는 것으로 물질을 구분하는 중요한 정보가 됨을 이해하고, 그 사례로 밀도, 용해도, 녹는점, 끓는점 등이 있음을 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘물체와 물질’과 중학교 1∼3학년군 ‘화학 반응의 규칙성’과 연계된다.","순물질과 혼합물을 분류하는 활동 시, 순물질과 혼합물을 구별하는 기준에 대해 토의하고, 이 기준에 따라 여러 가지 물질을 순물질과 혼합물로 구별하는 활동을 할 수 있다.","탐구 활동 수행 시 여러 모둠의 실험 데이터를 공유하여 탐구할 수 있다.","혼합물의 분리 실험을 설계할 때 혼합물을 구성하는 순물질의 종류와 각 순물질의 특성에 관해 조사한 자료를 근거로 효과적인 분리 방법에 관해 논의하여 실험 계획을 공유할 수 있도록 한다.","혼합물의 분리 방법과 원리를 이해하는 수준에서 다루며, 혼합물의 분리 결과를 확인하는 활동을 할 수 있다."],"area":"matter","electives":[],"prev":["e34-05","e56-03","e56-05"],"next":[],"related":["m13-16"]},{"id":"m13-09","grade":"m13","num":9,"title":"지권의 변화","standards":[{"code":"9과09-01","text":"지구계의 구성 요소를 알고, 지권의 층상 구조와 그 특징을 조사 ⋅발표할 수 있다."},{"code":"9과09-02","text":"조암 광물의 주요 특성을 관찰하고, 암석과 광물의 활용 방안 및 자원으로서 가치에 대해 조사할 수 있다."},{"code":"9과09-03","text":"지각을 이루는 암석을 생성 과정에 따라 분류하고, 암석의 순환 과정을 설명할 수 있다."},{"code":"9과09-04","text":"풍화 과정을 이해하고, 토양 생성 과정을 풍화 작용의 예로 설명할 수 있다."},{"code":"9과09-05","text":"대륙이동설을 이해하고, 지진과 화산이 발생하는 지역의 분포를 판의 경계와 관련지어 설 명 할 수 있다."}],"tamgu":["광물 특성 관찰하기","암석을 관찰하여 분류하기","빅데이터를 활용하여 화산대 및 지진대와 판의 경계와의 관련성 탐구하기"],"haeseol":[{"code":"9과09-01","text":"지구계의 구성 요소 및 지권을 구성하는 각 층의 명칭과 상태만 다루며, 지구 내부구조 탐사에서 지진파의 특성은 다루지 않는다."},{"code":"9과09-02","text":"광물의 특성은 색, 조흔색, 굳기, 염산 반응, 자성만 다루고, 굳기는 방해석과 석영 정도만 비교하여 제시한다."},{"code":"9과09-03","text":"지각에 분포하는 다양한 암석 중, 화성암은 현무암, 유문암, 화강암, 반려암을, 퇴적암은 이암, 사암, 역암, 석회암을, 변성암은 편암, 편마암, 대리암, 규암만을 대표적으로 다룬다."},{"code":"9과09-05","text":"화산대와 지진대의 분포가 판의 경계와 일치한다는 정도만 다루고, 판의 경계에서 나타나는 다양한 지질학적 특성은 고등학교 ‘지구과학’에서 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘땅의 변화’, 고등학교 ‘통합과학1’의 물질과 규칙성, ‘통합과학2’의 환경과 에너지, ‘ 지구과학’의 지구의 역사와 한반도의 암석, ‘ 지구시스템과학’의 지구 탄생과 생동하는 지구와 연계된다.","표준 샘플을 이용한 광물과 암석 관찰을 통해 이들의 대표적인 특징을 알게 한 후, 학교 주변이나 국가지질공원을 구성하는 광물과 암석을 수업의 소재로 활용할 수 있다.","광물과 암석이 다양하게 활용되는 예를 조사하고, 이를 통해 광물과 암석이 유한한 자원임을 인식시켜 그 가치에 대해 토의해볼 수 있다.","빅데이터 및 증강 현실을 활용하여 지진대와 화산대의 분포를 판의 경계와 관련지어 추론할 수 있으며, 최근 발생한 지진과 화산에 대해 조사⋅발표하도록 지도할 수 있다."],"area":"earth","electives":["지구과학","지구시스템과학","통합과학1","통합과학2"],"prev":["e34-11","e56-01"],"next":["h1-02","h2-01"],"related":[]},{"id":"m13-10","grade":"m13","num":10,"title":"빛과 파동","standards":[{"code":"9과10-01","text":"빛의 반사와 굴절의 원리를 이해하고, 물체를 보는 과정을 빛의 경로를 이용하여 표현할 수 있다."},{"code":"9과10-02","text":"평면거울에서 상이 생기는 원리를 설명하고, 일상생활에서 사용되는 거울과 렌즈의 종류를 분류하고 상의 특징을 비교할 수 있다."},{"code":"9과10-03","text":"물체의 색을 빛의 반사와 관련지어 설명하고, 영상 장치에서 빛의 합성을 이용하여 다양한 색이 표현되는 원리를 이해할 수 있다."},{"code":"9과10-04","text":"파동의 발생과 전달 과정을 이해하고, 소리의 특성을 진폭, 진동수, 파형 등의 과학적 용어로 표현할 수 있다."}],"tamgu":["거울과 렌즈에 의한 상의 특징 관찰하기","디지털 탐구 도구를 이용하여 소리의 진폭, 진동수, 파형 탐구하기"],"haeseol":[{"code":"9과10-01","text":"실험을 통해 빛의 반사, 굴절의 특징을 확인하고, 굴절 법칙은 정량적으로 다루지 않는다."},{"code":"9과10-02","text":"상이 생기는 원리는 평면거울에 의한 상만을 빛의 반사 법칙을 적용하여 이해하도록 한다. 다양한 거울과 렌즈에 의해 생기는 상의 위치나 크기를 정량적으로 계산하거나 실상과 허상을 구분하는 활동은 하지 않고, 정성적인 특징을 다양한 예를 통해 비교하도록 한다."},{"code":"9과10-04","text":"소리는 파동의 일종으로 매질을 통해 전달됨을 설명하고, 다양한 소리의 파형을 비교하여 파동의 진폭, 진동수, 파장의 개념을 설명하도록 한다. 종파와 횡파를 구분하여 설명하지는 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘소리의 성질’, 5∼6학년군 ‘빛의 성질’, 고등학교 ‘물리학’의 빛과 물질과 연계된다.","학생들의 이해와 흥미를 위해 빛과 파동의 성질을 이용한 다양한 기구나 악기를 활용할 수 있다.","파동을 이용한 에너지와 정보의 전달 사례를 조사하여 동영상, 포스터, 보고서 등 다양한 형태의 산출물을 제작하도록 하고 이를 평가할 수 있다.","음악, 미술 등 다른 교과와 주제 통합 수업으로 구성할 수 있다."],"area":"energy","electives":["물리학"],"prev":["e34-07","e56-02"],"next":[],"related":[]},{"id":"m13-11","grade":"m13","num":11,"title":"물질의 구성","standards":[{"code":"9과11-01","text":"원소와 화합물의 정의를 알고, 원소와 화합물을 화학식으로 표현할 수 있다."},{"code":"9과11-02","text":"원소를 구성하는 입자인 원자는 양성자, 중성자, 전자로 구성되며, 양성자의 수에 따라 원소의 종류가 달라짐을 입자 모형을 활용하여 설명할 수 있다."},{"code":"9과11-03","text":"원소는 양성자의 수에 따라 주기율표에 배치됨을 알고, 주기율표에서 성질이 유사한 원소를 찾을 수 있다."},{"code":"9과11-04","text":"물질을 이루는 입자는 원자, 분자, 이온 등으로 존재할 수 있음을 알고, 이온은 전하를 띠고 있음을 설명할 수 있다."}],"tamgu":["같은 족 원소들의 유사성 탐구하기","전기력을 이용한 실험으로 이온의 이동 관찰하기"],"haeseol":[{"code":"9과11-02","text":"질량수나 동위 원소는 다루지 않는다."},{"code":"9과11-03","text":"동족 원소의 유사성은 1족 원소의 물과의 반응성, 18족 원소의 안정성 등 비슷한 성질을 지닌 원소들이 있음을 탐구를 통해 추론하고, 각 반응에 관한 구체적 설명이나 원리 및 원소의 주기성은 다루지 않는다."},{"code":"9과11-04","text":"이온의 경우 원자가 전기적으로 중성임을 토대로 전자를 잃으면 양이온이 되고, 전자를 얻으면 음이온이 된다는 수준에서 다룬다."}],"goryeo":["초등학교 5∼6학년군 ‘용해와 용액’, 고등학교 ‘통합과학1’의 물질과 규칙성과 연계된다.","생태전환교육과 연계하여 우리 주변의 물질 중 지구 환경에 영향을 미치는 물질을 중심으로 화학식으로 표현하고, 이 물질을 원소 또는 화합물인지 구분하도록 한다."],"area":"matter","electives":["통합과학1"],"prev":["e56-03"],"next":["h1-02"],"related":[]},{"id":"m13-12","grade":"m13","num":12,"title":"식물과 에너지","standards":[{"code":"9과12-01","text":"광합성 과정을 이해하고, 환경 요인과 광합성의 관계를 탐구하는 실험을 설계할 수 있다."},{"code":"9과12-02","text":"식물의 호흡과 광합성의 관계를 이해하고, 호흡과 광합성 과정에서 출입하는 에너지와 물질의 변화를 분석할 수 있다."},{"code":"9과12-03","text":"광합성 산물의 저장과 이용 과정을 이해하고, 모형으로 설명할 수 있다."}],"tamgu":["광합성에 필요한 물질과 산물 확인하는 실험하기"],"haeseol":[{"code":"9과12-03","text":"광합성 결과 만들어진 산물은 생명 활동에 필요한 에너지원임을 강조하여 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘식물의 생활’, 5∼6학년군 ‘식물의 구조와 기능’, 고등학교 ‘생명과학’ 생명 시스템의 구성, ‘세포와 물질대사’의 세포호흡과 광합성과 연계된다.","광합성 실험은 디지털 탐구 도구를 이용하여 데이터를 얻고 이를 해석하여 문제를 해결하는 디지털 기반 탐구 활동을 할 수 있다.","광합성 산물의 저장, 이용 과정을 모형으로 표현하는 활동에서는 정보 그림 만들기 등을 통해 창의성을 발휘할 수 있도록 지도한다."],"area":"life","electives":["생명과학","세포와 물질대사"],"prev":["e34-03","e34-04","e56-08","e56-11"],"next":[],"related":[]},{"id":"m13-13","grade":"m13","num":13,"title":"동물과 에너지","standards":[{"code":"9과13-01","text":"소화계의 구조와 기능을 이해하고, 소화 과정을 소화 효소의 작용과 관련지어 추론할 수 있다."},{"code":"9과13-02","text":"순환계의 구조와 기능을 이해하고, 혈액의 순환 경로를 종합하여 발표할 수 있다."},{"code":"9과13-03","text":"호흡계의 구조와 기능을 이해하고, 호흡 운동의 원리를 나타내는 모형을 만들 수 있다."},{"code":"9과13-04","text":"배설계의 구조와 기능을 이해하고, 노폐물이 배설되는 과정을 모식도로 표현할 수 있다."},{"code":"9과13-05","text":"동물이 세포호흡을 통해 에너지를 얻는 과정을 소화, 순환, 호흡, 배설과 관련지어 통합적으로 설명할 수 있다."}],"tamgu":["음식물에 들어 있는 영양소 검출하기","침의 소화 작용 탐구하기"],"haeseol":[{"code":"9과13-01","text":"소화 기관에서 일어나는 소화 과정은 아밀레이스, 펩신, 트립신, 라이페이스 등 대표적인 몇 가지 소화 효소 중심으로 간단하게 언급한다."},{"code":"9과13-05","text":"각 기관계의 구조와 기능에 대한 자세한 언급보다는 에너지를 얻기 위한 통합적 관계에 중점을 두고 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘동물의 생활’, 5∼6학년군 ‘우리 몸의 구조와 기능’, 고등학교 ‘생명과학’의 생명 시스템의 구성과 연계된다.","기관계에 대한 탐구는 증강 현실, 가상 현실 등 실감형 자료를 활용하여 디지털 소양을 함양할 수 있으며, 모식도 작성, 모형 제작, 역할 놀이, 발표 활동 시 모둠원들이 협력적 소통을 통해 수행하도록 지도한다."],"area":"life","electives":["생명과학"],"prev":["e34-02","e34-04","e56-04","e56-08"],"next":[],"related":[]},{"id":"m13-14","grade":"m13","num":14,"title":"전기와 자기","standards":[{"code":"9과14-01","text":"마찰 전기, 정전기 유도 현상을 관찰하고, 이를 전기력과 원자 모형을 이용하여 설명할 수 있다."},{"code":"9과14-02","text":"전기 회로에서 전류를 모형으로 설명하고, 실험을 통해 저항, 전류, 전압 사이의 관계를 이끌어낼 수 있다."},{"code":"9과14-03","text":"저항의 직렬연결과 병렬연결의 특징을 비교하고, 일상생활에서 전기 에너지가 다양한 형태의 에너지로 전환됨을 소비 전력과 관련지어 설명할 수 있다."},{"code":"9과14-04","text":"자기장 안에 놓인 전류가 흐르는 코일이 받는 힘의 특성을 추리하고, 전 동 기 등 일 상 생활에서 활용한 예를 찾을 수 있다."}],"tamgu":["저항, 전류, 전압 사이의 관계 탐구하기","전류가 흐르는 코일 주위의 자기장 관찰하기"],"haeseol":[{"code":"9과14-02","text":"일상생활에 활용되는 다양한 물질의 저항이 다름을 도체와 부도체의 예를 들어 설명하고, 반도체를 소개한다."},{"code":"9과14-03","text":"저항의 연결에 따른 합성 저항의 정량적인 계산과 혼합 연결은 다루지 않는다. 소비 전력은 정량적인 계산보다는 에너지 전환 관점에서 다루도록 하고, 효율적인 전기 사용의 중요성을 인식하도록 한다."},{"code":"9과14-04","text":"코일을 이용하여 전류의 세기와 방향에 따른 자기장의 세기와 방향을 정성적으로 확인하고, 전류가 흐르는 코일과 자석의 상호작용 관점에서 전동기의 원리를 이해하도록 한다."}],"goryeo":["초등학교 3∼4학년군 ‘자석의 이용’, 5∼6학년군 ‘전기의 이용’, 고등학교 ‘통합과학1’의 물질과 규칙성, ‘통합과학2’의 환경과 에너지, ‘물리학’의 전기와 자기와 연계된다.","전기 회로 실험에서 디지털 탐구 도구나 가상 실험을 활용할 수 있다.","가정에서 전기 에너지가 전환되어 나타나는 다양한 형태의 에너지와 소비 전력에 대해 조사하여 보고서를 작성하게 하고, 이를 평가할 수 있다.","환경이나 기후변화의 관점에서 효율이 높은 전기 기구를 사용하는 것의 중요성을 이해하고 에너지의 효율적 사용을 실천하도록 지도한다."],"area":"energy","electives":["물리학","통합과학1","통합과학2"],"prev":["e34-09","e56-08","e56-15"],"next":[],"related":[]},{"id":"m13-15","grade":"m13","num":15,"title":"별과 우주","standards":[{"code":"9과15-01","text":"연주시차를 이용하여 별까지의 거리를 구할 수 있고, 별의 등급과 밝기의 관계 및 표면 온도와 색의 관계를 설명할 수 있다."},{"code":"9과15-02","text":"우리은하의 구조와 크기를 이해하고, 성운과 성단의 특징을 비교할 수 있다."},{"code":"9과15-03","text":"모형을 이용하여 우주가 팽창하고 있음을 설명할 수 있다."},{"code":"9과15-04","text":"우주탐사의 의의와 인류에게 미치는 영향을 조사하여 과학의 유용성을 인식할 수 있다."}],"tamgu":["디지털 탐구 도구를 활용하여 광원으로부터의 거리에 따른 빛의 세기 실험하기","천체 관측 프로그램을 활용하여 우리은하를 구성하는 천체 관측하기","우주탐사 계획 세우기"],"haeseol":[{"code":"9과15-01","text":"별까지의 거리를 구하는 방법은 수식을 도입하지 않으며, 연주시차와 겉보기 등급과 절대등급의 개념을 중심으로 다룬다. 별의 표면 온도는 별의 색을 이용하여 비교하는 수준으로만 다룬다."},{"code":"9과15-03","text":"우주 팽창과 관련된 심화 내용(적색 편이, 허블 법칙, 가속 팽창 등)은 다루지 않는다."}],"goryeo":["초등학교 3∼4학년군 ‘밤하늘 관찰’, 고등학교 ‘통합과학 2’의 환경과 에너지, ‘지구과학’의 태양계 천체와 별과 우주의 진화, ‘행성우주과학’의 우주탐사와 행성계, 태양과 별의 관측, 은하와 우주와 연계된다.","디지털 탐구 도구를 활용하여 우리은하를 구성하는 천체의 종류와 특징을 비교⋅분석하는 수업을 전개할 수 있다.","우주 팽창은 스티커를 붙인 풍선 모형을 이용하여 설명할 수 있다.","우주탐사 성과를 바탕으로 우주탐사 계획을 세우고, 토의 및 토론, 보고서 작성, 만화 그리기, 연극 활동 등 다양한 교수⋅학습 방법을 적용할 수 있다."],"area":"earth","electives":["지구과학","통합과학 2","행성우주과학"],"prev":["e34-13","e56-12","e56-13"],"next":[],"related":[]},{"id":"m13-16","grade":"m13","num":16,"title":"화학 반응의 규칙성","standards":[{"code":"9과16-01","text":"물리 변화와 화학 변화의 의미를 알고, 화학 변화에서 새로운 물질이 생성됨을 관찰할 수 있다."},{"code":"9과16-02","text":"간단한 화학 반응을 화학 반응식으로 표현하고, 화학 반응식에서 계수의 비를 입자 수의 비로 해석할 수 있다."},{"code":"9과16-03","text":"화학 반응에서 질량이 보존됨을 실험을 통해 추론할 수 있다."},{"code":"9과16-04","text":"화합물을 구성하는 성분 원소의 질량비가 일정함을 실험 자료를 해석하여 설명할 수 있다."},{"code":"9과16-05","text":"기체 반응에서 기체 부피 사이의 비가 일정함을 실험 자료를 해석하여 설명할 수 있다."},{"code":"9과16-06","text":"화학 반응에서 열에너지가 출입함을 알고, 생활 속 사례를 조사하여 발표할 수 있다."}],"tamgu":["화학 반응 전후의 질량 변화 관찰하기","화학 반응을 이용한 간단한 냉각 장치 만들기"],"haeseol":[{"code":"9과16-03","text":"화학 반응이 일어날 때 물질을 구성하는 원자의 배열만 변하고, 원자의 종류와 수는 변하지 않음을 강조하여 설명한다."}],"goryeo":["초등학교 3∼4학년군 ‘물체와 물질’, 5∼6학년군 ‘물질의 연소’, 고등학교 ‘통합과학2’의 변화와 다양성과 연계된다.","질량 보존 법칙을 확인하는 실험에서 기체의 질량을 측정할 때는 부력이 영향을 미칠 수 있음을 유의한다.","일정 성분비 법칙은 화합물을 구성하는 원소를 화학식으로 일정하게 표현할 수 있는 근거가 된다는 사실을 학생들이 이해하도록 지도한다.","탐구 활동 수행 시, 의사소통과 협업 능력을 키우기 위해 여러 모둠의 데이터를 공유할 수 있으며, 데이터 공유 시 공유 플랫폼 등을 활용하여 디지털 소양 교육과 연계하여 지도한다.","질량 보존 법칙, 일정 성분비 법칙, 기체 반응 법칙은 개념의 추상성이 높으므로, 시각적 접근이 가능하도록 모형, 소프트웨어, 앱 등을 활용하여 디지털 소양을 함양하도록 지도한다."],"area":"matter","electives":["통합과학2"],"prev":["e34-05","e56-09","e56-14"],"next":["h2-01"],"related":["m13-08"]},{"id":"m13-17","grade":"m13","num":17,"title":"날씨와 기후변화","standards":[{"code":"9과17-01","text":"지구 대기권을 4개 권역으로 구분하며, 온실효과와 지구온난화를 복사 평형의 관점으로 설명할 수 있다."},{"code":"9과17-02","text":"대기 대순환에서 위도별 바람의 특성을 파악하고, 대기 대순환의 역할을 설명할 수 있다."},{"code":"9과17-03","text":"상대습도, 단열 팽창 및 응결 현상의 관계를 이해하고, 구름의 생성과 강수 과정을 설명할 수 있다."},{"code":"9과17-04","text":"기압, 기단, 전선의 개념을 이해하고, 일기도에서 저기압과 고기압의 분포에 따른 날씨를 해석할 수 있다."}],"tamgu":["기후변화 관련 자료 검색 및 분석하기","디지털 탐구 도구를 이용하여 구름 생성 과정 실험하기","일기도, 레이더 및 위성 영상 등 실시간 데이터를 활용하여 날씨 해석하기"],"haeseol":[{"code":"9과17-02","text":"위도별로 지상에서 부는 바람은 북반구를 기준으로 설명하고, 대기 대순환 설명 시 전향력이나 지구가 자전하지 않을 경우는 다루지 않는다."},{"code":"9과17-03","text":"대기 중의 수증기량과 이슬점, 포화 수증기압, 상대습도 등의 관계를 파악하고, 구름의 생성은 모형실험으로 다룬다. 강수 과정은 빙정설과 병합설에 대해 정성적으로 간단하게 설명한다."},{"code":"9과17-04","text":"기압의 개념과 크기 및 지표면의 차등 가열에 따른 온도 차이로 인해 기압의 변화가 생겨서 바람이 분다는 것을 다룬다. 등압선 그리기, 일기 예보의 과정, 일기도 작성은 다루지 않는다."}],"goryeo":["초등학교 5∼6학년군 ‘날씨와 우리 생활’, 고등학교 ‘통합과학 2’의 환경과 에너지, ‘지구과학’의 대기와 해양의 상호작용, ‘지구시스템과학’의 강수 과정과 대기의 운동, ‘기후변화와 환경생태’의 기후위기와 환경생태 변화, 기후위기에 대응하는 우리의 노력과 연계된다.","대기권의 높이에 따른 온도 분포 그래프를 그려보는 활동을 통해 대기권이 4개의 권역으로 이루어져 있음을 이해하도록 지도한다.","복사 평형, 단열 팽창, 바람의 생성, 전선의 형성은 모형이나 실험을 통해 이해할 수 있도록 한다.","온실 기체 농도 측정이 시작된 이래로 온실 기체량과 기후변화에 관한 자료를 검색하여 변화 경향성과 관련성을 분석한다.","기후변화와 환경 재난 등에 대한 심각성을 인식하고, 환경과 인간이 공존할 수 있는 다양한 방법을 모색하도록 지도한다."],"area":"earth","electives":["기후변화와 환경생태","지구과학","지구시스템과학","통합과학 2"],"prev":["e34-06","e34-16","e56-06"],"next":["h2-02"],"related":[]},{"id":"m13-18","grade":"m13","num":18,"title":"수권과 해수의 순환","standards":[{"code":"9과18-01","text":"수권에서 해수, 담수, 빙하의 분포와 활용 사례를 조사하고, 자원으로서 물의 가치에 대해 토론할 수 있다."},{"code":"9과18-02","text":"해수의 수온과 염분의 분포 및 변화를 해석하여 해수의 특성을 설명할 수 있다."},{"code":"9과18-03","text":"대기 대순환과 해양 표층 순환과의 관계를 이해하고, 기후변화에 영향을 미치는 해류의 역할을 설명할 수 있다."}],"tamgu":["디지털 탐구 도구를 이용하여 해수의 연직 수온 분포 실험하기","실시간 데이터를 활용하여 우리나라 주변 해양 정보(수온, 염분) 분석하기"],"haeseol":[{"code":"9과18-01","text":"자원으로서의 물의 가치에서는 지하수의 가치와 활용 방안, 지속가능한 수자원 활용 방안 조사⋅실천 등을 포함하여 다룬다."},{"code":"9과18-02","text":"위도에 따른 해수의 연직 수온 분포 차이보다는 우리나라 주변 해역의 계절별 연직 수온 분포를 위주로 다룬다."},{"code":"9과18-03","text":"해류가 전 지구적인 에너지 재분배를 통하여 기후변화에 미치는 영향을 이해하게 하고, 북태평양의 아열대 순환을 구성하는 해류만을 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘지구와 바다’, 고등학교 ‘통합과학2’의 환경과 에너지, ‘ 지구과학’의 대기와 해양의 상호작용, ‘ 지구시스템과학’의 해수의 운동, ‘ 기후변화와 환경생태’의 기후위기와 환경생태 변화, 기후위기에 대응하는 우리의 노력과 연계된다.","자원으로서 물의 가치, 물 부족 실태에 대해 조사하고 토론하는 과정에서 수자원의 중요성을 인식하고, 물 절약 방안 등과 같은 지속가능한 삶을 위한 실천 방안을 찾아 행동하도록 지도한다.","모둠별로 다양한 조건을 설정하여 해수의 연직 수온 분포 실험을 수행한 후 결과를 다른 모둠과 비교하여 분석할 수 있다."],"area":"earth","electives":["기후변화와 환경생태","지구과학","지구시스템과학","통합과학2"],"prev":["e34-06","e56-06"],"next":["h2-02"],"related":[]},{"id":"m13-19","grade":"m13","num":19,"title":"운동과 에너지","standards":[{"code":"9과19-01","text":"직선상에서 움직이는 물체의 운동을 그래프로 나타내고 해석할 수 있다."},{"code":"9과19-02","text":"자유 낙하하는 물체의 운동에서 시간에 따른 속력의 변화가 일정함을 분석할 수 있다."},{"code":"9과19-03","text":"일의 정의를 알고, 자유 낙하하는 물체의 운동에서 중력이 한 일을 위치 에너지와 운동 에너지로 표현할 수 있다."},{"code":"9과19-04","text":"물체의 운동에서 역학적 에너지의 전환과 보존을 이해하고, 이를 활용하여 일상생활 속 물체의 운동을 예측할 수 있다."}],"tamgu":["여러 가지 물체의 자유 낙하 운동 분석하기","자유 낙하하는 물체의 역학적 에너지 보존 실험하기"],"haeseol":[{"code":"9과19-01","text":"물체의 직선 운동에서 등속 운동과 속력이 일정하게 증가하거나 감소하는 운동을 다루며, 속력이 변하는 경우에는 시간-속력 그래프를 그려서 운동을 분석한다."},{"code":"9과19-02","text":"자유 낙하하는 물체의 운동에서 물체의 종류나 질량에 상관없이 단위 시간당 속력 변화량이 9.8m/s로 일정함을 자료를 분석하여 이끌어내도록 한다."},{"code":"9과19-03","text":"중력이 한 일은 운동 에너지, 중력에 대해서 한 일은 위치 에너지로 전환됨을 확인한다."},{"code":"9과19-04","text":"단진자나 자유 낙하하는 물체 등의 사례에서 역학적 에너지 보존 법칙을 이용해 물체의 운동 상태를 예측할 수 있음을 설명한다."}],"goryeo":["초등학교 5∼6학년군 ‘물체의 운동’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘물리학’의 힘과 에너지와 연계된다.","공기 등에 의한 마찰을 무시할 수 있는 물체의 운동을 기록한 실험이나 동영상 자료를 활용할 수 있다.","운동에 대한 기록과 자료의 해석⋅분석에 사진기나 운동 센서 등 다양한 디지털 탐구 도구를 활용할 수 있도록 한다."],"area":"energy","electives":["물리학","통합과학1"],"prev":["e56-08","e56-10"],"next":["h1-03","h2-02"],"related":[]},{"id":"m13-20","grade":"m13","num":20,"title":"자극과 반응","standards":[{"code":"9과20-01","text":"감각기관의 구조와 기능을 이해하고, 실험을 통해 자극이 뇌로 전달되는 과정을 추론할 수 있다."},{"code":"9과20-02","text":"뉴런과 신경계의 구조와 기능을 이해하고, 자극에서 반응이 일어나기까지의 과정을 모형으 로 설명할 수 있다."},{"code":"9과20-03","text":"우리 몸의 기능 조절에 호르몬이 관여함을 알고, 관련 자료를 조사하여 발표할 수 있다."}],"tamgu":["맹점 확인 실험하기","무조건 반사와 의식적 반응 실험하기"],"haeseol":[{"code":"9과20-01","text":"감각 기관의 구조는 간단히 언급하고, 자극이 감각 기관에서 뇌로 전달되는 과정을 중점적으로 설명한다."},{"code":"9과20-03","text":"호르몬의 종류는 성장호르몬, 인슐린, 글루카곤, 티록신 정도만 언급하고, 신경계와 호르몬의 작용으로 몸을 최적의 상태로 유지함을 강조하여 설명한다."}],"goryeo":["초등학교 5∼6학년군 ‘우리 몸의 구조와 기능’, 고등학교 ‘생명과학’의 항상성과 몸의 조절과 연계된다.","시각 관련 실험은 현상을 관찰하고, 관찰한 사실을 바탕으로 눈의 구조를 추론하는 사고력과 설명 능력을 향상할 수 있도록 지도한다.","실험을 통해 무조건 반사와 의식적 반응의 속도 차이를 측정하고, 데이터를 분석하는 활동을 통해 과학적 탐구 역량을 함양할 수 있도록 지도한다.","호르몬과 관련된 질병의 성별, 연령별 발병 비율을 누리망 자료 등을 활용하여 조사하고 분석하는 활동을 할 수 있다."],"area":"life","electives":["생명과학"],"prev":["e56-04"],"next":[],"related":[]},{"id":"m13-21","grade":"m13","num":21,"title":"생식과 유전","standards":[{"code":"9과21-01","text":"개체의 생장에 세포분열이 필요한 이유를 세포의 표면적과 부피의 관계로 추론할 수 있다."},{"code":"9과21-02","text":"염색체와 유전자의 관계를 이해하고, 체세포분열과 생식세포 형성과정의 특징을 염색체 행동을 중심으로 해석할 수 있다."},{"code":"9과21-03","text":"수정란으로부터 개체가 발생하는 과정을 모형으로 표현할 수 있다."},{"code":"9과21-04","text":"멘델 유전 실험의 의의와 원리를 이해하고, 멘델 유전 원리가 적용되는 유전 현상을 조사하여 협력적으로 소통할 수 있다."},{"code":"9과21-05","text":"사람의 유전 형질과 유전 연구 방법을 알고, 가계도를 분석하여 사람의 유전 현상을 설명할 수 있다."}],"tamgu":["세포분열 관찰하기","유전 현상 모의 활동하기"],"haeseol":[{"code":"9과21-02","text":"체세포분열과 생식 세포 형성 과정은 염색체의 행동을 중심으로 간단하게 다루며, 분열 과정의 단순한 암기보다 분열의 생물학적 의미를 이해하는 데 중점을 둔다."},{"code":"9과21-03","text":"발생 과정은 수정란의 초기 발생에서 난할만을 간단하게 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘동물의 생활’, ‘생물의 한살이’, 고등학교 ‘생명과학’의 생명의 연속성과 다양성과 연계된다.","체세포분열과 생식 세포 형성 과정 학습에서 증강 현실, 가상 현실 등 실감형 자료를 활용하여 세포분열 과정에 대한 이해를 높일 수 있도록 지도한다.","사람의 유전 형질 중 단일 유전자에 의해 나타난 형질이 아닌 표현형이 있음에 유의하며 과학적으로 입증된 내용만 다룬다.","가계도 분석 활동에서 학생과 학생 가족의 질병, 가족 관계 등 개인 정보 유출의 문제가 발생하지 않도록 한다."],"area":"life","electives":["생명과학"],"prev":["e34-02","e34-04"],"next":["h1-02","h1-03"],"related":[]},{"id":"m13-22","grade":"m13","num":22,"title":"재해⋅재난과 안전","standards":[{"code":"9과22-01","text":"재해⋅재난 사례와 관련된 자료를 조사하고, 그 발생 원인과 피해에 대해 과학적으로 분석할 수 있다."},{"code":"9과22-02","text":"과학적 원리를 이용하여 재해⋅재난에 대한 대비 및 대처 방안을 세울 수 있다."}],"tamgu":["빅데이터를 이용하여 재해⋅재난 사례 분석하기","재해⋅재난의 피해를 줄이기 위한 홍보자료 제작하기"],"haeseol":[{"code":"9과22-01","text":"재해⋅재난에 대한 사례 조사는 감염병 질병 확산, 화학물질 유출, 운송 수단 사고, 지진, 화산, 기상재해 등에서 선택하여 다룬다."},{"code":"9과22-02","text":"재해⋅재난의 피해를 줄이기 위한 방안을 논의할 때는 사후 대처뿐만 아니라 사전 예방 및 대비를 다룬다."}],"goryeo":["초등학교 3∼4학년군 ‘기후변화와 우리 생활’, 5∼6학년군 ‘자원과 에너지’와 연계된다.","재해⋅재난에 대한 사례 조사는 누리망 검색이나 서적 등을 활용할 수 있으며, 재해⋅재난의 종류에 따라 보고서를 작성하여 발표할 수 있다. 이때 편향된 관점을 갖지 않도록 다양한 자료를 조사하여 비교하도록 한다.","교수⋅학습 방법으로 주로 조사와 토의⋅토론, 발표를 활용하고, 참여하려는 태도와 의사소통 및 협동성을 평가할 수 있다."],"area":"society","electives":[],"prev":["e34-08","e34-16","e56-08"],"next":[],"related":[]},{"id":"m13-23","grade":"m13","num":23,"title":"과학과 나의 미래","standards":[{"code":"9과23-01","text":"과학과 관련된 직업의 종류와 하는 일을 조사하고, 과학기술의 발달로 생기는 미래 사회의 직업 변화를 예상할 수 있다."},{"code":"9과23-02","text":"자신의 진로와 관련 있는 과학 분야를 조사하고, 진로 선택을 위하여 필요한 과학 학습을 계획할 수 있다."}],"tamgu":["다양한 직업 속 과학 탐색하기","미래 사회에서 과학의 역할과 새로운 과학 직업 토의하기"],"haeseol":[{"code":"9과23-02","text":"과학과 직접적으로 관련된 직업에서 과학의 역할 뿐만 아니라 기술, 공학, 사회, 예술, 문학 분야 등의 직업에서 필요한 과학 학문을 조사하여, 과학의 중요성과 유용성을 깨닫고 과학 학습 계획을 세우도록 한다."}],"goryeo":["초등학교 5∼6학년군 ‘과학과 나의 진로’와 연계된다.","과학 관련 직업군별 탐방 활동 보고서나 자료 조사 보고서를 바탕으로 직업군의 특성에 대해 발표하고 토론한다.","학생이 원하는 진로를 먼저 정하고, 비슷한 진로를 계획하는 학생들이 모둠을 만들어 함께 조사하고 발표한다."],"area":"society","electives":[],"prev":["e56-16"],"next":[],"related":[]},{"id":"h1-01","grade":"h1","num":1,"title":"과학의 기초","standards":[{"code":"10통과1-01-01","text":"자연을 시간과 공간에서 기술할 수 있음을 알고, 길이와 시간 측정의 현대적 방법과 다양한 규모의 측정 사례를 조사할 수 있다."},{"code":"10통과1-01-02","text":"과학 탐구에서 중요한 기본량의 의미를 알고, 자연 현상을 기술하는 데 단위가 가지는 의미와 적용사례를 설명할 수 있다."},{"code":"10통과1-01-03","text":"과학 탐구에서 측정과 어림의 의미를 알고, 일상생활의 여러 가지 상황에서 측정 표준의 유용성과 필요성을 논증할 수 있다."},{"code":"10통과1-01-04","text":"자연에서 일어나는 다양한 변화를 측정⋅분석하여 정보를 산출함을 알고, 이러한 정보를 디지털로 변환하는 기술을 정보 통신에 활용하여 현대 문명에 미친 영향을 인식한다."}],"tamgu":["미시세계와 거시세계의 물체의 크기에 따른 차이점 분석하기","일상생활에서 측정 표준이 활용되는 사례 탐색하기","스마트 기기를 활용하여 여러 가지 기본량을 측정하고 분석하기시스템과 상호작용⋅지구시스템의 구성과 상호작용 ⋅판구조론과 지각 변동 ⋅중력장 내의 운동 ⋅충격량과 운동량⋅생명 시스템의 기본 단위 ⋅물질대사 ⋅유전자와 단백질과정⋅기능⋅자연 현상에서 문제를 인식하고 가설을 설정하기⋅변인을 조작적으로 정의하여 탐구 설계하기⋅다양한 도구를 수학적 사고를 활용하여 정보를 조사 ⋅수집⋅해석하기⋅수학적 사고와 모형을 활용하여 통합 및 융합 과학 관련 현상 설명하기⋅증거에 기반한 과학적 사고를 통해 자료를 과학적으로 분석 ⋅평가⋅추론하기⋅결론을 도출하고 자연 현상 및 융복합 문제 상황에 적용 ⋅설명하기⋅과학적 주장을 다양한 방법으로 소통하고, 의사결정을 위해 과학적 지식 활용하기 가치⋅태도⋅과학의 심미적 가치⋅과학 유용성⋅자연과 과학에 대한 감수성⋅과학 창의성⋅과학 활동의 윤리성⋅과학 문제해결에 대한 개방성⋅안전⋅지속가능 사회에 기여⋅과학 문화 향유"],"haeseol":[{"code":"10통과1-01-01","text":"원자와 우주를 시간과 공간 차원에서 비교하면서 규모 (scale)의 의미와 필요성을 소개하고, 시간과 공간을 측정하려는 과학자들의 노력이 인간의 경험 범위를 얼마나 확장했는지를 설명한다."},{"code":"10통과1-01-02","text":"과학의 기본량으로 시간, 길이, 질량, 전류, 온도 등 초 ⋅중학교 과학 교과에서 이미 학습한 내용을 중심으로 다루며, 부피, 속력, 농도 등과 같은 초 ⋅중⋅고등학교 과학 교과의 주요 과학 개념들이 이러한 기본량으로부터 도출됨을 설명한다."},{"code":"10통과1-01-04","text":"인간을 둘러싼 자연계의 변화가 전달될 때 신호가 되고, 이를 측정하여 분석할 때 정보가 됨을 다룬다. 센서를 통해 아날로그 형태의 다양한 신호가 전기 신호로 바뀌어 디지털 정보가 됨을 소개하며, 센서의 작동 원리는 다루지 않는다."}],"goryeo":["이 영역은 고등학교 과학 과목의 출발점으로서 과학의 본질에 관해서 탐구 대상과 방법론 측면에서 다룬다. 즉 과학은 시간과 공간을 배경으로 하는 우주를 대상으로 하며, 여기서 벌어지는 다양한 현상을 관찰하고 측정하는 것이 과학의 기초이자 인간 사회의 일상생활에도 유용함을 소개한다.","고등학교 과학 과목의 출발점으로서 학생들이 과학에 대해 흥미와 호기심을 가질 수 있도록 개념 설명은 지양하고 학생들의 흥미를 끄는 구체적인 사례를 중심으로 지도한다.","가장 짧은 시간과 긴 시간, 가장 짧은 거리와 긴 거리는 무엇인지 등에 관한 질문으로부터 다양한 시공간 규모를 인간의 경험 세계와 비교 ⋅탐색함으로써 자연 세계의 신비를 느끼게 하고 과학 탐구에 대한 호기심을 유발한다.","과거로부터 현재까지 자연 현상을 관찰하고 정밀하게 측정하고자 하는 인간의 노력을 부각함으로써, 우주의 광대함과 인간의 도전 정신의 위대함, 그와 동시에 인간의 활동으로서 과학의 한계를 제시하도록 한다.","과학의 기본량 측정이나 생활 속의 측정 표준에서 학교 환경에서 사용가능한 다양한 디지털 탐구 도구를 적극적으로 활용한다."],"area":"integrated","electives":[],"prev":[],"next":[],"related":[]},{"id":"h1-02","grade":"h1","num":2,"title":"물질과 규칙성","standards":[{"code":"10통과1-02-01","text":"천체에서 방출되는 빛의 스펙트럼을 분석하여 우주 초기에 형성된 원소와 천체의 구성 물질을 추론할 수 있다."},{"code":"10통과1-02-02","text":"우주 초기의 원소들로부터 태양계의 재료이면서 생명체를 구성하는 원소들이 형성되는 과정을 통해 지구와 생명의 역사가 우주 역사의 일부분임을 해석할 수 있다."},{"code":"10통과1-02-03","text":"세상을 구성하는 원소들의 성질이 주기성을 나타내는 현상을 통해 자연의 규칙성을 도출하고, 지구와 생명체를 구성하는 주요 원소들이 결합을 형성하는 이유를 해석할 수 있다."},{"code":"10통과1-02-04","text":"인류의 생존에 필수적인 물, 산소, 소금 등이 만들어지는 결합의 차이를 이해하고 각 물질의 성질과 관련지어 설명할 수 있다."},{"code":"10통과1-02-05","text":"지각과 생명체를 구성하는 물질들이 기본 단위체의 결합을 통해서 형성된다는 것을 규산염 광물, 단백질과 핵산의 예를 통해 설명할 수 있다."},{"code":"10통과1-02-06","text":"지구를 구성하는 물질을 전기적 성질에 따라 구분할 수 있고, 물질의 전기적 성질을 응용하여 일상생활과 첨단기술에서 다양한 소재로 활용됨을 인식한다."}],"tamgu":["분광기를 활용하여 다양한 물질이 방출하는 스펙트럼을 관찰⋅비교하기","지구와 생명체의 구성 성분을 비교하여, 우주와 지구 역사를 통한 구성 성분의 유래 탐구하기","같은 족 원소들의 유사성을 탐구하는 실험 설계하기","이온 결합 화합물과 공유 결합 화합물의 성질을 비교하는 실험하기","DNA 모형을 제작하고 DNA의 구조적 특징과 규칙성 탐구하기"],"haeseol":[{"code":"10통과1-02-01","text":"분광기를 활용하여 수소의 선스펙트럼을 관찰하고 이를 우주 전역의 선스펙트럼을 관찰한 결과 자료와 비교함으로써 우주 진화 초기에 만들어진 수소와 헬륨이 현재 우주의 주요 구성 원소임을 파악하게 한다."},{"code":"10통과1-02-02","text":"별의 진화 과정에서 별 내부의 핵융합을 통해 탄소, 질소, 산소가 생성되는 것을 정성적으로 다루고, 초신성 폭발의 결과로 철보다 무거운 원소가 만들어짐을 다룬다."},{"code":"10통과1-02-03","text":"주기율표의 1족과 17족 원소를 통해 동족 원소는 유사한 화학적 성질을 가진다는 것을 다룬다. 주요 원소들이 화학 결합을 형성하는 이유를 전자껍질 모형을 이용한 전자배치를 통해 안정성을 지닌 원소와 비교하여 설명한다."},{"code":"10통과1-02-04","text":"각 화학 결합으로 나타나는 성질은 전기 전도성에 한정하여 다룬다."},{"code":"10통과1-02-05","text":"지각을 구성하는 규산염 광물은 Si–O 사면체를 기본 골격으로 하여 다양한 광물들이 만들어짐을 다루되, 구체적인 구조식이나 화학식은 다루지 않는다. 일정한 구조를 가진 기본 단위체들의 다양한 배열을 통해 여러 가지 구조와 기능을 갖는 생명체의 주요 구성 물질이 생성될 수 있음을 단백질과 핵산을 중심으로 학습하고, 기본 단위체를 비롯한 단백질과 핵산의 구체적인 구조식이나 화학식은 다루지 않는다."},{"code":"10통과1-02-06","text":"지구를 구성하는 여러 물질을 원자 내 자유전자의 이동에 따라 도체, 부도체, 반도체로 구분할 수 있고, 특히 규산염 광물이 반도체 소자의 재료가 되어 현대 사회에서 매우 유용하게 활용됨을 소개한다. 이때 반도체의 원리는 불순물을 추가함에 따라 전기적 성질을 제어하기 쉽다는 수준으로 소개하고 접합 원리는 다루지 않는다."}],"goryeo":["중학교 1~3학년군의 ‘태양계’, ‘지권의 변화’, ‘생식과 유전’, ‘물질의 구성’, 고등학교 ‘물리학’의 빛과 물질, ‘전자기와 양자’의 양자와 미시세계, ‘화학’의 물질의 구조와 성질, ‘생명과학’의 생명의 연속성과 다양성, ‘생물의 유전’의 유전자와 유전물질, ‘지구과학’의 지구의 역사와 한반도의 암석, ‘ 지구시스템과학’의 지구 탄생과 생동하는 지구, ‘ 행성우주과학’의 태양과 별의 관측과 연계된다."],"area":"integrated","electives":["물리학","생명과학","생물의 유전","전자기와 양자","지구과학","지구시스템과학","행성우주과학","화학"],"prev":["m13-07","m13-09","m13-11","m13-21"],"next":[],"related":[]},{"id":"h1-03","grade":"h1","num":3,"title":"시스템과 상호작용","standards":[{"code":"10통과1-03-01","text":"지구시스템은 태양계라는 시스템의 구성요소임을 알고, 지구시스템을 구성하는 권역들 간의 물질 순환과 에너지 흐름의 결과로 나타나는 현상을 논증할 수 있다."},{"code":"10통과1-03-02","text":"지권의 변화를 판구조론 관점에서 해석하고, 에너지 흐름의 결과로 발생하는 지권의 변화가 지구시스템에 미치는 영향을 추론할 수 있다."},{"code":"10통과1-03-03","text":"중력의 작용으로 인한 지구 표면과 지구 주위의 다양한 운동을 설명할 수 있다."},{"code":"10통과1-03-04","text":"상호작용이 없을 때 물체가 가속되지 않음을 알고, 충격량과 운동량의 관계를 충돌 관련 안전장치와 스포츠에 적용할 수 있다."},{"code":"10통과1-03-05","text":"생명 시스템을 유지하기 위해서 다양한 화학 반응과 물질 출입이 필요함을 이해하고, 일상생활에서 활용되는 화학 반응 사례를 조사하여 발표할 수 있다."},{"code":"10통과1-03-06","text":"생명 시스템의 유지에 필요한 세포 내 정보의 흐름을 유전자로부터 단백질이 만들어지는 과정을 중심으로 설명할 수 있다."}],"tamgu":["화산 분출로 인한 환경⋅사회경제적 피해의 종류를 조사하고, 지구와 생명 시스템 측면에서 피해를 줄이기 위한 대책 수립하기"],"haeseol":[{"code":null,"text":"[10통과1-03-01∼02] 지구시스템을 구성하는 권역들의 성층구조를 파악하게 한다. 기권, 수권 등 각 권역이 상호작용하는 과정의 에너지 흐름과 물질 순환으로 인해 지표의 변화, 날씨의 변화 등과 같은 여러 가지 과학적 현상이 일어남을 다룬다."},{"code":"10통과1-03-03","text":"지구 표면을 향해 낙하하거나 지구 주위를 공전하는 원운동은 모두 중력에 의한 지구 중심 방향의 가속도 운동임을 설명한다."},{"code":"10통과1-03-04","text":"일상생활의 역학 시스템에서 물체의 관성 및 충돌에 의한 안전사고 예방을 위한 대비책 및 장치를 고안할 때 관성 법칙과 충격량을 활용하게 한다."},{"code":"10통과1-03-05","text":"생명 시스템의 기본 단위인 세포에서 일어나는 화학 반응에 효소가 필요하고, 세포막을 통한 선택적 투과를 통해 물질 출입이 일어남을 학습한다."},{"code":"10통과1-03-06","text":"전사와 번역을 통해 유전물질로부터 단백질이 만들어지는 과정에 대해 학습하고, 생명 시스템의 유지를 위한 세포 내 정보의 흐름이 체계적으로 구성되어 있음을 이해한다."}],"goryeo":["중학교 1~3학년군의 ‘힘의 작용’, ‘운동과 에너지’, ‘생물의 구성과 다양성’ 및 ‘생식과 유전’, 고등학교 ‘지구시스템과학’의 지구 탄생과 생동하는 지구, ‘ 물리학’의 힘과 에너지, ‘ 역학과 에너지’의 시공간과 운동, ‘생명과학’의 생명 시스템의 구성, 생명의 연속성과 다양성, ‘세포와 물질대사’의 세포, 물질대사와 에너지, 세포호흡과 광합성 및 ‘생물의 유전’의 유전자와 유전물질, 유전자의 발현과 연계된다.","지구시스템의 균형이 깨짐으로써 인간세계에 주는 영향에 대해 조사⋅토론할 때, 주제와 관련된 과학이론이나 보도, 영상물, 전 지구 규모의 빅데이터와 시뮬레이션을 통해 지구시스템 차원의 연계성을 확인하고 디지털⋅인공지능 소양을 함양한다.","지구시스템을 구성하는 권역들 간의 상호작용이 지구 생명체의 존속에 기여하고 있으며, 미래세대를 위해 지구시스템을 최적의 상태로 보전해야 할 인류의 생태적 책임감을 인식시킨다.","자유 낙하와 수평으로 던진 물체의 운동을 시각화하여 비교하기","교통수단과 스포츠 등에서 충격을 줄이는 방법 탐색하기","막을 통한 물질의 이동을 실험하고 생명 활동 유지에서 세포막의 역할 탐구하기","효소 작용의 원리에 관한 실험하기","안전사고 예방 대비책 및 장치에 대한 고안은 과제 연구나 프로젝트 학습을 통해 창의적 산출물을 고안하도록 지도할 수 있다.","스마트 기기의 앱을 활용한 다중섬광사진, 가상현실 기기로 달에서의 중력 체험하기 등과 같이 디지털 탐구 도구를 적극 활용하여 디지털 소양을 함양함과 더불어 학생의 능동적 탐구를 유발한다.<통합과학2>가. 내용 체계핵심 아이디어⋅지구와 생명의 역사에 포함된 화학 반응에는 산화⋅환원 반응, 산⋅염기 반응이 있으며, 화학 변화에는 에너지가 출입한다.⋅지질시대를 통해 지질 구조를 포함한 환경과 생명체는 끊임없이 변천해왔으며, 변이의 발생과 자연선택의 과정을 통해 생명체가 진화하고 생물다양성이 형성된다.⋅생태계 구성 요소 사이의 균형적인 상호 관계가 생태계 평형 유지를 위해 중요함을 인식하고, 환경 보전을 위한 노력을 실천한다.⋅지구의 기후시스템은 태양복사와 지구복사의 영향을 받으며, 인간 활동에 의한 대기 중의 이산화 탄소 농도 증가가 기후에 영향을 미친다.⋅에너지는 여러 형태로 존재하면서 끊임없이 형태를 전환하는데, 이를 활용하여 전기 에너지를 얻을 수 있으며, 에너지의 지속가능하고 효율적인 활용이 중요하다.⋅인공지능과 로봇이 미래 사회에서 인간의 삶과 문명에 막대한 영향을 준다는 것과 과학기술 발전의 양면성을 인식하고, 건전한 가치 판단에 따라 책임 있게 과학기술을 사회에 적용하고 활용한다.구분범주 내용 요소지식⋅이해변화와 다양성⋅지질시대의 생물과 화석 ⋅지질시대 환경 변화와 대멸종⋅자연선택 ⋅생물다양성 ⋅산화와 환원 ⋅산성과 염기성⋅중화 반응 ⋅물질 변화에서 에너지 출입환경과 에너지⋅생태계 구성 요소 ⋅생태계 평형⋅대기와 해양의 상호작용 ⋅온실기체와 지구온난화⋅핵융합 ⋅발전 ⋅에너지 전환과 효율과학과 미래 사회⋅감염병과 병원체⋅인공지능과 과학 탐구 ⋅로봇⋅과학기술과 윤리과정⋅기능⋅자연 현상에서 문제를 인식하고 가설을 설정하기⋅변인을 조작적으로 정의하여 탐구 설계하기⋅다양한 도구를 활용하여 정보를 조사⋅수집⋅해석하기⋅수학적 사고와 모형을 활용하여 통합 및 융합 과학 관련 현상 설명하기⋅증거에 기반한 과학적 사고를 통해 자료를 과학적으로 분석 ⋅평가⋅추론하기⋅결론을 도출하고 자연 현상 및 융복합 문제 상황에 적용 ⋅설명하기⋅과학적 주장을 다양한 방법으로 소통하고, 의사결정을 위해 과학적 지식 활용하기"],"area":"integrated","electives":["물리학","생명과학","생물의 유전","세포와 물질대사","역학과 에너지","지구시스템과학"],"prev":["m13-02","m13-05","m13-19","m13-21"],"next":[],"related":[]},{"id":"h2-01","grade":"h2","num":1,"title":"변화와 다양성","standards":[{"code":"10통과2-01-01","text":"지질시대를 통해 지구 환경이 끊임없이 변화해 왔으며 이러한 환경 변화가 생물다양성에 미치는 영향을 추론할 수 있다."},{"code":"10통과2-01-02","text":"변이의 발생과 자연선택 과정을 통해 생물의 진화가 일어나고, 진화의 과정을 통해 생물다양성이 형성되었음을 추론할 수 있다."},{"code":"10통과2-01-03","text":"자연과 인류의 역사에 큰 변화를 가져온 광합성, 화석 연료 사용, 철의 제련 등에서 공통점을 찾아 산화와 환원을 이해하고, 생활 주변의 다양한 변화를 산화와 환원의 특징과 규칙성으로 분석할 수 있다."},{"code":"10통과2-01-04","text":"대표적인 산⋅염기 물질의 특징을 알고, 산과 염기를 혼합할 때 나타나는 중화 반응을 생활 속에서 이용할 수 있다."},{"code":"10통과2-01-05","text":"생활 주변에서 에너지를 흡수하거나 방출하는 현상을 찾아 에너지의 흡수 방출이 우리 생활에 어떻게 이용되는지 토의할 수 있다."}],"tamgu":["생물 대멸종의 원인과 그 이후의 변화를 설명하는 여러 가설들의 타당성 평가하기","자연선택 과정에 대한 모의실험하기","산과 염기를 혼합할 때 용액의 온도를 측정하여 그래프로 나타내기","가열장치 없이 물과 산화 칼슘을 이용한 음식 조리 방법 설계하고 실험하기"],"haeseol":[{"code":"10통과2-01-02","text":"변이의 발생과 자연선택 과정에 대한 모의실험을 수행하고 다윈의 자연선택설을 중심으로 생물의 진화를 학습한다. 생물다양성을 유전적 다양성, 종 다양성, 생태계 다양성으로 설명하고, 생물다양성을 보전하기 위한 구체적인 사례와 실천 방안을 탐색한다."},{"code":"10통과2-01-03","text":"산화⋅환원 반응을 산소와 전자의 이동으로 설명하되, 산화수는 다루지 않는다.가치⋅태도⋅과학의 심미적 가치⋅과학 유용성⋅자연과 과학에 대한 감수성⋅과학 창의성⋅과학 활동의 윤리성⋅과학 문제해결에 대한 개방성⋅안전⋅지속가능 사회에 기여⋅과학 문화 향유"},{"code":"10통과2-01-04","text":"산⋅염기 정의는 아레니우스 정의만 다루고, 중화 반응 과정에서의 변화는 용액의 온도 변화와 지시약의 색 변화만을 다룬다."},{"code":"10통과2-01-05","text":"화학 반응의 열 출입에서 열화학 반응식, 엔탈피를 다루지 않는다."}],"goryeo":["중학교 1∼3학년군 ‘생물의 구성과 다양성’, ‘지권의 변화’, ‘화학 반응의 규칙성’, 고등학교 ‘통합과학1’의 물질과 규칙성, ‘ 생명과학’의 생명의 연속성과 다양성, ‘ 지구과학’의 지구의 역사와 한반도의 암석, ‘화학’의 역동적인 화학 반응과 연계된다.","산화⋅환원 반응과 산 ⋅염기 반응을 화학 반응의 예시로 이해하기보다는 우리 주변에서 경험하는 다양한 변화와 다양성의 예시로 이해할 수 있도록 한다.","에너지를 흡수하거나 방출하는 현상은 초⋅중학교 과학에서 다룬 다양한 화학 변화와 물리 변화에 근거하여 예시를 찾도록 지도하고, 학습한 내용이 이후 다양한 지구 및 생명 현상에 적용됨을 이해하게 한다."],"area":"integrated","electives":["생명과학","지구과학","통합과학1","화학"],"prev":["m13-02","m13-09","m13-16"],"next":[],"related":[]},{"id":"h2-02","grade":"h2","num":2,"title":"환경과 에너지","standards":[{"code":"10통과2-02-01","text":"생태계 구성요소를 이해하고 생물과 환경 사이의 상호 관계를 설명할 수 있다."},{"code":"10통과2-02-02","text":"먹이 관계와 생태 피라미드를 중심으로 생태계 평형이 유지되는 과정을 이해하고, 환경의 변화가 생태계에 미칠 수 있는 영향에 대해 협력적으로 소통할 수 있다."},{"code":"10통과2-02-03","text":"온실효과 강화로 인한 지구온난화의 메커니즘을 이해하고, 엘니뇨, 사막화 등과 같은 현상이 지구 환경과 인간 생활에 미치는 영향과 대처 방안을 분석할 수 있다."},{"code":"10통과2-02-04","text":"태양에서 수소 핵융합 반응을 통해 질량 일부가 에너지로 바뀌고, 그중 일부가 지구에서 에너지 흐름을 일으키며 다양한 에너지로 전환되는 과정을 추론할 수 있다."},{"code":"10통과2-02-05","text":"발전기에서 운동 에너지가 전기 에너지로 전환되는 과정을 이해하고, 열원으로서 화석 연료, 핵에너지를 이용하는 발전소가 인간 생활에 미치는 영향을 조사⋅발표할 수 있다."},{"code
