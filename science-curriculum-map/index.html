서 일어나는 현상과 태양의 활동이 지구에 영향을 준다는 것을 설명할 수 있다. 지구의 자전과 공전의 의미, 일식과 월식, 달의 위상변화 등을 적절한 과학적 용어를 사용하여 표현할 수 있다.","과정·기능":"디지털 탐구 도구를 이용하여 태양계를 구성하는 천체의 특징에 관한 자료를 수집하고, 달의 위상을 달, 태양, 지구 그림에서 찾을 수 있다.","가치·태도":"밤하늘 천체에 호기심을 가지고, 육안으로 달과 행성을 관측할 수 있다."},"E":{"지식·이해":"태양계를 구성하는 천체의 다양함을 이해하고, 태양 표면에서 일어나는 현상을 설명하며, 달의 위상을 말할 수 있다.","과정·기능":"디지털 탐구 도구를 이용하여 태양계를 구성하는 천체를 찾아볼 수 있다.","가치·태도":"밤하늘 천체에 호기심을 가진다."}}},"m13-08":{"codes":{"9과08-01":{"A":"실험을 통해 물질의 밀도, 용해도, 끓는점, 녹는점 등을 구하고, 다양한 자료를 종합해 물질의 밀도, 용해도, 끓는점, 녹는점이 물질의 특성이 됨을 추론할 수 있다.","B":"밀도, 용해도, 녹는점, 끓는점 등을 설명하고 실험을 통해 구할 수 있다.","C":"밀도, 용해도, 녹는점, 끓는점 등을 설명하고 실험을 통해 구할 수 있다.","D":"밀도, 용해도, 녹는점, 끓는점이 물질의 특성임을 말할 수 있다.","E":"밀도, 용해도, 녹는점, 끓는점이 무엇인지 말할 수 있다."},"9과08-02":{"A":"일상생활의 여러 물질을 순물질과 혼합물로 구분하는 기준을 설정하고, 그에 따라 주변의 물질을 순물질과 혼합물로 분류할 수 있다.","B":"일상생활의 여러 물질을 순물질과 혼합물로 구분하는 기준을 설정하고, 그에 따라 주변의 물질을 순물질과 혼합물로 분류할 수 있다.","C":"순물질과 혼합물의 차이를 물질의 특성으로 설명하고, 그 예를 말할 수 있다.","D":"순물질과 혼합물의 차이를 물질의 특성으로 설명할 수 있다.","E":"순물질과 혼합물이 무엇인지 말할 수 있다."},"9과08-03":{"A":"물질의 특성을 이용하여 혼합물을 분리하는 방법을 설계하고 수행하며, 탐구를 통한 문제 해결 활동의 즐거움을 체험하고, 일상생활에서 활용되는 예를 찾아 설명하는 과정을 통해 과학의 유용성을 인식한다.","B":"물질의 특성을 이용한 혼합물의 분리 방법에 흥미를 가지고, 간단한 방법으로 혼합물을 분리하는 실험을 설계하고 수행할 수 있다.","C":"물질의 특성을 이용한 혼합물의 분리 방법을 설명하고, 혼합물의 분리 실험을 안내에 따라 수행할 수 있다.","D":"물질의 특성을 이용하여 혼합물을 분리하는 사례를 주변에서 찾을 수 있다.","E":"물질의 특성을 이용하여 혼합물의 분리가 가능함을 말할 수 있다. (9) 지권의 변화"}},"area":{"A":{"지식·이해":"물질은 서로 구별할 수 있는 고유한 특성을 가지며 그 사례로 밀도, 용해도, 끓는점, 녹는점이 있음을 이해한다. 또한 이러한 기준에 따라 다양한 물질을 순물질과 혼합물로 구분하고, 물질의 특성을 이용해 혼합물을 분리할 수 있으며, 혼합물 분리의 원리와 사례를 설명할 수 있다.","과정·기능":"물질의 밀도, 용해도, 끓는점, 녹는점 등을 실험으로 구하고, 이것이 물질의 특성이 될 수 있음을 추론할 수 있으며, 이를 이용해 혼합물을 분리하는 실험을 설계 및 수행할 수 있다.","가치·태도":"혼합물의 분리와 관련된 문제를 과학적 원리를 활용하여 해결하려는 태도를 가지며, 탐구를 통한 문제 해결 활동의 즐거움을 체험하고, 과학의 유용성을 인식한다."},"B":{"지식·이해":"밀도, 용해도, 끓는점, 녹는점을 구하는 방법을 설명하고, 이것이 물질의 특성이 될 수 있음을 말할 수 있으며, 각 물질의 특성을 이용한 혼합물의 분리 방법을 예를 들어 설명할 수 있다.","과정·기능":"물질의 밀도, 용해도, 끓는점, 녹는점 등을 실험으로 구하고, 혼합물을 분리하는 간단한 실험을 설계 및 수행할 수 있다.","가치·태도":"혼합물의 분리와 관련된 문제를 과학적 원리를 활용하여 해결하려는 태도를 가지며, 과학의 유용성을 인식한다."},"C":{"지식·이해":"밀도, 용해도, 끓는점, 녹는점을 구하는 방법을 설명하고, 이것이 물질의 특성이 될 수 있음을 말할 수 있으며, 각 물질의 특성을 이용한 혼합물의 분리 방법에 관해 설명할 수 있다.","과정·기능":"안내에 따라 실험을 수행하고 데이터를 분석하여 물질의 밀도, 용해도, 끓는점, 녹는점 등을 구하고, 혼합물을 분리하는 실험을 수행할 수 있다.","가치·태도":"혼합물의 분리와 관련된 문제를 과학적 원리를 활용하여 해결하려는 태도를 가진다."},"D":{"지식·이해":"밀도, 용해도, 끓는점, 녹는점이 각각 무엇인지 알고, 이것이 물질의 특성이 될 수 있음을 말할 수 있다. 순물질과 혼합물의 예를 제시하고, 물질의 특성을 이용하여 혼합물을 분리하는 사례를 주변에서 찾을 수 있다.","과정·기능":"안내된 절차에 따라 밀도, 용해도, 끓는점, 녹는점 등을 구하는 실험을 수행하고, 혼합물을 분리하는 실험을 수행할 수 있다.","가치·태도":"물질의 특성과 이를 이용한 혼합물 분리에 관심을 가진다."},"E":{"지식·이해":"밀도, 용해도, 끓는점, 녹는점이 각각 무엇인지 알고 순물질과 혼합물이 무엇인지 말할 수 있으며, 물질의 특성을 이용하여 혼합물의 분리가 가능함을 설명할 수 있다.","과정·기능":"안내된 절차에 따라 물질의 밀도, 용해도, 끓는점, 녹는점을 구하는 실험이나 혼합물을 분리하는 실험 중 하나를 수행할 수 있다.","가치·태도":"물질의 특성이나 혼합물의 분리에 관심을 가진다."}}},"m13-09":{"codes":{"9과09-01":{"A":"지구계 구성 요소의 특징과 상호 작용을 이해하고, 지구 내부 조사 방법을 통해 지권이 층상 구조로 이루어져 있음을 알며, 각 층의 특징을 조사하여 발표할 수 있다.","B":"지구계의 구성 요소 특징을 이해하여 예를 구분하고, 지권의 층상 구조와 각 층의 특징을 조사하여 발표할 수 있다.","C":"지구계의 구성 요소를 예를 들어 설명하고, 지권의 층상 구조를 조사하여 발표할 수 있다.","D":"지구계의 구성 요소와 지권의 층상 구조를 말할 수 있다.","E":"지구계의 구성 요소를 말할 수 있다."},"9과09-02":{"A":"조암 광물의 주요 특성을 관찰하여 조암 광물을 구분하고, 암석과 광물의 활용 방안을 조사하며 자원으로서 가치를 토론하여 암석과 광물의 중요성을 인식한다.","B":"조암 광물을 관찰하여 조암 광물의 주요 특성을 알고, 암석과 광물의 활용 방안 및 자원으로서의 가치에 대해 조사할 수 있다.","C":"조암 광물을 관찰하여 조암 광물의 주요 특성을 알고, 일상생활에서 암석과 광물이 활용되는 사례를 제시할 수 있다.","D":"조암 광물을 관찰하여 조암 광물의 명칭을 말하고, 일상생활에서 암석과 광물이 활용됨을 안다.","E":"조암 광물을 관찰하여 조암 광물의 종류가 다양함을 말할 수 있다."},"9과09-03":{"A":"화성암, 퇴적암, 변성암의 특징을 관찰하여 생성 과정에 따라 분류하고, 이를 암석의 순환 과정과 관련지어 설명할 수 있다.","B":"화성암, 퇴적암, 변성암의 특징을 관찰하여 생성 과정에 따라 분류하고, 암석 순환의 의미를 설명할 수 있다.","C":"화성암, 퇴적암, 변성암의 이름을 알고, 암석의 특징을 관찰할 수 있으며, 암석이 순환함을 말할 수 있다.","D":"화성암, 퇴적암, 변성암의 이름을 알고, 암석의 특징을 관찰할 수 있다.","E":"암석을 관찰하여 암석의 특징이 다름을 말할 수 있다."},"9과09-04":{"A":"풍화 과정을 이해하고, 토양 생성 과정을 풍화 작용으로 설명할 수 있다.","B":"풍화 과정을 이해하고, 토양 생성 과정을 풍화 작용으로 설명할 수 있다.","C":"풍화 과정을 예를 통해 이해하고, 토양의 층상 구조를 말할 수 있다.","D":"풍화 과정을 예를 통해 이해하고, 토양의 층상 구조를 말할 수 있다.","E":"풍화의 의미를 말할 수 있다."},"9과09-05":{"A":"대륙이동설의 증거를 제시하고, 판의 이동과 분포를 이해하며, 빅데이터를 활용하여 지진과 화산이 발생하는 지역의 분포를 판의 경계와 관련지어 설명할 수 있다.","B":"대륙이동설의 증거를 이해하고, 판의 종류를 구분하며, 빅데이터를 활용하여 지진과 화산이 발생하는 지역의 분포를 판의 경계와 관련지어 설명할 수 있다.","C":"대륙이동설의 의미와 판의 개념을 이해하고, 빅데이터를 활용하여 지진과 화산이 자주 발생하는 지역의 규칙성을 찾을 수 있다.","D":"대륙이동설의 의미를 알고, 디지털 탐구 도구를 이용하여 지진과 화산이 발생하는 지역을 찾아볼 수 있다.","E":"지구의 겉부분이 여러 개의 판으로 이루어져 있음을 말할 수 있다. (10) 빛과 파동"}},"area":{"A":{"지식·이해":"지구계의 구성 요소 특징을 이해하고, 지구계의 구성 요소가 상호 작용한다는 것과 다양한 지구 내부 조사 방법을 통해 지권이 층상 구조로 이루어져 있음을 설명할 수 있다. 지구의 표면과 암석이 풍화되어 토양이 생성됨을 이해하고, 토양 생성 과정을 모식도를 이용하여 풍화 작용과 연관 지어 설명할 수 있다. 과학적 증거를 기반으로 대륙이동설을 설명하고, 지구 겉부분을 구성하고 있는 것이 판임을 알며, 판의 분포와 이동에 의해 지진과 화산과 같은 지각변동이 일어남을 이해할 수 있다.","과정·기능":"조암 광물의 색, 조흔색, 굳기, 염산 반응, 자성 등 주요 특성을 관찰하여 조암 광물을 구분하고, 루페나 돋보기를 이용하여 암석을 면밀하게 관찰하여 암석의 특성을 정리할 수 있다. 암석 관찰 결과를 바탕으로 암석을 생성 과정에 따라 화성암, 퇴적암, 변성암으로 분류하고, 이를 암석의 순환과 연관 지어 종합적으로 설명할 수 있다. 디지털 탐구 도구를 활용하여 지진과 화산 관련 빅데이터를 수집 및 분석하고, 지진과 화산의 분포를 판의 경계와 관련지어 추론할 수 있다.","가치·태도":"지구계의 구성 요소, 광물, 암석, 토양 등에 관심을 가지고 주변에서 찾아보며, 암석과 광물의 활용 방안 및 자원으로서 가치에 대해 조사하여 그 중요성을 인식한다. 지권에서 일어나는 지진과 화산과 같은 지각 변동에 관심을 가지고, 안전한 사회를 위해 지진과 화산이 발생하였을 때의 대처 방안을 수립하여 실천할 수 있다."},"B":{"지식·이해":"지구계의 구성 요소 특징을 이해하고 다양한 예를 제시할 수 있다. 토양 생성 과정을 순서대로 나열하고, 대륙이동설의 증거를 이해할 수 있다. 지구의 겉부분이 여러 개의 판으로 구성됨을 알고 판을 대륙판과 해양판으로 구분할 수 있다.","과정·기능":"조암 광물의 주요 특성을 관찰하여 관찰한 내용을 일목요연하게 정리할 수 있다. 암석의 관찰을 통해 암석의 특성을 파악하여 암석을 생성 과정에 따라 분류할 수 있다. 지진과 화산 관련 빅데이터를 수집하고 분석하여, 지진과 화산의 분포를 판과 관련지어 설명할 수 있다.","가치·태도":"지구계의 구성 요소, 광물, 암석, 토양 등에 관심을 가지고, 암석과 광물의 활용 방안 및 자원으로서 가치에 대해 조사한다. 지권에서 일어나는 지진과 화산과 같은 지각 변동에 관심을 가지고, 안전하고 지속가능 사회를 위해 지진과 화산이 발생하였을 때 대처 방안을 수립할 수 있다."},"C":{"지식·이해":"지구계 구성 요소의 특징과 지구의 층상 구조의 특징을 이해할 수 있다. 토양 층상 구조를 구분하고, 대륙이동설의 증거를 설명할 수 있다. 다양한 예를 통해 풍화 과정을 이해할 수 있다.","과정·기능":"암석을 이루는 조암 광물을 관찰하여 조암 광물과 암석의 이름을 말할 수 있다. 지진과 화산 관련 빅데이터를 수집하여 지진과 화산이 자주 발생하는 지역의 규칙성을 찾을 수 있다.","가치·태도":"암석과 광물의 활용 방안 및 자원으로서의 가치에 대해 조사한다. 지권에서 일어나는 지진과 화산과 같은 지각 변동에 관심을 가지고, 지진과 화산이 우리의 생활에 미치는 영향을 인식한다."},"D":{"지식·이해":"지구계의 구성 요소, 지권의 층상 구조, 토양의 층상 구조를 제시할 수 있다. 자료를 통하여 대륙이 이동하였음과 지진과 화산 등의 현상이 지구 곳곳에서 발생함을 이해할 수 있다.","과정·기능":"조암 광물과 암석을 관찰하여 관찰한 내용을 기록하고, 지진과 화산 관련 빅데이터 수집 활동에 참여할 수 있다.","가치·태도":"암석과 광물의 활용 방안을 조사하고, 지권에서 일어나는 지진과 화산과 같은 지각 변동에 관심을 가진다."},"E":{"지식·이해":"지구계의 구성 요소와 풍화의 의미를 설명하고, 지구가 여러 개의 판으로 이루어져 있음을 이해할 수 있다.","과정·기능":"조암 광물과 암석을 관찰하고, 교사가 제시한 지진과 화산 자료에서 지진과 화산이 자주 발생하는 지역을 찾아볼 수 있다.","가치·태도":"지권에서 일어나는 지진과 화산과 같은 지각 변동에 관심을 가진다."}}},"m13-10":{"codes":{"9과10-01":{"A":"빛의 반사 법칙과 굴절의 원리를 이해하고, 물체를 보는 과정을 빛의 반사와 관련지어 빛의 진행 경로로 나타내며 이를 설명할 수 있다.","B":"실험을 통하여 빛의 반사, 굴절의 특징을 확인하고, 물체를 보는 과정을 빛의 진행 경로를 이용하여 표현할 수 있다.","C":"빛의 반사와 굴절 현상의 예를 찾고, 물체를 보는 과정을 빛의 진행 경로로 말할 수 있다.","D":"빛의 반사와 굴절 현상의 예를 찾고, 물체를 보려면 빛이 있어야 함을 말할 수 있다.","E":"빛이 물체를 만나면 반사하거나 굴절함을 알고, 물체를 보려면 빛이 있어야 함을 말할 수 있다."},"9과10-02":{"A":"평면거울에서 상이 생기는 원리를 빛의 반사 법칙으로 설명하고, 일상생활에서 사용되는 거울과 렌즈의 종류를 분류하며, 상의 특징을 비교할 수 있다.","B":"평면거울에서 상이 생기는 원리를 빛의 반사 법칙으로 설명하고, 여러 가지 거울과 렌즈를 이용해 상을 만들어 상의 특징을 말할 수 있다.","C":"평면거울에서 상이 생기는 원리를 빛의 반사 법칙으로 설명하고, 여러 가지 거울과 렌즈를 이용해 상을 만들어 상의 특징을 말할 수 있다.","D":"평면거울에서 상이 생기는 것을 빛의 반사 법칙으로 설명할 수 있다.","E":"평면거울이 만드는 상의 특징을 말할 수 있다."},"9과10-03":{"A":"물체의 색은 물체가 반사한 빛이 합성되어 나타난 것임을 설명하고, 영상 장치에서 빛의 합성을 이용하여 다양한 색이 표현되는 원리를 이해할 수 있으며, 일상생활에서 빛의 합성과 관련하여 과학 지식이 유용하게 활용됨을 인식한다.","B":"물체의 색은 물체의 표면에서 반사한 빛이 합성되어 나타난 것임을 알고, 영상 장치에서 빛의 합성에 의해 다양한 색이 표현됨을 알 수 있으며, 여러 가지 영상 장치에서 빛의 합성을 이용하여 다양한 색을 관찰하는 데 적극적으로 참여할 수 있다.","C":"물체의 색이 물체에서 반사된 빛들의 합성으로 만들어짐을 말할 수 있고, 여러 가지 영상 장치들의 빛의 삼원색 관찰에 적극적으로 참여할 수 있다.","D":"영상 장치가 표현하는 색이 빛의 삼원색의 합성임을 말할 수 있으며, 여러 가지 영상 장치들의 빛의 삼원색 관찰에 참여할 수 있다.","E":"빛의 삼원색을 말할 수 있으며, 영상 장치와 같이 빛으로 색을 표현하는 것에 관심을 가진다."},"9과10-04":{"A":"파동의 발생과 전달 과정을 이해하고, 디지털 탐구 도구를 사용하여 음악 등 일상생활의 다양한 소리를 파형으로 나타내며, 각 소리의 특징을 분석하여 설명할 수 있다.","B":"실험을 통하여 다양한 소리의 진폭, 진동수, 파형을 관찰하고, 이를 통해 소리의 세기, 높낮이, 맵시의 차이를 말할 수 있다.","C":"소리는 파동의 일종이며, 소리의 세기, 소리의 높낮이, 맵시가 다른 소리를 파동에 관한 과학적 용어로 표현할 수 있다.","D":"파동은 물체의 진동으로 만들어지며, 매질을 통하여 전달됨을 알 수 있다.","E":"파동이 에너지를 전달하는 과정임을 말할 수 있다. (11) 물질의 구성"}},"area":{"A":{"지식·이해":"빛의 반사 법칙과 굴절의 원리를 이해하고, 물체를 보는 과정을 빛의 반사와 관련지어 경로로 나타내고 설명할 수 있다. 평면거울에서 상이 생기는 원리를 빛의 반사 법칙을 적용하여 설명하고, 일상생활에서 사용되는 거울과 렌즈의 종류를 분류하며, 상의 특징을 비교하여 설명할 수 있다. 영상 장치에서 빛의 합성을 이용하여 다양한 색이 표현되는 원리를 이해하고, 파동의 발생과 전달 과정을 이해하며, 소리의 특징을 파동으로 설명할 수 있다.","과정·기능":"물체를 보는 과정을 빛의 반사와 관련지어 빛의 진행 경로로 나타내고, 일상생활에서 사용되는 거울과 렌즈의 종류를 분류하며 상의 특징을 비교할 수 있다. 디지털 탐구 도구를 사용하여 음악 등 일상생활의 다양한 소리를 파형으로 나타내고, 각 소리의 특징을 분석할 수 있다.","가치·태도":"빛과 파동에 관한 과학 지식이 일상생활에 유용하게 활용됨을 인식하고, 관련 현상을 설명하는 데 과학적 원리를 활용하는 태도를 가진다."},"B":{"지식·이해":"물체를 보는 과정을 빛의 진행 경로로 설명하고, 평면거울에서 상이 생기는 원리를 빛의 반사 법칙으로 설명하며, 여러 가지 거울과 렌즈가 만드는 상의 특징을 말할 수 있다. 물체의 색은 표면에서 반사한 빛이 합성되어 나타난 것임을 알고 다양한 소리가 진폭, 진동수, 맵시 차이로 나타남을 말할 수 있다.","과정·기능":"실험을 통하여 빛의 반사, 굴절의 특징을 확인하고, 물체를 보는 과정을 빛의 진행 경로로 나타낼 수 있다. 여러 가지 거울과 렌즈를 이용하여 상을 만들어 그 특징을 구분하고, 실험을 통하여 다양한 소리의 진폭, 진동수, 파형을 관찰할 수 있다.","가치·태도":"빛과 파동에 의해 나타나는 현상에 흥미와 호기심을 가지고, 과학적 용어를 사용하여 설명하려는 태도를 가진다."},"C":{"지식·이해":"물체를 보는 과정을 빛의 진행 경로로 말하고, 평면거울에서 상이 생기는 과정을 빛의 반사 법칙으로 말할 수 있다. 물체의 색이 물체에서 반사된 빛들의 합성으로 만들어짐을 말하고, 소리는 파동임을 말할 수 있다.","과정·기능":"빛의 반사와 굴절 현상의 예를 찾고, 여러 가지 거울과 렌즈를 이용하여 상을 만 들어 관찰 하며, 소 리의 세기, 소 리의 높낮 이, 맵시 가 다 른 소리 를 파동에 관한 과학적 용어로 표현할 수 있다.","가치·태도":"빛과 파동에 의해 나타나는 현상에 흥미와 호기심을 가지고, 과학적 용어를 사용하여 설명하려는 태도를 가진다."},"D":{"지식·이해":"물체를 보려면 빛이 있어야 함을 말하고, 평면거울에서 상이 생기는 과정을 빛의 반사 법칙으로 말할 수 있다. 영상 장치가 표현하는 색이 빛의 삼원색의 합성임을 말며, 파동은 물체의 진동으로 만들어지고 매질을 통해 전달됨을 알 수 있다.","과정·기능":"빛의 반사와 굴절 현상의 예를 찾고, 평면거울에 생긴 상을 관찰하여 그 특징을 말할 수 있다.","가치·태도":"빛과 파동에 의해 나타나는 현상에 관심을 가지고 관련 탐구 활동에 적극적으로 참여할 수 있다."},"E":{"지식·이해":"빛이 물체를 만나면 반사하거나 굴절함을 알고, 평면거울이 만드는 상의 특징을 말하며, 빛의 삼원색과 파동의 의미를 말할 수 있다.","과정·기능":"여러 가지 거울과 렌즈를 이용해 상을 만들어 관찰할 수 있다.","가치·태도":"빛과 파동에 의해 나타나는 현상에 관심을 가지고 관련 탐구 활동에 참여할 수 있다."}}},"m13-11":{"codes":{"9과11-01":{"A":"원소와 화합물의 정의를 알고, 주변의 물질을 원소와 화합물로 나누어 화학식으로 표현할 수 있다.","B":"원소와 화합물의 정의를 알고, 주변의 물질을 원소와 화합물로 나눌 수 있다.","C":"원소와 화합물의 정의를 알고, 주변의 물질을 원소와 화합물로 나눌 수 있다.","D":"원소의 정의를 알고, 원소 기호를 이용하여 나타낼 수 있다.","E":"물질을 이루는 구성 성분이 원소임을 말할 수 있다."},"9과11-02":{"A":"원자의 구성 요소를 모형을 이용하여 나타내고, 양성자 수에 따라 원소의 종류가 달라짐을 설명할 수 있다.","B":"원자의 구성 요소를 모형을 이용하여 나타낼 수 있다.","C":"원자가 양성자, 중성자, 전자로 구성됨을 말할 수 있다.","D":"원자가 양성자, 중성자, 전자로 구성됨을 말할 수 있다.","E":"물질을 구성하는 기본 입자가 원자임을 말할 수 있다."},"9과11-03":{"A":"주기율표상 원소 배치 규칙을 알고, 같은 족 원소들이 가지고 있는 화학적 성질을 탐구하여 유사성을 파악하며, 주기율표의 유용성을 인식한다.","B":"주기율표상 원소 배치 규칙을 알고, 같은 족 원소들이 가지고 있는 화학적 성질을 탐구하여 유사성을 파악하며, 주기율표의 유용성을 인식한다.","C":"주기율표상 원소 배치에 관심을 가지고 화학적 성질이 유사한 원소들을 주기율표에서 찾을 수 있다.","D":"원소들은 양성자의 수에 따라 주기율표에 배치됨을 말할 수 있다.","E":"주기율표의 의미를 간단하게 말할 수 있다."},"9과11-04":{"A":"물질을 이루는 입자를 원자, 분자, 이온으로 구분하여 설명하고, 이온의 생성을 모형과 이온식으로 표현할 수 있으며 전기력이 작용할 때 이온의 움직임을 근거로 이온이 전하를 띠고 있음을 설명할 수 있다.","B":"물질을 이루는 입자를 원자, 분자, 이온으로 구분하여 설명하고, 이온은 이온식으로 표현할 수 있으며, 전기력이 작용할 때 이온의 움직임을 근거로 이온은 전하를 띠고 있음을 설명할 수 있다.","C":"원자와 분자의 차이를 알고, 원자로부터 이온이 생성되는 과정을 이온식으로 표현할 수 있다.","D":"물질을 이루는 입자로 원자, 이온 등이 있음을 말하고, 전기력을 이용하여 이온의 움직임을 관찰하는 실험을 수행할 수 있다.","E":"물질을 이루는 입자로 원자, 분자, 이온 등이 있음을 말할 수 있다. (12) 식물과 에너지"}},"area":{"A":{"지식·이해":"정의에 따라 주변의 물질을 원소와 화합물로 분류하고, 화학식으로 표현할 수 있다. 원소의 종류에 따라 어떤 차이가 있는지 설명하며, 원소가 주기율표에 어떤 순서로 배치되었고 위치상 성질이 비슷한 원소는 무엇인지 말할 수 있다. 물질을 이루는 입자를 원자, 분자, 이온으로 구분하여 설명하고 화학식으로 표현할 수 있으며, 모형으로 나타낼 수 있다.","과정·기능":"원소의 종류에 따라 원자를 구성하는 입자를 모형으로 나타내고, 자료를 비교･분석하여 동족 원소는 화학적 성질이 유사함을 찾을 수 있다. 전기력을 이용한 이온의 움직임에 관한 실험을 수행하고 이온의 움직임을 관찰하여 이온이 전하를 띠고 있음을 추론하고 이온의 형성과정을 모형으로 나타낼 수 있다.","가치·태도":"주기율표와 원소에 관심을 가지고, 주변의 물질을 구성하는 원소를 찾으려는 호기심을 가진다."},"B":{"지식·이해":"정의에 따라 주변의 물질을 원소와 화합물로 구분하고, 주기율표에 원소가 어떤 순서로 배치되었고 위치상 성질이 비슷한 원소는 무엇인지 말할 수 있다. 물질을 이루는 입자를 원자, 분자, 이온으로 구분하여 설명하고, 원자나 이온을 화학식으로 표현할 수 있다.","과정·기능":"원자의 구성 입자를 모형으로 나타내고, 같은 족 원소의 화학적 성질이 유사함을 자료를 비교하고 분석하여 찾을 수 있다. 전기력이 작용할 때 이온의 움직임을 관찰하여 이온이 전하를 띠고 있음을 추론할 수 있다.","가치·태도":"주기율표와 원소에 관심을 가지고, 주변의 물질을 구성하는 원소를 찾으려는 호기심을 가진다."},"C":{"지식·이해":"정의에 따라 주변의 물질을 원소와 화합물로 구분하고, 주기율표를 보고 원소 배치 규칙을 말하며 성질이 비슷한 원소를 찾을 수 있다. 원소를 이루는 원자는 더 작은 입자로 구성되어 있음을 알고, 각 원소를 원소 기호로 나타낼 수 있으며, 원자와 분자를 구별할 수 있다.","과정·기능":"같은 원소의 화학적 성질이 비슷함을 자료를 이용하여 찾고, 전기력이 작용할 때 이온의 움직임에 관한 실험 결과를 해석할 수 있다.","가치·태도":"주기율표와 원소에 관심을 가지고, 전기장 내에서 이온의 움직임에 호기심을 가진다."},"D":{"지식·이해":"원소는 물질을 구성하는 기본 성분으로 원자로 구성되고, 원자는 더 작은 입자로 구성되어 있음을 말할 수 있다. 원소를 원소 기호로 나타내고, 원소는 주기율표에 일정한 순서로 배치됨을 말할 수 있다. 물질을 이루는 입자로 원자, 분자, 이온 등이 있음을 말할 수 있다.","과정·기능":"같은 족 원소의 성질에 관한 자료를 찾아 비교하고, 전기력이 작용할 때 이온의 움직임에 관한 실험 결과를 정리할 수 있다.","가치·태도":"주기율표의 원소 배치 또는 전기장 내에서 이온의 움직임에 관심을 가진다."},"E":{"지식·이해":"원소는 물질을 구성하는 기본 성분으로 원자로 구성되고, 원자, 분자, 이온 등으로 물질이 구성됨을 말하며, 주기율표가 무엇인지 말할 수 있다.","과정·기능":"같은 족 원소의 성질에 관한 자료를 수집하고, 전기력이 작용할 때 이온의 움직임을 관찰할 수 있다.","가치·태도":"주기율표에 관심을 가진다."}}},"m13-12":{"codes":{"9과12-01":{"A":"광합성 과정을 이해하고, 환경 요인과 광합성의 관계를 탐구하기 위해 독립 변인과 종속 변인을 구분하여 실험을 설계하고 그 결과를 종합할 수 있다.","B":"광합성 과정을 이해하고, 환경 요인과 광합성의 관계를 알아보는 실험에서 독립 변인과 종속 변인을 구분하며, 적절한 실험 도구를 선택하여 실험을 설계할 수 있다.","C":"광합성에 영향을 미치는 환경 요인을 말하고, 이와 광합성의 관계를 탐구하는 실험에서 독립 변인과 종속 변인을 구분하여 실험을 수행하고 그 결과를 정리할 수 있다.","D":"광합성에 필요한 물질과 산물 확인 실험을 수행하여 필요한 물질과 생성물질을 구별하여 그 결과를 정리하고 설명할 수 있다.","E":"식물이 광합성을 통해 만들어 내는 물질을 말하고, 광합성에 필요한 물질과 산물 확인 실험을 주어진 절차대로 수행할 수 있다."},"9과12-02":{"A":"식물의 호흡과 광합성의 관계에 대해 이해하고, 호흡과 광합성 과정에서 에너지의 출입과 물질의 변화를 분석할 수 있다.","B":"식물의 호흡과 광합성 과정에서 출입하는 에너지와 물질을 비교할 수 있다.","C":"식물의 호흡과 광합성 과정 각각에서 출입하는 에너지와 물질을 말할 수 있다.","D":"호흡은 에너지를 방출하는 과정이고, 광합성은 에너지를 흡수하는 과정임을 말할 수 있다.","E":"식물이 생명 활동을 하기 위해서는 호흡과 광합성이 모두 필요함을 말할 수 있다."},"9과12-03":{"A":"광합성 산물의 저장과 이용 과정을 이해하고, 모형을 제작하여 설명할 수 있다.","B":"광합성 산물의 저장과 이용 과정을 이해하고, 모형으로 표현할 수 있다.","C":"광합성 산물의 저장과 이용 과정을 이해하고, 제시된 모형으로 설명할 수 있다.","D":"광합성 산물의 저장과 이용 과정을 말할 수 있다.","E":"광합성 산물의 저장 과정을 말할 수 있다. (13) 동물과 에너지"}},"area":{"A":{"지식·이해":"광합성 과정, 식물의 호흡과 광합성의 관계에 대해 이해하고, 광합성 산물의 저장과 이용 과정을 이해할 수 있다.","과정·기능":"환경 요인과 광합성의 관계를 탐구하기 위해 독립 변인과 종속 변인을 구분하여 실험 설계를 하고 결과를 종합할 수 있다. 호흡과 광합성 과정에서 에너지의 출입과 물질의 변화를 분석하고, 광합성 산물의 저장과 이용 과정에 대한 모형을 제작하여 설명할 수 있다.","가치·태도":"식물이 광합성을 통해 생태계에 양분을 공급한다는 생태적 가치를 인식하고, 식물을 소중히 대하는 마음을 가진다."},"B":{"지식·이해":"광합성 과정, 광합성 산물의 저장과 이용 과정을 이해할 수 있다.","과정·기능":"환경 요인과 광합성의 관계를 알아보는 실험에서 독립 변인과 종속 변인을 구분하고, 적절한 실험 도구를 선택하여 실험 설계를 할 수 있다. 식물의 호흡과 광합성 과정에서 출입하는 에너지와 물질을 비교할 수 있다. 광합성 산물의 저장과 이용 과정을 모형으로 나타낼 수 있다.","가치·태도":"식물이 광합성을 통해 생태계에 양분을 공급한다는 생태적 가치를 인식한다."},"C":{"지식·이해":"광합성에 영향을 미치는 환경 요인을 말하고, 식물의 호흡과 광합성 과정 각각에서 출입하는 에너지와 물질을 말할 수 있다. 광합성 산물의 저장과 이용 과정을 이해하고, 제시된 모형으로 설명할 수 있다.","과정·기능":"환경 요인과 광합성의 관계를 알아보는 실험에서 독립 변인과 종속 변인을 구분하여 실험을 수행하고 그 결과를 정리할 수 있다.","가치·태도":"식물이 광합성을 통해 생태계에 양분을 공급한다는 생태적 가치를 인식한다."},"D":{"지식·이해":"광합성에 필요한 물질과 생성물질을 구분하여 설명하고, 호흡은 에너지를 방출하는 과정이며, 광합성은 에너지를 흡수하는 과정임을 말할 수 있다. 광합성 산물의 저장과 이용 과정을 말할 수 있다.","과정·기능":"광합성에 필요한 물질과 산물 확인 실험을 수행하여 필요물질과 생성물질을 구별하여 실험 결과를 정리할 수 있다.","가치·태도":"식물의 엽록체에서 광합성이 일어남을 인식한다."},"E":{"지식·이해":"식물이 광합성을 통해 물질을 만들어 낸다는 것과 식물은 생명 활동을 위해 호흡과 광합성이 모두 필요하다는 것을 말할 수 있다. 광합성 산물의 저장 과정을 말할 수 있다.","과정·기능":"광합성에 필요한 물질과 산물 확인 실험을 주어진 절차대로 수행할 수 있다.","가치·태도":"식물이 초록색인 이유에 대해 호기심을 가진다."}}},"m13-13":{"codes":{"9과13-01":{"A":"소화계의 구조와 기능을 이해하고, 영양소 검출 실험과 침의 소화 작용을 탐구하는 실험을 통해 몸에 필요한 영양소를 얻기 위해서는 음식물의 소화 과정이 필요함을 추론할 수 있다.","B":"소화계의 구조와 기능을 이해하고, 영양소 검출 실험과 침의 소화 작용을 탐구하는 실험을 통해 음식물이 소화 효소의 작용에 의해 소화됨을 설명할 수 있다.","C":"소화계의 구조와 기능을 설명하고, 침의 소화 작용을 탐구하는 실험을 수행할 수 있다.","D":"소화계를 구성하는 기관을 나열하고, 주어진 절차대로 침의 소화 작용을 탐구하는 실험을 수행할 수 있다.","E":"소화계의 기능을 말하고, 주어진 절차대로 침의 소화 작용을 탐구하는 실 험 을 수행할 수 있 다."},"9과13-02":{"A":"순환계의 구조와 기능을 이해하고, 혈액의 순환 경로를 종합하여 발표할 수 있다.","B":"순환계의 구조와 기능을 이해하고, 온몸순환과 폐순환의 경로를 각각 말할 수 있다.","C":"순환계의 구조와 기능을 설명할 수 있다.","D":"순환계를 구성하는 기관들을 나열할 수 있다.","E":"순환계의 기능을 말할 수 있다."},"9과13-03":{"A":"호흡계의 구조와 기능을 이해하고, 호흡 운동의 원리를 모형으로 만들어 호흡계의 구조와 기능을 설명할 수 있다.","B":"호흡계의 구조와 기능을 이해하고, 호흡 운동의 원리를 나타내는 모형을 만들어 호흡계의 구조와 모형의 구조를 대응하여 말할 수 있다.","C":"호흡계의 구조와 기능을 설명하고, 호흡 운동의 원리를 나타내는 모형을 만들 수 있다.","D":"호흡계를 구성하는 기관들을 나열하고, 호흡 운동의 원리를 나타내는 모형을 만들 수 있다.","E":"호흡계의 기능을 말하고, 교사의 안내에 따라 호흡 운동의 원리를 나타내는 모형을 만들 수 있다."},"9과13-04":{"A":"배설계의 구조와 기능을 이해하고, 노폐물이 배설되는 과정을 모식도로 표현하며, 이를 글이나 말로 설명할 수 있다.","B":"배설계의 구조와 기능을 이해하고, 노폐물이 배설되는 과정을 모식도로 표현할 수 있다.","C":"배설계의 구조와 기능을 설명하고, 노폐물이 배설되는 과정을 모식도를 통해 이해할 수 있다.","D":"배설계를 구성하는 기관들을 나열할 수 있다.","E":"배설계의 기능을 말할 수 있다."},"9과13-05":{"A":"동물이 세포호흡을 통해 에너지를 얻는 과정을 소화, 순환, 호흡, 배설과 관련지어 통합적으로 설명할 수 있다.","B":"동물이 세포호흡에서 에너지를 얻는 과정에 필요한 물질과 생성되는 물질은 소화, 순환, 호흡, 배설 과정을 통해 공급되고 배설됨을 설명할 수 있다.","C":"동물이 세포호흡을 통해 에너지를 얻는 과정에서 필요한 물질과 생성되는 물 질 을 나열할 수 있 다.","D":"동물의 세포호흡은 에너지를 얻는 과정임을 말할 수 있다.","E":"동물이 세포호흡을 통해 생명 활동을 유지함을 말할 수 있다. (14) 전기와 자기"}},"area":{"A":{"지식·이해":"소화계, 순환계, 호흡계, 배설계의 구조와 기능을 이해하고, 동물이 세포호흡을 통해 에너지를 얻는 과정을 소화, 순환, 호흡, 배설과 관련지어 통합적으로 설명할 수 있다.","과정·기능":"영양소 검출 실험과 침의 소화 작용을 탐구하는 실험을 통해 몸에 필요한 영양소를 얻기 위해 음식물의 소화 과정이 필요함을 추론할 수 있다. 혈액의 순환 경로를 종합하여 발표하고, 호흡 운동의 원리를 모형으로 만들어 호흡계의 구조와 기능을 설명할 수 있다. 노폐물이 배설되는 과정을 모식도로 표현하고 글이나 말로 설명할 수 있다.","가치·태도":"여러 기관계가 유기적으로 작동하여 생명 활동을 유지하는 인체에 흥미를 가지고, 생명 존중의 마음을 가진다."},"B":{"지식·이해":"소화계, 순환계, 호흡계, 배설계의 구조와 기능을 이해하며, 동물의 세포호흡을 통해 에너지를 얻는 과정에 필요한 물질과 생성되는 물질은 소화, 순환, 호흡, 배설 과정을 통해 공급되고 배설됨을 설명할 수 있다.","과정·기능":"영양소 검출 실험과 침의 소화 작용을 탐구하는 실험을 통해 음식물이 소화 효소의 작용에 의해 소화됨을 설명할 수 있다. 호흡 운동의 원리를 나타내는 모형을 만들고 호흡계의 구조와 모형의 구조를 대응하여 말할 수 있다. 노폐물이 배설되는 과정을 모식도로 표현할 수 있다.","가치·태도":"여러 기관계가 유기적으로 작동하여 생명 활동을 유지하는 인체에 흥미를 가진다."},"C":{"지식·이해":"소화계, 순환계, 호흡계, 배설계의 구조와 기능을 설명하고, 동물이 세포호흡을 통해 에너지를 얻는 과정에서 필요한 물질과 생성되는 물질을 나열할 수 있다.","과정·기능":"침의 소화 작용을 탐구하는 실험을 수행하고, 호흡 운동의 원리를 나타내는 모형을 만들고, 노폐물이 배설되는 과정을 모식도로 이해할 수 있다.","가치·태도":"여러 기관계가 유기적으로 작동하여 생명 활동을 유지하는 인체에 흥미를 가진다."},"D":{"지식·이해":"소화계, 순환계, 호흡계, 배설계를 구성하는 기관들을 나열하고, 동물의 세포호흡은 에너지를 얻는 과정임을 말할 수 있다.","과정·기능":"주어진 절차대로 침의 소화 작용을 탐구하는 실험을 수행하고, 호흡 운동의 원리를 나타내는 모형을 만들 수 있다.","가치·태도":"소화계, 순환계, 호흡계, 배설계의 다양한 기능에 대해 관심을 가진다."},"E":{"지식·이해":"소화계, 순환계, 호흡계, 배설계의 기능을 말할 수 있다. 동물이 세포호흡을 통해 생명 활동을 유지함을 말할 수 있다.","과정·기능":"주어진 절차대로 침의 소화 작용을 탐구하는 실험을 수행하고, 교사의 안내에 따라 호흡 운동의 원리를 나타내는 모형을 만들 수 있다.","가치·태도":"인체에 다양한 기관과 기관계가 있다는 것에 대해 호기심을 가진다."}}},"m13-14":{"codes":{"9과14-01":{"A":"마찰 전기와 정전기 유도 현상에서 대전의 원리를 원자 모형을 통해 전기력과 전하의 이동으로 표현하여 설명할 수 있다.","B":"마찰 전기와 정전기 유도 현상에서 대전의 원리를 원자 모형을 사용하여 전자 이동으로 설명할 수 있다.","C":"마찰 전기를 원자 모형을 사용하여 전자의 이동으로 설명할 수 있다.","D":"대전된 물체 사이에 작용하는 전기력의 종류를 알고, 이를 구별하여 설명할 수 있다.","E":"대전된 두 물체 사이에 작용하는 전기력을 관찰할 수 있다."},"9과14-02":{"A":"전기 회로에서 전류를 모형을 사용하여 설명하고, 실험을 통해 저항, 전류, 전압 사이의 관계를 이끌어 낼 수 있으며, 물질마다 저항이 다름을 통해 도체, 부도체, 반도체의 의미를 이해할 수 있다.","B":"전기 회로에서 전지의 전압에 의해 전류가 흐름을 알고, 실험을 통해 저항, 전류, 전압 사이의 관계를 말할 수 있다.","C":"전기 회로에서 전류의 방향과 전자의 이동 방향을 비교하여 말할 수 있다.","D":"전기 회로에서 전류를 모형을 사용하여 설명할 수 있다.","E":"전류의 의미를 알고, 전류가 흐르는 전기 회로를 만들 수 있다."},"9과14-03":{"A":"저항의 연결 방법에 따른 전기 회로의 특징을 비교하여 그 차이를 이해하고, 일상생활에서 전기 제품들의 소비 전력을 전기 에너지 전환과 관련지어 설명할 수 있으며, 전기의 효율적인 사용 방법을 이해하고 이를 실천할 수 있다.","B":"저항의 연결 방법에 따른 전기 회로의 특징을 알고, 일상생활에서 전기 제품들의 소비 전력을 전기 에너지 전환과 관련지어 조사할 수 있으며, 전기의 효율적인 사용 방법을 실천할 수 있다.","C":"저항의 직렬연결과 병렬연결의 특징을 알고, 일상생활에서 전기 제품들의 소비 전력을 전기 에너지 전환과 관련지어 조사할 수 있으며, 전기를 효율적으로 사용하려는 태도를 가진다.","D":"저항의 직렬연결과 병렬연결을 구별할 수 있으며, 일상생활에서 전기를 효율적으로 사용하려는 태도를 가진다.","E":"일상생활에서 전기 제품의 에너지 전환을 말할 수 있으며, 전기를 효율적으로 사용하는 데 관심을 가진다."},"9과14-04":{"A":"자기장 안에 놓인 전류가 흐르는 코일이 받는 힘의 특성을 추리할 수 있고, 전동기 등 일상생활에서 이를 활용한 예의 과학적 원리를 적용하고 해석하여 과학적 지식을 적극적으로 활용하는 태도를 가진다. 전동기 등 일상생활에서 활용한 예를 찾을 수 있다. 자기장 관찰하기 포함하여 성취수준 개발","B":"자기장 안에 놓인 전류가 흐르는 코일이 받는 힘의 방향을 찾을 수 있고, 일상생활에서 이를 활용한 예의 원리를 설명함으로써 과학적 지식의 유용성을 인식한다.","C":"실험을 통하여 자기장 안에 놓인 전류가 흐르는 코일이 힘을 받게 됨을 관찰하고, 전류의 방향과 자기장의 방향으로 힘의 방향을 찾을 수 있다.","D":"자기장 안에 놓인 전류가 흐르는 코일이 힘을 받음을 알고, 이를 활용한 일상생활의 예를 찾을 수 있다.","E":"자기장 안에 놓인 전류가 흐르는 코일은 힘을 받게 됨을 말할 수 있으며, 이러한 현상에 관심을 가진다. (15) 별과 우주"}},"area":{"A":{"지식·이해":"마찰 전기와 정전기 유도 현상에서 대전 원리를 원자 모형으로 표현하여 설명하고, 전기 회로에서 전류와 전압 관계를 통해 물질마다 저항이 다름을 도체, 부도체, 반도체로 설명할 수 있다. 저항의 연결 방법에 따른 전기 회로의 특징과 전기 제품들의 소비 전력을 전기 에너지 전환과 관련지어 설명하고, 자기장 안에 놓인 전류가 흐르는 코일이 받는 힘의 특성을 이해할 수 있다.","과정·기능":"마찰 전기와 정전기 유도 현상에서 대전 원리를 원자 모형을 사용하여 표현하고, 전기 회로에서 전류를 모형으로 설명할 수 있다. 저항의 연결 방법에 따른 전기 회로의 특징을 비교하고, 자기장 안에 놓인 전류가 흐르는 코일의 힘을 활용한 예들의 과학적 원리를 적용하고 해석할 수 있다.","가치·태도":"전기의 효율적인 사용 방법을 이해하고 이를 실천할 수 있으며, 자기장 안에 놓인 전류가 흐르는 코일이 받는 힘을 활용한 예를 통하여 과학적 지식이 유용하게 활용됨을 인식한다."},"B":{"지식·이해":"마찰 전기와 정전기 유도현상에서 대전의 원리를 원자 모형을 사용하여 전자 이동으로 설명할 수 있다. 전기 회로에서 전지의 전압에 의한 전류의 흐름과 저항의 연결 방법에 따른 전기 회로의 특징을 알며, 자기장 안에 놓인 전류가 흐르는 코일이 받는 힘의 방향을 찾을 수 있다.","과정·기능":"실험을 통해 저항, 전류, 전압 사이의 관계를 말하고, 일상생활에서 전기 제품들의 소비 전력을 전기 에너지 전환과 관련지어 조사하며, 일상생활에서 자기장 안에 놓인 전류가 흐르는 코일이 받는 힘을 활용한 예를 찾을 수 있다.","가치·태도":"전기의 효율적인 사용 방법을 실천하고, 자기장 안에 놓인 전류가 흐르는 코일이 받는 힘을 찾는 활동에 적극적으로 참여할 수 있다."},"C":{"지식·이해":"마찰 전기를 원자 모형을 사용하여 전자의 이동으로 설명하고, 전기 회로에서 전류의 방향과 전자의 이동 방향을 말할 수 있다. 저항의 직렬연결과 병렬연결의 특징을 알고, 자기장 안에 놓인 전류가 흐르는 코일이 받는 힘의 방향을 전류의 방향과 자기장의 방향으로부터 찾을 수 있다.","과정·기능":"일상생활에서 전기 제품들의 소비 전력을 전기 에너지 전환과 관련지어 조사하고, 실험을 통하여 자기장 안에 놓인 전류가 흐르는 코일이 받는 힘의 방향을 찾을 수 있다.","가치·태도":"전기를 효율적으로 사용하려는 태도를 가지며, 전류가 흐르는 코일이 받는 힘의 예시를 찾는 활동에 적극적으로 참여할 수 있다."},"D":{"지식·이해":"대전된 물체 사이에 작용하는 전기력의 종류를 구별하여 설명하고, 저항의 직렬연결과 병렬연결을 구별하며, 자기장 안에 놓인 전류가 흐르는 코일이 힘을 받음을 알 수 있다.","과정·기능":"전기 회로에서 전류를 모형을 사용하여 설명하고, 자기장 안에 놓인 전류가 흐르는 코일이 받는 힘을 활용한 일상생활의 예를 찾을 수 있다.","가치·태도":"일상생활에서 전기를 효율적으로 사용하려는 태도를 가지며, 자기장 안에 놓인 전류가 흐르는 코일이 받는 힘의 예시를 찾는 활동에 적극적으로 참여할 수 있다."},"E":{"지식·이해":"대전된 두 물체 사이에는 전기력이 작용한다는 것과 전류의 의미를 알고, 일상생활에서 전기 제품들의 에너지 전환을 말할 수 있으며, 자기장 안에 놓 인 전류가 흐르는 코일은 힘을 받게 됨을 말할 수 있 다.","과정·기능":"대전된 두 물체 사이에 작용하는 전기력을 관찰하고, 전류가 흐르는 전기 회로를 만들 수 있다.","가치·태도":"전기를 효율적으로 사용하는 것과 자기장 안에 놓인 전류가 흐르는 코일이 힘을 받게 되는 현상에 관심을 가진다."}}},"m13-15":{"codes":{"9과15-01":{"A":"연주시차를 이용하여 별까지의 거리를 구하여 연주시차와 별까지의 거리 관계를 추론하고, 디지털 탐구 도구를 활용한 광원으로부터의 거리에 따른 빛의 세기 측정 실험을 통해 별의 등급과 밝기와의 관계를 추론하며, 별의 표면 온도와 색의 관계를 설명할 수 있다.","B":"연주시차를 이용하여 별까지의 거리를 비교하고, 디지털 탐구 도구를 활용한 광원으로부터의 거리에 따른 빛의 세기 측정 실험을 통해 거리에 따른 빛의 세기 변화를 이해하며, 별의 표면 온도와 색의 관계를 설명할 수 있다.","C":"연주시차를 이용하여 별까지의 거리를 비교하고, 겉보기 등급의 의미를 이해하며, 별의 색에 따라 표면 온도가 다름을 말할 수 있다.","D":"연주시차를 이용하여 거리를 측정하는 원리를 이해하고, 별의 색에 따라 표면 온도가 다름을 말할 수 있다.","E":"여러 가지 별들의 거리와 표면 온도가 다름을 말할 수 있다."},"9과15-02":{"A":"우리은하의 구조와 크기를 이해하고, 천체 관측 프로그램을 활용하여 우리은하를 구성하는 천체의 특징을 조사하며, 성운과 성단의 특징을 비교할 수 있다.","B":"우리은하의 구조와 크기를 이해하고, 천체 관측 프로그램을 활용하여 우리은하를 구성하는 천체의 특징을 조사하며, 성운과 성단의 특징을 비교할 수 있다.","C":"우리은하의 모양을 이해하고, 천체 관측 프로그램을 이용하여 우리은하를 구성하는 천체의 특징을 조사하며, 성운과 성단을 구분할 수 있다.","D":"우리은하의 모양을 이해하고, 천체 관측 프로그램을 이용하여 우리은하를 구성하는 천체의 특징을 조사하며, 성운과 성단을 구분할 수 있다.","E":"천체 관측 프로그램을 이용하여 우리은하를 구성하는 천체를 찾아보고, 우리은하가 다양한 천체들로 구성됨을 말할 수 있다."},"9과15-03":{"A":"스티커를 붙인 풍선 모형을 활용하여 우주가 팽창하고 있음을 이해하고, 우주의 탄생을 설명할 수 있다.","B":"스티커를 붙인 풍선 모형을 활용하여 우주가 팽창하고 있음을 이해하고, 우주의 탄생을 설명할 수 있다.","C":"외부 은하들이 멀어지는 이유를 우주 팽창과 연관 지어 설명할 수 있다.","D":"외부 은하들이 멀어지는 이유를 우주 팽창과 연관 지어 설명할 수 있다.","E":"우주가 팽창하고 있음을 말할 수 있다."},"9과15-04":{"A":"우주탐사 성과를 바탕으로 우주탐사 계획을 세우고, 우주탐사가 인류에게 미치는 영향을 토론하여 우주탐사의 의의를 정립할 수 있으며, 이를 통해 과학의 유용성을 인식한다.","B":"우주탐사 성과를 바탕으로 우주탐사 계획을 세우고, 우주탐사가 인류에게 미치는 영향을 토론하여 우주탐사의 의의를 정립할 수 있으며, 이를 통해 과학의 유용성을 인식한다.","C":"우주탐사 성과를 바탕으로 우주탐사 계획을 세우고, 우주탐사의 의의와 우주탐사가 인류에게 미치는 영향을 조사하여 발표할 수 있다.","D":"우주탐사 성과를 바탕으로 우주탐사 계획을 세우고, 우주탐사의 의의와 우주탐사가 인류에게 미치는 영향을 조사하여 발표할 수 있다.","E":"우주탐사에 관한 정보를 수집할 수 있고, 우주탐사에 관심을 가진다. (16) 화학 반응의 규칙성"}},"area":{"A":{"지식·이해":"연주시차, 겉보기 등급, 절대 등급의 의미를 이해하고, 별의 등급과 밝기의 관계를 추론할 수 있다. 별의 표면 온도와 색의 관계를 이해하고, 우리은하의 구조와 크기를 설명할 수 있다. 스티커를 붙인 풍선 모형을 이용하여 우주 팽창 원리를 이해하고, 이를 활용하여 우주 탄생을 설명할 수 있다.","과정·기능":"연주시차를 이용하여 별까지의 거리를 정량적으로 계산하고, 디지털 탐구 도구를 이용하여 거리에 따른 빛의 세기 측정 실험을 설계하여 실험을 스스로 수행할 수 있다. 거리에 따른 빛의 세기 측정 실험 데이터를 그래프로 변환하여 과학적 결론을 도출할 수 있다. 천체 관측 프로그램을 활용하여 우리은하를 구성하는 천체를 찾아보고, 성운과 성단의 특징을 비교하여 정리할 수 있다. 우주탐사의 성과를 조사하고, 이를 활용하여 우주탐사 계획을 동료들과 협업하여 수립하며, 우주탐사의 의의와 인류에 미치는 영향을 동료들과 적극적으로 의사소통할 수 있다.","가치·태도":"우리은하를 구성하는 천체에 호기심을 가지고, 우주탐사가 인류에게 미치는 영향과 우주탐사 의의를 조사하는 과정에서 과학의 유용함을 인식하고 첨단 과학기술의 발달 정도를 간접적으로 경험한다."},"B":{"지식·이해":"연주시차, 겉보기 등급의 의미를 이해하고, 별의 등급과 밝기의 관계, 별의 표면 온도와 색의 관계, 우리은하의 구조와 크기를 설명할 수 있다. 스티커를 붙인 풍선 모형을 이용하여 우주 팽창 원리를 이해할 수 있다.","과정·기능":"연주시차를 이용하여 별까지의 거리를 비교하고, 거리에 따른 빛의 세기 측정 실험 데이터를 분석하여 결론을 도출할 수 있다. 천체 관측 프로그램을 활용하여 우리은하를 구성하는 천체를 찾아보고 관련 정보를 정리할 수 있다. 우주탐사의 성과를 조사하고, 이를 활용하여 우주탐사 계획을 수립하며, 우주탐사의 의의와 인류에 미치는 영향을 동료들과 효과적으로 의사소통할 수 있다.","가치·태도":"우리은하를 구성하는 천체에 호기심을 가지고, 우주탐사가 인류에게 미치는 영향과 우주탐사 의의를 조사하는 과정에서 과학의 유용함을 인식한다."},"C":{"지식·이해":"겉보기 등급의 의미와 별의 색에 따라 표면 온도가 다름을 이해할 수 있다. 우리은하를 구성하는 천체와 우리은하의 모양을 알고, 외부 은하들이 멀어지는 이유를 우주 팽창과 연관 지어 설명할 수 있다.","과정·기능":"연주시차를 이용하여 별까지 거리를 비교하고, 천체 관측 프로그램을 이용하여 우리은하를 구성하는 천체의 특징을 조사할 수 있다. 우주탐사의 성과를 조사하고 이를 활용하여 우주탐사 계획을 수립하여 동료에게 발표할 수 있다.","가치·태도":"우주탐사의 의의에 관심을 가지고, 우주탐사가 인류에게 미치는 영향을 인식한다."},"D":{"지식·이해":"우리은하는 매우 크고 수많은 천체로 구성되어 있음을 이해할 수 있다. 여러 가지 별들의 거리와 표면 온도가 다름을 알고, 우주는 팽창하고 있다는 것을 설명할 수 있다.","과정·기능":"시차 측정하기, 스티커를 붙인 풍선으로 우주 팽창 실험하기 등과 같은 안내된 탐구를 통해 별의 거리와 온도가 다양함을 이해하고, 우주탐사에 관한 성과를 조사하여 정리할 수 있다.","가치·태도":"우주탐사의 의의에 관심을 가지고, 우주탐사가 인류에게 미치는 영향을 인식한다."},"E":{"지식·이해":"여러 가지 별들의 거리와 표면 온도가 다름을 알고, 우리은하를 구성하고 있는 다양한 천체를 나열할 수 있다.","과정·기능":"우주탐사에 관한 정보를 수집한다.","가치·태도":"우주탐사에 관심을 가진다."}}},"m13-16":{"codes":{"9과16-01":{"A":"물리 변화와 화학 변화의 차이점을 설명하고, 일상생활에서 물리 변화와 화학 변화의 예를 찾아 설명할 수 있다.","B":"물리 변화와 화학 변화의 차이점을 설명하고, 일상생활에서 물리 변화와 화학 변화의 예를 찾아 설명할 수 있다.","C":"화학 변화에서 새로운 물질이 생성됨을 관찰하고, 일상생활에서 물리 변화와 화학 변화의 예를 찾을 수 있다.","D":"물질이 변화하는 간단한 예를 보고, 물리 변화와 화학 변화의 의미를 설명할 수 있다.","E":"물질이 변화하는 간단한 예를 보고, 물리 변화와 화학 변화의 의미를 설명할 수 있다."},"9과16-02":{"A":"간단한 화학 반응을 화학 반응식으로 표현하고, 화학 반응식에서 계수의 비를 입자 수의 비로 해석할 수 있다.","B":"간단한 화학 반응을 화학 반응식으로 표현하고, 이를 모형으로 나타낼 수 있다.","C":"간단한 화학 반응을 화학 반응식으로 표현할 수 있다.","D":"간단한 화학 반응에서 반응물과 생성물이 무엇인지 말할 수 있다.","E":"화학 반응을 화학 반응식으로 표현할 수 있음을 안다."},"9과16-03":{"A":"질량 보존 법칙과 관련된 실험을 통하여 화학 반응에서 질량이 보존됨을 추론하고, 이를 입자 모형으로 설명하며 과학에서 모형의 유용성을 인식한다.","B":"질량 보존 법칙과 관련된 실험을 통하여 화학 반응에서 질량이 보존됨을 추론하고, 이를 입자 모형으로 설명할 수 있다.","C":"질량 보존 법칙과 관련된 실험에서 반응물과 생성물의 질량이 같음을 알아낼 수 있다.","D":"질량 보존 법칙과 관련된 실험에서 반응물과 생성물의 질량이 같음을 알아낼 수 있다.","E":"화학 반응 전후의 반응물과 생성물의 질량 변화를 관찰할 수 있다."},"9과16-04":{"A":"화합물의 형성 반응에서 성분 원소의 질량에 관한 자료를 해석하여 원소 간 질량비가 일정하다는 규칙성을 발견하고, 이는 물질을 일정한 화학식으로 표현하는 근거가 됨을 설명할 수 있다.","B":"화합물의 형성 반응에서 구성하는 성분 원소의 질량에 관한 자료를 해석하여 원소 간 질량비가 일정하다는 규칙성을 발견할 수 있다.","C":"화합물의 형성 반응에서 반응 물질의 질량이 달라져도 화합물을 구성하는 성분 원소의 질량비가 일정하다는 규칙성을 발견할 수 있다.","D":"화합물의 형성 반응에서 반응 물질의 질량으로부터 화합물을 구성하는 성분 원소의 질량비를 구할 수 있다.","E":"화합물의 형성 반응으로부터 화합물을 구성하는 성분 원소의 종류와 질량을 찾을 수 있다."},"9과16-05":{"A":"여러 가지 기체 반응에 관한 자료를 해석하여 반응하고 생성되는 기체 부피 사이의 비가 일정함을 설명할 수 있다.","B":"기체 반응의 실험 결과를 해석하여 기체가 항상 일정한 부피비로 반응함을 찾을 수 있다.","C":"기체 반응의 실험 결과를 해석하여 기체가 항상 일정한 부피비로 반응함을 찾을 수 있다.","D":"기체가 반응할 때 반응 물질과 생성 물질의 부피비를 구할 수 있다.","E":"반응 물질과 생성 물질이 모두 기체로 이루어진 반응을 식별할 수 있다."},"9과16-06":{"A":"화학 반응을 이용한 간단한 냉각 장치를 만들어 그 원리를 설명하고, 화학 반응에 의해 열에너지가 출입하는 생활 속 사례를 조사하여 발표하며, 과학의 유용성을 인식하고 과학적 원리를 활용하려는 태도를 가진다.","B":"주어진 절차대로 화학 반응을 이용한 간단한 냉각 장치를 만들고, 이 과정에서 과학의 유용성을 인식한다.","C":"화학 반응을 이용한 간단한 냉각 장치에서 열에너지가 출입함을 관찰하고, 이 과정에서 과학의 유용성을 인식한다.","D":"주위의 온도 변화를 근거로 화학 반응에서 열에너지가 방출되는 사례와 흡수되는 사례를 구분할 수 있다.","E":"화학 반응에서 열에너지가 출입함을 안다. (17) 날씨와 기후변화"}},"area":{"A":{"지식·이해":"화학 반응을 통해 물질은 다른 물질로 변함을 물리 변화와 대조하여 설명하고, 간단한 화학 반응을 화학 반응식으로 나타내며, 계수비의 의미를 설명할 수 있다. 질량 보존 법칙, 일정성분비 법칙, 기체 반응 법칙이 무엇인지 입자 모형을 사용하여 설명하고, 어떤 상황에서 적용되는지에 대한 다양한 사례를 제시할 수 있다. 화학 반응 시 열에너지 출입이 수반됨을 알고, 화학 반응을 이용한 냉각 장치의 원리를 설명할 수 있다.","과정·기능":"화학 반응의 규칙성을 탐구하는 실험을 수행하거나 자료를 분석하여 반응 물질과 생성 물질의 수학적 관계를 찾아내고, 결과를 해석하여 결론을 도출할 수 있다. 화학 반응에 수반되는 열에너지 출입을 이용한 도구를 고안하여 제작할 수 있다.","가치·태도":"주변에서 일어나는 화학 반응에 관심을 가지고, 화학 반응으로 인한 열에너지 출입이 일상생활에서 유용하게 활용됨을 인식하며, 이를 활용하려는 태도를 가진다."},"B":{"지식·이해":"화학 반응을 통해 물질은 다른 물질로 변함을 물리 변화와 대조하여 설명하고, 간단한 화학 반응을 화학 반응식으로 나타내며, 계수의 비를 찾을 수 있다. 질량 보존 법칙, 일정성분비 법칙, 기체 반응 법칙이 무엇인지 모형을 사용하여 설명할 수 있다. 화학 반응이 일어날 때 항상 열에너지가 출입함을 예를 들어 설명할 수 있다.","과정·기능":"화학 반응의 규칙성을 탐구하는 실험을 수행하거나 자료를 분석하여 반응 물질과 생성 물질의 수학적 관계를 찾아내고, 결과를 해석하여 결론을 도출할 수 있다. 화학 반응에 수반되는 열에너지 출입을 이용한 도구를 고안하여 제작할 수 있다.","가치·태도":"주변에서 일어나는 화학 반응에 관심을 가지고, 화학 반응으로 인한 열에너지 출입이 일상생활에서 유용하게 활용됨을 인식한다."},"C":{"지식·이해":"몇 가지 사례를 물리 변화와 화학 변화로 구분하고, 안내된 순서에 따라 화학 반응을 화학 반응식으로 나타낼 수 있다. 화학 반응이 일어나는 동안 질량이 보존되고, 반응물이 일정한 질량비로 반응하여 생성물을 형성하며, 기체 사이의 반응에서는 기체 부피 사이의 비가 일정함을 말할 수 있다. 화학 반응이 일어날 때 열에너지가 출입함을 말할 수 있다.","과정·기능":"화학 반응의 규칙성을 탐구하는 실험을 수행하거나 자료를 분석하여 반응 물질과 생성 물질의 수학적 관계를 찾아낼 수 있다. 화학 반응에 수반되는 열에너지 출입을 관찰하고 기록할 수 있다.","가치·태도":"주변에서 일어나는 화학 반응 현상에 관심을 가지고, 이 과정에서 일어나는 열에너지 출입이 일상생활에 활용됨을 인식한다."},"D":{"지식·이해":"물리 변화와 화학 변화의 의미를 설명하고, 화학 반응식에서 반응물과 생성물을 구분할 수 있다. 화학 반응이 일어날 때 열에너지를 흡수하는 사례와 방출하는 사례를 구분할 수 있다.","과정·기능":"화학 반응의 규칙성을 탐구하는 실험을 수행하거나 자료를 분석하여 규칙성을 찾아낼 수 있다.","가치·태도":"화학 반응에 수반되는 에너지 출입이 일상생활에 활용됨을 인식한다."},"E":{"지식·이해":"물리 변화와 화학 변화의 의미를 설명하고, 화학 반응식이 무엇인지 안다.","과정·기능":"화학 반응의 규칙성을 탐구하는 실험을 수행할 수 있다.","가치·태도":"화학 반응에서 열에너지 출입이 일어나는 것에 관심을 가진다."}}},"m13-17":{"codes":{"9과17-01":{"A":"지구 대기권을 높이에 따른 온도 변화로 4개의 권역을 구분하고 각 권역의 주요 특징을 이해하며, 온실효과와 지구온난화를 지구 복사 평형과 관련지어 설명하고, 기후변화 자료를 검색하고 분석하는 활동을 통해 기후변화의 심각성을 인식하며, 환경과 인간이 공존할 수 있는 다양한 방 안 을 모색할 수 있 다.","B":"지구 대기권을 4개의 권역으로 구분하고 각 권역의 주요 특징을 이해하며, 복사 평형의 의미를 실험 결과와 관련지어 설명하고, 기후변화 자료를 검색하고 분석하는 활동을 통해 기후변화의 심각성을 인식한다.","C":"지구 대기권 각 권역의 명칭을 알고 각 권역의 온도 변화를 설명할 수 있으며, 기후변화 관련 자료 검색 활동을 통해 온실효과와 지구온난화의 의미를 이해하고 기후변화의 심각성을 인식한다.","D":"지구 대기권 각 권역의 명칭과 복사 평형의 의미를 말할 수 있고, 기후변화 관련 자료 검색 활동을 통해 기후변화에 관심을 가진다.","E":"지구 대기권이 4개의 권역으로 나누어짐을 알고, 기후변화 관련 자료 검색 활동을 통해 기후변화에 관심을 가진다."},"9과17-02":{"A":"대기 대순환의 분포가 생기는 원인과 위도별 바람의 명칭과 특성을 알고, 대기 대순환의 역할을 설명할 수 있다.","B":"대기 대순환의 분포가 생기는 원인과 위도별 바람의 명칭과 특성을 알고, 대기 대순환의 역할을 설명할 수 있다.","C":"대기 대순환의 분포가 생기는 원인과 위도별 바람의 명칭 및 특성을 설명할 수 있다.","D":"대기 대순환의 분포가 생기는 원인과 위도별 바람의 명칭 및 특성을 설명할 수 있다.","E":"위도별 바람의 명칭을 말할 수 있다."},"9과17-03":{"A":"대기 중의 수증기량, 이슬점, 포화수증기량을 이해하고 상대습도를 정량적으로 계산하며, 디지털 탐구 도구를 이용한 구름 생성 실험을 통해 구름의 생성을 단열 팽창에 따른 응결 현상으로 설명하고, 위도에 따른 강수 과정을 비교할 수 있다.","B":"상대습도를 증발 및 응결 현상과 관련지어 이해하고, 디지털 탐구 도구를 이용한 구름 생성 실험을 통해 구름의 생성을 단열 팽창에 따른 응결 현상으로 설명하며, 중위도의 강수 과정을 말할 수 있다.","C":"상대습도의 의미를 알고 디지털 탐구 도구를 이용한 구름 생성 과정 실험에서 구름의 생성을 단열 팽창 시의 온도 변화로 설명하며, 구름에서 눈이나 비가 내린다는 것을 말할 수 있다.","D":"증발과 응결의 의미를 알고 그 예를 찾으며, 디지털 탐구 도구를 이용한 구름 생성 실험에서 생성된 구름을 관찰할 수 있다.","E":"디지털 탐구 도구를 이용한 구름 생성 실험에서 생성된 구름을 관찰할 수 있다."},"9과17-04":{"A":"기압의 개념과 작용 방향을 알고 기압의 크기를 단위를 사용하여 나타내며, 전선의 생성과 특성을 이해하고 우리나라에 영향을 미치는 기단의 성질에 따라 계절별 날씨가 달라짐을 설명하며, 일기도, 레이더 및 위성 영상 등 다양한 실시간 데이터에서 저기압과 고기압을 찾아 날씨를 해석할 수 있다.","B":"기압의 개념과 작용 방향을 알고 전선의 특성을 비교하며, 우리나라에 영향을 미치는 기단의 성질에 따라 계절별 날씨가 달라짐을 설명하고, 일기도, 레이더 및 위성 영상 등 다양한 실시간 데이터를 활용하여 날씨를 해석할 수 있다.","C":"기압의 개념과 작용 방향을 알고 전선과 기단의 종류에 따라 날씨가 달라짐을 설명하며, 일기도, 레이더 및 위성 영상 등 다양한 실시간 데이터를 이용하여 날씨 정보를 조사할 수 있다.","D":"기압의 개념, 전선과 기단의 종류를 말하고, 일기도, 레이더 및 위성 영상 등 실시간 데이터를 이용하여 날씨 정보를 조사할 수 있다.","E":"기압의 개념을 말할 수 있고, 일기도, 레이더 및 위성 영상 등 실시간 기상 데이터에 관심을 가진다. (18) 수권과 해수의 순환"}},"area":{"A":{"지식·이해":"지구 대기권을 4개의 권역으로 구분하고, 각 권역의 주요 특징을 이해하여 온실효과와 지구온난화를 지구 복사 평형과 관련지어 설명할 수 있다. 대기 대순환의 분포가 생기는 원인과 위도별 바람의 특성을 알고, 대기 대순환의 역할을 설명할 수 있다. 대기 중의 수증기량, 이슬점, 포화수증기량, 전선의 생성과 특성을 이해하고, 우리나라 계절별 날씨에 영향을 주는 기단의 종류와 성질을 설명할 수 있다.","과정·기능":"복사 평형 실험과 기후변화 관련 자료 탐색을 통해 온실효과와 지구온난화를 이해할 수 있다. 디지털 탐구 도구를 활용하여 학생이 주도적으로 구름 생성 실험을 설계하여 수행하고, 구름의 생성 과정과 강수 과정을 추론할 수 있다. 실시간 데이터를 활용하여 일기도에서 저기압과 고기압의 분포에 따른 날씨를 해석할 수 있다.","가치·태도":"현재 지구 상태에 관심을 가지고, 기후변화의 심각성을 인식하여 기후변화를 늦출 수 있는 일상생활 속 실천 방안을 수립하여 실행할 수 있다."},"B":{"지식·이해":"지구 대기권을 4개의 권역으로 구분하고, 각 권역의 주요 특징을 이해하며, 복사 평형의 의미를 실험 결과와 관련지어 설명할 수 있다. 대기 대순환의 분포가 생기는 원인과 위도별 바람의 특성을 알고, 대기 대순환의 역할을 설명할 수 있다. 기압의 크기와 단위를 알고 전선의 특성을 비교하고, 우리나라 계절별 날씨에 영향을 주는 기단의 종류와 성 질 을 설명할 수 있 다.","과정·기능":"복사 평형과 구름 발생 실험을 동료와 협력하여 실험을 설계하고 수행하며, 지구의 복사 평형과 온실효과, 상대습도와 이슬점, 단열 팽창 시의 온도 변화와 구름 생성 과정을 설명할 수 있다. 일기도, 레이더 및 위성 영상 등 다양한 실시간 데이터를 활용하여 날씨를 해석할 수 있다.","가치·태도":"현재 지구 상태에 관심을 가지고, 기후변화의 심각성을 인식하여 기후변화를 늦출 수 있는 일상생활 속 실천 방안을 수립하여 실행할 수 있다."},"C":{"지식·이해":"지구 대기권의 각 권역의 명칭을 알고 각 권역의 온도 변화를 설명하며, 기후변화 관련 자료 검색 활동을 통해 온실효과와 지구온난화의 의미를 이해할 수 있다. 대기 대순환의 분포가 생기는 원인과 위도별 바람의 명칭 및 특성을 설명하고, 우리나라 계절별 날씨에 영향을 주는 기단의 종 류 를 제시할 수 있 다.","과정·기능":"복사 평형과 구름 발생 실험을 안내에 따라 수행하고, 복사 평형과 구름 생성을 관찰하여 구름 생성 시 온도 변화를 확인할 수 있다. 일기도, 레이더 및 위성 영상 등 다양한 실시간 데이터를 이용하여 날씨 정보를 조사할 수 있다.","가치·태도":"기후변화에 관심을 가지고, 기후변화를 늦출 수 있는 일상생활 속 실천 방안을 수립하여 실행할 수 있다."},"D":{"지식·이해":"지구 대기권의 각 권역의 명칭과 복사 평형의 의미를 이해하고, 대기 대순환의 분포가 생기는 원인과 위도별 바람의 명칭 및 특성을 설명할 수 있다. 증발과 응결의 의미를 이해하고, 기압의 개념, 기단과 전선의 종 류 를 설명할 수 있 다.","과정·기능":"복사 평형과 구름 발생 실험을 안내에 따라 수행하고, 구름이 생겨 비가 내리는 현상을 설명할 수 있다. 일기도, 레이더 및 위성 영상 등 실시간 데이터를 이용하여 날씨 정보를 조사할 수 있다.","가치·태도":"기후변화에 관심을 가지고, 기후변화를 늦출 수 있는 일상생활 속 실천 방안을 수립하여 실행할 수 있다."},"E":{"지식·이해":"지구 대기권이 4개의 권역으로 나누어짐을 이해하고, 위도별 바람의 명칭을 제시하며, 증발과 응결 현상, 기압의 개념을 설명할 수 있다.","과정·기능":"구름 생성 실험에 참여하여 구름의 생성을 확인하고, 일기도, 레이더 및 위성 영상 등 실시간 기상 데이터를 이용한 날씨 정보 조사 활동에 참여할 수 있다.","가치·태도":"기후변화를 늦추기 위한 일상생활 속 실천 방안을 찾아 실행할 수 있다."}}},"m13-18":{"codes":{"9과18-01":{"A":"수권에서 해수, 담수, 빙하의 분포와 활용 사례를 조사하고, 자원으로서 물의 가치에 대해 토론하는 활동을 통해 수자원의 중요성을 인식하며, 지속가능한 수자원 활용을 위한 수자원 보존 방안을 수립할 수 있다.","B":"수권에서 해수, 담수, 빙하의 분포와 활용 사례를 조사하고, 자원으로서 물의 가치에 대해 토론하는 활동을 통해 수자원의 중요성을 인식하며, 지속가능한 수자원 활용을 위한 수자원 보존 방안을 수립할 수 있다.","C":"수권에서 해수, 담수, 빙하의 활용 사례를 이해하고, 자원으로서 물의 가치를 조사할 수 있다.","D":"수권에서 해수, 담수, 빙하의 활용 사례를 이해하고, 자원으로서 물의 가치를 조사할 수 있다.","E":"수권에서 담수, 해수, 빙하의 분포를 말할 수 있다."},"9과18-02":{"A":"디지털 탐구 도구를 이용한 해수의 연직 수온 분포 실험을 통해 해수의 수온 분포 및 변화를 이해하고, 염분의 분포에 영향을 주는 요인을 설명하며, 실시간 데이터를 활용하여 우리나라 주변의 해양 정보를 수집하고 분석할 수 있다.","B":"디지털 탐구 도구를 이용한 해수의 연직 수온 분포 실험을 통해 해수의 수온 분포 및 변화를 이해하고, 실시간 데이터를 활용하여 우리나라 주변의 해양 정보를 수집하여 염분의 분포를 설명할 수 있다.","C":"해수의 연직 수온 분포 그래프를 해석하고, 염분의 의미와 염류의 종류를 설명하며, 실시간 데이터를 활용하여 우리나라 주변의 해양 정보를 수집할 수 있다.","D":"해수의 연직 구조와 염분의 의미를 이해할 수 있고, 우리나라 주변의 실시간 해양 정보에 관심을 가진다.","E":"해수의 깊이에 따라 수온이 변함을 말할 수 있고, 우리나라 실시간 해양 정보에 관심을 가진다."},"9과18-03":{"A":"대기 대순환에 의해 북태평양 아열대 순환이 생성됨을 이해하고, 기후변화에 영향을 미치는 해류의 역할을 설명할 수 있다.","B":"대기 대순환에 의해 북태평양 아열대 순환이 생성됨을 이해하고, 기후변화에 영향을 미치는 해류의 역할을 설명할 수 있다.","C":"대기 대순환에 의해 해류가 이동함을 이해하고, 기후변화에 영향을 미치는 해류의 역할을 설명할 수 있다.","D":"대기 대순환에 의해 해류가 이동함을 이해하고, 기후변화에 영향을 미치는 해류의 역할을 설명할 수 있다.","E":"해류가 기후변화에 영향을 미친다는 것을 말할 수 있다. (19) 운동과 에너지"}},"area":{"A":{"지식·이해":"수권에서 물의 분포와 활용 사례를 조사하고, 이와 관련지어 자원으로서의 물의 중요성을 과학적 근거를 들어 논리적으로 설명할 수 있다. 수온과 염분 등 해수의 일반적 특성과 대기 대순환과 해양 표층 순환의 관계를 알고, 기후변화에 영향을 미치는 해류의 역할을 설명할 수 있다.","과정·기능":"디지털 탐구 도구를 이용한 해수의 연직 수온 분포 실험을 설계하고 수행한 후 실험 결과를 비교 분석하여 해수의 연직 수온 분포의 특성에 관한 결론을 도출할 수 있다. 실시간 데이터를 활용하여 우리나라 주변의 수온, 염분 등을 분석할 수 있다.","가치·태도":"자원으로서 물의 가치에 대해 토론하여 수자원의 중요성을 인식하고, 보존 방안을 수립하여 실천할 수 있다."},"B":{"지식·이해":"수권에서 물의 분포와 활용 사례를 이해하고, 자원으로서의 물의 가치를 설명할 수 있다. 수온과 염분 등 해수의 일반적 특성과 대기 대순환과 해양 표층 순환의 관계를 알고, 기후변화에 영향을 미치는 해류의 특성을 설명할 수 있다.","과정·기능":"해수의 연직 분포 실험을 통해 얻은 데이터를 분석하여 결론을 도출하고, 실시간 데이터를 활용하여 우리나라 주변의 수온, 염분 등을 분석할 수 있다.","가치·태도":"자원으로서 물의 가치에 대해 토론하여 수자원의 중요성을 인식한다."},"C":{"지식·이해":"수권에서 물의 분포와 활용 사례를 조사하고 그 결과를 설명하며, 해수의 연직 수온 분포와 염분비에 대해 그래프와 자료를 통해 설명할 수 있다. 대기 대순환과 해양 표층 순환과의 관계 및 기후변화와 해류와의 관계를 이해할 수 있다.","과정·기능":"우리나라 주변의 수온, 염분 등 실시간 자료를 찾아볼 수 있다.","가치·태도":"자원으로서 물의 가치와 수자원의 중요성을 인식한다."},"D":{"지식·이해":"수권에서 물의 분포와 활용 사례를 조사하고, 해수의 깊이에 따른 온도 분포와 염분비를 설명할 수 있다. 대기 대순환에 의해 해양 표층 순환이 형성됨을 이해하고, 기후변화에 영향을 미치는 해류의 역할을 설명할 수 있다.","과정·기능":"우리나라 주변의 수온, 염분 등 실시간 자료를 찾아보는 활동에 참여할 수 있다.","가치·태도":"자원으로서 물의 가치와 수자원의 중요성을 인식한다."},"E":{"지식·이해":"수권에서 물의 분포와 활용 사례를 조사하고, 염분의 의미와 깊이에 따른 온도 분포를 이해하고, 해류가 기후변화에 미치는 영향을 설명할 수 있다.","과정·기능":"우리나라 주변의 수온, 염분 등이 제시된 실시간 자료를 살펴볼 수 있다.","가치·태도":"자원으로서 물의 가치를 인식한다."}}},"m13-19":{"codes":{"9과19-01":{"A":"직선상에서 등속 운동과 시간에 따라 속력이 일정하게 증가하거나 감소하는 물체의 운동을 시간-속력 그래프로 나타내고 이를 해석할 수 있다.","B":"직선상에서 등속 운동과 시간에 따라 속력이 일정하게 증가하거나 감소하는 물체의 운동을 시간-속력 그래프로 나타낼 수 있다.","C":"직선상에서 등속 운동과 시간에 따라 속력이 일정하게 증가하거나 감소하는 물체의 운동 자료를 수집할 수 있다.","D":"등속 운동하는 물체의 시간-속력 그래프를 찾을 수 있다.","E":"등속 운동과 등속이 아닌 운동을 구분하여 말할 수 있다."},"9과19-02":{"A":"자유 낙하하는 물체의 운동을 분석하여 물체의 질량과 상관없이 속력의 변화가 일정함을 설명하고, 그 값을 도출할 수 있다.","B":"자유 낙하하는 물체의 운동을 분석하여 그래프로 나타내고, 물체의 질량과 상관없이 속력의 변화가 일정함을 설명할 수 있다.","C":"자유 낙하하는 물체의 운동을 나타낸 그래프를 찾고, 시간에 따른 속력의 변화가 일정함을 말할 수 있다.","D":"자유 낙하하는 물체의 운동을 나타낸 그래프를 찾을 수 있다.","E":"자유 낙하하는 물체는 속력이 점점 증가함을 말할 수 있다."},"9과19-03":{"A":"일의 정의를 알고, 자유 낙하하는 물체의 운동에서 중력이 한 일은 운동 에너지, 중력에 대해서 한 일은 위치 에너지로 전환됨을 설명할 수 있다.","B":"일의 정의를 알고, 중력에 대해 한 일이 위치 에너지로 전환됨을 설명할 수 있다.","C":"일의 정의 및 일과 에너지 관계를 말하고, 중력이 한 일이 위치 에너지, 운동 에너지와 관련됨을 말할 수 있다.","D":"일의 정의를 알고, 자유 낙하하는 물체에서 중력이 한 일을 구할 수 있다.","E":"과학에서 사용하는 의미의 일과 일상적인 의미의 일을 구별할 수 있다."},"9과19-04":{"A":"일상생활에서의 자유 낙하 운동이나 단진자 운동 사례에서 역학적 에너지의 전환과 보존을 적용하여 물체의 운동을 예측할 수 있고, 과학 지식이 일상생활에서 유용하게 활용됨을 인식한다.","B":"자유 낙하 운동이나 단진자 운동에서 역학적 에너지의 전환과 보존을 이해하고 적용하여 설명할 수 있으며, 이를 일상생활 속 물체의 운동에 적용하려는 적극적인 태도를 가진다.","C":"자유 낙하하는 물체의 실험 결과를 바탕으로 역학적 에너지의 전환과 보존을 역학적 에너지 보존 실험하기 포함하여 성취수준 개발 설명할 수 있고, 일상생활 속 물체의 운동에 이를 적용하려는 태도를 가진다.","D":"자유 낙하하는 물체에서 위치 에너지의 변화량과 운동 에너지의 변화량을 비교하여 역학적 에너지의 전환과 보존을 알고, 일상생활 속 물체의 운동에 흥미와 호기심을 가진다.","E":"자유 낙하하는 물체에서 위치 에너지와 운동 에너지의 변화를 말할 수 있고, 일상생활 속 물체의 운동에 관심을 가진다. (20) 자극과 반응"}},"area":{"A":{"지식·이해":"등속 운동과 시간에 따라 속력이 일정하게 증가하거나 감소하는 물체의 운동을 이해하고, 자유 낙하하는 물체의 운동을 분석하여 물체의 질량과 상관없이 속력의 변화가 일정함을 설명하고 그 값을 도출할 수 있다. 또한 일의 정의를 알고 자유 낙하하는 물체의 운동에서 중력이 한 일은 운동 에너지, 중력에 대해서 한 일은 위치 에너지로 전환됨을 설명할 수 있다.","과정·기능":"등속 운동과 시간에 따라 속력이 일정하게 증가하거나 감소하는 물체의 운동을 시간-속력 그래프로 나타내고 이를 해석할 수 있으며, 자유 낙하하는 물체의 운동을 분석할 수 있다. 일상생활에서의 자유 낙하 운동이나 단진자 운동 사례에서 역학적 에너지 전환과 보존을 적용하고 해석하여, 물체의 운동을 예측할 수 있다.","가치·태도":"일상생활에서 운동과 에너지에 관한 과학 지식이 유용하게 활용됨을 인식하고, 관련 현상을 설명하는 데 과학적 원리를 활용하려는 태도를 가진다."},"B":{"지식·이해":"등속 운동과 시간에 따라 속력이 일정하게 증가하거나 감소하는 운동의 의미를 말하고, 자유 낙하하는 물체의 속력 변화가 일정함을 설명할 수 있다. 일의 정의를 알고 중력에 대해 한 일이 위치 에너지로 전환됨을 설명하며, 자유 낙하 운동이나 단진자 운동 사례에서 역학적 에너지의 전 환 과 보존을 적용하여 설명할 수 있 다.","과정·기능":"직선상에서 등속 운동과 시간에 따라 속력이 일정하게 증가하거나 감소하는 물체의 운동과 자유 낙하하는 물체의 운동을 시간-속력 그래프로 나타내고, 자유 낙하 운동이나 단진자 운동 사례에서 역학적 에너지의 전환과 보존을 적용하여 설명할 수 있다.","가치·태도":"일상생활의 다양한 물체의 운동을 분석하는 과정에서 운동과 에너지 개념을 적용하려는 적극적인 태도를 가진다."},"C":{"지식·이해":"자유 낙하하는 물체의 운동 그래프를 찾고, 시간에 따라 속력 변화가 일정함을 말할 수 있다. 일의 정의와 일과 에너지의 관계, 중력이 한 일이 위치 에너지와 운동 에너지로 전환됨을 말할 수 있으며, 자유 낙하하는 물체의 운동에서 역학적 에너지의 전환과 보존을 설명할 수 있다.","과정·기능":"직선상에서 등속 운동과 시간에 따라 속력이 변하는 물체의 운동 자료를 수집하고, 자유 낙하하는 물체의 실험 자료를 바탕으로 역학적 에너지가 보존됨을 설명할 수 있다.","가치·태도":"일상생활의 다양한 물체의 운동을 분석하는 데 에너지 전환과 보존을 적용하려는 태도를 가진다."},"D":{"지식·이해":"등속 운동의 의미를 말하고, 자유 낙하하는 물체의 운동 그래프를 찾으며, 일의 정의를 알고 중력이 한 일을 구할 수 있다. 자유 낙하하는 물체의 운동에서 역학적 에너지가 보존됨을 말할 수 있다.","과정·기능":"등속 운동하는 물체와 자유 낙하하는 물체의 운동을 나타낸 그래프를 찾고, 자유 낙하하는 물체에서 위치 에너지 변화량과 운동 에너지 변화량을 비교할 수 있다.","가치·태도":"일상생활의 다양한 물체의 운동에 흥미와 호기심을 가진다."},"E":{"지식·이해":"등속 운동과 속력이 변하는 운동을 알고, 자유 낙하하는 물체는 속력이 증가한다는 것과 자유 낙하하는 물체에서 위치 에너지와 운동 에너지의 변화를 말할 수 있다.","과정·기능":"등속 운동과 등속이 아닌 운동을 구분할 수 있으며, 과학에서 사용하는 의미의 일과 일상적인 의미의 일을 구별할 수 있다.","가치·태도":"일상생활의 다양한 물체의 운동에 관심을 가진다."}}},"m13-20":{"codes":{"9과20-01":{"A":"감각기관의 구조와 기능을 이해하고, 자극이 뇌로 전달되는 과정을 추론하여 설명할 수 있다.","B":"감각기관의 구조와 기능을 이해하고, 감각을 느끼는 과정을 설명할 수 있다.","C":"감각기관의 구조와 기능을 이해할 수 있다.","D":"자극의 종류와 감각기관을 대응시킬 수 있다.","E":"자극을 감지하는 것이 감각기관임을 안다."},"9과20-02":{"A":"뉴런과 신경계의 구조와 기능을 이해하고, 자극에 대한 반응이 일어나는 과정을 모형으로 설명할 수 있다.","B":"뉴런과 신경계의 구조와 기능을 이해하고, 자극에 대한 반응이 일어나는 과정을 모형으로 표현할 수 있다.","C":"뉴런과 신경계의 구조와 기능을 이해하고, 자극에 대한 반응이 일어나는 과정에 대한 모형을 이해할 수 있다.","D":"뉴런과 신경계의 구조를 말할 수 있다.","E":"신경계의 기본 단위가 뉴런임을 말할 수 있다."},"9과20-03":{"A":"우리 몸의 기능을 조절하는 호르몬에 대해 이해하고, 관련 자료를 조사하여 발표할 수 있다.","B":"우리 몸의 기능을 조절하는 호르몬에 대해 이해하고, 관련 자료를 조사할 수 있다.","C":"우리 몸의 기능 조절에 호르몬이 관여함을 알고, 그 종류를 나열하며, 호르몬 관련 자료를 조사할 수 있다.","D":"우리 몸의 기능 조절에 적절한 양의 호르몬이 필요하다는 것을 말하고, 호르몬 관련 자료 조사에 참여할 수 있다.","E":"우리 몸의 기능 조절에 호르몬이 관여함을 말하고, 교사의 안내에 따라 호르몬 자료를 찾아 볼 수 있다. (21) 생식과 유전"}},"area":{"A":{"지식·이해":"감각기관과 뉴런, 신경계의 구조와 기능을 이해하고, 자극이 뇌로 가는 과정을 추론하여 설명할 수 있다. 우리 몸의 기능을 조절하는 호르몬에 대해 이해할 수 있다.","과정·기능":"자극에 대한 반응이 일어나는 과정을 모형으로 설명하고, 호르몬 관련 자료를 조사하여 발표할 수 있다.","가치·태도":"매우 적은 양으로 인체의 기능을 조절하는 호르몬의 중요성을 인식한다."},"B":{"지식·이해":"감각기관과 뉴런, 신경계의 구조와 기능을 이해하고, 감각을 느끼는 과정을 설명할 수 있다. 자극에 대한 반응이 일어나는 과정을 설명하고, 우리 몸의 기능을 조절하는 호르몬에 대해 이해할 수 있다.","과정·기능":"자극에 대한 반응이 일어나는 과정을 모형으로 표현하고, 호르몬 관련 자 료 를 조사할 수 있 다.","가치·태도":"매우 적은 양으로 인체의 기능을 조절하는 호르몬의 중요성을 인식한다."},"C":{"지식·이해":"감각기관과 뉴런, 신경계의 구조와 기능을 설명하고, 우리 몸의 기능 조절에 호르몬이 관여함을 알며, 그 종류를 나열할 수 있다.","과정·기능":"자극에 대한 반응이 일어나는 과정에 대한 모형을 이해하고, 호르몬 관련 자 료 를 조사할 수 있 다.","가치·태도":"인체의 기능을 조절하는 호르몬에 대해 흥미를 가진다."},"D":{"지식·이해":"자극의 종류와 감각기관을 대응시키고, 뉴런과 신경계의 구조를 말하며, 우리 몸의 기능 조절에 적절한 양의 호르몬이 필요하다는 것을 말할 수 있다.","과정·기능":"호르몬 자료 조사에 참여할 수 있다.","가치·태도":"인체의 기능을 조절하는 호르몬에 대해 흥미를 가진다."},"E":{"지식·이해":"자극을 감지하는 것이 감각기관임을 알고, 신경계의 기본 단위가 뉴런임을 말하며, 우리 몸의 기능 조절에 호르몬이 관여함을 말할 수 있다.","과정·기능":"교사의 안내에 따라 호르몬 자료를 찾아볼 수 있다.","가치·태도":"여러 가지 호르몬 종류에 대해 관심을 가진다."}}},"m13-21":{"codes":{"9과21-01":{"A":"세포분열의 필요성을 이해하고, 세포분열이 개체의 생장과 어떤 관련이 있는지 세포의 표면적과 부피의 관계로 추론할 수 있다.","B":"세포분열을 통해 개체가 생장함을 이해하고, 세포의 표면적과 부피의 관 계 를 설명할 수 있 다.","C":"세포분열을 통해 개체가 생장함을 이해하고, 세포의 표면적과 부피의 관 계 를 설명할 수 있 다.","D":"세포분열과 개체의 생장을 연관 지어 설명할 수 있다.","E":"세포분열을 통해 세포 수가 증가함을 말할 수 있다."},"9과21-02":{"A":"염색체와 유전자의 관계를 이해하고, 체세포분열과 생식세포 형성과정의 특징을 염색체 행동을 중심으로 비교하여 설명할 수 있다.","B":"염색체와 유전자의 관계를 이해하고, 체세포분열과 생식세포 형성과정의 특징을 염색체 행동을 중심으로 각각 설명할 수 있다.","C":"세포분열에는 체세포분열과 생식세포 형성과정이 있음을 말할 수 있다.","D":"염색체와 유전자의 관계를 설명할 수 있다.","E":"유전자의 의미를 말할 수 있다."},"9과21-03":{"A":"수정란으로부터 개체가 발생하는 과정을 모형으로 표현하고 설명할 수 있다.","B":"수정란으로부터 개체가 발생하는 과정을 모형으로 표현할 수 있다.","C":"난할은 세포의 크기가 변하지 않고 세포 수가 증가하는 과정임을 설명할 수 있다.","D":"수정란으로부터 난할하여 개체가 발생한다는 것을 말할 수 있다.","E":"수정을 통해 수정란이 형성됨을 말할 수 있다."},"9과21-04":{"A":"멘델 유전 실험의 의의와 원리를 이해하고, 멘델 유전 원리가 적용되는 유전 현상을 조사하여 조사한 자료에 대해 협력적 소통을 할 수 있다.","B":"멘델 유전 실험의 의의와 원리를 이해하고, 멘델 유전 원리가 적용되는 유전 현상을 조사하여 발표할 수 있다.","C":"멘델 유전 실험의 의의와 원리를 이해하고, 멘델 유전 원리가 적용되는 유전 현상을 조사할 수 있다.","D":"멘델 유전 실험의 의의를 말하고, 멘델 유전 원리가 적용되는 유전 현상을 교사의 안내에 따라 조사할 수 있다.","E":"유전의 의미를 말할 수 있다."},"9과21-05":{"A":"사람의 유전 형질과 유전 연구 방법을 알고, 가계도 분석을 통해 사람의 유전 현상을 설명하며, 유전 현상에 대한 모의 활동을 하고 유전 현상에 대해 발표할 수 있다.","B":"사람의 유전 형질과 유전 연구 방법을 알고, 가계도를 분석하며, 유전 현상에 대한 모의 활동을 하고 유전 현상을 정리할 수 있다.","C":"사람의 유전 형질을 알고, 유전 연구 방법을 설명하며, 유전 현상에 대한 모의 활동에 참여할 수 있다.","D":"사람의 유전 형질을 알고, 유전 연구 방법을 나열하며, 유전 현상에 대한 모의 활동에 참여할 수 있다.","E":"사람의 유전 형질을 말하고, 교사의 안내에 따라 유전 현상에 대한 모의 활 동 에 참여할 수 있 다. (22) 재해 ･재난과 안전"}},"area":{"A":{"지식·이해":"세포분열의 필요성과 염색체와 유전자의 관계를 이해하고, 세포의 표면적과 부피의 관계를 설명하며, 체세포분열과 생식세포 형성과정의 특징을 염색체 행동을 중심으로 비교하여 설명할 수 있다. 멘델 유전 실험의 의의와 원리를 이해하고, 사람의 유전 형질과 유전 연구 방법을 알며, 가계도 분석을 통해 사람의 유전 현상을 설명할 수 있다.","과정·기능":"세포분열이 개체의 생장과 어떤 관련이 있는지 세포의 표면적과 부피의 관계로 추론하고, 수정란으로부터 개체가 발생하는 과정을 모형으로 표현하고 설명할 수 있다. 멘델 유전 원리가 적용되는 유전 현상을 조사하고, 조사한 자료에 대해 협력적 소통을 할 수 있다. 유전 현상에 대한 모의 활동을 하고 유전현상에 대해 발표할 수 있다.","가치·태도":"세포분열과 유전을 통해 자손을 번식시킴으로써 생명의 연속성이 유지됨을 인식하고, 생명 존중의 마음을 가진다."},"B":{"지식·이해":"세포분열을 통해 개체가 생장함을 이해하고, 세포의 표면적과 부피의 관계를 설명할 수 있다. 염색체와 유전자의 관계를 이해하고 체세포분열과 생식세포 형성과정의 특징을 염색체 행동을 중심으로 각각 설명할 수 있다. 멘델 유전 실험의 의의와 원리를 이해하고, 사람의 유전 형질과 유전 연구 방법을 알 수 있다.","과정·기능":"수정란으로부터 개체가 발생하는 과정을 모형으로 표현하고, 멘델 유전 원리가 적용되는 유전 현상을 조사하여 발표하고, 가계도 분석을 할 수 있다. 유전 현상에 대한 모의 활동을 하고 유전 현상을 정리할 수 있다.","가치·태도":"세포분열과 유전을 통해 자손을 번식시킴으로써 생명의 연속성이 유지됨을 인식한다."},"C":{"지식·이해":"세포분열을 통해 세포 수가 증가함을 말하고, 세포분열에는 체세포분열과 생식세포분열이 있음을 말하며, 난할은 세포의 크기가 변하지 않고 세포 수가 증가하는 과정임을 이해할 수 있다. 멘델의 유전 실험을 통해 발견한 우열의 원리, 분리의 법칙, 독립의 법칙을 설명하고, 사람의 유전 형질을 알고, 유전 연구 방법을 설명할 수 있다.","과정·기능":"수정란으로부터 개체가 발생하는 과정을 모형으로 이해하고, 멘델 유전 원리가 적용되는 유전 현상을 조사하고, 유전 현상에 대한 모의 활동에 참여할 수 있다.","가치·태도":"세포분열과 유전을 통해 자손이 번식됨을 인식한다."},"D":{"지식·이해":"세포분열과 개체의 생장을 연관 지어 설명하고, 염색체와 유전자의 관계를 설명하며, 수정란으로부터 난할하여 개체가 발생한다는 것을 말할 수 있다. 멘델 유전 실험의 의의를 말하고, 사람의 유전 형질을 알며, 유전 연구 방법을 나열할 수 있다.","과정·기능":"멘델 유전 원리가 적용되는 유전 현상을 교사의 안내에 따라 조사하고, 유전 현상에 대한 모의 활동에 참여할 수 있다.","가치·태도":"세포분열과 유전을 통해 자손이 번식됨을 인식한다."},"E":{"지식·이해":"세포분열을 통해 세포 수가 증가한다는 것과 유전자의 의미를 말하고, 수정을 통해 수정란이 형성됨을 말하며, 유전의 의미와 사람의 유전 형질을 말할 수 있다.","과정·기능":"교사의 안내에 따라 유전 현상에 대한 모의 활동에 참여할 수 있다.","가치·태도":"세포분열을 통해 생장과 번식이 이루어진다는 것에 대해 관심을 가진다."}}},"m13-22":{"codes":{"9과22-01":{"A":"재해･재난 사례와 관련된 자료를 수집하고, 빅데이터를 이용하여 각 사례의 발생 원인과 피해를 과학적으로 분석하며 비교할 수 있다.","B":"재해･재난 사례와 관련된 자료를 수집하고, 빅데이터를 이용하여 각 사례의 발생 원인과 피해를 과학적으로 분석하며 비교할 수 있다.","C":"재해･재난 사례와 관련된 자료를 수집하고, 빅데이터를 이용하여 각 사례의 피 해 를 과학적으로 분석할 수 있 다.","D":"재해･재난 사례와 관련된 자료를 수집하고, 빅데이터를 이용하여 각 사례의 피 해 를 과학적으로 분석할 수 있 다.","E":"디지털 탐구 도구를 이용하여 재해 ･재난 사례와 관련된 자료를 조사할 수 있다."},"9과22-02":{"A":"과학적 원리를 이용하여 재해･재난에 대한 사전 예방 및 대비 방안과 사후 대처 방안을 토의･토론을 통해 수립하고, 안전하고 지속가능한 사회 발전에 기여하며 재해･재난의 피해를 줄이기 위한 홍보자료를 제작하고 발표할 수 있다.","B":"과학적 원리를 이용하여 재해･재난에 대한 사전 예방 및 대비 방안과 사후 대처 방안을 토의･토론을 통해 수립하고, 안전하고 지속가능한 사회 발전에 기여하며 재해･재난의 피해를 줄이기 위한 홍보자료를 제작하고 발표할 수 있다.","C":"과학적 원리를 이용하여 재해 ･재난에 대한 사전 예방 및 대비 방안과 사후 대처 방안을 수립하고, 재해 ･재난의 피해를 줄이기 위한 홍보자료를 제작하고 발표할 수 있다.","D":"과학적 원리를 이용하여 재해 ･재난에 대한 사전 예방 및 대비 방안과 사후 대처 방안을 수립하고, 재해 ･재난의 피해를 줄이기 위한 홍보자료를 제작하고 발표할 수 있다.","E":"재 해 ･재난의 피해를 줄이기 위한 홍보자료를 제작할 수 있다. (23) 과학과 나의 미래"}},"area":{"A":{"지식·이해":"재해･재난 사례의 발생 원인, 피해, 예방 및 대비 방안, 대처 방안 등을 과학적 용어와 과학적 원리를 이용하여 설명할 수 있다.","과정·기능":"재해･재난 사례와 관련된 자료를 수집하고, 빅데이터를 이용하여 각 사례의 발생 원인과 피해를 과학적으로 비교 및 분석할 수 있다. 과학적 원리를 이용하여 재해･재난에 대한 사전 예방 및 대비 방안과 사후 대처 방안을 토의･토론을 통해 수립하고, 재해 ･재난의 피해를 줄이기 위한 홍보자료를 제작하고 발표할 수 있다.","가치·태도":"재해･재난에 관한 정보에 관심을 가지고, 과학이 재해 ･재난으로 인한 피해를 최소화하는 데 유
