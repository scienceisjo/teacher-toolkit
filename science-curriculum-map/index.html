하며, 일상생활의 다양한 상황에서 구체적인 사례를 들어 측정 표준의 유용성과 필요성을 설명할 수 있다.","C":"과학 탐구에서 측정 및 어림의 중요성을 인식하고, 일상생활에서 측정 표준이 필요한 사례와 활용되는 사례 를 조사하여 발표할 수 있 다.","D":"측정의 의미를 이해하고, 일상생활에서 측정 표준의 활용 사례를 제시할 수 있다.","E":"일상생활에서 측정 표준의 필요성을 말할 수 있다."},"10통과1-01-04":{"A":"인간을 둘러싼 자연계의 변화가 전달될 때 신호가 되며, 이를 측정ㆍ분석하여 정보가 산출됨을 이해하고, 센서를 통해 아날로그 형태의 신호를 디지털로 변환하는 기술이 정보 통신에서 활용되는 구체적인 사례를 분석하고, 디지털 정보 처리의 장단점을 파악하여 이러한 기술이 현대 문명에 미친 영향을 설명 할 수 있다.","B":"인간을 둘러싼 자연계의 변화가 전달될 때 신호가 되며, 이를 측정ㆍ분석하여 정보가 산출됨을 이해하고, 센서를 통해 아날로그 형태의 신호를 디지털로 변환하는 기술이 정보 통신에서 활용되는 사례를 조사하여 발표할 수 있다.","C":"인간을 둘러싼 자연계의 변화가 전달될 때 신호가 됨을 이해하고, 신호를 아날로 그 신호와 디지털 신호로 구분하며, 아날로그 신호가 센서를 통해 전기 신호로 바뀌어 디지털 정보로 변환됨을 설명할 수 있다.","D":"인간을 둘러싼 자연계의 변화가 전달될 때 신호가 된다는 것과 아날로그 신호와 디지털 신호의 특징을 이해하며, 일상생활에서 아날로그 신호와 디지털 신호의 사례 를 제시할 수 있 다.","E":"인간을 둘러싼 자연계의 변화가 전달될 때 신호가 됨을 말할 수 있다. (2) 물질과 규칙성"}},"area":{"A":{"지식·이해":"원자에서 우주까지 다양한 규모의 자연을 시간과 공간 관점에서 비교하면서 규모의 의미와 필요성을 이해하고, 과학자들의 시간과 공간을 측정하려는 노력이 인간의 경험 범위를 확장했음을 설명할 수 있다. 시간, 길이, 질량, 전류, 온도 등의 기본량으로부터 부피, 속력, 농도 등의 과학 개념을 유도하는 과정을 통해 자연 세계를 기술하는 데 있어서 기본량의 중요성을 이해하며, 자연 현상을 기술하는 데 물리량의 단위가 갖는 의미와 적용 사례를 설명할 수 있다. 또한 과학 탐구에서 측정과 어림의 의미와 중요성을 이해한다. 인간을 둘러싼 자연계의 변화가 전달될 때 신호가 되고, 이를 측정ㆍ분석하여 정보가 산출됨을 이해하며, 디지털 변환 기술 등 디지털 정보 기술이 현대 문명에 미치는 영향을 설명할 수 있다.","과정·기능":"원자에서 우주까지 다양한 규모의 자연을 시간과 공간 차원에서 비교하며, 길이와 시간을 측정하는 현대적인 방법과 다양한 규모의 측정 사례를 조사하여 발표할 수 있다. 디지털 탐구 도구를 활용해 다양한 기본량을 측정하고, 과학 탐구와 일상생활에서 측정과 어림을 적절하게 활용해 측정한 값을 단위를 사용하여 표현하며, 측정 표준의 필요성과 유용성을 논증할 수 있다. 센서를 통해 아날로그 형태의 신호를 디지털로 변환하는 기술이 정보 통신 분야에서 활용되는 사례 를 제시하고 발표할 수 있 다.","가치·태도":"시공간이나 규모, 측정 등에 흥미와 호기심을 가지고, 시간과 공간을 측정하려는 과학자들의 노력이 인간의 경험 범위 확장에 기여했음을 알며, 이를 통해 인간의 도전 정신의 위대함과 과학의 가치와 인간의 활동으로서 과학의 한계를 함께 인식한다. 측정과 어림의 중요성을 인식하여 과학 탐구와 일상생활에서 이를 적절하게 활용하 는 태도를 가지며, 기본량의 중요성과 측정 표준의 필요성, 유용성을 인식한다. 디지털 정보 기술이 일상생활과 산업에 미친 영향을 인식한다."},"B":{"지식·이해":"원자에서 우주까지 다양한 규모의 자연을 시간과 공간 관점에서 비교하면서 규모의 의미와 필요성을 이해하고, 길이와 시간의 현대적인 측정 방법을 설명할 수 있다. 시간, 길이, 질량, 전류, 온도 등의 기본량과 부피, 속력, 농도 등의 과학 개념과의 관계를 이해하고, 자연 현상을 기술하는 여러 물리량의 단위와 적용 사례를 말할 수 있다. 인간을 둘러싼 자연계의 변화가 전달될 때 신호가 되고, 이를 측정ㆍ분석하여 정보가 산출됨을 이해하며, 센서를 통해 아날로그 형태의 신호를 디지털로 변환하는 기술이 정보 통신에서 활용되는 사례를 들고 설명할 수 있다.","과정·기능":"원자에서 우주까지 다양한 규모의 자연을 시간과 공간 차원에서 비교하며, 길이와 시간의 현대적인 측정 방법을 조사하여 발표할 수 있다. 디지털 탐구 도구를 활용해 다양한 기본량을 측정하고, 자연 현상을 기술하는 여러 물리량의 단위와 적용 사례를 조사하여 발표할 수 있다. 탐구 및 일상생활 에서 측정값을 단위를 사용하여 정확하게 표현하고, 측정 표준의 필요성과 유용 성을 이들 사례 에 서 제시할 수 있 다. 센서를 통해 아날로그 형태의 신호를 디지털로 변환하는 기술을 정보 통신에서 활용한 사례 를 조사할 수 있 다.","가치·태도":"과학과 산업이 발전하는 데 다양한 규모의 시간과 공간의 측정이 미친 영향과 자연을 기술하는 데 기본량이 필요함을 인식하고, 기본량과 과학 개념과의 관계에 흥미를 가진다. 측정과 어림의 중요성과 유용성을 인식하여 과학 탐구에서 이를 활용하는 태도를 가지며, 측정 표준과 디지털 정보 기술이 과학과 산업, 일상생활에서 유용하게 활용되는 사례로부터 측정 표준과 디지털 정보 기술의 필요성을 주장할 수 있다."},"C":{"지식·이해":"자연을 다양한 규모의 시간과 공간에서 비교하며 규모의 의미를 이해하고, 시간, 길이, 질량, 전류, 온도 등이 자연을 관찰하고 기술하는 데 필요한 과학의 기본량임을 알며, 기본량의 대표적인 단위를 말하고 기본량의 적용 사례를 설명할 수 있다. 측정과 어림의 의미를 안다. 인간을 둘러싼 자연계의 변화가 전달될 때 신호가 되며 이를 측정ㆍ분석하여 정보가 산출됨을 이해하고, 아날로그 신호와 디지털 신호를 구별하며, 센서를 통해 아날로그 신호가 디지털 정보로 변환됨을 설명할 수 있다.","과정·기능":"길이와 시간 측정의 다양한 사례를 조사하고, 기본량들의 대표적인 단위와 적용 사례를 제시할 수 있다. 디지털 탐구 도구를 활용해 다양한 기본량을 측정하고, 일상생활에서 측정 표준이 필요한 상황과 활용되는 사례를 조사하여 발표할 수 있다. 일상생활에서 아날로그 신호와 디지털 신호의 사례를 구별하여 제시할 수 있다.","가치·태도":"다양한 규모의 시간과 공간의 측정 방법에 호기심을 가지고, 과학 탐구에서 정확한 측정과 어림의 중요성을 파악하여 측정 표준과 디지털 정보 기술이 일상 생활에서 유용하게 활용되는 사례로부터 측정 표준과 디지털 정보 기술의 필요 성을 인식한다."},"D":{"지식·이해":"자연을 시간과 공간의 관점에서 비교하며 기술할 수 있음을 이해하고, 이를 위해 필요한 과학의 기본량으로 시간, 길이, 질량, 전류, 온도 등이 있음을 이해하며, 측정과 측정 표준의 의미를 말할 수 있다. 인간을 둘러싼 자연계의 변화가 전달될 때 신호가 됨을 이해하고, 아날로그 신 호와 디지털 신호의 특징을 파악할 수 있다.","과정·기능":"자연의 다양한 시간ㆍ공간적 규모의 예를 비교하고, 일상생활에서 기본량과 측정 표준이 활용되는 사례를 제시할 수 있다. 일상생활의 다양한 신호를 아날로그 신호와 디지털 신호로 구분할 수 있다.","가치·태도":"자연의 다양한 시간ㆍ공간적 특성과 규모에 관심을 가지고 과학 탐구와 일상생 활에서 정확한 측정의 의미를 파악하여 측정 표준의 필요성을 인식한다. 다양한 신호와 정보 전달에 호기심을 갖고, 일상생활에서 디지털 신호의 유용성을 인식한다."},"E":{"지식·이해":"자연을 관찰하고 기술하기 위해 기본량이 존재함을 알고, 일상생활에서 측정 표준의 필요성을 말할 수 있다. 인간을 둘러싼 자연계의 변화가 전달될 때 신호가 됨을 말할 수 있다.","과정·기능":"자연의 다양한 시간과 공간적 규모의 예를 비교하고, 일상생활에서 기본량과 측정 표준이 활용되는 사례를 제시할 수 있다. 일상생활에서 다양한 신호의 예를 조사할 수 있다.","가치·태도":"자연의 시간ㆍ공간적 특성과 규모에 관심을 가지고 과학 탐구와 일상생활에서 기본량과 측정 표준의 필요성을 인식하며, 다양한 신호와 정보 전달에 관심을 가진다."}}},"h1-02":{"codes":{"10통과1-02-01":{"A":"분광기를 활용하여 수소와 헬륨 등 다양한 원소의 선스펙트럼을 관찰하고, 그 결과를 천체에서 방출되는 빛의 스펙트럼과 비교하여 수소와 헬륨이 우주 초기 부터 진화 과정을 거쳐 형성되었음을 해석하고, 우주 초기에 형성된 수소와 헬륨이 현재 우주의 주요 구성 원소임을 추론할 수 있다.","B":"천체에서 방출되는 스펙트럼 자료를 통해 우주 전체에 가장 많은 원소가 수소와 헬륨임을 추론하고, 수소와 헬륨이 우주 초기부터의 진화 과정을 거쳐서 형성 되었음을 설명할 수 있다.","C":"천체에서 방출되는 빛의 스펙트럼 자료를 통해 우주 전체에 가장 많은 원소인 수소와 헬륨이 천체의 주요 구성 물질임을 설명할 수 있다.","D":"우주 전체에 가장 많은 원소인 수소와 헬륨이 천체의 주요 구성 물질임을 말 할 수 있다.","E":"우주 전체에 가장 많은 원소가 수소와 헬륨임을 말할 수 있다."},"10통과1-02-02":{"A":"별 내부의 핵융합을 통해 우주 초기의 원소들로부터 태양계와 생명체를 구성하는 탄소, 질소, 산소와 같은 원소들이 형성되는 과정과 초신성 폭발을 통해 철보다 무거운 원소가 형성되는 과정을 설명하고, 이로부터 지구와 생명체의 역사가 우주 역사의 일부분임을 해석할 수 있다.","B":"별 내부의 핵융합을 통해 우주 초기의 원소들로부터 태양계와 생명체를 구성하는 탄소, 질소, 산소와 같은 원소들이 형성되는 과정을 이해하고, 이로부터 지구와 생명체의 역사가 우주 역사의 일부분임을 해석할 수 있다.","C":"별 내부의 핵융합을 통해 탄소, 질소, 산소와 같은 원소들이 형성되는 것을 이해하고, 별의 진화 과정을 거쳐 우주 초기의 원소로부터 지구와 생명체를 구성하는 원소가 생성됨을 설명할 수 있다.","D":"별 내부의 핵융합을 통해 우주 초기의 원소로부터 지구와 생명체를 구성하는 원소가 생성됨을 말할 수 있다.","E":"우주 초기의 원소로부터 지구와 생명체를 구성하는 원소가 생성됨을 말할 수 있다."},"10통과1-02-03":{"A":"세상을 구성하는 원소들의 성질이 주기성을 나타내는 현상을 통해 자연의 규칙성을 도출하고, 지구와 생명체를 구성하는 주요 원소들이 결합을 형성하는 이유를 전자껍질 모형을 이용한 전자배치를 통해 안정성을 지닌 원소와 비교하여 설명 할 수 있다.","B":"세상을 구성하는 원소들의 성질이 주기성을 나타내는 현상을 통해 자연의 규칙성을 도출하고, 지구와 생명체를 구성하는 주요 원소들이 결합을 형성하는 이유를 전자껍질 모형을 이용한 전자배치로 설명할 수 있다.","C":"주기율표에서 같은 족 원소들의 유사한 화학적 성질을 이해하고, 지구와 생명체를 구성하는 주요 원소들이 화학 결합을 형성하는 이유를 전자껍질 모형을 이 용 한 전자배치로 설명할 수 있 다.","D":"주기율표에서 화학적 성질이 유사한 원소들을 알고, 지구와 생명체를 구성하는 주요 원소들이 화학 결합을 형성함을 말할 수 있다.","E":"지구와 생명체를 구성하는 주요 원소들이 화학 결합을 형성함을 말할 수 있다."},"10통과1-02-04":{"A":"인류의 생존에 필수적인 물, 산소, 소금 등이 만들어지는 결합을 이온 결합과 공유 결합으로 구분하고, 이온 결합과 공유 결합이 구성 원소에 따라 달라짐을 이해하며, 이온 결합 화합물과 공유 결합 화합물의 전기 전도성을 설명할 수 있다.","B":"인류의 생존에 필수적인 물, 산소, 소금 등이 만들어지는 결합을 이온 결합과 공유 결합으로 구분하고, 이온 결합 화합물과 공유 결합 화합물의 전기 전도성을 설명할 수 있다.","C":"인류의 생존에 필수적인 물, 산소, 소금 등이 만들어지는 결합을 이온 결합과 공유 결합으로 구분하고, 이온 결합 화합물과 공유 결합 화합물의 전기 전도성이 다름을 말할 수 있다.","D":"물, 산소, 소금이 만들어지는 결합을 이온 결합과 공유 결합으로 구분할 수 있다.","E":"물, 산소, 소금이 만들어지는 결합으로 이온 결합과 공유 결합이 있음을 말할 수 있다."},"10통과1-02-05":{"A":"규산염 광물, 단백질, 핵산 등이 기본 단위체인 Si-O 사면체, 아미노산, 뉴클레 오타이드의 다양한 결합을 통해 형성됨을 이해하고, 구조적 특징을 모형으로 표현하며, 지각과 생명체를 구성하는 물질들이 기본 단위체의 결합을 통해 생 성 됨 을 설명할 수 있 다.","B":"규산염 광물, 단백질, 핵산 등이 기본 단위체인 Si-O 사면체, 아미노산, 뉴클레 오타이드의 다양한 결합을 통해 형성됨을 이해하고, 이들이 지각과 생명체를 구성하는 물질이라는 것을 설명할 수 있다.","C":"기본 단위체가 결합하여 규산염 광물, 단백질과 핵산을 형성하며, 이들이 지각과 생명체를 구성하는 물질이라는 것을 설명할 수 있다.","D":"지각과 생명체를 구성하는 물질에 규산염 광물, 단백질과 핵산이 있음을 말할 수 있다.","E":"지각과 생명체는 여러 물질로 구성됨을 말할 수 있다."},"10통과1-02-06":{"A":"지구를 구성하는 물질의 전기적 성질을 물질 내 자유 전자의 이동에 따라 도체, 부도체, 반도체로 구분하고, 규산염 광물에 불순물을 추가하여 전기적 성질을 제어하는 원리를 설명하며, 물질의 전기적 성질을 응용하여 일상생활과 첨단기 술에서 다양한 소재로 활용하는 예를 제시함으로써 과학의 유용성을 인식한다.","B":"지구를 구성하는 물질의 전기적 성질을 물질 내 자유 전자의 이동에 따라 도체, 부도체, 반도체로 구분하고, 규산염 광물에 불순물을 추가하여 전기적 성질을 제어하는 원리를 설명할 수 있다.","C":"도체, 부도체, 반도체의 전기적 성질을 비교할 수 있으며, 지구를 구성하는 물 질을 도체, 부도체, 반도체로 구분할 수 있다.","D":"도체, 부도체, 반도체의 전기적 성질을 비교하여 설명할 수 있다.","E":"지구를 구성하는 물질을 전기적 성질에 따라 구분할 수 있음을 말할 수 있다. (3) 시스템과 상호작용"}},"area":{"A":{"지식·이해":"천체에서 방출되는 빛의 스펙트럼으로부터 수소와 헬륨이 현재 우주의 주요 구성 원소임을 이해하고, 생명체를 구성하는 탄소, 질소, 산소와 같은 원소들이 별 내부의 핵융합을 통해 형성되었으며, 초신성 폭발의 결과로 철보다 무거운 원소가 만들어졌음을 설명할 수 있다. 이로부터 지구와 생명체의 역사가 우주 역사의 일부분임을 해석할 수 있다. 자연계에 존재하는 원소에는 규칙성이 있음을 이해하여 지구와 생명체를 구성 하는 주요 원소들이 결합을 형성하는 이유를 전자껍질 모형을 이용한 전자배치를 통해 안정성을 지닌 원소와 비교하여 설명할 수 있다. 물, 산소, 소금 등이 만들 어지는 결합을 이온 결합과 공유 결합을 구분하여 구성 원소에 따라 화학 결합이 달라짐을 이해하며, 화학 결합으로 나타나는 성질을 전기 전도성으로 설명할 수 있다. 지각과 생명체를 구성하는 물질들이 기본 단위체인 Si-O 사면체, 아미노산, 뉴클레오타이드의 다양한 결합을 통해 생성됨을 알고, 지구를 구성하는 여러 물질을 물질 내 자유 전자의 이동에 따라 도체, 부도체, 반도체로 구분할 수 있다. 규산염 광물에 불순물을 추가하여 전기적 성질을 제어하는 반도체의 원리를 이해하고, 물질의 전기적 성질을 응용하여 일상생활과 첨단기술에서 다양한 소재로 활용함을 예를 들어 설명할 수 있다.","과정·기능":"분광기를 활용하여 수소와 헬륨 등 다양한 원소의 스펙트럼을 관찰하고, 천체에서 방출되는 빛의 스펙트럼 자료와 비교하며 우주 진화 초기에 만들어진 수소와 헬륨이 현재 우주의 주요 구성 성분임을 추론할 수 있다. 같은 족 원소들의 유사성을 탐구하는 실험의 설계 및 수행을 통해 원소의 주기성을 도출하고, 전기 전도성을 이용하여 이온 결합 화합물과 공유 결합 화합물을 구별하는 실험을 설계할 수 있다. 규산염 광물, 단백질, 핵산 등을 모형으로 제작하여 구조적 특징과 규칙성을 도출하고, 지구를 구성하는 물질의 전기적 성질을 물질 내 자유 전자의 이동에 따라 도체, 부도체, 반도체로 구분할 수 있다.","가치·태도":"지구와 생명체의 역사가 우주 역사의 일부분인 것과 지구와 생명체를 구성하는 원소가 화학 결합을 하는 것으로부터 우주, 지구, 생명의 관계의 심미적 가치를 인식한다. 규산염 광물이 현대 사회에서 필수적인 반도체 소자의 재료로 활용되는 사례 등 과학이 일상생활과 첨단기술에서 쓰이는 사례로부터 과학의 유용성을 인식한다."},"B":{"지식·이해":"천체에서 방출되는 빛의 스펙트럼으로부터 수소와 헬륨이 현재 우주의 주요 구성 원소임을 이해하고, 생명체를 구성하는 탄소, 질소, 산소와 같은 원소들이 별 내부의 핵융합을 통해 형성되었음을 설명할 수 있다. 이로부터 지구와 생명체의 역사가 우주 역사의 일부분임을 해석할 수 있다. 자연계에 존재하는 원소에는 규칙성이 있음을 이해하여 지구와 생명체를 구성 하는 주요 원소들이 결합을 형성하는 이유를 전자껍질 모형을 이용한 전자배치로 설명하고, 물, 산소, 소금 등이 만들어지는 결합을 이온 결합과 공유 결합으로 구분하여 두 화합물의 차이를 전기 전도성으로 설명할 수 있다. 지각과 생명체를 구성하는 물질들이 기본 단위체인 Si-O 사면체, 아미노산, 뉴클레오타이드의 다양한 결합을 통해 생성됨을 알고, 지구를 구성하는 여러 물질을 자유 전자의 이동에 따라 도체, 부도체, 반도체로 구분하며, 규산염 광물에 불순물을 추가하여 전기적 성질을 제어하는 반도체의 원리를 설명할 수 있다.","과정·기능":"다양한 원소의 스펙트럼을 관찰하고, 천체에서 방출되는 빛의 스펙트럼 자료와 비교하여 우주 진화 초기에 만들어진 수소와 헬륨이 현재 우주의 주요 구성 성 분 임 을 추론할 수 있 다. 같은 족 원소들의 유사성을 탐구하는 실험의 설계 및 수행을 통해 원소의 주기성을 도출하고, 전기 전도성을 이용하여 이온 결합 화합물과 공유 결합 화합물을 구별하는 실험을 설계할 수 있다. 규산염 광물, 단백질, 핵산 등의 구조적 특징을 모형으로 표현하고, 지구를 구성 하는 물질의 전기적 성질을 물질 내 자유 전자의 이동에 따라 도체, 부도체, 반 도 체 로 구분할 수 있 다.","가치·태도":"지구와 생명체의 역사가 우주 역사의 일부분인 것과 지구와 생명체를 구성하는 원소가 화학 결합을 하는 것으로부터 우주, 지구, 생명의 관계의 심미적 가치를 인식한다. 지구 구성 물질인 규산염 광물이 반도체 소자의 재료로 활용되는 것 으로부터 과학의 유용성을 인식한다."},"C":{"지식·이해":"천체에서 방출되는 빛의 스펙트럼으로부터 수소와 헬륨이 천체의 주요 구성 원소임을 이해하고, 생명체를 구성하는 탄소, 질소, 산소와 같은 원소들이 별 내부의 핵융합을 통해 형성되었음을 설명할 수 있다. 주기율표의 같은 족 원소들이 유사한 화학적 성질을 가짐을 이해하여 지구와 생명체를 구성하는 주요 원소들이 결합을 형성하는 이유를 전자껍질 모형을 이 용한 전자배치로 설명할 수 있다. 물, 산소, 소금 등이 만들어지는 결합을 이온 결합과 공유 결합으로 구분하고, 두 화합물의 전기 전도성이 다름을 설명할 수 있다. 지각과 생명체를 구성하는 규산염 광물, 단백질, 핵산이 기본 단위체의 결합을 통해 생성됨을 알고, 도체, 부도체, 반도체를 전기적 성질의 차이로 설명할 수 있다.","과정·기능":"천체에서 방출되는 빛의 스펙트럼 자료로부터 수소와 헬륨이 천체의 주요 구성 물 질 임 을 추론할 수 있 다. 주기율표에서 원소를 유사한 화학적 성질로 분류하며, 이온 결합 화합물과 공유 결합 화합물의 전기 전도성을 비교할 수 있다. 규산염 광물, 단백질, 핵산 등을 구조적 특징을 모형으로 표현하고, 지구를 구성 하는 물질을 전기적 성질에 따라 도체, 부도체, 반도체로 구분할 수 있다.","가치·태도":"우주 초기의 원소로부터 지구와 생명체를 구성하는 원소가 생성되는 것, 지구와 생명체를 구성하는 원소가 화학 결합을 하는 것으로부터 우주, 지구, 생명의 관계의 심미적 가치를 인식한다. 일상생활과 첨단기술에서 지구 구성 물질이 활용된다는 것으로부터 과학의 유 용성을 인식한다."},"D":{"지식·이해":"수소와 헬륨이 천체의 주요 구성 물질이면서 우주 전체에 가장 많음을 알고, 생명체를 구성하는 원소들이 별 내부의 핵융합을 통해 형성되었음을 말할 수 있다. 주기율표에서 화학적 성질이 유사한 원소들을 알고, 지구와 생명체를 구성하는 주요 원소들이 화학 결합을 형성함을 말하며, 물, 산소, 소금 등이 만들어지는 결합을 이온 결합과 공유 결합으로 구분할 수 있다. 지각과 생명체를 구성하는 물질에 규산염 광물, 단백질, 핵산이 있음을 알고, 도체, 부도체, 반도체의 전기적 성질을 비교하여 설명할 수 있다.","과정·기능":"분광기를 이용하여 스펙트럼을 관찰한 자료로부터 수소와 헬륨을 구별할 수 있다. 주기율표에서 화학적 성질이 유사한 원소를 구별하고 이온 결합 화합물과 공유 결합 화합물의 전기 전도성을 비교할 수 있다. 규산염 광물, 단백질, 핵산 등을 모형으로 제작하고, 도체, 부도체, 반도체의 전기적 성질을 비교할 수 있다.","가치·태도":"우주 초기의 원소로부터 지구와 생명체를 구성하는 원소가 생성되는 것, 지구와 생명체를 구성하는 원소가 화학 결합을 하는 것으로부터 우주, 지구, 생명의 관계의 심미적 가치를 인식한다."},"E":{"지식·이해":"우주 전체에 수소와 헬륨이 가장 많음을 알고, 생명체를 구성하는 원소들이 우주 초기의 원소로부터 생성되었음을 말할 수 있다. 지구와 생명체를 구성하는 주요 원소들이 화학 결합을 형성함을 알고, 물, 산소, 소금 등이 이온 결합과 공유 결합으로 만들어짐을 말할 수 있다. 지각과 생명체가 여러 물질로 구성됨을 알고, 지구를 구성하는 물질이 전기적 성질에 따라 구분됨을 말할 수 있다.","과정·기능":"분광기를 이용하여 스펙트럼을 관찰할 수 있다. 주기율표에서 같은 족 원소를 구별하고 이온 결합 화합물과 공유 결합 화합물의 전 기 전도성을 측정할 수 있 다. 규산염 광물, 단백질, 핵산 등을 안내된 절차에 따라 모형으로 제작하고, 도체, 부도체, 반도체의 전기적 성질을 조사할 수 있다.","가치·태도":"우주 초기의 원소로부터 지구와 생명체를 구성하는 원소가 생성되는 것, 지구와 생명체를 구성하는 원소가 화학 결합을 하는 것으로부터 우주, 지구, 생명의 관계에 관심을 가진다."}}},"h1-03":{"codes":{"10통과1-03-01":{"A":"지구시스템이 태양계라는 시스템의 구성요소임을 말하고, 지구시스템을 구성 하는 권역들의 성층구조를 이해하여 권역들이 상호작용하는 과정에서 물질 순 환과 에너지 흐름의 결과로 여러 자연 현상이 일어나게 됨을 전 지구 규모의 빅데이터를 통해 파악하고, 지구시스템의 균형이 깨짐으로써 나타날 수 있는 영향을 조사하여 토론할 수 있다.","B":"지구시스템이 태양계라는 시스템의 구성요소임을 말하고, 지구시스템의 권역 들이 상호작용하는 과정에서 물질 순환과 에너지 흐름의 결과로 나타나는 자연 현상의 사례를 전 지구 규모의 빅데이터를 통해 파악하고, 지구시스템의 균형 이 깨짐으로써 나타날 수 있는 영향을 조사하고 토론할 수 있다.","C":"지구시스템을 구성하는 각 권역들의 상호작용으로 나타나는 자연 현상을 물질 순환과 에너지 흐름으로 설명하고, 지구시스템의 균형이 깨짐으로써 나타날 수 있는 영향에 대해 조사할 수 있다.","D":"지구시스템을 구성하는 권역들이 상호작용하는 예를 말할 수 있다.","E":"지구시스템을 구성하는 권역들을 말할 수 있다."},"10통과1-03-02":{"A":"지권의 변화를 판구조론 관점에서 해석하고, 에너지 흐름의 결과로 발생하는 지권의 변화가 지구시스템을 구성하는 각 권역에 미치는 영향을 추론하며, 지 구시스템의 지속가능성을 위한 과학의 역할을 인식한다.","B":"지권의 변화를 판구조론 관점에서 해석하고, 지권의 변화가 지구 시스템에 미치는 영향을 사례를 들어 설명하며, 지구시스템의 지속가능성을 위한 과학의 역할을 인식한다.","C":"지진과 화산 활동이 판의 운동에 의한 결과임을 이해하고, 지구와 생명 시스템 측면에서 피해를 줄이기 위한 대책을 조사할 수 있다.","D":"지진대와 화산대의 분포를 판의 경계와 관련지어 설명할 수 있다.","E":"판의 경계에서 지진과 화산 활동이 주로 일어남을 말할 수 있다."},"10통과1-03-03":{"A":"힘과 가속도의 관계에 대한 이해를 바탕으로 자유 낙하 운동과 지구 주위를 공전하는 원운동을 지구 중심 방향으로 작용하는 중력에 의한 가속도 운동으로 해석하고, 일상생활에서 중력의 작용에 의한 다양한 운동 사례를 구체적으로 설명할 수 있다.","B":"자유 낙하 운동과 지구 주위를 공전하는 원운동의 가속도를 비교하여 두 운동이 지구 중심 방향의 중력의 작용에 의한 운동임을 설명할 수 있다.","C":"자유 낙하하는 물체와 수평으로 던진 물체의 운동의 가속도를 비교하여 두 운동이 중력의 작용에 의한 물체의 운동을 설명할 수 있다.","D":"힘이 작용하는 물체는 가속도 운동함을 이해하고, 자유 낙하하는 물체와 수평 으로 던진 물체의 운동의 가속도를 각각 화살표로 나타낼 수 있다.","E":"지구 표면과 지구 주위의 다양한 운동이 중력의 영향을 받고 있음을 말할 수 있다. 줄이기 위한 대책 수립하기"},"10통과1-03-04":{"A":"상호작용이 없을 때 물체가 가속되지 않음을 이해하고, 상호작용에 의해 물체가 받는 충격량이 운동량의 변화와 같음을 설명하며, 관성 법칙과 충격량을 활용한 안전사고 예방 대책 및 장치를 고안하고 공유함으로써 과학의 유용성을 인식한다.","B":"상호작용에 의해 물체가 받는 충격량과 운동량의 변화와의 관계를 이해하고 충돌 관련 안전장치와 스포츠에 적용된 원리를 설명하여 과학의 유용성을 인식한다.","C":"상호작용이 물체의 운동에 미치는 영향을 이해하고, 충돌 관련 안전장치와 스포츠에서 관성 법칙, 충격량과 운동량의 관계가 적용되는 사례를 조사하여 발표할 수 있다.","D":"충격량과 운동량을 이해하고, 충돌 관련 안전장치와 스포츠에서 충격량과 운동량의 관계를 활용한 예를 제시할 수 있다.","E":"충돌 관련 안전장치나 스포츠에 과학적 원리가 활용됨을 말할 수 있다."},"10통과1-03-05":{"A":"생명 시스템을 유지하기 위해 세포에서 효소가 관여하는 다양한 화학 반응과 세포막을 통한 선택적 물질 출입이 일어남을 설명하고, 일상생활에서 활용되는 화학 반응 사례를 조사하여 발표할 수 있다.","B":"생명 시스템을 유지하기 위해 세포에서 일어나는 다양한 화학 반응과 물질 출입을 예를 들어 설명하고, 화학 반응이 일상생활에서도 활용될 수 있음을 말할 수 있다.","C":"생명 시스템의 기본 단위인 세포에서 일어나는 화학 반응과 물질 출입이 생명 시스템을 유지하기 위해 필요함을 설명할 수 있다.","D":"세포가 화학 반응과 물질 출입이 일어나는 생명 시스템의 기본 단위임을 인식한다.","E":"생명체에서 화학 반응과 물질 출입이 일어남을 말할 수 있다."},"10통과1-03-06":{"A":"생명 시스템의 유지에 필요한 세포 내 정보가 DNA에 유전자로 저장되어 있음을 인식하고, 전사와 번역을 통해 유전자의 염기 서열 정보가 아미노산 서열로 변환되어 단백질이 생성되는 세포 내 정보 흐름의 체계적 구성을 설명할 수 있다.","B":"생명 시스템의 유지에 필요한 세포 내 정보가 DNA에 유전자로 저장되어 있음을 인식하고, 전사와 번역을 통해 유전자로부터 단백질이 만들어지는 과정을 설명할 수 있다.","C":"생명 시스템의 유지에 필요한 세포 내 정보가 DNA에 유전자로 저장되어 있음을 인식하고, 세포 내 정보가 유전자로부터 RNA를 거쳐 단백질로 이동함을 말할 수 있다.","D":"생명 시스템의 유지에 필요한 세포 내 정보가 유전자에 들어 있음을 인식하고, 유전자에 들어 있는 정보를 바탕으로 단백질이 생성됨을 말할 수 있다.","E":"세포에는 생명 시스템의 유지에 필요한 정보가 들어 있음을 말할 수 있다."}},"area":{"A":{"지식·이해":"지구시스템은 태양계라는 시스템의 구성요소라는 것과 지구시스템을 구성하는 권역들이 성층구조임을 이해하고, 여러 자연 현상은 권역들이 상호작용하는 과정에서 물질 순환과 에너지 흐름의 결과로 일어나는 것임을 설명할 수 있다. 지구시스템 차원에서 연계성을 파악하여 지구시스템의 균형이 깨짐으로써 나타 날 수 있는 영향을 이해하고, 지권의 변화를 판구조론 관점에서 해석하여 지구 내부 에너지 흐름의 결과로 발생하는 지권의 변화가 지구시스템을 구성하는 각 권역에 미치는 영향을 추론할 수 있다. 자유 낙하 운동과 지구 주위를 공전하는 원운동을 중력에 의한 지구 중심 방향의 가속도 운동으로 해석하고, 일상생활에서 중력에 의한 다양한 운동 사례를 구체 적으로 설명할 수 있다. 상호작용이 없을 때 물체가 가속되지 않음을 이해하여 상호작용으로 물체가 받는 충격량이 운동량의 변화량과 같음을 설명할 수 있다. 생명 시스템을 유지하기 위해 세포에서 효소가 관여하는 다양한 화학 반응과 세포막을 통한 물질의 선택적 출입이 일어남을 설명하고, 생명 시스템의 유지에 필요한 세포 내 정보가 DNA에 유전자로 저장되며, 전사와 번역을 통해 유전자의 염기 서열 정보가 아미노산 서열로 변환되어 단백질이 생성되는 세포 내 정보 흐름의 체계적 구성을 설명할 수 있다. 이를 통해 세포부터 지구에 이르기까지 우리 주변이 시스템으로 구성되고, 시스템 구성 요소들 간에 상호작용이 지속적으로 일어남을 이해한다.","과정·기능":"디지털 인공지능 소양을 바탕으로 빅데이터를 통해 지구시스템 차원의 자료를 분석함으로써 지구시스템의 연계성에 대한 결론을 도출하고, 지권의 변화가 지구시스템을 구성하는 각 권역에 미치는 영향을 조사하여 제시할 수 있다. 이로부터 지구시스템의 균형이 깨짐으로써 나타날 수 있는 영향을 조사하여 토론할 수 있다. 자유 낙하와 수평으로 던진 물체의 운동을 시각화하여 표현하고 해석하며, 관성 법칙과 상호작용에 의해 물체가 받는 충격량이 운동량을 변화시키는 것으로부터 충돌과 관련된 안전사고 예방 대책 및 장치를 고안하고 공유할 수 있다. 세포막과 효소의 특성을 알아보기 위해 변인을 조작적으로 정의하여 실험을 설계 하고 수행하며, 일상생활에서 활용되는 화학 반응의 사례를 조사하여 발표하고, 생명 시스템의 유지에 필요한 세포 내 정보의 흐름을 모형으로 표현할 수 있다.","가치·태도":"지구시스템을 구성하는 권역들 간의 상호작용이 지구 생명체의 존속에 영향을 미치는 것을 인식하고, 자연과 과학에 대한 감수성을 가지고 지속가능한 사회를 위한 실천 방안을 수립하여 실천할 수 있다. 충돌과 관련된 안전사고 예방 대책 및 장치를 고안하는 과정에서 창의성을 발휘 하고, 일상생활에서 적용되는 과학 원리로부터 과학의 유용성을 인식한다."},"B":{"지식·이해":"지구시스템이 태양계라는 시스템의 구성요소이며, 지구시스템의 권역들이 상호 작용하는 과정에서 물질 순환과 에너지 흐름의 결과로 자연 현상이 나타남을 설명할 수 있다. 지권의 변화를 판구조론 관점에서 이해하고, 지권의 변화가 지구시스템에 미치는 영향을 사례를 들어 설명할 수 있다. 자유 낙하 운동과 지구 주위를 공전하는 원운동이 중력이 지구 중심 방향으로 작용한 운동임을 이해하고, 충격량과 운동량의 관계를 이해하여 충돌 관련 안전 장치와 스포츠의 원리를 설명할 수 있다. 생명 시스템을 유지하기 위해 세포에서 일어나는 다양한 화학 반응과 물질 출입을 예를 들어 설명하고, 생명 시스템의 유지에 필요한 세포 내 정보가 DNA에 유전자로 저장됨을 알며 전사와 번역을 통해 유전자로부터 단백질이 만들어지는 과정을 설명할 수 있다.","과정·기능":"빅데이터를 통한 지구 시스템 차원의 자료를 분석하여 지구시스템 차원에서 연계성을 관찰하고, 지권의 변화가 지구 시스템에 영향을 미치는 사례를 제시 하며, 지구시스템의 균형이 깨짐으로써 나타날 수 있는 영향을 조사하여 토론할 수 있다. 자유 낙하 운동과 지구 주위를 공전하는 원운동의 가속도를 분석하고, 충돌 관련 안전사고 예방 대책 및 장치를 고안할 수 있다. 세포막과 효소의 특성을 알아보기 위한 실험을 수행하고, 일상생활에서 활용 되는 화학 반응 사례를 조사하여 발표하며, 생명 시스템 유지에 필요한 세포 내 정보의 흐름을 모형으로 표현할 수 있다.","가치·태도":"지구시스템을 구성하는 권역들 간의 상호작용이 지구 생명체의 존속에 영향을 미치는 것을 인식하고, 자연과 과학에 대한 감수성을 가지고 지속가능한 사회를 위한 과학의 역할을 인식한다. 충돌과 관련된 안전사고 예방 대책 및 장치를 고안하는 과정에서 창의성을 발휘 하여 과학의 유용성을 인식한다."},"C":{"지식·이해":"지구시스템에서의 물질 순환과 에너지 흐름으로 각 권역들의 상호작용을 설명 하고, 지진과 화산 활동이 판의 운동에 의한 결과임을 이해한다. 자유 낙하 운동과 수평으로 던진 물체의 운동이 중력의 작용에 의한 것임을 설명하고, 상호작용이 물체의 운동에 미치는 영향을 이해한다. 세포에서 일어나는 화학 반응과 물질 출입이 생명 시스템을 유지하기 위해 필요 함을 설명할 수 있다. 생명 시스템의 유지에 필요한 세포 내 정보가 DNA에 유전자로 저장되고, 세포 내 정보가 유전자로부터 RNA를 거쳐 단백질로 이동함을 이해한다.","과정·기능":"지권의 변화가 지구시스템에 미치는 영향을 사례를 들어 제시하고, 지구시스템의 균형이 깨짐으로써 나타날 수 있는 영향과 지진과 화산 활동으로 지구와 생명 시스템의 피해를 줄일 수 있는 대책을 조사할 수 있다. 자유 낙하 또는 수평으로 던진 물체가 중력의 영향을 받음을 실험 결과를 통해 제시하고, 충돌 관련 안전장치와 스포츠에서 관성의 법칙 및 충격량과 운동량의 관계를 적용하는 사례를 조사하여 발표할 수 있다. 세포막과 효소의 특성을 알아보기 위한 실험을 수행하고, 일상생활에서 활용되는 화학 반응의 사례를 조사하여 발표할 수 있다.","가치·태도":"지구시스템 보전의 중요성을 인식하고, 역학 시스템에 대한 이해를 통해 안전 사고를 줄일 수 있다는 것과 생명 활동 유지를 위한 생명 시스템을 이해하여 과학에 대한 흥미와 호기심을 가진다."},"D":{"지식·이해":"지구시스템을 구성하는 권역들이 상호작용하는 예를 알고, 지진대와 화산대의 분포를 판의 경계와 관련지어 설명할 수 있다. 힘이 작용하는 물체는 가속도 운동한다는 사실을 이해하고, 자유 낙하 운동과 수평으로 던진 물체의 가속도의 공통점을 알며, 충격량과 운동량의 개념을 설명 할 수 있다. 세포가 화학 반응 및 물질 출입이 일어나는 생명 시스템의 기본 단위임과 생명 시스템의 유지에 필요한 세포 내 정보가 유전자에 들어 있음을 이해한다.","과정·기능":"지구시스템이 유지되지 못할 때 발생하는 피해 사례를 조사하여 제시할 수 있다. 자유 낙하 또는 수평으로 던진 물체의 운동을 비교함으로써 중력으로 인한 물체의 속도 변화를 관찰할 수 있다. 세포막과 효소의 특성을 알아보기 위한 실험의 결과를 관찰하고, 일상생활에서 활용되는 화학 반응의 사례를 조사할 수 있다.","가치·태도":"지구시스템 보전의 중요성을 인식하고, 역학 시스템에 대한 이해를 통해 안전 사고를 줄일 수 있다는 것과 생명 활동 유지를 위한 생명 시스템을 이해하여 과학에 대한 흥미와 호기심을 가진다."},"E":{"지식·이해":"지구시스템을 구성하는 권역 및 판의 경계에서 나타나는 현상을 말할 수 있다. 지구 표면과 지구 주위의 다양한 운동이 중력의 영향을 받고 있음을 알고, 충돌 관련 장치 또는 스포츠에 과학적 원리가 활용됨을 말할 수 있다. 생명체에서 화학 반응 및 물질 출입이 일어남과 세포에는 생명 시스템의 유지에 필요한 정보가 들어 있음을 말할 수 있다.","과정·기능":"지구시스템이 유지되지 못할 때 일어나는 문제의 사례를 찾을 수 있다. 중력을 받는 물체의 운동을 관찰하여 중력을 받는 물체의 속도가 변화함을 추론 할 수 있다. 일상생활에서 활용되는 화학 반응의 사례를 조사할 수 있다.","가치·태도":"지구시스템과 역학 시스템, 생명 시스템 등이 과학 원리와 관련 있음을 인식하고, 과학에 관심을 가진다."}}},"h2-01":{"codes":{"10통과2-01-01":{"A":"지질시대 동안 생물 대멸종의 원인과 이후의 변화를 설명하는 다양한 가설의 타당성을 평가하고, 지구 환경 변화가 생물다양성에 미치는 영향을 다양한 관점 에서 추론할 수 있다.","B":"지질시대 동안 생물 대멸종의 원인과 이후의 변화를 설명하는 가설을 제시하고, 지구 환경 변화가 생물다양성에 미치는 영향을 설명할 수 있다.","C":"지층과 화석을 통해 지질시대 동안 지구 환경과 생물의 변화를 설명하고, 지구 환경 변화가 생물다양성에 미치는 영향을 설명할 수 있다.","D":"지질시대 동안 지구 환경과 생물이 계속 변해 왔고, 지구 환경 변화가 생물다양 성에 영향을 주었음을 이해할 수 있다.","E":"지질시대 동안 환경 변화가 생물을 변화시킨 사례를 말할 수 있다."},"10통과2-01-02":{"A":"변이의 발생과 자연선택 과정을 통해 생물의 진화가 일어나고 생물다양성이 형성되었음을 추론하고, 생물다양성의 의미를 유전적 다양성, 종 다양성, 생태계 다양성으로 설명하며, 생물다양성을 보전하기 위한 구체적인 사례와 실천 방안 을 제시할 수 있다.","B":"변이의 발생과 자연선택 과정을 통해 생물의 진화가 일어나고 생물다양성이 형성되었음을 설명하며, 생물다양성을 보전하기 위한 구체적인 사례와 실천 방 안을 제시할 수 있다.","C":"자연선택 과정을 통해 생물의 진화가 일어나고 있음을 말하고, 생물다양성을 보전하는 것이 중요함을 인식한다.","D":"생물의 진화가 일어나고 있음을 말하고, 생물다양성을 보전하는 것이 중요함을 인식한다.","E":"생물이 계속해서 변화해 왔으며, 우리 주변에 다양한 생물이 있음을 말할 수 있다."},"10통과2-01-03":{"A":"자연과 인류의 역사에 큰 변화를 가져온 광합성, 화석 연료 사용, 철의 제련 등에서 공통점을 찾아 산소와 전자의 이동으로 산화와 환원을 구별하여 설명하고, 생활 주변의 다양한 변화를 산화와 환원의 특징과 규칙성으로 분석할 수 있다.","B":"자연과 인류의 역사에 큰 변화를 가져온 광합성, 화석 연료 사용, 철의 제련 주변의 다양한 변화를 산화와 환원의 특징과 규칙성으로 분석할 수 있다. 등에서 산소와 전자 이동으로 산화와 환원을 구별하고, 생활 주변의 다양한 변화를 산화와 환원의 특징으로 설명할 수 있다.","C":"자연과 인류의 역사에 큰 변화를 가져온 광합성, 화석 연료 사용, 철의 제련에서 산소 이동으로 산화와 환원을 구별하고, 생활 주변의 다양한 변화에서 산화 환원 반응의 예를 제시할 수 있다.","D":"광합성, 화석 연료 사용, 철의 제련이 산화 환원 반응임을 알고, 생활 주변의 다양한 변화에서 산화 환원 반응의 예를 조사할 수 있다.","E":"광합성, 화석 연료 사용, 철의 제련이 산화 환원 반응임을 말할 수 있다."},"10통과2-01-04":{"A":"대표적인 산ㆍ염기 물질의 특징을 통해 산성과 염기성을 비교하고, 산과 염기의 중화 반응 과정에서 나타나는 용액의 온도 변화와 지시약의 색 변화 이유를 이온 반응식을 이용하여 설명하며, 생활 속에서 중화 반응을 이용하는 방안을 제안할 수 있다.","B":"대표적인 산ㆍ염기 물질의 특징을 설명하고, 산과 염기의 중화 반응 과정에서 나타나는 용액의 온도 변화와 지시약의 색 변화 이유를 이온 반응식을 이용하여 설명하며, 생활 속에서 중화 반응을 이용하는 사례를 설명할 수 있다.","C":"대표적인 산ㆍ염기 물질의 특징을 구분하고, 산과 염기의 중화 반응 과정에서 용액의 온도 변화와 지시약의 색 변화를 설명하며, 중화 반응을 생활 속에서 이용하는 사례를 제시할 수 있다.","D":"대표적인 산ㆍ염기 물질의 예를 들고, 산과 염기를 혼합하는 반응이 중화 반응 임을 말할 수 있다.","E":"대표적인 산ㆍ염기 물질의 예를 들 수 있다."},"10통과2-01-05":{"A":"생활 주변에서 에너지를 흡수하거나 방출하는 현상을 화학 변화와 물리 변화에 근거하여 설명하고, 에너지의 흡수 방출을 우리 생활에서 이용하는 방안을 토의 할 수 있다.","B":"생활 주변에서 에너지를 흡수하거나 방출하는 현상을 화학 변화와 물리 변화에 근거하여 설명하고, 에너지의 흡수 방출을 우리 생활에서 이용하는 사례를 제시 할 수 있다.","C":"생활 주변에서 에너지를 흡수하거나 방출하는 현상을 구분하여 설명할 수 있다.","D":"생활 주변에서 에너지를 흡수하거나 방출하는 현상의 예를 들 수 있다.","E":"생활 주변의 현상에서 에너지의 출입이 있음을 말할 수 있다. (2) 환경과 에너지"}},"area":{"A":{"지식·이해":"지질시대 동안 생물이 대멸종한 원인과 이후의 지구 환경 변화를 이해하고, 변이의 발생과 자연선택 과정을 통해 생물의 진화가 일어나 유전적 다양성, 종 다양성, 생태계 다양성의 생물다양성이 형성됨을 설명할 수 있다. 자연과 인류의 역사에 큰 변화를 가져온 광합성, 화석 연료 사용, 철의 제련 등에서 산소와 전자 이동으로 산화와 환원을 구별하여 설명하고, 대표적인 산ㆍ염기 물질의 특징을 통해 산과 염기의 중화 반응 과정에서 나타나는 용액의 온도 변화와 지시약의 색 변화 이유를 이온 반응식을 이용하여 설명할 수 있다. 생활 주변에서 에너지를 흡수하거나 방출하는 현상을 화학 변화와 물리 변화에 근 거 하 여 설명할 수 있 다.","과정·기능":"지질시대 동안 생물 대멸종에 대한 다양한 가설의 타당성을 평가하고, 자연선택 과정에 대한 모의실험을 통해 지구 환경 변화가 생물의 진화와 생물다양성에 미치는 영향을 추론하며, 생물다양성 보전을 위한 구체적인 사례와 실천 방안을 조 사 하 여 발표할 수 있 다. 생활 주변의 다양한 변화를 산화와 환원의 특징과 규칙성으로 분석하고, 대표적인 산ㆍ염기 물질의 특징을 통해 산성과 염기성을 비교할 수 있다. 중화 반응에서 지시약의 색 변화와 용액의 온도 변화를 측정하여 분석하고, 생활 속에서 중화 반응과 에너지의 흡수 방출을 이용하는 방안을 토의할 수 있다.","가치·태도":"지구 환경 변화가 생물다양성에 영향을 미침을 인식하여 생물다양성을 보전하기 위한 구체적인 방안을 제시하고 실천할 수 있다. 산화 환원 반응, 중화 반응, 에너지의 흡수 방출을 생활 속에서 이용하는 방안을 제안하여 과학의 유용성을 인식한다."},"B":{"지식·이해":"지질시대 동안 생물이 대멸종한 원인과 이후의 지구 환경 변화를 이해하고, 변이의 발생과 자연선택 과정을 통해 생물의 진화가 일어나며, 생물다양성이 형성되었음을 설명할 수 있다. 자연과 인류의 역사에 큰 변화를 가져온 광합성, 화석 연료 사용, 철의 제련 등에서 산소와 전자 이동으로 산화와 환원을 구별하고, 대표적인 산ㆍ염기 물질의 특징을 통해 산과 염기의 중화 반응 과정에서 나타나는 용액의 온도 변화와 지시약의 색 변화 이유를 이온 반응식을 이용하여 설명할 수 있다. 생활 주변에서 에너지를 흡수하거나 방출하는 현상을 화학 변화와 물리 변화에 근거하여 설명할 수 있다.","과정·기능":"지질시대 동안 생물이 대멸종한 원인과 이후의 변화를 설명하는 가설을 제시하고, 자연선택 과정에 대한 모의실험을 수행하며, 생물다양성 보전을 위한 구체적인 사례와 실천 방안을 조사하여 발표할 수 있다. 생활 주변에서 다양한 변화를 산화와 환원의 특징으로 분석하고, 중화 반응에서 지시약의 색 변화와 용액의 온도 변화를 측정할 수 있다. 생활 속에서 중화 반응과 에너지의 흡수 방출을 이용하는 사례를 조사할 수 있다.","가치·태도":"생물다양성을 보전하는 것이 중요함을 인식하여 생물다양성을 보전하기 위한 방안을 실천할 수 있다. 생활 주변에서 산화 환원 반응, 중화 반응, 에너지의 흡수 방출을 이용하는 사례로부터 과학의 유용성을 인식한다."},"C":{"지식·이해":"지층과 화석을 통해 지질시대 동안 지구 환경이 변화하고 자연선택 과정을 통한 생물의 진화가 일어남을 설명하고, 이를 통해 생물다양성이 형성되었음을 이해할 수 있다. 자연과 인류의 역사에 큰 변화를 가져온 광합성, 화석 연료 사용, 철의 제련에서 산소 이동으로 산화와 환원을 구별할 수 있다. 대표적인 산ㆍ염기 물질의 특징을 구분하고, 중화 반응 과정에서 용액의 온도와 지시약의 색 변화를 설명할 수 있다. 생활 주변에서 에너지를 흡수하거나 방출하는 현상을 구분하여 설명할 수 있다.","과정·기능":"지질시대 동안 지구 환경이 변화하며, 이러한 변화가 생물의 진화에 영향을 미친 사례를 찾고, 생물다양성 보전을 위한 실천 방안을 조사할 수 있다. 생활 주변의 다양한 변화에서 산화와 환원 반응의 예를 조사하고, 중화 반응에서 지시약의 색 변화와 용액의 온도 변화를 측정할 수 있다. 생활 속에서 중화 반응과 에너지의 흡수 방출이 이용되는 사례를 조사할 수 있다.","가치·태도":"생물다양성을 보전하는 것이 중요함을 인식한다. 생활 주변의 다양한 변화에 포함된 화학 반응에 호기심을 가지고, 이러한 변화를 생활 속에 이용하는 것에 관심을 가진다."},"D":{"지식·이해":"지질시대 동안 지구 환경이 끊임없이 변하고, 생물의 진화가 일어나고 있으며, 지구 환경 변화가 생물다양성에 영향을 주었음을 말할 수 있다. 광합성, 화석 연료 사용, 철의 제련이 산화 환원 반응임을 알고, 대표적인 산ㆍ염기 물질의 예를 들으며, 산과 염기를 혼합하는 반응이 중화 반응임을 말할 수 있다. 생활 주변에서 에너지를 흡수하거나 방출하는 현상의 예를 들 수 있다.","과정·기능":"지질시대 동안 지구 환경과 생물이 진화한 사례를 찾고, 생물다양성 보전을 위한 실천 방안을 조사할 수 있다. 생활 주변의 다양한 변화에서 산화 환원 반응의 예를 찾고, 중화 반응에서 지시약의 색과 용액의 온도 변화를 관찰할 수 있다. 생활 속에서 에너지의 흡수 방출이 나타나는 현상을 조사할 수 있다.","가치·태도":"생물다양성을 보전하는 것이 중요함을 인식하고, 생활 주변의 다양한 변화에 포함된 화학 반응에 호기심을 가진다."},"E":{"지식·이해":"지질시대 동안 지구 환경과 생물이 끊임없이 변해 왔음을 안다. 광합성, 화석 연료 사용, 철의 제련이 산화 환원 반응임을 알고, 대표적인 산ㆍ염기 물질의 예를 들으며, 생활 주변의 현상에서 에너지의 출입이 있음을 말할 수 있다.","과정·기능":"생물다양성 보전을 위한 실천 방안을 찾고, 생활 주변의 다양한 변화에서 산화 환원 반응, 중화 반응, 에너지의 흡수 방출과 관련된 현상을 조사할 수 있다.","가치·태도":"생물다양성에 관심을 가지고 생활 주변의 다양한 변화에 호기심을 가진다."}}},"h2-02":{"codes":{"10통과2-02-01":{"A":"생태계 구성요소를 생물적 요소와 비생물적 요소로, 생물적 요소를 생산자, 소비자, 분해자로 구분하여 이해하고, 생태계 구성요소들이 서로 영향을 주고 받는 사례로부터 생물과 환경 사이의 상호 관계를 설명할 수 있다.","B":"생태계 구성요소를 생물적 요소와 비생물적 요소로 구분하고, 각 요소들이 서로 영향을 주고 받는 사례로부터 생물과 환경 사이의 상호 관계를 설명할 수 있다.","C":"생태계 구성요소를 생물적 요소와 비생물적 요소로 구분하고, 생물이 환경과 서로 영향을 주고 받음을 말할 수 있다.","D":"주변에서 생태계 구성요소를 찾아 생물적 요소와 비생물적 요소로 구분할 수 있다.","E":"주변에서 생태계 구성요소를 찾을 수 있다."},"10통과2-02-02":{"A":"먹이 관계와 생태 피라미드가 변화했을 때 개체군의 변동 양상을 바탕으로 생태계 평형이 유지되는 원리를 추론하고, 환경의 변화가 생태계에 미치는 영향에 대해 협력적으로 소통할 수 있다.","B":"생태계 평형이 유지되는 원리를 먹이 관계와 생태 피라미드를 중심으로 이해하고, 환경의 변화가 생태계에 영향을 미친 사례로부터 환경의 변화와 생태계의 관계 를 설명할 수 있다.","C":"먹이 관계에 의해 생태계 평형이 유지되는 과정을 이해하고, 환경의 변화가 생태계에 영향을 미친 사례를 제시할 수 있다.","D":"생태계 평형의 의미를 이해하고, 환경의 변화가 생태계에 영향을 준다는 것을 말할 수 있다.","E":"환경의 변화가 생태계에 영향을 준다는 것을 말할 수 있다."},"10통과2-02-03":{"A":"온실효과의 강화로 인한 지구온난화의 메커니즘을 지구 열수지 개념으로 설명 하고, 엘니뇨, 사막화 등과 같은 기후에 심각한 영향을 끼치는 자연 현상이 지구 환경과 인간 생활에 미치는 영향 및 다양한 대처 방안을 평가할 수 있다.","B":"온실효과의 강화가 지구온난화를 가속시키는 메커니즘을 이해하고, 엘 니뇨, 사 막화 등과 같은 자연 현상이 지구 환경과 인간 생활에 미치는 영향을 설명하며, 이에 대한 대처 방안을 제시할 수 있다.","C":"온실효과 강화로 인한 지구온난화의 메커니즘을 이해하고, 엘니뇨, 사막화 등과 같은 자연 현상이 지구 환경과 인간 생활에 미치는 영향을 설명할 수 있다.","D":"지구온난화, 엘니뇨, 사막화 등이 지구 환경과 인간 생활에 미치는 영향을 설명 할 수 있다.","E":"지구온난화가 지구 환경과 인간 생활에 미치는 영향의 예를 들 수 있다."},"10통과2-02-04":{"A":"태양 중심부에서 수소가 헬륨으로 핵융합하는 과정에서 질량이 줄어든 만큼 에너지가 생성되는 과정을 설명하고, 이 에너지의 일부가 지구에서 에너지 흐름을 일으켜 다양한 형태의 에너지로 전환되는 과정을 추론할 수 있다. 바뀌고, 그중 일부가 지구 에서 에너지 흐름을 일으 키며 다양한 에너지로 전 환되는 과정을 추론할 수 있다.","B":"태양 중심부에서 일어나는 수소 핵융합 반응에 의해 에너지가 생성되고, 이 에너지의 일부가 지구에서 에너지 흐름을 일으켜 다양한 형태의 에너지로 전환 되는 과정을 예를 들어 설명할 수 있다.","C":"태양 중심부에서는 수소 핵융합 반응이 일어나 에너지가 생성되고, 이 에너지의 일부가 지구에 에너지 흐름을 일으켜 다양한 에너지의 형태로 전환됨을 이해할 수 있다.","D":"태양 중심부에서는 핵융합 반응으로 에너지가 생성되고, 이 에너지의 일부가 지구로 전달됨을 이해할 수 있다.","E":"태양 에너지의 일부가 지구로 전달됨을 말할 수 있다."},"10통과2-02-05":{"A":"전자기 유도 실험을 통해 유도 전류의 크기와 방향에 영향을 미치는 요소들을 파악하고, 간이 발전기를 만들어 에너지 전환 과정과 원리를 설명하며, 화력 발 전 및 핵발전에서의 발전 과정과 각 발전이 인간 생활에 미치는 영향을 안 전 ㆍ지속가능 사회 측면에서 조사하여 발표할 수 있다.","B":"코일과 자석을 이용하여 유도 전류를 관찰하고, 간이 발전기를 만들어 에너지 전환 과정을 설명하며, 화력 발전 및 핵발전에서의 발전 과정과 각 발전이 인간 생활에 미치는 영향을 조사하여 발표할 수 있다.","C":"발전기에서 에너지 전환 과정을 설명하고, 화력 발전 및 핵발전에서의 발전 과정과 각 발전이 인간 생활에 미치는 영향을 조사할 수 있다.","D":"발전기에서 운동 에너지가 전기 에너지로 전환됨을 이해하고, 화석 연료와 핵에너지를 이용하는 발전에 대해 조사할 수 있다.","E":"발전기를 이용하여 운동 에너지를 전기 에너지로 전환할 수 있음을 말할 수 있다."},"10통과2-02-06":{"A":"일상생활에서 다양한 에너지 전환 과정을 조사하여 에너지 효율의 의미와 중요 성을 설명하고, 지속가능한 발전과 지구 환경 문제 해결을 위한 신재생 에너지 기술을 탐색하며, 각 기술의 장단점 및 활용 방안을 조사하여 발표할 수 있다.","B":"화석 연료의 사용 과정에서 에너지의 총량은 보존되지만 버려지는 열에너지로 인해 에너지 효율이 낮아지는 것을 이해하고, 지속가능한 발전과 지구 환경 문제 해결을 위한 신재생 에너지의 필요성을 설명할 수 있다.","C":"화석 연료의 사용 과정에서 에너지의 총량은 보존되지만 버려지는 열에너지로 인해 에너지 효율이 낮아지는 것을 설명할 수 있다.","D":"다양한 형태로 존재하는 에너지가 서로 전환하는 과정에서 에너지의 총량이 보존됨을 말할 수 있다.","E":"에너지가 다양한 형태로 존재하고, 서로 전환될 수 있음을 말할 수 있다. (3) 과학과 미래 사회"}},"area":{"A":{"지식·이해":"생태계 구성요소를 생물적 요소와 비생물적 요소로, 생물적 요소를 생산자, 소비자, 분해자로 구분하고, 환경의 영향 및 생물적 요소의 먹이 관계와 생태 피라미드의 변화로 인한 개체군 변동 양상으로부터 생태계 평형이 유지되는 원리를 설명할 수 있다. 온실효과의 강화가 지구온난화를 초래하는 메커니즘과 엘니뇨, 사막화 등 기후에 영향을 미치는 자연 현상이 지구 환경과 인간 생활에 미치는 영향을 이해한다. 태양에서의 핵융합 과정을 통해 수소가 헬륨으로 변환되어 질량 손실이 에너지로 전 환 되 는 원리를 파 악 하 고, 이 에너지가 지구에서 에너지 흐름을 일으켜 다 양 한 형태의 에너지로 전환되는 과정을 설명할 수 있다. 유도 전류의 크기와 방향에 영향을 미치는 요소를 파악하고, 간이 발전기 제작을 통해 에너지 전환 과정과 원리를 설명하며, 일상생활에서 다양한 에너지 전환 과정을 조사하여 에너지 효율의 의미와 중요성을 설명할 수 있다.","과정·기능":"생태계 구성요소들이 서로 영향을 주고 받는 구체적인 사례를 조사하여 발표하고, 개체군 변동 모의실험을 수행하여 먹이 관계와 생태 피라미드의 변화가 생태계 평형에 미치는 영향을 추론할 수 있다. 엘니뇨, 사막화 등과 같은 기후에 심각한 영향을 끼치는 자연 현상이 지구 환경과 인간 생활에 미치는 영향을 평가하고, 다양한 대처 방안을 조사하여 발표할 수 있다. 태양 에너지의 일부가 지구에서 에너지 흐름을 일으켜 다양한 형태의 에너지로 전환되는 과정을 추론할 수 있다. 전자기 유도 실험에서 유도 전류의 크기와 방향에 영향을 미치는 요소에 대한 결론을 도출하고, 에너지 전환 관계를 이해하기 위해 간이 발전기를 만들 수 있다. 화력 발전 및 핵발전에서의 발전 과정과 각 발전이 인간 생활에 미치는 영향을 안전ㆍ지속가능 사회 측면에서 조사하고, 신재생 에너지 기술을 탐색하며, 각 기술의 장단점 및 활용 방안을 조사하여 발표할 수 있다.","가치·태도":"생태계의 상호 의존성과 환경 변화 영향에 대한 이해를 바탕으로 지구 환경 문제에 대해 인식하고, 적극적으로 대처하는 책임감을 가진다. 지속가능한 에너지에 관심을 가지고 지속가능한 발전 방향을 모색하는 데 있어 안 전 성 과 환경 친화성을 우선시하는 태도를 갖 고, 에너지 문제를 해결하기 위 한 방안을 협력적인 태도로 모색한다. 환경 문제와 에너지 이용에 대한 사회적 책임감을 인식하고, 실천 방안을 찾아 실천한다."},"B":{"지식·이해":"생태계 구성요소를 생물적 요소와 비생물적 요소로 구분하고, 환경의 영향 및 생물적 요소의 먹이 관계와 생태 피라미드의 변화로 인한 개체군 변동 양상으로부터 생태계 평형이 유지되는 원리를 설명할 수 있다. 지구온난화가 인간의 활동으로 인해 일어나는 것임을 알고, 지구온난화를 가속시키는 메커니즘을 이해한다. 태양 중심부에서 수소 핵융합 반응으로 에너지가 생성되고, 이 에너지의 일부가 지구에서 에너지 흐름을 일으킴을 설명할 수 있다. 간이 발전기에서 전자기 유도를 통한 에너지 전환 과정과 화력 발전 및 핵발전에서의 발전 과정을 이해하고, 에너지 효율의 의미를 화석 연료의 사용 과정을 통해 파악하며, 지속가능한 발전과 지구 환경 문제 해결을 위한 신재생 에너지의 필요성을 설명할 수 있다.","과정·기능":"생태계 구성요소들이 서로 영향을 주고 받는 사례를 조사할 수 있고, 개체군 변동 모의실험을 수행하여 먹이 관계의 변화가 생태계 평형에 미치는 영향을 추론할 수 있다. 엘니뇨, 사막화 등과 같은 기후에 심각한 영향을 끼치는 자연 현상이 지구 환경과 인간 생활에 미치는 영향을 평가하고, 대처 방안을 조사하여 발표할 수 있다. 지구에서 사용되는 에너지원이 태양 에너지로부터 왔음을 추론할 수 있다. 전 자 기 유도 실험을 수행하여 유도 전류의 크기에 영향을 미치는 변인을 찾 고, 간이 발전기를 통해 에너지 전환 과정을 유추할 수 있다. 화력 발전 및 핵발전이 인간 생활에 미치는 영향과 지속가능한 발전과 지구 환경 문제 해결을 위한 신재생 에너지 기술의 장단점 및 활용 방안을 조사하여 발표할 수 있다.","가치·태도":"생태계의 상호 의존성과 환경 변화 영향에 대한 이해를 바탕으로 지구 환경 문제에 대해 인식하고, 적극적으로 대처하는 책임감을 가진다. 지속가능한 에너지에 관심을 가지고 지속가능한 발전 방향을 모색하는 데 있어 안 전 성 과 환경 친화성을 우선시하는 태도를 갖 고, 에너지 문제를 해결하기 위 한 방안을 협력적인 태도로 모색한다. 환경 문제와 에너지 이용에 대한 사회적 책임감을 인식하고, 실천 방안을 찾아 실천한다."},"C":{"지식·이해":"생태계 구성요소를 생물적 요소와 비생물적 요소로 구분하고, 환경의 영향 및 먹이 관계의 변화가 생태계 평형에 미치는 영향을 설명할 수 있다. 지구온난화의 메커니즘을 이해하고 엘니뇨, 사막화 등과 같은 자연 현상이 지구 환경과 인간 생활에 미치는 영향을 설명할 수 있다. 수소 핵융합 반응을 이해하고, 태양 에너지의 일부가 지구에서 에너지 흐름을 일으킴을 설명할 수 있다. 발전에서 전기 에너지가 만들어지는 과정을 이해하고, 에너지 전환 또는 사용 과정에서 에너지 효율이 낮아짐을 설명할 수 있다.","과정·기능":"생태계 구성요소들이 서로 영향을 주고 받는 사례와 환경의 변화가 생태계에 영향을 미친 사례를 제시할 수 있다. 지구온난화, 엘니뇨, 사막화 등과 같은 자연 현상이 지구 환경과 인간 생활에 미치는 영향을 조사할 수 있다. 태양 에너지가 지구에서 다양한 에너지로 전환될 수 있음을 추론할 수 있다. 자석과 코일을 이용하여 전자기 유도 실험을 수행하고, 간이 발전기를 제작하며, 다양한 형태의 에너지 전환 관계와 신재생 에너지 기술의 종류와 필요성을 조사하여 발표할 수 있다.","가치·태도":"지구 환경 문제와 같이 인류가 당면한 주요 문제에 대해 관심과 책임감을 가지고 생태계 보전을 위해 적극적으로 대처해야 함을 인식한다. 지속가능한 에너지의 중요성을 인식하고, 에너지 발전 과정에서의 안전과 환경 보호를 중요시하며, 에너지 문제 해결을 위한 방법을 모색하고자 노력한다. 환경 보전에 관심을 가지고, 환경 보전을 위한 실천 방안을 찾아 실천한다."},"D":{"지식·이해":"생태계 구성요소와 생태계 평형의 의미를 말하고, 환경의 변화가 생태계에 영향을 미침을 이해할 수 있다. 지구온난화, 엘니뇨, 사막화 등이 지구 환경과 인간 생활에 미치는 영향을 이해하고, 태양 중심부에서 생성된 에너지의 일부가 지구로 전달됨을 설명할 수 있다. 발전기에서 전자기 유도 현상을 이용하여 전기 에너지가 생성되며 에너지 전환 과정에서 에너지의 총량이 보존됨을 이해한다.","과정·기능":"환경의 변화가 생태계에 미친 영향을 조사하고, 지구온난화, 엘니뇨, 사막화 등과 같은 자연 현상이 지구 환경과 인간 생활에 미치는 영향에 대한 사례를 제시할 수 있다. 태양 에너지의 일부가 지구에 들어와 다양한 에너지로 전환됨을 조사하여 발표할 수 있다. 자석과 코일을 이용하여 전자기 유도 실험을 수행하며, 다양한 형태의 에너지 전환 관계와 신재생 에너지 기술의 필요성을 조사하여 발표할 수 있다.","가치·태도":"지구 환경 문제와 같이 인류가 당면한 주요 문제에 대해 관심과 책임감을 가지고 생태계 보전을 위한 노력이 필요함을 인식한다. 에너지 발전 과정에서의 안전과 환경 보호를 중요시하며, 에너지 문제 해결을 위한 방법을 모색하고자 노력한다. 환경 보전과 에너지 문제 해결에 관심을 가진다."},"E":{"지식·이해":"생태계 구성요소의 예와 환경의 변화가 생태계에 영향을 미침을 말할 수 있다. 태양 에너지의 일부가 지구로 전달되며, 발전기를 이용하여 전기 에너지를 만들 수 있음을 말할 수 있다. 다양한 형태로 존재하는 에너지가 서로 전환될 수 있음을 말할 수 있다.","과정·기능":"환경의 변화가 생태계에 미치는 영향과 지구온난화가 인간 생활에 미치는 영향을 조사할 수 있다. 태양 에너지가 지구에 들어와 에너지 흐름을 일으킴을 조사할 수 있다. 자석과 코일로 전기 에너지를 만드는 실험을 수행하며, 다양한 형태의 에너지와 전환 관계를 조사할 수 있다.","가치·태도":"환경 변화가 생태계 및 인간 생활에 미친 영향을 인식하고, 환경 보전과 에너지 문제 해결에 관심을 가진다."}}},"h2-03":{"codes":{"10통과2-03-01":{"A":"핵산과 단백질을 이용한 감염병의 진단, 추적 등을 사례로 과학의 유용성을 설명하고, 예상되는 미래 사회 문제를 제시한 후 미래 사회 문제 해결에서 과학의 필요성에 대해 논증할 수 있다.","B":"핵산과 단백질을 이용한 감염병의 진단, 추적 등을 사례로 과학의 유용성을 설명하고, 예상되는 미래 사회 문제를 제시한 후 미래 사회 문제 해결에서 과학의 필요성에 대해 논증할 수 있다.","C":"감염병의 진단, 추적 등을 사례로 과학의 유용성을 인식하여 미래 사회 문제 해 결 에 과학이 필요함을 설명할 수 있 다.","D":"감염병의 진단, 추적 등을 사례로 과학의 유용성을 인식하여 미래 사회 문제 해 결 에 과학이 필요함을 설명할 수 있 다.","E":"감염병의 진단, 추적 등에 과학기술이 활용됨을 말할 수 있다."},"10통과2-03-02":{"A":"과학기술사회의 과학 실험, 기상 관측, 유전체 분석, 신약 개발 등 다양한 분야에서 많은 정보를 디지털 형태로 전환하여 대량으로 축적한 빅데이터를 사용하고 있는 사례를 설명하고, 빅데이터 활용의 장점과 문제점을 증거에 기반하여 추론할 수 있다.","B":"과학기술사회의 과학 실험, 기상 관측, 유전체 분석, 신약 개발 등 다양한 분야에서 많은 정보를 디지털 형태로 전환하여 대량으로 축적한 빅데이터를 사용하고 있는 사례를 설명하고, 빅데이터 활용의 장점과 문제점을 증거에 기반하여 추론할 수 있다.","C":"빅데이터를 과학기술사회에서 사용하고 있는 사례를 조사하고, 빅데이터 활용의 장점과 문제점을 제시할 수 있다.","D":"빅데이터를 과학기술사회에서 사용하고 있는 사례를 조사하고, 빅데이터 활용의 장점과 문제점을 제시할 수 있다.","E":"일상생활에서 활용되는 빅데이터의 예를 제시할 수 있다."},"10통과2-03-03":{"A":"인공지능, 로봇, 사물인터넷 등과 같이 과학기술의 발전을 인간의 삶과 환경 개선에 활용하는 다양한 사례를 조사하여 발표하고, 과학기술이 미래 사회에 미치는 영향을 예측하여 유용성과 한계를 토론할 수 있다.","B":"인공지능, 로봇, 사물인터넷 등과 같이 과학기술의 발전을 인간의 삶과 환경 개선에 활용하는 다양한 사례를 조사하여 발표하고, 과학기술이 미래 사회에 미치는 영향을 예측할 수 있다.","C":"과학기술의 발전이 인간 삶과 환경 개선에 활용되는 사례를 통해 과학기술의 발전이 일상생활에 미치는 영향을 설명할 수 있다.","D":"과학기술의 발전이 인간 삶과 환경 개선에 활용되는 사례를 조사할 수 있다.","E":"과학기술의 발전이 일상생활에 영향을 미치고 있음을 인식하고, 그 예를 제시할 수 있다."},"10통과2-03-04":{"A":"과학기술의 발전 과정에서 발생할 수 있는 과학 관련 사회적 쟁점(SSI)에 대해 과학 지식에 기초하여 주장을 펼치고, 과학 관련 사회적 쟁점과 과학기술 이용 에서 과학 윤리의 필요성 및 중요성에 대해 논증할 수 있다.","B":"과학기술의 발전 과정에서 발생할 수 있는 과학 관련 사회적 쟁점(SSI)과 과학 기술 이용에서 과학 윤리의 필요성 및 중요성을 설명할 수 있다.","C":"과학기술의 발전 과정에서 과학 관련 사회적 쟁점(SSI)의 사례를 제시하고, 과학 관련 사회적 쟁점이 과학 윤리와 관련됨을 인식한다.","D":"과학기술의 발전 과정에서 과학 관련 사회적 쟁점(SSI)의 사례를 말할 수 있다.","E":"과학기술의 발전 과정에서 과학 관련 사회적 쟁점(SSI)이 발생할 수 있음을 말할 수 있다."}},"area":{"A":{"지식·이해":"핵산과 단백질을 이용한 감염병의 진단과 추적 등을 포함하여 과학기술이 현대 사회의 문제를 해결하는 데 유용하게 쓰인 사례, 많은 정보를 디지털 형태로 전환하여 대량으로 축적한 빅데이터가 다양한 과학 분야에 활용된 사례, 인공지능, 로봇 등과 같은 과학기술이 인간의 삶과 환경을 개선하는 데 활용된 사례 등으로부터 과학의 필요성과 유용성을 설명할 수 있다. 미래 사회의 문제 해결, 인간 삶과 환경 개선 등에서 과학기술의 긍정적 영향과 부정적 영향을 예측하고, 과학 관련 사회적 쟁점(SSI)의 의미를 알며, 그 사례를 설명할 수 있다.","과정·기능":"현대 사회에서 과학기술 활용의 장점과 문제점을 증거에 기반하여 추론하고, 미래 사회의 문제 해결, 인간의 삶 및 환경 개선에서 과학기술의 필요성과 유용성에 대 해 논증할 수 있 다. 과학기술의 발전 과정에서 나타나는 문제들로부터 과학기술의 한계점을 인식하고, 과학기술을 이용하는 데 과학 윤리의 필요성 및 중요성을 객관적 근거에 기반하여 주장할 수 있다.","가치·태도":"과학기술이 현대 사회의 문제를 해결하고 인간의 삶과 환경을 개선한 사례로부터 과학의 유용성과 필요성을 인식한다. 과학 관련 사회적 쟁점(SSI)에 대해 관심을 가지고, 과학을 이용함에 있어 과학 윤리의 필요성과 중요성을 인식한다."},"B":{"지식·이해":"핵산과 단백질을 이용한 감염병의 진단과 추적 등을 포함하여 과학기술이 현대 사회의 문제를 해결하는 데 유용하게 쓰인 사례, 많은 정보를 디지털 형태로 전환하여 대량으로 축적한 빅데이터가 다양한 과학 분야에 활용된 사례, 인공지능, 로봇 등과 같은 과학기술이 인간의 삶과 환경을 개선하는 데 활용된 사례 등으로부터 과학의 필요성과 유용성을 설명할 수 있다. 미래 사회의 문제 해결, 인간 삶과 환경 개선 등에서 과학기술의 긍정적 영향과 부정적 영향을 예측하고, 과학 관련 사회적 쟁점(SSI)의 의미를 알며, 그 사례를 설명할 수 있다","과정·기능":"현대 사회에서 과학기술 활용의 장점과 문제점을 증거에 기반하여 추론하고, 미래 사회의 문제 해결, 인간의 삶 및 환경 개선에서 과학기술의 필요성과 유용성에 대 해 논증할 수 있 다. 과학기술의 발전 과정에서 나타나는 문제들로부터 과학기술의 한계점을 인식하고, 과학기술을 이용하는 데 과학 윤리의 필요성 및 중요성에 대해 주장할 수 있다.","가치·태도":"과학기술이 현대 사회의 문제를 해결하고 인간의 삶과 환경을 개선한 사례로부터 과학의 유용성과 필요성을 인식한다. 과학 관련 사회적 쟁점(SSI)에 대해 관심을 가지고, 과학을 이용함에 있어 과학 윤리의 필요성과 중요성을 인식한다."},"C":{"지식·이해":"감염병의 진단과 추적 등을 포함하여 과학기술이 현대 사회의 문제를 해결하는 데 유용하게 쓰인 사례, 빅데이터가 다양한 과학 분야에 활용된 사례, 인공지능, 로봇 등과 같은 과학기술이 인간의 삶과 환경을 개선하는 데 활용된 사례 등으로부터 과학의 필요성과 유용성을 설명할 수 있다. 과학기술 활용의 장점과 문제점을 설명하고, 과학 관련 사회적 쟁점(SSI)의 사례를 제시할 수 있다.","과정·기능":"감염병의 진단과 추적, 빅데이터의 활용 등 과학기술의 발전이 인간의 삶과 환경을 개선한 사례를 조사하고, 과학기술의 필요성과 유용성을 주장할 수 있다. 과학기술의 발전 과정에서 발생하는 과학 관련 사회적 쟁점(SSI) 사례를 조사하고, 과학기술의 문제점을 주장할 수 있다.","가치·태도":"과학기술이 현대 사회의 문제를 해결하고 인간의 삶과 환경을 개선한 사례로부터 과학의 유용성과 필요성을 인식한다. 과학 관련 사회적 쟁점(SSI)에 대해 관심을 가지고, 과학을 이용함에 있어 과학 윤리의 필요성과 중요성을 인식한다."},"D":{"지식·이해":"감염병의 진단과 추적 등을 포함하여 과학기술이 현대 사회에서 유용하게 쓰인 사례, 빅데이터 등이 일상생활에서 활용되는 사례를 제시하며, 과학의 유용성을 알고 과학기술 활용의 장점과 문제점을 말할 수 있다.","과정·기능":"감염병의 진단과 추적, 빅데이터 등의 과학기술이 일상생활에서 활용되고 있는 사례와 과학기술의 발전 과정에서 발생하는 과학 관련 사회적 쟁점(SSI) 사례를 조사할 수 있다.","가치·태도":"일상생활에서 과학기술의 필요성과 유용성을 인식하고, 과학기술의 발전 과정에서 과학 관련 사회적 쟁점(SSI)에 관심을 가진다."},"E":{"지식·이해":"감염병의 진단, 추적 등에 과학기술이 활용됨을 말하고, 빅데이터가 일상생활에서 활용되는 예를 말할 수 있다.","과정·기능":"빅데이터 등의 과학기술이 일상생활에 활용되고 영향을 미치는 사례를 조사할 수 있다.","가치·태도":"과학기술이 삶을 살아가는 데 필요함을 인식하고, 과학기술의 발전 과정에서 과학 관련 사회적 쟁점(SSI)에 관심을 가진다."}}},"물리-01":{"codes":{"12물리01-01":{"A":"물체에 작용하는 알짜힘과 돌림힘이 0일 때 평형을 이룸을 이해하고, 일상생활 에서 접할 수 있는 돌림힘의 기준점이 1개인 구조물에 돌림힘을 적용하여 안정 성을 분석할 수 있다.","B":"물체에 작용하는 알짜힘과 돌림힘이 0일 때 평형을 이룸을 이해하고, 일상생활 에서 접할 수 있는 돌림힘의 기준점이 1개인 구조물에 돌림힘을 적용하여 안정 성을 정성적으로 설명할 수 있다.","C":"물체에 작용하는 알짜힘과 돌림힘이 0일 때 평형을 이룸을 알고, 일상생활에서 접할 수 있는 돌림힘의 기준점이 1개인 구조물의 안정성을 돌림힘의 평형으로 말할 수 있다.","D":"물체에 작용하는 알짜힘과 돌림힘이 0일 때 평형을 이룸을 알고, 구조물의 안정 성이 돌림힘의 평형과 관련 있음을 말할 수 있다.","E":"물체에 작용하는 돌림힘과 구조물의 안정성이 관련 있음을 말할 수 있다."},"12물리01-02":{"A":"뉴턴 운동 법칙으로 등가속도 운동을 설명하고, 이를 적용하여 교통안전 사고 예방 방안을 제안하며, 동영상을 활용하여 물체의 등가속도 운동을 분석하고 물리학이 안전·지속 가능한 사회를 만드는 데 기여함을 인식한다.","B":"뉴턴 운동 법칙으로 등가속도 운동을 설명하고, 뉴턴 운동 법칙이 교통안전 사 고 예방에 적용되며 안전한 사회를 만드는 데 기여함을 인식하고, 동영상을 활 용하여 물체의 등가속도 운동을 분석할 수 있다.","C":"등가속도 운동을 기술하고, 뉴턴 운동 법칙이 교통안전 사고 예방에 적용됨을 알며, 동영상을 활용하여 물체의 등가속도 운동 분석 실험을 수행하고, 물리학이 안전한 사회를 만드는 데 기여함에 흥미를 가진다.","D":"동영상을 활용하여 등가속도 운동 분석 실험을 수행하고, 뉴턴 운동 법칙이 교 통안전 사고 예방과 관련 있음을 말할 수 있으며 이를 통해 물리학의 유용성에 흥미를 가진다.","E":"뉴턴 운동 법칙이 교통안전 사고 예방과 관련 있음을 말할 수 있고, 물리학이 안전에 기여할 수 있음에 관심을 가진다."},"12물리01-03":{"A":"작용과 반작용 관계와 운동량 보존 법칙을 이해하고 스포츠, 교통수단, 발사체 등에 적용하며, 디지털 탐구 도구를 활용한 일차원 충돌 실험 수행 결과를 바탕 으로 추론하고 토의하여 운동량 보존을 확인할 수 있다.","B":"작용과 반작용 관계와 운동량 보존 법칙을 말하고 스포츠, 교통수단, 발사체 등에 적용됨을 알며, 디지털 탐구 도구를 활용한 일차원 충돌 실험을 수행하고 운동량 보존을 확인할 수 있다.","C":"작용과 반작용 관계와 운동량 보존 법칙이 스포츠, 교통수단, 발사체 등에 적용 됨을 알고, 디지털 탐구 도구를 활용한 일차원 충돌 실험을 수행할 수 있다.","D":"스포츠, 교통수단, 발사체 등에 운동량 보존 법칙이 적용됨을 알고, 작용과 반작 용 관계와 운동량 보존 법칙을 말할 수 있다.","E":"스포츠, 교통수단, 발사체 등에 운동량 보존 법칙이 적용됨을 말할 수 있다."},"12물리01-04":{"A":"일과 운동 에너지의 관계를 이해하고 지표 근처의 중력에 의한 위치 에너지와 탄성력에 의한 위치 에너지를 설명하며, 이를 포함하여 역학적 에너지 보존 법 칙을 설명할 수 있다.","B":"일과 운동 에너지의 관계를 말하고 지표 근처의 중력에 의한 위치 에너지와 탄성 력에 의한 위치 에너지를 포함한 역학적 에너지 보존 법칙을 설명할 수 있다.","C":"일과 운동 에너지의 관계를 말하고 지표 근처의 중력에 의한 위치 에너지와 이를 포함한 역학적 에너지 보존 법칙을 설명할 수 있다.","D":"지표 근처의 중력에 의한 위치 에너지와 이를 포함한 역학적 에너지 보존 법칙 을 설명할 수 있다.","E":"지표 근처의 중력에 의한 위치 에너지를 말할 수 있다."},"12물리01-05":{"A":"역학적 에너지가 열의 형태로 전환될 때 에너지 총량이 변하지 않고 보존됨을 설명하고, 열전달, 물질의 상태 변화, 기상 현상 등 에너지가 열의 형태로 전환되 면서 발생하는 현상에서 출입하는 열을 고려하여 에너지 총량이 변하지 않음을 정성적으로 설명할 수 있다.","B":"역학적 에너지가 열의 형태로 전환될 때 에너지 총량이 변하지 않고 보존됨을 이해하고, 열의 형태로 에너지가 전환되면서 발생하는 다양한 현상들로 열전달, 물질의 상태 변화, 기상 현상을 말할 수 있다.","C":"역학적 에너지가 열의 형태로 전환될 때 에너지 총량이 변하지 않음을 알고, 열의 형태로 에너지가 전환되면서 발생하는 다양한 현상으로 열전달, 물질의 상태 변화, 기상 현상 중 하나를 말할 수 있다.","D":"역학적 에너지가 열의 형태로 전환될 때 에너지 총량은 변하지 않음을 말할 수 있다.","E":"역학적 에너지가 열의 형태로 전환될 수 있음을 말할 수 있다."},"12물리01-06":{"A":"열이 역학적 에너지로 전환될 수 있음을 이해하고, 에너지 전환 과정에서 열의 출입을 고려하여 효율의 의미를 정성적으로 설명하며, 영구기관이 불가능함을 사례를 통해 논증할 수 있고, 과학 지식이 지속가능한 사회에 기여함을 인식한다.","B":"열이 역학적 에너지로 전환될 수 있음을 알고, 에너지 전환 과정에서 열의 출입 이 효율과 관련이 있음을 말하며, 영구기관이 불가능함을 보여주는 사례를 조사 할 수 있고, 과학 지식이 지속가능한 사회에 기여함을 인식한다.","C":"열이 역학적 에너지로 전환될 수 있음을 알고, 에너지 전환 과정에서 열의 출입 이 발생함을 알며, 영구기관이 불가능함을 보여주는 사례를 찾을 수 있고 과학 지식이 지속가능한 사회에 기여함에 호기심을 가진다.","D":"열이 역학적 에너지로 전환될 수 있음을 알고, 영구기관이 불가능함을 말할 수 있으며 과학 지식이 지속가능한 사회에 기여함에 호기심을 가진다.","E":"영구기관이 불가능함을 말할 수 있으며, 과학 지식이 지속가능한 사회에 기여함 에 관심을 가진다."}},"area":{"A":{"지식·이해":"물체에 작용하는 알짜힘과 돌림힘이 0일 때 평형을 이룸을 이해하고, 뉴턴 운동 법칙으로 등가속도 운동을 설명하며 작용과 반작용 관계와 운동량 보존 법칙을 이해하고 스포츠, 교통수단, 발사체 등에 적용할 수 있다. 일과 운동 에너지의 관계를 이해하고, 지표 근처의 중력에 의한 위치 에너지와 탄성력에 의한 위치 에너지를 설명하며 이를 포함하여 역학적 에너지 보존 법칙을 설명할 수 있다. 역학적 에너지가 열의 형태로 전환될 때 에너지 총량이 변하지 않고 보존됨을 설명하고, 열전달, 물질의 상태 변화, 기상 현상 등 에너지가 열의 형태로 전환되 면서 발생하는 현상에서 출입하는 열을 고려하여 에너지의 총량이 보존됨을 정성 적으로 설명하며, 열이 역학적 에너지로 전환되는 과정의 효율을 열의 출입을 고려하여 에너지 총량 보존의 관점에서 정성적으로 설명할 수 있다.","과정·기능":"일상생활에서 접할 수 있는 돌림힘의 기준점이 1개인 구조물에 돌림힘을 적용한 안정성 분석과 동영상을 활용한 물체의 등가속도 운동 분석을 수행하고, 이를 적용하여 교통안전 사고 예방 방안을 제안할 수 있다. 디지털 탐구 도구를 활용한 일차원 충돌 실험 수행 결과를 바탕으로 추론하고 토의하여 운동량 보존을 확인하고, 다양한 사례를 들어 영구기관이 불가능한 이유 를 논증할 수 있다.","가치·태도":"물리학이 안전한 사회를 만드는 데 기여함을 인식하고, 영구기관이 불가능함을 논증하는 과정에서 과학 지식이 지속가능 사회에 기여함을 인식한다."},"B":{"지식·이해":"물체에 작용하는 알짜힘과 돌림힘이 0일 때 평형을 이룸을 이해하고, 뉴턴 운동 법칙으로 등가속도 운동을 설명하며 작용과 반작용 관계와 운동량 보존 법칙을 알 수 있다. 일과 운동 에너지의 관계를 말하고, 지표 근처의 중력에 의한 위치 에너지와 탄성 력에 의한 위치 에너지를 포함한 역학적 에너지 보존 법칙을 설명할 수 있다. 역학적 에너지가 열의 형태로 전환될 때 에너지 총량이 변하지 않고 보존됨을 이해하고, 열의 형태로 에너지가 전환되면서 발생하는 다양한 현상들로 열전달, 물질의 상태 변화, 기상 현상을 말하며, 열이 역학적 에너지로 전환되는 과정의 효율을 정성적으로 이해할 수 있다.","과정·기능":"일상생활에서 접할 수 있는 돌림힘의 기준점이 1개인 구조물에 돌림힘을 적용하 여 안정성을 정성적으로 설명하고, 동영상을 활용하여 물체의 등가속도 운동을 분석하며 디지털 탐구 도구를 활용한 일차원 충돌 실험을 수행하고 운동량 보존을 확인하며 영구기관이 불가능함을 보여주는 사례 를 조사할 수 있 다.","가치·태도":"물리학이 안전·지속 가능한 사회를 만드는 데 기여함을 인식하고, 영구기관이 불가 능한 사례를 조사하는 과정에서 과학 지식이 지속가능 사회에 기여함을 인식한다."},"C":{"지식·이해":"물체에 작용하는 알짜힘과 돌림힘이 0일 때 평형을 이룸을 알고, 등가속도 운동을 설명하며 뉴턴 운동 법칙이 교통안전 사고 예방에 적용됨과 작용과 반작용 관계와 운동량 보존 법칙이 스포츠, 교통수단, 발사체 등 다양한 상황에 적용됨을 알 수 있다. 일과 운동 에너지의 관계를 말하고, 지표 근처의 중력에 의한 위치 에너지와 이를 포함한 역학적 에너지 보존 법칙을 설명하며 역학적 에너지가 열의 형태로 전환될 때 에너지 총량이 변하지 않음을 알고, 열의 형태로 에너지가 전환되면서 발생하 는 다양한 현상으로 열전달, 물질의 상태 변화, 기상 현상 중 하나를 말하며, 열이 역학적 에너지로 전환되는 과정에서 효율의 의미를 알 수 있다.","과정·기능":"일상생활에서 접할 수 있는 돌림힘의 기준점이 1개인 구조물의 안정성을 돌림힘 의 평형으로 말하고, 동영상을 활용하여 물체의 등가속도 운동 분석 실험과 디지 털 탐구 도구를 활용한 일차원 충돌 실험을 수행하며 영구기관이 불가능함을 보여 주는 사례를 말할 수 있다.","가치·태도":"물리학이 안전한 사회를 만드는 데 기여함에 흥미를 가지며, 영구기관이 불가능한 사례를 찾는 과정에서 과학 지식이 지속가능 사회에 기여함에 호기심을 가진다."},"D":{"지식·이해":"물체에 작용하는 알짜힘과 돌림힘이 0일 때 평형을 이룸을 알고, 뉴턴 운동 법칙 이 교통안전 사고 예방과 관련 있음을 말하며 작용과 반작용 관계와 운동량 보존 법칙을 말할 수 있다. 지표 근처의 중력에 의한 위치 에너지와 이를 포함한 역학적 에너지 보존 법칙을 설명하고, 역학적 에너지가 열의 형태로 전환될 때 에너지 총량은 변하지 않음을 말하며, 열이 역학적 에너지로 전환되는 과정에서 효율의 의미를 말할 수 있다.","과정·기능":"구조물의 안정성이 돌림힘의 평형과 관련 있음을 말하고, 동영상을 활용하여 등가 속도 운동 분석 실험을 수행할 수 있다.","가치·태도":"물리학이 안전한 사회를 만드는 데 기여함에 흥미를 가지며, 과학 지식이 지속가 능한 사회에 기여함에 호기심을 가진다."},"E":{"지식·이해":"뉴턴 운동 법칙이 교통안전 사고 예방과 관련 있으며 스포츠, 교통수단, 발사체 등 다양한 상황에 운동량 보존 법칙이 적용됨을 말할 수 있다. 지표 근처의 중력에 의한 위치 에너지와 역학적 에너지가 열의 형태로 전환됨과 열이 역학적 에너지로 전환되는 사례를 말할 수 있다.","과정·기능":"물체에 작용하는 돌림힘과 구조물의 안정성이 관련 있음을 말할 수 있다.","가치·태도":"물리학이 안전·지속가능한 사회 에 기여함에 관심을 가 진 다."}}},"물리-02":{"codes":{"12물리02-01":{"A":"전하를 띤 입자들이 형성하는 전기장과 전위차의 특징을 설명하고, 전하를 띤 입자들이 이를 매개로 하여 서로 전기적으로 상호작용함을 설명할 수 있다.","B":"전하를 띤 입자들이 형성하는 전기장과 전위차를 이해하고, 전하를 띤 입자들이 서로 전기적으로 상호작용함을 설명할 수 있다.","C":"전하를 띤 입자들이 전기장을 형성하여 상호작용함을 정성적으로 설명할 수 있다.","D":"전하를 띤 입자가 전기장을 형성함을 말할 수 있다.","E":"전하를 띤 입자들이 서로 상호작용함을 말할 수 있다."},"12물리02-02":{"A":"여러 저항의 직렬연결과 병렬연결에서 전류와 전압을 측정하여 크기를 비교하 고 전기 회로에서 저항의 연결과 소비 전력의 관계를 분석하며, 여러 전기 제품 을 병렬연결하는 상황 등 다양한 전기 기구에서 저항의 연결에 따라 소비 전력 이 달라지는 사례를 찾아 설명하고, 전기 안전의 중요성을 인식하고 안전한 전 기 사용 방안을 도출할 수 있다.","B":"두 저항의 직렬연결과 병렬연결에서 전류와 전압을 측정하여 비교하고 전기 회 로에서 저항의 연결에 따라 소비 전력이 달라짐을 설명하며, 여러 전기 제품을 병렬연결하는 상황 등 다양한 전기 기구에서 저항 연결에 따라 소비 전력이 달라지는 사례를 조사하고, 전기 안전의 중요성을 인식하고 안전한 전기 사용 방안을 말할 수 있다.","C":"두 저항의 직렬연결과 병렬연결에서 전류와 전압을 측정하고 저항의 연결에 따 라 소비 전력이 달라짐을 알며, 여러 전기 제품을 병렬연결할 때 소비 전력이 달라짐을 말하고 안전한 전기 사용 방안을 찾을 수 있다.","D":"동일한 두 저항의 직렬연결과 병렬연결에서 전류와 전압을 측정하고, 안전한 전기 사용 방안을 말할 수 있으며 전기를 안전하게 사용해야 함을 인식한다.","E":"동일한 두 저항의 직렬연결과 병렬연결에서 전류와 전압을 측정할 수 있다."},"12물리02-03":{"A":"축전기에서 충전과 방전을 통해 전기 에너지를 저장하고 활용하는 원리를 이해 하고, 축전기가 각종 센서와 전기 신호 입력 장치 등 실생활 제품에 활용됨을 사례를 들어 설명하며, 이 과정에서 물리학 지식의 유용성을 인식한다.","B":"축전기에 전기 에너지를 저장하는 충전 과정을 알고, 축전기가 각종 센서와 전 기 신호 입력 장치 등 실생활 제품에 활용됨을 설명하며, 전기와 관련된 물리학 지식의 유용성을 인식한다.","C":"충전을 통해 축전기에 전기 에너지를 저장할 수 있으며 각종 센서와 전기 신호 입력 장치 등 실생활 제품에 축전기가 활용됨을 알고, 축전기의 유용성에 흥미 와 호기심을 가진다.","D":"축전기에 전기 에너지를 저장할 수 있음을 말하고, 실생활 제품에 유용하게 활 용됨에 흥미를 가진다.","E":"축전기가 전기 에너지를 저장하는 장치임을 말할 수 있다."},"12물리02-04":{"A":"자성체를 강자성체, 상자성체, 반자성체로 분류하고 각각의 특성을 설명하며, 일상생활과 산업 기술에서 자성체가 활용되는 예를 찾아 자성체의 종류와 연결 지어 설명할 수 있다.","B":"자성체의 종류에는 강자성체, 상자성체, 반자성체가 있음을 알고 그 차이를 설명 하며, 일상생활과 산업 기술에서 자성체가 활용됨을 말할 수 있다.","C":"자성체의 종류에는 강자성체, 상자성체, 반자성체가 있음을 알고 그 차이점을 설명할 수 있다.","D":"자성체가 외부 자기장에 반응하는 성질에 따라 강자성체, 상자성체, 반자성체로 나뉘는 것을 말할 수 있다.","E":"자성체의 종류에는 강자성체, 상자성체, 반자성체가 있음을 말할 수 있다."},"12물리02-05":{"A":"전류의 자기 작용과 이를 이용하여 에너지를 전환하는 장치의 원리를 이해하고, 스피커와 전동기의 원리를 에너지 전환 관점에서 설명하며 공학적 설계를 통해 다양한 재료를 활용하여 창의적인 스피커를 제작하여 음성 정보의 전기적 재생 과 정 을 설명할 수 있 다.","B":"전류의 자기 작용을 이용하여 에너지를 전환하는 장치의 원리를 말하고, 다양한 재료를 활용하여 스피커를 설계하고 제작하여 음성 정보의 전기적 재생 과정을 설명할 수 있다.","C":"전류의 자기 작용을 알고, 주변의 재료를 활용하여 스피커를 설계하여 제작하고 에너지 전환 과정을 말할 수 있다.","D":"전류가 흐르면 자기장이 생김을 알고, 스피커에서 에너지 전환이 일어남을 말할 수 있다.","E":"전류가 흐르면 자기장이 생김을 말할 수 있다."},"12물리02-06":{"A":"전자기 유도 법칙을 알고, 이를 이용한 에너지 전달 기술의 원리를 이해하여 무선충전 장치로 구현하며, 센서, 무선통신, 무선충전 등 에너지 전달 기술에 전자기 유도 현상이 적용됨을 설명하고, 전자기 유도 현상이 현대 문명에 미친 영향을 인식하며 과학기술의 가치를 중시하는 태도를 지닌다.","B":"전자기 유도 작용을 이용해 무선충전이 가능함을 알고 무선충전 장치를 만들며, 전자기 유도 현상이 센서, 무선통신, 무선충전 등 에너지 전달 기술에 적용되어 현대 문명에 미친 영향에 관심을 가진다.","C":"전자기 유도 현상을 이용해 에너지를 전달할 수 있음을 말하고, 안내된 방법에 따라 무선충전 장치를 만들며, 전자기 유도 현상이 현대 문명에 영향을 미쳤음 에 관심을 가진다.","D":"안내된 방법에 따라 무선충전 장치를 만들고 전자기 유도 현상이 무선충전 등 에너지 전달 기술에 이용됨을 말할 수 있다.","E":"전자기 유도 현상을 이용한 에너지 전달 기술에 관심을 가진다."}},"area":{"A":{"지식·이해":"전하를 띤 입자들이 형성하는 전기장과 전위차의 특징과 전하를 띤 입자들이 이를 매개로 하여 서로 전기적으로 상호작용함을 설명하고, 전기 회로에서 저항의 연결 과 소비 전력의 관계를 분석하며, 축전기에서 충전과 방전을 통해 전기 에너지를 저장하고 활용하는 원리를 이해하고, 축전기가 각종 센서와 전기 신호 입력 장치 등 실생활 제품에 활용되는 사례를 들어 설명할 수 있다. 강자성체, 상자성체, 반자성체의 특성과 일상생활과 산업 기술에서 활용되는 자성 체를 자성체의 종류와 연결 지어 설명하고, 전류의 자기 작용과 이를 이용하여 에너지를 전환하는 스피커와 전동기의 원리를 설명하며 스피커에서 음성 정보의 전기적 재생 과정을 설명할 수 있다. 전자기 유도 법칙을 알고, 이를 이용한 에너지 전달 기술의 원리를 이해하며, 센서, 무선통신, 무선충전 등 에너지 전달 기술에 전자기 유도 현상이 적용됨을 설명 할 수 있다.","과정·기능":"여러 저항의 직렬연결과 병렬연결에서 전류와 전압을 측정하여 크기를 비교하고, 여러 전기 제품을 병렬연결하여 사용하는 상황 등 다양한 전기 기구에서 저항의 연결에 따라 소비 전력이 달라지는 사례를 찾아 설명할 수 있다. 축전기가 활용되는 사례를 찾고, 자성체를 강자성체, 상자성체, 반자성체로 분류 하고 일상생활과 산업 기술에서 자성체가 활용되는 예를 찾을 수 있다. 공학적 설계를 통해 다양한 재료를 활용하여 창의적인 스피커를 제작하고, 전자기 유도 법칙을 이용한 무선충전 장치를 구현할 수 있다.","가치·태도":"여러 전기 제품을 병렬연결하여 사용하는 상황에서 전기 안전의 중요성을 인식하 고 안전한 전기 사용 방안을 도출하며, 축전기가 실생활 제품에 활용되는 사례를 통해 물리학 지식의 유용성을 인식한다. 다양한 재료를 활용하여 스피커를 제작하는 과정에서 창의성을 발휘하고 전자기 유도 현상이 현대 문명에 미친 영향을 인식하며 과학기술의 가치를 중시하는 태도 를 가진다."},"B":{"지식·이해":"전하를 띤 입자들이 전기장과 전위차를 형성하여 서로 전기적으로 상호작용함과 전기 회로에서 저항의 연결에 따라 소비 전력이 달라짐을 설명하고, 축전기에 전기 에너지를 저장하는 충전 과정을 알고 축전기가 각종 센서와 전기 신호 입력 장치 등 실생활 제품에 활용됨을 설명할 수 있다. 자성체의 종류에는 강자성체, 상자성체, 반자성체가 있음과 그 차이를 설명하고 일상생활과 산업 기술에서 자성체가 활용됨을 말할 수 있다. 전류의 자기 작용을 이용하여 에너지를 전환하는 장치의 원리를 말하고, 스피커에 서 음성 정보의 전기적 재생 과정을 설명하며, 전자기 유도 작용을 이용해 무선충 전 이 가능함을 알 수 있 다.","과정·기능":"두 저항의 직렬연결과 병렬연결에서 전류와 전압을 측정하여 비교하고, 여러 전기 제품을 병렬연결하여 사용하는 상황 등 다양한 전기 기구에서 저항 연결에 따라 소비 전력이 달라지는 사례를 조사할 수 있다. 다양한 재료를 활용하여 스피커를 설계하고 제작하며, 전자기 유도 작용을 이용한 무선충전 장치를 만들 수 있다.","가치·태도":"다양한 전기 기구를 사용할 때 전기 안전의 중요성을 인식하고 안전한 전기 사용 방안을 말할 수 있고, 축전기가 실생활 제품에 활용됨을 통해 전기와 관련된 물리 학 지식의 유용성을 인식하며, 전자기 유도 현상이 센서, 무선통신, 무선충전 등 에너지 전달 기술에 적용되어 현대 문명에 미친 영향을 인식한다."},"C":{"지식·이해":"전하를 띤 입자들이 전기장을 형성하여 상호작용함을 정성적으로 설명하며, 전기 회로에서 저항의 연결에 따라 소비 전력이 달라짐을 알고 여러 전기 제품을 병렬 연결할 때 소비 전력이 달라짐을 말하며, 충전을 통해 축전기에 전기 에너지를 저장할 수 있고 각종 센서와 전기 신호 입력 장치 등 실생활 제품에 축전기가 활용됨을 알 수 있다. 자성체의 종류에는 강자성체, 상자성체, 반자성체가 있음을 알고, 그 차이점을 설명하며, 전류의 자기 작용을 알고 스피커에서 에너지 전환 과정을 말하며, 전자 기 유도 작용을 이용해 에너지를 전달할 수 있음을 말할 수 있다.","과정·기능":"두 저항의 직렬연결과 병렬연결에서 전류와 전압을 측정하고, 주변의 재료를 활용 하여 스피커를 설계하여 제작할 수 있으며, 안내된 방법에 따라 무선충전 장치를 만 들 수 있 다.","가치·태도":"여러 전기 제품을 병렬연결하여 사용할 때 전기 안전과 연관 지어 안전한 전기 사용 방안을 찾고, 각종 센서와 전기 신호 입력 장치 등 실생활 제품에 활용되는 축전기의 유용성에 호기심을 가지며, 전자기 유도 현상이 현대 문명에 미친 영향 에 흥미를 가진다."},"D":{"지식·이해":"전하를 띤 입자가 전기장을 형성함을 말하고 축전기가 전기 에너지를 저장할 수 있음을 말하며, 자성체가 외부 자기장에 반응하는 성질에 따라 강자성체, 상자성 체, 반자성체로 나뉘는 것을 말할 수 있다. 전류가 흐르면 자기장이 생김을 알고, 스피커에서 에너지 전환이 일어남과 전자기 유도 현상이 무선충전 등 에너지 전달 기술에 이용됨을 말할 수 있다.","과정·기능":"동일한 두 저항의 직렬연결과 병렬연결에서 전류와 전압을 측정하고, 안내된 방법 에 따라 무선충전 장치를 만들 수 있다.","가치·태도":"여러 전기 기구를 사용할 때 전기를 안전하게 사용해야 함을 인식하고, 축전기의 활용 및 에너지 전달 기술에 흥미를 가진다."},"E":{"지식·이해":"전하를 띤 입자들이 서로 상호작용함을 말하고, 축전기가 전기 에너지를 저장하는 장치임을 말하며, 자성체의 종류에는 강자성체, 상자성체, 반자성체가 있음을 말 할 수 있다.","과정·기능":"동일한 두 저항의 직렬연결과 병렬연결에서 전류와 전압을 측정하고, 전류가 흐를 때 생기는 자기장을 관찰할 수 있다.","가치·태도":"전자기 유도 현상을 이용한 에너지 전달 기술에 관심을 가진다."}}},"물리-03":{"codes":{"12물리03-01":{"A":"이중 슬릿에 의한 빛의 간섭을 관찰하는 실험에서 여러 변인의 변화에 따라 보강 간섭과 상쇄 간섭이 일어나는 지점을 예측하고, 빛의 중첩과 간섭을 통해 빛의 파동성을 알며, 이를 이용한 기술과 현상을 예를 들어 설명하는 과정에서 과학의 유용성 및 심미적 가치를 인식한다.","B":"이중 슬릿에 의한 빛의 간섭을 관찰하는 실험에서 보강 간섭과 상쇄 간섭이 일어나는 지점을 찾고, 빛의 중첩과 간섭 현상이 빛의 파동성과 관련이 있음을 알며, 이를 이용한 기술이나 현상의 예를 찾는 과정에서 과학의 유용성을 인식 한다.","C":"이중 슬릿에 의한 빛의 간섭 실험에서 빛의 간섭무늬를 관찰하고, 빛의 중첩과 간섭 현상이 빛의 파동성과 관련이 있음을 알며, 이를 이용한 기술이나 현상이 있음을 말할 수 있고, 이러한 현상에 흥미와 호기심을 가진다.","D":"이중 슬릿에 의한 빛의 간섭무늬를 관찰하고, 일상생활에서 빛의 중첩과 간섭을 이용한 기술이나 현상이 있음을 말할 수 있으며, 이러한 현상에 흥미를 가진다.","E":"이중 슬릿에 의한 빛의 간섭무늬를 관찰할 수 있다."},"12물리03-02":{"A":"볼록렌즈에서 상이 맺히는 과정을 빛의 굴절을 이용하여 설명하고, 볼록렌즈에 의한 실상을 관찰하여 상의 위치와 초점 거리를 정량적으로 구하며, 광학 기술 이 반도체와 디스플레이 제작 공정에서 갖는 중요성과 가치를 인식한다.","B":"볼록렌즈에서 상이 맺히는 과정을 빛의 굴절과 관련하여 이해하고, 볼록렌즈에 의한 실상을 관찰하여 상의 위치와 초점 거리를 찾으며, 광학 기술이 반도체와 디스플레이 제작 공정에서 활용됨을 인식한다.","C":"볼록렌즈에서 상이 맺히는 과정은 빛의 굴절과 관련되어 있음을 알고, 볼록렌즈 에 의한 실상을 관찰하고 상의 위치를 찾으며, 광학 기술이 반도체와 디스플레 이 제작 공정에서 활용됨을 말할 수 있다.","D":"볼록렌즈에 의한 실상을 관찰하고 상의 위치를 찾을 수 있으며, 과학 지식이 광학 기술에 활용되는 데 흥미를 가진다.","E":"볼록렌즈에 의한 실상을 관찰할 수 있다."},"12물리03-03":{"A":"빛과 물질의 이중성을 이해하고, 이러한 원리가 전자 현미경과 영상 정보 저장 등 다양한 분야에 활용됨을 설명하며, 현대 생활에서 첨단 과학이 갖는 가치와 잠재력을 인식한다.","B":"빛과 물질의 이중성을 이해하고, 이러한 원리가 전자 현미경과 영상 정보 저장 등의 분야에 활용됨을 알며, 첨단 과학이 갖는 가치를 인식한다.","C":"전자 현미경에 물질의 이중성이 사용됨을 알고, 빛과 물질의 이중성이 영상 정 보 저장 등의 분야에 활용됨을 설명할 수 있다.","D":"빛과 물질이 이중성을 가지며, 이를 영상 정보 저장 등에 활용함을 말할 수 있다.","E":"빛과 물질이 이중성을 가짐을 말할 수 있다."},"12물리03-04":{"A":"원자 내의 전자는 양자화된 에너지 준위를 가지고 있음을 수소 선스펙트럼 관찰 결과를 바탕으로 논증하고, 이를 이용하여 보어의 수소 원자 모형을 제시 하며, 보어 모형의 한계를 말할 수 있다.","B":"원자 내의 전자는 양자화된 에너지 준위를 가지고 있음을 수소 선스펙트럼 관찰 결과를 바탕으로 유추하고, 보어의 수소 원자 모형의 한계를 말할 수 있다.","C":"원자 내의 전자는 양자화된 에너지 준위를 가지고 있음을 수소 선스펙트럼 결과 를 바탕으로 설명할 수 있 다.","D":"원자 내의 전자는 양자화된 에너지 준위를 가지고 있음을 수소 선스펙트럼 결과 와 관련하여 말할 수 있다.","E":"원자 내의 전자는 양자화된 에너지 준위를 가지고 있음을 말할 수 있다."},"12물리03-05":{"A":"고체의 에너지띠 구조로부터 도체와 부도체의 차이를 알고, p-n 접합과 다이오 드 등의 사례를 통해 반도체 소자의 원리를 이해하며, 이 과정에서 과학 지식의 유용성을 인식한다.","B":"고체의 에너지띠 구조를 통해 도체와 부도체를 구분하고, p형 반도체와 n형 반도체의 특징을 설명하는 과정에서 반도체 소자의 원리에 호기심을 가진다.","C":"고체의 에너지띠 구조를 통해 도체와 부도체를 구분하고, 반도체는 p형 반도체 와 n형 반도체가 있음을 말할 수 있다.","D":"고체의 에너지띠 구조를 통해 도체와 부도체를 구분할 수 있다.","E":"고체의 전기 전도성에 따라 도체, 부도체로 구분할 수 있다."},"12물리03-06":{"A":"모든 관성계에서 빛의 속력이 동일하다는 원리로부터 시간 팽창, 길이 수축 현 상이 나타남을 이해하며, 특수 상대성 이론이 사회에 미친 영향을 조사하고, 과학 기술 사회의 상호 관련성을 인식한다.","B":"모든 관성계에서 빛의 속력이 동일하다는 원리를 알고, 시간 팽창과 길이 수축 현상이 나타남을 이해하며, 특수 상대성 이론이 사회에 미친 영향을 찾을 수 있다.","C":"모든 관성계에서 빛의 속력이 동일함을 알고, 시간 팽창과 길이 수축 현상이 나타남을 말할 수 있으며, 특수 상대성 이론이 사회에 미친 영향을 말할 수 있고, 특수 상대성 이론이 사회에 미친 영향에 호기심을 가진다.","D":"모든 관성계에서 빛의 속력이 동일함을 알고, 이러한 과학 지식이 사회에 영향 을 미쳤음을 말할 수 있으며, 과학 지식이 사회에 미친 영향에 흥미를 가진다.","E":"모든 관성계에서 빛의 속력이 동일함을 말할 수 있고, 이러한 과학 지식이 사회 에 미치는 영향에 관심을 가진다."}},"area":{"A":{"지식·이해":"빛의 중첩과 간섭을 통해 빛의 파동성을 이해하고, 볼록렌즈에서 상이 맺히는 과정을 빛의 굴절을 이용하여 설명하며, 빛과 물질의 이중성을 설명할 수 있다. 원자 내의 전자는 양자화된 에너지 준위를 가지고 있음을 스펙트럼 관찰 증거를 바탕으로 논증하고, 이를 이용하여 보어의 수소 원자 모형을 제시하며, 보어 모형 의 한계를 인식한다. 고체의 에너지띠 구조로부터 도체와 부도체의 차이를 알고, p-n 접합과 다이오드 등의 사례를 통해 반도체 소자의 원리를 이해하며, 모든 관성계에서는 빛의 속력이 동일하다는 원리를 알고, 시간 팽창, 길이 수축 현상이 나타남을 설명할 수 있다.","과정·기능":"이중 슬릿에 의한 빛의 간섭을 관찰하는 실험에서 여러 변인의 변화에 따라 보강 간섭과 상쇄 간섭이 일어나는 지점을 예측하고, 볼록렌즈에서 실상을 관찰하여 상의 위치와 초점거리를 정량적으로 구할 수 있다. 빛과 물질의 이중성이 전자 현미경과 영상 정보 저장 등의 분야에 활용됨을 조사 하여 설명하고, 수소 선스펙트럼을 관찰하며, 특수 상대성 이론이 사회에 미친 영향을 조사할 수 있다.","가치·태도":"빛의 중첩과 간섭을 이용한 기술과 현상을 예를 들어 설명하는 과정에서 과학의 유용성과 심미적 가치 및 광학 기술이 반도체와 디스플레이 제작 공정에서 갖는 중요성과 가치를 인식한다. 현대 생활에서 첨단 과학이 갖는 가치와 잠재력을 인식하고, 반도체 소자의 원리 를 이해하는 과정에서 과학 지식의 유용성을 인식하며, 과학 기술 사회의 상호 관련성을 인식한다."},"B":{"지식·이해":"빛의 중첩과 간섭 현상이 빛의 파동성과 관련이 있음을 알고, 볼록렌즈에서 상이 맺히는 과정을 빛의 굴절과 관련하여 이해하며, 빛과 물질의 이중성을 설명할 수 있다. 원자 내의 전자는 양자화된 에너지 준위를 가지고 있음을 스펙트럼 관찰 결과를 바탕으로 유추하고, 보어 모형의 한계를 알며, 고체의 에너지띠 구조를 통해 도체 와 부도체를 구분하고, p형 반도체와 n형 반도체의 특징을 설명할 수 있다. 모든 관성계에서 빛의 속력이 동일하다는 원리로부터 시간 팽창과 길이 수축 현상 이 나타남을 설명할 수 있다.","과정·기능":"이중 슬릿에 의한 빛의 간섭을 관찰하는 실험에서 보강 간섭과 상쇄 간섭이 일어 나는 지점을 찾고, 볼록렌즈에 의한 실상을 관찰하여 상의 위치와 초점거리를 찾 을 수 있 다. 빛과 물질의 이중성이 전자 현미경과 영상 정보 저장 등의 분야에 활용됨을 조사 할 수 있다. 수소 선스펙트럼을 관찰하고, 특수 상대성 이론이 사회에 미친 영향을 찾을 수 있다.","가치·태도":"빛의 중첩과 간섭을 이용한 기술과 현상의 예를 찾는 과정에서 과학의 유용성을 인식하고, 광학 기술이 반도체와 디스플레이 제작 공정에서 활용됨을 안다. 현대 생활에서 첨단 과학이 갖는 가치를 인식하고, p형 반도체와 n형 반도체의 특징을 설명하는 과정에서 반도체 소자의 원리에 호기심을 갖고, 특수 상대성 이론이 사회에 영향을 미쳤음을 인식한다."},"C":{"지식·이해":"빛의 중첩과 간섭 현상이 빛의 파동성과 관련이 있음을 알고, 볼록렌즈에서 상이 맺히는 과정이 빛의 굴절과 관련되어 있음을 알며, 전자 현미경에 물질의 이중성 이 사용됨을 말할 수 있다. 원자 내의 전자는 양자화된 에너지 준위를 가지고 있음을 수소 선스펙트럼 결과를 바탕으로 설명하며, 고체의 에너지띠 구조를 통해 도체와 부도체를 구분하고, 반 도체는 p형 반도체와 n형 반도체가 있음을 말할 수 있다. 모든 관성계에서 빛의 속력이 동일함을 알고, 시간 팽창과 길이 수축 현상이 나타 남을 말할 수 있다.","과정·기능":"이중 슬릿에 의한 빛의 간섭실험에서 빛의 간섭무늬를 관찰하고, 볼록렌즈에 의한 실상을 관찰하고 상의 위치를 찾을 수 있다. 빛과 물질의 이중성이 전자 현미경과 영상 정보 저장 등의 분야에 활용됨을 찾고, 수소 선스펙트럼을 관찰할 수 있다.","가치·태도":"빛의 중첩과 간섭이 일상생활에서 활용되며, 광학 기술이 반도체와 디스플레이 제작 공정에서 활용되는 데 흥미를 가진다. 특수 상대성 이론이 사회에 미친 영향에 호기심을 가진다."},"D":{"지식·이해":"일상생활에서 빛의 중첩과 간섭을 이용한 기술이나 현상이 있음을 알고, 빛과 물질의 이중성이 전자 현미경과 영상 정보 저장 등의 분야에 활용됨을 말할 수 있다. 원자 내의 전자는 양자화된 에너지 준위를 가지고 있음을 수소 선스펙트럼 결과와 관련지어 말할 수 있다. 고체의 에너지띠 구조를 통해 도체와 부도체를 구분하고, 모든 관성계에서 빛의 속력이 동일함을 말할 수 있다.","과정·기능":"이중 슬릿에 의한 빛의 간섭무늬를 관찰하고, 볼록렌즈에 의한 실상을 관찰하고 상의 위치를 찾으며, 수소 선스펙트럼을 관찰할 수 있다.","가치·태도":"광학 기술이 반도체와 디스플레이 제작 공정에서 활용되는 데 흥미를 가진다. 특수 상대성 이론과 같은 지식이 사회에 미친 영향에 흥미를 가진다."},"E":{"지식·이해":"빛과 물질이 이중성을 가지며, 원자 내의 전자는 양자화된 에너지 준위를 가지고 있음을 말할 수 있다. 고체의 전기 전도성에 따라 도체, 부도체로 구분할 수 있고, 모든 관성계에서 빛의 속도가 동일함을 말할 수 있다.","과정·기능":"이중 슬릿에 의한 빛의 간섭무늬와 볼록렌즈에 의한 실상을 관찰할 수 있다.","가치·태도":"특수 상대성 이론과 같은 지식이 사회에 미치는 영향에 관심을 가진다."}}},"화학-01":{"codes":{"12화학01-01":{"A":"화학이 현대 과학과 기술 및 사회의 발전에 기여한 다양한 사례를 조사하여 각 사례에서 화학의 의미와 중요성을 찾아 발표하고, 이를 통해 화학에 흥미와 호기심을 가진다.","B":"화학이 현대 과학과 기술 및 사회의 발전에 기여한 다양한 사례를 조사하여 발표하고, 화학에 흥미와 호기심을 가진다.","C":"화학이 현대 과학과 기술 및 사회의 발전에 기여한 사례 중 하나를 조사하여 발표하고, 화학에 흥미를 가진다.","D":"화학이 현대 과학과 기술 및 사회의 발전에 기여한 사례 중 하나를 조사하고, 화학에 관심을 가진다.","E":"화학이 현대 과학과 기술 및 사회의 발전에 기여한 사례를 보고, 화학이 일상 생활과 관련되어 있음을 말할 수 있다."},"12화학01-02":{"A":"물질의 양을 표현하는 단위인 몰과 몰질량의 의미를 구분하여 설명하고, 물질 의 질량이나 부피를 몰로, 몰을 물질의 질량이나 부피로 환산하며, 다양한 물 질의 몰질량을 탐색하여 비교하고, 특정한 몰수에 해당하는 물질의 질량을 측정하는 탐구를 수행할 수 있다.","B":"물질의 양을 표현하는 단위인 몰과 몰질량의 의미를 이해하고, 물질의 질량이 나 부피를 몰로 환산하며, 실험을 통해 특정한 몰수에 해당하는 물질의 질량을 측 정 하 고 비교할 수 있 다.","C":"물질의 양을 표현하는 단위인 몰과 몰질량의 의미를 알고, 실험을 통해 1몰에 해당하는 물질의 질량을 측정할 수 있다.","D":"몰과 몰질량의 정의를 이용하여 주어진 물질 1몰의 질량을 나타낼 수 있다.","E":"몰이 물질의 양을 나타내는 단위임을 말할 수 있다."},"12화학01-03":{"A":"여러 가지 반응을 화학 반응식으로 나타내고, 화학 반응식의 계수비와 몰수비 의 관계를 이용하여 반응물과 생성물의 질량 또는 부피 사이의 다양한 양적 관계를 예측하고 설명하며, 물질의 양적 관계를 확인할 수 있는 화학 반응 실험을 계획하고 수행하여 측정값과 예측값을 비교 분석할 수 있다.","B":"여러 가지 반응을 화학 반응식으로 나타내고, 화학 반응식의 계수비와 몰수비의 관계를 이용하여 반응물과 생성물의 양적 관계를 설명하며, 물질의 양적 관계를 확인할 수 있는 화학 반응 실험을 수행하여 생성물의 양을 측정할 수 있다.","C":"간단한 화학 반응을 화학 반응식으로 나타내고, 화학 반응식의 계수비를 이용 하여 물질의 양적 관계를 설명하며, 물질의 양적 관계를 확인할 수 있는 화학 반응 실험을 수행할 수 있다.","D":"화학 반응식에서 물질의 계수비가 갖는 의미를 알고, 화학 반응 실험을 통해 물질의 양적 관계를 확인할 수 있음을 말할 수 있다.","E":"화학 반응식에서 계수비를 알 고, 양 적 관계를 확인할 수 있는 화학 반응 실 험 에서 반응물과 생성물을 구분할 수 있다."}},"area":{"A":{"지식·이해":"물질의 양을 표현하는 단위 합을 극성 공유 결합과 무극성 공유 결합 으로 분류할 수 있다.","C":"전기 음성도의 의미를 이해하고, 공유 결합한 원소의 전기 음성도 차이로 공유 결합을 극성 공유 결합과 무극성 공유 결합으로 분류할 수 있다.","D":"원소마다 전기 음성도가 다름을 알고, 공유 결합한 원소의 전기 음성도 차이로 공유 결합을 극성 공유 결합과 무극성 공유 결합으로 분류할 수 있음을 말할 수 있다.","E":"전기 음성도가 공유 결합의 성질에 영향을 미치는 요소 중 하나임을 인식한다."},"12화학02-03":{"A":"여러 가지 원자와 분자를 루이스 전자점식으로 나타내고, 전자쌍 반발 이론에 근거하여 예측한 분자의 구조를 모형으로 표현하며, 분자 모델링 소프트웨어 를 활용하여 분자 구조 모델링을 수행하고 실제 입체 구조와 비교할 수 있다.","B":"원자와 분자를 루이스 전자점식으로 나타내고, 전자쌍 반발 이론에 근거하여 분자의 구조를 예측하며, 분자 모델링 소프트웨어를 활용하여 분자 구조 모델 링을 수행할 수 있다.","C":"원자와 간단한 분자를 루이스 전자점식으로 나타내고, 서로 다른 분자 구조의 차이를 전자쌍 반발 이론으로 설명하며, 분자 모델링 소프트웨어를 활용하여 분자 구조를 찾을 수 있다.","D":"루이스 전자점식의 표현 방법을 이해하고, 다양한 분자 모형을 보고 분자의 구조를 말할 수 있다.","E":"분자 모형을 보고 분자의 구조를 말할 수 있다."},"12화학02-04":{"A":"여러 가지 물질의 분자 구조를 표현하고, 분자 구조와 물질의 물리적, 화학적 성질의 관계를 분석하고 예측하는 탐구를 통해 분자 구조의 중요성과 화학의 유 용 성 을 설명할 수 있 다.","B":"물질의 분자 구조를 표현하고, 분자 구조에 근거하여 물질의 물리적, 화학적 성질을 예측하며 물질의 구조와 성질의 관계에 호기심을 가진다.","C":"물질의 분자 구조를 확인하고, 물질의 분자 구조와 극성의 유무가 물질의 물리 적, 화학적 성질과 관련이 있음을 설명하며, 이를 통해 분자 구조의 유의미함 을 느낀다.","D":"물질의 분자 구조가 물질의 물리적, 화학적 성질과 관련이 있음을 말하며 분자 구조에 관심을 가진다.","E":"분자 구조로 극성 분자와 무극성 분자를 구분할 수 있음을 인식하며 분자 구 조 에 관심을 가진다."}},"area":{"A":{"지식·이해":"주기율표를 이용해 전기 음성도의 주기적 변화를 설명하고, 공유 결합한 원소의 전기 음성도 차이와 쌍극자 모멘트로부터 다양한 분자에서 공유 결합을 극성 공유 결합과 무극성 공유 결합으로 판단하여 분류할 수 있다. 여러 가지 물질의 분자 구조를 표현하고, 여러 가지 원자와 분자를 루이스 전자점 식으로 나타내며, 전자쌍 반발 이론에 근거하여 예측한 분자의 구조를 모형으로 표현할 수 있다.","과정·기능":"물의 전기 분해 및 전기 분해로 생성되는 물질의 특성을 탐구하는 실험을 수행하 고, 이를 통해 물이 수소와 산소의 화학 결합으로 형성되며 모든 화학 결합에는 전자가 관여함을 설명하며, 분자 모델링 소프트웨어를 활용하여 분자 구조 모델링 을 수행하고 실제 입체 구조와 비교할 수 있다.","가치·태도":"분자 구조와 물질의 물리적, 화학적 성질의 관계를 분석하고 예측하는 탐구를 통해 분자 구조의 중요성과 화학의 유용성을 설명할 수 있다."},"B":{"지식·이해":"전기 음성도의 의미와 주기성을 이해하고, 공유 결합한 원소의 전기 음성도 차이 와 쌍극자 모멘트로부터 공유 결합을 극성 공유 결합과 무극성 공유 결합으로 분류할 수 있다. 원자와 분자를 루이스 전자점식으로 나타내고, 전자쌍 반발 이론에 근거하여 분자 의 구조를 예측할 수 있다. 물질의 분자 구조를 표현하고, 분자 구조에 근거하여 물질의 물리적, 화학적 성질 을 예측할 수 있다.","과정·기능":"물의 전기 분해 실험을 수행하여 물이 수소와 산소의 화학 결합으로 형성되며 모든 화학 결합에는 전자가 관여함을 이해하고, 분자 모델링 소프트웨어를 활용하 여 분자 구조 모델링을 수행할 수 있다.","가치·태도":"분자 구조에 근거하여 물질의 물리적, 화학적 성질을 예측하며 물질의 구조와 성질의 관계에 호기심을 가진다."},"C":{"지식·이해":"전기 음성도의 의미를 이해하고, 공유 결합한 원소의 전기 음성도 차이로 공유 결합을 극성 공유 결합과 무극성 공유 결합으로 분류할 수 있다. 원자와 간단한 분자를 루이스 전자점식으로 나타내고, 서로 다른 분자 구조의 차이를 전자쌍 반발 이론으로 설명할 수 있다. 물질의 분자 구조를 확인하고, 물질의 분자 구조와 극성의 유무가 물질의 물리적, 화학적 성질과 관련이 있음을 설명할 수 있다.","과정·기능":"물의 전기 분해 실험을 통해 물을 구성하는 원소의 화학 결합에 전자가 관여함을 설명하고, 분자 모델링 소프트웨어를 활용하여 분자 구조를 찾을 수 있다.","가치·태도":"물질의 분자 구조와 극성의 유무가 물질의 물리적, 화학적 성질과 관련이 있음을 통해 분자 구조의 유의미함을 느낀다."},"D":{"지식·이해":"원소마다 전기 음성도가 다름을 알고, 공유 결합한 원소의 전기 음성도 차이로 공유 결합을 극성 공유 결합과 무극성 공유 결합으로 분류할 수 있음을 말할 수 있다. 루이스 전자점식의 표현 방법을 이해하고, 다양한 분자 모형을 보고 분자의 구조 를 말할 수 있다.","과정·기능":"물의 전기 분해 실험을 통해 물이 수소와 산소의 화학 결합으로 형성됨을 설명할 수 있다.","가치·태도":"물질의 분자 구조가 물질의 물리적, 화학적 성질과 관련이 있음을 말하며 분자 구조에 관심을 가진다."},"E":{"지식·이해":"전기 음성도가 공유 결합의 성질에 영향을 미치는 요소 중 하나임을 인식하고, 분자 모형을 보고 분자의 구조를 말할 수 있다.","과정·기능":"물을 전기 분해하면 수소와 산소가 생성됨을 말할 수 있다.","가치·태도":"분자 구조로 극성 분자와 무극성 분자를 구분할 수 있음을 인식하며 분자 구조에 관심을 가진다."}}},"화학-03":{"codes":{"12화학03-01":{"A":"가역 반응의 화학 평형 상태에서 나타나는 거시적으로 관찰 가능한 현상과 농도 변화를 동적 평형으로 설명할 수 있다.","B":"가역 반응의 화학 평형 상태에서 나타나는 거시적으로 관찰 가능한 현상을 바탕으로 반응물과 생성물의 농도를 설명할 수 있다.","C":"가역 반응의 화학 평형 상태에서 나타나는 거시적으로 관찰 가능한 현상을 말 할 수 있 다.","D":"가역 반응에서 화학 평형 상태가 나타남을 말할 수 있다.","E":"가역 반응의 예시를 들 수 있다."},"12화학03-02":{"A":"화학 평형 상태에서 반응물과 생성물의 농도 자료를 해석하여 농도비의 규칙 성을 발견하고, 이를 바탕으로 평형 상수를 정의하며, 평형 상수의 의미를 다 양하게 설명할 수 있다.","B":"화학 평형 상태에서 반응물과 생성물의 농도 자료를 통해 농도비의 규칙성을 이해하고, 이를 바탕으로 평형 상수를 정의하며, 평형 상수의 의미를 설명할 수 있다.","C":"반응물과 생성물의 농도를 사용하여 화학 평형 상태에서 평형 상수를 구할 수 있다.","D":"평형 상수식을 쓸 수 있다.","E":"화학 평형 상태를 평형 상수로 표현할 수 있음을 말할 수 있다."},"12화학03-03":{"A":"반응 지수의 의미를 평형 상수와 비교하여 설명하고, 반응 지수를 활용하여 반응의 진행 방향을 예측할 수 있다.","B":"반응 지수를 구하고 평형 상수와 비교할 수 있다.","C":"반응 지수를 구할 수 있다.","D":"반응의 진행 방향을 예측하는 데 반응 지수가 활용됨을 말할 수 있다.","E":"반응의 현재 상태를 반응 지수로 표현할 수 있음을 말할 수 있다."},"12화학03-04":{"A":"농 도, 압 력, 온 도 변화에 따른 화학 평형의 이동을 예 측 하 고, 농 도, 압 력, 온 도 변화에 따른 화학 평형 이동 실험을 수행하여 화학 평형 이동의 원리를 이해하 며, 일상생활 속 다양한 화학 평형 이동 사례를 찾아 화학의 유용성을 느낀다.","B":"농도, 압력, 온도 변화에 따른 화학 평형 이동을 설명하고, 농도,
