미를 알고, 엔탈피를 이용하여 열화학 반응식을 표현하며, 반응 엔탈피를 이용하여 대체 연료와 화석 연료의 효율성을 비교할 수 있다.","C":"엔탈피의 의미를 알고, 대체 연료와 화석 연료의 효율성을 비교할 수 있다.","D":"반응에 출입하는 에너지를 '엔탈피'라는 용어로 표현할 수 있다.","E":"열화학 반응식을 통해 반응에 출입하는 에너지를 나타냄을 말할 수 있다."},"12물에03-02":{"A":"화학 반응의 엔탈피 변화 그림 등 다양한 자료를 활용하여 헤스 법칙을 설명하 고, 측정하기 어려운 화학 반응의 엔탈피를 헤스 법칙으로 구하며, 이를 통해 화학 법칙의 유용성을 인식하고, 중화 반응으로 헤스 법칙을 확인하는 실험을 수행하여 결론을 도출할 수 있다.","B":"측정하기 어려운 화학 반응의 엔탈피를 헤스 법칙으로 구하고, 이를 통해 화학 법칙의 유용성을 인식하며, 중화 반응으로 헤스 법칙을 확인하는 실험을 수행하 고 결과를 해석할 수 있다.","C":"헤스 법칙으로 화학 반응의 엔탈피를 구하고, 중화 반응으로 헤스 법칙을 확인 하는 실험을 수행하며, 이를 통해 화학 법칙의 유용성을 인식한다.","D":"간단한 열화학 반응식을 통해 헤스 법칙을 설명하고, 제시된 절차에 따라 중화 반응으로 헤스 법칙을 확인하는 실험을 수행하며, 이를 통해 화학 법칙에 관심 을 가진다.","E":"헤스 법칙으로 화학 반응의 엔탈피를 구할 수 있음을 알고, 중화 반응 실험으로 헤스 법칙을 확인할 수 있음을 말하며 화학 법칙에 관심을 가진다."},"12물에03-03":{"A":"엔트로피의 의미를 설명하고, 엔트로피의 변화를 예측하며, 엔탈피와 엔트로피 의 변화를 종합하여 화학 변화의 자발성을 설명할 수 있다.","B":"엔트로피의 의미를 이해하고, 자발적인 화학 변화에서 엔트로피와 엔탈피의 영 향을 설명할 수 있다.","C":"엔트로피의 의미를 이해하고, 엔트로피의 증가와 감소가 일어나는 다양한 현상 을 말할 수 있 다.","D":"엔트로피의 의미를 말할 수 있다.","E":"자발적 변화의 예를 들 수 있다."}},"area":{"A":{"지식·이해":"엔탈피와 열화학 반응식의 의미를 설명하고, 엔탈피를 이용하여 열화학 반응식을 표현하며, 화학 반응의 엔탈피 변화 그림 등 다양한 자료를 활용하여 헤스 법칙을 설명하고, 측정하기 어려운 화학 반응의 엔탈피를 헤스 법칙으로 구할 수 있다. 엔트로피의 의미를 설명하고, 엔트로피의 변화를 예측하며, 엔탈피와 엔트로피의 변화를 종합하여 화학 변화의 자발성을 설명할 수 있다.","과정·기능":"반응 엔탈피를 포함한 다양한 기준으로 대체 연료와 화석 연료의 효율성을 비교하 고, 중화 반응으로 헤스 법칙을 확인하는 실험을 수행하여 결론을 도출할 수 있다.","가치·태도":"측정하기 어려운 화학 반응의 엔탈피를 헤스법칙으로 구하는 것을 통해 화학 법칙 의 유용성을 인식한다."},"B":{"지식·이해":"엔탈피와 열화학 반응식의 의미를 알고, 엔탈피를 이용하여 열화학 반응식을 표현 하며, 측정하기 어려운 화학 반응의 엔탈피를 헤스 법칙으로 구할 수 있다. 엔트로피의 의미를 이해하고, 자발적인 화학 변화에서 엔트로피와 엔탈피의 영향 을 설명할 수 있다.","과정·기능":"반응 엔탈피를 이용하여 대체 연료와 화석 연료의 효율성을 비교하고, 중화 반응 으로 헤스 법칙을 확인하는 실험을 수행하고 결과를 해석할 수 있다.","가치·태도":"측정하기 어려운 화학 반응의 엔탈피를 헤스 법칙으로 구하는 것을 통해 화학 법칙의 유용성을 인식한다."},"C":{"지식·이해":"엔탈피의 의미를 알고, 헤스 법칙으로 화학 반응의 엔탈피를 구할 수 있다. 엔트로피의 의미를 이해하고, 엔트로피의 증가와 감소가 일어나는 다양한 현상을 말 할 수 있 다.","과정·기능":"대체 연료와 화석 연료의 효율성을 비교하고, 중화 반응으로 헤스 법칙을 확인하 는 실험을 수행할 수 있다.","가치·태도":"헤스 법칙으로 화학 반응의 엔탈피를 구하는 것을 통해 화학 법칙이 유용함을 말 할 수 있 다."},"D":{"지식·이해":"반응에 출입하는 에너지를 ‘엔탈피’라는 용어로 표현하고, 간단한 열화학 반응식 을 통해 헤스 법칙을 설명하며, 엔트로피의 의미를 말할 수 있다.","과정·기능":"제시된 절차에 따라 중화 반응으로 헤스 법칙을 확인하는 실험을 수행할 수 있다.","가치·태도":"중화 반응으로 헤스 법칙을 확인하는 실험을 수행하며 화학 법칙에 관심을 가 진다."},"E":{"지식·이해":"열화학 반응식을 통해 반응에 출입하는 에너지를 나타냄을 말하고, 헤스 법칙으로 화학 반응의 엔탈피를 구할 수 있음을 알며, 자발적 변화의 예를 들 수 있다.","과정·기능":"중화 반응 실험으로 헤스 법칙을 확인할 수 있음을 말할 수 있다.","가치·태도":"중화 반응 실험으로 헤스 법칙을 확인할 수 있음을 통해 화학 법칙에 관심을 가진다."}}},"물에-04":{"codes":{"12물에04-01":{"A":"자료 해석을 통해 화학 반응 속도를 반응물의 농도로 표현할 수 있음을 이해하 고, 반응 속도식과 반응 차수를 구하며, 센서를 활용하여 반응 속도를 측정하는 실험을 설계하고 수행하여 결론을 도출할 수 있다.","B":"반응물의 농도를 이용해 화학 반응 속도를 표현할 수 있음을 알고, 반응 속도식 을 구하며, 센서를 활용하여 반응 속도를 측정하는 실험을 수행하여 결과를 해 석할 수 있다.","C":"반응물의 농도를 이용해 반응 속도식을 표현하고, 센서를 활용하여 반응 속도를 측정하는 실험을 수행할 수 있다.","D":"반응물의 농도로 화학 반응 속도식을 표현할 수 있음을 알고, 제시된 절차에 따라 센서를 활용하여 반응 속도를 측정하는 실험을 수행할 수 있다.","E":"화학 반응의 속도를 나타낼 수 있음을 알고, 센서를 활용하여 반응 속도 실험 데이터를 수집할 수 있음을 말할 수 있다."},"12물에04-02":{"A":"1차 반응의 반감기가 반응물의 농도에 의존하지 않음을 그래프와 자료를 이용 해 설명하고, 1차 반응의 반감기를 찾으며, 1차 반응의 반감기가 활용되는 사례 를 조사하고 발표할 수 있 다.","B":"1차 반응의 반감기가 반응물의 농도에 의존하지 않음을 설명하고, 1차 반응의 반감기가 활용되는 사례를 조사할 수 있다.","C":"1차 반응의 반감기가 반응물의 농도에 의존하지 않음을 이해하고, 1차 반응의 반감기가 활용되는 사례를 일부 말할 수 있다.","D":"1차 반응의 반감기가 일정함을 말할 수 있다.","E":"반감기의 의미를 말할 수 있다."},"12물에04-03":{"A":"화학 반응에서 유효 충돌과 활성화 에너지의 의미를 설명하고, 화학 반응이 일 어나기 위한 조건이 이와 관련이 있다는 것에 관심을 가지고 설명할 수 있다.","B":"화학 반응에서 유효 충돌과 활성화 에너지의 의미를 이해하고, 화학 반응이 일 어나기 위한 조건이 이와 관련이 있음을 설명할 수 있다.","C":"화학 반응에서 유효 충돌과 활성화 에너지의 의미를 알고, 화학 반응이 일어나 기 위한 조건이 있음을 말할 수 있다.","D":"화학 반응에서 유효 충돌과 활성화 에너지의 의미를 말할 수 있다.","E":"활성화 에너지의 의미를 말할 수 있다."},"12물에04-04":{"A":"농도, 온도, 촉매에 따라 반응 속도가 달라짐을 원리와 함께 설명하고, 농도, 온도, 촉매와 반응 속도의 관계를 탐구하는 실험을 수행하여 결론을 도출하며, 일상생활에서 농도, 온도, 촉매가 반응 속도에 영향을 미치는 각각의 다양한 예를 조사하고 발표하며 화학의 유용성을 인식한다.","B":"농도, 온도, 촉매에 따라 반응 속도가 달라짐을 설명하고, 농도, 온도, 촉매와 반응 속도의 관계를 탐구하는 실험을 수행하여 결과를 해석하며, 일상생활에서 농도, 온도, 촉매가 반응 속도에 영향을 미치는 각각의 예를 조사하며 화학의 유용성을 인식한다.","C":"농도, 온도, 촉매에 따라 반응 속도가 달라짐을 이해하고, 농도, 온도, 촉매와 반응 속도의 관계를 탐구하는 실험을 수행하며, 일상생활에서 농도, 온도, 촉매 중 일부 요소가 반응 속도에 영향을 미치는 예를 찾으며 화학의 유용성에 관심 을 가진다.","D":"농도, 온도, 촉매 중 일부 요소에 따라 반응 속도가 달라짐을 이해하고, 화학 반응 속도가 달라지는 예시를 보며 반응 속도를 변화시키는 요인에 관심을 가진다.","E":"농도, 온도, 촉매 중 일부 요소에 따라 반응 속도가 달라짐을 알고, 반응 속도에 관심을 가진다."}},"area":{"A":{"지식·이해":"자료 해석을 통해 화학 반응 속도를 반응물의 농도로 표현할 수 있음을 이해하 고, 반응 속도식과 반응 차수를 구하며, 1차 반응의 반감기가 반응물의 농도에 의존하지 않음을 그래프와 자료를 이용해 설명하고, 1차 반응의 반감기를 찾을 수 있다. 화학 반응에서 유효 충돌과 활성화 에너지의 의미를 설명하고, 화학 반응이 일어 나기 위한 조건이 이와 관련이 있다는 것에 관심을 가지고 설명하며, 농도, 온도, 촉매에 따라 반응 속도가 달라짐을 원리와 함께 설명할 수 있다.","과정·기능":"센서를 활용하여 반응 속도를 측정하는 실험을 설계하고 수행하여 결론을 도출하 고, 농도, 온도, 촉매와 반응 속도의 관계를 탐구하는 실험을 수행하여 결론을 도출할 수 있다.","가치·태도":"1차 반응의 반감기가 활용되는 사례와 일상생활에서 농도, 온도, 촉매가 반응 속도에 영향을 미치는 각각의 다양한 예를 조사하고 발표하며 화학의 유용성을 인식한다."},"B":{"지식·이해":"반응물의 농도를 이용해 화학 반응 속도를 표현할 수 있음을 알고, 반응 속도식을 구하며, 1차 반응의 반감기가 반응물의 농도에 의존하지 않음을 설명할 수 있다. 화학 반응에서 유효 충돌과 활성화 에너지의 의미를 이해하고, 화학 반응이 일어 나기 위한 조건이 이와 관련이 있음을 설명하며, 농도, 온도, 촉매에 따라 반응 속도가 달라짐을 설명할 수 있다.","과정·기능":"센서를 활용하여 반응 속도를 측정하는 실험을 수행하여 결과를 해석하고, 농도, 온도, 촉매와 반응 속도의 관계를 탐구하는 실험을 수행하여 결과를 해석할 수 있다.","가치·태도":"1차 반응의 반감기가 활용되는 사례와 일상생활에서 농도, 온도, 촉매가 반응 속도에 영향을 미치는 각각의 예를 조사하며 화학의 유용성을 인식한다."},"C":{"지식·이해":"반응물의 농도를 이용해 반응 속도식을 표현하고, 1차 반응의 반감기가 반응물의 농도에 의존하지 않음을 설명할 수 있다. 화학 반응에서 유효 충돌과 활성화 에너지의 의미를 알고, 화학 반응이 일어나기 위한 조건이 있음을 말하며, 농도, 온도, 촉매에 따라 반응 속도가 달라짐을 설명 할 수 있다.","과정·기능":"센서를 활용하여 반응 속도를 측정하는 실험을 수행하고, 농도, 온도, 촉매와 반응 속도의 관계를 탐구하는 실험을 수행할 수 있다.","가치·태도":"1차 반응의 반감기가 활용되는 사례를 일부 말하고, 일상생활에서 농도, 온도, 촉매 중 일부 요소가 반응 속도에 영향을 미치는 예를 찾아 화학의 유용성에 관심 을 가진다."},"D":{"지식·이해":"반응물의 농도로 화학 반응 속도식을 표현할 수 있음을 알고, 1차 반응의 반감기 가 일정함을 말할 수 있다. 화학 반응에서 유효 충돌과 활성화 에너지의 의미를 말하고, 농도, 온도, 촉매 중 일부 요소에 따라 반응 속도가 달라짐을 설명할 수 있다.","과정·기능":"제시된 절차에 따라 센서를 활용하여 반응 속도를 측정하는 실험을 수행할 수 있다.","가치·태도":"화학 반응 속도가 달라지는 예시를 보며 반응 속도를 변화시키는 요인에 관심을 가진다."},"E":{"지식·이해":"화학 반응의 속도를 나타낼 수 있음을 알고, 반감기의 의미를 말할 수 있다. 활성화 에너지의 의미를 말하고, 농도, 온도, 촉매 중 일부 요소에 따라 반응 속도 가 달라짐을 말할 수 있다.","과정·기능":"센서를 활용하여 반응 속도 실험 데이터를 수집할 수 있음을 말할 수 있다.","가치·태도":"반응 속도에 관심을 가진다."}}},"반응-01":{"codes":{"12반응01-01":{"A":"화학 평형을 이용하여 브뢴스테드-라우리 산과 염기의 정의를 설명하고, 제시 된 화학 반응식의 모든 물질을 산과 염기로 구별할 수 있다.","B":"브뢴스테드-라우리 산과 염기의 정의를 통해 분자성 물질이 물에 녹는 화학 반응식에서 물질을 산과 염기로 구별할 수 있다.","C":"양성자의 주고 받음을 기준으로 화학 반응식에서 물질을 산과 염기로 구별함 을 설명할 수 있다.","D":"물질을 산과 염기로 구별하는 기준 중에 브뢴스테드-라우리 정의가 있음을 말 할 수 있 다.","E":"물질을 산과 염기로 구별할 수 있음을 말할 수 있다."},"12반응01-02":{"A":"이온화 상수의 정의를 설명하고, 이를 이용하여 주어진 농도의 약산, 약염기 수용액의 pH를 계산하며, 실험을 통해 0.1M의 강산, 강염기, 약산, 약염기 수용액의 pH 측정값과 이론값을 비교할 수 있다.","B":"이온화 상수의 정의를 이해하고, 이를 이용하여 같은 농도의 강산, 약산 수용 액의 pH를 계산하며, 실험을 통해 0.1M의 강산, 강염기, 약산, 약염기 수용액 의 pH를 측정할 수 있다.","C":"이온화 상수의 정의를 알고, 이온화 상수의 크기 비교를 통해 산과 염기의 상대적인 세기를 예측할 수 있다.","D":"강산과 약산, 강염기와 약염기의 이온화 상수를 비교할 수 있다.","E":"수용액의 액성을 p H 로 표현할 수 있 다."},"12반응01-03":{"A":"디지털 기기나 센서를 이용한 중화 적정 실험에서 측정한 pH 데이터를 중화 적전 곡선 그래프로 시각화하고, 그래프에 나타난 pH 변화의 특징과 중화점 의 의미를 설명할 수 있다.","B":"중화 적정 실험에서 측정한 pH 데이터를 중화 적전 곡선 그래프로 시각화하 고, 그래프에 나타난 pH 변화의 특징을 설명할 수 있다.","C":"중화 적정 실험에서 pH 변화를 나타낸 중화 적정 곡선 그래프를 보며 pH 변화를 설명할 수 있다.","D":"중화 적정 실험에서 pH 변화가 크게 나타나는 지점을 말할 수 있다.","E":"서로 다른 액성의 수용액이 혼합되면 pH가 변화함을 말할 수 있다."},"12반응01-04":{"A":"이온화 상수를 이용하여 염의 가수 분해 과정을 설명하고 염 수용액의 액성을 예측하며, 염 수용액의 액성을 확인하는 실험을 통해 결괏값과 예측값을 비교 하고 해석할 수 있다.","B":"이온화 상수를 이용하여 염 수용액의 액성을 예측하고, 염 수용액의 액성을 확인하는 실험을 통해 염의 가수 분해 과정을 설명할 수 있다.","C":"염의 가수 분해 과정을 알 고, 염 수용액의 액성을 확인하는 실험을 통해 해 당 수용액에서 일어나는 염의 가수 분해 과정을 이해할 수 있다.","D":"염과 물이 반응하여 서로 다른 이온 또는 분자성 이온이 생성될 수 있음을 알고, 염 수용액의 액성을 확인하는 실험을 통해 해당 수용액에서 염의 가수 분해가 일어나는지 말할 수 있다.","E":"염 수용액의 액성을 예측하고, 실험을 통해 염 수용액의 액성을 확인할 수 있다."},"12반응01-05":{"A":"화학 평형의 원리를 이용하여 생체 내 완충 작용을 설명하고, 강산이나 강염기 를 완충 용액과 물에 각각 첨가할 때 pH 변화를 측정하고 비교하는 실험을 수행하여 완충 작용을 확인하며, 생체 내 완충 작용의 다양한 예를 조사하고 발표하며 생체 내 완충 용액의 중요성과 화학 원리의 신비로움을 인식한다.","B":"생체 내 완충 용액의 작용을 이해하고, 강산이나 강염기를 완충 용액과 물에 각각 첨가할 때 pH 변화를 비교하는 실험을 수행하며, 생체 내 완충 작용의 예를 조사하여 화학 원리에 흥미를 가질 수 있다.","C":"생체 내 완충 작용의 예를 보고 이때 나타나는 pH 변화를 설명하며 화학 원리 에 관심을 가질 수 있다.","D":"생체 내 완충 작용으로 pH가 일정하게 유지되는 것이 생명 유지를 위해 중요 함을 말할 수 있다.","E":"생명 유지를 위해 완충 작용이 중요함을 말할 수 있다."}},"area":{"A":{"지식·이해":"화학 평형을 이용하여 브뢴스테드-라우리 산과 염기의 정의를 설명하고, 제시된 화학 반응식의 모든 물질을 산과 염기로 구별할 수 있다. 이온화 상수의 정의를 설명하고, 이를 이용하여 주어진 농도의 약산, 약염기 수용 액 의 p H 를 계산할 수 있 다. 이온화 상수를 이용하여 염의 가수 분해 과정을 설명하고 염 수용액의 액성을 예측하며, 화학 평형의 원리를 이용하여 생체 내 완충 작용을 설명할 수 있다.","과정·기능":"실험을 통해 0.1M의 강산, 강염기, 약산, 약염기 수용액의 pH 측정값과 이론값 을 비교할 수 있다. 디지털 기기나 센서를 이용한 중화 적정 실험에서 측정한 pH 데이터를 중화 적전 곡선 그래프로 시각화하고, 그래프에 나타난 pH 변화의 특징과 중화점의 의미를 설명할 수 있다. 염 수용액의 액성을 확인하는 실험을 통해 결괏값과 예측값을 비교하고 해석하고, 강 산 이 나 강염기를 완충 용액과 물에 각각 첨가할 때 p H 변화를 측정하고 비 교 하 는 실험을 수행하며 완충 작용을 확인할 수 있다.","가치·태도":"생체 내 완충 작용의 다양한 예를 조사하고 발표하며 생체 내 완충 용액의 중요성 과 화학 원리의 신비로움을 인식한다."},"B":{"지식·이해":"브뢴스테드-라우리 산과 염기의 정의를 통해 분자성 물질이 물에 녹는 화학 반응 식에서 물질을 산과 염기로 구별할 수 있다. 이온화 상수의 정의를 이해하고, 이를 이용하여 같은 농도의 강산, 약산 수용액의 pH를 계산할 수 있다. 이온화 상수를 이용하여 염 수용액의 액성을 예측하고, 생체 내 완충 용액의 작용 을 설명할 수 있다.","과정·기능":"실험을 통해 0.1M의 강산, 강염기, 약산, 약염기 수용액의 pH를 측정할 수 있다. 중화 적정 실험에서 측정한 pH 데이터를 중화 적전 곡선 그래프로 시각화하고, 그래프에 나타난 pH 변화의 특징을 설명할 수 있다. 염 수용액의 액성을 확인하는 실험을 통해 염의 가수 분해 과정을 설명하고, 강산 이나 강염기를 완충 용액과 물에 각각 첨가할 때 pH 변화를 비교하는 실험을 수행할 수 있다.","가치·태도":"생체 내 완충 작용의 예를 조사하며 화학 원리에 흥미를 가진다."},"C":{"지식·이해":"양성자의 주고 받음을 기준으로 화학 반응식에서 물질을 산과 염기로 구별함을 설명할 수 있다. 이온화 상수의 정의를 알고, 이온화 상수의 크기 비교를 통해 산과 염기의 상대적 인 세기를 예측하며, 염의 가수 분해 과정을 말할 수 있다. 생체 내 완충 작용의 예를 보고 이때 나타나는 pH 변화를 설명할 수 있다.","과정·기능":"중화 적정 실험에서 pH 변화를 나타낸 중화 적정 곡선 그래프를 보며 pH 변화를 설명하고, 염 수용액의 액성을 확인하는 실험을 통해 해당 수용액에서 일어나는 염의 가수 분해 과정을 설명할 수 있다.","가치·태도":"생체 내 완충 작용의 예를 보고 이때 나타나는 pH 변화를 설명하며 화학 원리에 관심을 가진다."},"D":{"지식·이해":"물질을 산과 염기로 구별하는 기준 중에 브뢴스테드-라우리 정의가 있음을 말할 수 있다. 강산과 약산, 강염기와 약염기의 이온화 상수를 비교하고, 염과 물이 반응하여 서로 다른 이온 또는 분자성 이온이 생성될 수 있음을 말할 수 있다.","과정·기능":"중화 적정 실험에서 pH 변화가 크게 나타나는 지점을 알고, 염 수용액의 액성을 확인하는 실험을 통해 해당 수용액에서 염의 가수 분해가 일어나는지 말할 수 있다.","가치·태도":"생체 내 완충 작용으로 p H 가 일정하게 유지되는 것이 생명 유지를 위해 중요함을말할 수 있 다."},"E":{"지식·이해":"물질을 산과 염기로 구별할 수 있음을 알고, 수용액의 액성을 pH로 표현하며, 서로 다른 액성의 수용액이 혼합되면 pH가 변화함을 말할 수 있다.","과정·기능":"염 수용액의 액성을 예측하고, 실험을 통해 염 수용액의 액성을 확인할 수 있다.","가치·태도":"생명 유지를 위해 완충 작용이 중요함을 말할 수 있다."}}},"반응-02":{"codes":{"12반응02-01":{"A":"전자의 이동과 산화수 변화로 산화·환원 반응을 이해하여 반쪽 반응식을 나타내고, 이를 활용하여 산화·환원 반응식을 완성하며, 산화·환원 반응의 동시성과 산화·환 원 반응에서 산화제와 환원제는 상대적 세기에 의해 결정되는 것을 설명할 수 있다.","B":"전자의 이동과 산화수 변화로 산화·환원 반응을 이해하여 반쪽 반응식을 나타 내고, 이를 활용하여 산 화·환원 반응식을 완성할 수 있다.","C":"산화·환원 반응에서 산화수 변화로 산화되는 물질과 환원되는 물질을 구분할 수 있다.","D":"화학 반응에서 반응물과 생성물의 산화수를 구할 수 있다.","E":"산 화·환원 반응에서 전자가 이동함을 말할 수 있다."},"12반응02-02":{"A":"화학 전지의 발전 과정을 조사하여 실용 전지의 구조적 공통점을 추론하고, 금속판과 전해질을 이용한 전지를 구성하고 효율적인 전지의 조건을 탐색하는 실험을 수행하여 결론을 내릴 수 있다.","B":"화학 전지의 발전 과정을 조사하여 실용 전지의 구조적 공통점을 설명하고, 금속판과 전해질을 이용한 전지를 구성하고 효율적인 전지의 조건을 탐색하는 실험을 수행하여 결과를 해석할 수 있다.","C":"실용 전지의 구조적 공통점을 이해하고, 금속판과 전해질을 이용한 전지를 구성하여 효율적인 전지의 조건을 탐색하는 실험을 수행할 수 있다.","D":"실용 전지의 구조적 공통점을 알고, 금속판과 전해질을 이용하여 전지를 구성 할 수 있다.","E":"금속판과 전해질을 이용하여 전지를 구성할 수 있음을 말할 수 있다."},"12반응02-03":{"A":"화학 전지에서 전극 반응을 산화·환원 반응식으로 나타내고, 화학 에너지가 전기 에너지로 전환되는 원리를 산화·환원 반응을 통해 설명하며, 표준 환원 전위의 의미를 이해하여 화학 전지의 전위차를 구할 수 있다.","B":"화학 전지에서 전극 반응을 산화·환원 반응식으로 나타내고, 화학 에너지가 전기 에너지로 전환되는 원리를 산 화·환원 반응을 통해 설명할 수 있다.","C":"화학 전지에서 전극 반응을 산 화·환원 반응식으로 나타낼 수 있다.","D":"화학 전지에서 산 화·환원 반응이 일어남을 말할 수 있다.","E":"화학 전지에서 전자의 이동이 일어남을 말할 수 있다."},"12반응02-04":{"A":"전기 분해의 원리를 산화·환원 반응으로 설명하고, 전기 분해를 할 때 전극에 서 일어나는 산화·환원 반응식을 쓰며, 산업 현장에서 활용되는 전기 분해의 다양한 예를 조사하여 발표하고, 금속 제품 표면에 도금하는 실험을 수행하여 결과를 전기 분해로 해석할 수 있다.","B":"전기 분해의 원리를 산화·환원 반응으로 설명하고, 산업 현장에서 활용되는 전기 분해의 다양한 예를 조사하며, 금속 제품 표면에 도금하는 실험을 수행할 수 있다.","C":"전기 분해를 할 때 양극과 음극에서 산화 반응과 환원 반응이 일어남을 설명하 고, 산업 현장에서 전기 분해가 활용되는 예를 조사하며, 제시된 절차에 따라 금속 제품 표면에 도금하는 실험을 수행할 수 있다.","D":"전기 분해를 할 때 산화된 물질과 환원된 물질을 알 고, 전 기 분해를 이 용 하 여 금속 제품 표면을 도금할 수 있음을 말할 수 있다.","E":"물질을 전기 분해할 때 산 화·환원 반응이 일어남을 말할 수 있다."},"12반응02-05":{"A":"생명 현상 및 화학 전지에서 이용되는 다양한 산화·환원 반응과 그 반응에 이용된 물질의 역할을 조사하고 발표하여 화학의 신비로움을 느끼고, 지속가 능한 발전을 위한 미래 전지에 요구되는 특성을 이해하여 미래 전지를 설계할 수 있다.","B":"생명 현상 및 화학 전지에서 이용되는 다양한 산화·환원 반응과 그 반응에 이용된 물질의 역할을 조사하여 화학의 신비로움을 느끼고, 지속가능한 발전 을 위한 미래 전지에 요구되는 특성을 제안할 수 있다.","C":"생명 현상 및 화학 전지에서 이용되는 산화·환원 반응과 그 반응에 이용된 물질의 역할을 조사하여 화학의 신비로움을 느끼고, 지속가능한 발전을 위한 미래 전지에 요구되는 특성을 설명할 수 있다.","D":"생명 현상 및 화학 전지에서 이용되는 산화·환원 반응의 예와 지속가능한 발전 을 위한 미래 전지의 예를 조사하여 화학의 신비로움을 느낀다.","E":"생명 현상 및 화학 전지에서 다양한 산화·환원 반응이 일어나는 사례를 보고 화학에 관심을 가진다."}},"area":{"A":{"지식·이해":"전자의 이동과 산화수 변화로 산화·환원 반응을 이해하여 반쪽 반응식을 나타내 고, 이를 활용하여 산화·환원 반응식을 완성하며, 산화·환원 반응의 동시성과 산 화·환원 반응에서 산화제와 환원제는 상대적 세기에 의해 결정되는 것을 설명할 수 있다. 화학 전지의 발전 과정을 조사하여 실용 전지의 구조적 공통점을 추론하고, 화학 전지에서 전극 반응을 산화·환원 반응식으로 나타내며, 화학 에너지가 전기 에너 지로 전환되는 원리를 산화·환원 반응을 통해 설명하고, 표준 환원 전위의 의미를 이해하여 화학 전지의 전위차를 구할 수 있다. 전기 분해의 원리를 산화·환원 반응으로 설명하고, 전기 분해를 할 때 전극에서 일어나는 산 화·환원 반응식을 쓸 수 있다.","과정·기능":"금속판과 전해질을 이용한 전지를 구성하고 효율적인 전지의 조건을 탐색하는 실험을 수행하여 결론을 내리며, 금속 제품 표면에 도금하는 실험을 수행하여 결과를 전기 분해로 해석할 수 있다.","가치·태도":"산업 현장에서 활용되는 전기 분해의 다양한 예와 생명 현상 및 화학 전지에서 이용되는 다양한 산화·환원 반응과 그 반응에 이용된 물질의 역할을 조사하고 발표하여 화학의 신비로움을 느끼고, 지속가능한 발전을 위한 미래 전지에 요구되 는 특성을 이해하여 미래 전지를 설계할 수 있다."},"B":{"지식·이해":"전자의 이동과 산화수 변화로 산화·환원 반응을 이해하여 반쪽 반응식을 나타내 고, 이를 활용하여 산화·환원 반응식을 완성할 수 있다. 화학 전지의 발전 과정을 조사하여 실용 전지의 구조적 공통점을 설명하고, 화학 전지에서 전극 반응을 산화·환원 반응식으로 나타내며, 화학 에너지가 전기 에너 지로 전환되는 원리를 산화·환원 반응을 통해 설명할 수 있다. 전기 분해의 원리를 산 화·환원 반응으로 설명할 수 있다.","과정·기능":"금속판과 전해질을 이용한 전지를 구성하고 효율적인 전지의 조건을 탐색하는 실험을 수행하여 결과를 해석하며, 금속 제품 표면에 도금하는 실험을 수행할 수 있다.","가치·태도":"산업 현장에서 활용되는 전기 분해의 다양한 예와 생명 현상 및 화학 전지에서 이용되는 다양한 산화·환원 반응과 그 반응에 이용된 물질의 역할을 조사하여 화학의 신비로움을 느끼고, 지속가능한 발전을 위한 미래 전지에 요구되는 특성을 제안할 수 있다."},"C":{"지식·이해":"산화·환원 반응에서 산화수 변화로 산화되는 물질과 환원되는 물질을 구분할 수 있다. 실용 전지의 구조적 공통점을 이해하고, 화학 전지에서 전극 반응을 산화·환원 반응식으로 나타낼 수 있다. 전기 분해를 할 때 양극과 음극에서 산화 반응과 환원 반응이 일어남을 설명할 수 있다.","과정·기능":"금속판과 전해질을 이용한 전지를 구성하여 효율적인 전지의 조건을 탐색하는 실험을 수행하고, 제시된 절차에 따라 금속 제품 표면에 도금하는 실험을 수행할 수 있다.","가치·태도":"산업 현장에서 전기 분해가 활용되는 예와 생명 현상 및 화학 전지에서 이용되는 산화·환원 반응과 그 반응에 이용된 물질의 역할을 조사하여 화학의 신비로움을 느끼고, 지속가능한 발전을 위한 미래 전지에 요구되는 특성을 설명할 수 있다."},"D":{"지식·이해":"화학 반응에서 반응물과 생성물의 산화수를 구할 수 있다. 실용 전지의 구조적 공통점을 알고, 화학 전지에서 산화·환원 반응이 일어남을 알며, 전기 분해를 할 때 산화된 물질과 환원된 물질을 말할 수 있다.","과정·기능":"금속판과 전해질을 이용하여 전지를 구성하고, 전기 분해를 이용하여 금속 제품 표면을 도금할 수 있음을 말할 수 있다.","가치·태도":"생명 현상 및 화학 전지에서 이용되는 산화·환원 반응의 예와 지속가능한 발전을 위한 미래 전지의 예를 조사하여 화학의 신비로움을 느낀다."},"E":{"지식·이해":"산화·환원 반응에서 전자가 이동함을 알고, 화학 전지에서 전자의 이동이 일어남 관찰하며, 관찰 결과 를 분석하여 탄수화물과 지질의 특징을 설명하고 공유함으로써 생물체 구성 물질의 신비로움을 인식한다.","B":"생물체를 구성하는 탄수화물과 지질의 종류와 주요 기능을 이해하고, 주변 생물 재료로부터 현미경을 활용하여 탄수화물과 지질을 관찰하며, 관찰 결과 를 분석하여 발표하는 과정에서 생명체 구성 물질에 대해 흥미와 관심을 가진다.","C":"생물체를 구성하는 탄수화물과 지질의 종류와 주요 기능을 이해하고, 주변 생물 재료로부터 탄수화물과 지질을 관찰하는 과정을 통해 생물체 구성 물질 에 관심을 가진다.","D":"생물체를 구성하는 탄수화물과 지질의 종류와 주요 기능을 말할 수 있다.","E":"생물체를 구성하는 물질 중 탄수화물과 지질을 구분할 수 있다."},"12세포01-02":{"A":"생물체를 구성하는 핵산과 단백질의 특징을 이해하고, 핵산과 단백질의 모형 제작하기 탐구 활동에서 만들어진 모형을 이용하여 두 물질의 특징을 설명하 며, 핵산과 단백질의 기본 구조와 세포에서의 주요 기능을 조사하여 수집된 자료를 비교하고 분석하는 과정을 통해 생물체 구성 물질의 신비로움을 인식 한다.","B":"생물체를 구성하는 핵산과 단백질의 특징을 이해하고, 핵산과 단백질의 특징 을 설명하기 위한 모형을 만들 수 있으며, 핵산과 단백질의 기본 구조와 세포 에서의 주요 기능에 대해 조사하여 설명하는 과정에서 생물체 구성 물질에 흥미와 관심을 가진다.","C":"생물체를 구성하는 핵산과 단백질의 기본 구조와 세포에서의 주요 기능을 조 사하여 설명하는 과정을 통해 생물체 구성 물질에 흥미를 가진다.","D":"생물체를 구성하는 핵산과 단백질의 기본 구조와 세포에서의 기능을 말할 수 있다.","E":"생물체를 구성하는 물질 중 핵산과 단백질을 구분할 수 있다."},"12세포01-03":{"A":"세포 소기관의 구조와 기능을 알아내기 위한 연구 방법인 현미경 이용, 세포 분획법, 자기 방사법 등의 특징을 이해하고, 현미경을 이용하여 세포의 크기를 측정하고, 간이 원심분리기구를 제작하는 탐구활동에 참여하여 탐구활동에 적 용된 원리나 결론을 일상생활에 적용하여 설명하며, 동물세포와 식물세포를 구성하는 세포 소기관의 구조와 기능에 대한 이해를 바탕으로 세포 소기관의 유기적 관계를 세포에서 일어나는 물질의 합성과 분비를 중심으로 추론하는 과정을 통해 생명 현상의 신비로움을 인식한다.","B":"세포 소기관의 구조와 기능을 알아내기 위한 연구 방법인 현미경 이용, 세포 분획법 등의 특징을 이해하고, 현미경을 이용하여 세포의 크기를 측정하고, 간이 원심분리기구를 제작하는 탐구활동에 참여하여 탐구 결과를 해석하여 결론을 도출하며, 동물세포와 식물세포를 구성하는 세포 소기관의 구조와 기 능에 대한 이해를 바탕으로 세포 소기관의 유기적 관계를 세포에서 일어나는 물질의 합성과 분비를 중심으로 설명하는 과정을 통해 생명 현상에 대한 흥미 와 호기심을 가진다.","C":"동물세포와 식물세포를 구성하는 세포 소기관의 구조와 기능을 이해하고, 세포 소기관의 유기적 관계에 대해 말하는 과정을 통해 생명 현상에 흥미를 가진다.","D":"동물세포와 식물세포를 구성하는 세포 소기관의 구조와 기능을 말할 수 있다.","E":"동물세포와 식물세포를 구성하는 세포 소기관을 말할 수 있다."},"12세포01-04":{"A":"세포는 특징에 따라 원핵세포와 진핵세포로 구분됨을 이해하고, 원핵세포와 진핵세포의 공통점과 차이점을 DNA, 세포 내 막 구조, 리보솜, 세포벽 등의 유무와 특징을 중심으로 설명하는 과정에서 발산적인 사고로 다각적인 접근을 시도한다.","B":"세포는 특징에 따라 원핵세포와 진핵세포로 구분됨을 이해하고, 원핵세포와 진핵세포의 공통점과 차이점에 대하여 세포를 구성하는 물질의 특징 및 세포 내 막 구조의 유무를 중심으로 설명하는 과정에서 다각적인 접근을 시도한다.","C":"세포는 특징에 따라 원핵세포와 진핵세포로 구분됨을 알고, 원핵세포와 진핵 세포의 공통점과 차이점을 설명하는 과정에서 세포에 대해 흥미를 가진다.","D":"세포를 원핵세포와 진핵세포로 구분할 수 있는 특징을 말할 수 있다.","E":"세포는 특징에 따라 원핵세포와 진핵세포로 구분됨을 말할 수 있다."},"12세포01-05":{"A":"세포막의 구조와 특성을 이해하고, 세포에서 삼투현상 관찰하기 탐구 활동에 서 수집된 자료를 표나 그래프 등 알맞은 형태로 변환하여 해석하며, 세포막을 통한 물질 수송 과정을 추론하여 협력적으로 소통하는 과정을 통해 세포의 신비로움을 인식한다.","B":"세포막의 구조와 특성을 이해하고, 세포에서 삼투현상 관찰하기 탐구 활동에 서 수집된 자료를 표나 그래프 등 알맞은 형태로 변환하며, 세포막을 통한 물질 수송 과정을 추론하여 설명하는 과정을 통해 세포에 흥미와 호기심을 가진다.","C":"세포막의 구조와 특성을 이해하고, 세포막을 통한 다양한 물질의 수송 과정을 추론하는 과정에서 세포에 호기심을 가진다.","D":"세포막의 인지질 2중층 구조와 특성을 말할 수 있다.","E":"세포막의 인지질 2중층 구조를 말할 수 있다."}},"area":{"A":{"지식·이해":"생물체를 구성하는 물질 중 탄수화물과 지질의 종류와 기능 및 핵산과 단백질의 구조와 기능을 이해하고, 생명체를 구성하는 기본단위인 세포 중 원핵세포와 진핵 세포의 공통점과 차이점을 DNA, 세포 내 막 구조, 리보솜, 세포벽을 중심으로 구 분 하 여 설명할 수 있 다. 진핵세포 중 동물세포와 식물세포를 구성하는 세포 소기관의 구조와 기능에 대한 이해를 바탕으로 세포 소기관들의 유기적 관계를 추론하여 설명하고, 세포 소기관 의 구조와 기능을 연구하는 방법인 현미경 이용, 세포 분획법, 자기 방사법 등의 원리와 특징을 설명할 수 있다. 세포막은 인지질 2중층 구조를 갖고 인지질과 단백질로 구성됨을 이해하고, 세포 막의 유동성 및 선택적 투과성에 대한 이해를 바탕으로 세포막을 통한 물질 수송 과 정 의 종류와 특징을 구분하여 설명할 수 있 다.","과정·기능":"현미경을 활용하여 주변 생물 재료로부터 탄수화물과 지질을 관찰한 자료를 비교 분석하고, 핵산과 단백질의 기본 구조와 세포에서의 주요 기능을 조사하여 발표하 는 과정에서 자신의 생각과 주장을 과학적 언어를 사용하여 다양한 방식으로 표현 하고 공유하며, 핵산과 단백질의 모형 제작하기 활동을 통해 만들어진 모형을 통해 생명 현상을 설명하거나 예측할 수 있다. 현미경을 이용한 세포의 크기 측정하기와 간이 원심분리기구 제작하기에서 탐구 를 설계하고 수행하며, 동물세포와 식물세포를 구성하는 세포 소기관의 구조와 기능에 대한 이해를 바탕으로 세포에서 일어나는 물질의 합성과 분비 과정에서 세포 소기관들의 유기적 관계를 추론하여 협력적으로 소통하고, 공유할 수 있다. 세포의 삼투현상 관찰하기에서 변인의 특성을 고려하여 탐구를 설계하고 수행하 며, 세포막을 통한 여러 종류의 물질 수송 과정을 추론하여 발표할 수 있다.","가치·태도":"생물 재료를 탐구 활동에 이용할 때 윤리적 측면을 고려해야 함을 인식하고, 탐구 활동에서 고려해야 하는 윤리적 측면을 판단하여 실천하며, 핵산과 단백질의 모형 제작하기 활동에서 만들어진 모형을 통해 생명체를 구성하는 물질의 정교성과 신비로움을 인식한다. 현미경을 이용한 세포의 크기 측정하기와 간이 원심분리기구 제작하기에 적용된 과학의 원리가 일상생활의 문제해결에 활용될 수 있음을 인식하여, 일상생활의 문제를 과학의 원리로 이해하고 해결하려는 태도를 가진다. 세포에서 물질이 분비되는 과정에서 세포 소기관의 유기적 관계를 추론할 때 발산 적인 사고로 다각적인 접근을 시도하고, 세포의 삼투현상 관찰하기에서 독창적인 아이디어를 바탕으로 탐구를 설계하며, 탐구를 통해 궁금증을 해소하려는 태도를 가진다."},"B":{"지식·이해":"생물체를 구성하는 물질 중 탄수화물과 지질의 종류와 기능 및 핵산과 단백질의 구조와 기능을 이해하고, 생명체를 구성하는 세포 중 원핵세포와 진핵세포의 공통 점과 차이점에 대해 DNA, 세포 내 막 구조, 리보솜, 세포벽을 중심으로 말할 수 있다. 동물세포와 식물세포를 구성하는 세포 소기관의 세포 소기관의 유기적 관계를 이해하고, 세포 소기관의 구조와 기능을 연구하는 방법인 현미경 이용, 세포 분획 법, 자기 방사법 등의 원리와 특징을 설명할 수 있다. 세포막의 인지질 2중층 구조와 특징에 대한 이해를 바탕으로 세포막의 유동성 및 선택적 투과성을 이해하고, 세포막을 통한 물질 수송 과정의 종류와 특징을 설명할 수 있다.","과정·기능":"주변 생물 재료로부터 현미경을 통한 탄수화물과 지질의 관찰 자료를 수집하고, 핵산과 단백질의 기본 구조와 세포에서의 주요 기능을 조사하여 발표하는 과정에 서 자신의 생각과 주장을 표현하고 공유하며, 핵산과 단백질의 모형 제작하기 활동에 참여하여 모형을 만들 수 있다. 현미경을 이용한 세포의 크기 측정하기와 간이 원심분리기구 제작하기에서 탐구 에 영향을 미치는 요인을 이해하며, 세포 소기관의 구조와 기능에 대한 이해를 바탕으로 진핵세포에서 일어나는 물질의 합성과 분비 과정에서 세포 소기관들의 유기적 관계에 대해 추론하고, 과학적 언어를 사용하여 과학적 주장을 말할 수 있다. 세포의 삼투현상 관찰하기에서 탐구의 다양한 변인을 고려하여 탐구를 설계하여 수행하고, 세포막을 통한 여러 종류의 물질 수송 과정을 비교하여 말할 수 있다.","가치·태도":"생물 재료를 이용한 탐구 활동에서 고려해야 하는 윤리적 측면을 판단하여 실천하 고, 핵산과 단백질의 모형 제작하기 활동에서 과학에 대한 흥미와 호기심을 가진다. 현미경을 이용한 세포의 크기 측정하기와 간이 원심분리기구 제작하기에 적용된 과학의 원리가 일상생활의 문제해결에 활용될 수 있음을 인식한다. 세포에서 물질이 분비되는 과정에서 세포 소기관의 유기적 관계를 추론할 때 다각 적인 접근을 시도하고, 세포의 삼투현상 관찰하기에서 탐구 설계 및 수행을 통해 궁금증을 해소하려는 태도를 가진다."},"C":{"지식·이해":"생물체를 구성하는 물질 중 탄수화물, 지질, 핵산, 단백질의 구조와 기능을 이해하 고, 생명체를 구성하는 기본단위인 세포 중 원핵세포와 진핵세포의 공통점과 차이 점을 말할 수 있다. 동물세포와 식물세포를 구성하는 세포 소기관의 구조와 기능에 대한 이해를 바탕 으로 세포 소기관들의 유기적 관계를 이해하고, 세포 소기관을 연구하는 방법 중 현미경 이용, 세포 분획법, 자기 방사법의 특징을 말할 수 있다. 세포막의 인지질 2중층 구조와 특징을 이해하고, 세포막을 통한 물질 수송 과정의 종류와 특징을 설명할 수 있다.","과정·기능":"주변 생물 재료로부터 현미경을 통해 탄수화물과 지질을 관찰한 자료를 수집하고, 핵산과 단백질의 기본 구조와 세포에서의 주요 기능을 조사하여 발표하는 과정에 서 자신의 생각과 주장을 말하며, 핵산과 단백질 모형을 설명할 수 있다. 현미경을 이용한 세포의 크기 측정하기와 간이 원심분리기구 제작하기에서 주어 진 절차대로 탐구를 수행하며, 세포 소기관의 구조와 기능에 대한 이해를 바탕으 로 세포 소기관들의 유기적 관계에 대해 과학적 주장을 말할 수 있다. 세포의 삼투현상 관찰하기에서 탐구의 다양한 변인을 고려하여 수행하고, 결론을 도출할 수 있다.","가치·태도":"생물 재료를 이용한 탐구 활동에서 고려해야 하는 윤리적 측면을 파악하고, 핵산 과 단백질의 모형 제작을 통해 과학에 대한 흥미와 호기심을 가진다. 현미경을 이용한 세포의 크기 측정하기와 간이 원심분리기구 제작하기에 적용된 과학의 원리가 일상생활의 문제해결에 활용됨을 인식한다. 세포 소기관의 유기적 관계를 이해할 때 다각적인 시각에서 접근하고, 세포의 삼투현상 관찰하기에서 탐구를 통해 궁금증을 해소하려는 태도를 가진다."},"D":{"지식·이해":"생물체를 구성하는 물질 중 탄수화물, 지질, 핵산, 단백질의 특징을 알고, 생명체 를 구성하는 기본 단위인 세포 중 원핵세포와 진핵세포의 공통점과 차이점을 제시 할 수 있다. 진핵세포 중 동물세포와 식물세포를 구성하는 세포 소기관의 구조와 기능에 대한 이해를 바탕으로 세포 소기관의 유기적 관계를 말하고, 세포 소기관을 연구하는 방법의 종류를 말할 수 있다. 세포막의 구조와 특성에 대한 이해를 바탕으로 세포막을 통한 물질 수송 과정을 말 할 수 있 다.","과정·기능":"주변 생물 재료로부터 현미경을 활용하여 탄수화물과 지질을 관찰하고, 핵산과 단백질의 기본 구조와 기능을 조사하여 발표하는 과정에서 자신의 생각을 말하며, 핵산과 단백질의 모형을 만들 수 있다. 현미경을 이용한 세포의 크기 측정하기와 간이 원심분리기구 제작하기를 순서에 따라 수행하고, 세포 소기관에 대한 이해를 바탕으로 세포 소기관들의 유기적 관계에 대해 말할 수 있다. 세포의 삼투현상 관찰하기에서 탐구에 영향을 미치는 다양한 변인을 제시할 수 있다.","가치·태도":"생물 재료를 이용한 탐구 활동에서 고려해야 하는 윤리적 측면이 있음을 인식하 고, 현미경을 이용한 세포의 크기 측정하기와 간이 원심분리기구 제작하기에 적용 된 과학의 원리가 일상생활의 문제해결에 활용됨을 인식한다. 세포의 삼투현상 관찰하기에서 과학을 통해 궁금증을 해소하려는 태도를 가진다."},"E":{"지식·이해":"생물체를 구성하는 물질에는 탄수화물, 지질, 핵산, 단백질이 있음을 알고, 생명체 를 구성하는 기본 단위인 세포 중 원핵세포와 진핵세포의 특징을 말할 수 있다. 진핵세포를 구성하는 세포 소기관은 유기적 관계를 맺고 있음을 이해하고, 세포막 을 통한 물질 수송 방법에는 다양한 종류가 있음을 말할 수 있다.","과정·기능":"주변 생물 재료와 현미경을 활용하여 탄수화물과 지질을 찾을 수 있고, 핵산과 단백질의 특징을 조사할 수 있다. 현미경을 이용한 세포의 크기 측정하기와 간이 원심분리기구 제작하기를 순서에 따라 수행할 수 있다. 세포에서 삼투현상 관찰하기에서 탐구를 설계할 수 있다.","가치·태도":"세포의 구조와 특징에 대한 이해와 세포를 연구하는 다양한 방법이 있음을 인식하 고, 과학에 관심을 가진다."}}},"세포-02":{"codes":{"12세포02-01":{"A":"물질대사는 생명체 내에서 일어나는 효소를 이용한 화학 반응임을 이해하고, 1일 칼로리 섭취량과 소비량을 조사하여 비교하기 탐구 활동에서 수집된 자료 를 시각화하고 분석하며, 변환한 자료를 통해 물질대사 과정에서 에너지가 출입함을 추론함으로써 물질대사 과정의 신비로움을 인식한다.","B":"물질대사를 효소를 이용한 화학 반응으로 설명하고, 1일 칼로리 섭취량과 소 비량을 조사하여 비교하며, 물질대사 과정에서 에너지가 출입한다는 사실에 흥미와 호기심을 가진다.","C":"에너지 섭취와 소비 과정에서 물질대사가 일어남을 이해하고 균형 있는 에너 지 섭취의 중요성을 인식한다.","D":"물질대사 과정에서 에너지가 출입한다는 사실을 말할 수 있다.","E":"물질대사가 생명체 내에서 일어나는 화학 반응임을 말할 수 있다."},"12세포02-02":{"A":"생명 활동에 필요한 에너지를 공급하는 과정에서 광합성과 세포호흡, ATP의 역할을 이해하고, 발아 중인 콩의 물질대사와 에너지대사 탐구하기 활동에서 수집된 자료를 비교하고 분석하여 콩에서 일어나는 물질대사를 설명하는 탐구 를 통해 궁금증을 해소하려는 태도를 지닌다.","B":"생명 활동에 필요한 에너지를 공급하는 과정에서 광합성과 세포호흡의 역할을 이해하고, 발아 중인 콩에서 일어나는 세포호흡을 설명하는 과정에서 광합성 과 세포호흡에 흥미와 호기심을 가진다.","C":"생명 활동에 필요한 에너지를 공급하는 과정에서 세포호흡과 광합성의 역할을 구분하고, 세포호흡과 광합성에 흥미를 가진다.","D":"세포호흡과 광합성이 생명 활동에 필요한 에너지를 공급하는 과정임을 이해하 고, 발아 중인 콩에서 세포호흡이 일어남을 말할 수 있다.","E":"세포호흡과 광합성은 생명 활동에 필요한 에너지를 공급하는 과정임을 말할 수 있다."},"12세포02-03":{"A":"효소의 종류를 기능에 따라 구분하고, 효소의 특성을 단백질의 특성을 통해 추론하며, 효소의 활성에 영향을 미치는 요인에 대한 실험을 설계하는 데 변인 의 특성을 고려하여 탐구 수행 과정에서 궁금증을 해소하려는 태도를 지닌다.","B":"효소의 종류를 기능에 따라 구분하여 이해하고, 효소의 활성에 영향을 미치는 요인에 대한 변인과 실험 결과를 분석하여 효소의 특성을 설명하는 과정에서 효소의 종류와 기능에 흥미와 호기심을 가진다.","C":"효소의 종류와 기능을 설명하고, 효소의 종류와 기능에 흥미를 가진다.","D":"효소의 종류와 특성을 설명할 수 있다.","E":"효소의 종류를 나열할 수 있다."},"12세포02-04":{"A":"효소의 작용 기작을 효소 기질 복합체의 형성을 토대로 추론하고, 효소 작용의 중요성에 대한 토론을 하는 과정에서 발산적 사고로 다각적인 접근을 시도하 며, 효소의 작용을 다양한 방식으로 표현하고 공유한다.","B":"효소의 작용 기작을 이해하고, 효소 작용의 중요성을 설명하는 자료를 조사하 여 공유하는 과정에서 효소의 작용 기작에 흥미와 호기심을 가진다.","C":"효소의 작용 기작과 효소 작용의 중요성을 설명하고, 효소의 중요성을 인식한다.","D":"효소 기질 복합체의 형성 과정을 설명할 수 있다.","E":"효소 기질 복합체의 의미를 말할 수 있다."},"12세포02-05":{"A":"효소가 우리 생활이나 산업에 다양하게 이용됨을 알고, 효소 이용 사례를 조사 하여 발표하는 과정에서 수집된 자료를 비교, 분석하며, 효소 활용의 유용성에 대해 과학적인 언어로 말할 수 있다.","B":"효소가 우리 생활이나 산업에 이용되는 사례를 조사하여 발표 자료를 제작하 는 과정에서 다각적인 접근을 시도하며 효소에 대한 흥미와 호기심을 가진다.","C":"효소가 우리 생활이나 산업에 이용되는 사례를 조사하고, 효소에 대한 흥미를 가진다.","D":"효소가 우리 생활에 이용되는 사례 을 조사할 수 있 다.","E":"효소가 우리 생활에 이용됨을 말할 수 있다."}},"area":{"A":{"지식·이해":"물질대사는 생명체 내에서 일어나는 화학 반응임을 이해하고, 물질대사를 통해 생명 활동에 필요한 에너지를 공급하는 과정에서 세포호흡, 광합성, ATP의 역할 을 설명할 수 있다. 물질대사에 효소가 필요함을 이해하고, 효소의 종류를 기능에 따라 구분하며, 효 소의 특성과 작용 기작을 효소의 구성 성분인 단백질의 특성을 통해 추론할 수 있다.","과정·기능":"1일 칼로리 섭취량과 소비량을 조사하여 수집된 자료를 다양한 형태로 표현하고, 이를 통해 물질대사 과정에서 에너지가 출입함을 설명하며, 발아 중인 콩의 물질 대사와 에너지대사 탐구하기 활동을 수행하고, 실험 결과를 분석하여 콩에서 일어 나는 물질대사를 설명하는 자료를 제작할 수 있다. 효소의 활성에 영향을 미치는 요인에 대한 실험을 변인의 특성을 고려하여 설계하 고 수행하며, 결과를 해석하고 결론을 도출하여 공유할 수 있다. 효소의 작용 기작과 효소가 우리 생활이나 산업에 이용되는 사례를 조사하여 발표 자료를 제작하고 공유할 수 있다.","가치·태도":"에너지 섭취와 소비 과정에서 물질대사가 일어남을 이해하고 균형있는 에너지 섭취의 중요성을 인식하고 실천한다. 세포호흡과 광합성 등의 물질대사를 통해 생명 활동에 필요한 에너지를 얻는 과정 에 흥미와 호기심을 가진다. 탐구 활동을 통해 발아 중인 콩의 구성 성분을 알아내는 활동에서 탐구를 통한 문제해결 활동의 즐거움을 체험하며, 효소가 우리 생활에 이용되는 사례를 조사하 고, 과학기술이 인류의 삶에 긍정적인 기여를 한다는 사실을 인식한다."},"B":{"지식·이해":"물질대사의 의미를 이해하고, 물질대사를 통해 생명 활동에 필요한 에너지를 공급 하는 과정에서 세포호흡, 광합성 등의 물질대사가 일어남을 이해한다. 효소가 물질대사를 촉진함을 이해하고, 효소의 종류를 구분하며, 효소의 특성과 작용 기작을 효소의 구성 성분인 단백질의 특성을 이용해 설명할 수 있다.","과정·기능":"1일 칼로리 섭취량과 소비량을 조사하여 그래프로 표현하고, 물질대사 과정에서 에너지가 출입함을 말할 수 있다. 발아 중인 콩의 물질대사와 에너지대사 탐구하기 활동을 수행하고, 실험 결과를 도 출 하 고 해석할 수 있 다. 효소의 활성에 영향을 미치는 요인에 대한 실험을 수행하여 결과를 분석하고 결론 을 도출하며, 효소가 우리 생활이나 산업에 이용되는 사례를 조사하여 일상 생활 에 활용할 수 있다.","가치·태도":"균형있는 에너지 섭취의 중요성을 인식하고, 에너지 섭취 불균형으로 인한 문제점 을 파악하며, 물질대사 과정에서 에너지가 출입한다는 사실에 흥미와 호기심을 가진다. 발아 중인 콩의 구성 성분을 알아내는 탐구를 수행하고 탐구를 통해 궁금증을 해소하려는 태도를 가진다. 효소를 우리 생활에 이용하는 사례를 확인하고, 과학 지식이 일상생활의 문제해결 에 활용됨을 인식한다."},"C":{"지식·이해":"물질대사를 통해 생명 활동에 필요한 에너지를 공급하는 과정에서 세포호흡과 광합성이 일어남을 말할 수 있다. 효소의 기능을 이해하고, 효소의 종류와 특성을 말할 수 있으며, 효소의 작용 기작 을 말할 수 있다.","과정·기능":"1일 칼로리 섭취량과 소비량 그래프를 해석할 수 있다. 발아 중인 콩의 물질대사와 에너지대사 탐구하기 활동을 수행하고 결과를 도출할 수 있다. 효소의 활성에 영향을 미치는 요인을 조사하여 발표 자료를 제작하고, 일상생활 에서 효소를 이용한 제품이나 기술을 찾을 수 있다.","가치·태도":"균형있는 에너지 섭취의 필요성을 인식한다. 발아 중인 콩의 구성 성분을 알아내는 탐구를 수행하고 콩의 발아와 같은 자연현 상에 흥미와 호기심을 가진다."},"D":{"지식·이해":"세포호흡과 광합성이 물질대사임을 말하고, 이 과정에 효소가 필요함을 말할 수 있다. 효소에는 여러 종류가 있음을 말하고, 효소의 작용에 온도와 pH 등이 영향을 미친다는 사실을 말할 수 있다.","과정·기능":"발아 중인 콩의 물질대사와 에너지대사 탐구하기 활동을 수행할 수 있다. 효소의 활성에 영향을 미치는 요인을 조사할 수 있다.","가치·태도":"균형있는 에너지 섭취를 실천한다. 우리 생활에 효소를 이용하는 사례를 통해 과학 지식이 일상생활의 문제해결에 활용됨을 인식한다."},"E":{"지식·이해":"물질대사가 생명체 내에서 일어나는 화학 반응임을 말할 수 있다. 효소의 종류를 말할 수 있고, 효소의 주성분이 단백질임을 말할 수 있다.","과정·기능":"발아 중인 콩의 물질대사와 에너지대사 탐구하기 활동에서 주어진 역할을 수행할 수 있다. 효소를 이용한 제품을 소개하는 자료를 제작할 수 있다.","가치·태도":"효소가 우리 생활에 이용되는 사례 에 흥미와 호기심을 가 진 다."}}},"세포-03":{"codes":{"12세포03-01":{"A":"미토콘드리아 내부구조 모형 제작하기 활동을 통해 미토콘드리아의 구조를 이해하고, 미토콘드리아의 구조와 기능을 생명 활동에 필요한 에너지를 얻는 과정과 연관 지어 추론하는 과정에서 생명체 구성의 신비로움을 인식한다.","B":"미토콘드리아 내부구조 모형 제작하기 활동을 통해 미토콘드리아의 구조를 이해하고, 생명체 내에서 미토콘드리아의 기능을 구조와 관련하여 추론하며 생명체를 구성하는 구조에 흥미와 호기심을 가진다.","C":"미토콘드리아 내부구조 모형을 제작하고, 미토콘드리아의 구조와 기능을 연결 하여 설명할 수 있다.","D":"미토콘드리아의 내부구조 모형을 제작하고, 미토콘드리아의 기능을 설명할 수 있다.","E":"미토콘드리아의 구조와 기능을 말할 수 있다."},"12세포03-02":{"A":"세포호흡 과정을 해당, 피루브산의 산화 및 TCA 회로, 산화적 인산화 과정으 로 구분하여 이해하고, 세포호흡 과정의 단계별 특징에 대한 자료를 다양한 매체를 활용하여 제작하며, 협력적으로 소통하여 발표하는 과정에서 세포호흡 을 통한 생명 현상 유지 과정의 신비로움을 인식한다.","B":"세포호흡 과정의 단계를 알고, 단계별 특징을 구분하는 발표 자료를 제작하는 과정에서 협력적으로 소통하며, 세포호흡을 통한 생명 현상 유지 과정에 흥미 와 호기심을 가진다.","C":"세포호흡 과정의 단계별 특징을 다양한 매체를 활용하여 나타내고, 세포호흡 을 통한 생명 현상 유지에 흥미를 가진다.","D":"세포호흡 과정의 여러 단계에서 에너지가 생성됨을 말할 수 있다.","E":"세포호흡으로 에너지가 생성됨을 말할 수 있다."},"12세포03-03":{"A":"세포호흡 과정에서의 인산화 과정을 기질 수준의 인산화와 산화적 인산화 과 정으로 구분하여 설명하고, 기질수준과 화학 삼투에 의한 ATP의 생성을 비교 하며 설명하는 과정에서 발산적 사고 로 다각적인 접근을 시 도 한 다.","B":"세포호흡 과정에서의 인산화 과정을 특징에 따라 기질 수준의 인산화와 산화 적 인산화로 구분하고, ATP가 생성되는 과정을 설명하는 과정에서 세포호흡에 대한 흥미와 호기심을 가진다.","C":"세포호흡 과정에서의 인산화 과정을 기질 수준의 인산화와 산화적 인산화로 구분하고, 세포호흡 과정을 통해 에너지를 얻는 과정을 이해하며, 세포호흡에 대해 흥미를 가진다.","D":"세포호흡 과정에서의 인산화 과정에는 기질 수준의 인산화와 산화적 인산화 과정이 있음을 말할 수 있다.","E":"세포호흡 과정에서 인산화 과정이 있음을 말할 수 있다."},"12세포03-04":{"A":"산소호흡과 발효의 공통점과 차이점을 에너지 생성과 소비의 관점에서 이해하 고, 다양한 변인을 고려하여 발효 실험을 설계 및 수행하며, 다양한 매체를 활용하여 실생활에서 발효를 이용한 사례를 조사하는 과정에서 과학의 유용성 을 인식한다.","B":"산소호흡과 발효의 공통점과 차이점을 이해하고, 발효 실험을 설계하여 수행 하며, 실생활에서 발효를 이용한 사례를 조사하는 과정에서 과학적 사실의 활 용에 흥미와 호기심을 가진다.","C":"산소호흡과 발효의 공통점과 차이점을 알고, 발효 실험을 수행하며, 실생활 속에서 발효를 이용한 사례에 대해 말하는 과정에서 과학적 사실의 활용에 흥미를 가진다.","D":"산소호흡과 발효의 공통점과 차이점을 말할 수 있다.","E":"실생활에서 발효에서 에너지가 생성됨을 말할 수 있다."},"12세포03-05":{"A":"엽록체 내부구조 모형 제작하기 활동을 통해 엽록체의 구조를 이해하고, 엽록 체 구조와 기능을 효소를 활용한 에너지 생성 과정과 연관 지어 추론하고, 크로마토그래피로 광합성 색소를 분리는 과정에서 생명체 구성의 신비로움을 인식한다.","B":"엽록체 내부구조 모형 제작하기 활동을 통해 엽록체의 구조와 기능을 효소를 활용한 에너지 생성 과정과 관련지어 설명하고, 크로마토그래피로 광합성 색 소를 분리는 과정에서 엽록체의 종류와 역할에 흥미와 호기심을 가진다.","C":"엽록체 내부구조 모형을 제작하고, 엽록체의 구조와 기능을 연결하여 설명할 수 있다.","D":"엽록체의 내부구조 모형을 제작하고, 엽록체의 기능을 설명할 수 있다.","E":"엽록체의 구조와 기능을 말할 수 있다."},"12세포03-06":{"A":"광합성의 명반응과 탄소 고정반응을 단계별로 구분하여 특징을 이해하고, 명 반응과 탄소 고정반응의 특징을 바탕으로 상호 관계를 추론하는 과정에서 생 명 현상의 신비로움을 인식한다.","B":"광합성의 명반응과 탄소 고정반응의 특징을 비교하여 광합성 과정의 주요 단 계를 설명하며, 명반응과 탄소 고정반응의 관계를 추론하는 과정에서 광합성 반응에 대한 흥미와 호기심을 가진다.","C":"광합성을 명반응과 탄소 고정반응으로 구분하고, 두 반응의 상호 관계를 말하 는 과정에서 광합성 반응에 대해 관심을 가진다.","D":"광합성에는 명반응과 탄소 고정반응이 있음을 알고, 각 반응의 반응물과 생성 물을 말할 수 있다.","E":"광합성에는 명반응과 탄소 고정반응이 있음을 말할 수 있다."},"12세포03-07":{"A":"광합성과 세포호흡의 전자 전달 과정에서 이루어지는 인산화 반응에 대하여 에너지, 효소, 산화ㆍ환원 반응을 중심으로 공통점과 차이점을 비교하고, 다양 한 방식과 매체를 활용하여 발표 자료를 제작 및 설명하는 과정에서 과학 이론 의 유용성을 신비로움을 인식한다.","B":"광합성과 세포호흡의 전자 전달 과정에서 이루어지는 인산화 반응을 비교하 고, 공통점과 차이점을 비교하여 발표하는 과정에서 다양한 방식과 매체를 활 용하여 시각화된 자료를 제작하여 설명할 수 있다.","C":"광합성과 세포호흡의 전자 전달 과정의 공통점과 차이점을 비교하여 자료를 제 작 하 고 설명할 수 있 다.","D":"광합성과 세포호흡의 전자 전달 과정의 공통점과 차이점을 설명할 수 있다.","E":"광합성과 세포호흡에서 공통적으로 ATP가 합성됨을 말할 수 있다."},"12세포03-08":{"A":"광합성 관련 주요 과학사적 연구 결과를 조사하여 과학자의 업적을 시대별로 구분하고, 조사한 자료를 비교, 분석하는 과정에서 협력적으로 소통하며 창의 적으로 시각화 자료를 제작하며, 과학사적 연구의 중요성을 인식한다.","B":"광합성 관련 주요 과학사적 연구 결과를 조사하여 과학자의 업적을 시대별로 구분하고, 조사한 자료를 협력적으로 소통하며 시각화 자료를 제작하는 과정 에서 과학사적 연구의 중요성을 인식한다.","C":"광합성 관련 주요 과학사적 연구 결과를 조사하여 시대별로 나열하고 과학사 연구에 대해 관심을 가진다.","D":"광합성 관련 주요 과학사적 연구 결과에 대해 조사할 수 있다.","E":"광합성 관련 과학사의 주요 연구 성과를 말할 수 있다."}},"area":{"A":{"지식·이해":"미토콘드리아의 구조와 기능을 이해하고, 미토콘드리아에서 유기물을 분해하여 생명 활동에 필요한 에너지를 얻는 세포호흡이 일어나며 에너지 전환이 일어나는 세포 소기관임을 설명하며, 해당 과정은 산소가 없이 이루어짐과 피루브산의 산화 와 TCA 회로에서는 탈수소 효소와 탈탄산 효소의 반응이 일어남, 산화적 인산화 과정에서 ATP를 합성하는 과정에 대해 설명하는데 있어 세포호흡 과정의 단계별 특징과 기질수준인산화와 산화적 인산화를 구분하고, 산소호흡과 발효의 공통점 과 차이점을 설명할 수 있다. 엽록체의 구조와 기능을 이해하고, 미토콘드리아와 엽록체의 구조와 기능과 비교 하여 설명할 수 있다. 명반응 과정에서 순환적 전자 흐름과 비순환적 전자 흐름으로 생성된 물질이 탄소 고정반응에 이용되는 각각의 단계별 특징을 이해하며, 광합성과 세포호흡의 전자 전달계를 비교하여 공통점과 차이점을 설명할 수 있다.","과정·기능":"미토콘드리아 모형 제작하기 활동을 통해 2중막, DNA, 리보솜이 있어 스스로 복제할 수 있다는 것을 표현하고, 세포호흡의 각 단계별 과정을 비교 분석하는 과정에서 생명체 내에서의 미토콘드리아의 기능을 추론하며, 발효 실험을 설계하 여 수행하고 발효 이용 사례에 대하여 조사 계획을 세워 조사할 수 있다. 크로마토그래피를 이용한 식물의 광합성색소를 추출하여 분리하는 실험을 통해 원리를 이해하고, 어두운 곳의 식물에 빛과 이산화 탄소 조건을 달리하여 공급하 면서 광합성속도를 측정하는 벤슨의 실험을 통해 명반응과 탄소 고정반응의 관계 를 표현하고, 광합성의 명반응에서 순환적 전자 흐름과 비순환적 전자 흐름에 의한 광인산화의 역할을 표현하며 소통할 수 있다. 광합성의 명반응과 탄소 고정반응의 상호 관계를 추론하며, 광합성 관련 과학사적 연구 결과에 대한 시각화 자료를 창의적으로 제작할 수 있다.","가치·태도":"세포내 미토콘드리아의 구조를 이해하고 미토콘드리아에서 생명 활동에 필요한 에너지를 얻는 세포호흡의 가치를 인식하며, 기질수준인산화와 산화적 인산화를 화학 삼투로 나타내는 모식도를 통해 과학의 유용성을 나타내고, 세포호흡 과정의 단계별 특징을 정리할 때 과학적으로 사고하며, 발효를 이용한 사례를 조사하는 과정에서 과학 이론의 유용성을 인식한다. 엽록체에 있는 광합성색소의 구성을 이해하고, 흡수 스펙트럼과 작용 스펙트럼이 유사하게 나타나는 것을 통해 광합성 효율에 대해 가치를 인식한다. 광합성색소 분리 실험 과정에서 과학 실험의 즐거움을 체험한다."},"B":{"지식·이해":"미토콘드리아의 구조와 기능을 이해하고, 미토콘드리아에서 유기물을 분해하여 생명 활동에 필요한 에너지를 얻는 세포호흡이 일어나며 에너지 전환이 일어나 는 세포 소기관임을 설명하며, 세포호흡 과정의 단계별 특징과 기질수준인산화 와 산화적 인산화를 구분하고, 산소호흡과 발효의 공통점과 차이점을 설명할 수 있다. 엽록체의 구조와 기능을 이해하고, 식물 잎의 광합성색소를 추출하여 분리하는 실험을 통해 광합성색소가 분리되는 원리를 설명하며, 명반응 과정에서 생성된 물질이 탄소 고정반응에 이용되어 포도당이 생성되는 각각의 단계별 특징을 설명 할 수 있다. 광합성과 세포호흡의 전자전달계에서 산화적 인산화 반응과 광인산화 반응을 비 교하여 공통점과 차이점을 설명하고, 광합성 관련 과학사적 연구 결과를 설명할 수 있다.","과정·기능":"다양한 매체를 활용하여 세포호흡의 해당과정, 피루브산의 산화와 TCA 회로, 산 화적 인산화 과정과 각 단계별 특징을 조사하여 생명체 내에서의 미토콘드리아의 기능을 추론하며, 발효 실험을 설계하여 수행하고 발효 이용 사례에 대한 조사 계획을 세워 조사하며, 발효 실험에서 검증하려는 가설에 맞게 조작 변인, 종속변 인, 통제변인을 설정하여 탐구할 수 있다. 식물의 광합성색소를 추출하여 분리하는 실험을 관찰하며, 벤슨의 실험을 통해 명반응과 탄소 고정반응의 관계를 설명하고, 광합성의 명반응과 탄소 고정반응의 상호 관계를 추론할 수 있다. 미토콘드리아와 엽록체의 내부 구조 모형을 만들 때 협력적으로 소통하며, 광합성 과 세포호흡의 전자전달계를 비교하여 공통점과 차이점을 찾고 다양한 매체를 활용하여 설명 자료를 제작할 수 있다.","가치·태도":"세포호흡의 과정을 역할놀이의 형태로 정확하게 표현하고, 과학적 원리에 근거하 여 적절한 개선 방안을 제안하며, 발효가 이용되는 여러 사례를 조사하여 발효의 가치를 설명하고, 탐구를 통해 과학의 유용성을 인식한다. 엽록체에 있는 광합성색소를 통해 알 수 있는 사실에 대해 가치를 설명하고, 광합 성색소를 추출하여 분리하는 실험 과정에서 과학적 유용성을 인식한다. 광합성 관련 과학사적 연구 결과에 대한 시각화 자료를 창의적으로 제작 함으로써 흥미와 호기심을 가진다."},"C":{"지식·이해":"미토콘드리아의 구조와 기능을 이해하고 에너지 전환이 일어나는 세포 소기관임 을 설명하며, 세포호흡의 해당 과정, 피루브산의 산화와 TCA 회로의 단계별 특징 을 구분하여 설명하고, 실생활에서 발효를 이용한 사례를 조사하여 발표하며, 효 모를 이용한 실험으로 알코올발효 과정을 말할 수 있다. 엽록체의 구조와 기능을 이해하고, 식물 잎의 광합성색소를 추출하여 분리 실험을 통해 광합성색소가 분리되는 원리를 설명하며, 광합성의 광인산화 반응을 모식도 를 통해 설명할 수 있 다. 광합성 관련 과학사적 연구 결과를 말할 수 있다.","과정·기능":"다양한 매체를 활용하여 세포호흡의 과정과 각 단계별 특징을 조사하고 세포호흡의 과정에서 ATP를 합성하는 과정을 표현하고, 생명체 내에서의 미토콘드리아의 기능을 추론하며, 발효에 영향을 미치는 요인을 확인하는 실험을 설계하고 수행할 수 있다. 식물의 광합성 색소를 추출하여 분리하는 실험을 관찰하고, 벤슨의 실험을 통해 명반응과 탄소 고정반응의 관계, 광합성의 명반응과 탄소 고정반응의 상호 관계를 추론하며, 모형을 통해 전자전달계를 설명할 수 있다. 광합성과 관련된 연구 결과를 조사하고 다양한 형식의 발표 자료를 만들어 발표할 수 있다.","가치·태도":"세포호흡 과정을 창의적인 역할놀이로 표현하고, 발효가 이용되는 여러 사례를 조사하여 발효의 가치를 인식한다. 엽록체에 있는 광합성색소를 추출하여 분리 실험 과정에서 과학적 유용성을 인식 하며, 광합성의 복잡하고 미세한 생명 현상을 이해하고 과학의 심미적 가치를 인식한다. 세포호흡과 광합성의 전자전달계를 비교하는 모둠활동에서 각자의 의견을 존중한다."},"D":{"지식·이해":"미토콘드리아의 구조와 기능을 이해하고, 세포호흡 과정과 각 단계의 일부 특징을 설명할 수 있다. 실생활에서 발효를 이용한 사례를 조사하여 발표하며, 광합성색소의 종류를 설명 하고, 광합성의 명반응과 탄소 고정반응을 설명할 수 있다. 광합성 관련 과학사적 연구 결과를 말할 수 있다.","과정·기능":"세포호흡의 과정과 각 단계의 일부 특징을 조사하고 발효 실험에서 발효에 영향을 미치는 요인을 확인할 수 있다. 크로마토그래피를 이용하여 광합성색소 분리 실험에서 협력적으로 소통하며 탐구 를 수행하며, 탐구 목표에 맞게 시각화 자료를 충실히 제작할 수 있다.","가치·태도":"세포호흡의 과정을 역할놀이로 표현하고, 발효의 가치를 설명하며, 모둠활동의 설명 자료 제작 과정에서 각자의 의견을 존중하고, 과학의 유용성을 인식한다. 크로마토그래피와 같은 분리 기술의 과학적 유용성을 설명하고, 광합성의 복잡하 고 미세한 생명 현상을 이해하고 과학의 심미적 가치를 인식한다. 광합성색소 실험을 통해 자연의 신비함을 인식한다."},"E":{"지식·이해":"세포호흡 과정 중 각 단계의 일부 특징을 이해하고, 효모의 알코올발효에 영향을 미치는 요인을 이해하며, 실생활에서 발효를 이용한 사례를 제시할 수 있다. 식물의 잎에 있는 광합성색소의 종류를 확인하고 말할 수 있다. 광합성 관련 과학사적 연구 결과를 말할 수 있다.","과정·기능":"세포호흡 과정 중 각 단계의 일부 특징을 표현하고, 발효 실험에서 적절한 방법으 로 조사 계획을 세워 수행할 수 있다. 광합성색소 분리 실험에서 협력적으로 소통하며 탐구를 수행하고, 광합성 과정의 일부 단계의 특징을 말할 수 있다.","가치·태도":"산소 호흡과 발효의 가치의 중요성을 인식하며, 탐구를 통해 과학의 유용성을 중시한다. 광합성과 관련된 연구 결과를 조사하는 과정에서 협력적으로 소통하고, 실험 과정 에서 흥미와 호기심을 가진다."}}},"유전-01":{"codes":{"12유전01-01":{"A":"염색체에 있는 유전정보의 단위인 유전자에 의해 자손에게 유전 형질이 유전 됨을 이해하고, 상염색체 유전과 성염색체 유전 양상의 차이를 설명하는 과정 에서 유전의 경이로움과 신비로움을 인식한다.","B":"유전 형질은 유전자를 통해 자손에게 유전됨을 이해하고, 상염색체 유전과 성염색체 유전을 설명할 수 있으며, 유전에 대해 흥미와 호기심을 가진다.","C":"상염색체 유전과 성염색체 유전을 구분할 수 있으며, 유전에 호기심을가진다.","D":"유전 형질은 유전자에 의해 자손에게 전달됨을 설명할 수 있다.","E":"유전 형질은 염색체에 있는 유전자에 의해 나타남을 말할 수 있다."},"12유전01-02":{"A":"사람 유전 연구 방법의 어려움을 이해하고, 가계도 분석하기 활동을 통해 유전 의 원리를 이해하며, 사람의 유전 현상 분석을 근거로 유전 형질의 유전적 특성을 추론하여 설명하는 과정에서 유전 연구의 유용성을 인식한다.","B":"사람 유전 연구 방법의 어려움을 이해하고 가계도 분석하기 활동을 수행하며, 사람의 유전 현상 분석을 근거로 유전 형질의 유전적 특성을 설명할 수 있으 며, 유전 현상에 대해 흥미와 관심을 가진다.","C":"사람의 유전 연구 방법의 어려움이 있음을 알고, 사람의 유전 현상 분석을 근거로 유전 형질의 유전적 특성을 설명할 수 있으며, 유전 현상에 흥미를 가진다.","D":"사람의 유전 현상 분석을 근거로 유전 형질의 유전적 특징을 말할 수 있다.","E":"사람의 유전 연구 방법에 어려움이 있음을 말할 수 있다."},"12유전01-03":{"A":"사람의 다유전자유전에 대해 이해하고, 유전 현상의 다양성 사례를 조사하는 과정에서 발산적 사고로 다각적 접근을 시도하며, 사례 발표 과정에서 과학적 근거를 활용하여 협력적으로 소통한다.","B":"사람의 다유전자유전에 대해 이해하고, 유전 현상의 다양성 사례를 조사하는 과정에서 과학적 근거를 활용하여 협력적으로 소통한다.","C":"사람의 다유전자유전과 관련된 유전 현상의 다양성 사례를 조사하는 과정에서 협력적으로 소통한다.","D":"사람의 다유전자유전과 관련된 유전 현상의 다양성 사례를 말할 수 있다.","E":"사람의 유전은 대부분 다유전자유전으로 일어남을 말할 수 있다."},"12유전01-04":{"A":"염색체와 유전자 이상의 종류와 특징을 이해하고, 사람의 유전병을 발병 원인 별로 계획을 세워 조사하여 설명하는 과정에서 독창적인 아이디어를 제시하 며, 과학 이론의 유용성을 인식한다.","B":"염색체와 유전자 이상에 의해 유전병이 일어날 수 있음을 이해하고, 사람의 유전병을 발병 원인별로 조사하며, 유전병과 유전 현상에 흥미와 호기심을 가진다.","C":"염색체와 유전자 이상에 의한 사람의 유전병에 대해 조사 계획을 세울 수 있으 며, 사람의 유전병에 대해 흥미를 가진다.","D":"염색체와 유전자 이상의 종류를 말할 수 있다.","E":"염색체와 유전자 이상에 의한 유전병이 있음을 말할 수 있다."},"12유전01-05":{"A":"DNA의 이중나선구조와 특징을 이해하고, DNA를 추출하여 관찰하기 활동을 수행하며, DNA의 구조와 유전물질 규명 관련 과학사적 연구 결과를 설명하기 위한 발표 자료를 다양한 매체를 활용하여 창의적으로 제작하는 과정에서 과 학사적 연구 결과의 가치를 인식한다.","B":"DNA의 이중나선구조와 특징을 이해하고, DNA를 추출하여 관찰하기 활동을 수행하며, DNA의 구조와 유전물질 규명 관련 과학사적 연구 결과를 설명하는 과정에서 DNA에 대해 흥미와 호기심을 가 진 다.","C":"DNA의 이중나선구조와 유전물질 규명 관련 과학사적 연구 결과를 설명하기 위한 발표 자료를 제작하고, DNA에 대해 흥미를 가진다.","D":"DNA의 구조와 유전물질 규명 관련 과학사적 연구에 대해 말할 수 있다.","E":"DNA 구조의 특징을 말할 수 있다."},"12유전01-06":{"A":"원핵세포와 진핵세포의 유전자 구조와 유전체 구성을 이해하고, 공통점과 차 이점을 비교하여 설명할 수 있으며, 유전체 구성의 신비로움을 인식한다.","B":"원핵세포와 진핵세포의 유전자 구조와 유전체 구성에 공통점과 차이점을 구분 할 수 있으며, 유전체에 대한 흥미와 호기심을 가진다.","C":"원핵세포와 진핵세포의 유전자 구조와 유전체 구성에 대해 설명할 수 있으며, 유전체에 대해 관심을 가진다.","D":"원핵세포와 진핵세포의 유전자 구조와 유전체 구성을 말할 수 있다.","E":"원핵세포와 진핵세포의 유전자 구조와 유전체 구성에 공통점과 차이점이 있음 을 말할 수 있다."},"12유전01-07":{"A":"반보존적 DNA 복제 과정을 이해하고, DNA 복제 모의실험 활동에서 DNA 복제 과정을 설명할 수 있으며, DNA 반보존적 복제 과정이 갖는 의미를 추론 하여 협력적으로 소통하는 과정에서 발산적인 사고로 다각적인 접근을 시도 한다.","B":"반보존적 DNA 복제 과정을 이해하고, DNA 복제 모의실험 활동에서 DNA 복제 과정을 설명할 수 있으며, DNA 반보존적 복제 과정의 의미를 설명하는 과정에서 DNA 복제 과정에 흥미와 호기심을 가진다.","C":"반보존적 DNA 복제 과정을 이해하고, 반보존적 DNA 복제 과정의 의미를 설명할 수 있으며, DNA 복제 과정에 흥미를 가진다.","D":"반보존적 DNA 복제 과정을 이해하고, 그 의미를 말할 수 있다.","E":"반보존적 DNA 복제 과정을 말할 수 있다."}},"area":{"A":{"지식·이해":"사람의 유전은 유전 방식에 따라 상염색체 유전과 성염색체 유전, 단일유전자유전 과 다유전자유전 등으로 구분할 수 있다는 사실과 사람의 유전 연구는 유전 연구 방법의 어려움으로 인해 쌍둥이 연구, 집단 조사, 가계도 조사 등으로 이루어짐을 이해하고, 가계도나 사람의 유전 현상의 다양한 사례를 분석하여 사람의 유전적 특성을 해석하며, 염색체와 유전자 이상에 의한 유전병의 종류와 특징을 설명할 수 있다. 원핵세포와 진핵세포의 유전자 구조와 유전체 구성을 이해하고, 공통점과 차이점 을 비교하여 설명할 수 있다. DNA의 이중나선구조와 특징을 이해하고, 다른 DNA 복제 과정 가설과 달리 반 보존적 DNA 복제 과정이 갖는 의미를 설명할 수 있다.","과정·기능":"가계도 분석하기 탐구활동과 사람 유전 현상의 다양한 사례 조사에서 분석 결과를 근거로 사람의 유전 형질의 유전적 특성을 추론하고, 도출된 결론을 자연과 일상 생활에 적용하여 설명하며, 염색체와 유전자 이상에 따른 사람의 유전병을 발병 원인별 조사 계획을 세워 조사한 후 수집된 자료를 표나 그래프 등 알맞은 형태로 변환하여 비교 분석할 수 있다. DNA를 추출하여 관찰하기 탐구활동을 수행하며, DNA의 구조와 유전물질 규명 관련 과학사적 연구 결과를 설명하기 위한 발표 자료를 정보 그림, 시청각 설명 자료, 영상, 디지털 플랫폼 등 다양한 매체를 활용하여 창의적으로 제작하고, 설명 할 수 있다. DNA복제 모의 실험하기 탐구활동에 참여하며, DNA 복제 과정 가설 중 반보존 적 DNA 복제 과정이 갖는 의미에 대해 과학적 언어를 사용하여 자신의 생각을 다양한 방식으로 표현하고 공유할 수 있다.","가치·태도":"사람의 유전 방식과 유전병의 종류와 원인에 대한 이해를 바탕으로 가계도 분석과 같은 사람의 다양한 유전 현상 분석 사례에서 발산적 사고와 다각적인 접근을 시도한다. DNA복제 모의실험을 통해 DNA 복제가 정교하게 일어남을 인식하고, 사람의 유전 현상 분석 활동과 유전병의 종류와 특징 조사 활동에서 사용되는 과학의 유용성을 인식한다. 유전 관련 직업이나 다양한 유전 현상 사례 조사에서 유전에 대한 과학 지식이 일상생활에 많은 영향을 주고, 일상생활의 문제해결에 활용될 수 있음을 인식 한다."},"B":{"지식·이해":"사람의 유전은 유전 방식에 따라 상염색체 유전과 성염색체 유전, 단일유전자유전 과 다유전자유전으로 구분할 수 있다는 사실과 사람의 유전 연구는 유전 연구 방법의 어려움으로 인해 가계도 조사 등으로 이루어짐을 이해하고, 가계도 분석을 통해 사람의 유전적 특성을 해석하며, 염색체와 유전자 이상에 의한 유전병의 종류와 특징을 설명할 수 있다. 원핵세포와 진핵세포의 유전자 구조와 유전체 구성을 이해하고, 공통점과 차이점 을 비교하여 설명할 수 있다. DNA의 이중나선구조와 특징을 알고, 반보존적 DNA 복제 과정이 갖는 의미를 말 할 수 있 다.","과정·기능":"가계도 분석하기 탐구활동과 사람 유전 현상의 다양한 사례 조사에서 분석 결과를 근거로 사람의 유전 형질의 유전적 특성을 추론하고, 도출된 결론을 자연과 일상 생활에 적용하며, 염색체와 유전자 이상에 따른 사람의 유전병을 원인별 조사 계획을 세워 조사한 수집된 자료를 표나 그래프 등 알맞은 형태로 변환할 수 있다. DNA를 추출하여 관찰하기 탐구활동을 수행하며, DNA의 구조와 유전물질 규명 관련 과학사적 연구 결과를 설명하기 위한 발표 자료를 제작하고, 설명할 수 있다. DNA복제 모의 실험하기 탐구활동에 참여하며, DNA 복제 과정 가설 중 반보존 적 DNA 복제 과정이 갖는 의미에 대해 자신의 생각을 공유할 수 있다.","가치·태도":"사람의 유전 방식과 유전병의 원인에 대한 이해를 바탕으로 사람의 다양한 유전 현상 사례에서 유전적 특성을 해석할 때 다각적인 접근을 시도한다. DNA복제의 정교한 과정을 인식하고, 사람의 유전 현상 분석 활동과 유전병의 종류와 특징 조사 활동에서 사용되는 과학의 유용성을 인식한다. 유전 관련 직업이나 다양한 유전 현상 사례 조사에서 유전에 대한 과학 지식이 일상생활에 많은 영향을 주고 있음을 인식한다."},"C":{"지식·이해":"사람의 유전은 유전 방식에 따라 상염색체 유전과 성염색체 유전, 단일유전자유전 과 다유전자유전으로 구분할 수 있음을 이해하고, 가계도 분석을 통해 사람의 유전적 특성을 해석하며, 염색체와 유전자 이상에 의한 유전병의 종류와 특징을 말 할 수 있 다. 원핵세포와 진핵세포의 공통점과 차이점을 유전자 구조와 유전체 구성을 포함하 여 비교하여 말할 수 있다. DNA의 이중나선구조의 특징을 바탕으로, 반보존적 DNA 복제 과정을 설명할 수 있다.","과정·기능":"가계도 분석하기 탐구활동과 사람 유전 현상의 다양한 사례 조사에서 분석 결과를 근거로 사람의 유전 형질의 유전적 특성을 추론하고, 염색체와 유전자 이상에 따른 사람의 유전병을 원인별 조사 계획을 세워 조사하며, 분석할 수 있다. DNA를 추출하여 관찰하기 탐구활동에 참여하며, DNA의 구조와 유전물질 규명 관련 과학사적 연구 결과를 설명하기 위한 발표 자료를 제작할 수 있다. DNA복제 모의 실험하기 탐구활동에 참여하며, 반보존적 DNA 복제 과정이 갖는 의미에 대해 말할 수 있다.","가치·태도":"사람의 유전 방식을 이해하고, 유전 현상 사례에서 유전적 특성을 해석할 때 다각 적인 접근을 시도한다. 사람의 유전 현상 분석 활동과 유전병의 종류와 특징 조사 활동에서 사용되는 과학의 유용성을 인식한다. 유전 현상 관련 사례 조사에서 유전에 대한 과학 지식이 일상생활에 많은 영향을 주고 있음을 인식한다."},"D":{"지식·이해":"사람의 유전은 유전 방식에 따라 상염색체 유전과 성염색체 유전, 단일유전자유전 과 다유전자유전으로 구분될 수 있음을 이해하고, 염색체와 유전자 이상에 의한 유전병의 종류와 특징을 말할 수 있다. 원핵세포와 진핵세포의 공통점과 차이점을 말할 수 있다. 반보존적 DNA 복제 과정을 설명할 수 있다.","과정·기능":"가계도 분석하기 탐구활동과 사람 유전 현상의 다양한 사례 조사 활동에서 자료를 분석할 수 있으며, 염색체와 유전자 이상에 따른 사람의 유전병을 조사하고, 수집 된 자료를 그림이나 말로 표현할 수 있다. DNA의 구조와 유전물질 규명 관련 과학사적 연구 결과를 찾아 제시할 수 있다. DNA복제 모의 실험하기 탐구활동에 참여하며, 반보존적 DNA 복제 과정이 갖는 의미를 제시할 수 있다.","가치·태도":"사람의 다양한 유전 현상 사례에서 유전적 특성을 해석할 때 다각적인 접근을 시도하고, 이떄 사용되는 과학의 유용성을 인식한다. 유전 현상 관련 사례 조사를 통해 유전에 대한 과학 지식이 일상생활에 영향을 주고 있음을 인식한다."},"E":{"지식·이해":"사람의 유전은 유전 방식에 따라 구분할 수 있음을 알고, 유전병의 종류와 특징을 염색체와 유전자 이상에 따라 구분됨을 말할 수 있다. 원핵세포와 진핵세포의 유전자 구조와 유전체 구성에 공통점과 차이점이 있음을 말 할 수 있 다. DNA복제 방식이 반보존적으로 이루어짐을 말할 수 있다.","과정·기능":"가계도 분석하기 및 DNA 복제 모의실험하기 탐구활동과 사람의 유전 현상 사례 에 대한 조사 활동을 절차대로 수행할 수 있다. DNA를 추출하여 관찰하고, DNA의 구조와 유전물질 규명 관련 연구 결과를 그 림이나 말로 나타낼 수 있다.","가치·태도":"사람의 다양한 유전 현상 사례에서 유전적 특성을 해석할 때 사용되는 과학의 유용성에 관심을 가진다. 유전에 대한 과학 지식이 일상생활에 영향을 주고 있음을 인식한다."}}},"유전-02":{"codes":{"12유전02-01":{"A":"전사와 번역 과정을 거쳐 유전자가 발현되는 중심원리를 이해하고, 단백질 합성 과정 모의실험에서 모형을 이용하여 유전자 발현 과정을 설명하며, 유전 자 발현에 대해 궁금증을 해소하려는 태도를 지닌다.","B":"전사와 번역 과정을 이해하고, 단백질 합성 과정 모의실험을 통해 유전자가 발현되는 과정을 모형을 이용하여 설명하며, 유전자 발현에 대해 흥미와 호기 심을 가진다.","C":"모형을 이용하여 유전자 발현 과정을 전사와 번역 과정으로 구분하여 설명하 며, 유전자 발현에 대해 흥미를 가진다.","D":"유전자 발현 과정을 전사와 번역 과정으로 구분할 수 있다.","E":"유전자 발현 과정은 전사와 번역 과정으로 구분됨을 말할 수 있다."},"12유전02-02":{"A":"유전 부호의 생물학적 의미와 체계를 이해하고, 유전 부호 표를 사용하여 유전 정보를 해독하는 과정에서 유전 부호 체계의 경이로움을 인식한다.","B":"유전 부호의 특징과 규칙성을 이해하고, 유전 부호 표를 사용하여 유전 정보를 해독하는 과정에서 부호 체계에 흥미와 호기심을 가진다.","C":"유전 부호 표를 사용하여 염기 서열에서 생성되는 아미노산을 나열하고, 유전 부호 체계에 흥미를 가진다.","D":"유전 부호 표를 사용하여 염기 서열에서 생성되는 아미노산을 나열할 수 있다.","E":"유전 부호가 아미노산을 지정하는 정보임을 말할 수 있다."},"12유전02-03":{"A":"원핵생물의 유전자 발현 조절 과정을 이해하고, 원핵생물과 진핵생물에서 전 사 조절 과정의 차이점을 설명하기 위한 설명 자료를 다양한 매체를 활용하여 제작하며, 유전자 발현 과정에 대해 다양한 방식으로 표현하고 공유하는 과정 에서 발산적인 사고 로 다각적인 접근을 시 도 한 다.","B":"원핵생물과 진핵생물의 전사 조절 과정을 비교하여 이해하고, 차이점을 설명 하기 위한 자료를 제작하는 과정에서 다각적인 접근을 시도한다.","C":"원핵생물과 진핵생물의 전사 조절 과정을 이해하고, 전사 조절 과정에 흥미와 호기심을 가진다.","D":"원핵생물의 전사 조절 과정을 설명할 수 있다.","E":"원핵생물과 진핵생물의 전사 조절 과정이 다름을 말할 수 있다."},"12유전02-04":{"A":"생물의 발생 과정에서 세포 분화가 유전자 발현 조절 과정을 통해 일어남을 추론하고, 세포 분화 과정의 경이로움을 인식한다.","B":"생물의 발생 과정에서 세포 분화가 유전자 발현 조절 과정을 통해 일어남을 설명하며, 세포 분화 과정에 흥미와 호기심을 가진다.","C":"생물의 발생 과정에서 세포 분화와 유전자의 발현 조절과 관련성을 이해하고, 세포 분화 과정에 대해 흥미를 가진다.","D":"생물의 발생 과정에서 유전자 발현 조절에 의해 세포가 분화됨을 알고, 세포 분화에 대해 흥미를 가진다.","E":"생물의 발생 과정에서 세포 분화가 일어남을 말할 수 있다."},"12유전02-05":{"A":"생물의 유전자 발현 조절 및 발생에 대한 연구가 인류 복지에 기여한 사례를 조사하고, 발표 자료 제작하는 과정에서 협력적으로 소통하며, 과학적 산출물 을 활용하는 데에 따르는 윤리적 측면을 설명할 수 있다.","B":"생물의 유전자 발현 조절 및 발생에 대한 연구가 인류 복지에 기여한 사례에 대한 발표 자료를 다양한 매체를 활용하여 제작하고, 과학적 산출물을 활용하 는 데에 따르는 윤리적 측면이 있음을 인식한다.","C":"생물의 유전자 발현 조절 및 발생에 대한 연구가 인류 복지에 기여한 사례를 말하고, 과학 지식은 발전적으로 변화함을 인식한다.","D":"생물의 유전자 발현 조절 및 발생에 대한 연구가 인류 복지에 기여한 사례를 조사하여 말할 수 있다.","E":"생물의 유전자 발현 조절 및 발생에 대한 연구가 인류 복지에 기여함을 말할 수 있다."}},"area":{"A":{"지식·이해":"전사와 번역 과정을 거쳐 유전자가 발현되는 중심원리를 이해하고, 유전자 발현 과정 을 단계를 구분하여 설명하며, 유전 부호 체계를 이해하여 특징을 추론할 수 있다. 원핵생물과 진핵생물의 유전자 발현 조절 과정을 비교하고, 차이점을 설명할 수 있다. 생물의 발생 과정에서 세포 분화가 유전자 발현 조절 과정을 통해 일어남을 이해 하고, 유전자 발현 조절 과정과 유전자 발현 및 발생에 대한 주요 연구가 인류 복지에 기여한 점을 설명할 수 있다.","과정·기능":"단백질 합성 과정을 표현하는 모형을 제작하고, 유전자 발현 과정을 설명하는 자료를 제작하고, 디지털 탐구 도구를 활용하여 유전 정보를 해독하는 과정을 시뮬레이션하는 프로그램을 활용할 수 있다. 원핵생물과 진핵생물의 유전자 발현 조절 과정을 비교하기 위한 자료를 다양한 매체를 활용하여 제작하고 과학적 언어로 표현하고, 생물의 발생 과정에서 세포 분화가 유전자 발현 조절 과정을 통해 일어남을 추론하며, 유전자 발현 조절에 따라 세포 분화가 다르게 진행되는 사례를 조사하여 비교하고 분석할 수 있다. 생물의 유전자 발현 조절 및 발생에 대한 주요 연구 사례를 조사하여 발표 자료를 제작하고, 해당 연구가 인류 복지에 기여한 점을 과학적 언어를 사용하여 다양한 방식으로 표현하고 공유할 수 있다.","가치·태도":"전사와 번역 과정을 거쳐 유전자가 발현되는 중심원리에 흥미와 호기심을 갖고, 단백질 합성 과정을 표현하는 모형 제작 과정을 체험하고 즐긴다. 유전 부호를 통해 유전 정보가 단백질을 암호화하는 체계의 정교함과 경이로움을 인식한다. 생물의 유전자 발현 조절 및 발생에 대한 연구가 인류 복지에 기여한 사례를 통해 과학 지식이 일상생활의 문제해결에 활용됨을 인식한다."},"B":{"지식·이해":"전사와 번역 과정을 거쳐 유전자가 발현되는 중심원리를 이해하고, 유전자 발현 과정을 설명하고, 유전 부호 체계를 이해하며, 유전 부호 표를 사용하여 유전 정보 를 해독할 수 있다. 원핵생물과 진핵생물의 유전자 발현 조절 과정을 설명할 수 있다. 생물의 발생 과정에서 세포 분화가 일어남을 이해하고, 발생 초기 단계의 유전자 발현 조절 과정을 설명할 수 있다.","과정·기능":"단백질 합성 과정을 표현하는 모형을 만들어 설명할 수 있다. 디지털 탐구 도구를 활용하여 제작한 유전 정보 해독 과정 시뮬레이션 프로그램을 활용하고, 유전 부호 체계 표를 해석할 수 있다. 원핵생물과 진핵생물의 유전자 발현 조절 과정을 설명하는 자료를 만들 수 있다.","가치·태도":"전사와 번역 과정에 흥미를 갖고, 단백질 합성 과정을 표현하는 모형 제작 과정에 유용한 독창적 아이디어를 제시한다. 유전 부호와 같은 과학지식은 누적적으로 변화하였음을 인식한다. 생물의 유전자 발현 조절 및 발생에 대한 연구가 인류 복지에 기여한 사례를 통해 과학기술의 가치를 인식하고 중시한다."},"C":{"지식·이해":"전사와 번역 과정을 단계를 구분하여 이해하고, 이 과정이 유전자 발현의 중심원 리임을 말할 수 있다. 유전 부호 체계가 있음을 말하고, 유전 부호 표의 의미를 말할 수 있다. 생물의 유전자는 발현 조절 과정을 거쳐 발현된다는 사실을 알고, 발생 과정에서 유전자 발현 조절 과정을 통해 세포가 분화함을 말할 수 있다.","과정·기능":"단백질 합성 과정을 표현하는 모형을 만들 수 있다. 유전 부호 표를 사용하여 제시한 염기 서열에서 생성되는 아미노산을 나열할 수 있다. 생물의 유전자 발현 조절 및 발생에 대한 주요 연구 조사에 디지털 탐구 도구를 사용할 수 있다.","가치·태도":"전사와 번역 과정에 흥미를 갖고, 단백질 합성 과정을 표현하는 모형 제작 과정을 체험한다. 전사와 번역 과정을 통해 유전 정보가 발현된다는 사실을 알고, 중심원리와 유전 부호 체계에 흥미와 호기심을 가진다. 생물의 발생 과정에서 세포 분화가 유전자 발현과 관련이 있음을 알고 이에 흥미 와 호기심을 가진다."},"D":{"지식·이해":"전사와 번역 과정을 거쳐 유전자가 발현되는 중심원리를 순서대로 말할 수 있다. 발생 과정에서 유전자 발현 조절 과정이 일어남을 말할 수 있다.","과정·기능":"단백질 합성 과정을 표현하는 모형의 일부를 만들 수 있다. 생물의 유전자 발현 조절 및 발생에 대한 연구가 인류 복지에 기여한 사례를 조사 할 수 있다.","가치·태도":"단백질 합성 과정을 표현하는 모형 제작 과정을 체험한다. 유전 부호 체계와 같은 자연현상의 정교함에 경이로움을 느낀다."},"E":{"지식·이해":"유전자 발현 과정은 전사와 번역 과정으로 구분됨을 말할 수 있다.","과정·기능":"생물의 발생 과정에서 유전자 발현이 조절되는 사례 를 조사할 수 있 다.","가치·태도":"단백질 합성 과정에 흥미와 호기심을 가진다."}}},"유전-03":{"codes":{"12유전03-01":{"A":"생명공학기술의 발달 과정에서 혁신적인 변화를 일으킨 주요 사건과 실생활에 미친 영향의 사례를 조사하는 과정에서 발산적 사고로 다각적이 접근을 시도 하며, 다양한 매체를 활용하여 발표하는 과정에서 생명공학기술의 유용성을 인식한다.","B":"생명공학기술의 발달 과정 과정에서 주요 사건과 영향을 다각도로 조사하고, 주요 사건을 선정하여 다양한 매체를 활용해 발표하는 과정에서 생명공학기술 에 대한 흥미와 호기심을 가 진 다.","C":"생명공학기술의 발달 과정에서 주요 사건과 그 영향을 조사하고, 이를 발표하 는 과정에서 다양한 매체를 활용하며, 생명공학기술에 대한 흥미를 가진다.","D":"생명공학기술의 발달에 영향이 컸던 주요 사건과 영향을 알고, 생명공학기술 이 우리 생활에 활용됨을 이해한다.","E":"생명공학기술의 발달에 영향이 컸던 주요 사건과 영향을 말할 수 있다."},"12유전03-02":{"A":"단일클론항체, 줄기세포, 유전자 편집기술 등 생명공학기술이 난치병 치료에 활용된 사례를 다각도로 조사하고, 난치병 치료의 전망에 대해 다양한 매체를 활용하여 협력적으로 토론하는 과정에서 과학의 유용성과 윤리성을 인식한다.","B":"단일클론항체, 줄기세포, 유전자 편집기술이 난치병 치료에 활용된 사례를 다 각도로 조사하고, 난치병 치료의 전망에 대해 토론하는 과정에서 과학의 유용 성을 인식한다.","C":"단일클론항체, 줄기세포, 유전자 편집기술이 난치병 치료에 활용된 사례를 조 사하고, 난치병 치료의 전망에 대해 토론하는 과정에서 과학의 유용성을 인식 한다.","D":"단일클론항체, 줄기세포, 유전자편집기술이 난치병 치료에 활용된 사례를 조 사할 수 있다.","E":"단일클론항체, 줄기세포, 유전자편집기술이 난치병 치료에 이용됨을 말할 수 있다."},"12유전03-03":{"A":"생명공학기술의 발달로 확장된 생명공학기술 관련 학문 분야를 이해하고, 우 리 생활과 산업에 활용된 생명공학 학문 분야 사례에 대한 설명 자료를 창의적 으로 제작하며, 단백질 화합물 상호작용 가상 실험 활동으로 최신 신약의 개발 과정을 체험하여 생명공학기술의 가치와 유용성을 인식한다.","B":"생명공학기술 관련 학문 분야를 이해하고, 우리 생활과 산업에 활용된 생명공 학 학문 분야 사례에 대한 설명 자료를 창의적으로 제작하며, 단백질 화합물 상호작용 가상 실험 활동으로 신약의 개발 과정을 이해하며, 생명공학기술의 가치와 유용성을 인식한다.","C":"생명공학기술이 산업에 활용된 사례를 조사하여 설명하는 과정에 표나 그림을 활용하여 발산적 사고로 다각적인 접근을 시도한다. 생명공학기술 관련 학문 분야를 알고, 우리 생활과 산업에 활용된 사례를 조사 하여 설명 자료를 제작하며, 단백질 화합물 상호작용 가상 실험 활동으로 과학 의 유용성을 인식한다.","D":"생명공학기술이 우리 생활이나 산업에 활용된 사례에 대해 조사할 수 있다.","E":"생명공학기술이 일상생활의 문제해결에 활용됨을 말할 수 있다."},"12유전03-04":{"A":"유전자변형생물체(LMO)의 특징을 자연상태의 생물체와 비교하여 이해하고, 유전자변형생물체(LMO)가 인간과 생태계에 미치는 긍정적인 영향과 부정적 인 영향에 대해 추론하는 과정에서 타인을 존중하는 태도로 의견을 공유할 수 있다.","B":"유전자변형생물체(LMO)의 특징을 이해하고, 유전자변형생물체(LMO)가 인 간과 생태계에 미치는 긍정적인 영향과 부정적인 영향에 대해 추론하는 과정 에서 과학기술에 흥미와 호기심을 가진다.","C":"유전자변형생물체(LMO)의 특징을 이해하고, 유전자변형생물체(LMO)가 인 간과 생태계에 미치는 긍정적인 영향과 부정적인 영향에 대해 호기심을 가진 다.","D":"유전자변형생물체(LMO)가 우리 생활에 미치는 영향을 말할 수 있다.","E":"유전자변형생물체(LMO)의 의미를 말할 수 있다."},"12유전03-05":{"A":"생명공학기술의 활용 과정에서 나타나는 생태적, 윤리적, 제도적, 사회적 문제 점을 이해하고, 미래 사회에 미칠 영향을 예측하여 발표하는 과정에서 생명윤 리의 가치와 사회적 책임을 인식하고, 생명윤리 쟁점에 대해 윤리적 기반으로 의사 결정을 할 수 있다.","B":"생명공학기술의 활용 과정에서 나타나는 문제점을 이해하고, 미래 사회에 미 칠 영향을 예측하여 발표하는 과정에서 사회적 책임을 인식하고, 이를 바탕으 로 생명윤리 쟁점에 대해 의사 결정을 할 수 있다.","C":"생명공학기술의 활용 과정에서 나타나는 문제점과 미래 사회에 미칠 영향을 예측하는 과정에서 사회적 책임을 인식하고 생명윤리 쟁점에 대해 의사 결정 을 할 수 있다.","D":"생명공학기술의 활용 과정에서 나타나는 문제점을 이해하고 사회적 책임을 인식한다.","E":"생명공학기술의 활용 과정에서 문제점이 나타난다는 것을 말할 수 있다."}},"area":{"A":{"지식·이해":"우리 생활과 밀접한 관련이 있는 DNA 재조합기술, 중합효소연쇄반응(PCR), 차 세대염기순서분석(NGS) 등의 생명공학기술 발달 과정에서의 주요 사건을 조사 하여 생명공학기술의 성과와 우리 생활에 활용된 사례를 발표하고, 단일클론항체 가 암세포와만 특이적으로 반응하는 이유를 설명하고, 암 치료에 단일클론항체를 활용할 때의 장점을 발표하며, 난치병 치료법의 장단점과 생명공학기술의 발전 가능성에 대해 설명할 수 있다. 단백질 화합물 상호작용 가상 실험을 통해 최신 신약의 개발의 원리를 이해하고 최신 신약의 장점을 설명하며, 유전자변형생물체(LMO)의 예로 해충 저항성 목화, 제초제 내성 콩 같은 변형작물에 대해 이해하고 사람과 생태계에 미치는 영향 을 추론할 수 있다. 생명공학기술의 활용이 미래 사회에 미칠 영향을 알고, 생명공학기술의 활용 과정 에서 나타나는 문제점과 그 영향을 생태적, 윤리적, 제도적, 사회적 측면에서 토론 하고 발표할 수 있다.","과정·기능":"DNA 재조합기술, 중합효소연쇄반응(PCR), 차세대염기순서분석(NGS) 등의 생 명공학기술이 난치병 치료에 활용된 사례를 조사하고, 난치병 치료법의 전망에 대해 협력적으로 소통하며, 생명공학기술 관련 학문 분야가 우리 생활과 산업에 활용된 사례를 조사하여 주요 사건을 주제로 다양한 매체를 활용하여 발표할 수 있다. 단백질 화합물 상호작용 가상 실험을 충실히 수행하고, 유전자변형생물체(LMO) 가 사람과 생태계에 미치는 영향을 추론할 수 있다. 생명공학기술 활용의 문제점과 사회적 책임에 대한 토의 활동에 참여하여 생명공 학기술의 활용이 미래 사회에 미칠 영향을 알고, 생명윤리 쟁점에 대해 의사 결정 할 수 있다.","가치·태도":"난치병 치료에 생명공학기술이 유용하게 이용되고 있음을 인식하고, 생명공학기 술이 우리 생활과 산업에 활용되어 인류 발전에 기여함을 경험하며, 생명공학기술 발달 과정에서의 주요 사건을 조사함으로써 생명공학기술이 다른 학문 분야와 연계되어 발달한다는 것을 인식한다. 유전자변형생물체(LMO)가 사람과 생태계에 영향을 미치는 다양한 측면을 인식 하고, 생명공학기술이 활용된 단백질 화합물 상호작용의 가상 실험을 통해 최신 신약의 개발 과정을 체험한다. 안전하고 지속 가능한 사회를 만들기 위해 생명공학기술의 발달이 미래 사회에 미칠 영향을 예측하여 설명하고, 생명공학기술의 활용 과정에서 나타나는 생명윤 리 문제로부터 생명의 소중함을 느낀다."},"B":{"지식·이해":"DNA 재조합기술, 중합효소연쇄반응(PCR), 차세대염기순서분석(NGS) 등의 생 명공학기술의 원리를 이해하고, 생명공학기술의 활용 사례 및 이와 관련된 최신 학 문 분야와 직업을 설명할 수 있 다. 단일클론항체가 암세포와만 특이적으로 반응하는 이유를 이해하고, 암 치료에 단 일클론항체를 활용할 때의 장점을 설명하며, 생명공학기술을 활용한 난치병 치료 사례를 조사하고, 치료법의 긍정적인 영향과 부정적인 영향에 대해 설명할 수 있다. 유전자변형생물체(LMO)가 사람과 생태계에 미치는 영향에 대해 이해하고, 생명 공학기술의 활용 과정에서 나타나는 문제점, 사회적 책임을 인식하고 생명윤리 쟁점을 설명할 수 있다.","과정·기능":"조직배양 기술, 세포융합기술, 유전자재조합기술, 핵치환 기술, 줄기세포, 유전자 편집기술 등 생명공학기술의 활용 사례에 따라 관련된 최신 학문 분야와 직업을 조사하고, 단일클론항체, 줄기세포, 유전자편집 기술 등 생명공학기술을 활용한 난치병 치료 사례와 문제점 및 난치병 치료법의 전망에 대해 소통할 수 있다. 생명공학기술이 활용된 단백질 화합물 상호작용을 이해하고, 최신 신약의 개발 과정을 발표할 수 있다. 유전자변형생물체(LMO)가 사람과 생태계에 미치는 영향을 추론하며, 토론 과정 에서 생명윤리 쟁점에 대한 자신의 입장을 합리적으로 결정할 수 있다.","가치·태도":"다양한 생명공학기술을 살펴봄으로써 과학의 유용성뿐만 아니라 과학 문제 해결 에 있어 개방성이 중요하다는 것을 인식한다. 단일클론항체, 줄기세포, 유전자편집기술 등의 생명공학기술의 원리를 이해하고, 난치병 치료법의 한계를 극복하기 위한 방안을 제시하여 안전하고 지속 가능한 사회에 기여한다. 유전자변형생물체(LMO)의 긍정적인 영향과 부정적인 영향을 알고 자신의 의견을 표현하고, 생명공학기술의 문제점과 미래 사회에 미칠 영향을 알고, 이에 대한 자신 의 생각을 표현하고, 생명윤리 쟁점에 대해 적극적으로 해결하려는 태도를 가진다."},"C":{"지식·이해":"단일클론항체, 줄기세포, 유전자편집기술 등의 생명공학기술과 관련된 주요 사건과 사례를 조사하여 발표 자료를 제작하고, 단백질 화합물 상호작용 실험을 신약 개발에 활용할 때의 장점과 생명공학기술이 난치병 치료에 활용된 사례를 설명할 수 있다. 과학적 근거를 기반으로 자료를 해석하고 분석하여 유전자변형생물체(LMO)의 특징을 설명할 수 있다. 생명공학기술의 문제점과 미래 사회에 미칠 영향에 대해 자신의 생각을 표현하고, 생명윤리 쟁점에 대해 설명할 수 있다.","과정·기능":"생명공학기술 발달 과정에서의 주요 사건을 주제로 다양한 매체를 활용하여 발표 할 수 있다. 단백질 화합물 상호작용 가상 실험을 실행하여 고른 단백질과 가장 안전한 결합을 하는 화합물을 찾으며, 난치병 치료법의 전망에 관해 의견을 제시할 수 있다. 생명공학기술의 활용 과정에서 나타날 수 있는 문제점을 이해하고, 유전자변형생 물체(LMO)의 특징을 사례를 들어 설명하며, 생명공학기술과 관련된 생명윤리를 설명할 수 있다.","가치·태도":"생명공학기술이 활용된 사례를 조사함으로써 과학의 유용성을 확인하고, 생명공 학기술이 난치병 치료에 기여할 수 있다는 것을 인식하며 단백질 화합물 상호 작용 실험을 통해 과학의 유용성을 인식한다. 유전자변형생물체(LMO)의 안전성을 확보하기 위한 방안을 제시하여 안전하고 지속 가능한 사회에 기여한다. 생명공학기술 활용의 문제점에 대한 사회적 책임을 인식하고, 생명윤리 쟁점에 대해 적극적으로 해결하려는 태도를 가진다."},"D":{"지식·이해":"생명공학기술의 주요 성과가 우리 생활에 활용된 사례를 설명할 수 있다. 유전자변형생물체(LMO)의 특징을 이해하고 긍정적인 영향을 설명할 수 있다. 생명공학기술 활용의 사회적 책임에 대해 말할 수 있다.","과정·기능":"생명공학기술과 관련된 주요 사건과 사례를 조사할 수 있다. 단백질과 화합물의 상호작용 가상 실험으로 특정 단백질과 관련된 약물 후보 물질 을 선별할 수 있다. 유전자변형생물체(LMO)의 영향을 설명하며, 생명윤리 쟁점에 관해 의사 결정하 여 협력적으로 소통할 수 있 다.","가치·태도":"생명공학기술이 우리 생활에 다양하게 활용되고 있음을 인식한다. 단백질과 화합물의 상호작용 가상 실험을 체험함으로써 안전하고 지속 가능한 사회에 기여함을 인식한다. 유전자변형생물체(LMO)의 예를 인식하며, 생명공학기술이 발달하면서 발생할 수 있는 생명윤리 쟁점에 대해 인식한다."},"E":{"지식·이해":"생명공학기술이 우리 생활에 중요하게 영향을 미친다는 것을 말할 수 있다. 유전자변형생물체(LMO)의 정의를 이해하며, 생명윤리에 대해 설명할 수 있다.","과정·기능":"생명공학기술과 관련된 주요 사례로 제작된 발표 자료를 공유할 수 있다. 난치병 치료 사례에 적용된 생명공학기술의 원리를 정리할 수 있다. 유전자변형생물체(LMO)에 대해 조사하며, 미래에 나타날 수 있는 생명윤리 문제 에 대해 소통할 수 있 다.","가치·태도":"생명공학기술이 우리 생활과 산업에 활용된다는 점을 인식한다. 생명공학기술을 이용한 난치병 치료의 전망에 대해 인식한다. 생명윤리의 중요성에 대해 흥미와 호기심을 가진다."}}},"지시-01":{"codes":{"12지시01-01":{"A":"태양계의 형성 과정을 물리적 과정을 포함하여 설명하고, 지구의 탄생 이후 지구 대기, 원시 바다, 생명체 탄생 등의 과정을 통해 지구시스템의 각 권역이 형성되는 과정을 추론하며, 지구가 역동적 행성으로 진화한 이유를 다른 고체 행성의 진화 과정과 비교하여 설명할 수 있다.","B":"태양계의 형성 과정을 순서대로 배열하고, 지구의 탄생 이후 지구 대기, 원시 바다, 생명체 탄생 등의 과정을 통해 지구시스템의 각 권역이 형성되는 과정을 추론하며, 지구와 다른 고체 행성의 진화 과정을 비교할 수 있다.","C":"태양계가 성운으로부터 형성되었음을 알고, 지구의 탄생 이후 지구 대기, 원시 바다, 생명체 탄생 등의 과정을 통해 지구시스템의 각 권역이 형성되는 과정을 설명할 수 있다.","D":"지구의 탄생 이후 지구시스템의 각 권역이 형성되었음을 알고, 지구의 진화 과정에서 지구 대기, 원시 바다, 생명체 탄생의 순서를 배열할 수 있다.","E":"지구의 탄생 이후 지구시스템의 각 권역이 형성되었음을 말할 수 있다."},"12지시01-02":{"A":"지구시스템이 진화해 온 역사에서 지권, 수권, 기권이 변화해 왔음을, 물의 순환은 풍화·침식·퇴적 작용과 지형 형성, 탄소의 순환은 얼음덩어리 지구와 석회암의 퇴적, 산소의 순환은 남세균과 호상철광층 형성의 예를 통해 추적하 고, 생명과 행성이 상호작용하며 공진화한 지구 환경과 생명의 소중함과 경이 로움을 인식한다.","B":"지구시스템이 진화해 온 역사에서 지권, 수권, 기권이 변화해 왔음을 물의 순 환과 지형 형성, 탄소의 순환과 석회암의 퇴적, 산소의 순환과 호상철광층 형 성의 예로 설명하고, 생명과 행성이 상호작용하며 공진화한 지구 환경과 생명 의 소중함과 경이로움을 인식한다.","C":"지구시스템에서 나타나는 물, 탄소, 산소 순환의 예로 물에 의한 지형 형성, 석회암의 퇴적, 호상철광층의 형성을 제시하고, 물질 순환을 통해 변화하는 지구 환경 및 이와 함께 진화해 온 생명의 소중함을 인식한다.","D":"지구시스템에서 나타나는 물, 탄소, 산소 순환 과정을 구분하고, 물질 순환을 통해 변화하는 지구 환경의 역동성에 관심을 가진다.","E":"지구시스템은 물질 순환을 통해 변화해 왔음을 말하고, 지구 환경의 변화에 관심을 가진다."},"12지시01-03":{"A":"관측 기기의 발달과 관련지어 판구조론 정립 역사를 추적하고, 판을 움직이는 맨틀의 상부 운동과 플룸에 의한 구조 운동을 구분하며, 빅데이터와 시뮬레이 션 등을 통한 지구시스템 차원의 지질 현상 연구의 중요성을 인식한다.","B":"판구조론 정립 과정을 순서대로 배열하고, 판을 움직이는 맨틀의 상부 운동과 플룸에 의한 구조 운동을 구분하며, 빅데이터와 시뮬레이션 등을 통한 지구시 스템 차원에서의 지질 현상 연구의 중요성을 인식한다.","C":"판을 움직이는 맨틀의 상부 운동과 플룸에 의한 구조 운동을 구분하고, 지구시 스템 차원에서의 지질 현상 연구의 중요성을 인식한다.","D":"판의 운동과 플룸 운동과 다양한 지질 현상을 관련짓고, 지질 현상 연구의 중요성을 인식한다.","E":"판의 운동과 플룸 운동에 의해 지질 현상이 나타남을 말할 수 있다."},"12지시01-04":{"A":"암석의 순환 과정에서 화산 활동의 역할을 설명하고, 화산암과 심성암에서 나타나는 조직을 편광현미경으로 비교ㆍ관찰하여 암석의 특성을 추론하며, 마 그마의 특성에 따라 화산체의 형태가 순상화산과 성층화산으로 구분됨과 화산 에서 분출하는 물질의 차이를 설명할 수 있다.","B":"화산암과 심성암에서 나타나는 조직을 편광현미경으로 비교ㆍ관찰하여 암석 의 특성을 추론하고, 마그마의 특성에 따라 화산체의 형태가 순상화산과 성층 화산으로 구분됨과 화산에서 분출하는 물질의 차이를 설명할 수 있다.","C":"편광현미경으로 관찰한 화산암과 심성암에서 나타나는 조직을 비교하고, 마그 마의 특성에 따라 화산체의 형태가 순상화산과 성층화산으로 구분됨을 설명할 수 있다.","D":"편광현미경으로 관찰한 화산암과 심성암의 조직을 구분하고, 화산체의 형태를 순상화산과 성층화산으로 구분할 수 있다.","E":"안내된 절차에 따라 편광현미경으로 화산암과 심성암의 조직을 관찰한다."},"12지시01-05":{"A":"지진파의 종류와 특성에 대한 이해를 바탕으로 지진파를 이용하여 지구 내부 구조를 알아내는 과정을 설명하고, 지진파 자료를 활용하여 지각의 두께를 구하며, 지진 분포 자료를 통해 한반도 지진 발생 가능성을 예측하고, 이 과정 에서 지진 연구의 유용성을 인식한다.","B":"지진파의 종류와 특성에 대한 이해를 바탕으로 지진파를 이용하여 지구 내부 구조를 알아내는 과정을 설명하고, 지진 분포 자료를 통해 한반도 지진 발생 가능성을 예측하고, 이 과정에서 지진 연구의 유용성을 인식한다.","C":"지진파를 이용하여 지구 내부구조를 알아낼 수 있음을 알고, 지진파의 종류와 특성을 구분하며, 한반도 지진 분포 자료에서 분포 특성을 파악할 수 있다.","D":"지진파를 이용하여 지구 내부구조를 알아낼 수 있음을 알고, 한반도 지진 분포 자료에서 분포 특성을 파악할 수 있다.","E":"지진파를 이용하여 지구 내부구조를 알아낼 수 있음을 말할 수 있다."}},"area":{"A":{"지식·이해":"태양계의 형성 과정을 물리적 과정을 포함하여 설명하고, 지구의 탄생 이후 지구 대기, 원시 바다, 생명체 탄생 등의 과정을 통해 지구시스템의 각 권역이 형성되는 과정을 이해하며, 지구시스템이 진화해 온 역사에서 지권, 수권, 기권이 변화해 왔음을, 물의 순환은 풍화·침식·퇴적 작용과 지형 형성, 탄소의 순환은 얼음덩어 리 지구와 석회암의 퇴적, 산소의 순환은 남세균과 호상철광층 형성의 예를 통해 설명할 수 있다. 지구가 역동적 행성으로 진화한 이유를 다른 고체 행성의 진화 과정과 비교하여 설명할 수 있다. 관측 기기의 발달과 관련지어 판구조론 정립 역사를 설명하고, 판을 움직이는 맨틀의 상부 운동과 플룸에 의한 구조 운동을 구분하며, 암석의 순환 과정에서 화산 활동의 역할을 이해하고, 마그마의 특성에 따라 화산체의 형태가 순상화산과 성층화산으로 구분됨과 화산에서 분출하는 물질의 차이를 설명할 수 있다. 지진파의 종류와 특성에 대한 이해를 바탕으로 지진파를 이용하여 지구 내부구조 를 알아내는 과정을 설명할 수 있다.","과정·기능":"지구의 탄생 이후 지구 대기, 원시 바다, 생명체 탄생 등의 과정을 통해 지구시스 템의 각 권역이 형성되는 과정을 추론하고, 지구가 역동적 행성으로 진화한 이유 를 다른 고체 행성의 진화 과정과 비교하여 추론할 수 있다. 관측 기기의 발달과 관련지어 판구조론 정립 역사를 추적하고, 화산암과 심성암에 서 나타나는 조직을 편광현미경으로 비교ㆍ관찰하여 암석의 특성을 추론하며, 지 진파 자료를 활용하여 지각의 두께를 구하고, 지진 분포 자료를 통해 한반도 지진 발 생 가능성을 예측할 수 있 다.","가치·태도":"생명과 행성이 상호작용하며 공진화한 지구 환경과 생명의 소중함과 경이로움을 인식하고, 빅데이터와 시뮬레이션 등을 통한 지구시스템 차원의 지질 현상 연구의 중요성을 인식하며, 지진 분포 자료를 통해 한반도 지진 발생 가능성을 예측하는 과정에서 지진 연구의 유용성을 인식한다."},"B":{"지식·이해":"태양계 형성 과정을 순서대로 배열하고, 지구의 탄생 이후 지구 대기, 원시 바다, 생명체 탄생 등의 과정을 통해 지구시스템의 각 권역이 형성되는 과정을 이해하 며, 지구시스템이 진화해 온 역사에서 지권, 수권, 기권이 변화해 왔음을 물의 순환과 지형 형성, 탄소의 순환과 석회암의 퇴적, 산소의 순환과 호상철광층 형성 의 예로 설명하고, 지구와 다른 고체 행성의 진화 과정을 비교할 수 있다. 판구조론 정립 과정을 순서대로 배열하고, 판을 움직이는 맨틀의 상부 운동과 플룸에 의한 구조 운동을 구분하며, 화산암과 심성암의 조직을 비교하여 암석의 특성을 이해하고, 마그마의 특성에 따라 화산체의 형태가 순상화산과 성층화산으 로 구분됨과 화산에서 분출하는 물질의 차이를 설명할 수 있다. 지진파의 종류와 특성에 대한 이해를 바탕으로 지진파를 이용하여 지구 내부구조 를 알아내는 과정을 설명할 수 있다.","과정·기능":"지구의 탄생 이후 지구 대기, 원시 바다, 생명체 탄생 등의 과정을 통해 지구시스 템 의 각 권역이 형성되는 과정을 추론할 수 있 다. 화산암과 심성암에서 나타나는 조직을 편광현미경으로 비교ㆍ관찰하여 암석의 특 성을 추론하고, 지진 분포 자료를 통해 한반도 지진 발생 가능성을 예측할 수 있다.","가치·태도":"생명과 행성이 상호작용하며 공진화한 지구 환경과 생명의 소중함과 경이로움을 인식하고, 빅데이터와 시뮬레이션 등을 통한 지구시스템 차원에서의 지질 현상 연구의 중요성을 인식하며, 지진 분포 자료를 통해 한반도 지진 발생 가능성을 예측하는 과정에서 지진 연구의 유용성을 인식한다."},"C":{"지식·이해":"태양계가 성운으로부터 형성되었음을 알고, 지구의 탄생 이후 지구 대기, 원시 바다, 생명체 탄생 등의 과정을 통해 지구시스템의 각 권역이 형성되는 과정을 설명하며, 지구시스템에서 나타나는 물, 탄소, 산소 순환의 예로 물에 의한 지형 형성, 석회암의 퇴적, 호상철광층의 형성을 제시할 수 있다. 판을 움직이는 맨틀의 상부 운동과 플룸에 의한 구조 운동을 구분하고, 화산암과 심성암의 조직을 비교하며, 마그마의 특성에 따라 화산체의 형태가 순상화산과 성층화산으로 구분됨을 설명할 수 있다. 지진파를 이용하여 지구 내부구조를 알아낼 수 있음을 알고, 지진파의 종류와 특성을 구분할 수 있다.","과정·기능":"편광현미경으로 화산암과 심성암의 조직을 관찰하여 비교하고, 한반도 지진 분포 자료에서 분포 특성을 파악할 수 있다.","가치·태도":"물질 순환을 통해 변화하는 지구 환경 및 이와 함께 진화해 온 생명의 소중함을 인식하고, 지구시스템 차원의 지질 현상 연구의 중요성을 인식한다."},"D":{"지식·이해":"지구의 탄생 이후 지구시스템의 각 권역이 형성되었음을 알고, 지구의 진화 과정 에서 지구 대기, 원시 바다, 생명체 탄생의 순서를 배열하며, 지구시스템에서 나타 나는 물, 탄소, 산소 순환 과정을 구분할 수 있다. 판의 운동과 플룸 운동과 다양한 지질 현상을 관련짓고, 화산암과 심성암의 조직 을 구분하며, 화산체의 형태를 순상화산과 성층화산으로 구분할 수 있다. 지진파를 이용하여 지구 내부구조를 알아낼 수 있음을 말할 수 있다.","과정·기능":"편광현미경으로 화산암과 심성암의 조직을 관찰하여 구분하고, 한반도 지진 분포 자료에서 분포 특성을 파악할 수 있다.","가치·태도":"물질 순환을 통해 변화하는 지구 환경의 역동성에 관심을 가지고, 지질 현상 연구 의 중요성을 인식한다."},"E":{"지식·이해":"지구의 탄생 이후 지구시스템의 각 권역이 형성되었음과 지구시스템은 물질 순환 을 통해 변화해 왔음을 말할 수 있다. 판의 운동과 플룸 운동에 의해 지질 현상이 나타남과 지진파를 이용하여 지구 내부구조를 알아낼 수 있음을 말할 수 있다.","과정·기능":"안내된 절차에 따라 편광현미경으로 화산암과 심성암의 조직을 관찰할 수 있다.","가치·태도":"지구 환경의 변화에 관심을 가진다."}}},"지시-02":{"codes":{"12지시02-01":{"A":"지형류가 흐르는 방향과 발생 원리를 에크만 수송과 관련지어 설명하고, 지형 류에서 수압 경도력, 전향력 등 해수를 움직이는 힘과 정역학 평형을 정량적으 로 설명할 수 있다.","B":"지형류가 흐르는 방향과 발생 원리를 에크만 수송과 관련지어 설명하고, 지형류 에 서 수압 경 도 력, 전 향 력 등 해수를 움직이는 힘을 정량적으로 설명할 수 있 다.","C":"에크만 수송의 방향과 이로 인해 흐르는 지형류의 방향을 제시하고, 수압 경도 력과 전향력에 의해 지형류가 형성됨을 설명할 수 있다.","D":"바람에 의해 에크만 수송이 일어나고 이로 인해 지형류가 형성됨을 말할 수 있다.","E":"바람에 의해 에크만 수송이 일어남을 말할 수 있다."},"12지시02-02":{"A":"해파는 해수면의 주기적인 상하 운동으로 에너지를 전파하는 현상임을 알고, 파의 모양에 따라 해파를 풍랑과 너울로 구분하며, 천해파, 전이파, 심해파의 차이점을 비교하여 설명하고, 파장과 수심의 관계를 고려하여 천해파와 심해 파를 발생시키는 실험을 설계하고 수행할 수 있다.","B":"해파는 해수면의 주기적인 상하 운동으로 에너지를 전파하는 현상임을 알고, 파의 모양에 따라 해파를 풍랑과 너울로 구분하며, 파장과 수심의 관계에 따라 해파를 천해파, 전이파, 심해파로 분류하고, 천해파와 심해파를 발생시키는 실험을 수행할 수 있다.","C":"해파는 해수면의 주기적인 상하 운동으로 에너지를 전파하는 현상임을 알고, 해파의 발생 및 전파 실험에서 파의 모양을 관찰하여 풍랑, 너울과 관련지으 며, 파장과 수심의 관계에 따라 해파를 천해파와 심해파로 분류할 수 있다.","D":"해파는 해수면의 주기적인 상하 운동임을 알고, 해파의 발생 및 전파 실험에서 파의 모양을 관찰하며, 파장과 수심의 관계에 따라 해파를 천해파와 심해파로 분류할 수 있다.","E":"해파는 해수면의 주기적인 상하 운동임을 알고, 해파의 발생 및 전파 실험에서 파의 모양을 관찰할 수 있다."},"12지시02-03":{"A":"해일을 발생 원인에 따라 폭풍 해일과 지진 해일로 구분하여 설명하고, 해일 발생 당시의 기압, 만조 시기, 해안 및 해저 지형에 따른 피해 사례를 조사하여 발표하며, 해일 피해에 대한 과학적 대처 방안을 제안할 수 있다.","B":"해일을 발생 원인에 따라 폭풍 해일과 지진 해일로 구분하여 설명하고, 해일의 피해가 달라질 수 있는 원인으로 기압, 만조 시기, 해안 및 해저 지형을 제시하 며, 해일의 피해 사례와 대처 방안을 조사하여 발표할 수 있다.","C":"해일을 발생 원인에 따라 폭풍 해일과 지진 해일로 구분하고, 해일의 피해 사례와 대처 방안을 조사하여 발표할 수 있다.","D":"해일로 인한 피해 사례로부터 재해ㆍ재난 관리의 중요성을 인식하고, 해일 대처 방안을 제시할 수 있다.","E":"해일로 인한 피해 사례로부터 재해ㆍ재난 관리의 중요성을 인식한다."},"12지시02-04":{"A":"기조력으로 조석이 발생하는 과정을 이해하고, 달에 의한 기조력과 태양에 의한 기조력의 크기를 비교·설명하며, 전 지구 규모의 빅데이터와 시뮬레이션 을 통해 각 지역에서의 조석 양상의 차이점과 조석 현상의 패턴을 추론할 수 있다.","B":"기조력으로 조석이 발생하는 과정을 이해하고, 달에 의한 기조력과 태양에 의한 기조력의 크기를 비교·설명하며, 전 지구 규모의 빅데이터와 시뮬레이션 을 통해 각 지역에서의 조석 양상을 설명할 수 있다.","C":"기조력으로 조석이 발생하는 과정을 이해하고, 달에 의한 기조력이 태양에 의한 기조력보다 크다는 것을 제시하며, 전 지구 규모의 빅데이터와 시뮬레이 션을 통해 각 지역에서의 조석 양상이 다름을 파악할 수 있다.","D":"기조력으로 조석이 발생함을 알고, 해수면 높이 변화 자료에서 조석 주기와 조차를 구할 수 있다.","E":"기조력으로 조석이 발생함을 말할 수 있다."}},"area":{"A":{"지식·이해":"지형류가 흐르는 방향과 발생 원리를 에크만 수송과 관련지어 설명하고, 지형류에 서 수압 경도력, 전향력 등 해수를 움직이는 힘과 정역학 평형을 정량적으로 설명 할 수 있다. 해파가 해수면의 주기적인 상하 운동으로 에너지를 전파하는 현상임을 알고, 파의 모양에 따라 해파를 풍랑과 너울로 구분하며, 천해파, 전이파, 심해파의 차이점을 비교하여 이해하고, 해일을 발생 원인에 따라 폭풍 해일과 지진 해일로 구분하여 설명하며. 해일의 피해가 기압, 만조 시기, 해안 및 해저 지형에 따라 달라질 수 있음을 설명할 수 있다. 기조력으로 조석이 발생하는 과정을 이해하고, 달에 의한 기조력과 태양에 의한 기 조 력 의 크기를 비교하여 설명할 수 있 다.","과정·기능":"지형류에서 수압 경도력, 전향력 등 해수를 움직이는 힘과 정역학 평형을 정량적 으로 구하고, 파장과 수심의 관계를 고려하여 천해파와 심해파를 발생시키는 실험 을 설계하고 수행할 수 있다. 해일 발생 당시의 기압, 만조 시기, 해안 및 해저 지형에 따른 피해 사례를 조사하 여 발표하고, 지구 규모의 빅데이터와 시뮬레이션을 통해 각 지역에서의 조석 양상의 차이점과 조석 현상의 패턴을 추론할 수 있다.","가치·태도":"해일로 인한 피해 사례로부터 재해ㆍ재난의 사회적 관리의 중요성을 인식하고, 해일 피해에 대한 과학적 대처 방안을 제안할 수 있다."},"B":{"지식·이해":"지형류가 흐르는 방향과 발생 원리를 에크만 수송과 관련지어 설명하고, 지형류에 서 수압 경도력, 전향력 등 해수를 움직이는 힘을 정량적으로 설명할 수 있다. 해파는 해수면의 주기적인 상하 운동으로 에너지를 전파하는 현상임을 알고, 파의 모양 에 따라 해파를 풍랑과 너울로 구분하며, 천해파와 심해파를 분류하는 기준을 제시하며, 해일을 발생 원인에 따라 폭풍 해일과 지진 해일로 구분하여 설명하고, 해일의 피해가 달라질 수 있는 원인으로 기압, 만조 시기, 해안 및 해저 지형을 제시할 수 있다. 기조력으로 조석이 발생하는 과정을 이해하고, 달에 의한 기조력과 태양에 의한 기 조 력 의 크기를 비교하여 설명할 수 있 다.","과정·기능":"지형류에서 수압 경도력, 전향력 등 해수를 움직이는 힘을 정량적으로 구하고, 파 장과 수심의 관계에 따라 천해파와 심해파를 발생시키는 실험을 수행할 수 있다. 다양한 원인에 따른 해일의 피해 사례와 대처 방안을 조사하여 발표하고, 전 지구 규모의 빅데이터와 시뮬레이션을 통해 각 지역에서의 조석 양상을 파악할 수 있다.","가치·태도":"해일로 인한 피해 사례로부터 재해ㆍ재난의 사회적 관리의 중요성을 인식하고, 다양한 원인에 따른 해일 피해 대처 방안을 제시할 수 있다."},"C":{"지식·이해":"에크만 수송의 방향과 이로 인해 흐르는 지형류의 방향을 제시하고, 수압 경도력 과 전향력에 의해 지형류가 형성됨을 설명할 수 있다. 해파는 해수면의 주기적인 상하 운동으로 에너지를 전파하는 현상임을 알고, 천해 파와 심해파를 분류하는 기준을 제시하며, 해일을 발생 원인에 따라 폭풍 해일과 지진 해일로 구분할 수 있다. 기조력으로 조석이 발생하는 과정을 이해하고, 달에 의한 기조력이 태양에 의한 기조력보다 크다는 것을 제시할 수 있다.","과정·기능":"해파의 발생 및 전파 실험에서 파의 모양을 관찰하여 풍랑, 너울과 관련짓고, 파장 과 수심의 관계에 따라 해파를 천해파와 심해파로 분류할 수 있다. 전 지구 규모의 빅데이터와 시뮬레이션을 통해 각 지역에서의 조석 양상이 다름을 파악할 수 있다.","가치·태도":"해일의 피해 사례로부터 재해ㆍ재난의 사회적 관리의 중요성을 인식하고 그 피해 사례와 대처방안을 조사하여 발표할 수 있다."},"D":{"지식·이해":"바람에 의해 에크만 수송이 일어나고 이로 인해 지형류가 형성됨을 알고, 해파는 해수면의 주기적인 상하 운동임을 말하며, 천해파와 심해파를 분류하는 기준을 제시할 수 있다. 해일 대처 방안을 알고, 기조력으로 조석이 발생함을 말할 수 있다.","과정·기능":"해파의 발생 및 전파 실험에서 파의 모양을 관찰하고, 파장과 수심의 관계에 따라 해파를 천해파와 심해파로 분류할 수 있다. 해수면 높이 변화 자료에서 조석 주기와 조차를 구할 수 있다.","가치·태도":"해일로 인한 피해 사례로부터 재해ㆍ재난의 사회적 관리의 중요성을 인식하고, 해일 대처 방안을 제시할 수 있다."},"E":{"지식·이해":"바람에 의해 에크만 수송이 일어남을 알고, 해파는 해수면의 주기적인 상하 운동 임을 말할 수 있다. 기조력으로 조석이 발생함을 말할 수 있다.","과정·기능":"해파의 발생 및 전파 실험에서 파의 모양을 관찰할 수 있다.","가치·태도":"해일로 인한 피해 사례로부터 재해ㆍ재난의 사회적 관리의 중요성을 인식한다."}}},"지시-03":{"codes":{"12지시03-01":{"A":"지구 대기를 구성하는 기체들이 태양 복사 에너지와 지구 복사 에너지를 파장 에 따라 선택적으로 흡수하는 과정을 설명하고, 온실효과, 태양 자외선 차단 효과, 물의 존재 등을 근거로 지구 생명체 존재 조건을 추론하며, 이 과정에서 생명가능지대에 위치한 지구의 경이로움을 인식한다.","B":"지구 복사 에너지와 태양 복사 에너지 파장별 에너지 분포 차이와 대기를 구성 하는 기체들이 선택적 흡수체임을 알고, 온실효과, 태양 자외선 차단 효과, 물의 존재 등을 근거로 생명체가 발생하고 존재할 수 있는 환경으로서 지구의 경이로움을 인식한다.","C":"대기를 구성하는 기체들이 파장에 따라 복사 에너지 흡수율이 다름을 알고, 지구 생명체 존재 조건으로 온실효과, 태양 자외선 차단 효과, 물의 존재 등을 제시하며, 생명체가 존재할 수 있는 지구 환경의 경이로움을 인식한다.","D":"지구 생명체 존재 조건으로 지구 대기의 온실효과, 태양 자외선 차단 효과, 물의 존재 등을 제시하고, 생명체가 존재할 수 있는 지구 환경의 경이로움을 인식한다.","E":"지구에 물이 존재함으로써 지구 생명체가 존재할 수 있음을 말하고, 생명체가 존재하는 지구의 경이로움을 인식한다."},"12지시03-02":{"A":"지표와 대기의 열 출입을 물리 과정을 바탕으로 설명하고, 전 지구의 평균 열수지를 해석하여 복사 평형 상태를 이룸과 잠열의 효과가 가장 큼을 파악하 며, 시뮬레이션 등의 활동을 통해 지구 열수지와 지구온난화의 관련성을 추론할 수 있다.","B":"지표와 대기의 열 출입과 관련된 물리 과정을 설명하고, 전 지구의 평균 열수 지를 해석하여 복사 평형 상태를 이룸과 잠열의 효과가 가장 큼을 파악하며, 시뮬레이션 등의 활동을 통해 지구온난화로 인해 지구 열수지가 변화할 수 있음을 추론할 수 있다.","C":"지표와 대기의 열 출입과 관련된 물리 과정을 구분하고, 전 지구의 평균 열수 지를 해석하여 복사 평형 상태를 이룸을 파악할 수 있다.","D":"지표와 대기에서 출입하는 열의 총량을 비교하여 전 지구의 평균 열수지가 복 사 평형 상태임을 파악할 수 있 다.","E":"전 지구의 평균 열수지가 복사 평형 상태임을 말할 수 있다."},"12지시03-03":{"A":"단열선도를 이용하여 대기 안정도를 해석하고 상승 응결 고도를 찾으며, 단열 변화를 통해 여러 유형의 안개나 구름이 생성되는 과정을 분석하고, 빙정설과 병 합 설 을 설명할 수 있 다.","B":"단열선도를 이용하여 대기의 안정도를 해석하고 상승 응결 고도를 찾으며, 단 열변화를 통해 생성될 수 있는 구름의 유형을 추론할 수 있다.","C":"단열변화에서 기온과 습도의 변화를 이해하고, 단열선도를 이용하여 대기의 안정도를 해석하고 상승 응결 고도를 찾을 수 있다.","D":"단열변화에서 기온과 습도의 변화를 이해하고, 기온의 연직 분포와 단열 감률 을 비교하여 대기의 안정도를 판단할 수 있다.","E":"기온 감률과 단열 감률을 비교하여 대기의 안정도를 판단할 수 있다."},"12지시03-04":{"A":"기압의 연직 분포로 정역학 평형 상태를 설명하고, 대기의 운동에 영향을 미치는 여러 가지 힘의 방향을 찾고 크기를 구하며, 변인을 고려하여 회전원판을 이용 한 전향 효과 실험을 설계·수행하고, 대기의 연직 운동을 발생시키는 원인을 추론할 수 있다.","B":"기압의 연직 분포로 정역학 평형 상태를 설명하고, 대기의 운동에 영향을 미치 는 여러 가지 힘의 방향을 찾고 크기를 구하며, 변인을 고려하여 회전원판을 이용한 전향 효과 실험을 설계·수행할 수 있다.","C":"기압의 연직 분포로 정역학 평형 상태를 설명하고, 대기의 운동에 영향을 미치 는 여러 가지 힘의 방향을 찾으며, 회전원판을 이용한 전향 효과 실험을 안내 된 절차에 따라 수행할 수 있다.","D":"대기는 정역학 평형 상태임을 알고, 대기의 운동에 영향을 미치는 힘의 명칭을 제시하며, 회전원판을 이용한 전향 효과 실험을 안내된 절차에 따라 수행할 수 있다.","E":"대기는 정역학 평형 상태임을 알고, 회전원판을 이용한 전향 효과 실험에 참여 하여 결과를 기록할 수 있다."},"12지시03-05":{"A":"지균풍, 경도풍, 지상풍의 발생 원리와 관련된 힘의 작용을 힘의 평형과 관련 지어 설명하고, 상층 및 지상 일기도에서 각 바람의 풍향과 풍속을 추론할 수 있다.","B":"지균풍, 경도풍, 지상풍의 발생 원리와 관련된 힘의 작용을 힘의 평형과 관련 지어 설명할 수 있다.","C":"지균풍, 경도풍, 지상풍을 상층 또는 지상에서 부는 바람으로 구분하고, 지상 풍 중 등압선이 직선일 때 작용하는 힘의 종류를 관련지을 수 있다.","D":"상층과 지상에서 부는 바람의 차이점을 마찰력의 작용 여부로 설명하고, 지균 풍, 경도풍, 지상풍을 상층 또는 지상에서 부는 바람으로 구분할 수 있다.","E":"지상과 상층에 부는 바람의 종류가 마찰력의 작용 여부에 따라 다름을 말할 수 있다."},"12지시03-06":{"A":"대기 대순환과 태양 상수를 이해하고, 행성파 시뮬레이션을 통해 행성파의 발달 과정 및 영향을 설명하며, 상층 일기도를 효과 실험을 설계·수행하고, 행성파의 발달 과 정 및 영향을 보여주는 시뮬레이션을 수행할 수 있다.","가치·태도":"온실효과, 태양 자외선 차단 효과, 물의 존재 등을 근거로 생명체가 발생하고 존재 할 수 있는 환경으로서 지구의 경이로움을 인식한다."},"C":{"지식·이해":"대기를 구성하는 기체들이 파장에 따라 복사 에너지 흡수율이 다름을 알고, 지구 생명체 존재 조건으로 온실효과, 태양 자외선 차단 효과, 물의 존재 등을 제시하 며, 지표와 대기의 열 출입과 관련된 물리 과정을 구분하고, 전 지구의 평균 열수 지 가 복사 평형 상태임을 설명할 수 있 다. 단열변화에서 기온과 습도의 변화를 이해하고, 기압의 연직 분포로 정역학 평형 상태를 설명하며, 대기의 운동에 영향을 미치는 여러 가지 힘의 방향을 제시하고, 지균풍, 경도풍, 지상풍을 상층 또는 지상에서 부는 바람으로 구분하며, 지상풍 중 등압선이 직선일 때 작용하는 힘의 종류를 관련지을 수 있다. 대기 대순환과 태양 상수를 이해하고, 행성파의 발달 과정을 순서대로 배열하며, 편서풍 파동과 지상 고ㆍ저기압 발달의 관련성에 대하여 설명할 수 있다.","과정·기능":"전 지구의 평균 열수지를 해석하여 복사 평형 상태를 이룸을 파악하고, 단열선도 를 이용하여 대기의 안정도를 해석하고 상승 응결 고도를 찾을 수 있다. 대기의 운동에 영향을 미치는 여러 가지 힘의 방향을 찾고, 회전원판을 이용한 전향 효과 실험을 안내된 절차에 따라 수행할 수 있다.","가치·태도":"지구 대기의 온실효과, 태양 자외선 차단 효과, 물의 존재 등 생명체가 존재할 수 있는 지구 환경의 경이로움을 인식한다."},"D":{"지식·이해":"지구 생명체 존재 조건으로 지구 대기의 온실효과, 태양 자외선 차단 효과, 물의 존재 등을 제시하고, 전 지구의 평균 열수지가 복사 평형 상태임을 설명할 수 있다. 단열변화에서 기온과 습도의 변화를 이해하고, 대기는 정역학 평형 상태임을 말하 며, 대기의 운동에 영향을 미치는 힘의 명칭을 제시할 수 있다. 상층과 지상에서 부는 바람의 차이점을 마찰력의 작용 여부로 설명하고, 지균풍, 경도풍, 지상풍을 상층 또는 지상에서 부는 바람으로 구분하며, 행성파의 발달 과정을 순서대로 배열하고, 편서풍 파동이 지상의 고ㆍ저기압 발달과 관련되어 있음을 말할 수 있다.","과정·기능":"지표와 대기에서 출입하는 열의 총량을 비교하여 전 지구의 평균 열수지가 복사 평형 상태임을 파악하고, 기온의 연직 분포와 단열 감률을 비교하여 대기의 안정 도를 판단할 수 있다. 회전원판을 이용한 전향 효과 실험을 안내된 절차에 따라 수행할 수 있다.","가치·태도":"지구 대기의 온실효과, 태양 자외선 차단 효과, 물의 존재 등 생명체가 존재할 수 있는 지구 환경의 경이로움을 인식한다."},"E":{"지식·이해":"지구에 물이 존재함으로써 지구 생명체가 존재할 수 있음을 알고, 전 지구의 평균 열수지가 복사 평형 상태임과 대기가 정역학 평형 상태임을 말할 수 있다. 지상과 상층에 부는 바람의 종류가 마찰력의 작용 여부에 따라 다름을 알고, 편서 풍 파동이 지상의 고ㆍ저기압의 발달에 영향을 미침을 말할 수 있다.","과정·기능":"기온 감률과 단열 감률을 비교하여 대기의 안정도를 판단하고, 회전원판을 이용한 전향 효과 실험에 참여하여 결과를 기록할 수 있다.","가치·태도":"물과 생명체가 존재하는 지구의 경이로움을 인식한다."}}},"행우-01":{"codes":{"12행우01-01":{"A":"태양계 탐사 프로젝트의 활동과 성과를 조사하여 공유하고, 우리나라의 우주 개발 성과와 계획을 설명하며, 인공위성을 활용한 우주탐사의 필요성에 대해 과학적 증거를 바탕으로 토론할 수 있다.","B":"태양계 탐사 프로젝트의 활동과 성과를 조사하여 공유하고, 인공위성을 활용 한 우주탐사의 필요성에 대해 과학적 증거를 바탕으로 토론할 수 있다.","C":"태양계 탐사 프로젝트의 활동과 성과를 조사하여 공유하고, 인공위성을 활용 한 우주탐사의 필요성에 대한 주장과 근거를 연결할 수 있다.","D":" 지대의 의미를 알고, 외계 행성계 탐사의 원리를 설명할 수 있다.","과정·기능":"태양계 탐사 프로젝트의 활동과 성과를 조사하여 공유하고, 인공위성을 활용한 우주탐사의 필요성에 대해 과학적 증거를 바탕으로 토론할 수 있다. 태양 활동 감시 시스템의 실생활 관련성을 조사하고, 소천체 탐사 자료를 통해 태양계 행성과 소천체의 특징을 추론하며, 천체 망원경을 이용하여 행성을 관측할 수 있다. 중심별의 표면 온도에 따라 생명가능지대를 추론하며, 외계 행성에 생명체가 존재 할 수 있는 조건과 외계 생명체의 존재 가능성에 대해 논증할 수 있다.","가치·태도":"우주 재난 측면에서 태양 활동 감시 시스템의 유용성과 우주 위험 감시 기술의 중요성을 인식한다."},"B":{"지식·이해":"인공위성을 활용한 우주탐사의 필요성을 이해하고, 우주기상이 태양 활동과 관련됨 을 말하며, 우주 위험에서 우주기상, 소천체 충돌, 우주 쓰레기를 구분할 수 있다. 태양계를 지배하는 힘이 태양의 중력임을 알고, 케플러의 세 가지 법칙을 이용하 여 태양계 구성 천체들의 운동을 설명하며, 태양계 행성과 소천체의 정의를 알고 이들의 특징을 설명할 수 있다. 태양계 밖에 외계 행성이 존재함을 알고, 생명가능지대의 의미를 설명할 수 있다.","과정·기능":"태양계 탐사 프로젝트의 활동과 성과를 조사하여 공유하고, 인공위성을 활용한 우주탐사의 필요성에 대해 과학적 증거를 바탕으로 토론할 수 있다. 태양 활동 감시 시스템의 실생활 관련성을 조사하고, 소천체 탐사 자료를 바탕으 로 태양계 행성과 소천체의 특징을 구분하며, 천체 망원경을 이용하여 행성을 관측할 수 있다. 중심별의 표면 온도에 따라 생명가능지대를 추론하고, 외계 행성에 생명체가 존재 할 수 있는 조건과 외계 생명체의 존재 가능성에 대해 토론할 수 있다.","가치·태도":"우주 재난 측면에서 태양 활동 감시 시스템의 유용성과 우주 위험 감시 기술의 중요성을 인식한다."},"C":{"지식·이해":"인공위성을 활용한 우주탐사의 필요성에 대한 주장과 근거를 연결할 수 있고, 우주기상이 태양 활동과 관련됨을 말할 수 있다. 태양계를 지배하는 힘이 태양의 중력임을 알고, 케플러 제1법칙을 이용하여 태양 계 구성 천체들의 운동을 케플러의 법칙으로 설명하며, 태양계 행성과 소천체의 정의를 바탕으로 이들의 종류를 구분할 수 있다. 태양계 밖에 외계 행성이 존재함을 알고, 외계 행성에 생명체가 존재할 수 있는 조건을 추론할 수 있다.","과정·기능":"태양계 탐사 프로젝트의 활동과 성과를 조사하여 공유할 수 있다. 태양 활동 감시 시스템의 실생활 관련성을 조사하고, 천체 망원경을 이용하여 행성을 관측할 수 있다. 외계 행성에 생명체가 존재할 수 있는 조건과 외계 생명체의 존재 가능성에 대해 토론할 수 있다.","가치·태도":"우주 재난 측면에서 태양 활동 감시 시스템의 유용성을 인식한다."},"D":{"지식·이해":"태양계 탐사선의 활동을 통해 알아낸 성과를 행성 탐사선과 소천체 탐사선으로 구분하고, 우주기상이 태양 활동과 관련됨을 말할 수 있다. 태양계를 지배하는 힘이 태양의 중력임과 태양계 구성 천체들의 운동은 케플러의 법칙으로 설명할 수 있음을 알고, 태양계 행성과 소천체를 구분할 수 있다. 태양계 밖에 외계 행성이 존재함을 말할 수 있다.","과정·기능":"안내된 절차에 따라 천체 망원경을 이용하여 행성을 관측할 수 있고, 외계 생명체 의 존재 가능성에 대해 자신의 의견을 주장할 수 있다.","가치·태도":"인공위성을 활용한 우주탐사의 유용성과 우주 재난 측면에서 태양 활동 감시 시스 템의 유용성을 인식한다."},"E":{"지식·이해":"태양계 탐사선 활동을 통해 알아낸 성과가 있음을 알고, 지구를 위협하는 우주 위험의 사례를 제시할 수 있다. 태양계를 지배하는 힘이 태양의 중력임을 알고, 태양계 행성과 소천체를 구분할 수 있다.","과정·기능":"외계 생명체의 존재 가능성에 대해 자신의 의견을 주장할 수 있다.","가치·태도":"우주탐사의 유용성과 우주 재난의 심각성을 인식한다."}}},"행우-02":{"codes":{"12행우02-01":{"A":"태양 광구와 대기에서 나타나는 현상을 설명하고, 이러한 현상이 다양한 파장 의 관측 자료에서 어떻게 나타나는지 비교ㆍ분석하며, 태양 흑점의 이동 자료 를 이용하여 위도별 태양의 자전주기를 계산ㆍ비교할 수 있다.","B":"태양 광구와 대기에서 나타나는 현상을 설명하고, 이러한 현상이 다양한 파장 의 관측 자료에서 어떻게 나타나는지 비교하며, 태양 관측 자료에서 흑점의 이동을 분석하여 태양의 자전주기를 계산할 수 있다.","C":"태양 광구와 대기에서 나타나는 현상의 명칭과 특징을 연결하고, 태양 관측 자료에서 흑점의 이동을 분석하여 위도별 태양의 자전주기가 다름을 추론할 수 있다.","D":"태양 광구와 대기에서 나타나는 현상을 나열하고, 태양 관측 자료에서 흑점의 이동을 분석하여 태양이 자전함을 추론할 수 있다.","E":"태양 광구와 대기에서 다양한 현상이 나타남을 알고, 태양 관측 자료에서 흑점 의 이동을 파악할 수 있다."},"12행우02-02":{"A":"별의 시차와 밝기를 이용해 거리를 측정하는 다양한 방법을 비교ㆍ평가하고, 연주시차와 거리지수 자료로부터 별의 거리를 구할 수 있다.","B":"별의 시차와 밝기를 이용해 거리를 측정하는 방법을 설명하고, 연주시차와 거리지수 자료로부터 별의 거리를 구할 수 있다.","C":"별의 시차와 밝기를 이용해 거리를 측정하는 방법을 설명할 수 있다.","D":"별의 거리를 측정할 때 시차와 밝기를 이용할 수 있음을 말할 수 있다.","E":"별의 거리를 측정하는 방법이 다양함을 말할 수 있다."},"12행우02-03":{"A":"별의 시선속도, 접선속도와 관련된 관측 자료를 분석하여 공간 운동을 계산하 고, 별의 물리량 자료를 수집ㆍ해석하여 별자리의 공간 분포를 입체적으로 표현하고 장시간에 걸친 형태 변화를 추론하는 과정에서 과학적 유용성을 인 식한다.","B":"별의 시선속도와 접선속도 자료로부터 공간 운동을 계산하고, 별의 물리량 자료를 수집ㆍ해석하여 별자리의 공간 분포를 입체적으로 표현하고 장시간에 걸친 형태 변화를 추론하는 과정에서 과학적 유용성을 인식한다.","C":"별의 시선속도와 접선속도 자료로부터 공간 운동을 계산하고, 별의 물리량 자료를 수집ㆍ해석하여 별자리의 공간 분포를 입체적으로 표현하는 과정에 흥미를 가진다.","D":"별의 공간 운동이 시선속도와 접선속도의 합으로 나타남을 알고, 제시된 별의 물리량 자료로부터 별자리의 공간 분포를 입체적으로 표현하고, 별자리의 공 간 분포에 흥미를 가진다.","E":"별의 공간 운동이 시선속도와 접선속도로 관측됨을 알고, 별자리를 구성하는 별들이 실제로는 입체적으로 분포함에 관심을 가진다."},"12행우02-04":{"A":"쌍성의 관측 자료와 케플러 법칙을 이용하여 쌍성계를 구성하는 별의 질량을 구하고, 쌍성의 질량과 절대등급 자료를 분석하여 주계열성의 질량-광도 관계 를 도출하며, 이를 적용하여 쌍성이 아닌 별의 질량을 구할 수 있다.","B":"쌍성의 관측 자료와 케플러 법칙을 이용하여 쌍성계를 구성하는 별의 질량을 구하고, 쌍성의 질량과 절대등급 자료를 분석하여 주계열성의 질량-광도 관계 를 도출할 수 있다.","C":"쌍성의 관측 자료와 케플러 법칙을 이용하여 쌍성계를 구성하는 별의 질량을 구할 수 있음을 알고, 질량-광도 관계를 이용하여 쌍성이 아닌 주계열성의 질량을 구할 수 있음을 말할 수 있다.","D":"쌍성의 관측 자료를 이용하여 쌍성계를 구성하는 별의 질량을 구할 수 있음을 알고, 주계열성에 질량-광도 관계가 성립함을 말할 수 있다.","E":"쌍성의 관측 자료를 이용하여 별의 질량을 구할 수 있음을 말할 수 있다."},"12행우02-05":{"A":"맥동변광성과 폭발 변광성 광도곡선의 특징을 비교ㆍ설명하고, 폭발 변광성 중 초신성 관측 자료를 통해 알 수 있는 과학적 사실을 추론할 수 있다.","B":"맥동변광성과 폭발 변광성 광도곡선의 특징을 비교ㆍ설명하고, 폭발 변광성 중 초신성 관측 자료와 이를 통해 알 수 있는 과학적 사실을 연결할 ":"은하에 암흑 물질이 존재함을 알고, 빛을 내는 물질만으로 예측한 은하의 회전 속도 곡선과 실제 은하의 회전 속도 곡선이 다름을 파악할 수 있다.","E":"은하에 암흑 물질이 존재함을 말할 수 있다."},"12행우03-04":{"A":"대규모로 이루어진 외부은하의 적색 편이 탐사의 성과를 설명하고, 분광 관측 을 통해 적색 편이를 측정하고 은하의 거리를 추정하는 과정에 대한 이해를 바탕으로 은하의 공간 분포를 파악함에 있어서 분광 관측 자료의 중요성을 인식한다.","B":"대규모로 이루어진 외부은하의 적색 편이 탐사의 성과 중 하나로 은하의 공간 분포를 파악했음을 제시하고, 적색 편이에 대한 이해를 바탕으로 외부은하의 거리 추정에 필요한 분광 관측 자료의 유용성을 인식한다.","C":"대규모 탐사를 통해 은하의 공간 분포를 알아내 왔음을 알고, 적색 편이에 대한 이해를 바탕으로 외부은하의 거리 추정에 필요한 분광 관측 자료의 유용 성을 인식한다.","D":"대규모 탐사를 통해 은하의 공간 분포를 알아내 왔음을 알고, 외부은하의 거리 추정에 필요한 분광 관측 자료의 유용성을 인식한다.","E":"분광 관측 자료를 바탕으로 외부은하의 거리 추정을 할 수 있음에 호기심을 가진다."},"12행우03-05":{"A":"은하의 공간 분포 자료에서 여러 규모의 은하 집단과 다양한 구조를 식별ㆍ설 명하고, 은하 장성, 보이드 등 우주 거대 구조를 현대 우주론과 관련지어 설명 할 수 있다.","B":"은하의 공간 분포 자료에서 여러 규모의 은하 집단과 다양한 구조를 식별하고, 현대 우주론으로 우주 거대 구조의 형성을 설명할 수 있음을 말할 수 있다.","C":"은하의 공간 분포 자료에서 은하단, 보이드 등 다양한 구조를 식별하고, 여러 규모의 은하 집단이 모여 우주 거대 구조를 이룸을 말할 수 있다.","D":"은하의 공간 분포 자료에서 은하가 균일하게 분포하지 않음을 파악하고, 은하 집단이 모여 우주 거대 구조를 이룸을 말할 수 있다.","E":"은하들이 이루는 우주 거대 구조가 존재함을 말할 수 있다."}},"area":{"A":{"지식·이해":"성단의 C-M도를 이용하여 성단의 나이를 비교하는 방법과 주계열 맞추기 및 맥동변광성의 주기-광도 관계를 이용하여 천체의 거리를 구하는 방법을 알고, 천체의 거리를 구하는 과정이 거리 규모에 따라 다른 이유를 설명할 수 있다. 성간 소광이 성간 물질에 의해 나타남을 알고, 성간 기체와 성간 티끌을 구분하며, 성간 티끌의 특징을 바탕으로 성간 소광에 의한 관측 결과를 보정해야 하는 이유 를 설명할 수 있다. 빛을 내는 물질만으로 예측한 은하의 회전 속도 곡선과 실제 은하의 회전 속도 곡선이 다른 이유를 케플러 회전과 암흑 물질의 존재로 설명할 수 있다. 대규모로 이루어진 외부은하의 적색 편이 탐사의 성과와 분광 관측을 통해 적색 편이를 측정하고 은하의 거리를 추정하는 과정을 설명할 수 있다. 여러 규모의 은하 집단과 다양한 구조를 구분ㆍ설명하고, 우주 거대 구조를 현대 우주론과 관 련 지 어 설명할 수 있 다.","과정·기능":"성단의 C-M도를 이용하여 성단의 나이를 비교하고, 주계열 맞추기를 이용하여 성단의 거리를 구하며, 맥동변광성의 주기-광도 관계를 이용하여 우리은하의 구 조와 규모를 추론하고, 성간 소광 자료를 통해 성간 티끌의 존재를 추론할 수 있다. 빛을 내는 물질만으로 예측한 은하의 회전 속도 곡선과 실제 은하의 회전 속도 곡선이 다름을 파악하고, 은하의 회전 속도 곡선을 해석하여 질량 분포를 추론할 수 있다. 은하의 공간 분포 자료에서 여러 규모의 은하 집단과 다양한 구조를 식별할 수 있다.","가치·태도":"은하의 공간 분포를 파악함에 있어서 분광 관측 자료의 중요성을 인식한다."},"B":{"지식·이해":"성단의 C-M도를 이용하여 성단의 나이를 비교하는 방법과 주계열 맞추기 및 맥동변광성의 주기-광도 관계를 이용하여 천체의 거리를 구하는 방법을 알고, 천체의 거리를 구하는 과정이 거리 규모에 따라 다름을 말할 수 있다. 성간 소광이 성간 물질에 의해 나타남을
