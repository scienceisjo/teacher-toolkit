도와 지표 상태에 따라 가열 정도가 달라 기압 차가 생기고, 그 결과 공기가 이동하여 바람이 분다.","rubric":"핵융합과 질량-에너지 전환(1점, 정성적) + 지구 가열의 불균등(1점) + 기압 차 → 바람(1점)."},{"level":"상","code":"10통과2-02-06","q":"어떤 전등이 소비한 전기 에너지의 20%만 빛으로 바뀐다면 에너지 효율은 얼마이며, 나머지 에너지는 어떻게 되는지 쓰시오. 또 에너지 효율을 높이는 것이 왜 환경 문제 해결에 도움이 되는지 설명하시오.","answer":"에너지 효율은 20%이다. 나머지 80%는 주로 열로 방출되며, 에너지 총량은 보존되지만 다시 쓰기 어려운 형태가 된다. 효율을 높이면 같은 밝기를 얻는 데 필요한 전기 에너지가 줄어들고, 그만큼 발전에 쓰이는 화석 연료와 온실기체 배출을 줄일 수 있어 환경 문제 해결에 도움이 된다.","rubric":"효율 20%(1점) + 열로 전환·에너지 보존(1점) + 발전량·온실기체 감소로 연결(1점)."}]}},"h2-03":{"diag":{"from":"중 「과학과 인류의 지속가능한 삶」·「과학과 나의 미래」","items":[{"type":"선택형","q":"과학기술의 발전에 대한 설명으로 가장 알맞은 것은?","choices":["① 항상 좋은 결과만 가져온다","② 항상 나쁜 결과만 가져온다","③ 유용성과 한계를 함께 가진다","④ 사회와 관계가 없다"],"answer":"③","checks":"과학기술의 양면성 [9과01-02]","miscon":"기술을 무조건 긍정 또는 부정으로만 보는 이분법. 사례로 균형을 잡아줄 것."},{"type":"선택형","q":"감염병 확산을 막는 데 과학이 기여한 사례로 알맞은 것은?","choices":["① 백신과 진단 검사 개발","② 소문 퍼뜨리기","③ 통계 감추기","④ 아무것도 하지 않기"],"answer":"①","checks":"과학의 유용성 [4과08-02 연계]","miscon":"과학의 기여를 치료제로만 한정. 진단·추적·예방까지 포함됨을 안내."},{"type":"서답형","q":"인공지능이 우리 생활에서 쓰이는 예를 하나 쓰고, 그로 인해 걱정되는 점이 있으면 쓰시오.","answer":"예) 추천 알고리즘이 볼 영상을 골라 준다. 편리하지만 비슷한 정보만 계속 보게 되어 생각이 한쪽으로 치우칠 수 있다.","checks":"과학기술의 양면성 인식","miscon":"편리함만 떠올리는 경우. 한계·위험도 함께 생각하도록 유도."}]},"form":{"items":[{"level":"하","code":"10통과2-03-02","q":"빅데이터가 활용되는 과학기술 분야를 두 가지 쓰시오.","answer":"예) 기상 관측·예보, 유전체 분석, 신약 개발, 교통 흐름 분석, 감염병 확산 예측 등","rubric":"두 가지를 바르게 쓰면 도달."},{"level":"중","code":"10통과2-03-02","q":"빅데이터 활용의 장점과 문제점을 각각 하나씩 쓰고, 문제점을 줄이기 위한 방안을 제안하시오.","answer":"장점: 많은 자료를 분석해 감염병 확산이나 기상 변화를 정확히 예측할 수 있다. 문제점: 개인 정보가 수집·노출되어 사생활이 침해될 수 있고, 편향된 자료로 잘못된 결론을 낼 수 있다. 방안: 개인을 식별할 수 없게 익명 처리하고, 수집 목적과 범위를 미리 알리고 동의를 받는다.","rubric":"장점(1점) + 문제점(1점) + 구체적 해결 방안(1점)."},{"level":"상","code":"10통과2-03-04","q":"유전자 편집 기술을 사람에게 적용하는 문제에 대해 찬성과 반대 입장의 근거를 각각 제시하고, 과학 윤리가 왜 필요한지 자신의 견해를 쓰시오.","answer":"찬성: 유전 질환을 근본적으로 치료해 고통을 줄일 수 있다. 반대: 안전성이 충분히 검증되지 않았고 다음 세대에까지 영향을 주며, 능력 향상 목적으로 쓰이면 새로운 불평등이 생길 수 있다. 견해: 과학기술은 되돌리기 어려운 영향을 줄 수 있으므로, 무엇을 할 수 있는가와 무엇을 해야 하는가를 구분하는 과학 윤리와 사회적 합의가 필요하다.","rubric":"찬성 근거(1점) + 반대 근거(1점) + 과학 윤리의 필요성에 대한 논증(2점). 한쪽 입장만 쓰면 절반."}]}},"과사-01":{"diag":{"from":"중 「과학과 인류의 지속가능한 삶」 (공식 선수 단원 없음)","items":[{"type":"선택형","q":"과학의 발전이 인류 문명에 미친 영향으로 보기 <b>어려운<\/b> 것은?","choices":["① 농업 생산량 증가","② 질병 치료법 개발","③ 통신 수단의 발달","④ 계절의 변화"],"answer":"④","checks":"과학과 문명 [9과01-02]","miscon":"자연 현상과 인간 활동의 산물을 구분하지 못하는 경우."},{"type":"선택형","q":"고대 사람들이 별의 움직임을 관찰한 가장 큰 실용적 이유는?","choices":["① 계절과 시기를 알아 농사에 이용하려고","② 재미로","③ 별을 팔려고","④ 이유 없음"],"answer":"①","checks":"천문 관측의 실용성(선개념)","miscon":"과학을 '순수한 호기심'으로만 보고 생존과의 연결을 놓치는 경우."},{"type":"서답형","q":"우리나라의 전통 과학 문화재나 발명품을 하나 쓰고, 어떤 원리가 쓰였는지 아는 대로 쓰시오.","answer":"예) 측우기 - 일정한 크기의 그릇에 모인 빗물의 깊이를 재어 강수량을 정량적으로 측정 / 앙부일구 - 그림자의 위치로 시각과 절기를 알아냄","checks":"과학과 문명(선개념)","miscon":"문화재를 '옛 물건'으로만 알고 과학 원리와 연결하지 못하는 경우."}]},"form":{"items":[{"level":"하","code":"12과사01-02","q":"고대 그리스에서 제시된 우주관(지구 중심설) 중 대표적인 학자를 한 명 쓰고, 그 우주관의 핵심 내용을 한 문장으로 쓰시오.","answer":"예) 아리스토텔레스 또는 프톨레마이오스. 지구가 우주의 중심에 정지해 있고 태양·달·행성이 지구 둘레를 돈다는 우주관이다.","rubric":"성취수준 D~C 대응. 학자와 핵심 내용을 모두 쓰면 도달."},{"level":"중","code":"12과사01-03","q":"중세 중동 지역(이슬람 문명)이 과학 발전에 기여한 바를 한 가지 쓰고, 고대 그리스 과학과 중세 과학의 차이를 한 가지 설명하시오.","answer":"기여: 고대 그리스의 과학 문헌을 아랍어로 번역·보존하고 주석을 달아 후대 유럽에 전했으며, 대수학·광학·의학·천문 관측 기구 등을 독자적으로 발전시켰다. 차이: 고대 그리스 과학은 사변적 논증과 자연철학 중심이었던 반면, 중세 과학은 종교적 세계관의 틀 안에서 이루어졌고 관측과 실험적 요소가 상대적으로 더 강조되기 시작했다.","rubric":"성취수준 C 대응. 이슬람 문명의 기여(1.5점) + 두 시기 과학의 차이(1.5점)."},{"level":"상","code":"12과사01-05","q":"과학자의 신념이나 세계관이 과학 지식의 형성에 영향을 준 사례를 하나 들어 설명하고, 이 사실이 '과학은 완전히 객관적'이라는 생각에 어떤 문제를 제기하는지 논하시오.","answer":"예) 케플러는 우주가 조화로운 기하학적 질서로 이루어져 있다는 신념에서 출발해 행성 궤도를 연구했고, 원 궤도에 대한 오랜 믿음을 데이터 앞에서 포기한 끝에 타원 궤도 법칙에 도달했다. 이는 과학자의 세계관이 어떤 문제를 선택하고 어떤 가설을 세울지에 영향을 준다는 것을 보여준다. 따라서 과학은 개인의 신념과 시대의 문화로부터 완전히 자유롭지 않다. 다만 과학은 관측·실험에 의한 검증과 동료 평가라는 공적 절차를 통해 개인의 편향을 걸러내므로, 객관성이 개인 수준이 아니라 공동체의 검증 과정에서 확보된다고 보아야 한다.","rubric":"성취수준 A 대응. 구체적 사례(1점) + 신념이 지식 형성에 미친 경로 설명(1.5점) + 객관성에 대한 균형 잡힌 논증(1.5점)."}]}},"과사-02":{"diag":{"from":"중 「과학과 인류의 지속가능한 삶」 (공식 선수 단원 없음)","items":[{"type":"선택형","q":"과학기술의 발전에 대한 설명으로 가장 알맞은 것은?","choices":["① 항상 긍정적 결과만 낳는다","② 항상 부정적 결과만 낳는다","③ 긍정적 효과와 부정적 효과를 함께 가진다","④ 사회와 무관하다"],"answer":"③","checks":"과학기술의 양면성 [9과01-02]","miscon":"기술 낙관론 또는 비관론 어느 한쪽으로 치우치는 경우."},{"type":"선택형","q":"감염병 확산을 막는 데 과학이 기여한 사례로 알맞은 것은?","choices":["① 백신과 진단 검사 개발","② 정보 은폐","③ 통계 조작","④ 관찰 중단"],"answer":"①","checks":"과학의 사회적 기여 [4과08 / 9과22 연계]","miscon":"과학의 기여를 치료제로만 좁게 보는 경우."},{"type":"서답형","q":"교통수단의 발달로 우리 생활이 달라진 점을 하나 쓰시오.","answer":"예) 먼 지역을 하루 만에 오갈 수 있어 생활권이 넓어지고, 물자와 정보가 빠르게 오가게 되었다.","checks":"과학기술과 생활 변화(선개념)","miscon":"'빨라졌다'에 머무는 경우. 사회 구조 변화까지 확장시킬 것."}]},"form":{"items":[{"level":"하","code":"12과사02-04","q":"역사적으로 사회에 큰 영향을 미친 감염병을 하나 쓰고, 그 감염병이 사회에 미친 변화를 한 가지 쓰시오.","answer":"예) 흑사병 - 유럽 인구가 크게 줄어 노동력이 부족해지면서 봉건 질서가 흔들리고 임금이 올랐다. / 콜레라 - 상하수도 정비와 공중보건 제도가 만들어지는 계기가 되었다.","rubric":"성취수준 D~C 대응. 감염병과 사회 변화를 모두 쓰면 도달."},{"level":"중","code":"12과사02-02","q":"과학자들 사이의 논쟁 사례를 하나 들고, 과학적 의사소통에서 지켜야 할 규범이나 태도를 두 가지 쓰시오.","answer":"예) 대륙이동설을 둘러싼 베게너와 당시 지질학계의 논쟁, 빅뱅 우주론과 정상 우주론 논쟁 등. 규범: ①주장은 반드시 관측·실험 증거에 근거할 것 ②반대 증거를 감추지 않고 공개할 것 ③상대의 주장을 인신공격이 아니라 근거로 비판할 것 ④새로운 증거가 나오면 자기 주장을 수정할 것","rubric":"성취수준 C 대응. 논쟁 사례(1점) + 규범 2가지(2점)."},{"level":"상","code":"12과사02-06","q":"산업혁명 이후 등장한 과학기술 중 하나를 골라 긍정적 효과와 부정적 효과를 각각 제시하고, 그 기술을 어떻게 다루어야 할지 자신의 입장을 근거와 함께 쓰시오.","answer":"예) 원자력 기술 - 긍정: 온실기체 배출이 적은 대규모 전력을 안정적으로 공급하고, 방사선은 의료 진단·치료에 활용된다. 부정: 중대 사고 시 광범위한 방사능 오염이 발생하고, 고준위 폐기물을 수만 년 관리해야 하며 핵무기로 전용될 위험이 있다. 입장(예): 기후위기 대응을 위해 당장 배제하기는 어려우므로, 안전 기준과 폐기물 처분 계획을 공개적으로 검증하고 재생에너지 확대와 병행하며 단계적으로 의존도를 조정해야 한다.","rubric":"성취수준 A 대응. 긍정 효과(1점) + 부정 효과(1점) + 근거 있는 균형 잡힌 입장(1.5점). 한쪽만 서술하면 절반."}]}},"과사-03":{"diag":{"from":"중 「과학과 나의 미래」 (공식 선수 단원 없음)","items":[{"type":"선택형","q":"'에너지'라는 말이 과학에서 쓰일 때와 일상에서 쓰일 때의 차이로 옳은 것은?","choices":["① 과학에서는 일을 할 수 있는 능력으로 정의된다","② 두 경우 뜻이 완전히 같다","③ 일상에서만 쓰인다","④ 과학에서는 쓰이지 않는다"],"answer":"①","checks":"과학 용어의 의미","miscon":"'기 에너지', '좋은 에너지' 같은 일상 표현과 과학적 정의를 구분하지 못하는 경우."},{"type":"선택형","q":"인공지능이 활용되는 사례로 알맞지 <b>않은<\/b> 것은?","choices":["① 영상 추천 알고리즘","② 음성 인식 비서","③ 자율주행 보조","④ 중력의 크기 결정"],"answer":"④","checks":"과학기술의 활용(선개념)","miscon":"기술의 적용 범위와 자연 법칙을 혼동하는 경우."},{"type":"서답형","q":"가상 현실(VR)이나 증강 현실(AR)을 경험해 본 적이 있다면 어떤 것이었는지 쓰고, 없다면 어디에 쓰일 수 있을지 쓰시오.","answer":"예) 박물관에서 AR로 유물의 원래 모습을 겹쳐 보았다 / 수술 연습이나 위험한 작업의 훈련에 쓰일 수 있을 것 같다.","checks":"신기술 경험(선개념)","miscon":"오락용으로만 인식. 교육·의료·산업 활용으로 넓혀줄 것."}]},"form":{"items":[{"level":"하","code":"12과사03-04","q":"사람과 사물, 기계를 연결하는 과학기술의 예를 두 가지 쓰시오.","answer":"예) 사물인터넷(IoT), 웨어러블 기기, 5G·6G 통신, 클라우드, 자율주행, 원격 의료 등","rubric":"성취수준 E~D 대응. 두 가지를 쓰면 도달."},{"level":"중","code":"12과사03-02","q":"일상이나 미디어에서 과학 용어가 원래 뜻과 다르게 쓰이는 사례를 하나 들고, 이런 사용이 사회에 미칠 수 있는 영향을 쓰시오.","answer":"예) '에너지가 좋은 사람', '무해한 화학물질 없는 화장품' 같은 표현. 과학 용어가 정확한 정의 없이 이미지로 소비되면, 사람들이 근거 없는 광고를 신뢰하거나(예: '화학물질=나쁜 것'이라는 오해로 인한 소비 왜곡), 과학적 사실을 오해해 잘못된 판단을 내릴 수 있다.","rubric":"성취수준 C 대응. 구체적 사례(1점) + 사회적 파급효과 설명(2점)."},{"level":"상","code":"12과사03-06","q":"과학기술과 관련된 사회적 쟁점을 집단적 의사결정으로 다룬 사례를 하나 들어 그 과정을 설명하고, 시민의 과학적 이해가 왜 필요한지 논하시오.","answer":"예) 원전 가동 연장·중단을 둘러싼 공론화 과정처럼, 전문가가 자료를 제공하고 시민들이 학습·숙의를 거쳐 권고안을 도출한 사례가 있다. 이 과정에서는 찬반 양측의 근거를 함께 검토하고 질의응답을 거쳐 결론을 내린다. 과학기술 쟁점은 사실 판단만으로 결정되지 않고 안전·비용·형평성 같은 가치 판단이 함께 걸리므로, 결정의 영향을 받는 시민이 참여해야 한다. 이때 시민이 자료의 근거와 불확실성을 읽어낼 수 있어야 여론이나 이해관계에 휘둘리지 않고 균형 잡힌 판단을 할 수 있으므로 과학적 이해가 필요하다.","rubric":"성취수준 A 대응. 사례와 절차 설명(1.5점) + 사실 판단과 가치 판단의 구분(1점) + 시민 과학 이해의 필요성 논증(1.5점)."}]}},"기환-01":{"diag":{"from":"중 「날씨와 기후변화」 (공식 선수 단원 없음)","items":[{"type":"선택형","q":"'날씨'와 '기후'의 차이로 옳은 것은?","choices":["① 날씨는 짧은 기간, 기후는 오랜 기간의 평균적 상태","② 날씨는 오랜 기간, 기후는 짧은 기간","③ 둘은 같은 말","④ 기후는 하루마다 바뀐다"],"answer":"①","checks":"날씨와 기후 [9과17 연계]","miscon":"두 용어를 혼용하는 경우가 매우 흔함. 이 단원의 첫 성취기준이므로 반드시 진단."},{"type":"선택형","q":"지구시스템의 권역에 해당하지 <b>않는<\/b> 것은?","choices":["① 지권","② 수권","③ 기권","④ 전자권"],"answer":"④","checks":"지구시스템 [10통과1-03-01 연계]","miscon":"생물권과 외권을 빠뜨리는 경우도 많음."},{"type":"서답형","q":"기후변화로 우리 주변에서 달라졌다고 느낀 점을 하나 쓰시오.","answer":"예) 여름이 길어지고 폭염 일수가 늘었다 / 벚꽃 개화 시기가 예전보다 빨라졌다","checks":"기후변화 체감 [4과16-02]","miscon":"하루의 날씨 변화와 혼동하지 않도록 여러 해의 경향으로 안내."}]},"form":{"items":[{"level":"하","code":"12기환01-01","q":"기후를 결정하는 '기후요소'와 '기후인자'를 각각 두 가지씩 쓰시오.","answer":"기후요소: 기온, 강수량, 바람(습도, 일조 시간 등) / 기후인자: 위도, 해발 고도, 수륙 분포, 해류, 지형 등","rubric":"성취수준 D~C 대응. 두 개념을 구분해 각각 두 가지씩 쓰면 도달."},{"level":"중","code":"12기환01-02","q":"기후시스템에서 '양의 되먹임'의 예를 하나 들어 그 과정을 설명하시오.","answer":"예) 빙하-알베도 되먹임: 기온이 올라 빙하가 녹으면 반사율(알베도)이 높은 흰 얼음 면적이 줄고 반사율이 낮은 바다·땅이 드러난다. 그러면 태양 복사 에너지를 더 많이 흡수해 기온이 더 올라가고, 빙하가 더 녹는 과정이 반복되어 변화가 증폭된다.","rubric":"성취수준 C 대응. 되먹임 사례 제시(1점) + 변화가 증폭되는 순환 과정 설명(2점)."},{"level":"상","code":"12기환01-02","q":"생물권이 다른 권역과 상호작용하여 기후에 영향을 주는 사례를 두 가지 들고, 각각 어떤 권역과 어떻게 주고받는지 설명하시오.","answer":"①숲(생물권)은 광합성으로 기권의 이산화 탄소를 흡수해 온실효과를 줄이고 증산 작용으로 수권에 수증기를 공급해 강수에 영향을 준다. 반대로 기후가 건조해지면 산불과 고사로 숲이 줄어 흡수량이 감소한다. ②해양의 식물성 플랑크톤(생물권)은 수권에 녹은 이산화 탄소를 흡수하고 죽은 뒤 심해로 가라앉아 탄소를 장기간 격리한다. 수온이 상승하면 플랑크톤의 분포와 양이 달라져 이 흡수 능력이 변한다.","rubric":"성취수준 A 대응. 사례 2가지(각 1점) + 각각에서 권역 간 양방향 상호작용 설명(2점)."}]}},"기환-02":{"diag":{"from":"중 「날씨와 기후변화」 (공식 선수 단원 없음)","items":[{"type":"선택형","q":"지구온난화의 주된 원인으로 알맞은 것은?","choices":["① 화석연료 사용에 따른 온실기체 증가","② 지구와 태양의 거리 변화","③ 달의 위상 변화","④ 지구 자전 속도 증가"],"answer":"①","checks":"지구온난화 [9과17-01]","miscon":"거리설·자연변동만으로 설명하려는 오개념. 인위적 요인의 기여를 짚을 것."},{"type":"선택형","q":"해수면 상승의 원인으로 볼 수 <b>없는<\/b> 것은?","choices":["① 육상 빙하의 융해","② 해수의 열팽창","③ 바닷물의 증발 증가","④ 그린란드 빙상의 융해"],"answer":"③","checks":"해수면 상승의 원인","miscon":"열팽창의 기여를 모르고 빙하 융해만 생각하는 경우가 많음."},{"type":"서답형","q":"기후변화가 생물에게 영향을 준 사례를 하나 쓰시오.","answer":"예) 수온 상승으로 어종의 분포가 북상해 우리나라 연안에서 잡히는 물고기 종류가 달라졌다 / 개화 시기가 빨라져 곤충의 활동 시기와 어긋난다","checks":"기후변화와 생태계 [4과16-02]","miscon":"'더워서 힘들다' 수준에 머무는 경우. 분포·시기 변화로 구체화."}]},"form":{"items":[{"level":"하","code":"12기환02-02","q":"해수면 상승을 일으키는 두 가지 물리적 원인을 쓰시오.","answer":"①육상 빙하·빙상이 녹아 바다로 유입되는 것 ②수온 상승에 따른 해수의 열팽창","rubric":"성취수준 D~C 대응. 두 원인을 모두 쓰면 도달."},{"level":"중","code":"12기환02-02","q":"북극의 바다에 떠 있는 해빙이 녹는 것은 해수면 상승에 거의 기여하지 않지만, 그린란드 빙상이 녹는 것은 크게 기여한다. 그 까닭을 설명하시오.","answer":"해빙은 이미 바닷물에 떠 있어 자기 무게만큼의 물을 밀어내고 있으므로, 녹아도 그 부피만큼 물이 되어 해수면이 거의 변하지 않는다. 반면 그린란드 빙상은 육지 위에 있던 얼음이므로 녹으면 바다에 없던 물이 새로 더해져 해수면이 상승한다. (다만 해빙의 융해는 알베도를 낮춰 온난화를 가속하는 간접 효과가 있다.)","rubric":"성취수준 C 대응. 부력·부피 관계로 해빙 설명(1.5점) + 육상 얼음의 신규 유입(1.5점)."},{"level":"상","code":"12기환02-08","q":"기온 상승이 모기 매개 감염병의 확산에 영향을 주는 과정을 단계적으로 설명하고, 이에 대비하기 위한 방안을 하나 제안하시오.","answer":"기온이 올라가면 ①모기가 생존·번식할 수 있는 지역이 고위도와 고지대로 넓어지고 ②연중 활동 기간이 길어져 개체 수가 늘며 ③모기 체내에서 병원체가 증식·성숙하는 속도가 빨라져 감염력이 커진다. 여기에 강수 패턴 변화로 고인 물이 늘면 산란 장소가 증가한다. 그 결과 과거에 없던 지역에서 뎅기열·말라리아 같은 감염병이 새로 나타나거나 급격히 확산될 수 있다. 대비: 매개체 감시망과 조기 경보 체계를 구축하고, 고인 물 제거 등 서식지 관리와 예방 접종·진단 체계를 함께 갖춘다.","rubric":"성취수준 A 대응. 서식 범위 확대(1점) + 활동 기간·개체 수 증가(1점) + 병원체 증식 가속(1점) + 대비 방안(1점)."}]}},"기환-03":{"diag":{"from":"중 「과학과 인류의 지속가능한 삶」 (공식 선수 단원 없음)","items":[{"type":"선택형","q":"'탄소중립'의 뜻으로 알맞은 것은?","choices":["① 배출한 온실기체와 흡수·제거한 양을 같게 해 순 배출을 0으로 만드는 것","② 탄소를 전혀 배출하지 않는 것만","③ 탄소를 모두 땅에 묻는 것","④ 탄소를 다른 나라로 보내는 것"],"answer":"①","checks":"탄소중립(선개념)","miscon":"'배출 0'과 '순 배출 0'을 혼동. 흡수·제거를 포함하는 개념임을 짚을 것."},{"type":"선택형","q":"재생에너지에 해당하는 것은?","choices":["① 태양광, 풍력","② 석탄, 석유","③ 천연가스","④ 우라늄"],"answer":"①","checks":"재생에너지 [6과08-02]","miscon":"원자력을 재생에너지로 분류하는 경우가 흔함(저탄소이지만 재생은 아님)."},{"type":"서답형","q":"기후위기에 대응하기 위한 국제적인 약속이나 기구를 아는 대로 하나 쓰시오.","answer":"예) 파리협정, 기후변화에 관한 정부 간 협의체(IPCC), 유엔기후변화협약(UNFCCC)","checks":"국제사회의 노력 [4과16-03 연계]","miscon":"들어본 적 없으면 뉴스 자료로 도입할 것."}]},"form":{"items":[{"level":"하","code":"12기환03-01","q":"산호의 백화현상이 무엇인지 설명하고, 그 주된 원인을 쓰시오.","answer":"산호와 공생하던 조류가 빠져나가 산호가 하얗게 변하는 현상이다. 주된 원인은 수온 상승(그 밖에 해양 산성화, 오염 등)이다.","rubric":"성취수준 D~C 대응. 현상과 원인을 모두 쓰면 도달."},{"level":"중","code":"12기환03-03","q":"탄소 저감을 위한 과학기술을 두 가지 쓰고, 각각이 탄소를 어떻게 줄이는지 설명하시오.","answer":"예) ①탄소 포집·저장(CCS): 발전소 등에서 배출되는 이산화 탄소를 포집해 지하 깊은 지층에 저장하여 대기로 나가지 않게 한다 ②수소 환원 제철: 철을 만들 때 석탄 대신 수소를 사용해 이산화 탄소 대신 물이 생기게 한다 ③재생에너지 발전·에너지 저장 장치: 화석연료 발전 자체를 대체한다","rubric":"성취수준 C 대응. 기술 2가지(1점) + 각각의 저감 원리(2점)."},{"level":"상","code":"12기환03-04","q":"기후위기 대응에서 국제 협약이 필요한 까닭을 온실기체의 특성과 관련지어 설명하고, 고등학생인 자신이 민주 시민으로서 참여할 수 있는 방안을 두 가지 제안하시오.","answer":"온실기체는 배출된 지역에 머무르지 않고 대기를 통해 전 지구로 섞여 퍼지므로, 한 나라만 줄여도 효과가 제한되고 줄이지 않는 나라가 이익을 보는 문제가 생긴다. 따라서 각국의 감축 목표와 이행 점검을 함께 정하는 국제 협약이 필요하다. 참여 방안: ①학교 온실기체 배출 현황을 조사해 개선안을 학생회에 제안하고 실천 캠페인을 조직한다 ②지역 기후 관련 공청회나 청소년 참여 예산·청원 제도를 활용해 정책에 의견을 제출한다.","rubric":"성취수준 A 대응. 온실기체의 전 지구적 확산·무임승차 문제(1.5점) + 협약의 필요성(0.5점) + 실현 가능한 참여 방안 2가지(2점)."}]}},"융탐-01":{"diag":{"from":"중 「과학과 인류의 지속가능한 삶」 (공식 선수 단원 없음)","items":[{"type":"선택형","q":"과학적 탐구 과정의 순서로 알맞은 것은?","choices":["① 문제 인식-가설 설정-탐구 설계 및 수행-자료 해석-결론 도출","② 결론 도출-문제 인식-가설 설정","③ 가설 설정-결론 도출-문제 인식","④ 탐구 수행-문제 인식-가설 설정"],"answer":"①","checks":"과학적 탐구 방법 [9과01-01]","miscon":"순서는 알아도 실제 탐구에서 가설과 결론을 뒤섞는 경우가 많음."},{"type":"선택형","q":"실험에서 '조작 변인'이란?","choices":["① 의도적으로 변화시키는 변인","② 일정하게 유지하는 변인","③ 측정 결과로 얻는 변인","④ 관계없는 변인"],"answer":"①","checks":"변인 통제","miscon":"조작 변인과 종속 변인을 혼동하는 경우."},{"type":"서답형","q":"과학이 다른 분야(예술, 사회, 공학 등)와 함께 문제를 해결한 사례를 하나 쓰시오.","answer":"예) 과학(재료·구조)과 건축·디자인이 함께 지진에 견디는 건물을 설계한다 / 의학과 인공지능이 함께 영상 진단의 정확도를 높인다","checks":"융합적 탐구(선개념)","miscon":"과학을 독립된 분야로만 보는 경우. 실제 문제 해결은 융합적임을 안내."}]},"form":{"items":[{"level":"하","code":"12융탐01-03","q":"과학 탐구에서 사용되는 데이터를 정량적 데이터와 정성적 데이터로 구분하고, 각각의 예를 하나씩 드시오.","answer":"정량적 데이터: 수치로 측정한 자료(예: 온도 23.5℃, 반응 시간 4.2초) / 정성적 데이터: 수치가 아닌 관찰·서술 자료(예: 색이 노랗게 변함, 냄새가 남, 면담 내용)","rubric":"성취수준 D~C 대응. 구분과 예를 모두 쓰면 도달."},{"level":"중","code":"12융탐01-02","q":"과학적 탐구와 사회과학적 탐구(또는 예술에서의 창작)의 공통점과 차이점을 각각 하나씩 쓰시오.","answer":"공통점: 문제나 주제를 인식하고 자료를 수집·해석하여 결론이나 결과물을 만들며, 그 과정에서 창의적 발상이 필요하다. 차이점: 과학적 탐구는 반복 가능한 관찰·실험으로 가설을 검증하고 재현성을 중시하지만, 사회과학적 탐구는 통제하기 어려운 인간과 사회를 다루어 맥락 의존성이 크고, 예술 창작은 검증보다 표현과 해석의 다양성을 중시한다.","rubric":"성취수준 C 대응. 공통점(1.5점) + 차이점(1.5점)."},{"level":"상","code":"12융탐01-04","q":"인공지능을 과학 탐구에 활용할 때의 유용성과 한계를 각각 설명하고, 연구자가 인공지능의 결과를 어떻게 다루어야 하는지 자신의 견해를 쓰시오.","answer":"유용성: 사람이 처리하기 어려운 대규모 데이터에서 패턴을 빠르게 찾고, 단백질 구조 예측이나 신약 후보 탐색처럼 탐색 공간이 넓은 문제에서 시간을 크게 단축한다. 한계: 학습 데이터에 담긴 편향을 그대로 재생산하고, 왜 그런 결과가 나왔는지 설명하기 어려우며(블랙박스), 학습 범위를 벗어난 상황에서는 그럴듯하지만 틀린 결과를 낼 수 있다. 견해: 인공지능의 출력은 결론이 아니라 가설로 취급해, 반드시 실험·관측으로 검증하고 데이터의 출처와 한계를 함께 보고해야 한다.","rubric":"성취수준 A 대응. 유용성(1점) + 한계(편향·설명 불가·외삽 오류 중 2가지)(1.5점) + 검증 필요성에 대한 견해(1.5점)."}]}},"융탐-02":{"diag":{"from":"중 「과학과 인류의 지속가능한 삶」 (공식 선수 단원 없음)","items":[{"type":"선택형","q":"자료를 그래프로 나타낼 때, 시간에 따른 연속적인 변화를 보여주기에 가장 알맞은 것은?","choices":["① 꺾은선그래프","② 원그래프","③ 그림그래프","④ 벤다이어그램"],"answer":"①","checks":"자료의 표현","miscon":"그래프 종류의 선택 기준을 모르는 경우. 자료의 성격과 연결시킬 것."},{"type":"선택형","q":"실험 결과의 신뢰성을 높이기 위한 방법으로 알맞은 것은?","choices":["① 여러 번 반복 측정하여 평균을 낸다","② 한 번만 측정한다","③ 원하는 값만 고른다","④ 측정 조건을 계속 바꾼다"],"answer":"①","checks":"측정의 신뢰성","miscon":"'원하는 결과가 나온 것만 쓴다'는 태도. 연구 윤리와 연결해 지도."},{"type":"서답형","q":"어떤 자료가 '믿을 만한지' 판단할 때 무엇을 살펴봐야 할지 생각을 쓰시오.","answer":"예) 누가 언제 어떻게 수집했는지, 표본이 충분한지, 출처가 신뢰할 만한지 등을 살펴본다.","checks":"자료의 타당성·신뢰성(선개념)","miscon":"인터넷 자료를 무비판적으로 수용하는 경우. 출처 확인 습관을 강조."}]},"form":{"items":[{"level":"하","code":"12융탐02-04","q":"두 변인 사이의 관계를 살펴보기에 가장 알맞은 그래프 형태를 쓰고, 그 까닭을 쓰시오.","answer":"분산형(산점도) 그래프. 두 변인의 값을 각각 축에 두고 점으로 나타내면 값들이 이루는 경향(양의 관계, 음의 관계, 관계 없음)을 한눈에 볼 수 있기 때문이다.","rubric":"성취수준 D~C 대응. 그래프 종류와 까닭을 모두 쓰면 도달."},{"level":"중","code":"12융탐02-05","q":"두 집단의 측정값 평균이 같은데 표준편차가 크게 다르다면, 이 결과를 어떻게 해석해야 하는지 설명하시오.","answer":"평균이 같아도 표준편차가 큰 집단은 값들이 평균에서 멀리 넓게 흩어져 있고, 표준편차가 작은 집단은 값들이 평균 가까이 모여 있다는 뜻이다. 따라서 평균만으로 두 집단이 같다고 결론지어서는 안 되며, 표준편차가 큰 집단은 측정의 재현성이 낮거나 집단 내에 서로 다른 특성이 섞여 있을 가능성을 함께 검토해야 한다.","rubric":"성취수준 C 대응. 표준편차의 의미(1.5점) + 평균만으로 판단하면 안 된다는 해석(1.5점)."},{"level":"상","code":"12융탐02-03","q":"디지털 탐구 도구(센서)로 데이터를 수집할 때 생길 수 있는 문제를 두 가지 들고, 수집한 데이터의 타당성과 신뢰성을 평가하는 방법을 각각 제시하시오.","answer":"문제: ①센서의 영점이 맞지 않거나 시간이 지나며 값이 치우치는 교정 오차 ②측정 간격이 너무 길어 빠른 변화를 놓치거나, 주변 환경(온도·전자기 잡음)의 간섭으로 잡음이 섞이는 것. 평가 방법: 타당성 — 표준 시료나 이미 알려진 값으로 센서를 교정해 실제로 재려는 양을 재고 있는지 확인하고, 다른 방법(다른 기기·수동 측정)으로 얻은 값과 비교한다. 신뢰성 — 같은 조건에서 반복 측정해 값의 흩어짐(표준편차)을 확인하고, 여러 개의 센서로 동시에 측정해 결과가 일치하는지 본다.","rubric":"성취수준 A 대응. 문제 2가지(1.5점) + 타당성 평가 방법(1.5점) + 신뢰성 평가 방법(1점)."}]}},"융탐-03":{"diag":{"from":"중 「과학과 나의 미래」 (공식 선수 단원 없음)","items":[{"type":"선택형","q":"오늘날 인류가 겪고 있는 난제로 보기 <b>어려운<\/b> 것은?","choices":["① 식량·물 부족","② 기후변화","③ 자원 고갈","④ 계절의 순환"],"answer":"④","checks":"인류의 난제(선개념)","miscon":"자연 현상과 사회적 문제를 구분하지 못하는 경우."},{"type":"선택형","q":"연구 과정에서 지켜야 할 윤리로 알맞지 <b>않은<\/b> 것은?","choices":["① 원하는 결과가 나오도록 데이터를 고친다","② 출처를 밝힌다","③ 실패한 결과도 보고한다","④ 참여자의 동의를 받는다"],"answer":"①","checks":"연구 윤리 [9과01 연계]","miscon":"데이터 선택적 보고도 조작에 해당함을 모르는 경우."},{"type":"서답형","q":"과학기술로 사회 문제를 해결한 사례를 하나 쓰시오.","answer":"예) 정수 기술로 오염된 물을 마실 수 있게 만들어 수인성 질병을 줄였다 / 태양광 발전으로 전기가 닿지 않던 지역에 전력을 공급했다","checks":"과학기술의 사회적 기여","miscon":"기술 자체만 떠올리고 사회 문제와 연결하지 못하는 경우."}]},"form":{"items":[{"level":"하","code":"12융탐03-03","q":"융합과학 탐구 과정에서 지켜야 할 연구 윤리를 두 가지 쓰시오.","answer":"예) ①데이터를 위조·변조·선택적으로 보고하지 않는다 ②타인의 연구와 자료의 출처를 정확히 밝히고 표절하지 않는다 ③사람·동물을 대상으로 할 때 사전 동의를 받고 피해를 최소화한다 ④이해관계를 공개한다","rubric":"성취수준 D~C 대응. 두 가지를 쓰면 도달."},{"level":"중","code":"12융탐03-02","q":"인류가 직면한 난제를 하나 골라, 서로 다른 두 분야의 지식을 결합해 해결하는 방안을 제안하시오.","answer":"예) 물 부족 — 재료과학(선택적 투과막 개발)과 데이터과학(수요 예측·누수 감지 알고리즘)을 결합해, 에너지 소모가 적은 담수화 설비를 만들고 도시 배관망의 누수를 실시간으로 찾아 물 손실을 줄인다. 여기에 사회과학적 조사를 더해 지역 주민의 물 사용 방식에 맞는 운영 방안을 설계한다.","rubric":"성취수준 C 대응. 난제 선정(0.5점) + 두 분야의 지식을 구체적으로 결합(2점) + 해결 방안의 타당성(0.5점)."},{"level":"상","code":"12융탐03-04","q":"시민이 직접 참여하여 과학적 자료를 수집하거나 문제 해결에 기여한 사례를 하나 들어 설명하고, 이러한 시민참여가 연구에 주는 이점과 주의할 점을 함께 논하시오.","answer":"예) 시민들이 앱으로 동네의 미세먼지·소음·생물 관찰 기록을 올려 전국 규모의 데이터를 만드는 시민과학 프로젝트, 또는 지역 주민이 하천 수질을 정기적으로 측정해 오염원을 찾아낸 사례가 있다. 이점: 연구자 몇 명으로는 불가능한 넓은 지역과 긴 기간의 데이터를 모을 수 있고, 지역의 맥락을 잘 아는 사람이 참여해 문제를 조기에 발견하며, 참여자의 과학적 이해와 정책 관심도 높아진다. 주의할 점: 측정 방법과 기기가 제각각이면 데이터의 품질이 고르지 않으므로 표준화된 지침과 교육, 이상값 검증 절차가 필요하고, 참여자의 개인정보와 위치 정보 보호에도 유의해야 한다.","rubric":"성취수준 A 대응. 구체적 사례(1점) + 이점 2가지(1.5점) + 데이터 품질·개인정보 등 주의점(1.5점)."}]}},"지구-01":{"diag":{"from":"중 「수권과 해수의 순환」","items":[{"type":"선택형","q":"우리나라 주변 바다에서 여름철 표층 수온이 겨울철보다 높은 까닭은?","choices":["① 태양 복사 에너지를 더 많이 받아서","② 염분이 낮아서","③ 해류가 멈춰서","④ 바다가 깊어져서"],"answer":"①","checks":"해수의 수온 분포 [9과18-02]","miscon":"수온 변화의 원인을 해류로만 돌리는 경우. 태양 복사가 1차 원인임을 짚을 것."},{"type":"선택형","q":"표층 해류를 만드는 주된 원인은?","choices":["① 지속적으로 부는 바람","② 달의 인력","③ 지진","④ 강물의 유입"],"answer":"①","checks":"표층 순환 [9과18-03]","miscon":"표층 순환(바람)과 심층 순환(밀도 차)의 원인을 혼동. 이 단원의 핵심 구분점."},{"type":"서답형","q":"해류가 기후에 영향을 주는 예를 하나 쓰고, 그 원리를 간단히 설명하시오.","answer":"예) 난류가 흐르는 지역은 같은 위도라도 겨울이 온화하다. 해류가 저위도의 남는 열에너지를 고위도로 운반해 지구 전체의 에너지를 재분배하기 때문이다.","checks":"해류의 역할 [9과18-03]","miscon":"해류를 단순한 물의 흐름으로만 보고 에너지 운반 기능을 놓치는 경우."}]},"form":{"items":[{"level":"하","code":"12지구01-01","q":"해수의 밀도를 결정하는 두 가지 요인을 쓰고, 각각이 커질 때 밀도가 어떻게 변하는지 쓰시오.","answer":"수온과 염분. 수온이 낮을수록, 염분이 높을수록 해수의 밀도가 커진다.","rubric":"성취수준 D~C 대응. 두 요인과 각각의 방향을 모두 맞히면 도달."},{"level":"중","code":"12지구01-02","q":"심층 순환이 발생하는 원리를 설명하고, 표층 순환과의 차이를 원동력을 중심으로 비교하시오.","answer":"고위도 해역에서 해수가 냉각되고 결빙 시 염분이 빠져나와 남은 물의 염분이 높아지면 밀도가 커져 침강한다. 이렇게 만들어진 밀도 차이가 심층에서 해수를 이동시키는 것이 심층 순환이다. 표층 순환은 지속적으로 부는 바람이 원동력인 반면, 심층 순환은 수온과 염분에 의한 밀도 차이가 원동력이다.","rubric":"성취수준 C 대응. 냉각·결빙에 의한 밀도 증가와 침강(2점) + 표층(바람) vs 심층(밀도) 대비(1점)."},{"level":"상","code":"12지구01-05","q":"엘니뇨 시기에 적도 태평양에서 무역풍, 용승, 표층 수온이 평상시와 어떻게 달라지는지 설명하고, 이것이 대기와 해양의 상호작용인 까닭을 쓰시오.","answer":"평상시에는 무역풍이 강해 따뜻한 표층수가 서태평양에 쌓이고, 동태평양에서는 용승이 활발해 표층 수온이 낮다. 엘니뇨 시기에는 무역풍이 약해져 따뜻한 물이 동쪽으로 이동하고 동태평양의 용승이 약해져 표층 수온이 평상시보다 높아진다. 무역풍(대기)의 변화가 해수의 흐름과 수온(해양)을 바꾸고, 달라진 해수면 온도가 다시 대기의 기압 분포와 바람을 바꾸어 서로 영향을 주고받으므로 대기와 해양의 상호작용이다.","rubric":"성취수준 A 대응. 무역풍 약화(1점) + 용승 약화와 동태평양 수온 상승(1.5점) + 양방향 되먹임으로 상호작용 논증(1.5점)."}]}},"지구-02":{"diag":{"from":"중 「지권의 변화」","items":[{"type":"선택형","q":"뒤집히지 않은 지층에서 가장 오래된 층은?","choices":["① 가장 아래층","② 가장 위층","③ 가운데 층","④ 알 수 없다"],"answer":"①","checks":"지층의 형성 [6과01-01 / 9과09 연계]","miscon":"지층누중의 법칙의 기초. 뒤집힌 지층을 배우기 전에 확실히 잡아둘 것."},{"type":"선택형","q":"암석을 생성 과정에 따라 분류할 때 해당하지 <b>않는<\/b> 것은?","choices":["① 화성암","② 퇴적암","③ 변성암","④ 광물암"],"answer":"④","checks":"암석의 분류 [9과09-03]","miscon":"광물과 암석의 관계를 혼동. 광물이 모여 암석이 됨을 확인."},{"type":"서답형","q":"화석이 지구의 과거 환경을 알려주는 까닭을 쓰시오.","answer":"화석이 된 생물이 어떤 환경에서 살았는지 알면, 그 지층이 쌓일 당시 그 지역의 환경을 추리할 수 있기 때문이다.","checks":"화석의 가치 [6과01-03]","miscon":"화석을 '옛날 생물의 흔적'으로만 알고 환경 지시자 역할을 모르는 경우."}]},"form":{"items":[{"level":"하","code":"12지구02-01","q":"어떤 화성암에 포함된 방사성 동위 원소의 양이 처음의 1/4로 줄었다. 이 원소의 반감기가 1억 년이라면 이 암석의 절대 연령은 얼마인지 구하시오.","answer":"1/4 = (1/2)²이므로 반감기 2번이 지났다. 따라서 2억 년","rubric":"성취수준 D~C 대응. 2억 년을 구하면 도달."},{"level":"중","code":"12지구02-01","q":"지층의 상대 연령을 결정하는 법칙 중 '관입의 법칙'과 '부정합의 법칙'이 각각 무엇인지 설명하시오.","answer":"관입의 법칙: 마그마가 기존 암석을 뚫고 들어가 굳은 관입암은 관입당한 암석보다 나중에 만들어졌다. 부정합의 법칙: 아래위 지층 사이에 퇴적이 중단되고 침식을 받은 시간 간격(부정합면)이 있으며, 그 면을 경계로 상당한 시간 차이가 존재한다.","rubric":"성취수준 C 대응. 두 법칙을 각각 정확히 설명하면 도달(각 1.5점)."},{"level":"상","code":"12지구02-03","q":"해양판이 대륙판 아래로 섭입하는 변동대에서 마그마가 생성되는 과정을 설명하고, 그 마그마로부터 만들어지는 화성암의 특징을 조성과 관련지어 쓰시오.","answer":"섭입하는 해양판에 포함된 물이 깊은 곳에서 빠져나와 위쪽 맨틀로 공급되면, 맨틀 물질의 용융점이 낮아져 부분 용융이 일어나 마그마가 생성된다. 이 마그마는 상승하면서 대륙 지각 물질을 녹여 섞이므로 SiO₂ 함량이 높은 유문암질(산성) 조성이 되기 쉽다. SiO₂가 많으면 점성이 커서 화산이 폭발적으로 분출하고, 지하 깊은 곳에서 천천히 식으면 알갱이가 큰 화강암이 만들어진다.","rubric":"성취수준 A 대응. 물 공급에 의한 용융점 하강과 부분 용융(1.5점) + 대륙 지각 동화로 SiO₂ 증가(1점) + 조성에 따른 암석·분출 특성(1.5점)."}]}},"지구-03":{"diag":{"from":"중 「태양계」·「별과 우주」","items":[{"type":"선택형","q":"일식이 일어날 때 태양·지구·달의 위치 관계로 옳은 것은?","choices":["① 태양-달-지구","② 태양-지구-달","③ 달-태양-지구","④ 지구-태양-달"],"answer":"①","checks":"일식과 월식 [9과07-04]","miscon":"일식과 월식의 배치를 뒤바꾸는 실수가 매우 흔함."},{"type":"선택형","q":"별의 색이 파란색에 가까울수록 표면 온도는?","choices":["① 높다","② 낮다","③ 같다","④ 관계없다"],"answer":"①","checks":"별의 색과 표면 온도 [9과15-01]","miscon":"붉은색이 '뜨겁다'는 일상 감각 때문에 반대로 생각하는 경우가 많음."},{"type":"서답형","q":"연주시차가 클수록 별까지의 거리는 어떠한지 쓰고, 그 까닭을 쓰시오.","answer":"연주시차가 클수록 거리가 가깝다. 가까운 별일수록 지구의 공전에 따라 겉보기 위치가 더 많이 달라지기 때문이다(거리와 연주시차는 반비례).","checks":"연주시차 [9과15-01]","miscon":"반비례 관계를 비례로 뒤바꿔 기억하는 경우."}]},"form":{"items":[{"level":"하","code":"12지구03-03","q":"H-R도에서 대부분의 별이 분포하는 띠의 이름을 쓰고, 그 띠에서 왼쪽 위로 갈수록 별의 표면 온도와 광도가 어떻게 변하는지 쓰시오.","answer":"주계열. 왼쪽 위로 갈수록 표면 온도가 높고 광도가 크다.","rubric":"성취수준 D~C 대응. 주계열과 두 물리량의 변화를 모두 쓰면 도달."},{"level":"중","code":"12지구03-02","q":"흑체복사 법칙(빈의 변위 법칙, 슈테판-볼츠만 법칙)을 이용해, 표면 온도가 높은 별일수록 최대 세기를 내는 파장과 단위 면적당 방출 에너지가 각각 어떻게 되는지 설명하시오.","answer":"빈의 변위 법칙에 따라 표면 온도가 높을수록 최대 세기를 내는 파장이 짧아져 파란색 쪽으로 치우친다. 슈테판-볼츠만 법칙에 따라 단위 면적당 방출하는 에너지는 표면 온도의 4제곱에 비례하므로, 온도가 높을수록 급격히 커진다.","rubric":"성취수준 C 대응. 파장이 짧아짐(1.5점) + 에너지가 T⁴에 비례(1.5점)."},{"level":"상","code":"12지구03-05","q":"허블-르메트르 법칙의 내용을 쓰고, 이 법칙이 우주의 팽창을 뒷받침하는 근거가 되는 까닭을 설명하시오. 또 이 관측이 정적 우주론에 어떤 영향을 주었는지 쓰시오.","answer":"외부은하의 후퇴 속도는 그 은하까지의 거리에 비례한다(v = H₀d). 멀리 있는 은하일수록 더 빨리 멀어진다는 것은 특정한 중심이 있는 폭발이 아니라 공간 자체가 전체적으로 팽창하고 있음을 뜻하므로 우주 팽창의 직접적 관측 증거가 된다. 이 관측으로 우주가 변하지 않는다는 정적 우주론은 유지되기 어려워졌고, 팽창 우주론과 대폭발 우주론이 자리 잡는 계기가 되었다.","rubric":"성취수준 A 대응. 법칙 진술(1점) + 공간 팽창의 근거로 해석(1.5점) + 정적 우주론에 미친 영향(1점)."}]}},"지시-01":{"diag":{"from":"중 「지권의 변화」","items":[{"type":"선택형","q":"지구 내부 구조를 바깥쪽부터 순서대로 나열한 것은?","choices":["① 지각-맨틀-외핵-내핵","② 지각-외핵-맨틀-내핵","③ 맨틀-지각-내핵-외핵","④ 지각-내핵-외핵-맨틀"],"answer":"①","checks":"지권의 층상 구조 [9과09-01]","miscon":"외핵과 내핵의 순서를 뒤바꾸는 경우."},{"type":"선택형","q":"지진과 화산이 특정 지역에 띠 모양으로 몰려 나타나는 까닭은?","choices":["① 판의 경계와 일치하기 때문","② 우연이기 때문","③ 기후 때문","④ 인구가 많기 때문"],"answer":"①","checks":"판의 경계 [9과09-05]","miscon":"중학교에서 분포 일치까지만 배우므로, 경계 유형별 차이는 이 단원에서 새로 배움."},{"type":"서답형","q":"암석의 순환이 무엇인지 한 문장으로 쓰시오.","answer":"화성암, 퇴적암, 변성암이 풍화·퇴적·열과 압력·용융 등의 과정을 거쳐 서로 다른 암석으로 끊임없이 바뀌는 것이다.","checks":"암석의 순환 [9과09-03]","miscon":"암석을 고정된 것으로 보는 경우. 순환의 관점을 강조."}]},"form":{"items":[{"level":"하","code":"12지시01-05","q":"지진파 P파와 S파의 차이를 전파 속도와 통과할 수 있는 매질을 기준으로 각각 쓰시오.","answer":"P파는 S파보다 빠르고 고체·액체·기체를 모두 통과한다. S파는 P파보다 느리고 고체만 통과한다.","rubric":"성취수준 D~C 대응. 속도와 매질 조건을 모두 맞히면 도달."},{"level":"중","code":"12지시01-05","q":"S파가 도달하지 않는 암영대의 존재로부터 지구 내부에 대해 무엇을 알 수 있는지 설명하시오.","answer":"S파는 고체만 통과하는 횡파인데, 지진 발생 지점에서 각거리 약 103°를 넘는 지역에는 S파가 도달하지 않는다. 이는 S파가 통과하지 못하는 층, 즉 액체 상태의 층이 지구 내부에 있음을 뜻하며 외핵이 액체 상태임을 알 수 있다.","rubric":"성취수준 C 대응. S파가 고체만 통과(1점) + 암영대 관측(1점) + 외핵이 액체라는 결론(1점)."},{"level":"상","code":"12지시01-03","q":"판을 움직이는 운동을 상부 맨틀의 대류와 플룸 운동으로 구분하여 설명하고, 열점에서 만들어진 화산섬이 일렬로 배열되는 까닭을 쓰시오.","answer":"상부 맨틀의 대류는 판 아래에서 수평으로 흐르며 판을 끌고 가거나 해령에서 밀어내어 판을 이동시킨다. 플룸 운동은 맨틀과 핵의 경계 부근에서 기둥 모양으로 올라오는 뜨거운 물질(플룸 상승류)이나 가라앉는 차가운 플룸 하강류에 의한 수직 방향의 운동이다. 열점은 플룸 상승류가 지표에 닿는 지점으로 위치가 거의 고정되어 있는데, 그 위를 판이 이동하므로 시간에 따라 다른 지점에서 화산이 만들어져 화산섬이 판의 이동 방향을 따라 일렬로 배열된다.","rubric":"성취수준 A 대응. 상부 맨틀 대류(1점) + 플룸의 수직 운동(1점) + 고정된 열점 위를 판이 이동해 배열(1.5점)."}]}},"지시-02":{"diag":{"from":"중 「수권과 해수의 순환」","items":[{"type":"선택형","q":"바닷물이 하루에 두 번 정도 밀려 들어오고 나가는 현상은?","choices":["① 조석","② 해일","③ 용승","④ 파랑"],"answer":"①","checks":"밀물과 썰물 [4과06-03 / 9과18 연계]","miscon":"조석과 해일을 혼동하는 경우. 주기성 여부로 구분."},{"type":"선택형","q":"표층 해류를 일으키는 주된 힘은?","choices":["① 바람","② 중력","③ 자기력","④ 마찰력만"],"answer":"①","checks":"표층 순환 [9과18-03]","miscon":"에크만 수송을 배우기 전 기본 전제. 확실히 잡아둘 것."},{"type":"서답형","q":"파도가 칠 때 바닷물 전체가 해안 쪽으로 이동하는 것인지, 아니면 다른 무언가가 전달되는 것인지 생각을 쓰시오.","answer":"예) 물이 통째로 이동하는 것이 아니라 물결(에너지)이 전달되는 것 같다.","checks":"파동의 전달(선개념)","miscon":"'파도가 물을 밀어 온다'는 오개념이 매우 흔함. 이 단원의 해파 이해에 직결."}]},"form":{"items":[{"level":"하","code":"12지시02-02","q":"해파에서 물 입자는 실제로 어떻게 운동하는지 쓰고, 해파가 전달하는 것이 무엇인지 쓰시오.","answer":"물 입자는 제자리에서 원 또는 타원을 그리며 진동할 뿐 해안 쪽으로 이동하지 않는다. 해파가 전달하는 것은 물질이 아니라 에너지이다.","rubric":"성취수준 D~C 대응. 제자리 진동과 에너지 전달을 모두 쓰면 도달."},{"level":"중","code":"12지시02-02","q":"심해파와 천해파를 수심과 파장의 관계로 구분하고, 파도가 해안에 가까워질수록 파고가 높아지고 부서지는 까닭을 설명하시오.","answer":"수심이 파장의 1/2보다 깊으면 심해파, 1/20보다 얕으면 천해파로 구분한다. 해안에 가까워져 수심이 얕아지면 해파의 속도가 느려지고 파장이 짧아지는데, 에너지는 보존되므로 파고가 높아진다. 파고가 지나치게 높아지면 마루가 앞으로 넘어지며 부서진다.","rubric":"성취수준 C 대응. 수심-파장 기준(1점) + 속도·파장 감소(1점) + 파고 증가와 쇄파(1점). ※전이파는 다루지 않음."},{"level":"상","code":"12지시02-04","q":"조석에서 사리(대조)와 조금(소조)이 나타나는 때를 태양·지구·달의 위치와 관련지어 설명하고, 달의 기조력이 태양보다 큰 까닭을 쓰시오.","answer":"사리는 태양-지구-달이 일직선이 되는 삭과 망 때로, 달과 태양의 기조력이 같은 방향으로 합쳐져 조차가 가장 크다. 조금은 태양-지구-달이 직각을 이루는 상현·하현 때로, 두 기조력이 서로 상쇄되어 조차가 가장 작다. 기조력은 천체의 질량에 비례하고 거리의 세제곱에 반비례하는데, 태양이 훨씬 무겁지만 거리가 매우 멀어 그 효과가 크게 줄어들므로 가까운 달의 기조력이 태양의 약 2배가 된다.","rubric":"성취수준 A 대응. 사리·조금의 배치(1.5점) + 기조력의 합성·상쇄(1점) + 거리 세제곱 반비례로 달이 큼(1.5점). ※정성적 수준."}]}},"지시-03":{"diag":{"from":"중 「날씨와 기후변화」","items":[{"type":"선택형","q":"공기가 상승할 때 일어나는 변화로 옳은 것은?","choices":["① 부피가 커지고 기온이 내려간다","② 부피가 줄고 기온이 올라간다","③ 부피와 기온 모두 변화 없다","④ 부피가 커지고 기온도 올라간다"],"answer":"①","checks":"단열 팽창 [9과17-03]","miscon":"'올라가면 태양에 가까워 더워진다'는 오개념이 흔함."},{"type":"선택형","q":"온실효과를 일으키는 기체는?","choices":["① 이산화 탄소, 수증기","② 질소, 산소","③ 아르곤, 네온","④ 헬륨"],"answer":"①","checks":"온실효과 [9과17-01]","miscon":"공기의 주성분인 질소·산소를 온실기체로 오해. 선택적 흡수 개념의 출발점."},{"type":"서답형","q":"구름이 만들어지는 과정을 간단히 쓰시오.","answer":"공기가 상승하면 단열 팽창으로 기온이 내려가고, 이슬점 아래로 내려가면 수증기가 응결해 작은 물방울이나 얼음 알갱이가 되어 구름이 된다.","checks":"구름의 생성 [9과17-03]","miscon":"'수증기가 모여 구름이 된다'는 표현. 응결이 핵심임을 강조."}]},"form":{"items":[{"level":"하","code":"12지시03-01","q":"대기 중의 기체가 '선택적 흡수체'라는 것이 무슨 뜻인지 쓰고, 그 예를 하나 드시오.","answer":"기체마다 특정 파장의 복사 에너지만 잘 흡수한다는 뜻이다. 예: 오존은 자외선을, 이산화 탄소와 수증기는 지구가 방출하는 적외선을 잘 흡수한다.","rubric":"성취수준 D~C 대응. 의미와 예를 모두 쓰면 도달."},{"level":"중","code":"12지시03-03","q":"기온의 연직 분포(환경 기온 감률)와 단열 감률을 비교하여 대기가 불안정해지는 조건을 설명하고, 그때 나타나는 현상을 쓰시오.","answer":"공기 덩어리가 상승할 때 식는 비율(단열 감률)보다 주변 대기의 기온이 높이에 따라 더 급격히 낮아지면(환경 기온 감률이 큼), 상승한 공기가 주변보다 계속 따뜻해 더 잘 올라가므로 대기가 불안정해진다. 이때 강한 상승 기류가 생겨 적운형 구름이 발달하고 소나기·뇌우가 나타나기 쉽다.","rubric":"성취수준 C 대응. 두 감률의 비교 조건(1.5점) + 상승 기류 지속(1점) + 적운형 구름·소나기(0.5점)."},{"level":"상","code":"12지시03-05","q":"지균풍, 경도풍, 지상풍에 작용하는 힘을 각각 밝히고, 지상풍이 등압선과 나란하지 않고 비스듬히 부는 까닭을 설명하시오.","answer":"지균풍: 수압 경도력과 전향력이 균형을 이루어 등압선과 나란하게 분다. 경도풍: 수압 경도력, 전향력에 원심력이 더해져 곡선 등압선을 따라 분다. 지상풍: 여기에 지표면과의 마찰력이 추가된다. 마찰력은 바람의 반대 방향으로 작용해 풍속을 줄이는데, 풍속이 줄면 전향력도 작아져 수압 경도력과 균형이 깨진다. 그 결과 바람은 고기압에서 저기압 쪽으로 등압선을 가로질러 비스듬히 불게 된다.","rubric":"성취수준 A 대응. 세 바람에 작용하는 힘(1.5점) + 마찰력에 의한 전향력 감소(1점) + 등압선을 비스듬히 가로지름(1점)."}]}},"행우-01":{"diag":{"from":"중 「태양계」","items":[{"type":"선택형","q":"태양계 행성을 지구형과 목성형으로 나눌 때, 목성형 행성의 특징은?","choices":["① 반지름이 크고 평균 밀도가 작다","② 반지름이 작고 평균 밀도가 크다","③ 표면이 단단한 암석이다","④ 위성이 없다"],"answer":"①","checks":"행성의 분류 [9과07-01]","miscon":"크기와 밀도의 관계를 뒤바꿔 기억하는 경우."},{"type":"선택형","q":"태양계에서 행성들의 운동을 지배하는 힘은?","choices":["① 태양의 중력","② 자기력","③ 전기력","④ 마찰력"],"answer":"①","checks":"태양계 [9과07-01]","miscon":"케플러 법칙의 물리적 근거가 중력임을 연결하지 못하는 경우."},{"type":"서답형","q":"태양 활동이 활발해지면 지구에 나타날 수 있는 현상을 하나 쓰시오.","answer":"예) 오로라가 자주·넓게 나타난다 / 인공위성 고장, GPS·무선 통신 장애가 생긴다","checks":"태양 활동의 영향 [9과07-02]","miscon":"태양 활동을 '더워진다' 정도로만 이해. 우주 재난 관점으로 확장."}]},"form":{"items":[{"level":"하","code":"12행우01-03","q":"케플러 제1법칙과 제2법칙의 내용을 각각 한 문장으로 쓰시오.","answer":"제1법칙(타원 궤도 법칙): 행성은 태양을 한 초점으로 하는 타원 궤도를 돈다. 제2법칙(면적 속도 일정 법칙): 행성과 태양을 잇는 선분이 같은 시간 동안 쓸고 지나가는 면적은 일정하다.","rubric":"성취수준 D~C 대응. 두 법칙을 모두 바르게 쓰면 도달."},{"level":"중","code":"12행우01-03","q":"케플러 제2법칙을 이용하여, 행성이 근일점과 원일점 중 어디에서 더 빠르게 움직이는지 밝히고 그 까닭을 설명하시오.","answer":"근일점에서 더 빠르다. 같은 시간 동안 쓸고 지나가는 면적이 일정해야 하는데, 근일점에서는 태양까지의 거리가 짧으므로 같은 면적을 만들려면 더 긴 호를 지나야 한다. 따라서 공전 속도가 빨라진다.","rubric":"성취수준 C 대응. 근일점(1점) + 면적 일정 조건과 거리의 관계로 논증(2점)."},{"level":"상","code":"12행우01-05","q":"외계 행성계를 찾는 방법 중 하나를 골라 원리를 설명하고, 그 행성에 생명체가 존재할 가능성을 판단할 때 '생명가능지대'를 어떻게 활용하는지 쓰시오.","answer":"예) 식 현상(통과) 방법: 행성이 중심별 앞을 지날 때 별의 밝기가 주기적으로 미세하게 감소하는 것을 관측해 행성의 존재와 크기를 알아낸다. (또는 시선속도 방법: 행성의 중력으로 별이 미세하게 흔들려 스펙트럼이 주기적으로 적색·청색 편이되는 것을 관측한다.) 생명가능지대는 중심별로부터 액체 상태의 물이 존재할 수 있는 거리 범위로, 중심별의 표면 온도가 높고 광도가 클수록 별에서 먼 쪽에 형성된다. 발견된 행성의 공전 궤도가 이 범위 안에 있으면 물이 액체로 존재할 수 있어 생명체 존재 가능성이 높다고 판단한다.","rubric":"성취수준 A 대응. 탐사 원리(1.5점) + 생명가능지대의 정의(1점) + 중심별 특성에 따른 위치 및 판단 활용(1.5점)."}]}},"행우-02":{"diag":{"from":"중 「태양계」·「별과 우주」","items":[{"type":"선택형","q":"태양의 표면에서 주위보다 온도가 낮아 어둡게 보이는 부분은?","choices":["① 흑점","② 홍염","③ 코로나","④ 플레어"],"answer":"①","checks":"태양의 표면 [9과07-02]","miscon":"흑점을 '구멍'이나 '탄 자국'으로 오해하는 경우."},{"type":"선택형","q":"별의 겉보기 등급이 작을수록 그 별은?","choices":["① 밝게 보인다","② 어둡게 보인다","③ 멀리 있다","④ 뜨겁다"],"answer":"①","checks":"별의 등급 [9과15-01]","miscon":"등급 숫자가 클수록 밝다고 뒤바꿔 생각하는 경우가 매우 흔함."},{"type":"서답형","q":"겉보기 등급과 절대등급의 차이를 쓰시오.","answer":"겉보기 등급은 지구에서 보이는 밝기이고, 절대등급은 모든 별을 같은 거리(10 pc)에 두었다고 가정했을 때의 밝기로 별의 실제 밝기를 비교할 수 있다.","checks":"등급 개념 [9과15-01]","miscon":"두 등급을 구분하지 못하면 거리지수 계산으로 나아갈 수 없음."}]},"form":{"items":[{"level":"하","code":"12행우02-02","q":"연주시차가 0.1″인 별까지의 거리를 pc(파섹) 단위로 구하시오.","answer":"거리(pc) = 1 / 연주시차(″) = 1 / 0.1 = 10 pc","rubric":"성취수준 D~C 대응. 10 pc을 구하면 도달."},{"level":"중","code":"12행우02-02","q":"어떤 별의 겉보기 등급이 5, 절대등급이 0이다. 거리지수를 구하고 이 별이 10 pc보다 가까운지 먼지 판단하시오.","answer":"거리지수 = m − M = 5 − 0 = 5. 거리지수가 양수이면 실제 밝기보다 어둡게 보인다는 뜻이므로 10 pc보다 멀리 있다.","rubric":"성취수준 C 대응. 거리지수 5(1.5점) + 양수의 의미로 10 pc보다 멀다는 판단(1.5점)."},{"level":"상","code":"12행우02-04","q":"쌍성 관측으로 별의 질량을 직접 구할 수 있는 까닭을 설명하고, 쌍성이 아닌 별의 질량은 어떻게 추정하는지 쓰시오.","answer":"쌍성계는 두 별이 공통 질량 중심 둘레를 공전하므로, 관측으로 공전 주기와 궤도 장반경을 알아내면 케플러 제3법칙을 적용해 두 별의 질량의 합을 구할 수 있고, 각 별이 질량 중심에서 떨어진 거리의 비로부터 질량비를 알 수 있어 각각의 질량을 직접 구할 수 있다. 쌍성이 아닌 별은 주계열성의 질량이 클수록 광도가 크다는 질량-광도 관계를 이용해, 광도를 측정하여 질량을 간접적으로 추정한다.","rubric":"성취수준 A 대응. 케플러 제3법칙으로 질량 합(1.5점) + 질량 중심 거리비로 개별 질량(1점) + 질량-광도 관계 활용(1.5점)."}]}},"행우-03":{"diag":{"from":"중 「태양계」·「별과 우주」","items":[{"type":"선택형","q":"우리은하의 모양에 대한 설명으로 옳은 것은?","choices":["① 중심부가 막대 모양인 나선 은하","② 완전한 구형","③ 불규칙한 모양","④ 고리 모양"],"answer":"①","checks":"우리은하의 구조 [9과15-02]","miscon":"우리가 은하 안에 있어 옆에서 볼 수 없다는 점을 놓치는 경우."},{"type":"선택형","q":"우주가 팽창한다는 것을 보여주는 관측 사실은?","choices":["① 멀리 있는 은하일수록 빠르게 멀어진다","② 모든 은하가 정지해 있다","③ 은하들이 지구로 모여든다","④ 별의 색이 모두 같다"],"answer":"①","checks":"우주 팽창 [9과15-03]","miscon":"팽창의 '중심'이 있다고 생각하는 오개념. 풍선 모형으로 교정."},{"type":"서답형","q":"성운과 성단의 차이를 쓰시오.","answer":"성운은 성간 기체와 티끌이 모여 구름처럼 보이는 것이고, 성단은 많은 별이 무리 지어 모여 있는 것이다.","checks":"성운과 성단 [9과15-02]","miscon":"둘을 같은 것으로 보는 경우. 구성 물질(기체/별)로 구분."}]},"form":{"items":[{"level":"하","code":"12행우03-01","q":"성단의 C-M도(색-등급도)에서 주계열이 왼쪽 위부터 짧아진 성단과 길게 남아 있는 성단 중 어느 쪽이 더 나이가 많은지 쓰고, 그 까닭을 쓰시오.","answer":"주계열이 짧아진(전향점이 아래에 있는) 성단이 더 나이가 많다. 질량이 큰 별일수록 수명이 짧아 먼저 주계열을 벗어나기 때문이다.","rubric":"성취수준 D~C 대응. 판단과 까닭을 모두 쓰면 도달."},{"level":"중","code":"12행우03-02","q":"성간 티끌이 존재하면 천체까지의 거리를 실제보다 어떻게 측정하게 되는지 쓰고, 그 까닭을 설명하시오.","answer":"실제보다 더 멀리 있는 것으로 측정하게 된다. 성간 티끌이 별빛을 흡수·산란시켜(성간 소광) 별이 실제보다 어둡게 보이는데, 어두운 만큼 멀리 있다고 계산되기 때문이다. 따라서 거리를 구할 때 성간 소광을 보정해야 한다.","rubric":"성취수준 C 대응. 더 멀게 측정됨(1점) + 소광으로 어둡게 보임(1.5점) + 보정 필요성(0.5점)."},{"level":"상","code":"12행우03-03","q":"은하의 회전 속도 곡선 관측 결과가 예상과 어떻게 달랐는지 설명하고, 이로부터 어떤 존재를 추론할 수 있는지 쓰시오.","answer":"빛이 대부분 은하 중심부에 모여 있으므로, 태양계에서 바깥 행성이 느려지듯 중심에서 멀어질수록 회전 속도가 감소할 것으로 예상되었다. 그러나 실제 관측에서는 은하 바깥쪽에서도 회전 속도가 거의 줄지 않고 거의 일정하게 유지되었다. 이는 바깥쪽에도 상당한 질량이 분포해야 함을 뜻하는데, 그곳에서는 빛이 거의 관측되지 않으므로 빛을 내지 않는 물질(암흑 물질)이 은하를 넓게 감싸고 있다고 추론할 수 있다.","rubric":"성취수준 A 대응. 예상되는 감소 곡선(1점) + 실제 평탄한 곡선(1점) + 광학적으로 보이지 않는 질량의 존재 추론(1.5점)."}]}},"물리-01":{"diag":{"from":"중 「힘의 작용」·「운동과 에너지」","items":[{"type":"선택형","q":"물체에 작용하는 알짜힘이 0일 때 물체의 운동으로 옳은 것은?","choices":["① 반드시 정지해 있다","② 정지해 있거나 등속 직선 운동을 한다","③ 속력이 계속 커진다","④ 운동 방향이 계속 바뀐다"],"answer":"②","checks":"알짜힘과 운동 상태 [9과05-03]","miscon":"'알짜힘 0 = 정지'라는 오개념이 고교까지 이어짐. 관성의 법칙으로 반드시 교정할 것."},{"type":"선택형","q":"질량 2kg인 물체가 높이 5m에서 자유 낙하할 때, 지면에 닿기 직전의 운동 에너지는? (g=10m/s², 공기 저항 무시)","choices":["① 10 J","② 50 J","③ 100 J","④ 200 J"],"answer":"③","checks":"역학적 에너지 보존 [9과19-04]","miscon":"위치 에너지 mgh 계산에서 질량을 빼먹거나 높이와 혼동. 보존 관계 mgh = ½mv²를 확인시킬 것."},{"type":"서답형","q":"중학교에서 배운 '일'의 정의를 쓰고, 물체를 들고 수평으로 걸어갈 때 그 힘이 한 일이 0인 까닭을 쓰시오.","answer":"일 = 힘 × 힘의 방향으로 이동한 거리. 물체를 드는 힘은 위쪽 방향인데 이동은 수평 방향이므로, 힘의 방향으로 이동한 거리가 0이어서 일이 0이다.","checks":"일의 정의 [9과19-03]","miscon":"'힘들면 일을 한 것'이라는 일상어 혼동이 매우 흔함. 힘과 변위의 방향 관계를 강조."}]},"form":{"items":[{"level":"하","code":"12물리01-04","q":"수평면에서 정지한 질량 4kg 물체에 수평 방향으로 10N의 알짜힘이 작용하여 5m를 이동했다. 알짜힘이 한 일과 물체의 나중 운동 에너지를 각각 구하시오.","answer":"일 = 10N × 5m = 50 J. 일·운동에너지 정리에 의해 나중 운동 에너지 = 50 J (처음 운동 에너지가 0이므로)","rubric":"성취수준 E~D 대응. 일의 값과 운동 에너지를 모두 구하면 도달. 일과 운동 에너지의 관계를 쓰지 못하면 미도달."},{"level":"중","code":"12물리01-01","q":"길이 2m인 균일한 막대의 왼쪽 끝에서 0.5m 지점을 받침점으로 놓았다. 막대의 무게가 20N일 때, 막대가 수평 평형을 이루려면 왼쪽 끝에 몇 N의 힘을 아래로 작용해야 하는지 구하고, 판단 근거를 쓰시오.","answer":"막대의 무게는 중앙(왼쪽 끝에서 1m)에 작용한다. 받침점 기준 오른쪽 돌림힘 = 20N × 0.5m = 10N·m. 왼쪽 끝은 받침점에서 0.5m이므로 F × 0.5 = 10 → F = 20N.","rubric":"성취수준 C 대응. 무게가 중앙에 작용함(1점) + 돌림힘 평형식(1점) + 답 20N(1점). ※돌림힘 기준점은 1개인 단순 상황만."},{"level":"상","code":"12물리01-06","q":"'열을 모두 일로 바꾸는 기관'과 '마찰 없이 영원히 도는 바퀴'는 만들 수 없다. 두 영구기관이 불가능한 까닭을 에너지 보존과 열의 이동 방향을 이용해 각각 논증하시오.","answer":"두 번째 종류(열을 100% 일로): 열기관은 고온부에서 받은 열의 일부를 반드시 저온부로 버려야 순환이 완성되므로 효율이 100%가 될 수 없다. 첫 번째 종류(영원히 도는 바퀴): 마찰과 공기 저항으로 역학적 에너지가 열로 전환되어 흩어지며, 외부에서 에너지를 공급받지 않으면 에너지 총량은 보존되더라도 다시 역학적 에너지로 모을 수 없어 계속 돌 수 없다.","rubric":"성취수준 A 대응. 에너지 총량 보존을 근거로 사용(1점) + 열이 저온으로 버려져야 함(1점) + 두 사례를 구분해 논증(1점). ※열역학 과정의 정량 계산은 요구하지 않음."}]}},"물리-02":{"diag":{"from":"중 「전기와 자기」","items":[{"type":"선택형","q":"저항 R에 전압 V를 걸었을 때 흐르는 전류 I의 관계로 옳은 것은?","choices":["① I = VR","② I = V/R","③ I = R/V","④ I = V + R"],"answer":"②","checks":"옴의 법칙 [9과14-02]","miscon":"식을 외우기만 하고 변형하지 못하는 경우. V=IR에서 세 형태를 모두 다루게 할 것."},{"type":"선택형","q":"가정에서 여러 전기 기구를 병렬로 연결하는 까닭으로 옳은 것은?","choices":["① 각 기구에 같은 전압이 걸리기 때문","② 전류가 줄어들기 때문","③ 하나가 꺼지면 모두 꺼지기 때문","④ 전선을 아낄 수 있기 때문"],"answer":"①","checks":"저항의 병렬연결 [9과14-03]","miscon":"직렬·병렬의 실용적 이유를 모르는 경우. 정격 전압 개념과 연결."},{"type":"서답형","q":"전류가 흐르는 코일이 자석 옆에서 힘을 받는 현상을 이용한 장치를 하나 쓰고, 어떤 에너지가 어떤 에너지로 바뀌는지 쓰시오.","answer":"전동기(모터). 전기 에너지가 운동 에너지(역학적 에너지)로 전환된다.","checks":"전류의 자기 작용 [9과14-04]","miscon":"전동기와 발전기의 에너지 전환 방향을 뒤바꾸는 경우가 흔함."}]},"form":{"items":[{"level":"하","code":"12물리02-02","q":"소비 전력의 정의를 식으로 쓰고, 220V에서 2A가 흐르는 전기 기구의 소비 전력을 구하시오.","answer":"P = VI. P = 220V × 2A = 440 W","rubric":"성취수준 E~D 대응. 식과 값을 모두 맞히면 도달."},{"level":"중","code":"12물리02-03","q":"스마트폰의 정전식 터치스크린이 손가락을 인식하는 원리를 축전기에서 전기 에너지가 저장되는 방식과 관련지어 설명하시오.","answer":"터치스크린 표면에는 전하를 저장하는 축전기 구조가 격자로 배치되어 있다. 손가락이 닿으면 도체인 인체가 그 지점의 전하 분포를 바꾸어 저장되는 전하량이 달라지고, 기기가 이 변화를 감지해 위치를 인식한다.","rubric":"성취수준 C 대응. 축전기의 전하 저장(1점) + 손가락 접촉에 의한 변화 감지(2점). ※전기 용량·유전체는 다루지 않음."},{"level":"상","code":"12물리02-06","q":"무선 충전기가 전선 연결 없이 스마트폰을 충전하는 원리를 전자기 유도로 설명하고, 이 기술이 현대 생활에 준 변화를 한 가지 쓰시오.","answer":"충전기 내부 코일에 시간에 따라 변하는 전류를 흘려 변하는 자기장을 만든다. 이 자기장이 스마트폰 내부 코일을 지나며 자기선속을 변화시키면 유도 기전력이 생겨 전류가 흐르고, 그 전기 에너지로 배터리를 충전한다. 변화: 접점 부식·단자 손상이 없어지고 방수 기기 설계가 쉬워졌으며, 전기차·의료 삽입기기 충전 등으로 확장되었다.","rubric":"성취수준 A 대응. 변하는 자기장 생성(1점) + 자기선속 변화에 의한 유도 전류(1점) + 사회적 영향(1점)."}]}},"물리-03":{"diag":{"from":"중 「빛과 파동」","items":[{"type":"선택형","q":"빛이 공기에서 물로 비스듬히 들어갈 때 나타나는 현상은?","choices":["① 반사만 일어난다","② 굴절되어 진행 방향이 꺾인다","③ 속력이 변하지 않는다","④ 사라진다"],"answer":"②","checks":"빛의 굴절 [9과10-01]","miscon":"굴절의 원인이 매질에 따른 속력 차이임을 모르는 경우. 고교에서 이 부분을 연결할 것."},{"type":"선택형","q":"소리의 높낮이를 결정하는 파동의 요소는?","choices":["① 진폭","② 진동수","③ 파장의 세기","④ 매질의 색"],"answer":"②","checks":"파동의 요소 [9과10-04]","miscon":"진폭(크기)과 진동수(높낮이)를 혼동하는 경우가 고교까지 남음."},{"type":"서답형","q":"빨간 사과가 빨갛게 보이는 까닭을 빛의 반사와 관련지어 쓰시오.","answer":"사과 표면이 빨간색 빛은 반사하고 다른 색의 빛은 흡수하기 때문에 반사된 빨간 빛이 눈에 들어와 빨갛게 보인다.","checks":"물체의 색 [9과10-03]","miscon":"'사과가 빨간색을 가지고 있다'는 실체론적 이해. 반사·흡수로 설명하게 할 것."}]},"form":{"items":[{"level":"하","code":"12물리03-05","q":"고체의 에너지띠 구조에서 도체와 부도체의 차이를 띠틈(에너지 간격)을 이용해 설명하시오.","answer":"도체는 전자가 채워진 띠와 빈 띠가 겹쳐 있거나 띠틈이 없어 전자가 쉽게 이동할 수 있다. 부도체는 띠틈이 매우 커서 전자가 윗 띠로 올라가지 못해 전류가 거의 흐르지 않는다.","rubric":"성취수준 D~C 대응. 띠틈의 크기 차이로 설명하면 도달."},{"level":"중","code":"12물리03-04","q":"수소 기체의 방출 스펙트럼이 연속적이지 않고 몇 개의 밝은 선으로만 나타나는 까닭을, 원자 내 전자의 에너지 준위를 이용해 설명하시오.","answer":"원자 내 전자는 아무 에너지나 가질 수 없고 정해진(양자화된) 에너지 준위에만 존재한다. 전자가 높은 준위에서 낮은 준위로 떨어질 때 두 준위의 에너지 차이에 해당하는 특정 진동수의 빛만 방출되므로, 그 값에 해당하는 몇 개의 선만 나타난다.","rubric":"성취수준 C 대응. 에너지 준위의 양자화(1점) + 준위 차이만큼의 빛 방출(1점) + 선스펙트럼 결론(1점)."},{"level":"상","code":"12물리03-06","q":"빠르게 움직이는 우주선 안의 시계가 지상 관측자에게 느리게 가는 것으로 보이는 현상의 이름을 쓰고, 이 현상이 '모든 관성계에서 빛의 속력이 같다'는 원리로부터 어떻게 나오는지 설명하시오. 또 이 지식이 실제로 쓰이는 사례를 하나 드시오.","answer":"시간 팽창. 빛이 우주선 안에서 위아래로 왕복하는 것을 지상에서 보면 빛이 비스듬한 더 긴 경로를 지나가는 것으로 보인다. 그런데 빛의 속력은 두 관측자에게 같으므로, 더 긴 경로를 같은 속력으로 지나려면 더 긴 시간이 걸려야 한다. 따라서 지상 관측자에게 우주선의 시간이 느리게 가는 것으로 보인다. 사례: GPS 위성의 시계 보정.","rubric":"성취수준 A 대응. 광속 불변 전제(1점) + 경로 길이 차이로 논증(2점) + 활용 사례(1점). ※동시성의 상대성·정량 계산은 요구하지 않음."}]}},"역학-01":{"diag":{"from":"중 「힘의 작용」","items":[{"type":"선택형","q":"물체에 나란하지 않은 두 힘이 작용할 때, 물체의 운동을 예측하려면 먼저 무엇을 구해야 하는가?","choices":["① 두 힘의 합력(알짜힘)","② 두 힘의 차이의 절댓값만","③ 더 큰 힘만","④ 힘의 개수"],"answer":"①","checks":"힘의 합성 [9과05-01]","miscon":"중학교에서는 나란한 힘만 다루므로 벡터 합성이 새로움. 화살표 그림으로 도입할 것."},{"type":"선택형","q":"자유 낙하하는 물체의 시간에 따른 속력 변화에 대한 설명으로 옳은 것은? (공기 저항 무시)","choices":["① 질량이 클수록 빨리 떨어진다","② 질량과 관계없이 속력 변화가 같다","③ 속력이 일정하다","④ 점점 느려진다"],"answer":"②","checks":"자유 낙하 [9과19-02]","miscon":"'무거운 것이 빨리 떨어진다'는 오개념이 고교까지 매우 강하게 남음."},{"type":"서답형","q":"중력의 특징을 크기와 방향의 관점에서 쓰시오.","answer":"크기는 물체의 질량에 비례하며(지구 표면에서 무게 = 질량 × 중력가속도), 방향은 항상 지구 중심 쪽(연직 아래)이다.","checks":"중력 [9과05-02]","miscon":"질량과 무게를 구분하지 못하는 경우. 고교 역학의 기초이므로 반드시 정리."}]},"form":{"items":[{"level":"하","code":"12역학01-02","q":"수평 방향으로 20m/s로 던진 공이 2초 후 도달한 수평 거리와 낙하한 높이를 각각 구하시오. (g=10m/s², 공기 저항 무시)","answer":"수평 거리 = 20 × 2 = 40 m / 낙하 높이 = ½ × 10 × 2² = 20 m","rubric":"성취수준 D~C 대응. 수평은 등속, 연직은 등가속도로 분리해 계산하면 도달."},{"level":"중","code":"12역학01-04","q":"인공위성이 지구 주위를 원운동할 때 구심력의 역할을 하는 힘이 무엇인지 쓰고, 궤도 반지름이 클수록 공전 주기가 길어지는 까닭을 케플러 법칙과 관련지어 설명하시오.","answer":"지구와 위성 사이의 중력이 구심력 역할을 한다. 케플러 제3법칙에 따라 공전 주기의 제곱은 궤도 반지름의 세제곱에 비례하므로, 반지름이 커지면 주기가 길어진다. 또한 반지름이 클수록 중력이 약해져 필요한 구심 가속도가 작아지고 공전 속력도 느려진다.","rubric":"성취수준 C 대응. 중력=구심력(1점) + 케플러 제3법칙 관계(1점) + 결론(1점)."},{"level":"상","code":"12역학01-05","q":"달에는 대기가 거의 없지만 지구에는 두꺼운 대기가 있다. 이 차이를 탈출 속도의 개념으로 설명하시오.","answer":"탈출 속도는 천체의 중력을 벗어나는 데 필요한 최소 속도로, 천체의 질량이 크고 반지름이 작을수록 크다. 달은 질량이 작아 탈출 속도가 지구보다 훨씬 작다. 기체 분자는 온도에 따라 여러 속력으로 운동하는데, 달에서는 상당수 분자의 속력이 탈출 속도를 넘어 우주로 빠져나가 대기가 유지되지 못했다. 지구는 탈출 속도가 커서 대부분의 분자를 붙잡아 둘 수 있다.","rubric":"성취수준 A 대응. 탈출 속도의 의미와 천체 질량 의존(1점) + 기체 분자 속력 분포와 비교(1.5점) + 두 천체 비교 결론(0.5점). ※정성적 설명으로 충분."}]}},"역학-02":{"diag":{"from":"중 「열」","items":[{"type":"선택형","q":"온도가 다른 두 물체를 접촉시켰을 때 최종적으로 도달하는 상태는?","choices":["① 열평형","② 절대영도","③ 상태 변화","④ 단열"],"answer":"①","checks":"열평형 [9과03-01]","miscon":"'차가움이 이동한다'는 오개념. 이동하는 것은 열임을 재확인."},{"type":"선택형","q":"같은 열량을 주었을 때 온도가 더 적게 올라가는 물질의 특징은?","choices":["① 비열이 크다","② 비열이 작다","③ 질량이 작다","④ 열팽창이 크다"],"answer":"①","checks":"비열 [9과03-03]","miscon":"비열을 '뜨거워지는 정도'와 반대로 이해하는 경우가 흔함."},{"type":"서답형","q":"기체의 온도를 높이면 부피가 커지는 까닭을 입자의 운동으로 설명하시오.","answer":"온도가 높아지면 기체 입자의 운동이 활발해져 벽에 더 세게, 더 자주 충돌한다. 압력이 일정하게 유지되려면 부피가 커져야 하므로 기체의 부피가 증가한다.","checks":"기체의 온도와 부피 [9과06-03]","miscon":"입자 자체가 커진다고 생각하는 오개념. 입자 크기는 변하지 않고 운동과 간격이 변함을 강조."}]},"form":{"items":[{"level":"하","code":"12역학02-02","q":"이상 기체의 압력, 부피, 온도(절대온도) 사이의 관계식을 쓰고, 온도가 일정할 때 부피를 절반으로 줄이면 압력이 어떻게 되는지 쓰시오.","answer":"PV = nRT. 온도가 일정하면 PV가 일정하므로 부피가 절반이 되면 압력은 2배가 된다.","rubric":"성취수준 D~C 대응. 관계식과 결과를 모두 맞히면 도달."},{"level":"중","code":"12역학02-03","q":"기체에 열 Q를 가했더니 기체가 팽창하며 외부에 일 W를 하였다. 이때 기체의 내부 에너지 변화를 식으로 쓰고, 내부 에너지가 줄어들 수도 있는 조건을 설명하시오.","answer":"ΔU = Q − W. 기체가 한 일 W가 가해진 열 Q보다 크면 ΔU가 음수가 되어 내부 에너지가 줄어든다(예: 단열 팽창에서 Q=0이면 ΔU = −W로 온도가 내려간다).","rubric":"성취수준 C 대응. 열역학 제1법칙 식(1점) + 감소 조건을 W>Q 또는 단열 팽창으로 설명(2점)."},{"level":"상","code":"12역학02-05","q":"뜨거운 물과 차가운 물을 섞으면 미지근해지지만, 미지근한 물이 저절로 뜨거운 물과 차가운 물로 나뉘지는 않는다. 이 비가역성을 엔트로피로 설명하시오.","answer":"엔트로피는 계의 무질서한 정도(에너지가 퍼진 정도)를 나타낸다. 열이 고온에서 저온으로 이동해 섞이면 에너지 분포가 더 고르게 퍼져 전체 엔트로피가 증가한다. 자연에서 고립계의 엔트로피는 감소하지 않으므로(열역학 제2법칙), 엔트로피가 줄어드는 반대 과정인 저절로 분리되는 변화는 일어나지 않는다.","rubric":"성취수준 A 대응. 엔트로피의 의미(1점) + 혼합 시 증가(1점) + 제2법칙으로 역과정 불가 논증(1점)."}]}},"역학-03":{"diag":{"from":"중 「빛과 파동」","items":[{"type":"선택형","q":"파동에서 진동수가 클수록 커지는 것은?","choices":["① 파장","② 소리의 높이","③ 진폭","④ 매질의 밀도"],"answer":"②","checks":"파동의 요소 [9과10-04]","miscon":"진동수와 파장이 반비례 관계임을 놓치는 경우. v = fλ로 정리해 줄 것."},{"type":"선택형","q":"소리가 전달되려면 반드시 필요한 것은?","choices":["① 빛","② 매질","③ 자기장","④ 진공"],"answer":"②","checks":"파동의 전달 [9과10-04]","miscon":"진공에서도 소리가 들린다고 생각하는 경우. 진공 종 실험으로 확인."},{"type":"서답형","q":"파동의 속력, 진동수, 파장 사이의 관계식을 쓰시오.","answer":"v = f λ (속력 = 진동수 × 파장)","checks":"파동의 기본 관계","miscon":"식은 외우지만 매질이 같으면 속력이 일정하다는 점을 놓쳐 진동수와 파장의 반비례를 못 보는 경우."}]},"form":{"items":[{"level":"하","code":"12역학03-01","q":"용수철에 매달린 물체가 단진동할 때, 물체의 가속도의 크기가 가장 큰 지점과 가장 작은 지점을 각각 쓰시오.","answer":"가속도가 가장 큰 곳: 변위가 최대인 양 끝점 / 가장 작은 곳(0): 평형점(변위 0)","rubric":"성취수준 D~C 대응. 가속도가 변위에 비례함을 적용하면 도달."},{"level":"중","code":"12역학03-03","q":"구급차가 다가올 때와 멀어질 때 사이렌 소리의 높이가 다르게 들리는 까닭을 도플러 효과로 설명하고, 이 원리가 쓰이는 장치를 하나 쓰시오.","answer":"음원이 다가오면 관측자에게 도달하는 파면 간격이 좁아져 진동수가 커지므로 소리가 높게 들리고, 멀어지면 간격이 넓어져 진동수가 작아져 낮게 들린다. 활용: 속도 측정용 스피드건, 도플러 초음파 진단기, 기상 레이더 등","rubric":"성취수준 C 대응. 다가올 때 진동수 증가(1점) + 멀어질 때 감소(1점) + 활용 장치(1점)."},{"level":"상","code":"12역학03-05","q":"길이가 같은 기타 줄에서 줄을 더 팽팽하게 조이면 소리가 높아진다. 이 현상을 정상파를 이용해 설명하시오.","answer":"양 끝이 고정된 줄에서는 양 끝이 마디가 되는 정상파만 유지되므로, 기본 진동의 파장은 줄 길이의 2배로 정해진다. 줄을 팽팽하게 조이면 장력이 커져 줄에서 파동이 전달되는 속력 v가 커진다. v = fλ에서 파장 λ는 줄 길이에 의해 고정되어 있으므로 속력이 커지면 진동수 f가 커지고, 따라서 소리가 높아진다.","rubric":"성취수준 A 대응. 양 끝 고정 → 파장이 길이로 결정(1점) + 장력 증가 → 속력 증가(1점) + v=fλ로 진동수 증가 결론(1점)."}]}},"전자-01":{"diag":{"from":"중 「전기와 자기」","items":[{"type":"선택형","q":"대전된 물체를 금속 막대에 가까이 했을 때 막대 양 끝에 서로 다른 전하가 나타나는 현상은?","choices":["① 정전기 유도","② 옴의 법칙","③ 전자기 유도","④ 열평형"],"answer":"①","checks":"정전기 유도 [9과14-01]","miscon":"정전기 유도와 전자기 유도의 이름을 혼동. 원인(전하 vs 자기선속 변화)으로 구분시킬 것."},{"type":"선택형","q":"전류가 흐르는 직선 도선 주위에 생기는 것은?","choices":["① 전기장만","② 자기장","③ 중력장","④ 아무것도 없다"],"answer":"②","checks":"전류의 자기 작용 [9과14-04]","miscon":"전류와 자기장의 관계를 모르는 경우. 나침반 실험으로 확인."},{"type":"서답형","q":"저항의 직렬연결과 병렬연결에서 각 저항에 걸리는 전압과 흐르는 전류의 특징을 각각 쓰시오.","answer":"직렬: 전류가 모든 저항에 같고, 전압은 저항 크기에 비례해 나뉜다. 병렬: 전압이 모든 저항에 같고, 전류는 저항 크기에 반비례해 나뉜다.","checks":"저항의 연결 [9과14-03]","miscon":"직렬·병렬에서 무엇이 같은지 뒤바꾸는 실수가 매우 흔함."}]},"form":{"items":[{"level":"하","code":"12전자01-04","q":"자기장 속에서 운동하는 전하가 힘을 받으려면 어떤 조건이어야 하는지 쓰고, 그 힘의 이름을 쓰시오.","answer":"전하가 운동해야 하고, 운동 방향이 자기장 방향과 나란하지 않아야 한다(수직 성분이 있어야 한다). 이 힘을 로런츠 힘이라 한다.","rubric":"성취수준 D~C 대응. 조건과 이름을 모두 쓰면 도달."},{"level":"중","code":"12전자01-01","q":"어떤 영역의 전기력선이 촘촘한 곳과 성긴 곳이 있다. 전기장의 세기가 더 큰 곳은 어디인지 쓰고, 등전위면과 전기력선의 관계를 설명하시오.","answer":"전기력선이 촘촘한 곳의 전기장이 더 세다. 등전위면은 전위가 같은 지점을 이은 면으로, 전기력선과 항상 수직으로 만난다. 등전위면 위에서 전하를 옮길 때는 일이 필요하지 않다.","rubric":"성취수준 C 대응. 밀도-세기 관계(1점) + 등전위면과 수직(1점) + 등전위면 위 일이 0(1점). ※그려진 그림을 해석하는 수준."},{"level":"상","code":"12전자01-05","q":"변압기가 전압을 바꾸는 원리를 자기선속의 변화로 설명하고, 발전소에서 송전할 때 전압을 높이는 까닭을 함께 쓰시오.","answer":"1차 코일에 교류를 흘리면 철심을 통해 시간에 따라 변하는 자기선속이 2차 코일을 지난다. 이 변화가 2차 코일에 유도 기전력을 만드는데, 그 크기는 코일의 감은 수에 비례하므로 감은 수 비를 조절해 전압을 바꿀 수 있다. 송전 시 전압을 높이면 같은 전력에서 전류가 작아지고, 송전선에서의 손실은 전류의 제곱에 비례하므로 손실을 크게 줄일 수 있다.","rubric":"성취수준 A 대응. 자기선속 변화에 의한 유도(1점) + 감은 수 비(1점) + 전류 감소에 따른 손실 감소(1점)."}]}},"전자-02":{"diag":{"from":"중 「빛과 파동」","items":[{"type":"선택형","q":"두 파동이 만나 서로 겹쳐질 때 나타나는 현상은?","choices":["① 중첩(간섭)","② 반사","③ 굴절","④ 흡수"],"answer":"①","checks":"파동의 중첩","miscon":"중학교에서 간섭을 깊이 다루지 않아 생소함. 물결파 사진으로 도입할 것."},{"type":"선택형","q":"볼록렌즈를 통과한 평행 광선은 어떻게 되는가?","choices":["① 한 점(초점)에 모인다","② 퍼져 나간다","③ 그대로 나아간다","④ 되돌아온다"],"answer":"①","checks":"렌즈 [9과10-02]","miscon":"볼록·오목 렌즈의 작용을 뒤바꾸는 경우."},{"type":"서답형","q":"빛이 파동의 성질을 가진다는 것을 보여주는 현상을 하나 쓰시오.","answer":"예) 비눗방울이나 기름막에 무지개색 무늬가 보인다(간섭) / 좁은 틈을 지난 빛이 퍼진다(회절)","checks":"빛의 파동성(선개념)","miscon":"빛을 입자로만 생각하는 경우. 일상 사례로 파동성을 인식시킬 것."}]},"form":{"items":[{"level":"하","code":"12전자02-03","q":"편광판 두 장을 겹쳐 놓고 한 장을 90° 돌리면 빛이 거의 통과하지 못한다. 그 까닭을 편광의 원리로 설명하시오.","answer":"첫 번째 편광판을 지난 빛은 한 방향으로만 진동한다. 두 번째 편광판의 투과축이 그 방향과 수직이면 그 진동 성분이 통과하지 못해 빛이 거의 차단된다.","rubric":"성취수준 D~C 대응. 한 방향 진동 + 투과축 수직으로 설명하면 도달. ※투과량 변화는 정성적으로만."},{"level":"중","code":"12전자02-04","q":"광전효과에서 빛의 세기를 아무리 크게 해도 진동수가 어떤 값보다 작으면 전자가 튀어나오지 않는다. 이 사실이 빛의 어떤 성질을 보여주는지 설명하시오.","answer":"빛이 연속적인 파동이라면 세기를 키워 에너지를 모으면 전자가 튀어나와야 한다. 그러나 진동수가 문턱값보다 작으면 세기와 무관하게 전자가 방출되지 않는다는 것은, 빛이 진동수에 비례하는 에너지를 가진 알갱이(광자) 단위로 전달됨을 뜻한다. 즉 빛의 입자성을 보여준다.","rubric":"성취수준 C 대응. 파동 예측과의 불일치(1점) + 광자 1개의 에너지가 진동수에 비례(1점) + 입자성 결론(1점)."},{"level":"상","code":"12전자02-05","q":"레이저 빛이 일반 전구 빛과 다른 특징을 두 가지 쓰고, 이 특징 때문에 레이저가 광통신에 적합한 까닭을 설명하시오.","answer":"특징: ①위상과 방향이 잘 맞아(결맞음) 멀리까지 거의 퍼지지 않는다 ②거의 단일 진동수(단색성)이며 세기가 강하다. 광통신에서는 광섬유 안으로 빛을 좁게 모아 멀리 보내야 하고, 진동수가 고르지 않으면 신호가 퍼져 뭉개진다. 레이저는 퍼짐이 적고 단색성이 좋아 신호 손실과 왜곡이 적으므로 장거리 대용량 통신에 적합하다.","rubric":"성취수준 A 대응. 특징 2가지(각 1점) + 광통신 적합성과 연결(1점)."}]}},"전자-03":{"diag":{"from":"중 「물질의 구성」·「빛과 파동」 (공식 선수 단원 없음)","items":[{"type":"선택형","q":"원자의 구조에 대한 설명으로 옳은 것은?","choices":["① 원자핵 주위에 전자가 있다","② 원자핵은 전자로 이루어져 있다","③ 전자는 원자핵 안에 있다","④ 원자는 더 작은 알갱이가 없다"],"answer":"①","checks":"원자의 구성 [9과11-02]","miscon":"원자 모형을 태양계처럼 고정 궤도로만 이해. 고교에서 확률 분포로 확장할 것."},{"type":"선택형","q":"빛의 입자성을 보여주는 대표적인 현상은?","choices":["① 광전효과","② 굴절","③ 반사","④ 그림자"],"answer":"①","checks":"빛의 이중성(선개념)","miscon":"빛을 파동 아니면 입자 중 하나로만 보려는 경향. 상황에 따라 다르게 나타남을 안내."},{"type":"서답형","q":"'파동'과 '입자'의 가장 큰 차이를 한 가지 쓰시오.","answer":"예) 파동은 퍼져 나가며 서로 겹쳐 간섭할 수 있지만, 입자는 한 위치에 있고 개수를 셀 수 있다.","checks":"파동과 입자 개념","miscon":"둘의 차이를 명확히 말하지 못하면 이중성의 기묘함을 느끼기 어려움."}]},"form":{"items":[{"level":"하","code":"12전자03-03","q":"터널 효과가 무엇인지 한 문장으로 설명하고, 이와 관련된 기술이나 현상을 하나 쓰시오.","answer":"고전적으로는 넘을 수 없는 에너지 장벽을 입자가 확률적으로 통과하는 현상이다. 예: 주사 터널링 현미경(STM), 반도체 소자 소형화에 따른 누설 전류, 별 내부의 핵융합","rubric":"성취수준 D~C 대응. 정의와 사례를 모두 쓰면 도달. ※정성적 설명."},{"level":"중","code":"12전자03-04","q":"현대의 원자모형이 보어의 원자모형과 어떻게 다른지 불확정성 원리와 확률의 관점에서 비교하시오.","answer":"보어 모형은 전자가 정해진 반지름의 궤도를 도는 것으로 그렸다. 현대 모형에서는 불확정성 원리에 따라 전자의 위치와 운동량을 동시에 정확히 알 수 없으므로 궤도를 그릴 수 없고, 전자가 어디에서 발견될 확률이 얼마인지를 나타내는 확률 분포(전자 구름)로 기술한다.","rubric":"성취수준 C 대응. 보어 모형의 궤도 개념(1점) + 불확정성 원리(1점) + 확률 분포로 기술(1점). ※오비탈은 다루지 않음."},{"level":"상","code":"12전자03-01","q":"단일 전자를 하나씩 이중 슬릿에 보내는 실험에서, 전자는 스크린에 하나의 점으로 찍히지만 오래 쌓으면 간섭 무늬가 나타난다. 이 결과가 왜 기묘한지, 확률 파동의 간섭으로 어떻게 해석되는지 설명하시오.","answer":"전자가 한 번에 하나씩 도착해 점으로 찍히는 것은 입자의 성질이고, 쌓인 분포가 간섭 무늬를 이루는 것은 파동의 성질이다. 전자가 하나뿐이면 무엇과 간섭했는지 설명할 수 없어 기묘하다. 양자역학에서는 전자의 상태를 확률 파동으로 기술하며, 이 파동이 두 슬릿을 모두 지나 스스로 겹쳐 간섭한다. 그 결과 만들어진 파동의 세기가 전자가 그 위치에서 발견될 확률이 되므로, 하나씩 쌓아도 확률이 큰 곳에 많이 찍혀 간섭 무늬가 나타난다.","rubric":"성취수준 A 대응. 입자성과 파동성의 동시 관찰(1점) + 확률 파동이 두 슬릿을 지나 간섭(1.5점) + 파동 세기 = 발견 확률(1.5점)."}]}},"생과-01":{"diag":{"from":"중 「생물의 구성과 다양성」·「동물과 에너지」","items":[{"type":"선택형","q":"생물의 유기적 구성 단계를 동물에서 순서대로 바르게 나열한 것은?","choices":["① 세포-조직-기관-기관계-개체","② 세포-기관-조직-개체","③ 조직-세포-기관-개체","④ 세포-조직-조직계-기관-개체"],"answer":"①","checks":"생물의 구성 단계 [9과02-02]","miscon":"④는 식물의 구성 단계. 동물과 식물의 차이(기관계 vs 조직계)를 확인할 것."},{"type":"선택형","q":"우리 몸이 세포호흡으로 에너지를 얻을 때 필요한 두 가지는?","choices":["① 영양소와 산소","② 물과 빛","③ 이산화 탄소와 물","④ 산소와 노폐물"],"answer":"①","checks":"세포호흡 [9과13-05]","miscon":"광합성의 원료(물·이산화 탄소)와 혼동하는 경우가 매우 흔함."},{"type":"서답형","q":"생태계에서 '생물 요소'와 '비생물 요소'가 서로 영향을 주고받는 예를 하나 쓰시오.","answer":"예) 빛의 세기가 강한 곳에서는 잎이 두껍고 작은 식물이 자란다 / 지렁이가 흙을 갈아 토양의 통기성을 높인다","checks":"생태계 구성 요소 [4과14-01 / 9과02 연계]","miscon":"한 방향(환경→생물)만 생각하고 생물이 환경을 바꾸는 면을 놓치는 경우."}]},"form":{"items":[{"level":"하","code":"12생과01-03","q":"세포에서 에너지를 저장하고 사용하는 데 직접 쓰이는 물질의 이름을 쓰고, 물질대사를 동화 작용과 이화 작용으로 나눌 때 각각의 에너지 출입 방향을 쓰시오.","answer":"ATP. 동화 작용은 에너지를 흡수하며 작은 물질을 큰 물질로 합성하고, 이화 작용은 큰 물질을 분해하며 에너지를 방출한다.","rubric":"성취수준 D~C 대응. ATP와 두 작용의 에너지 방향을 모두 쓰면 도달. ※ATP의 구조는 다루지 않음."},{"level":"중","code":"12생과01-04","q":"운동을 격렬하게 할 때 심장 박동과 호흡이 빨라지고 땀이 나는 현상을, 소화·순환·호흡·배설계의 통합적 작용으로 설명하시오.","answer":"근육이 많은 ATP를 쓰므로 세포호흡이 활발해진다. 호흡계는 산소를 더 많이 받아들이고 이산화 탄소를 빠르게 내보내며, 순환계는 심장 박동을 높여 소화계가 흡수한 포도당과 산소를 근육으로 빠르게 운반한다. 생성된 이산화 탄소는 호흡계로, 물·요소 등은 배설계로 보내지며, 열이 많이 나므로 땀을 흘려 체온을 조절한다.","rubric":"성취수준 C 대응. 세포호흡 요구 증가(1점) + 각 기관계의 역할 연결(1.5점) + 생리적 변화와 연관(0.5점)."},{"level":"상","code":"12생과01-06","q":"생태계에서 물질은 순환하지만 에너지는 순환하지 않고 흐른다. 이 차이를 설명하고, 그 결과 생태계가 유지되기 위해 반드시 필요한 것이 무엇인지 쓰시오.","answer":"탄소·질소 같은 물질은 생산자→소비자→분해자를 거쳐 다시 무기물로 되돌아가 재사용되므로 순환한다. 반면 에너지는 각 영양단계를 지날 때마다 상당 부분이 열로 전환되어 생태계 밖으로 빠져나가고 다시 이용될 수 없으므로 한 방향으로 흐른다. 따라서 생태계가 유지되려면 태양에서 에너지가 계속 공급되어야 한다.","rubric":"성취수준 A 대응. 물질의 재사용(1점) + 에너지가 열로 소실되어 재사용 불가(1.5점) + 태양 에너지의 지속적 공급 필요(0.5점)."}]}},"생과-02":{"diag":{"from":"중 「자극과 반응」","items":[{"type":"선택형","q":"뜨거운 것에 손이 닿았을 때 자신도 모르게 손을 떼는 반응의 중추는?","choices":["① 대뇌","② 척수","③ 소뇌","④ 간뇌"],"answer":"②","checks":"무조건 반사 [9과20-02]","miscon":"모든 반응의 중추를 뇌로 생각하는 경우. 경로가 짧아 빠르다는 점과 연결."},{"type":"선택형","q":"혈당량이 높아졌을 때 분비되어 혈당량을 낮추는 호르몬은?","choices":["① 인슐린","② 글루카곤","③ 티록신","④ 성장호르몬"],"answer":"①","checks":"호르몬과 항상성 [9과20-03]","miscon":"인슐린과 글루카곤의 작용을 뒤바꾸는 실수가 매우 흔함."},{"type":"서답형","q":"신경계와 호르몬이 함께 작용하여 우리 몸을 일정한 상태로 유지하는 것을 무엇이라 하는지 쓰시오.","answer":"항상성","checks":"항상성 [9과20-03]","miscon":"용어는 알아도 '조절 과정'으로 설명하지 못하는 경우가 많음."}]},"form":{"items":[{"level":"하","code":"12생과02-03","q":"사람의 신경계를 중추 신경계와 말초 신경계로 구분할 때, 중추 신경계에 속하는 기관 두 가지를 쓰시오.","answer":"뇌, 척수","rubric":"성취수준 E~D 대응. 두 기관을 쓰면 도달."},{"level":"중","code":"12생과02-02","q":"신경 신호가 시냅스를 건너 다음 뉴런으로 전달되는 과정을 설명하고, 약물이 이 과정에 영향을 줄 수 있는 까닭을 쓰시오.","answer":"축삭 말단에 흥분이 도달하면 시냅스 소포에서 신경 전달 물질이 분비되어 시냅스 틈으로 방출되고, 다음 뉴런의 수용체에 결합해 흥분을 일으킨다. 약물은 신경 전달 물질과 구조가 비슷해 수용체에 대신 결합하거나, 분비·재흡수·분해를 방해하여 신호 전달을 강화하거나 차단할 수 있다.","rubric":"성취수준 C 대응. 전달 물질 분비와 수용체 결합(2점) + 약물의 작용 방식(1점)."},{"level":"상","code":"12생과02-05","q":"같은 병원체에 두 번째 감염되었을 때 병을 앓지 않고 지나가는 경우가 많다. 이를 선천적 면역과 후천적 면역을 구분하여 설명하고, 백신이 이 원리를 어떻게 이용하는지 쓰시오.","answer":"선천적 면역은 병원체의 종류를 가리지 않고 즉시 작용하는 방어(피부·점막, 식균 작용, 염증)이고, 후천적 면역은 특정 항원에 대해 림프구가 반응하는 방어이다. 1차 감염 때 만들어진 기억 세포가 남아 있어, 같은 항원이 다시 들어오면 훨씬 빠르고 많은 양의 항체를 만드는 2차 면역 반응이 일어나 증상이 나타나기 전에 제거된다. 백신은 병원성을 없앤 항원을 미리 주입해 기억 세포를 만들어 두는 것이므로, 실제 감염 시 곧바로 2차 면역 반응이 일어나 병을 예방한다.","rubric":"성취수준 A 대응. 두 면역의 구분(1점) + 기억 세포에 의한 2차 면역 반응(1.5점) + 백신 원리와 연결(1.5점)."}]}},"생과-03":{"diag":{"from":"중 「생물의 구성과 다양성」·「생식과 유전」","items":[{"type":"선택형","q":"생식세포 형성 과정에서 만들어진 딸세포의 염색체 수는 모세포와 비교해 어떠한가?","choices":["① 같다","② 절반이다","③ 두 배다","④ 관계없다"],"answer":"②","checks":"생식세포 형성 [9과21-02]","miscon":"체세포분열과 감수분열을 혼동하는 경우가 매우 흔함."},{"type":"선택형","q":"생물다양성이 높아지는 데 직접 기여하는 것은?","choices":["① 변이","② 동일한 형질","③ 무성 생식만","④ 서식지 파괴"],"answer":"①","checks":"변이와 생물다양성 [9과02-03]","miscon":"변이를 '이상한 것'으로 부정적으로 보는 경우."},{"type":"서답형","q":"멘델의 유전 원리에서 우성과 열성이 무엇인지 쓰시오.","answer":"대립 형질을 가진 순종을 교배했을 때 자손 1대에서 나타나는 형질이 우성, 나타나지 않는 형질이 열성이다.","checks":"멘델 유전 [9과21-04]","miscon":"'우성=좋은 것, 많은 것'이라는 오개념. 나타나는 여부의 문제임을 강조."}]},"form":{"items":[{"level":"하","code":"12생과03-01","q":"염색체, DNA, 유전자의 포함 관계를 큰 것부터 순서대로 쓰고, 유전자가 무엇인지 한 문장으로 설명하시오.","answer":"염색체 > DNA > 유전자. 유전자는 DNA에서 특정 형질에 대한 정보를 담고 있는 부분이다.","rubric":"성취수준 D~C 대응. 포함 관계와 유전자의 정의를 모두 쓰면 도달."},{"level":"중","code":"12생과03-02","q":"생식세포 형성 과정이 생명의 연속성과 다양성에 어떻게 기여하는지 각각 설명하시오.","answer":"연속성: 염색체 수가 절반으로 줄어든 생식세포가 수정으로 합쳐져야 자손의 염색체 수가 부모와 같게 유지되므로 세대를 거듭해도 종의 염색체 수가 일정하게 이어진다. 다양성: 감수 1분열에서 상동 염색체가 무작위로 배열·분리되고 교차가 일어나 유전자 조합이 매우 다양한 생식세포가 만들어지므로, 자손마다 서로 다른 형질 조합이 나타난다.","rubric":"성취수준 C 대응. 연속성(염색체 수 유지)(1.5점) + 다양성(무작위 배열·교차)(1.5점)."},{"level":"상","code":"12생과03-03","q":"어떤 섬에 가뭄이 계속되어 딱딱한 씨앗만 남게 되자, 몇 세대 뒤 그 섬 핀치새의 평균 부리 두께가 두꺼워졌다. 이 변화를 자연선택에 의한 진화로 설명하고, '핀치새가 살아남으려고 부리를 두껍게 만들었다'는 설명이 왜 틀렸는지 쓰시오.","answer":"원래 개체군 안에는 부리 두께에 변이가 존재했다. 가뭄으로 딱딱한 씨앗만 남자 두꺼운 부리를 가진 개체가 먹이를 더 잘 먹어 생존과 번식에 유리했고, 그 형질을 가진 유전자가 자손에게 더 많이 전달되어 세대를 거치며 평균 부리 두께가 증가했다. '살아남으려고 두껍게 만들었다'는 설명은 개체가 필요에 따라 형질을 바꾼다는 뜻이 되는데, 변이는 환경과 무관하게 미리 존재하며 환경은 그중 유리한 것을 선택할 뿐이므로 틀렸다.","rubric":"성취수준 A 대응. 변이의 선재(1점) + 차등 생존·번식(1점) + 세대 간 형질 빈도 변화(1점) + 목적론적 설명 반박(1점). ※하디-바인베르크는 다루지 않음."}]}},"세포-01":{"diag":{"from":"중 「생물의 구성과 다양성」","items":[{"type":"선택형","q":"식물 세포에는 있지만 동물 세포에는 없는 구조끼리 묶은 것은?","choices":["① 세포벽, 엽록체","② 핵, 세포막","③ 미토콘드리아, 핵","④ 세포막, 엽록체"],"answer":"①","checks":"세포의 구조 [9과02-01]","miscon":"미토콘드리아를 식물 세포에만 있다고 오해하는 경우."},{"type":"선택형","q":"세포에서 유전 정보를 담고 있는 구조는?","choices":["① 핵","② 세포막","③ 세포벽","④ 액포"],"answer":"①","checks":"세포의 구조와 기능 [9과02-01]","miscon":"구조 이름만 외우고 기능과 연결하지 못하는 경우."},{"type":"서답형","q":"세포막이 하는 일을 한 가지 쓰시오.","answer":"세포 안팎을 구분하고, 물질의 출입을 선택적으로 조절한다.","checks":"세포막의 기능","miscon":"세포막을 단순한 '껍질'로만 이해. 선택적 투과성이 핵심."}]},"form":{"items":[{"level":"하","code":"12세포01-04","q":"원핵세포와 진핵세포의 가장 큰 차이를 핵을 기준으로 쓰고, 원핵세포의 예를 하나 드시오.","answer":"진핵세포는 핵막으로 둘러싸인 뚜렷한 핵이 있지만 원핵세포는 핵막이 없어 DNA가 세포질에 퍼져 있다. 예: 대장균 등 세균","rubric":"성취수준 D~C 대응. 핵막 유무와 예를 모두 쓰면 도달. ※DNA·세포내막구조·리보솜·세포벽 중심."},{"level":"중","code":"12세포01-05","q":"세포막의 구조를 설명하고, 산소와 같은 작은 기체 분자와 포도당 같은 물질이 각각 어떤 방식으로 세포막을 통과하는지 비교하시오.","answer":"세포막은 인지질 2중층에 단백질이 군데군데 박혀 있는 구조이다. 산소처럼 작고 지질에 잘 녹는 분자는 인지질 2중층을 직접 통과하는 확산으로 이동한다. 포도당처럼 크거나 극성인 물질은 인지질층을 그냥 통과하기 어려워 막단백질(수송 단백질)을 통해 이동한다.","rubric":"성취수준 C 대응. 인지질 2중층+단백질 구조(1점) + 확산(1점) + 막단백질을 통한 이동(1점)."},{"level":"상","code":"12세포01-03","q":"세포에서 단백질이 만들어져 세포 밖으로 분비되기까지 관여하는 세포 소기관을 순서대로 쓰고, 각 소기관의 역할을 설명하여 이들이 유기적으로 연결되어 있음을 논증하시오.","answer":"핵(유전 정보 전사) → 리보솜(아미노산을 연결해 단백질 합성) → 소포체(합성된 단백질을 이동·1차 가공) → 골지체(단백질을 최종 가공·포장하여 분류) → 소낭을 통해 세포막으로 이동 후 분비. 각 소기관은 독립적으로 일하지 않고 앞 단계의 산물을 받아 다음 단계로 넘기므로, 하나라도 제 기능을 못 하면 분비가 이루어지지 않는다는 점에서 유기적으로 연결되어 있다.","rubric":"성취수준 A 대응. 순서 정확(2점) + 각 역할(1점) + 유기적 연결에 대한 논증(1점)."}]}},"세포-02":{"diag":{"from":"중 「식물과 에너지」·「동물과 에너지」","items":[{"type":"선택형","q":"광합성이 일어나는 세포 소기관은?","choices":["① 엽록체","② 미토콘드리아","③ 핵","④ 리보솜"],"answer":"①","checks":"광합성 [9과12-01]","miscon":"엽록체와 미토콘드리아의 기능을 뒤바꾸는 경우."},{"type":"선택형","q":"광합성과 세포호흡의 관계로 옳은 것은?","choices":["① 광합성의 산물이 세포호흡의 재료가 된다","② 서로 관계가 없다","③ 둘 다 빛이 있어야 한다","④ 둘 다 산소를 만든다"],"answer":"①","checks":"광합성과 호흡의 관계 [9과12-02]","miscon":"'식물은 광합성만, 동물은 호흡만 한다'는 오개념이 매우 흔함."},{"type":"서답형","q":"소화 효소가 하는 일을 한 문장으로 쓰시오.","answer":"큰 영양소를 몸에 흡수될 수 있는 작은 물질로 분해한다.","checks":"소화 효소 [9과13-01]","miscon":"효소를 '영양소를 없애는 것'으로 오해. 분해를 돕는 촉매임을 짚을 것."}]},"form":{"items":[{"level":"하","code":"12세포02-02","q":"광합성과 세포호흡을 에너지의 저장과 방출 관점에서 각각 한 문장으로 설명하시오.","answer":"광합성은 빛에너지를 이용해 포도당을 합성하여 화학 에너지로 저장하는 과정이고, 세포호흡은 포도당을 분해하여 저장된 화학 에너지를 방출해 ATP를 만드는 과정이다.","rubric":"성취수준 D~C 대응. 저장과 방출을 각각 바르게 쓰면 도달."},{"level":"중","code":"12세포02-03","q":"온도가 효소의 활성에 미치는 영향을 알아보는 실험을 설계하려고 한다. 조작 변인과 통제 변인을 각각 쓰고, 온도가 지나치게 높아지면 활성이 급격히 떨어지는 까닭을 설명하시오.","answer":"조작 변인: 온도 / 통제 변인: 효소의 양과 종류, 기질의 농도와 양, pH, 반응 시간 등. 효소는 단백질이므로 온도가 너무 높으면 입체 구조가 변형(변성)되어 활성 부위가 기질과 맞지 않게 되고, 이 변화는 대부분 되돌릴 수 없어 활성이 급격히 떨어진다.","rubric":"성취수준 C 대응. 변인 설정(1점) + 단백질 변성(1점) + 활성 부위와 기질의 결합 불가(1점)."},{"level":"상","code":"12세포02-04","q":"효소가 화학 반응을 빠르게 하는 원리를 활성화 에너지와 기질 특이성을 이용해 설명하고, 우리 몸에서 효소가 필요한 까닭을 쓰시오.","answer":"효소는 기질과 결합해 활성화 에너지가 낮은 반응 경로를 제공하므로, 낮은 온도에서도 반응이 빠르게 일어난다. 또 효소의 활성 부위는 특정 기질과 입체 구조가 맞는 것끼리만 결합하므로(기질 특이성), 세포 안에서 수많은 반응이 서로 뒤섞이지 않고 필요한 반응만 선택적으로 조절된다. 우리 몸은 체온 정도의 낮은 온도에서 수많은 물질대사를 정확하고 빠르게 진행해야 하므로 효소가 반드시 필요하다.","rubric":"성취수준 A 대응. 활성화 에너지 낮춤(1.5점) + 기질 특이성과 반응 선택성(1.5점) + 체온 조건에서의 필요성(1점)."}]}},"세포-03":{"diag":{"from":"중 「생물의 구성과 다양성」·「식물과 에너지」·「동물과 에너지」","items":[{"type":"선택형","q":"세포호흡이 주로 일어나는 세포 소기관은?","choices":["① 미토콘드리아","② 엽록체","③ 액포","④ 세포벽"],"answer":"①","checks":"세포호흡 [9과13-05]","miscon":"세포호흡을 '숨쉬기(폐)'와 혼동하는 경우가 매우 흔함."},{"type":"선택형","q":"광합성에 필요한 물질끼리 바르게 묶은 것은?","choices":["① 물과 이산화 탄소","② 포도당과 산소","③ 물과 산소","④ 포도당과 물"],"answer":"①","checks":"광합성 [9과12-01]","miscon":"원료와 산물을 뒤바꾸는 경우."},{"type":"서답형","q":"식물이 밤에는 광합성을 하지 않지만 호흡은 계속하는 까닭을 쓰시오.","answer":"광합성에는 빛이 필요하지만 호흡은 생명 활동에 필요한 에너지를 얻기 위해 빛과 관계없이 항상 일어나야 하기 때문이다.","checks":"광합성과 호흡 [9과12-02]","miscon":"'식물은 밤에 호흡만 하고 낮에는 광합성만 한다'는 오개념."}]},"form":{"items":[{"level":"하","code":"12세포03-01","q":"미토콘드리아의 구조적 특징을 하나 쓰고, 그 특징이 기능에 어떤 이점을 주는지 쓰시오.","answer":"내막이 안쪽으로 접혀 주름(크리스타)을 이루고 있다. 이로 인해 막의 표면적이 넓어져 전자 전달계와 ATP 합성 효소가 많이 배치될 수 있으므로 ATP를 효율적으로 생산할 수 있다.","rubric":"성취수준 D~C 대응. 구조 특징과 기능적 이점을 연결하면 도달."},{"level":"중","code":"12세포03-04","q":"산소호흡과 발효의 공통점과 차이점을 각각 쓰고, 발효를 이용한 실생활 사례를 하나 드시오.","answer":"공통점: 둘 다 포도당을 분해해 ATP를 얻는 이화 작용이며, 해당 과정을 공통으로 거친다. 차이점: 산소호흡은 산소를 이용해 포도당을 완전히 분해하여 많은 ATP를 얻지만, 발효는 산소 없이 불완전 분해하여 적은 ATP만 얻고 젖산이나 에탄올 같은 최종 산물이 남는다. 사례: 김치·요구르트(젖산 발효), 빵·술(알코올 발효)","rubric":"성취수준 C 대응. 공통점(1점) + 차이점(ATP 양·산소 유무·최종 산물)(1.5점) + 사례(0.5점)."},{"level":"상","code":"12세포03-07","q":"광합성의 명반응과 세포호흡의 산화적 인산화는 모두 전자 전달계를 이용한다. 두 과정의 공통점과 차이점을 전자의 공급원과 최종 수용체를 중심으로 비교하시오.","answer":"공통점: 둘 다 막에 있는 전자 전달계를 따라 전자가 이동하면서 수소 이온을 막 사이 공간으로 옮겨 농도 기울기를 만들고, 그 기울기를 이용한 화학 삼투로 ATP 합성 효소가 ATP를 만든다. 차이점: 광합성 명반응은 틸라코이드 막에서 일어나고 전자는 물에서 나오며 최종적으로 NADP⁺로 전달된다. 세포호흡의 산화적 인산화는 미토콘드리아 내막에서 일어나고 전자는 NADH·FADH₂에서 나오며 최종 수용체는 산소로 물이 생성된다.","rubric":"성취수준 A 대응. 화학 삼투에 의한 ATP 합성이라는 공통 원리(1.5점) + 전자 공급원 비교(1점) + 최종 수용체 비교(1.5점). ※분자 구조식은 다루지 않음."}]}},"유전-01":{"diag":{"from":"중 「생식과 유전」","items":[{"type":"선택형","q":"사람의 성염색체 구성으로 옳은 것은?","choices":["① 남자 XY, 여자 XX","② 남자 XX, 여자 XY","③ 둘 다 XX","④ 둘 다 XY"],"answer":"①","checks":"성염색체 [9과21 연계]","miscon":"성염색체와 상염색체의 구분이 안 되는 경우."},{"type":"선택형","q":"부모가 모두 우성 형질을 보이는데 자녀에게 열성 형질이 나타났다면, 부모의 유전자형은?","choices":["① 둘 다 이형 접합(Aa)","② 둘 다 순종 우성(AA)","③ 둘 다 순종 열성(aa)","④ 알 수 없다"],"answer":"①","checks":"가계도 분석 [9과21-05]","miscon":"열성 형질이 나오려면 부모 각각에게서 열성 대립유전자를 받아야 함을 놓치는 경우."},{"type":"서답형","q":"체세포분열과 감수분열의 가장 큰 차이를 염색체 수를 기준으로 쓰시오.","answer":"체세포분열은 딸세포의 염색체 수가 모세포와 같지만, 감수분열(생식세포 형성)은 절반으로 줄어든다.","checks":"세포분열 [9과21-02]","miscon":"두 분열의 목적과 결과를 뒤섞는 경우."}]},"form":{"items":[{"level":"하","code":"12유전01-01","q":"상염색체 유전과 성염색체 유전의 가장 큰 차이를 남녀 발현 빈도를 기준으로 쓰시오.","answer":"상염색체 유전은 형질의 발현 빈도가 남녀에서 비슷하지만, 성염색체(반성) 유전은 남녀에서 발현 빈도가 뚜렷하게 다르다(예: X 염색체 열성 형질은 남자에게 더 많이 나타난다).","rubric":"성취수준 D~C 대응. 남녀 빈도 차이를 언급하면 도달."},{"level":"중","code":"12유전01-02","q":"사람의 유전을 연구할 때 완두 같은 실험 생물보다 어려운 점을 두 가지 쓰고, 그럼에도 사람의 유전을 연구하기 위해 사용하는 방법을 하나 쓰시오.","answer":"어려운 점: ①의도적으로 교배 실험을 할 수 없다 ②한 세대가 길고 자손 수가 적어 통계적 분석이 어렵다(그 밖에 형질이 복잡하고 환경의 영향을 많이 받는다). 방법: 가계도 조사, 쌍둥이 연구, 집단 조사, 염색체·DNA 분석 등","rubric":"성취수준 C 대응. 어려운 점 2가지(2점) + 연구 방법(1점)."},{"level":"상","code":"12유전01-07","q":"DNA가 반보존적으로 복제된다는 것이 무슨 뜻인지 설명하고, 이러한 방식이 생명의 연속성 측면에서 갖는 의미를 쓰시오.","answer":"DNA 이중나선이 풀린 뒤 각 가닥이 주형이 되어 새 가닥이 합성되므로, 만들어진 두 DNA는 각각 기존 가닥 1개와 새 가닥 1개로 이루어진다. 이 방식은 주형 가닥의 염기 서열에 상보적으로 새 가닥이 만들어지므로 유전 정보가 정확하게 복사된다. 따라서 세포분열로 만들어진 딸세포와 자손에게 동일한 유전 정보가 오류 없이 전달되어 생명의 연속성이 유지된다.","rubric":"성취수준 A 대응. 기존 가닥 1 + 새 가닥 1(1.5점) + 상보적 합성으로 정확성 확보(1점) + 연속성의 의미(0.5점). ※효소·프라이머의 상세 기작은 요구하지 않음."}]}},"유전-02":{"diag":{"from":"중 「생식과 유전」","items":[{"type":"선택형","q":"유전 정보를 담고 있는 물질은?","choices":["① DNA","② 단백질","③ 지방","④ 녹말"],"answer":"①","checks":"유전물질 [9과21-02]","miscon":"단백질이 유전물질이라고 생각하는 경우(과학사적으로도 한때 그랬음을 소개하면 좋음)."},{"type":"선택형","q":"유전자와 형질의 관계로 옳은 것은?","choices":["① 유전자의 정보에 따라 형질이 나타난다","② 형질이 유전자를 만든다","③ 관계없다","④ 유전자는 환경에서 만들어진다"],"answer":"①","checks":"유전자와 형질 [9과21-04]","miscon":"방향을 뒤바꾸는 경우. 정보→발현의 흐름을 잡아줄 것."},{"type":"서답형","q":"같은 유전 정보를 가진 세포들이 왜 서로 다른 모습과 기능을 갖게 되는지 생각을 쓰시오.","answer":"예) 세포마다 사용하는 유전자가 달라서일 것이다.","checks":"세포 분화에 대한 선개념","miscon":"모든 세포의 DNA가 다르다고 생각하는 오개념. 이 단원의 발현 조절로 교정."}]},"form":{"items":[{"level":"하","code":"12유전02-01","q":"유전자 발현의 중심원리를 순서대로 쓰고, 각 과정이 일어나는 장소를 쓰시오.(진핵세포 기준)","answer":"DNA → (전사) → RNA → (번역) → 단백질. 전사는 핵에서, 번역은 세포질의 리보솜에서 일어난다.","rubric":"성취수준 D~C 대응. 순서와 장소를 모두 맞히면 도달."},{"level":"중","code":"12유전02-02","q":"어떤 mRNA의 염기 서열이 5'-AUG UUU GGA UAA-3' 일 때, 이 mRNA로부터 만들어지는 폴리펩타이드의 아미노산 개수를 쓰고 그 까닭을 설명하시오.","answer":"3개. 세 염기가 하나의 코돈을 이루어 아미노산 하나를 지정하는데, AUG(개시)·UUU·GGA는 아미노산을 지정하지만 마지막 UAA는 종결 코돈이라 아미노산을 지정하지 않고 번역을 끝내기 때문이다.","rubric":"성취수준 C 대응. 코돈이 3염기 단위(1점) + 종결 코돈은 아미노산 미지정(1.5점) + 답 3개(0.5점)."},{"level":"상","code":"12유전02-04","q":"우리 몸의 근육 세포와 신경 세포는 같은 유전 정보를 가지고 있는데도 모양과 기능이 전혀 다르다. 이 현상을 유전자 발현 조절로 설명하시오.","answer":"모든 체세포는 같은 DNA를 갖지만, 세포마다 실제로 전사·번역되는 유전자가 다르다. 발생 과정에서 세포가 놓인 위치와 받는 신호에 따라 특정 유전자만 선택적으로 발현되고 나머지는 억제되어, 그 세포에 필요한 단백질만 만들어진다. 그 결과 같은 유전 정보를 가지고도 서로 다른 구조와 기능을 갖는 세포로 분화한다.","rubric":"성취수준 A 대응. DNA는 동일함을 명시(1점) + 선택적 발현·억제(1.5점) + 분화 결과와 연결(0.5점)."}]}},"유전-03":{"diag":{"from":"중 「생식과 유전」","items":[{"type":"선택형","q":"생명공학기술이 활용된 사례로 알맞지 <b>않은<\/b> 것은?","choices":["① 인슐린을 세균으로 대량 생산","② 유전자 검사로 질병 위험 예측","③ 백신 개발","④ 물의 끓는점 측정"],"answer":"④","checks":"생명공학의 활용(선개념)","miscon":"생명공학을 유전자 조작만으로 좁게 이해하는 경우."},{"type":"선택형","q":"유전 형질이 자손에게 전달되는 통로가 되는 세포는?","choices":["① 생식세포","② 근육 세포","③ 신경 세포","④ 적혈구"],"answer":"①","checks":"생식과 유전 [9과21-02]","miscon":"체세포의 변화도 자손에게 전달된다고 오해하는 경우."},{"type":"서답형","q":"유전자를 마음대로 바꿀 수 있는 기술이 생긴다면 걱정되는 점이 무엇일지 쓰시오.","answer":"예) 치료 목적을 넘어 외모나 능력을 고르는 데 쓰이면 불평등이 커질 수 있고, 다음 세대에까지 영향을 주는데 안전성을 다 알 수 없다.","checks":"생명윤리에 대한 선개념","miscon":"기술을 무조건 긍정/부정으로만 보는 이분법. 구체적 쟁점으로 유도."}]},"form":{"items":[{"level":"하","code":"12유전03-02","q":"줄기세포가 다른 체세포와 구별되는 특징을 두 가지 쓰시오.","answer":"①스스로 계속 분열하여 자기와 같은 세포를 만들 수 있다(자기 재생) ②여러 종류의 세포로 분화할 수 있다(분화 능력)","rubric":"성취수준 D~C 대응. 두 특징을 쓰면 도달."},{"level":"중","code":"12유전03-04","q":"유전자 변형 생물체(LMO)의 이로운 점과 생태계에 미칠 수 있는 영향을 각각 하나씩 쓰시오.","answer":"이로운 점: 해충 저항성이나 제초제 내성을 갖게 해 수확량을 늘리고 농약 사용을 줄이거나, 영양이 강화된 작물을 만들어 식량·영양 문제 해결에 기여할 수 있다. 생태계 영향: 변형 유전자가 야생종으로 퍼져 토종 생물의 유전적 다양성을 교란하거나, 저항성 해충·잡초가 생겨 생태계 균형이 무너질 수 있다.","rubric":"성취수준 C 대응. 이로운 점(1.5점) + 생태계 영향(1.5점)."},{"level":"상","code":"12유전03-05","q":"유전자 편집 기술로 유전병의 원인 유전자를 고치는 것에 대해, 체세포에 적용하는 경우와 생식세포·배아에 적용하는 경우를 구분하여 쟁점을 논하고 자신의 입장을 근거와 함께 쓰시오.","answer":"체세포에 적용하면 그 환자 한 사람에게만 효과가 미치고 다음 세대로 전달되지 않으므로, 다른 치료와 마찬가지로 안전성과 동의가 확보되면 비교적 수용하기 쉽다. 반면 생식세포나 배아에 적용하면 변화가 자손 대대로 전달되고, 당사자인 미래 세대의 동의를 받을 수 없으며, 예상치 못한 부작용이 영구히 남을 수 있다. 또 치료를 넘어 능력 향상에 쓰이면 사회적 불평등이 커질 수 있다. (입장 예) 체세포 치료는 엄격한 검증 아래 허용하되, 생식세포 편집은 안전성이 충분히 확인되고 사회적 합의가 이루어지기 전까지 치료 목적에 한해 신중히 제한해야 한다.","rubric":"성취수준 A 대응. 두 경우의 구분(1.5점) + 세대 전달·동의 문제 등 쟁점 제시(1.5점) + 근거 있는 자기 입장(1점). 한쪽만 다루면 절반."}]}},"화학-01":{"diag":{"from":"중 「물질의 구성」·「화학 반응의 규칙성」 (공식 선수 단원 없음)","items":[{"type":"선택형","q":"화학 반응식 2H₂ + O₂ → 2H₂O 에서 계수의 비가 뜻하는 것은?","choices":["① 질량의 비","② 부피의 비만","③ 반응하는 입자 수의 비","④ 밀도의 비"],"answer":"③","checks":"화학 반응식의 계수 [9과16-02]","miscon":"계수를 질량비로 오해하는 경우가 매우 흔함. 입자 수(몰수) 비임을 강조해야 몰 개념 도입이 순조로움."},{"type":"선택형","q":"화학 반응에서 반응 전후에 변하지 않는 것은?","choices":["① 원자의 배열","② 물질의 종류","③ 원자의 종류와 개수","④ 물질의 성질"],"answer":"③","checks":"질량 보존 법칙 [9과16-03]","miscon":"원자가 새로 생기거나 없어진다고 생각하면 양적 관계 전체가 무너짐."},{"type":"서답형","q":"물 분자(H₂O) 1개에 들어 있는 원자의 종류와 개수를 쓰시오.","answer":"수소 원자 2개, 산소 원자 1개 (총 3개)","checks":"화학식의 의미 [9과11-01]","miscon":"아래첨자와 계수를 혼동하는 경우. 2H₂O와 H₂O의 차이를 확인시킬 것."}]},"form":{"items":[{"level":"하","code":"12화학01-02","q":"물(H₂O) 36 g은 몇 mol인지 구하시오. (H=1, O=16)","answer":"물의 몰질량 = 18 g/mol 이므로 36 ÷ 18 = 2 mol","rubric":"성취수준 D~C 대응. 몰질량을 구하고 나눗셈으로 답하면 도달."},{"level":"중","code":"12화학01-03","q":"메테인이 완전 연소하는 반응식 CH₄ + 2O₂ → CO₂ + 2H₂O 에서, 메테인 1 mol이 완전히 연소할 때 필요한 산소의 질량과 생성되는 이산화 탄소의 질량을 구하시오. (H=1, C=12, O=16)","answer":"산소: 계수비 1:2이므로 2 mol 필요 → 2 × 32 = 64 g / 이산화 탄소: 1 mol 생성 → 44 g","rubric":"성취수준 C 대응. 계수비를 몰수비로 사용(1점) + 산소 질량(1점) + 이산화 탄소 질량(1점)."},{"level":"상","code":"12화학01-03","q":"질소와 수소로 암모니아를 만드는 반응 N₂ + 3H₂ → 2NH₃ 에서 질소 2 mol과 수소 3 mol을 반응시켰다. 어느 물질이 모두 소모되는지 밝히고, 생성되는 암모니아의 몰수와 남는 물질의 몰수를 구하시오.","answer":"계수비 N₂:H₂ = 1:3이므로 N₂ 2 mol이 모두 반응하려면 H₂ 6 mol이 필요하지만 3 mol뿐이다. 따라서 H₂가 먼저 모두 소모된다(한계 반응물). H₂ 3 mol은 N₂ 1 mol과 반응하여 NH₃ 2 mol을 생성하고, N₂ 1 mol이 남는다.","rubric":"성취수준 A 대응. 한계 반응물 판단 근거(1.5점) + 생성물 2 mol(1점) + 남는 N₂ 1 mol(0.5점)."}]}},"화학-02":{"diag":{"from":"중 「물질의 구성」","items":[{"type":"선택형","q":"원자가 전기적으로 중성인 까닭은?","choices":["① 양성자 수와 전자 수가 같아서","② 중성자가 있어서","③ 전자가 없어서","④ 원자핵이 중성이어서"],"answer":"①","checks":"원자의 구성 [9과11-02]","miscon":"중성자 때문에 중성이라고 오해하는 경우가 매우 흔함."},{"type":"선택형","q":"주기율표에서 같은 족 원소들이 비슷한 화학적 성질을 보이는 까닭과 가장 관련 깊은 것은?","choices":["① 원자 번호가 비슷해서","② 가장 바깥 껍질의 전자 수가 같아서","③ 질량이 비슷해서","④ 색이 같아서"],"answer":"②","checks":"주기율표 [9과11-03]","miscon":"중학교에서는 '성질이 비슷하다'만 배우므로 원인(원자가 전자)을 고교에서 연결해야 함."},{"type":"서답형","q":"나트륨 원자가 전자 1개를 잃으면 어떤 입자가 되는지 기호로 쓰고, 그 까닭을 쓰시오.","answer":"Na⁺. 중성 원자에서 (−)전하를 띤 전자 1개를 잃으면 양성자 수가 전자 수보다 1 많아져 (+)전하를 띠기 때문이다.","checks":"이온의 형성 [9과11-04]","miscon":"이온이 되면 양성자 수도 변한다고 생각하는 오개념."}]},"form":{"items":[{"level":"하","code":"12화학02-03","q":"물(H₂O) 분자를 루이스 전자점식으로 나타낼 때 중심 원자인 산소 주위의 공유 전자쌍과 비공유 전자쌍의 개수를 각각 쓰시오.","answer":"공유 전자쌍 2개, 비공유 전자쌍 2개","rubric":"성취수준 D~C 대응. 두 값을 모두 맞히면 도달."},{"level":"중","code":"12화학02-03","q":"CO₂와 H₂O는 모두 중심 원자에 산소가 결합한 3원자 분자이지만 분자 구조가 다르다. 전자쌍 반발 이론을 이용해 두 분자의 구조를 각각 예측하고 그 까닭을 설명하시오.","answer":"CO₂는 중심 탄소에 비공유 전자쌍이 없고 결합 전자쌍만 2개이므로 서로 최대한 멀어져 직선형이 된다. H₂O는 중심 산소에 공유 전자쌍 2개와 비공유 전자쌍 2개가 있어 총 4개의 전자쌍이 반발하는데, 비공유 전자쌍의 반발이 더 크므로 결합각이 좁아진 굽은형이 된다.","rubric":"성취수준 C 대응. 각 분자의 전자쌍 배치(1점) + 구조 예측(1점) + 비공유 전자쌍 반발로 굽은형 설명(1점). ※중심 원자는 옥텟 규칙을 따르는 경우로 한정."},{"level":"상","code":"12화학02-04","q":"CO₂는 무극성 분자이고 H₂O는 극성 분자이다. 두 분자 모두 극성 결합을 포함하는데도 분자의 극성이 다른 까닭을 구조와 관련지어 설명하고, 이 차이가 물질의 성질에 어떻게 나타나는지 한 가지 쓰시오.","answer":"CO₂는 직선형이라 두 C=O 결합의 극성이 크기가 같고 방향이 반대여서 서로 상쇄되어 분자 전체로는 무극성이 된다. H₂O는 굽은형이라 O−H 결합의 극성이 상쇄되지 않고 한쪽으로 치우쳐 분자 전체가 극성을 띤다. 성질 차이: 물은 극성이어서 이온이나 극성 물질을 잘 녹이고 끓는점이 높지만, 이산화 탄소는 무극성이어서 물에 잘 녹지 않고 상온에서 기체이다.","rubric":"성취수준 A 대응. 결합 극성의 벡터적 상쇄 여부(1.5점) + 구조와 연결(1점) + 성질 차이 사례(0.5점). ※쌍극자 모멘트는 정성적으로."}]}},"화학-03":{"diag":{"from":"중 「화학 반응의 규칙성」","items":[{"type":"선택형","q":"화학 반응에서 질량이 보존되는 까닭으로 옳은 것은?","choices":["① 원자의 종류와 개수가 변하지 않아서","② 원자가 사라져서","③ 새 원자가 생겨서","④ 부피가 일정해서"],"answer":"①","checks":"질량 보존 법칙 [9과16-03]","miscon":"열린 용기에서 질량이 준 것처럼 보이는 실험만 기억하는 경우."},{"type":"선택형","q":"화학 반응에서 열에너지가 방출되는 반응을 무엇이라 하는가?","choices":["① 발열 반응","② 흡열 반응","③ 가역 반응","④ 중화 반응"],"answer":"①","checks":"화학 반응의 열 출입 [9과16-06]","miscon":"발열·흡열을 온도 변화 방향과 헷갈리는 경우. 주위 온도로 판단하게 할 것."},{"type":"서답형","q":"산성 용액과 염기성 용액을 섞으면 어떤 변화가 일어나는지 쓰시오.","answer":"서로의 성질이 약해지며(중화 반응), 물이 생성되고 열이 발생한다.","checks":"중화 반응 [6과09-02 / 9과16 연계]","miscon":"중화가 '섞여서 사라지는 것'이라는 이해. 새 물질(물) 생성으로 정리."}]},"form":{"items":[{"level":"하","code":"12화학03-01","q":"화학 평형 상태(동적 평형)의 특징을 두 가지 쓰시오.","answer":"①정반응 속도와 역반응 속도가 같다 ②반응물과 생성물의 농도가 더 이상 변하지 않는다(겉보기에는 반응이 멈춘 것처럼 보이지만 실제로는 양방향 반응이 계속 일어난다)","rubric":"성취수준 D~C 대응. 두 특징을 쓰면 도달. '반응이 멈춘다'고 쓰면 미도달."},{"level":"중","code":"12화학03-03","q":"어떤 반응의 평형 상수 K = 10인데, 현재 상태의 반응 지수 Q = 2였다. 반응이 어느 방향으로 진행되는지 쓰고, 그 까닭을 설명하시오.","answer":"정반응(생성물이 만들어지는 방향)으로 진행된다. Q < K이므로 생성물의 양이 평형에 비해 부족한 상태이며, Q가 K와 같아질 때까지 생성물이 늘어나는 정반응이 우세하게 일어난다.","rubric":"성취수준 C 대응. 방향 판단(1점) + Q와 K 비교 근거(2점)."},{"level":"상","code":"12화학03-04","q":"탄산음료 병뚜껑을 열면 거품이 올라오고 김이 빠진다. 이 현상을 화학 평형의 이동으로 설명하고, 차가운 상태로 보관하면 김이 덜 빠지는 까닭도 함께 쓰시오.","answer":"병 속에서는 CO₂(g) ⇌ CO₂(aq)가 평형을 이루고 있다. 뚜껑을 열면 기체 CO₂의 압력이 급격히 낮아지므로, 그 감소를 줄이는 방향인 기체가 생성되는 쪽(용해된 CO₂가 빠져나오는 방향)으로 평형이 이동해 거품이 올라온다. 또 기체의 용해는 발열 과정이므로 온도를 낮추면 용해되는 방향으로 평형이 이동해 CO₂가 더 많이 녹아 있어 김이 덜 빠진다.","rubric":"성취수준 A 대응. 압력 감소에 따른 평형 이동(1.5점) + 온도와 용해도의 관계로 설명(1.5점)."}]}},"화학-04":{"diag":{"from":"중 「화학 반응의 규칙성」","items":[{"type":"선택형","q":"산성 용액의 성질로 옳은 것은?","choices":["① 푸른색 리트머스 종이를 붉게 변화시킨다","② 붉은색 리트머스 종이를 푸르게 변화시킨다","③ 미끌미끌하다","④ 단백질을 녹인다"],"answer":"①","checks":"산의 성질 [6과09-01]","miscon":"리트머스 변화 방향을 뒤바꾸는 실수가 잦음."},{"type":"선택형","q":"같은 부피의 용액에 녹아 있는 용질의 양이 많을수록 용액은?","choices":["① 진하다","② 묽다","③ 변화 없다","④ 색이 진해진다"],"answer":"①","checks":"용액의 진하기 [6과03-02]","miscon":"진하기를 색으로만 판단. 몰 농도 도입 전에 '양/부피' 개념을 잡아줄 것."},{"type":"서답형","q":"산성 용액과 염기성 용액이 반응할 때 공통적으로 생성되는 물질을 쓰시오.","answer":"물(H₂O). 산의 H⁺와 염기의 OH⁻가 결합해 물이 생성된다.","checks":"중화 반응","miscon":"염만 떠올리고 물을 놓치는 경우. 중화의 알짜 반응이 H⁺ + OH⁻ → H₂O임을 강조."}]},"form":{"items":[{"level":"하","code":"12화학04-01","q":"수소 이온 농도가 1×10⁻³ M인 용액의 pH를 구하고, 이 용액이 산성인지 염기성인지 쓰시오.","answer":"pH = 3, 산성 (pH < 7)","rubric":"성취수준 D~C 대응. pH 값과 액성을 모두 맞히면 도달."},{"level":"중","code":"12화학04-02","q":"0.5 M NaOH 수용액 500 mL를 만들려면 NaOH 몇 g이 필요한지 구하고, 만드는 과정을 순서대로 쓰시오. (Na=23, O=16, H=1)","answer":"필요 몰수 = 0.5 mol/L × 0.5 L = 0.25 mol, NaOH 몰질량 = 40 g/mol → 0.25 × 40 = 10 g. 과정: ①NaOH 10 g을 정확히 칭량한다 ②소량의 증류수에 완전히 녹인다 ③500 mL 부피 플라스크에 옮기고 헹군 액도 함께 넣는다 ④표선까지 증류수를 채우고 잘 섞는다.","rubric":"성취수준 C 대응. 질량 10 g(1.5점) + 부피 플라스크를 이용한 조제 과정(1.5점)."},{"level":"상","code":"12화학04-03","q":"0.1 M 염산 20 mL를 완전히 중화하는 데 0.2 M 수산화 나트륨 수용액 몇 mL가 필요한지 구하고, 중화점에서 용액에 가장 많이 존재하는 이온을 쓰시오.","answer":"HCl의 몰수 = 0.1 × 0.020 = 0.002 mol. 1:1로 반응하므로 NaOH도 0.002 mol 필요 → 0.002 ÷ 0.2 = 0.01 L = 10 mL. 중화점에서는 H⁺와 OH⁻가 모두 반응해 물이 되었으므로 Na⁺와 Cl⁻가 가장 많이 존재한다.","rubric":"성취수준 A 대응. 몰수 계산(1점) + 10 mL(1점) + 중화점의 이온 종류(1점). ※강산-강염기로 한정, 적정 곡선은 요구하지 않음."}]}},"물에-01":{"diag":{"from":"중 「물질의 상태 변화」·「기체의 성질」·「물질의 특성」","items":[{"type":"선택형","q":"온도가 일정할 때 기체의 압력과 부피 사이의 관계는?","choices":["① 비례한다","② 반비례한다","③ 관계없다","④ 항상 일정하다"],"answer":"②","checks":"기체의 압력과 부피 [9과06-02]","miscon":"보일 법칙과 샤를 법칙을 뒤바꾸는 경우. 어떤 변인을 고정했는지로 구분."},{"type":"선택형","q":"물질의 상태가 변할 때 변하지 않는 것은?","choices":["① 부피","② 입자 사이의 거리","③ 질량과 물질의 성질","④ 입자의 배열"],"answer":"③","checks":"상태 변화 [9과04-03]","miscon":"상태가 변하면 다른 물질이 된다고 생각하는 오개념."},{"type":"서답형","q":"물질의 특성에 해당하는 것을 세 가지 쓰시오.","answer":"밀도, 끓는점, 녹는점, 용해도 중 세 가지","checks":"물질의 특성 [9과08-01]","miscon":"질량·부피를 물질의 특성으로 오해. 양에 따라 변하지 않는 값이라는 기준을 확인."}]},"form":{"items":[{"level":"하","code":"12물에01-01","q":"이상 기체 방정식을 쓰고, 온도와 압력이 일정할 때 기체의 부피가 무엇에 비례하는지 쓰시오.","answer":"PV = nRT. 온도와 압력이 일정하면 부피는 몰수(n)에 비례한다.","rubric":"성취수준 D~C 대응. 식과 비례 관계를 모두 쓰면 도달."},{"level":"중","code":"12물에01-03","q":"물(H₂O)의 끓는점이 100℃로, 분자량이 비슷한 다른 물질보다 훨씬 높은 까닭을 분자 간 상호작용으로 설명하시오.","answer":"물 분자는 극성이 크고, 전기 음성도가 큰 산소에 결합한 수소가 다른 분자의 산소와 수소 결합을 형성한다. 수소 결합은 일반적인 분산력이나 쌍극자-쌍극자 힘보다 훨씬 강하므로, 분자들을 떼어 기체로 만들려면 더 많은 에너지가 필요해 끓는점이 높다.","rubric":"성취수준 C 대응. 수소 결합 언급(1점) + 다른 분자 간 힘보다 강함(1점) + 끓는점과 연결(1점)."},{"level":"상","code":"12물에01-04","q":"다이아몬드, 염화 나트륨, 드라이아이스, 구리를 결정성 고체의 종류로 분류하고, 각각의 녹는점이 높거나 낮은 까닭을 결합의 종류와 관련지어 설명하시오.","answer":"다이아몬드-공유 결정, 염화 나트륨-이온 결정, 드라이아이스-분자 결정, 구리-금속 결정. 공유 결정은 원자 전체가 강한 공유 결합 그물로 이어져 녹는점이 매우 높다. 이온 결정은 이온 사이 정전기적 인력이 강해 녹는점이 높다. 금속 결정은 자유 전자에 의한 금속 결합으로 대체로 녹는점이 높다. 분자 결정은 분자 사이의 약한 힘만 끊으면 되므로 녹는점이 매우 낮다.","rubric":"성취수준 A 대응. 4가지 분류(2점) + 결합 종류와 녹는점의 관계 설명(2점). ※결정 구조 자체는 다루지 않음."}]}},"물에-02":{"diag":{"from":"중 「물질의 상태 변화」·「물질의 특성」","items":[{"type":"선택형","q":"소금물의 끓는점은 순수한 물과 비교해 어떠한가?","choices":["① 더 높다","② 더 낮다","③ 같다","④ 알 수 없다"],"answer":"①","checks":"순물질과 혼합물의 끓는점 [9과08-02]","miscon":"혼합물의 끓는점이 일정하지 않고 순물질보다 높다는 점을 놓치는 경우."},{"type":"선택형","q":"물이 다른 액체보다 잘 녹이는 물질의 종류는?","choices":["① 소금·설탕 같은 극성·이온성 물질","② 기름 같은 무극성 물질","③ 금속만","④ 기체만"],"answer":"①","checks":"용해 [6과03-01 / 9과08 연계]","miscon":"'물은 만능 용매'라는 오해. 극성-극성이 잘 녹는 원리로 정리."},{"type":"서답형","q":"겨울철 도로에 염화 칼슘을 뿌리는 까닭을 쓰시오.","answer":"염화 칼슘이 녹으면서 물의 어는점을 낮추어 눈이나 얼음이 잘 얼지 않고 녹게 하기 때문이다.","checks":"어는점 내림(선개념)","miscon":"'열을 내서 녹인다'는 오개념. 어는점 자체가 내려간다는 점을 짚을 것."}]},"form":{"items":[{"level":"하","code":"12물에02-02","q":"용액의 농도가 진해질수록 끓는점과 어는점은 각각 어떻게 변하는지 쓰시오.","answer":"끓는점은 높아지고(끓는점 오름), 어는점은 낮아진다(어는점 내림).","rubric":"성취수준 D~C 대응. 두 방향을 모두 맞히면 도달."},{"level":"중","code":"12물에02-01","q":"얼음이 물에 뜨는 현상을 수소 결합으로 설명하고, 이 성질이 자연에서 갖는 의미를 한 가지 쓰시오.","answer":"물이 얼 때 각 분자가 수소 결합으로 규칙적인 육각형 구조를 이루면서 분자 사이에 빈 공간이 생겨, 액체 물보다 부피가 커지고 밀도가 작아진다. 그래서 얼음이 물에 뜬다. 의미: 겨울에 호수 표면만 얼고 아래쪽 물은 얼지 않아 수중 생물이 살아남을 수 있다.","rubric":"성취수준 C 대응. 수소 결합에 의한 규칙 구조와 빈 공간(1.5점) + 밀도 감소(0.5점) + 자연에서의 의미(1점)."},{"level":"상","code":"12물에02-03","q":"배추를 소금에 절이면 숨이 죽는 현상을 삼투 현상으로 설명하고, 반대 방향으로 물이 이동하게 만드는 기술의 예를 하나 들어 그 원리를 쓰시오.","answer":"배추 세포 안보다 바깥 소금물의 용질 농도가 높으므로, 물이 반투과성 세포막을 통해 농도가 낮은 세포 안에서 높은 바깥쪽으로 빠져나간다. 그 결과 세포가 수축해 숨이 죽는다. 반대 예: 역삼투압 정수(해수 담수화) — 바닷물 쪽에 삼투압보다 큰 압력을 걸어 주면 물이 자연스러운 방향과 반대로 농도가 낮은 쪽(깨끗한 물 쪽)으로 이동해 소금이 걸러진 물을 얻는다.","rubric":"성취수준 A 대응. 농도 차에 따른 물의 이동 방향(1.5점) + 세포 수축 결론(0.5점) + 역삼투 원리(1점)."}]}},"물에-03":{"diag":{"from":"중 「물질의 상태 변화」·「화학 반응의 규칙성」","items":[{"type":"선택형","q":"손난로가 따뜻해지는 반응은 어떤 반응인가?","choices":["① 발열 반응","② 흡열 반응","③ 중화 반응","④ 분해 반응"],"answer":"①","checks":"화학 반응의 열 출입 [9과16-06]","miscon":"발열·흡열을 반응물 온도 기준으로 판단하는 오류. 주위로의 방출/흡수로 정의."},{"type":"선택형","q":"얼음이 녹을 때 열에너지는 어떻게 되는가?","choices":["① 주위에서 흡수한다","② 주위로 방출한다","③ 변화 없다","④ 사라진다"],"answer":"①","checks":"상태 변화와 열에너지 [9과04-04]","miscon":"융해를 발열로 착각하는 경우. 아이스팩 경험과 연결."},{"type":"서답형","q":"어떤 변화가 '저절로' 일어난다고 할 때 어떤 뜻인지 자기 말로 쓰시오.","answer":"예) 외부에서 계속 에너지를 넣어 주지 않아도 한 방향으로 진행되는 변화. 예를 들어 뜨거운 물이 식는 것은 저절로 일어나지만 저절로 다시 뜨거워지지는 않는다.","checks":"자발성에 대한 선개념","miscon":"'빠르게 일어나는 것'과 '저절로 일어나는 것'을 혼동. 속도와 자발성은 다른 문제임을 예고."}]},"form":{"items":[{"level":"하","code":"12물에03-01","q":"발열 반응과 흡열 반응의 엔탈피 변화(ΔH) 부호를 각각 쓰시오.","answer":"발열 반응 ΔH < 0 (음수), 흡열 반응 ΔH > 0 (양수)","rubric":"성취수준 D~C 대응. 두 부호를 모두 맞히면 도달."},{"level":"중","code":"12물에03-02","q":"헤스 법칙이 무엇인지 설명하고, 이 법칙이 유용한 까닭을 쓰시오.","answer":"화학 반응의 엔탈피 변화는 반응의 경로와 관계없이 처음 상태와 나중 상태에 의해서만 결정된다는 법칙이다. 따라서 직접 측정하기 어려운 반응이라도, 측정 가능한 여러 반응의 엔탈피 변화를 조합해 원하는 반응의 엔탈피 변화를 계산할 수 있어 유용하다.","rubric":"성취수준 C 대응. 경로와 무관함(1.5점) + 측정 곤란한 반응 계산에 활용(1.5점)."},{"level":"상","code":"12물에03-03","q":"얼음이 상온에서 저절로 녹는 과정은 흡열 반응인데도 자발적으로 일어난다. 이 현상을 엔탈피와 엔트로피를 함께 사용해 설명하시오.","answer":"얼음이 녹는 과정은 열을 흡수하므로 엔탈피 측면(ΔH > 0)만 보면 자발적이지 않아야 한다. 그러나 고체가 액체로 되면 분자 배열이 규칙적인 상태에서 무질서한 상태로 바뀌어 엔트로피가 크게 증가한다(ΔS > 0). 상온처럼 온도가 충분히 높으면 엔트로피 증가의 기여가 엔탈피의 불리함을 넘어서므로 전체적으로 자발적인 변화가 된다. 반대로 온도가 낮으면 엔트로피 기여가 작아져 물이 어는 방향이 자발적이 된다.","rubric":"성취수준 A 대응. 흡열(ΔH>0)이라는 점(1점) + 엔트로피 증가(1점) + 온도에 따라 두 요인의 상대적 기여가 달라짐(1점). ※깁스 자유 에너지 식은 요구하지 않음."}]}},"물에-04":{"diag":{"from":"중 「화학 반응의 규칙성」","items":[{"type":"선택형","q":"같은 양의 마그네슘을 묽은 염산에 넣을 때 반응이 더 빠른 경우는?","choices":["① 덩어리 상태","② 가루 상태","③ 온도가 낮을 때","④ 염산이 묽을 때"],"answer":"②","checks":"반응 속도에 대한 선개념","miscon":"표면적 효과를 모르는 경우. 접촉 면적으로 설명."},{"type":"선택형","q":"화학 반응이 일어날 때 원자에 나타나는 변화로 옳은 것은?","choices":["① 원자의 배열이 달라진다","② 원자의 종류가 바뀐다","③ 원자가 사라진다","④ 원자가 새로 생긴다"],"answer":"①","checks":"화학 변화 [9과16-01]","miscon":"화학 변화와 핵반응을 혼동하는 경우."},{"type":"서답형","q":"음식을 냉장고에 보관하면 오래 가는 까닭을 반응 속도와 관련지어 쓰시오.","answer":"온도가 낮으면 음식이 상하게 하는 화학 반응과 미생물의 활동이 느려지기 때문이다.","checks":"온도와 반응 속도(선개념)","miscon":"'세균이 죽는다'고 오해. 느려질 뿐 죽지 않는다는 점을 짚을 것."}]},"form":{"items":[{"level":"하","code":"12물에04-03","q":"화학 반응이 일어나기 위해 충돌이 '유효 충돌'이 되려면 어떤 조건을 만족해야 하는지 두 가지 쓰시오.","answer":"①활성화 에너지 이상의 충분한 에너지를 가지고 충돌해야 한다 ②반응이 일어날 수 있는 알맞은 방향(배향)으로 충돌해야 한다","rubric":"성취수준 D~C 대응. 두 조건을 모두 쓰면 도달."},{"level":"중","code":"12물에04-02","q":"어떤 1차 반응에서 반응물의 농도가 처음의 1/8이 되는 데 걸린 시간이 30분이었다. 이 반응의 반감기를 구하고, 1차 반응의 반감기가 갖는 특징을 쓰시오.","answer":"1/8 = (1/2)³이므로 반감기 3번이 지난 것이다. 따라서 반감기 = 30 ÷ 3 = 10분. 특징: 1차 반응의 반감기는 처음 농도에 관계없이 일정하다.","rubric":"성취수준 C 대응. 반감기 10분(1.5점) + 농도에 무관하게 일정하다는 특징(1.5점)."},{"level":"상","code":"12물에04-04","q":"촉매를 넣으면 반응이 빨라지는 까닭을 활성화 에너지로 설명하고, 촉매가 반응의 엔탈피 변화나 평형 상수를 바꾸지 <b>않는<\/b> 까닭을 함께 쓰시오.","answer":"촉매는 활성화 에너지가 더 낮은 새로운 반응 경로를 제공한다. 그러면 활성화 에너지를 넘을 수 있는 분자의 비율이 커져 유효 충돌 수가 늘고 반응 속도가 빨라진다. 그러나 촉매는 반응물과 생성물의 에너지 자체를 바꾸지 않으므로 두 상태의 에너지 차이인 엔탈피 변화는 그대로이며, 정반응과 역반응의 속도를 같은 비율로 높이므로 평형의 위치(평형 상수)도 바뀌지 않고 평형에 더 빨리 도달할 뿐이다.","rubric":"성취수준 A 대응. 활성화 에너지 낮춤(1점) + 유효 충돌 증가(1점) + 반응물·생성물 에너지 불변과 정·역반응 동시 촉진(1점)."}]}},"반응-01":{"diag":{"from":"중 「물질의 구성」·「화학 반응의 규칙성」","items":[{"type":"선택형","q":"수용액에서 이온이 전류를 흐르게 할 수 있는 까닭은?","choices":["① 이온이 전하를 띠고 이동하기 때문","② 물이 전기를 통하기 때문","③ 이온이 무겁기 때문","④ 색이 있기 때문"],"answer":"①","checks":"이온 [9과11-04]","miscon":"순수한 물이 전기를 잘 통한다고 오해. 이온의 존재가 핵심임을 강조."},{"type":"선택형","q":"중화 반응에서 산의 H⁺와 염기의 OH⁻가 만나 생성되는 물질은?","choices":["① 물","② 산소","③ 소금만","④ 이산화 탄소"],"answer":"①","checks":"중화 반응","miscon":"염 생성만 기억하고 물을 놓치는 경우."},{"type":"서답형","q":"pH가 3인 용액과 pH가 6인 용액 중 더 산성이 강한 것은 무엇인지 쓰고 까닭을 쓰시오.","answer":"pH 3인 용액이 더 강한 산성이다. pH가 작을수록 수소 이온의 농도가 크기 때문이다.","checks":"pH의 의미(선개념)","miscon":"pH 숫자가 클수록 산성이 강하다고 뒤바꿔 생각하는 경우."}]},"form":{"items":[{"level":"하","code":"12반응01-01","q":"브뢴스테드-라우리 정의에 따라 산과 염기가 각각 무엇인지 쓰시오.","answer":"산은 수소 이온(H⁺, 양성자)을 내놓는 물질, 염기는 수소 이온을 받아들이는 물질이다.","rubric":"성취수준 D~C 대응. 두 정의를 모두 쓰면 도달."},{"level":"중","code":"12반응01-01","q":"NH₃ + H₂O ⇌ NH₄⁺ + OH⁻ 반응에서 브뢴스테드-라우리 산과 염기를 각각 지목하고, 이 정의가 아레니우스 정의보다 확장성이 큰 까닭을 설명하시오.","answer":"H₂O가 H⁺를 내놓았으므로 산, NH₃가 H⁺를 받았으므로 염기이다. 아레니우스 정의는 수용액에서 OH⁻를 내놓는 물질만 염기로 보지만, 브뢴스테드-라우리 정의는 H⁺의 주고받음으로 정의하므로 NH₃처럼 OH⁻를 갖지 않은 물질이나 수용액이 아닌 계에서도 산·염기를 판단할 수 있다.","rubric":"성취수준 C 대응. 산·염기 지목(1점) + 확장성 설명(2점)."},{"level":"상","code":"12반응01-05","q":"혈액은 강한 산이나 염기가 조금 들어와도 pH가 거의 변하지 않는다. 이 완충 작용을 화학 평형으로 설명하고, 생명 현상에서 왜 중요한지 쓰시오.","answer":"혈액에는 약산인 탄산(H₂CO₃)과 그 짝염기인 탄산수소 이온(HCO₃⁻)이 함께 존재하며 H₂CO₃ ⇌ H⁺ + HCO₃⁻ 평형을 이룬다. 산이 들어오면 HCO₃⁻가 H⁺와 결합해 H₂CO₃가 되는 방향으로 평형이 이동해 H⁺ 증가를 상쇄하고, 염기가 들어오면 H₂CO₃가 이온화하여 H⁺를 공급하는 방향으로 이동해 감소를 상쇄한다. 효소는 좁은 pH 범위에서만 제 기능을 하므로, 이 완충 작용이 있어야 물질대사가 정상적으로 유지된다.","rubric":"성취수준 A 대응. 약산-짝염기 평형 제시(1점) + 양방향 상쇄 기작(1.5점) + 생명 현상에서의 중요성(0.5점). ※복잡한 pH 계산은 요구하지 않음."}]}},"반응-02":{"diag":{"from":"중 「화학 반응의 규칙성」","items":[{"type":"선택형","q":"철이 녹스는 반응에서 철에 일어나는 변화는?","choices":["① 산화","② 환원","③ 중화","④ 융해"],"answer":"①","checks":"산화 [10통과2-01-03 연계]","miscon":"산화를 '산성이 되는 것'으로 오해하는 경우가 있음."},{"type":"선택형","q":"화학 반응식에서 양쪽의 원자 종류와 개수가 같아야 하는 까닭은?","choices":["① 질량 보존 법칙 때문","② 일정 성분비 법칙 때문","③ 기체 반응 법칙 때문","④ 보일 법칙 때문"],"answer":"①","checks":"질량 보존 법칙 [9과16-03]","miscon":"세 법칙의 이름을 혼동. 반쪽 반응식 완성의 기초이므로 확인 필요."},{"type":"서답형","q":"전지가 하는 일을 에너지 전환의 관점에서 쓰시오.","answer":"전지 속 화학 반응을 통해 화학 에너지를 전기 에너지로 전환한다.","checks":"에너지 전환(선개념)","miscon":"전지가 전기를 '저장만' 한다고 생각하는 경우. 화학 반응이 원천임을 짚을 것."}]},"form":{"items":[{"level":"하","code":"12반응02-01","q":"다음 반응에서 산화되는 물질과 환원되는 물질을 각각 쓰시오.\nZn + Cu²⁺ → Zn²⁺ + Cu","answer":"산화되는 물질: Zn(전자를 잃음) / 환원되는 물질: Cu²⁺(전자를 얻음)","rubric":"성취수준 D~C 대응. 두 물질을 모두 바르게 지목하면 도달."},{"level":"중","code":"12반응02-03","q":"아연과 구리를 전극으로 하는 다니엘 전지에서 (−)극과 (+)극에서 일어나는 반응을 반쪽 반응식으로 쓰고, 전자의 이동 방향을 쓰시오.","answer":"(−)극(아연, 산화): Zn → Zn²⁺ + 2e⁻ / (+)극(구리, 환원): Cu²⁺ + 2e⁻ → Cu. 전자는 도선을 따라 아연 전극에서 구리 전극으로 이동한다.","rubric":"성취수준 C 대응. 두 반쪽 반응식(2점) + 전자 이동 방향(1점)."},{"level":"상","code":"12반응02-04","q":"소금물을 전기 분해하면 양쪽 전극에서 기체가 발생한다. 각 전극에서 일어나는 반응을 산화·환원으로 설명하고, 전기 분해와 화학 전지의 에너지 전환 방향이 어떻게 다른지 쓰시오.","answer":"(−)극(환원): 물이 전자를 얻어 수소 기체가 발생한다(2H₂O + 2e⁻ → H₂ + 2OH⁻). (+)극(산화): 염화 이온이 전자를 잃어 염소 기체가 발생한다(2Cl⁻ → Cl₂ + 2e⁻). 화학 전지는 자발적인 산화·환원 반응으로 화학 에너지를 전기 에너지로 바꾸지만, 전기 분해는 외부에서 전기 에너지를 공급해 자발적이지 않은 반응을 일으키므로 전기 에너지를 화학 에너지로 바꾼다.","rubric":"성취수준 A 대응. 두 전극 반응(2점) + 에너지 전환 방향의 대비(1.5점)."}]}},"반응-03":{"diag":{"from":"중 「물질의 구성」","items":[{"type":"선택형","q":"탄소 원자가 만들 수 있는 결합의 개수는?","choices":["① 1개","② 2개","③ 4개","④ 6개"],"answer":"③","checks":"화학 결합 [9과11 연계]","miscon":"탄소 화합물의 다양성이 4개의 결합에서 온다는 점을 모르는 경우."},{"type":"선택형","q":"화합물을 화학식으로 나타낼 때 아래첨자가 뜻하는 것은?","choices":["① 원자의 개수","② 분자의 개수","③ 질량","④ 전하"],"answer":"①","checks":"화학식 [9과11-01]","miscon":"계수와 아래첨자를 혼동."},{"type":"서답형","q":"우리 주변에서 볼 수 있는 플라스틱 제품을 하나 쓰고, 그것이 어떤 점에서 유용한지 쓰시오.","answer":"예) 페트병 - 가볍고 깨지지 않으며 투명해서 음료 용기로 쓰기 좋다.","checks":"고분자 물질(선개념)","miscon":"플라스틱을 '자연에 없던 나쁜 것'으로만 보는 시각. 유용성과 문제점을 함께 다룰 것."}]},"form":{"items":[{"level":"하","code":"12반응03-01","q":"다음 작용기의 이름을 각각 쓰시오.\n−OH, −CHO, −COOH","answer":"−OH: 하이드록시기(알코올), −CHO: 알데하이드기, −COOH: 카복실기(카복실산)","rubric":"성취수준 D~C 대응. 세 작용기를 모두 맞히면 도달. ※알코올·알데하이드·카복실산으로 한정."},{"level":"중","code":"12반응03-02","q":"에탄올(C₂H₅OH)을 산화시키면 아세트알데하이드를 거쳐 아세트산이 된다. 이 변화를 작용기의 변화로 설명하고, 성질이 어떻게 달라지는지 한 가지 쓰시오.","answ
