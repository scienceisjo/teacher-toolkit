er":"하이드록시기(−OH)가 산화되어 알데하이드기(−CHO)로, 다시 카복실기(−COOH)로 바뀐다. 작용기가 바뀌면 성질도 바뀌어, 중성이던 에탄올과 달리 카복실기를 가진 아세트산은 산성을 띠어 리트머스를 붉게 변화시킨다(식초의 신맛).","rubric":"성취수준 C 대응. 작용기 변화 순서(1.5점) + 성질 변화 사례(1.5점)."},{"level":"상","code":"12반응03-03","q":"단백질과 페트(PET) 같은 합성 섬유의 공통된 형성 원리를 설명하고, 이 원리를 이용해 만든 물질이 사회에 준 이로움과 문제점을 각각 하나씩 쓰시오.","answer":"둘 다 작은 단위체가 반복적으로 결합하는 중합 반응으로 만들어진 고분자이다. 단백질은 아미노산이, PET는 두 종류의 단위체가 물이 빠지면서 연결되는 축합 중합으로 이어진다. 이로움: 가볍고 튼튼하며 값싼 소재를 대량 생산해 의류·포장·의료 등 생활을 크게 편리하게 했다. 문제점: 자연에서 잘 분해되지 않아 폐기물과 미세 플라스틱 오염을 일으킨다.","rubric":"성취수준 A 대응. 단위체의 반복 결합(중합)이라는 공통 원리(1.5점) + 이로움(1점) + 문제점(1점)."}]}},"m13-01":{"diag":{"from":"초3~4 「기후변화와 우리 생활」 · 초5~6 「자원과 에너지」","items":[{"type":"선택형","q":"다음 중 기후변화의 주된 원인으로 가장 알맞은 것은?","choices":["① 지구의 자전 속도가 빨라져서","② 사람들이 화석연료를 많이 사용해서","③ 달의 위상이 변해서","④ 계절이 바뀌어서"],"answer":"②","checks":"기후변화가 인간 활동과 관련됨 [4과16-01]","miscon":"③④를 고르면 기후변화를 '자연스러운 계절 변화'로 오해하는 것. 기후(수십 년 평균)와 날씨(그날그날)의 구분부터 다시 잡아야 함."},{"type":"선택형","q":"재생에너지에 해당하지 <b>않는<\/b> 것은?","choices":["① 태양광","② 풍력","③ 석탄","④ 지열"],"answer":"③","checks":"재생에너지의 종류 [6과08-02]","miscon":"석탄·석유를 '땅에서 계속 나오니까 재생된다'고 생각하는 경우가 있음. 만들어지는 데 수백만 년이 걸린다는 시간 규모를 짚어줄 것."},{"type":"서답형","q":"우리가 쓰는 자원이 '유한하다'는 말이 무슨 뜻인지 한 문장으로 쓰고, 그 예를 하나 드시오.","answer":"양이 정해져 있어 계속 쓰면 언젠가 바닥난다는 뜻. 예: 석유, 천연가스, 금속 광물 등","checks":"자원의 유한함 [6과08-01]","miscon":"'유한=비싸다'로 이해하는 경우. 가격이 아니라 총량의 문제임을 강조."}]},"form":{"items":[{"level":"하","code":"9과01-01","q":"과학적 탐구 과정을 순서대로 나열하시오.\n(가) 가설 설정  (나) 문제 인식  (다) 결론 도출  (라) 탐구 설계 및 수행  (마) 자료 해석","answer":"(나) → (가) → (라) → (마) → (다)","rubric":"순서를 모두 맞히면 도달. 문제 인식이 맨 앞, 결론 도출이 맨 뒤에 오는 것만 맞혀도 부분 도달로 인정."},{"level":"중","code":"9과01-02","q":"과학기술의 발전이 인류 문명에 미친 영향을 보여주는 사례를 하나 골라, 그 기술이 <b>없었다면<\/b> 우리 삶이 어떻게 달랐을지 서술하시오.","answer":"예) 백신 - 없었다면 천연두·홍역 등으로 영유아 사망률이 매우 높았을 것이고 평균 수명이 크게 짧았을 것이다.","rubric":"기술 1가지를 정확히 제시(1점) + 그 기술이 바꾼 구체적 변화를 인과관계로 서술(2점). '편리해졌다' 수준의 막연한 답은 1점."},{"level":"상","code":"9과01-03","q":"우리 학교에서 실천할 수 있는 지속가능한 활동 방안을 <b>개인 차원<\/b>과 <b>사회(학교) 차원<\/b>으로 나누어 각각 제안하고, 두 방안이 어떻게 서로를 돕는지 설명하시오.","answer":"예) 개인: 텀블러 사용 / 학교: 급수대 설치·일회용컵 반입 제한. 개인 실천이 지속되려면 학교의 시설·규칙 지원이 필요하고, 학교 정책도 개인 참여가 있어야 효과가 나므로 상호 보완적이다.","rubric":"두 차원 방안 각 1점, 상호 관계를 논리적으로 설명 1점. 사회 차원 방안을 개인 실천의 나열로만 쓰면 감점."}]}},"m13-02":{"diag":{"from":"초3~4 「동물·식물의 생활」·「다양한 생물」·「생물과 환경」 · 초5~6 「식물의 구조와 기능」","items":[{"type":"선택형","q":"현미경으로 양파 표피 세포를 관찰할 때 <b>가장 먼저<\/b> 해야 할 일은?","choices":["① 고배율 대물렌즈로 맞춘다","② 저배율에서 상을 찾는다","③ 조동나사로 재물대를 최대한 올린 뒤 관찰한다","④ 접안렌즈를 빼고 본다"],"answer":"②","checks":"현미경으로 세포 관찰 [6과11-01]","miscon":"처음부터 고배율로 맞추는 실수가 매우 흔함. 저배율→고배율 순서를 실습으로 재확인."},{"type":"선택형","q":"버섯, 곰팡이가 속하는 무리는?","choices":["① 식물","② 동물","③ 균류","④ 세균"],"answer":"③","checks":"균류의 특징 [4과12-01]","miscon":"버섯을 '식물'로 분류하는 오개념이 매우 흔함. 광합성을 하지 않고 양분을 흡수한다는 점이 핵심."},{"type":"서답형","q":"생태계에서 '생물 요소'와 '비생물 요소'를 각각 두 가지씩 쓰시오.","answer":"생물 요소: 식물, 동물, 곰팡이, 세균 등 / 비생물 요소: 빛, 물, 온도, 흙, 공기 등","checks":"생태계 구성 요소 분류 [4과14-01]","miscon":"죽은 나무·낙엽을 비생물로만 보는 경우. 생물이었던 것과 비생물의 구분을 설명해줄 것."}]},"form":{"items":[{"level":"하","code":"9과02-01","q":"다음 세포 구조 중 <b>식물 세포에만<\/b> 있는 것을 모두 고르시오.\n핵, 세포막, 세포벽, 엽록체, 미토콘드리아","answer":"세포벽, 엽록체","rubric":"두 개 모두 정확히 고르면 도달. 미토콘드리아를 포함시키면 미도달(동물·식물 공통)."},{"level":"중","code":"9과02-02","q":"동물과 식물의 유기적 구성 단계를 각각 순서대로 쓰고, <b>다른 점<\/b>을 한 가지 설명하시오.","answer":"동물: 세포→조직→기관→기관계→개체 / 식물: 세포→조직→조직계→기관→개체. 동물에는 기관계가 있고 식물에는 조직계가 있다.","rubric":"두 단계 순서 각 1점, 차이점 설명 1점. 단계 이름만 나열하고 차이를 못 쓰면 2점."},{"level":"상","code":"9과02-03","q":"같은 종의 무당벌레인데도 등껍질 무늬가 개체마다 다르다. 이러한 <b>변이<\/b>가 생물다양성 유지에 왜 중요한지, 환경이 갑자기 변하는 상황을 예로 들어 설명하시오.","answer":"변이가 크면 환경 변화 시 살아남는 개체가 존재할 확률이 높아진다. 모두 같은 형질이면 새로운 질병·기후 변화에 전멸할 수 있으나, 다양하면 일부가 적응해 종이 유지된다.","rubric":"변이의 의미 이해(1점) + 환경 변화와 생존 확률을 연결(2점). '다양하면 좋다'는 결론만 쓰면 1점."}]}},"m13-03":{"diag":{"from":"초5~6 「열과 우리 생활」","items":[{"type":"선택형","q":"뜨거운 국이 담긴 그릇에 차가운 숟가락을 넣고 시간이 지났을 때 나타나는 변화로 옳은 것은?","choices":["① 국의 온도만 낮아진다","② 숟가락의 온도만 높아진다","③ 국은 낮아지고 숟가락은 높아져 결국 같아진다","④ 두 물체의 온도는 변하지 않는다"],"answer":"③","checks":"접촉한 두 물체의 온도 변화 [6과07-02]","miscon":"'뜨거운 것이 차가운 것에 닿으면 차가움이 옮겨간다'는 오개념. 이동하는 것은 '차가움'이 아니라 '열'임을 짚을 것."},{"type":"선택형","q":"주전자의 물이 데워질 때 물 전체가 고루 뜨거워지는 것은 어떤 열의 이동 방식 때문인가?","choices":["① 전도","② 대류","③ 복사","④ 단열"],"answer":"②","checks":"열의 이동 방식 [6과07-03]","miscon":"액체·기체에서의 대류를 전도와 혼동. 물질(입자) 자체가 움직이는지 여부로 구분하게 할 것."},{"type":"서답형","q":"보온병이 음료의 온도를 오래 유지하는 까닭을 '단열'이라는 말을 넣어 설명하시오.","answer":"보온병은 이중벽·진공층 등으로 열의 이동을 막아(단열) 안과 밖 사이에 열이 잘 오가지 못하게 하므로 온도가 오래 유지된다.","checks":"단열의 이용 [6과07-04]","miscon":"'보온병이 열을 만든다'고 오해하는 경우. 열을 가두는 것이지 생성하는 게 아님을 강조."}]},"form":{"items":[{"level":"하","code":"9과03-02","q":"다음 현상을 전도·대류·복사로 각각 분류하시오.\n(가) 난로 앞에 서 있으면 앞쪽이 따뜻하다  (나) 뜨거운 국에 담근 숟가락 손잡이가 뜨거워진다  (다) 에어컨을 위쪽에 설치한다","answer":"(가) 복사, (나) 전도, (다) 대류","rubric":"3개 모두 맞히면 도달, 2개는 부분 도달."},{"level":"중","code":"9과03-01","q":"온도가 다른 두 물체를 접촉시켰을 때 열평형에 도달하는 과정을 <b>입자의 움직임<\/b>으로 설명하시오.","answer":"온도가 높은 물체의 입자는 활발히 운동하며, 접촉면에서 온도가 낮은 물체의 입자와 충돌해 운동 에너지를 전달한다. 그 결과 높은 쪽 입자 운동은 둔해지고 낮은 쪽은 활발해져, 두 물체의 입자 운동 정도가 같아지면 온도가 같아진 열평형 상태가 된다.","rubric":"입자 운동의 활발한 정도로 온도를 설명(1점) + 충돌에 의한 에너지 전달 언급(1점) + 최종적으로 같아짐(1점)."},{"level":"상","code":"9과03-03","q":"바닷가에서 낮에는 바다에서 육지로 바람이 분다. 물의 비열이 모래보다 크다는 사실을 이용하여 그 까닭을 설명하시오.","answer":"비열이 작은 모래(육지)는 같은 햇빛을 받아도 온도가 빨리 올라가고, 비열이 큰 바닷물은 천천히 올라간다. 낮에 육지 위 공기가 더 뜨거워져 상승하면 그 자리를 채우려 바다 쪽의 공기가 이동해 해풍이 분다.","rubric":"비열 차이로 온도 변화 속도 차이 설명(1점) + 공기의 상승·기압 차 연결(1점) + 바람 방향 결론(1점). 시간-온도 그래프로 답해도 인정."}]}},"m13-04":{"diag":{"from":"초3~4 「물의 상태 변화」","items":[{"type":"선택형","q":"젖은 빨래가 마르는 현상과 <b>같은<\/b> 상태 변화는?","choices":["① 얼음이 녹는다","② 물이 끓어 수증기가 된다","③ 유리창에 물방울이 맺힌다","④ 물이 얼어 얼음이 된다"],"answer":"②","checks":"증발과 기화 [4과10-02]","miscon":"증발과 끓음을 전혀 다른 것으로 보는 경우가 많음. 둘 다 액체→기체(기화)이며 온도·속도가 다를 뿐임을 정리."},{"type":"선택형","q":"차가운 음료수 캔 표면에 물방울이 맺히는 까닭은?","choices":["① 캔 속 물이 새어 나와서","② 공기 중 수증기가 응결해서","③ 캔이 녹아서","④ 물이 증발해서"],"answer":"②","checks":"응결 [4과10-02]","miscon":"'캔에서 물이 스며 나왔다'는 오개념이 매우 흔함. 밀봉된 캔·마른 유리컵으로 반증 실험을 보여줄 것."},{"type":"서답형","q":"물이 얼어 얼음이 될 때 부피와 무게는 각각 어떻게 되는지 쓰시오.","answer":"부피는 늘어나고, 무게(질량)는 변하지 않는다.","checks":"상태 변화 관찰 [4과10-02]","miscon":"'얼면 무거워진다'거나 '부피가 준다'는 오개념. 물은 예외적으로 얼 때 부피가 커진다는 점을 실험으로 확인."}]},"form":{"items":[{"level":"하","code":"9과04-02","q":"고체·액체·기체를 입자 사이의 거리가 <b>가까운 순서<\/b>대로 쓰고, 각 상태의 입자 배열을 간단히 설명하시오.","answer":"고체 < 액체 < 기체. 고체는 규칙적으로 빽빽이 배열, 액체는 비교적 가깝지만 불규칙, 기체는 매우 멀고 자유롭게 흩어져 있다.","rubric":"순서 1점 + 배열 설명 2점(규칙성·거리 언급)."},{"level":"중","code":"9과04-03","q":"물이 얼음으로 변할 때 <b>질량과 물질의 성질은 변하지 않는<\/b> 이유를 입자 모형으로 설명하시오.","answer":"상태 변화에서는 입자의 배열과 사이 거리만 달라질 뿐, 입자의 종류와 개수는 그대로이므로 질량과 물질의 성질은 변하지 않는다. 부피만 배열 변화로 달라진다.","rubric":"입자 종류·개수 불변 언급(2점) + 배열·거리만 변함(1점)."},{"level":"상","code":"9과04-04","q":"더운 여름 마당에 물을 뿌리면 시원해진다. 이 현상을 상태 변화와 열에너지 출입으로 설명하고, 같은 원리를 이용한 다른 사례를 하나 드시오.","answer":"물이 증발(기화)하면서 주변에서 열에너지를 흡수하므로 주위 온도가 낮아진다. 사례: 알코올 솜으로 닦으면 시원함, 땀이 나서 체온이 내려감, 아이스팩(융해) 등","rubric":"기화 시 열 흡수 명시(2점) + 적절한 사례(1점). '물이 차가워서'라고 답하면 미도달."}]}},"m13-05":{"diag":{"from":"초3~4 「힘과 우리 생활」","items":[{"type":"선택형","q":"물체의 무게를 정확히 비교하려면 어떤 도구가 필요한가?","choices":["① 자","② 저울","③ 온도계","④ 비커"],"answer":"②","checks":"저울을 사용한 무게 비교 [4과01-03]","miscon":"크기가 큰 물체가 항상 더 무겁다고 생각하는 경우. 같은 크기 다른 물질로 반례를 보여줄 것(→ 밀도 연결)."},{"type":"선택형","q":"시소에서 몸무게가 무거운 사람이 가벼운 사람과 수평을 이루려면?","choices":["① 받침점에서 더 멀리 앉는다","② 받침점에서 더 가까이 앉는다","③ 아무 데나 앉아도 된다","④ 수평을 이룰 수 없다"],"answer":"②","checks":"수평잡기 [4과01-02]","miscon":"무게만 보고 거리를 고려하지 않는 경우. 무게×거리의 균형을 실물로 체험시킬 것."},{"type":"서답형","q":"무거운 짐을 트럭에 실을 때 빗면(경사판)을 이용하면 어떤 점이 좋은지 쓰시오.","answer":"직접 들어 올릴 때보다 작은 힘으로 물체를 올릴 수 있다.","checks":"도구의 이용 [4과01-04]","miscon":"'힘이 덜 든다=일이 줄어든다'로 오해. 이동 거리가 길어져 전체 일은 비슷하다는 점은 중학교에서 다룸."}]},"form":{"items":[{"level":"하","code":"9과05-02","q":"다음 상황에 작용하는 힘의 이름을 쓰시오.\n(가) 늘어난 고무줄이 원래대로 돌아가려는 힘  (나) 물속에서 물체가 위로 뜨려는 힘  (다) 지구가 물체를 끌어당기는 힘","answer":"(가) 탄성력, (나) 부력, (다) 중력","rubric":"3개 모두 맞히면 도달, 2개는 부분 도달."},{"level":"중","code":"9과05-01","q":"책상 위에 가만히 놓여 있는 책에 작용하는 힘을 <b>화살표로 그려 표현<\/b>하고, 두 힘의 관계를 설명하시오.","answer":"아래쪽으로 중력, 위쪽으로 책상이 떠받치는 힘(수직항력)을 같은 길이의 화살표로 그린다. 두 힘은 크기가 같고 방향이 반대이며 한 물체에 작용하므로 힘의 평형을 이루어 알짜힘이 0이다.","rubric":"두 힘을 모두 표시(1점) + 크기 같고 방향 반대(1점) + 평형/알짜힘 0 언급(1점). ※나란한 힘만 다룸."},{"level":"상","code":"9과05-03","q":"다음 세 상황을 ⓐ속력만 변함 ⓑ운동 방향만 변함 ⓒ둘 다 변함으로 분류하고, 각각 알짜힘의 방향을 운동 방향과 비교해 설명하시오.\n(가) 직선 도로에서 가속하는 자동차  (나) 일정한 빠르기로 도는 회전목마  (다) 비스듬히 차올린 축구공","answer":"(가) ⓐ - 알짜힘이 운동 방향과 나란함 / (나) ⓑ - 알짜힘이 운동 방향과 수직 / (다) ⓒ - 알짜힘(중력)이 운동 방향과 비스듬함","rubric":"분류 3개(각 0.5점) + 알짜힘 방향 관계 설명(1.5점). 분류만 맞고 설명이 없으면 부분 도달."}]}},"m13-06":{"diag":{"from":"초3~4 「여러 가지 기체」","items":[{"type":"선택형","q":"공기를 가득 넣은 축구공과 바람을 뺀 축구공의 무게를 비교하면?","choices":["① 바람을 넣은 공이 더 무겁다","② 바람을 뺀 공이 더 무겁다","③ 무게가 같다","④ 알 수 없다"],"answer":"①","checks":"기체도 무게가 있음 [4과15-01]","miscon":"'기체는 무게가 없다'는 오개념이 매우 흔함. 정밀 저울로 직접 측정해 보여줄 것."},{"type":"선택형","q":"찌그러진 탁구공을 뜨거운 물에 넣으면 펴지는 까닭은?","choices":["① 공 속 기체의 부피가 늘어나서","② 공 속 기체가 사라져서","③ 물이 공 속으로 들어가서","④ 공이 녹아서"],"answer":"①","checks":"온도에 따른 기체 부피 변화 [4과15-02]","miscon":"'뜨거운 물이 공을 밀어준다'는 오해. 내부 기체의 변화가 원인임을 강조."},{"type":"서답형","q":"높은 산에 올라갔을 때 과자 봉지가 빵빵해지는 까닭을 쓰시오.","answer":"높은 곳은 바깥 공기의 압력이 낮아져서, 봉지 속 기체가 밖으로 밀어내는 힘이 상대적으로 커져 부피가 커지기 때문이다.","checks":"압력에 따른 기체 부피 변화 [4과15-02]","miscon":"'산 위가 추워서 커진다'는 오답. 온도가 아니라 기압 차임을 구분시킬 것."}]},"form":{"items":[{"level":"하","code":"9과06-01","q":"기체의 압력이 생기는 까닭을 <b>입자<\/b>라는 말을 넣어 한 문장으로 쓰시오.","answer":"기체 입자들이 끊임없이 운동하며 용기 벽에 충돌하기 때문에 압력이 생긴다.","rubric":"입자의 운동과 벽면 충돌을 모두 언급하면 도달. '기체가 밀어서'만 쓰면 미도달."},{"level":"중","code":"9과06-02","q":"주사기 입구를 막고 피스톤을 눌렀더니 부피가 절반이 되었다. 이때 기체의 압력은 어떻게 변하며, 그 이유를 입자 모형으로 설명하시오.","answer":"압력은 2배가 된다. 입자 수는 그대로인데 부피가 절반이 되어 같은 넓이의 벽에 부딪히는 입자의 충돌 횟수가 2배로 늘어나기 때문이다.","rubric":"압력 증가(2배) 명시(1점) + 입자 수 불변(1점) + 충돌 횟수 증가로 설명(1점)."},{"level":"상","code":"9과06-03","q":"열기구가 하늘로 떠오르는 원리를, 기체의 온도와 부피 관계 및 밀도와 관련지어 설명하시오.","answer":"버너로 공기를 가열하면 기구 속 기체 입자의 운동이 활발해져 부피가 커진다. 일부 공기가 빠져나가 같은 부피 속 입자 수가 줄어 밀도가 주변 공기보다 작아지므로 기구가 위로 뜬다.","rubric":"온도↑→입자 운동 활발→부피↑(1점) + 밀도 감소(1점) + 주변 공기와 비교해 부력/상승 결론(1점)."}]}},"m13-07":{"diag":{"from":"초3~4 「밤하늘 관찰」 · 초5~6 「지구의 운동」·「계절의 변화」","items":[{"type":"선택형","q":"낮과 밤이 생기는 까닭은?","choices":["① 지구의 자전","② 지구의 공전","③ 달의 공전","④ 태양의 자전"],"answer":"①","checks":"지구의 자전과 낮밤 [6과12-02]","miscon":"자전과 공전을 뒤바꾸는 실수가 흔함. 자전=하루, 공전=1년으로 주기와 함께 기억시킬 것."},{"type":"선택형","q":"계절에 따라 보이는 별자리가 달라지는 까닭은?","choices":["① 별자리가 실제로 움직여서","② 지구가 태양 둘레를 공전해서","③ 달이 지구를 돌아서","④ 지구가 자전해서"],"answer":"②","checks":"지구의 공전과 계절별 별자리 [6과12-03]","miscon":"별자리 자체가 이동한다고 생각하는 경우. 관측자(지구)의 위치가 바뀌는 것임을 모형으로 확인."},{"type":"서답형","q":"계절이 변하는 근본 원인을 쓰시오.","answer":"지구의 자전축이 기울어진 채로 태양 둘레를 공전하기 때문에 계절에 따라 태양의 남중 고도와 낮의 길이가 달라진다.","checks":"계절 변화의 원인 [6과13-03]","miscon":"'여름에 지구가 태양에 가까워서'라는 오개념이 매우 강함. 거리설을 반드시 반박해 줄 것(남반구는 반대 계절)."}]},"form":{"items":[{"level":"하","code":"9과07-01","q":"다음 행성을 지구형 행성과 목성형 행성으로 분류하시오.\n수성, 금성, 화성, 목성, 토성, 천왕성, 해왕성","answer":"지구형: 수성, 금성, 화성 / 목성형: 목성, 토성, 천왕성, 해왕성","rubric":"두 무리를 모두 정확히 분류하면 도달. 천왕성·해왕성을 지구형으로 넣으면 미도달."},{"level":"중","code":"9과07-04","q":"일식과 월식이 일어날 때 태양·지구·달의 위치를 각각 순서대로 쓰고, 각각 달의 위상은 무엇인지 쓰시오.","answer":"일식: 태양-달-지구 순(달이 가운데), 이때 달은 삭. 월식: 태양-지구-달 순(지구가 가운데), 이때 달은 망(보름달).","rubric":"위치 관계 각 1점, 위상 각 0.5점. 일식/월식을 뒤바꾸면 미도달."},{"level":"상","code":"9과07-02","q":"태양의 흑점 수가 많아지는 시기에 지구에서 나타날 수 있는 현상을 두 가지 쓰고, 그 까닭을 태양 활동과 관련지어 설명하시오.","answer":"흑점 수가 많을 때는 태양 활동이 활발해 플레어·태양풍이 강해진다. 그 결과 ①오로라가 자주·넓게 나타나고 ②인공위성 고장, GPS·무선 통신 장애, 대규모 정전 등이 발생할 수 있다.","rubric":"현상 2가지(각 1점) + 태양 활동 활발함과의 인과 설명(1점)."}]}},"m13-08":{"diag":{"from":"초3~4 「물체와 물질」 · 초5~6 「용해와 용액」·「혼합물의 분리」","items":[{"type":"선택형","q":"설탕을 물에 녹였을 때 전체 무게는 어떻게 되는가?","choices":["① 설탕이 사라져 가벼워진다","② 물의 무게와 같아진다","③ 물과 설탕의 무게를 합한 것과 같다","④ 무거워진다"],"answer":"③","checks":"용해 현상 [6과03-01]","miscon":"'녹으면 없어진다'는 오개념. 눈에 안 보여도 입자가 물속에 퍼져 있음을 강조(→ 질량 보존으로 연결)."},{"type":"선택형","q":"물과 식용유가 섞인 혼합물을 분리하는 데 알맞은 방법은?","choices":["① 거름종이로 거른다","② 가만히 두었다가 위층을 따라낸다","③ 증발시킨다","④ 자석을 댄다"],"answer":"②","checks":"섞이지 않는 액체 혼합물의 분리 [6과05-01]","miscon":"모든 분리를 '거르기'로 해결하려는 경향. 섞이는지 여부와 밀도 차를 먼저 판단하게 할 것."},{"type":"서답형","q":"소금물에서 소금을 얻으려면 어떻게 해야 하는지 쓰고, 그 원리를 설명하시오.","answer":"소금물을 가열하거나 햇볕에 두어 물을 증발시키면 소금만 남는다. 물은 끓는점이 낮아 먼저 기체로 날아가고 소금은 남기 때문이다.","checks":"증발을 이용한 분리 [6과05-02]","miscon":"'거름종이로 거른다'는 오답이 흔함. 용해된 물질은 걸러지지 않음을 실험으로 확인."}]},"form":{"items":[{"level":"하","code":"9과08-01","q":"다음 중 <b>물질의 특성<\/b>에 해당하는 것을 모두 고르시오.\n질량, 밀도, 부피, 끓는점, 녹는점, 길이, 용해도","answer":"밀도, 끓는점, 녹는점, 용해도","rubric":"4개를 모두 고르고 질량·부피·길이를 제외하면 도달. '양에 따라 변하지 않는 값'이라는 기준을 적용했는지 확인."},{"level":"중","code":"9과08-02","q":"물질의 특성을 근거로 다음을 순물질과 혼합물로 분류하고, 판단 근거를 한 가지 쓰시오.\n증류수, 소금물, 공기, 구리, 우유","answer":"순물질: 증류수, 구리 / 혼합물: 소금물, 공기, 우유. 순물질은 녹는점·끓는점이 일정하지만 혼합물은 일정하지 않다(예: 소금물은 끓는 동안 온도가 계속 올라감).","rubric":"분류 정확(2점) + 끓는점/녹는점의 일정함을 근거로 제시(1점)."},{"level":"상","code":"9과08-03","q":"바닷물에서 식수를 얻는 장치를 설계하려 한다. 이용할 물질의 특성이 무엇인지 밝히고, 장치의 작동 원리를 설명하시오.","answer":"물과 소금의 끓는점 차이를 이용한다(증류). 바닷물을 가열하면 끓는점이 낮은 물만 기체로 되어 나오고, 이 수증기를 차가운 관에 통과시켜 응결시키면 소금이 없는 물을 얻는다.","rubric":"이용한 특성(끓는점 차) 명시(1점) + 기화-액화 과정 설명(2점). 단순히 '끓인다'만 쓰면 1점."}]}},"m13-09":{"diag":{"from":"초3~4 「땅의 변화」 · 초5~6 「지층과 화석」","items":[{"type":"선택형","q":"지층에서 아래쪽에 있는 층에 대한 설명으로 옳은 것은? (뒤집히지 않은 지층)","choices":["① 가장 나중에 쌓였다","② 가장 먼저 쌓였다","③ 가장 얇다","④ 화석이 없다"],"answer":"②","checks":"지층의 형성 과정 [6과01-01]","miscon":"'위가 오래됐다'고 뒤집어 생각하는 경우. 퇴적이 아래→위로 쌓인다는 순서를 모형으로 확인."},{"type":"선택형","q":"화산 활동으로 마그마가 식어 굳어진 암석은?","choices":["① 퇴적암","② 화성암","③ 변성암","④ 대리암"],"answer":"②","checks":"화성암 [4과11-03]","miscon":"암석 이름(현무암·화강암)은 알아도 생성 과정과 연결하지 못하는 경우가 많음."},{"type":"서답형","q":"강의 상류와 하류에서 볼 수 있는 돌의 모양이 어떻게 다른지 쓰고, 그 까닭을 설명하시오.","answer":"상류의 돌은 크고 모나며, 하류의 돌은 작고 둥글다. 물에 의해 운반되면서 서로 부딪히고 깎여 모서리가 닳기 때문이다.","checks":"흐르는 물의 작용 [4과11-01]","miscon":"'하류에 원래 작은 돌만 있다'고 생각하는 경우. 침식·운반·퇴적의 연속 과정으로 설명."}]},"form":{"items":[{"level":"하","code":"9과09-01","q":"지권의 층상 구조를 바깥쪽부터 순서대로 쓰시오.","answer":"지각 → 맨틀 → 외핵 → 내핵","rubric":"4개 순서를 모두 맞히면 도달. ※지진파 특성은 다루지 않음."},{"level":"중","code":"9과09-03","q":"암석을 생성 과정에 따라 세 종류로 분류하고, 각각의 생성 과정을 한 문장씩 쓰시오.","answer":"화성암: 마그마가 식어 굳어짐 / 퇴적암: 퇴적물이 쌓여 다져지고 굳어짐 / 변성암: 기존 암석이 높은 열과 압력을 받아 성질이 변함","rubric":"세 종류 이름(1점) + 각 생성 과정 설명(2점)."},{"level":"상","code":"9과09-05","q":"세계 지도에 화산과 지진이 발생한 지점을 표시하면 특정 지역에 띠 모양으로 몰려 나타난다. 그 까닭을 판의 경계와 관련지어 설명하시오.","answer":"지구의 겉은 여러 개의 판으로 나뉘어 있고 판은 서로 다른 방향으로 움직인다. 판과 판이 만나는 경계에서 충돌·분리·어긋남이 일어나며 큰 힘이 작용해 지진과 화산 활동이 집중되므로, 화산대와 지진대의 분포가 판의 경계와 거의 일치한다.","rubric":"판의 존재와 이동(1점) + 경계에서 상호작용(1점) + 분포 일치 결론(1점). ※경계별 지질 특성은 고교 내용이므로 요구하지 않음."}]}},"m13-10":{"diag":{"from":"초3~4 「소리의 성질」 · 초5~6 「빛의 성질」","items":[{"type":"선택형","q":"소리가 나는 물체의 공통점은?","choices":["① 뜨겁다","② 떨린다","③ 무겁다","④ 빛이 난다"],"answer":"②","checks":"소리와 떨림 [4과07-01]","miscon":"소리를 '공기 그 자체'로 생각하는 경우. 물체의 진동이 원인임을 손으로 만져 확인시킬 것."},{"type":"선택형","q":"물이 담긴 컵에 젓가락을 넣으면 꺾여 보이는 까닭은?","choices":["① 빛의 직진","② 빛의 반사","③ 빛의 굴절","④ 빛의 합성"],"answer":"③","checks":"빛의 굴절 [6과02-02]","miscon":"'물이 젓가락을 휘게 한다'는 오개념. 실제 물체가 아니라 빛의 경로가 꺾이는 것임을 강조."},{"type":"서답형","q":"우리가 물체를 볼 수 있으려면 무엇이 필요한지 쓰고, 그 과정을 간단히 설명하시오.","answer":"빛이 필요하다. 광원에서 나온 빛이 물체에 부딪혀 반사되고, 그 빛이 우리 눈에 들어와야 물체를 볼 수 있다.","checks":"물체를 보는 과정 [6과02-01]","miscon":"'눈에서 무언가 나가서 본다'는 오개념(고대 시각론)이 의외로 흔함. 빛의 방향을 화살표로 그리게 할 것."}]},"form":{"items":[{"level":"하","code":"9과10-01","q":"빛이 공기에서 물로 비스듬히 들어갈 때 나타나는 현상의 이름을 쓰고, 우리 주변의 예를 하나 드시오.","answer":"굴절. 예: 물속 물체가 실제보다 얕아 보임, 젓가락이 꺾여 보임, 렌즈로 상이 생김 등","rubric":"용어와 사례 모두 맞으면 도달. ※굴절 법칙의 정량적 계산은 다루지 않음."},{"level":"중","code":"9과10-03","q":"빨간 사과가 빨갛게 보이는 까닭을 빛의 반사와 관련지어 설명하고, 이 사과에 파란색 빛만 비추면 어떻게 보일지 쓰시오.","answer":"사과 표면이 빨간색 빛은 반사하고 나머지 색의 빛은 흡수하기 때문에 빨갛게 보인다. 파란색 빛만 비추면 반사할 빨간 빛이 없어 대부분 흡수되므로 어둡게(검게) 보인다.","rubric":"반사·흡수로 색 설명(2점) + 파란 빛 조건에서의 예측(1점)."},{"level":"상","code":"9과10-04","q":"두 소리 A와 B를 파형으로 나타냈더니 A가 B보다 진폭은 크고 진동수는 작았다. 두 소리를 들었을 때의 차이를 과학적 용어를 사용하여 설명하시오.","answer":"진폭이 큰 A가 B보다 소리가 크다(세기가 세다). 진동수가 작은 A는 B보다 낮은 소리로 들린다. 즉 A는 크고 낮은 소리, B는 작고 높은 소리이다.","rubric":"진폭-소리 크기 연결(1점) + 진동수-높낮이 연결(1점) + 두 소리를 종합 비교(1점). ※종파·횡파 구분은 요구하지 않음."}]}},"m13-11":{"diag":{"from":"초5~6 「용해와 용액」","items":[{"type":"선택형","q":"물에 소금을 계속 넣으면 어느 순간부터 더 이상 녹지 않는다. 이때 더 녹이려면?","choices":["① 물의 온도를 낮춘다","② 물의 온도를 높인다","③ 그릇을 크게 한다","④ 방법이 없다"],"answer":"②","checks":"온도에 따른 용해량 [6과03-01]","miscon":"'젓기만 하면 계속 녹는다'는 오개념. 저어도 한계가 있고 온도가 핵심 변인임을 실험으로 확인."},{"type":"선택형","q":"같은 양의 물에 설탕을 더 많이 넣은 용액에 대한 설명으로 옳은 것은?","choices":["① 더 진하다","② 더 묽다","③ 진하기가 같다","④ 색이 변한다"],"answer":"①","checks":"용액의 진하기 [6과03-02]","miscon":"진하기를 '색'으로만 판단하는 경우. 무색 용액도 진하기가 다를 수 있음을 짚을 것."},{"type":"서답형","q":"설탕물에서 설탕은 눈에 보이지 않지만 없어진 것이 아니다. 그 근거를 한 가지 쓰시오.","answer":"맛이 달다 / 무게를 재면 녹이기 전과 같다 / 물을 증발시키면 설탕이 다시 나온다 등","checks":"용해 현상의 이해 [6과03-01]","miscon":"'녹으면 소멸한다'는 오개념. 이 단원의 입자 개념 도입에 직결되므로 반드시 교정."}]},"form":{"items":[{"level":"하","code":"9과11-01","q":"다음을 원소와 화합물로 분류하시오.\n산소(O₂), 물(H₂O), 구리(Cu), 이산화 탄소(CO₂), 철(Fe)","answer":"원소: 산소, 구리, 철 / 화합물: 물, 이산화 탄소","rubric":"5개 모두 정확히 분류하면 도달. 한 종류의 원자로만 이루어졌는지를 기준으로 판단했는지 확인."},{"level":"중","code":"9과11-02","q":"원자가 전기적으로 중성인 까닭을 양성자와 전자를 이용해 설명하고, 원소의 종류를 결정하는 것은 무엇인지 쓰시오.","answer":"원자에는 (+)전하를 띤 양성자 수와 (−)전하를 띤 전자 수가 같아서 전체적으로 전기를 띠지 않는다. 원소의 종류는 양성자 수에 따라 결정된다.","rubric":"양성자 수=전자 수로 중성 설명(2점) + 양성자 수가 원소를 결정(1점). ※질량수·동위원소는 다루지 않음."},{"level":"상","code":"9과11-04","q":"나트륨 원자(Na)가 전자 1개를 잃으면 어떤 입자가 되는지 기호로 쓰고, 그 입자가 전하를 띠게 되는 과정을 설명하시오. 또 이 입자가 원자와 어떻게 다른지 한 가지 쓰시오.","answer":"Na⁺(나트륨 이온). 중성인 원자가 (−)전하를 띤 전자 1개를 잃으면 양성자 수가 전자 수보다 1 많아져 (+)전하를 띠게 된다. 원자와 달리 전기를 띠고 있어 전기적 인력·반발력이 작용하며, 수용액에서 전류가 흐르게 할 수 있다.","rubric":"기호 정확(1점) + 전자 잃음→(+)전하 과정 설명(1점) + 원자와의 차이(1점)."}]}},"m13-12":{"diag":{"from":"초3~4 「식물의 생활」·「생물의 한살이」 · 초5~6 「식물의 구조와 기능」","items":[{"type":"선택형","q":"식물이 자라는 데 필요한 조건으로 알맞게 짝지어진 것은?","choices":["① 물과 햇빛","② 물과 소리","③ 햇빛과 바람만","④ 흙만"],"answer":"①","checks":"식물이 자라는 조건 [4과04-02]","miscon":"'흙에서 양분을 다 얻는다'고 생각해 광합성의 필요성을 못 느끼는 경우가 많음."},{"type":"선택형","q":"식물에서 물이 이동하는 통로가 있고, 잎에서 물이 수증기로 빠져나가는 작용은?","choices":["① 광합성","② 증산 작용","③ 소화","④ 발아"],"answer":"②","checks":"증산 작용 [6과11-02]","miscon":"증산과 광합성을 같은 것으로 혼동. 물의 이동/양분 생성으로 역할을 구분시킬 것."},{"type":"서답형","q":"식물의 뿌리, 줄기, 잎이 하는 일을 각각 한 가지씩 쓰시오.","answer":"뿌리: 물과 무기양분 흡수·식물체 고정 / 줄기: 물과 양분의 이동 통로·식물체 지지 / 잎: 광합성으로 양분 생성·증산 작용","checks":"식물 기관의 구조와 기능 [6과11-02]","miscon":"'뿌리가 양분을 만든다'는 오개념. 양분을 만드는 곳은 잎임을 분명히 할 것."}]},"form":{"items":[{"level":"하","code":"9과12-01","q":"광합성에 필요한 물질 두 가지와 생성되는 물질 두 가지를 각각 쓰시오.","answer":"필요: 물, 이산화 탄소 (그리고 빛에너지) / 생성: 포도당, 산소","rubric":"필요 물질 2개, 생성 물질 2개를 모두 맞히면 도달. 빛을 '물질'로 쓰면 감점하지 않되 에너지임을 지도."},{"level":"중","code":"9과12-01","q":"빛의 세기가 광합성에 영향을 주는지 알아보는 실험을 설계하려 한다. 이때 다르게 해야 할 조건과 같게 해야 할 조건을 각각 쓰시오.","answer":"다르게: 빛의 세기(전등의 거리 또는 개수) / 같게: 온도, 이산화 탄소 농도(탄산수소나트륨 양), 물의 양, 검정말의 종류와 양, 시간 등","rubric":"조작 변인 정확(1점) + 통제 변인 3가지 이상(2점). 변인 통제 개념이 핵심."},{"level":"상","code":"9과12-02","q":"식물은 낮에도 밤에도 호흡을 한다. 그런데 낮에는 식물이 이산화 탄소를 흡수하는 것처럼 보인다. 그 까닭을 광합성과 호흡의 관계로 설명하시오.","answer":"낮에는 광합성과 호흡이 함께 일어나는데 광합성량이 호흡량보다 훨씬 많다. 따라서 호흡으로 내보내는 이산화 탄소보다 광합성으로 흡수하는 양이 더 많아, 겉으로는 이산화 탄소를 흡수하고 산소를 방출하는 것처럼 보인다. 밤에는 광합성을 하지 않아 호흡만 일어나므로 이산화 탄소를 내보낸다.","rubric":"낮에 두 작용이 동시에 일어남(1점) + 양의 비교(1점) + 밤과의 대조(1점). '낮에는 광합성만 한다'고 쓰면 미도달."}]}},"m13-13":{"diag":{"from":"초3~4 「동물의 생활」 · 초5~6 「우리 몸의 구조와 기능」","items":[{"type":"선택형","q":"우리가 먹은 음식물이 지나가는 순서로 옳은 것은?","choices":["① 입-위-식도-작은창자-큰창자","② 입-식도-위-작은창자-큰창자","③ 입-식도-작은창자-위-큰창자","④ 입-위-작은창자-식도-큰창자"],"answer":"②","checks":"소화 기관의 구조 [6과04-02]","miscon":"식도와 위의 순서를 뒤바꾸는 경우가 흔함. 기관 모형으로 위치를 확인시킬 것."},{"type":"선택형","q":"몸에 산소를 받아들이고 이산화 탄소를 내보내는 기관은?","choices":["① 심장","② 폐","③ 콩팥","④ 위"],"answer":"②","checks":"호흡 기관의 기능 [6과04-02]","miscon":"심장이 산소를 '만든다'고 생각하는 경우. 심장은 운반, 폐는 교환임을 구분."},{"type":"서답형","q":"운동을 하면 숨이 가빠지고 심장이 빨리 뛰는 까닭을 쓰시오.","answer":"운동할 때 근육에서 에너지가 많이 필요해 산소가 더 많이 쓰이고 이산화 탄소가 많이 생기므로, 산소를 더 빨리 공급하고 이산화 탄소를 내보내기 위해 호흡과 심장 박동이 빨라진다.","checks":"기관의 상호 관련성 [6과04-02]","miscon":"'힘들어서'라는 감각적 답에 머무는 경우. 산소 요구량 증가로 연결시킬 것."}]},"form":{"items":[{"level":"하","code":"9과13-01","q":"다음 소화 효소가 분해하는 영양소를 각각 쓰시오.\n아밀레이스, 펩신, 라이페이스","answer":"아밀레이스: 녹말(탄수화물), 펩신: 단백질, 라이페이스: 지방","rubric":"3개 모두 맞히면 도달. ※대표 효소 중심으로만 다룸."},{"level":"중","code":"9과13-02","q":"혈액이 온몸을 도는 경로 중 <b>폐순환<\/b>의 경로를 순서대로 쓰고, 폐순환의 역할을 설명하시오.","answer":"우심실 → 폐동맥 → 폐 → 폐정맥 → 좌심방. 폐에서 이산화 탄소를 내보내고 산소를 받아들여 정맥혈을 동맥혈로 바꾸는 역할을 한다.","rubric":"경로 정확(2점) + 기체 교환 역할(1점). 폐동맥에 정맥혈이 흐른다는 점을 함께 지도."},{"level":"상","code":"9과13-05","q":"우리가 밥을 먹고 몸을 움직일 수 있게 되기까지, 소화계·순환계·호흡계·배설계가 어떻게 협력하는지 세포호흡을 중심으로 설명하시오.","answer":"소화계가 음식물을 포도당 등으로 분해해 흡수하고, 호흡계가 산소를 받아들인다. 순환계가 이 둘을 온몸의 세포로 운반하면 세포에서 세포호흡이 일어나 에너지를 얻는다. 이때 생긴 이산화 탄소는 순환계를 통해 호흡계로, 물·요소 등 노폐물은 배설계로 보내져 몸 밖으로 나간다.","rubric":"네 기관계의 역할을 모두 언급(2점) + 세포호흡을 중심으로 물질의 흐름을 연결(2점). 나열만 하고 연결이 없으면 2점."}]}},"m13-14":{"diag":{"from":"초3~4 「자석의 이용」 · 초5~6 「전기의 이용」","items":[{"type":"선택형","q":"전구에 불이 켜지는 전기 회로의 조건으로 옳은 것은?","choices":["① 전지, 전선, 전구가 끊긴 곳 없이 연결되어야 한다","② 전지만 있으면 된다","③ 전선이 길수록 잘 켜진다","④ 전구 두 개는 켤 수 없다"],"answer":"①","checks":"전기 회로의 특징 [6과15-01]","miscon":"회로가 '한 바퀴 닫힌 길'이어야 함을 놓치는 경우. 끊어진 회로로 직접 확인시킬 것."},{"type":"선택형","q":"전지 두 개를 직렬로 연결하면 전구의 밝기는 전지 한 개일 때와 비교해 어떻게 되는가?","choices":["① 어두워진다","② 밝아진다","③ 같다","④ 꺼진다"],"answer":"②","checks":"전지의 직렬연결 [6과15-02]","miscon":"직렬과 병렬을 뒤바꾸는 경우. 이 단원의 저항 연결로 이어지므로 명확히 정리."},{"type":"서답형","q":"전자석이 영구 자석과 다른 점을 한 가지 쓰시오.","answer":"전류가 흐를 때만 자석의 성질을 띠며, 전류의 세기나 방향을 바꾸어 자석의 세기와 극을 조절할 수 있다.","checks":"전자석의 성질 [6과15-03]","miscon":"전자석도 항상 자석이라고 생각하는 경우. 스위치를 껐을 때를 관찰시킬 것."}]},"form":{"items":[{"level":"하","code":"9과14-02","q":"어떤 전기 회로에 6V의 전압을 걸었더니 2A의 전류가 흘렀다. 이 저항의 크기를 구하시오.","answer":"R = V/I = 6V ÷ 2A = 3Ω","rubric":"옴의 법칙을 적용해 3Ω을 구하면 도달. 식을 쓰지 않고 답만 맞아도 인정."},{"level":"중","code":"9과14-01","q":"머리를 빗은 플라스틱 빗을 잘게 자른 종이 조각에 가까이 하면 종이가 달라붙는다. 이 현상을 마찰 전기와 원자 모형을 이용하여 설명하시오.","answer":"빗과 머리카락을 마찰하면 전자가 한쪽으로 이동해 빗이 전하를 띠게 된다(대전). 대전된 빗을 종이에 가까이 하면 종이 속에서 전하가 재배치되어(정전기 유도) 빗과 가까운 쪽에 반대 전하가 모이므로 서로 끌어당기는 전기력이 작용해 달라붙는다.","rubric":"마찰에 의한 전자 이동·대전(1점) + 정전기 유도로 전하 재배치(1점) + 인력 작용 결론(1점)."},{"level":"상","code":"9과14-03","q":"집에서 여러 전기 기구를 <b>병렬<\/b>로 연결하는 까닭을 직렬연결과 비교하여 두 가지 설명하시오.","answer":"①병렬에서는 각 기구에 같은 전압이 걸려 정상적으로 작동하지만, 직렬이면 전압이 나뉘어 제 성능을 내지 못한다. ②병렬은 한 기구를 끄거나 고장 나도 다른 기구가 계속 작동하지만, 직렬은 하나가 끊기면 전체가 꺼진다.","rubric":"두 가지 이유를 직렬과 비교해 서술(각 1.5점). ※합성 저항의 정량 계산은 요구하지 않음."}]}},"m13-15":{"diag":{"from":"초3~4 「밤하늘 관찰」 · 초5~6 「지구의 운동」","items":[{"type":"선택형","q":"'별'에 대한 설명으로 옳은 것은?","choices":["① 스스로 빛을 내는 천체","② 행성 둘레를 도는 천체","③ 태양 빛을 반사해 빛나는 천체","④ 밤에 보이는 모든 천체"],"answer":"①","checks":"별의 정의 [4과13-03]","miscon":"금성·목성 같은 행성을 별로 부르는 일상 어법 때문에 혼동. 스스로 빛을 내는지로 구분시킬 것."},{"type":"선택형","q":"밤하늘의 별이 하루 동안 동에서 서로 움직이는 것처럼 보이는 까닭은?","choices":["① 별이 실제로 이동해서","② 지구가 자전해서","③ 지구가 공전해서","④ 달이 움직여서"],"answer":"②","checks":"천체의 일주 운동 [6과12-01]","miscon":"별이 실제 움직인다고 생각하는 경우. 관측자가 도는 상대 운동임을 회전의자 등으로 체험."},{"type":"서답형","q":"북극성이 다른 별과 달리 거의 움직이지 않는 것처럼 보이는 까닭을 쓰시오.","answer":"북극성이 지구 자전축의 연장선 방향에 거의 위치해 있어서, 지구가 자전해도 위치가 거의 변하지 않는 것처럼 보인다.","checks":"북극성 주변 별자리 관찰 [4과13-03]","miscon":"'북극성이 가장 밝아서'라는 오답. 밝기가 아니라 위치(자전축 방향) 때문임을 설명."}]},"form":{"items":[{"level":"하","code":"9과15-01","q":"별의 색이 붉은색에서 파란색으로 갈수록 표면 온도는 어떻게 변하는지 쓰시오.","answer":"표면 온도가 높아진다(붉은색이 저온, 파란색이 고온).","rubric":"온도가 높아진다고 답하면 도달. ※색으로 비교하는 수준까지만 다룸."},{"level":"중","code":"9과15-01","q":"연주시차가 클수록 별까지의 거리는 어떻게 되는지 쓰고, 연주시차를 측정하려면 왜 6개월 간격으로 관측해야 하는지 설명하시오.","answer":"연주시차가 클수록 거리가 가깝다(반비례). 지구가 공전하므로 6개월 간격으로 관측하면 지구가 궤도의 반대편에 위치해 시차가 가장 크게 나타나기 때문이다.","rubric":"반비례 관계(1점) + 지구 공전과 6개월 간격의 이유(2점). ※수식은 요구하지 않음."},{"level":"상","code":"9과15-03","q":"풍선 표면에 스티커를 여러 개 붙이고 풍선을 불면서 스티커 사이의 거리를 관찰하는 실험을 하였다. 이 실험이 우주 팽창의 어떤 점을 설명해 주는지 서술하시오.","answer":"풍선이 부풀면 모든 스티커가 서로 멀어지고, 멀리 있는 스티커일수록 더 빨리 멀어진다. 이는 우주가 팽창할 때 특별한 중심이 있는 것이 아니라 어느 은하에서 보아도 다른 은하들이 멀어지며, 멀리 있는 은하일수록 빠르게 멀어짐을 뜻한다.","rubric":"모든 지점이 서로 멀어짐(1점) + 팽창의 중심이 따로 없음(1점) + 거리와 후퇴 속도의 관계(1점). ※적색 편이·허블 법칙은 요구하지 않음."}]}},"m13-16":{"diag":{"from":"초3~4 「물체와 물질」 · 초5~6 「산과 염기」·「물질의 연소」","items":[{"type":"선택형","q":"다음 중 물질의 성질이 <b>달라지는<\/b> 변화는?","choices":["① 종이를 접는다","② 얼음이 녹는다","③ 나무가 탄다","④ 설탕이 물에 녹는다"],"answer":"③","checks":"성질이 변하는 변화 [6과14-01]","miscon":"'모양이 변하면 다른 물질'이라고 보는 경우. 성질(연소 후 재·기체)로 판단하게 할 것."},{"type":"선택형","q":"물질이 타기 위해 필요한 세 가지 조건은?","choices":["① 탈 물질, 산소, 발화점 이상의 온도","② 탈 물질, 물, 빛","③ 산소, 이산화 탄소, 열","④ 탈 물질, 이산화 탄소, 온도"],"answer":"①","checks":"연소의 조건 [6과14-02]","miscon":"이산화 탄소가 연소를 돕는다고 오해하는 경우. 소화기 원리와 연결해 정리."},{"type":"서답형","q":"산성 용액과 염기성 용액을 섞으면 어떻게 되는지 쓰고, 그렇게 판단한 근거를 쓰시오.","answer":"서로의 성질이 약해진다(중화). 지시약의 색 변화로 확인할 수 있는데, 예를 들어 산성 용액에 염기성 용액을 계속 넣으면 붉은색 리트머스가 푸르게 변하는 등 성질이 반대로 바뀐다.","checks":"산·염기 혼합 [6과09-02]","miscon":"'섞으면 더 세진다'는 오개념. 지시약 실험 데이터로 확인시킬 것."}]},"form":{"items":[{"level":"하","code":"9과16-02","q":"다음 화학 반응식의 계수를 맞추시오.\n( )H₂ + ( )O₂ → ( )H₂O","answer":"2H₂ + O₂ → 2H₂O","rubric":"계수 2, 1, 2를 정확히 맞히면 도달. 원자의 종류와 개수가 양쪽에서 같은지 확인했는지 점검."},{"level":"중","code":"9과16-03","q":"밀폐된 용기에서 나무를 태우면 질량이 변하지 않는데, 열린 곳에서 태우면 질량이 줄어든다. 그 까닭을 질량 보존 법칙으로 설명하시오.","answer":"화학 반응에서는 원자의 배열만 바뀔 뿐 종류와 개수가 변하지 않으므로 질량은 보존된다. 열린 곳에서는 생성된 이산화 탄소·수증기가 공기 중으로 날아가 측정에서 빠지므로 줄어든 것처럼 보일 뿐, 빠져나간 기체까지 포함하면 질량은 같다.","rubric":"원자의 종류·개수 불변(1점) + 기체가 빠져나감(1점) + 전체로 보면 보존됨(1점)."},{"level":"상","code":"9과16-06","q":"손난로는 흔들면 따뜻해지고, 냉찜질 팩은 주무르면 차가워진다. 두 현상을 화학 반응에서의 열에너지 출입으로 구분하여 설명하고, 각각을 무엇이라 하는지 쓰시오.","answer":"손난로는 화학 반응이 일어나면서 열에너지를 주위로 방출하여 주변 온도가 올라간다(발열 반응). 냉찜질 팩은 반응이 일어나며 주위에서 열에너지를 흡수하여 주변 온도가 내려간다(흡열 반응).","rubric":"방출/흡수 구분(2점) + 발열 반응·흡열 반응 용어(1점)."}]}},"m13-17":{"diag":{"from":"초3~4 「지구와 바다」·「기후변화와 우리 생활」 · 초5~6 「날씨와 우리 생활」","items":[{"type":"선택형","q":"이슬, 안개, 구름의 공통점으로 옳은 것은?","choices":["① 공기 중 수증기가 응결해 생긴다","② 얼음 알갱이만으로 이루어진다","③ 땅속에서 올라온다","④ 바람이 불어야만 생긴다"],"answer":"①","checks":"이슬·안개·구름의 공통점 [6과06-02]","miscon":"구름을 '수증기 덩어리'로 보는 오개념이 매우 흔함. 수증기는 눈에 보이지 않으며 응결한 물방울이 보이는 것임을 강조."},{"type":"선택형","q":"보통 고기압의 중심 부근에서 나타나는 날씨는?","choices":["① 맑음","② 비","③ 눈","④ 태풍"],"answer":"①","checks":"고기압·저기압과 날씨 [6과06-03]","miscon":"고기압/저기압을 '기온이 높다/낮다'로 오해. 공기의 하강·상승과 연결시킬 것."},{"type":"서답형","q":"날씨를 나타내는 기상 요소를 세 가지 쓰시오.","answer":"기온, 습도, 바람(풍향·풍속), 강수량, 구름의 양, 기압 등 중 세 가지","checks":"기상 요소 [6과06-01]","miscon":"'맑음/흐림'만 날씨로 아는 경우. 측정 가능한 요소로 확장시킬 것."}]},"form":{"items":[{"level":"하","code":"9과17-01","q":"지구 대기권을 높이에 따라 4개 권역으로 구분하여 지표면에서부터 순서대로 쓰시오.","answer":"대류권 → 성층권 → 중간권 → 열권","rubric":"4개 순서를 모두 맞히면 도달."},{"level":"중","code":"9과17-03","q":"공기가 상승하면 구름이 잘 만들어지는 까닭을 단열 팽창과 응결을 이용해 설명하시오.","answer":"공기가 상승하면 주변 기압이 낮아져 부피가 커지면서(단열 팽창) 기온이 내려간다. 기온이 이슬점 아래로 내려가면 공기 중 수증기가 응결하여 작은 물방울이나 얼음 알갱이가 되고, 이것이 모여 구름이 된다.","rubric":"기압 하강→단열 팽창→기온 하강(2점) + 이슬점 도달 후 응결(1점)."},{"level":"상","code":"9과17-01","q":"온실효과가 있어야 지구에 생물이 살 수 있는데도 지구온난화는 문제가 된다. 이 두 가지를 복사 평형의 관점에서 구분하여 설명하시오.","answer":"지구는 흡수하는 태양 복사 에너지와 방출하는 지구 복사 에너지가 균형을 이루어 평균 기온을 유지한다(복사 평형). 온실기체는 지구 복사의 일부를 흡수·재방출해 지표를 따뜻하게 유지하므로 생물이 살 수 있다. 그러나 온실기체가 급격히 늘면 방출되는 에너지가 줄어 더 높은 온도에서 새로운 복사 평형에 도달하게 되고, 그 결과 평균 기온이 상승하는 지구온난화가 일어난다.","rubric":"복사 평형의 의미(1점) + 온실효과의 이로운 역할(1점) + 온실기체 증가로 평형 온도가 높아짐(2점)."}]}},"m13-18":{"diag":{"from":"초3~4 「지구와 바다」 · 초5~6 「날씨와 우리 생활」","items":[{"type":"선택형","q":"바닷물이 육지의 물과 다른 가장 큰 특징은?","choices":["① 짠맛이 난다(소금 등이 녹아 있다)","② 얼지 않는다","③ 색이 파랗다","④ 증발하지 않는다"],"answer":"①","checks":"바닷물의 특징 [4과06-02]","miscon":"바다가 파란 이유를 '물이 파래서'로 아는 경우. 이 문항의 초점은 염분임을 분명히 할 것."},{"type":"선택형","q":"밀물과 썰물에 대한 설명으로 옳은 것은?","choices":["① 바닷물이 육지로 밀려오는 것이 밀물이다","② 밀물과 썰물은 하루에 한 번만 일어난다","③ 갯벌은 밀물 때 드러난다","④ 밀물과 썰물은 바람 때문에 생긴다"],"answer":"①","checks":"밀물과 썰물 [4과06-03]","miscon":"갯벌이 드러나는 때(썰물)를 헷갈리는 경우가 많음."},{"type":"서답형","q":"지구에 있는 물 중 우리가 바로 마실 수 있는 물이 적은 까닭을 쓰시오.","answer":"지구 물의 대부분은 염분이 많은 바닷물이고, 담수 중에서도 상당량이 빙하나 지하 깊은 곳에 있어 바로 이용하기 어렵기 때문이다.","checks":"물의 가치 [4과06-01 연계]","miscon":"'물은 무한하다'는 인식. 수자원 분포 비율을 자료로 제시할 것."}]},"form":{"items":[{"level":"하","code":"9과18-01","q":"수권을 이루는 물을 많은 것부터 순서대로 쓰시오. (해수, 빙하, 지하수·강물 등)","answer":"해수 → 빙하 → 지하수 → 강물·호수","rubric":"해수가 가장 많고 빙하가 담수 중 가장 많다는 순서를 맞히면 도달."},{"level":"중","code":"9과18-02","q":"우리나라 주변 바다의 표층 수온은 여름과 겨울 중 언제 더 높은지 쓰고, 깊이에 따른 수온 분포가 여름에 어떤 특징을 보이는지 설명하시오.","answer":"여름에 표층 수온이 더 높다. 여름에는 태양 복사 에너지를 많이 받아 표층만 크게 데워지므로 표층과 깊은 곳의 수온 차가 커지고, 수온이 급격히 낮아지는 층이 뚜렷하게 나타난다.","rubric":"여름이 높음(1점) + 표층 가열로 수온 차 커짐(2점). ※우리나라 주변 해역 중심으로 다룸."},{"level":"상","code":"9과18-03","q":"해류가 기후에 영향을 미치는 예를 하나 들고, 대기 대순환과 표층 해류의 관계를 함께 설명하시오.","answer":"예) 난류가 흐르는 지역은 같은 위도의 다른 지역보다 겨울이 온화하다. 표층 해류는 대기 대순환에 의해 지속적으로 부는 바람의 영향으로 형성되며, 저위도의 남는 열에너지를 고위도로 운반해 지구 전체의 에너지를 재분배함으로써 기후에 영향을 준다.","rubric":"구체적 사례(1점) + 바람이 표층 해류를 만듦(1점) + 에너지 재분배 역할(1점)."}]}},"m13-19":{"diag":{"from":"초5~6 「물체의 운동」","items":[{"type":"선택형","q":"100m를 20초에 달린 사람의 속력은?","choices":["① 2 m/s","② 5 m/s","③ 20 m/s","④ 2000 m/s"],"answer":"②","checks":"속력 구하기 [6과10-02]","miscon":"거리÷시간을 뒤집어 시간÷거리로 계산하는 실수가 흔함."},{"type":"선택형","q":"운동하는 물체를 나타낸 설명으로 옳은 것은?","choices":["① 시간에 따라 위치가 변한다","② 시간에 따라 무게가 변한다","③ 항상 빠르기가 일정하다","④ 힘이 있어야만 움직인다"],"answer":"①","checks":"운동의 의미 [6과10-01]","miscon":"'힘이 계속 작용해야 움직인다'는 오개념(아리스토텔레스적 관성 오개념). 이 단원에서 반드시 다룰 것."},{"type":"서답형","q":"자동차의 속력이 빠를수록 위험한 까닭을 안전과 관련지어 한 가지 쓰시오.","answer":"속력이 빠를수록 멈추는 데 필요한 거리가 길어지고 충돌 시 충격이 커져 피해가 크기 때문이다.","checks":"속력과 안전 [6과10-03]","miscon":"'빨리 가면 무서워서'라는 감각적 답. 제동 거리·충격량 개념으로 유도."}]},"form":{"items":[{"level":"하","code":"9과19-01","q":"시간-이동 거리 그래프에서 기울기가 <b>일정한<\/b> 직선으로 나타나는 운동은 어떤 운동인지 쓰고, 기울기가 뜻하는 것은 무엇인지 쓰시오.","answer":"등속 운동(속력이 일정한 운동). 기울기는 속력을 뜻한다.","rubric":"운동의 이름과 기울기의 의미를 모두 맞히면 도달."},{"level":"중","code":"9과19-02","q":"공을 가만히 놓아 떨어뜨렸을 때, 질량이 서로 다른 두 공의 낙하 운동을 비교하여 설명하시오. (공기 저항은 무시)","answer":"질량과 관계없이 두 공의 시간에 따른 속력 변화가 같다. 자유 낙하하는 물체는 1초마다 속력이 약 9.8 m/s씩 일정하게 증가하므로, 같은 높이에서 동시에 놓으면 동시에 떨어진다.","rubric":"질량 무관(1점) + 속력 변화가 일정(9.8 m/s씩)(1점) + 동시에 도달(1점). '무거운 것이 빨리 떨어진다'는 오개념 교정이 핵심."},{"level":"상","code":"9과19-04","q":"롤러코스터가 가장 높은 지점에서 출발해 가장 낮은 지점을 지날 때, 위치 에너지와 운동 에너지가 어떻게 변하는지 설명하고, 가장 낮은 지점에서 속력이 가장 빠른 까닭을 역학적 에너지 보존으로 설명하시오.","answer":"내려오는 동안 높이가 낮아져 위치 에너지가 줄고, 줄어든 만큼 운동 에너지로 전환되어 운동 에너지가 커진다. 마찰과 공기 저항을 무시하면 위치 에너지와 운동 에너지의 합인 역학적 에너지는 일정하게 보존되므로, 위치 에너지가 가장 작은 최저점에서 운동 에너지가 최대가 되어 속력이 가장 빠르다.","rubric":"위치→운동 에너지 전환(1점) + 역학적 에너지 보존 언급(1점) + 최저점에서 운동 에너지 최대 결론(1점)."}]}},"m13-20":{"diag":{"from":"초5~6 「우리 몸의 구조와 기능」","items":[{"type":"선택형","q":"우리 몸이 움직일 수 있는 것은 무엇의 작용 때문인가?","choices":["① 뼈와 근육","② 위와 창자","③ 폐와 심장","④ 콩팥과 방광"],"answer":"①","checks":"뼈와 근육의 작용 [6과04-01]","miscon":"근육이 늘어나면서 뼈를 민다고 생각하는 경우. 근육은 수축만 한다는 점을 모형으로 확인."},{"type":"선택형","q":"몸속 노폐물을 걸러 오줌으로 내보내는 기관은?","choices":["① 간","② 콩팥","③ 위","④ 폐"],"answer":"②","checks":"배설 기관 [6과04-02]","miscon":"방광을 '거르는 기관'으로 아는 경우. 콩팥=여과, 방광=저장으로 구분."},{"type":"서답형","q":"우리 몸의 여러 기관이 서로 관련되어 있다는 것을 보여주는 예를 하나 들어 설명하시오.","answer":"예) 운동할 때 근육이 에너지를 많이 쓰면 호흡이 빨라져 산소를 더 들이마시고, 심장이 빨리 뛰어 혈액이 산소와 양분을 근육으로 빠르게 운반한다.","checks":"기관의 상호 관련성 [6과04-02]","miscon":"기관을 각각 독립적으로만 외우는 경우. 상황 중심으로 연결시킬 것."}]},"form":{"items":[{"level":"하","code":"9과20-01","q":"다음 자극을 받아들이는 감각 기관을 각각 쓰시오.\n빛, 소리, 냄새, 맛","answer":"빛-눈, 소리-귀, 냄새-코, 맛-혀","rubric":"4개 모두 맞히면 도달. ※감각 기관의 세부 구조는 간단히만 다룸."},{"level":"중","code":"9과20-02","q":"뜨거운 물체에 손이 닿았을 때 자신도 모르게 손을 떼는 반응의 경로를 순서대로 쓰고, 이 반응이 의식적인 반응보다 빠른 까닭을 설명하시오.","answer":"자극 → 감각 신경 → 척수 → 운동 신경 → 반응(근육). 신호가 뇌를 거치지 않고 척수에서 바로 명령이 내려지므로 전달 경로가 짧아 더 빠르다.","rubric":"경로 정확(2점) + 뇌를 거치지 않아 빠름(1점)."},{"level":"상","code":"9과20-03","q":"식사 후 혈당량이 높아졌을 때 우리 몸이 어떻게 정상 상태로 되돌리는지 호르몬을 이용해 설명하고, 이러한 조절을 무엇이라 하는지 쓰시오.","answer":"혈당량이 높아지면 이자에서 인슐린이 분비되어 포도당을 세포로 흡수시키고 간에서 글리코젠으로 저장하게 하여 혈당량을 낮춘다. 반대로 혈당량이 낮아지면 글루카곤이 분비되어 혈당량을 높인다. 이처럼 몸의 상태를 일정하게 유지하는 것을 항상성이라 한다.","rubric":"인슐린의 작용(1점) + 글루카곤과의 대비(1점) + 항상성 용어(1점). ※호르몬은 대표적인 것만 다룸."}]}},"m13-21":{"diag":{"from":"초3~4 「동물의 생활」·「생물의 한살이」","items":[{"type":"선택형","q":"배추흰나비의 한살이 순서로 옳은 것은?","choices":["① 알-애벌레-번데기-어른벌레","② 알-번데기-애벌레-어른벌레","③ 애벌레-알-번데기-어른벌레","④ 알-애벌레-어른벌레-번데기"],"answer":"①","checks":"동물의 한살이 [4과04-01]","miscon":"번데기와 애벌레 순서를 바꾸는 경우. 완전탈바꿈/불완전탈바꿈의 차이도 함께 정리."},{"type":"선택형","q":"부모와 자식의 생김새가 닮는 까닭과 가장 관련이 깊은 것은?","choices":["① 같은 음식을 먹어서","② 부모에게서 형질이 전달되어서","③ 같은 집에 살아서","④ 우연히"],"answer":"②","checks":"한살이와 형질 전달 [4과04-03 연계]","miscon":"환경(음식·생활)이 닮음의 주원인이라고 보는 경우. 유전과 환경을 구분시킬 것."},{"type":"서답형","q":"생물이 자손을 남기는 것이 왜 중요한지 한 문장으로 쓰시오.","answer":"자손을 남겨야 그 종이 끊기지 않고 계속 이어질 수 있기 때문이다.","checks":"생명의 연속성 [4과04-03]","miscon":"개체 수 증가로만 이해하는 경우. 종의 유지·연속성 관점으로 확장."}]},"form":{"items":[{"level":"하","code":"9과21-02","q":"체세포분열과 생식세포 형성 과정에서, 분열 후 만들어진 딸세포의 염색체 수를 모세포와 비교하여 각각 쓰시오.","answer":"체세포분열: 모세포와 같다 / 생식세포 형성: 모세포의 절반이다","rubric":"두 가지 모두 맞히면 도달."},{"level":"중","code":"9과21-01","q":"생물이 자랄 때 세포가 무한히 커지지 않고 분열하는 까닭을 세포의 표면적과 부피의 관계로 설명하시오.","answer":"세포가 커지면 부피는 세제곱으로, 표면적은 제곱으로 늘어나 부피에 비해 표면적의 비율이 작아진다. 그러면 세포막을 통한 물질 교환이 세포 전체를 감당하기 어려워지므로, 일정 크기가 되면 분열해 작은 세포 여러 개가 되는 것이 물질 교환에 유리하다.","rubric":"부피 증가가 표면적 증가보다 빠름(2점) + 물질 교환 효율과 연결(1점)."},{"level":"상","code":"9과21-05","q":"어떤 가족에서 부모는 모두 귓불이 분리형인데 자녀 중 한 명이 부착형이다. 분리형이 우성이라 할 때 부모의 유전자형을 쓰고, 그렇게 판단한 근거를 설명하시오.","answer":"부모 모두 Aa(이형 접합). 자녀가 열성 형질인 부착형(aa)이 나오려면 부모 각각에게서 a를 하나씩 받아야 하는데, 부모는 겉으로 분리형(우성)이므로 A를 가지면서 a도 가진 Aa여야 한다.","rubric":"부모 유전자형 Aa 제시(1점) + 자녀가 aa임을 근거로 역추적(2점). 가계도로 표현해도 인정."}]}},"m13-22":{"diag":{"from":"초3~4 「감염병과 건강한 생활」·「기후변화와 우리 생활」","items":[{"type":"선택형","q":"감염병 예방을 위한 생활 습관으로 알맞지 <b>않은<\/b> 것은?","choices":["① 손을 자주 씻는다","② 기침할 때 옷소매로 가린다","③ 아플 때 사람 많은 곳에 간다","④ 예방 접종을 받는다"],"answer":"③","checks":"감염병 예방 수칙 [4과08-03]","miscon":"감염병을 '운'의 문제로 여기는 경우. 전파 경로를 끊는 행동임을 설명."},{"type":"선택형","q":"기후변화로 인해 늘어날 것으로 예상되는 재해가 <b>아닌<\/b> 것은?","choices":["① 폭염","② 집중호우","③ 가뭄","④ 일식"],"answer":"④","checks":"기후변화의 영향 [4과16-02]","miscon":"천문 현상과 기상 재해를 구분하지 못하는 경우."},{"type":"서답형","q":"지진이 일어났을 때 실내에서 취해야 할 행동을 순서대로 두 가지 쓰시오.","answer":"①책상 아래로 들어가 머리를 보호하고 흔들림이 멈출 때까지 기다린다 ②흔들림이 멈추면 계단을 이용해 건물 밖 넓은 곳으로 대피한다","checks":"화산·지진 대처 [4과11-04]","miscon":"엘리베이터로 대피하려는 경우가 많음. 반드시 계단 이용을 강조."}]},"form":{"items":[{"level":"하","code":"9과22-01","q":"다음 재해·재난을 자연 재해와 사회 재난으로 구분하시오.\n지진, 화학물질 유출, 태풍, 운송 수단 사고","answer":"자연 재해: 지진, 태풍 / 사회 재난: 화학물질 유출, 운송 수단 사고","rubric":"4개를 모두 정확히 구분하면 도달."},{"level":"중","code":"9과22-01","q":"화학물질이 유출되는 사고가 일어났을 때 피해가 커지는 까닭을 과학적으로 두 가지 분석하시오.","answer":"①유출된 물질이 기체이면 확산에 의해 빠르게 퍼져 넓은 지역이 오염된다 ②바람의 방향과 세기에 따라 예상보다 멀리 이동하며, 물질에 따라 독성·부식성이 있어 짧은 시간 노출로도 인체에 해를 준다","rubric":"확산·바람 등 과학적 원리를 사용해 2가지 분석(각 1.5점). 단순히 '위험해서'는 미도달."},{"level":"상","code":"9과22-02","q":"우리 지역에서 일어날 가능성이 있는 재해·재난을 하나 골라, 과학적 원리를 이용한 <b>사전 예방·대비<\/b> 방안과 <b>사후 대처<\/b> 방안을 각각 제안하시오.","answer":"예) 지진 - 사전: 내진 설계 보강, 가구 고정, 지진 조기 경보 시스템 활용(P파가 S파보다 빨리 도달하는 원리) / 사후: 계단으로 넓은 곳 대피, 가스·전기 차단, 여진 대비","rubric":"재해 선정(1점) + 사전 방안에 과학적 원리 포함(1.5점) + 사후 대처(1.5점). 사후 대처만 쓰면 절반."}]}},"m13-23":{"diag":{"from":"초5~6 「과학과 나의 진로」","items":[{"type":"선택형","q":"과학과 관련된 직업에 대한 설명으로 옳은 것은?","choices":["① 연구원만 과학과 관련된다","② 요리사, 운동선수 등 다양한 직업에도 과학이 쓰인다","③ 과학은 학교에서만 필요하다","④ 과학기술이 발달해도 직업은 변하지 않는다"],"answer":"②","checks":"다양한 진로와 과학 [6과16-02]","miscon":"과학=연구직이라는 좁은 인식. 여러 직업 속 과학 활용 사례를 제시할 것."},{"type":"선택형","q":"미래 사회의 문제를 해결하는 데 과학이 기여할 수 있는 예로 알맞은 것은?","choices":["① 신재생 에너지 개발","② 문제를 무시하기","③ 자원을 더 빨리 소비하기","④ 조사하지 않기"],"answer":"①","checks":"과학의 기여 [6과16-01]","miscon":"과학을 문제의 원인으로만 보는 시각. 양면성을 다루되 해결 기여도 인식시킬 것."},{"type":"서답형","q":"자신의 관심 분야와 과학이 어떻게 연결되는지 한 문장으로 쓰시오.","answer":"예) 요리에 관심이 있는데, 재료가 익는 과정은 화학 변화이고 온도 조절은 열의 이동과 관련이 있다.","checks":"진로와 과학의 연결 [6과16-02]","miscon":"연결을 찾지 못하면 진로 흥미 자체를 조사하는 데서 출발시킬 것."}]},"form":{"items":[{"level":"하","code":"9과23-01","q":"과학기술의 발달로 <b>새로 생겨날<\/b> 직업과 <b>줄어들<\/b> 직업을 각각 하나씩 예상하여 쓰시오.","answer":"예) 새로 생김: 인공지능 윤리 전문가, 우주 자원 개발자, 데이터 과학자 / 줄어듦: 단순 반복 조립 작업원, 단순 계산 업무 등","rubric":"두 가지를 모두 제시하고 과학기술 발달과 연결되면 도달."},{"level":"중","code":"9과23-01","q":"과학과 직접 관련이 없어 보이는 직업 하나를 골라, 그 직업에서 어떤 과학 지식이 필요한지 구체적으로 설명하시오.","answer":"예) 미용사 - 파마·염색은 모발 단백질의 화학 변화를 이용하며, 약품의 산성·염기성 정도에 따라 두피 손상이 달라지므로 화학 지식이 필요하다.","rubric":"직업 선정(1점) + 필요한 과학 지식을 구체적으로 연결(2점). '과학이 조금 필요하다' 수준은 1점."},{"level":"상","code":"9과23-02","q":"자신의 진로와 관련 있는 과학 분야를 밝히고, 고등학교에서 어떤 과학 과목을 선택해 어떻게 공부할지 계획을 세워 서술하시오.","answer":"예) 의료 분야에 관심 → 생명과학, 화학이 핵심. 고2에 생명과학·화학을 이수하고, 고3에 세포와 물질대사·생물의 유전을 선택해 심화한다. 세포호흡·유전 단원은 중학교 「동물과 에너지」·「생식과 유전」에서 배운 내용을 바탕으로 연결해 공부한다.","rubric":"진로-과학 분야 연결(1점) + 구체적 과목 선택(1점) + 학습 계획의 타당성(1점). 지도 앱의 '진로 연계' 칩을 함께 활용하게 할 것."}]}}},"levels":{"m13-01":{"codes":{"9과01-01":{"A":"일상생활의 문제를 인식하여 탐구 문제를 발견하고 과학적 탐구 방법으로 지속적인 탐구를 수행하여 결론을 도출하며, 과학적인 해결 방안을 제안할 수 있다.","B":"일상생활의 문제를 인식하여 탐구 문제를 발견하고 과학적 탐구 방법으로 지속적인 탐구를 수행하여 결론을 도출하며, 과학적인 해결 방안을 제안할 수 있다.","C":"제시된 일상생활의 문제에 대해 과학적 탐구 방법에 따라 탐구를 수행하여 결 론 을 도출할 수 있 다.","D":"제시된 일상생활의 문제에 대해 과학적 탐구 방법에 따라 탐구를 수행하여 결 론 을 도출할 수 있 다.","E":"제시된 일상생활의 문제를 과학적으로 해결하는 데에 관심을 가지고, 과학적 탐구 방법의 주요 단계를 말할 수 있다."},"9과01-02":{"A":"인류가 얻은 과학적 지식과 방법이 인류 문명과 문화 발달에 미친 영향을 이해하고, 인공지능 등 첨단 과학기술이 가져올 미래 사회 변화를 조사하여 발표할 수 있으며, 과학의 유용성 및 과학, 기술, 사회의 관련성을 인식한다.","B":"인류가 얻은 과학적 지식과 방법이 인류 문명과 문화 발달에 미친 영향을 이해하고, 인공지능 등 첨단 과학기술이 가져올 미래 사회 변화를 조사하여 발표할 수 있으며, 과학의 유용성 및 과학, 기술, 사회의 관련성을 인식한다.","C":"인류가 얻은 과학적 지식이 인류 문명에 미친 영향과 인공지능 등 첨단 과학기술이 가져올 미래 사회 변화를 조사하여 발표할 수 있으며, 과학의 유용성을 인식한다.","D":"인류가 얻은 과학적 지식이 인류 문명에 미친 영향과 인공지능 등 첨단 과학기술이 가져올 미래 사회 변화를 조사하여 발표할 수 있으며, 과학의 유용성을 인식한다.","E":"인류가 얻은 과학적 지식이 인류 문명에 미친 사례를 통하여 과학과 인류 문명의 관련성에 관심을 가진다."},"9과01-03":{"A":"인류의 지속가능한 삶을 위한 과학기술의 중요성과 역할에 대해 토의하고, 지속 가능한 삶을 위한 개인과 사회적 차원의 활동 방안을 찾아서 실천할 수 있다.","B":"인류의 지속가능한 삶을 위한 과학기술의 중요성과 역할에 대해 토의하고, 지속 가능한 삶을 위한 개인과 사회적 차원의 활동 방안을 찾아서 실천할 수 있다.","C":"인류의 지속가능한 삶을 위한 과학기술의 중요성을 인식하고, 지속가능한 삶을 위한 개인과 사회적 차원의 활동 방안을 찾을 수 있다.","D":"인류의 지속가능한 삶을 위한 과학기술의 중요성을 인식하고, 지속가능한 삶을 위한 개인과 사회적 차원의 활동 방안을 찾을 수 있다.","E":"인류의 지속가능한 삶을 위한 과학기술의 활용 사례를 통하여 생활을 편리하게 하는 과학기술에 관심을 가진다. (2) 생물의 구성과 다양성"}},"area":{"A":{"지식·이해":"과학적 탐구 방법과 문제 해결 방법을 이해하고, 과학이 인류 문명과 문화 발달에 미친 영향과 인류의 지속가능한 삶을 위한 과학기술의 중요성 및 역할을 이해할 수 있다.","과정·기능":"일상생활의 문제를 인식하여 탐구 문제를 발견하고, 과학적 탐구 방법을 활용한 과학적 해결 방안을 제안하여 미래 사회의 변화를 예측할 수 있으며, 인류의 지속가능한 삶을 위한 과학기술의 중요성과 역할에 대해 조 사 · 발 표 하 고 토의할 수 있 다.","가치·태도":"과학적 탐구 방법을 통해 일생생활의 문제를 과학적으로 해결하는 태도를 가지고, 인류의 발달과 인류가 직면한 문제 해결에 과학이 유용함을 인식하며, 지속가능한 삶을 위한 해결 방안을 찾고 이를 실천할 수 있다."},"B":{"지식·이해":"과학적 탐구 방법과 문제 해결 방법을 이해하며, 과학이 인류 문명과 문화 발달에 미친 영향과 인류의 지속가능한 삶을 위한 과학기술의 중요성과 역할을 이해할 수 있다.","과정·기능":"일상생활의 문제를 인식하여 탐구 문제를 발견하고, 과학적 탐구 방법을 활용한 과학적 해결 학의 유용성을 인식한다.","C":"상태 변화 실험에서 가열 또는 냉각 곡선을 그리고 열에너지의 출입 여부를 설명하면서 주변 현상을 과학적으로 설명하려는 태도를 가진다.","D":"상태 변화 실험에서 온도 변화를 관찰하여 상태 변화 과정에서 열에너지가 출입함을 말할 수 있다.","E":"상태 변화와 열에너지 출입 현상에 관심을 가지며, 상태 변화 실험에서 시간에 따른 온도 변화를 관찰할 수 있다. (5) 힘의 작용"}},"area":{"A":{"지식·이해":"물질이 운동하는 입자로 구성되어 있고, 구성 입자의 운동에 따라 물질의 상태가 달라짐을 이해하며, 각 상태의 특징 및 상태 변화가 일어날 때 질량은 보존되고 부피가 변하는 것을 말할 수 있다. 여러 가지 상태 변화를 정확한 용어를 사용하여 구분하고, 상태 변화에는 열에너지의 출입이 따른다는 것과 이를 이용한 사례를 말할 수 있다.","과정·기능":"확산과 증발로부터 물질을 이루는 기본 입자와 입자의 운동에 관해 추론할 수 있다. 물질의 각 상태를 모형으로 나타내고, 상태 변화에서 나타나는 현상을 관찰하여 질량 및 부피 변화를 입자 모형으로 설명할 수 있다. 상태 변화가 일어날 때의 온도 변화를 측정하여 그래프로 변환하고 해석하여 상태 변화와 열에너지 출입의 관계를 설명할 수 있다.","가치·태도":"일상생활에서 일어나는 상태 변화와 열에너지 출입 현상을 과학적 원리로 설명하면서 과학 지식을 활용한 생활 속 문제 해결 활동을 즐기고, 이 과정에서 과학의 유용성을 인식한다."},"B":{"지식·이해":"물질이 운동하는 입자로 구성되어 있고, 구성 입자의 운동에 따라 물질의 상태가 달라짐을 말할 수 있다. 각 상태의 특징을 말하고 상태 변화 현상을 정확한 용어를 사용하여 구분하며, 상태 변화에서 질량과 부피가 어떻게 변하는지 말할 수 있다. 상태 변화와 열에너지 출입 관계를 말할 수 있다.","과정·기능":"확산과 증발로부터 물질을 이루는 기본 입자와 입자의 운동에 관해 추론하고, 물질의 각 상태와 상태 변화를 입자 모형으로 나타내 설명할 수 있다. 상태 변화에서 온도 변화를 측정하여 그래프로 변환하고 열에너지의 출입과 관련지어 해석할 수 있다.","가치·태도":"일상생활에서 일어나는 상태 변화와 열에너지 출입 현상에 대한 원리를 설명하고, 과학 지식을 활용한 일상생활 문제 해결을 통해 과학의 유용성을 인식한다."},"C":{"지식·이해":"증발과 확산 현상의 특징을 찾고 물질이 입자로 구성됨을 말할 수 있다. 물질을 상태에 따라 입자 모형으로 나타내고, 상태 변화를 정확한 용어를 사용하여 구분하며, 상태 변화에서 질량과 부피가 어떻게 변하는지 말할 수 있다. 상태 변화 시 열에너지 출입 여부를 말할 수 있다.","과정·기능":"확산과 증발로부터 물질을 이루는 기본 입자에 관해 추론할 수 있다. 물질의 각 상태를 모형으로 나타내고 상태 변화 시 나타나는 현상을 관찰하여 비교할 수 있으며 상태 변화 시 온도 변화를 관찰하여 그래프로 변환할 수 있다.","가치·태도":"일상생활에서 일어나는 상태 변화와 열에너지 출입 현상을 과학적으로 설명하려는 태도를 가진다."},"D":{"지식·이해":"증발과 확산 현상의 특징을 찾고 물질이 입자로 구성됨을 말하고, 물질을 상태에 따라 입자 모형으로 나타낼 수 있다. 상태 변화를 정확한 용어를 사용하여 구분하고, 상태 변화에서 열에너지가 출입함을 말할 수 있다.","과정·기능":"확산과 증발로부터 물질을 이루는 기본 입자에 관해 추론할 수 있다. 물질의 각 상태를 모형으로 나타내고, 상태 변화에서 나타나는 현상을 관찰하며, 상태 변화 시 온도 변화를 측정할 수 있다.","가치·태도":"일상생활에서 일어나는 상태 변화와 열에너지 출입 현상을 과학적으로 설명하려는 태도를 가진다."},"E":{"지식·이해":"증발과 확산 현상의 사례를 찾고, 물질의 상태별 특징 및 상태 변화 용어를 말하고, 상태가 변화가 일어날 때의 온도 변화 경향에 대해 말할 수 있다.","과정·기능":"상태 변화가 일어날 때 나타나는 현상을 관찰할 수 있다.","가치·태도":"일상생활에서 일어나는 상태 변화와 열에너지 출입 현상에 관심을 가진다."}}},"m13-05":{"codes":{"9과05-01":{"A":"물체에 나란하게 작용하는 두 힘의 합력을 구하여 힘의 평형을 찾고, 힘의 평형을 이루는 조건을 설명할 수 있다.","B":"물체에 작용하는 합력이 0일 때 물체가 힘의 평형을 이룬다는 것을 설명할 수 있다.","C":"물체에 나란하게 작용하는 두 힘의 합력을 구할 수 있다.","D":"물체에 작용하는 힘을 화살표로 표시할 수 있다.","E":"과학에서 사용하는 힘의 의미를 말할 수 있다."},"9과05-02":{"A":"중력, 탄성력, 마찰력, 부력과 관련된 일상생활의 예시로부터 각 힘을 설명하고, 각 힘과 힘의 크기에 영향을 미치는 요인과의 관계를 설명할 수 있다.","B":"중력, 탄성력, 마찰력, 부력의 특징을 크기와 방향으로 설명하고, 각 힘의 크기에 영향을 미치는 요인을 찾을 수 있다.","C":"중력, 탄성력, 마찰력, 부력의 특징을 설명하고, 실험을 통하여 힘의 크기를 측정할 수 있다.","D":"중력, 탄성력, 마찰력, 부력을 알고 각 힘의 사례를 찾을 수 있다.","E":"중력, 탄성력, 마찰력, 부력 등 힘의 종류를 구별할 수 있다."},"9과05-03":{"A":"알짜힘이 0이 아닐 때 힘과 물체의 운동 상태 변화와의 관계를 이해하고, 일상생활에서 그 예를 조사하여 물체의 속력 변화, 방향 변화, 속력과 방향이 모두 변하는 경우로 분류할 수 있다.","B":"알짜힘이 0이 아닐 때 물체의 운동 상태 변화를 조사하고, 이를 속력 변화, 방향 변화, 속력과 방향이 모두 변하는 경우로 분류할 수 있다.","C":"알짜힘이 0이 아닐 때 물체의 운동 상태 변화의 예를 조사할 수 있다.","D":"알짜힘이 0일 때와 0이 아닐 때를 구분할 수 있다.","E":"알짜힘의 의미를 말할 수 있다."},"9과05-04":{"A":"일상생활의 다양한 사례에서 작용하는 힘과 힘의 평형 관계를 설명하고, 여러 가지 힘의 특징을 이용한 장난감이나 도구를 창의적으로 고안하고 설계하는 활동을 통하여 과학 지식을 적극적으로 활용하려는 태도를 가진다.","B":"힘의 평형을 이루는 사례로부터 힘의 종류를 찾아 이를 힘의 평형으로 설명할 수 있고, 힘의 특징을 이용한 장난감이나 도구를 설계하는 활동을 통하여 과학 지식 활용의 유용성을 인식한다.","C":"힘의 평형을 이루는 사례에서 힘을 찾아 힘의 종류를 말할 수 있고, 힘을 활용한 장난감이나 도구의 설계에 적극적으로 참여할 수 있다.","D":"힘의 평형을 이루는 사례에서 몇 가지의 작용하는 힘을 말할 수 있고, 힘의 특징을 이용한 기구나 장치를 설계하는 데 관심을 가진다.","E":"정지한 물체가 힘의 평형을 이루고 있음을 말할 수 있고, 힘의 특징을 이용한 기구나 장치를 설계하는 데 관심을 가진다. (6) 기체의 성질"}},"area":{"A":{"지식·이해":"나란하게 작용하는 두 힘의 합력을 구하고 힘의 평형 조건을 설명할 수 있다. 중력, 탄성력, 마찰력, 부력과 관련된 일상생활의 예시로부터 그 힘을 설명하고, 알짜힘이 0이 아닌 상태에서 힘과 운동 상태 변화와의 관계를 이해하며, 다양한 사례에서 힘과 힘의 평형 관계를 설명할 수 있다.","과정·기능":"힘의 크기에 영향을 미치는 요인과의 관계를 설명하고, 힘이 작용하는 다양한 예들을 조사하여 속력 변화, 방향 변화, 속력과 방향 모두 변하는 경우로 분류할 수 있다. 과학적 지식을 활용한 장난감이나 도구를 창의적으로 고안하여 설계할 수 있다.","가치·태도":"힘을 활용한 창의적 도구를 설계하는 데에 힘의 개념을 활용하고, 이를 통해 과학 지식을 적극적으로 활용하려는 태도를 가진다."},"B":{"지식·이해":"나란하게 작용하는 두 힘의 합력이 0일 때 물체는 힘의 평형을 이룬다는 것을 이해하고, 중력, 탄성력, 마찰력, 부력의 특징을 크기와 방향으로 설명할 수 있으며, 제시된 사례에서 힘과 힘의 평형 관계를 설명할 수 있다.","과정·기능":"중력, 탄성력, 마찰력, 부력의 크기에 영향을 미치는 요인을 찾고, 알짜힘이 0이 아닐 때 운동 상태 변화를 조사하여 이를 속력 변화, 방향 변화, 속력과 방향 모두 변하는 경우로 분류하며, 힘의 특징을 이용한 장난감이나 도구를 설계하는 활동을 할 수 있다.","가치·태도":"힘의 특징을 이용한 창의적 도구를 설계하는 활동을 통하여 과학 지식 활용의 유용성을 인식한다."},"C":{"지식·이해":"나란하게 작용하는 두 힘의 합력을 구하고, 중력, 탄성력, 마찰력, 부력의 특징을 설명하며, 힘의 평형을 이루는 힘의 종류를 찾을 수 있다.","과정·기능":"실험을 통하여 힘의 크기를 측정하고, 운동 상태 변화의 예를 조사하며, 힘을 활용한 장난감이나 도구를 설계할 수 있다.","가치·태도":"힘을 활용한 창의적 도구를 설계하는 데 적극적으로 참여할 수 있다."},"D":{"지식·이해":"나란하게 작용하는 두 힘을 화살표로 나타내고, 중력, 탄성력, 마찰력, 부력의 특징을 설명할 수 있다. 알짜힘이 0일 때와 0이 아닐 때를 구별하고, 힘의 평형을 이루는 힘의 종류를 말할 수 있다.","과정·기능":"물체에 작용하는 힘을 화살표로 표현하고, 알짜힘이 0인 상태와 아닌 상태를 구별하며, 힘의 특징을 이용한 기구나 장치를 설계할 수 있다.","가치·태도":"일상생활에서 힘을 활용한 장난감이나 도구의 설계에 적극적인 관심을 가진다."},"E":{"지식·이해":"힘과 힘의 평형의 의미를 말하고, 중력, 탄성력, 마찰력, 부력, 알짜힘의 의미를 말할 수 있다.","과정·기능":"중력, 탄성력, 마찰력, 부력을 구별하고, 힘의 특징을 이용한 기구나 장 치 를 설계할 수 있 다.","가치·태도":"일상생활에서 힘을 활용한 장난감이나 도구의 설계에 관심을 가진다."}}},"m13-06":{"codes":{"9과06-01":{"A":"입자의 운동에 의해 기체의 압력이 나타남을 설명할 수 있다.","B":"입자의 운동에 의해 기체의 압력이 나타남을 설명할 수 있다.","C":"기체 상태의 입자의 운동을 모형으로 설명할 수 있다.","D":"기체 상태의 입자의 운동을 모형으로 설명할 수 있다.","E":"압력의 의미를 말할 수 있다."},"9과06-02":{"A":"실험 자료로부터 추론한 기체의 압력과 부피 간 관계를 입자 모형을 이용하여 설명하고, 이에 해당하는 사례를 다양하게 제시하며 과학 지식을 활용한 생활 문제 해결을 즐긴다.","B":"기체의 압력과 부피 간 관계를 실험 자료로부터 추론하고, 일상생활의 예를 들어 설명하며, 근거에 기반한 설명을 제시하려는 태도를 가진다.","C":"기체의 압력과 부피 관계에 관한 호기심을 가지고 실험 결과를 분석할 수 있으며, 근거에 기반한 설명을 제시하려는 태도를 가진다.","D":"기체의 압력에 따라 부피가 어떻게 변하는지 말할 수 있으며, 관련 탐구에 관심을 가진다.","E":"기체의 압력과 부피의 관계를 탐구하는 데 관심을 가진다."},"9과06-03":{"A":"실험 자료로부터 추론한 기체의 온도와 부피 간 관계를 입자 모형을 이용하여 설명하고, 이에 해당하는 사례를 다양하게 제시하며 과학 지식을 활용한 생활 문제 해결을 즐긴다.","B":"기체의 온도와 부피 간 관계를 실험 자료로부터 추론하고, 일상생활의 예를 들어 설명하며, 근거에 기반한 설명을 제시하려는 태도를 가진다.","C":"기체의 온도와 부피 관계에 관한 호기심을 가지고 실험 결과를 분석할 수 있으며, 근거에 기반한 설명을 제시하려는 태도를 가진다.","D":"기체의 온도에 따라 부피가 어떻게 변하는지 말할 수 있으며, 관련 탐구에 관심을 가진다.","E":"기체의 온도와 부피의 관계를 탐구하는 데 관심을 가진다. (7) 태양계"}},"area":{"A":{"지식·이해":"기체의 압력이 나타나는 원리를 알고, 기체의 부피가 압력이나 온도 변화에 따라 각각 어떻게 변하는지 설명할 수 있으며, 이에 해당하는 사례를 다양하게 제시할 수 있다.","과정·기능":"기체의 압력이 나타나는 원리를 입자 운동 모형으로 표현하고, 기체의 압력과 부피, 기체의
