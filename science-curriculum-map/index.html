 생명 활동 과정에서 균형있는 에너지 섭취와 소비의 중요성을 다룬다."},{"code":"12세포02-02","text":"세포호흡을 통한 물질 분해 및 에너지 생성 과정, 광합성에서는 물질 합성 및 에너지 저장 과정에 중점을 두어 다룬다."},{"code":"12세포02-03","text":"효소의 작용에 영향을 미치는 요인들에 대해 스스로 변인을 설정하여 실험을 설계하고 수행할 수 있도록 지도한다."}],"goryeo":["중학교 1∼3학년군 ‘식물과 에너지’와 ‘동물과 에너지’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘생명과학’의 생명 시스템의 구성과 연계된다.","조사하는 활동에서 다양한 디지털 탐구 도구나 디지털 플랫폼을 활용하여 디지털 소양을 함양할 수 있도록 지도한다."],"area":"life","track":"진로선택","subject":"세포와 물질대사","electives":["생명과학","통합과학1"],"prev":["m13-12","m13-13"],"next":[],"related":[],"materials":[],"limits":[],"focus":["세포호흡을 통한 물질 분해 및 에너지 생성 과정, 광합성에서는 물질 합성 및 에너지 저장 과정에 중점을 두어 다룬다."],"guide":[]},{"id":"세포-03","grade":"세포","num":3,"title":"세포호흡과 광합성","standards":[{"code":"12세포03-01","text":"미토콘드리아의 구조를 이해하고 생명체 내에서의 미토콘드리아의 기능을 추론할 수 있다."},{"code":"12세포03-02","text":"세포호흡 과정의 단계별 특징을 다양한 매체를 활용하여 협력적으로 소통할 수 있다."},{"code":"12세포03-03","text":"세포호흡 과정에서의 인산화 과정을 기질 수준의 인산화와 산화적 인산화 과정으로 구 분 할 수 있다."},{"code":"12세포03-04","text":"산소호흡과 발효의 공통점과 차이점을 이해하고, 실생활에서 발효를 이용한 사례 조사 계획을 세워 조사할 수 있다."},{"code":"12세포03-05","text":"엽록체의 구조를 이해하고 기능과 관련지어 설명할 수 있다."},{"code":"12세포03-06","text":"광합성의 명반응과 탄소 고정반응을 단계별로 구분하여 특징을 이해하고 두 반응의 상호 관계를 추론할 수 있다."},{"code":"12세포03-07","text":"광합성과 세포호흡의 전자 전달계를 비교하여 공통점과 차이점을 다양한 매체를 활용하여 설명할 수 있다."},{"code":"12세포03-08","text":"광합성 관련 과학사적 연구 결과를 조사하여 시각화 자료를 창의적으로 제작하여 협력적으로 소통할 수 있다."}],"tamgu":["미토콘드리아와 엽록체 내부구조 모형 제작하기","발효 실험 설계하여 수행하기","크로마토그래피로 식물의 잎에서 광합성 색소 분리하기"],"haeseol":[{"code":null,"text":"[12세포03-02∼07] 세포호흡과 광합성 과정이 효소에 의해 조절되는 일련의 화학 반응임을 이해하도록 하며, 세포호흡과 광합성의 탄소 고정반응 과정에서 유기물의 분자 구조식은 다루지 않도록 한다."},{"code":"12세포03-03","text":"산화적 인산화 과정에서 화학 삼투에 의해 ATP가 합성된다는 수준 정도를 다루도록 한다."},{"code":"12세포03-07","text":"광합성과 세포호흡의 전자 전달 과정에서 이루어지는 인산화 반응을 에너지, 효소, 산화⋅환원 반응 중심으로 다루도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘생물의 구성과 다양성’, ‘식물과 에너지’, ‘동물과 에너지’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘생명과학’의 생명 시스템의 구성과 연계된다.","미토콘드리아와 엽록체의 내부구조에 대한 수업에서는 다양한 도구나 매체를 활용하며, 가상 현실이나 증강 현실을 활용하여 탐구하도록 하여 디지털 소양을 함양할 수 있도록 지도한다.","실생활에서의 발효 사례와 광합성 관련 과학사 연대표 발표에서는 시각화할 수 있는 도구를 활용하도록 안내하며, 영상 제작이나 다양한 디지털 기기나 디지털 플랫폼을 활용하여 디지털 소양를 함양할 수 있도록 지도한다."],"area":"life","track":"진로선택","subject":"세포와 물질대사","electives":["생명과학","통합과학1"],"prev":["m13-02","m13-12","m13-13"],"next":[],"related":[],"materials":[],"limits":["[12세포03-02∼07] 세포호흡과 광합성 과정이 효소에 의해 조절되는 일련의 화학 반응임을 이해하도록 하며, 세포호흡과 광합성의 탄소 고정반응 과정에서 유기물의 분자 구조식은 다루지 않도록 한다."],"focus":[],"guide":[]},{"id":"유전-01","grade":"유전","num":1,"title":"유전자와 유전물질","standards":[{"code":"12유전01-01","text":"유전 형질이 유전자를 통해 자손에게 유전됨을 이해하고, 상염색체 유전과 성염색체 유전 양상의 차이를 설명할 수 있다."},{"code":"12유전01-02","text":"사람 유전 연구 방법의 어려움을 이해하고, 사람의 유전 현상 분석을 근거로 유전 형질의 유전적 특성을 추론할 수 있다."},{"code":"12유전01-03","text":"사람의 다유전자유전에 대해 이해하고, 유전 현상의 다양성 사례를 조사하여 과학적 근거를 활용하여 협력적으로 소통할 수 있다."},{"code":"12유전01-04","text":"염색체와 유전자 이상에 대해 이해하고, 사람의 유전병을 발병 원인별 조사 계획을 세워 조사할 수 있다."},{"code":"12유전01-05","text":"DNA의 구조와 유전물질 규명 관련 과학사적 연구 결과를 설명하기 위한 발표 자료를 창의적으로 제작할 수 있다."},{"code":"12유전01-06","text":"원핵세포와 진핵세포의 유전자 구조와 유전체 구성을 이해하고, 공통점과 차이점을 비교하여 설명할 수 있다."},{"code":"12유전01-07","text":"반보존적 DNA 복제 과정을 이해하고 그 의미를 추론하여 협력적으로 소통할 수 있다."}],"tamgu":["가계도 분석하기","DNA를 추출하여 관찰하기","DNA 복제 모의실험하기"],"haeseol":[{"code":"12유전01-01","text":"유전 형질을 다룰 때, 과학적으로 명확하게 증명된 사례를 도입하여 유전자와 유전 형질의 관계를 다루도록 한다."},{"code":"12유전01-03","text":"사람의 다유전자유전 사례에 초점을 두기보다는 사람의 유전 대부분이 다유전자유전에 의해 이루어지고 있다는 의미에 초점을 두도록 한다."},{"code":"12유전01-07","text":"반보존적 복제의 구체적인 분자생물학적 기작보다는 반보존적 복제가 갖는 의미를 중심으로 다루며, DNA의 반보존적 복제를 다룰 때, RNA 프라이머나 관여하는 효소의 기능 등을 상세히 다루기보다는 용어 수준에서 다루도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘생식과 유전’, 고등학교 ‘통합과학1’의 물질과 규칙성, 시스템과 상호작용, ‘생명과학’의 생명의 연속성과 다양성과 연계된다.","협력적으로 소통하기 위한 설명 자료 및 발표 자료는 정보 그림, 시청각 설명 자료, 영상, 디지털 플랫폼 등 다양한 매체를 활용할 수 있도록 지도한다."],"area":"life","track":"진로선택","subject":"생물의 유전","electives":["생명과학","통합과학1"],"prev":["m13-21"],"next":[],"related":[],"materials":[],"limits":["반보존적 복제의 구체적인 분자생물학적 기작보다는 반보존적 복제가 갖는 의미를 중심으로 다루며, DNA의 반보존적 복제를 다룰 때, RNA 프라이머나 관여하는 효소의 기능 등을 상세히 다루기보다는 용어 수준에서 다루도록 한다."],"focus":[],"guide":[]},{"id":"유전-02","grade":"유전","num":2,"title":"유전자의 발현","standards":[{"code":"12유전02-01","text":"전사와 번역 과정을 거쳐 유전자가 발현되는 중심원리를 이해하고, 모형을 이용하여 유전자 발현 과정을 설명할 수 있다."},{"code":"12유전02-02","text":"유전 부호를 이해하고, 유전 부호 표를 사용하여 유전 정보를 해독할 수 있다."},{"code":"12유전02-03","text":"원핵생물과 진핵생물의 유전자 발현 조절 과정을 비교하기 위한 설명 자료를 다양한 매체를 활용하여 제작할 수 있다."},{"code":"12유전02-04","text":"생물의 발생 과정에서 세포 분화가 유전자 발현 조절 과정을 통해 일어남을 추론할 수 있다."},{"code":"12유전02-05","text":"생물의 유전자 발현 조절 및 발생에 대한 연구가 인류 복지에 기여한 사례를 조사하여 협력적으로 소통할 수 있다."}],"tamgu":["단백질 합성 과정 모의실험하기"],"haeseol":[{"code":"12유전02-03","text":"원핵생물의 전사 조절 과정을 주로 다루고, 진핵생물의 경우는 원핵생물의 전사 조절과의 다른 점만을 간략하게 다루도록 한다."},{"code":"12유전02-04","text":"생물의 발생 초기 단계의 유전자 발현 조절 과정을 다루도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘생식과 유전’, 고등학교 ‘통합과학1’의 물질과 규칙성, 시스템과 상호작용, ‘생명과학’의 생명의 연속성과 다양성과 연계된다.","생물의 유전과 발생 관련 역사적 사건에 대한 영상 시청을 통해 생물의 유전에 대한 흥미와 호기심을 유발한다.","유전자 발현 조절과 발현 관련 최신 연구를 조사하는 과정에서 생명과학 분야에서 인공지능을 어떻게 이용할 수 있는지를 조사하도록 지도한다."],"area":"life","track":"진로선택","subject":"생물의 유전","electives":["생명과학","통합과학1"],"prev":["m13-21"],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["원핵생물의 전사 조절 과정을 주로 다루고, 진핵생물의 경우는 원핵생물의 전사 조절과의 다른 점만을 간략하게 다루도록 한다.","생물의 발생 초기 단계의 유전자 발현 조절 과정을 다루도록 한다."]},{"id":"유전-03","grade":"유전","num":3,"title":"생명공학기술","standards":[{"code":"12유전03-01","text":"생명공학기술 발달 과정에서의 주요 사건을 조사하고 다양한 매체를 활용하여 발표할 수 있다."},{"code":"12유전03-02","text":"단일클론항체, 줄기세포, 유전자 편집 기술이 난치병 치료에 활용된 사례를 조사하고, 이러한 치료법의 전망에 대해 협력적으로 소통할 수 있다."},{"code":"12유전03-03","text":"생명공학기술 관련 학문 분야를 이해하고 우리 생활과 산업에 활용 사례를 조사하여 창의적으로 설명 자료를 제작할 수 있다."},{"code":"12유전03-04","text":"유전자 변형 생물체(LMO)의 특징을 이해하고 인간과 생태계에 미치는 영향을 추론할 수 있다."},{"code":"12유전03-05","text":"생명공학기술의 활용 과정에서 나타나는 문제점과 이에 대한 사회적 책임을 인식하고 생명윤리 쟁점에 대해 의사 결정할 수 있다."}],"tamgu":["단백질 화합물 상호작용 가상 실험하기"],"haeseol":[{"code":"12유전03-01","text":"생명공학기술의 발달 과정에서의 주요 사건이 가져온 기술 발달뿐만 아니라 성과를 우리 생활과 관련된 사례를 중심으로 다루어 흥미를 유발하도록 한다."},{"code":null,"text":"[12유전03-02∼03] 생명공학기술의 원리 중심보다는 우리 생활과 밀접한 사례를 중심으로 생명공학기술 활용 사례 및 관련 새로운 학문 분야와 직업을 조사하도록 하여 학생들의 흥미를 유도하도록 한다."},{"code":null,"text":"[12유전03-04∼05] 생명공학의 발달 과정에서 나타나는 생태적, 윤리적, 제도적, 사회적 문제점을 이해하고, 미래 사회에 미칠 영향을 예측하여 발표하도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘생식과 유전’, 고등학교 ‘통합과학2’의 과학과 미래 사회, ‘생명과학’의 생명 시스템의 구성, 생명의 연속성과 다양성과 연계된다.","생명공학기술 발달 과정의 주요 사건 및 생명공학기술 활용 사례 조사 결과를 정보 그림 및 시청각 설명 자료 제작, 영상 제작 등 다양한 방법을 사용하여 발표하도록 하여 디지털 소양을 함양할 수 있도록 지도한다."],"area":"life","track":"진로선택","subject":"생물의 유전","electives":["생명과학","통합과학2"],"prev":["m13-21"],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["생명공학기술의 발달 과정에서의 주요 사건이 가져온 기술 발달뿐만 아니라 성과를 우리 생활과 관련된 사례를 중심으로 다루어 흥미를 유발하도록 한다.","[12유전03-02∼03] 생명공학기술의 원리 중심보다는 우리 생활과 밀접한 사례를 중심으로 생명공학기술 활용 사례 및 관련 새로운 학문 분야와 직업을 조사하도록 하여 학생들의 흥미를 유도하도록 한다."]},{"id":"지시-01","grade":"지시","num":1,"title":"지구 탄생과 생동하는 지구","standards":[{"code":"12지시01-01","text":"지구의 탄생 이후 지구 대기, 원시 바다, 생명체 탄생 등의 과정을 통한 지구시스템 각 권역의 형성 과정을 추론할 수 있다."},{"code":"12지시01-02","text":"지구시스템이 진화해온 역사에서 물, 탄소, 산소의 순환 과정을 통해 지권, 수권, 기권이 변화해 왔음을 추적할 수 있다."},{"code":"12지시01-03","text":"판구조론의 발달사와 관련지어 판을 움직이는 맨틀의 상부 운동과 플룸에 의한 구조 운동을 구분할 수 있다."},{"code":"12지시01-04","text":"암석의 순환 과정에서 화산 활동의 역할과 화산 활동으로 생성되는 암석의 특성을 추론 할 수 있다."},{"code":"12지시01-05","text":"지진파의 종류와 특성을 이해하고, 지진파를 이용하여 지구 내부구조를 알아내는 과정을 탐구할 수 있다."}],"tamgu":["지구가 역동적 행성으로 진화한 이유를 다른 고체 행성의 진화 과정과 비교하기","관측 기기의 발달과 관련지어 판구조론 정립의 역사 추적하기","한반도 지진의 분포 특성과 지진 발생 가능성 예측하기","지진파 자료를 활용하여 지각의 두께 구하기","편광현미경으로 화산암과 심성암의 조직 비교⋅관찰하기"],"haeseol":[{"code":"12지시01-01","text":"지구 생명체 탄생 이전의 권역 형성을 다룬다. 원시 태양계 성운에서 행성계인 태양계가 형성되는 물리적 과정(응축, 집적, 분화)을 알아보고, 행성으로서 지구가 탄생하고 진화하는 모습을 설명한다. 마그마 바다에서 화성암이 형성됨을 다루고 이후 냉각 과정에서의 상호작용을 다룬다."},{"code":"12지시01-02","text":"생명체 탄생 이후 생명체와 지구계의 상호작용을 중심으로 다룬다. 산소의 순환은 남세균과 호상철광층의 형성, 탄소의 순환은 얼음덩어리 지구와 석회암의 퇴적, 물의 순환은 풍화, 침식, 퇴적 작용과 지형의 형성을 다룬다. 그리고 이 과정에서 생명과 행성의 공진화 개념을 다루어 환경과 생명의 소중함을 인식하도록 한다."},{"code":"12지시01-03","text":"상부 맨틀의 대류에 의한 판 운동과 맨틀 -핵의 경계에서 올라오는 플룸 운동을 구분하여 이해하며, 플룸 상승류의 사례로 열점을 설명한다. 판을 움직이는 힘의 경우, 맨틀 대류에 의한 수동적인 움직임으로 설명하기보다는, 판을 움직이는 능동적인 힘(섭입하는 판이 당기는 힘, 해령에서 미는 힘 등)에 관해 다룬다."},{"code":"12지시01-04","text":"마그마의 특성에 따라 순상화산과 성층화산으로 화산체의 형태를 분류하며, 분출되는 물질의 종류가 달라짐을 다룬다. 편광현미경을 이용한 화산암과 심성암 박편 관찰을 통해 화산암의 유리질, 반상조직과 심성암의 조립질을 비교⋅관찰하는 정도만 다루며, 광학적 성질에 대해서는 다루지 않는다."},{"code":"12지시01-05","text":"지진파 단층 촬영 결과를 이용하여 알아낸 지구 내부구조를 함께 다룬다."}],"goryeo":["중학교 1∼3학년군 ‘지권의 변화’, 고등학교 ‘통합과학1’의 시스템과 상호작용, ‘지구과학’의 지구의 역사와 한반도의 암석과 연계된다.","고체 지구 영역의 지구계와 지구 구성 물질, 그리고 판구조론에 해당하는 내용으로, 빅데이터와 시뮬레이션 등을 활용한 탐구 활동을 통해 지구시스템 차원의 연계성을 확인하고 디지털 소양을 함양한다."],"area":"earth","track":"진로선택","subject":"지구시스템과학","electives":["지구과학","통합과학1"],"prev":["m13-09"],"next":[],"related":[],"materials":["현미경"],"limits":["편광현미경을 이용한 화산암과 심성암 박편 관찰을 통해 화산암의 유리질, 반상조직과 심성암의 조립질을 비교⋅관찰하는 정도만 다루며, 광학적 성질에 대해서는 다루지 않는다."],"focus":[],"guide":[]},{"id":"지시-02","grade":"지시","num":2,"title":"해수의 운동","standards":[{"code":"12지시02-01","text":"에크만 수송과 관련지어 지형류의 발생 원리를 설명할 수 있다."},{"code":"12지시02-02","text":"해파의 발생 과정을 이해하고, 천해파와 심해파의 차이점을 비교⋅설 명 할 수 있다."},{"code":"12지시02-03","text":"해일이 발생하는 여러 가지 원인을 이해하고, 피해 사례와 대처 방안을 제안할 수 있다."},{"code":"12지시02-04","text":"조석의 발생 과정을 이해하고 자료 해석을 통해 각 지역에서의 조석 양상을 설명할 수 있다."}],"tamgu":["해파 발생 및 전파 실험하기","실시간 자료를 이용한 조석 현상의 패턴 추론하기"],"haeseol":[{"code":"12지시02-01","text":"지구 규모의 해수 순환에 대한 정성적 이해를 바탕으로, 수압 경도력과 전향력에 의한 정역학 평형을 학습하여 해수를 움직이는 힘을 정량적으로 이해하도록 한다."},{"code":"12지시02-02","text":"해파는 해수면이 주기적으로 상하 운동하면서 에너지를 전파하는 현상으로 바닷물이 직접 이동하는 것은 아니라는 사실을 이해시킨다. 이때 심해파와 천해파의 중간 영역(전이파)에 대한 개념을 간단히 다룬다."},{"code":"12지시02-03","text":"해일 발생 당시의 기압, 만조 시기, 해안 및 해저 지형에 따라서도 해일의 피해가 달라질 수 있음을 이해한다."},{"code":"12지시02-04","text":"기조력을 정성적으로 도입하고 평형 조석론 정도만 다루며, 달에 의한 기조력이 태양보다 2배 정도 크다는 것을 다룬다."}],"goryeo":["중학교 1∼3학년군 ‘수권과 해수의 순환’, 고등학교 ‘통합과학2’의 환경과 에너지, ‘ 지구과학’의 대기와 해양의 상호작용과 연계된다.","실시간 자료를 이용한 조석 현상 분석, 쓰나미 피해 사례와 대처 방안 조사 및 발표 등을 프로젝트 학습의 형태로 진행함으로써 과학 탐구의 전체 과정을 체험하게 하고, 전 지구 규모의 빅데이터와 시뮬레이션을 통해 지구시스템 차원의 연계성을 확인하고 디지털 소양을 함양한다."],"area":"earth","track":"진로선택","subject":"지구시스템과학","electives":["지구과학","통합과학2"],"prev":["m13-18"],"next":[],"related":[],"materials":[],"limits":["기조력을 정성적으로 도입하고 평형 조석론 정도만 다루며, 달에 의한 기조력이 태양보다 2배 정도 크다는 것을 다룬다."],"focus":[],"guide":[]},{"id":"지시-03","grade":"지시","num":3,"title":"강수 과정과 대기의 운동","standards":[{"code":"12지시03-01","text":"대기를 구성하는 기체들이 선택적 흡수체임을 이해하고, 온실효과 및 태양 자외선 차단 효과, 물의 존재 등으로 지구 생명체 존재 조건을 추론할 수 있다."},{"code":"12지시03-02","text":"지표와 대기의 열 출입과 관련된 물리 과정 및 전 지구 평균 열수지를 해석할 수 있다."},{"code":"12지시03-03","text":"기온의 연직 분포와 대기의 안정도와의 관계를 이해하고, 단열변화를 통해 안개나 구름이 생성되는 과정 및 강수 과정을 분석할 수 있다."},{"code":"12지시03-04","text":"기압의 연직 분포로 정역학적 균형을 이해하고, 대기 중 연직 운동의 발생 원인을 추론할 수 있다."},{"code":"12지시03-05","text":"지균풍, 경도풍, 지상풍의 발생 원리와 관련된 힘의 작용을 설명할 수 있다."},{"code":"12지시03-06","text":"행성파의 발달 과정을 이해하고, 지상 고⋅저기압 발달에서 편서풍 파동의 역할을 평가할 수 있다."}],"tamgu":["단열선도를 이용하여 대기 안정도 해석하기","회전원판을 이용한 전향 효과 실험하기","편서풍 파동 및 제트류와 관련지어 상층 일기도 해석하기","행성파 시뮬레이션 실험하기"],"haeseol":[{"code":"12지시03-01","text":"생명가능지대로서의 지구, 즉 지구에 물이 존재함으로써 생명체가 발생하고 존재할 수 있는 이유에 대한 근거를 다룬다."},{"code":"12지시03-02","text":"지표와 대기의 열 출입을 물리 과정, 즉 산란, 반사, 흡수, 굴절 등으로 설명한다. 에너지(열) 수지를 다루면서 잠열의 효과가 가장 크다는 것을 파악함으로써 구름 생성을 위한 단열변화로 연결한다."},{"code":"12지시03-03","text":"단열변화에서 기온과 습도의 변화를 이해하고, 단열변화와 단열 감률을 고려한 대기의 안정도를 구름의 생성과 관련지어 다룬다."},{"code":null,"text":"[12지시03-04∼05] 수평 운동으로서 대기의 운동을 이해하기 위해 정역학 평형, 바람에 작용하는 힘들에 관한 개념 학습을 토대로 지상풍, 지균풍, 경도풍, 태양 상수, 편서풍 파동 등의 개념을 이해하고, 지상과 상층의 바람, 편서풍 파동(제트류), 대기 대순환 등을 시스템적으로 설명한다."}],"goryeo":["중학교 1∼3학년군 ‘날씨와 기후변화’, 고등학교 ‘통합과학2’의 환경과 에너지, ‘지구과학’의 대기와 해양의 상호작용과 연계된다.","지구 열수지와 지구온난화의 관련성 시뮬레이션 등의 활동을 통해 디지털 ⋅인공지능 소양을 함양한다.","상층 일기도를 확보하기 어려운 경우에는 보다 짧은 기간 동안의 일기를 예측하도록 한다.","편서풍 파동 실험으로 사용하던 회전 원통 실험은 로스비파인 편서풍 파동에 대한 오개념을 유발할 수 있으므로, 이 실험을 다룰 때는 실험이 갖는 한계점에 유의하여 활동을 구성한다."],"area":"earth","track":"진로선택","subject":"지구시스템과학","electives":["지구과학","통합과학2"],"prev":["m13-17"],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["생명가능지대로서의 지구, 즉 지구에 물이 존재함으로써 생명체가 발생하고 존재할 수 있는 이유에 대한 근거를 다룬다.","지표와 대기의 열 출입을 물리 과정, 즉 산란, 반사, 흡수, 굴절 등으로 설명한다. 에너지(열) 수지를 다루면서 잠열의 효과가 가장 크다는 것을 파악함으로써 구름 생성을 위한 단열변화로 연결한다."]},{"id":"행우-01","grade":"행우","num":1,"title":"우주탐사와 행성계","standards":[{"code":"12행우01-01","text":"태양계 탐사선의 활동을 통해 알아낸 성과를 이해하고, 인공위성을 활용한 우주탐사의 필요성을 토론할 수 있다."},{"code":"12행우01-02","text":"태양 활동 감시 시스템과 지구 접근 천체를 비롯한 지구를 위협하는 우주 위험 감시 기술의 중요성을 우주 재난 측면에서 인식할 수 있다."},{"code":"12행우01-03","text":"태양계를 지배하는 힘이 태양의 중력임을 이해하고, 케플러의 세 가지 법칙을 이용하여 태양계 구성 천체들의 운동을 설명할 수 있다."},{"code":"12행우01-04","text":"행성과 소천체의 정의를 구분하여 이해하고, 소천체 탐사 자료를 통해 이들의 특징을 추 론 할 수 있다."},{"code":"12행우01-05","text":"외계 행성계 탐사의 원리를 이해하고, 외계 행성에 생명체가 존재할 수 있는 조건과 외계 생명체의 존재 가능성에 대해 논증할 수 있다."}],"tamgu":["태양 활동 감시 시스템의 실생활 관련성 조사하기","천체 망원경을 이용하여 행성 관측하기","중심별의 표면 온도에 따른 생명가능지대 추론하기"],"haeseol":[{"code":"12행우01-01","text":"최근의 태양계 탐사선 탐사 결과로부터 새롭게 밝혀진 사실을 중심으로 다룬다. 태양계 탐사선과 관련하여 행성 탐사선, 소천체 탐사선 등의 활동과 성과를 다룬다. 우리나라의 우주개발 성과와 계획을 간략히 소개한다."},{"code":"12행우01-02","text":"우주 위험 감시 기술과 관련하여 우주기상, 소천체 충돌, 우주 쓰레기 등의 문제를 다룬다."},{"code":"12행우01-03","text":"케플러의 세 가지 법칙에서 각 법칙의 물리적 의미를 다루고, 태양계의 모든 천체에 케플러의 법칙이 적용된다는 사실을 설명할 수 있도록 한다."},{"code":"12행우01-04","text":"소천체에 속하는 왜소행성, 소행성, 혜성, 운석 등을 설명하고, 이들을 태양계 원시 물질로 구성된 천체와 분화된 천체로 구분할 수 있음을 다룬다."},{"code":"12행우01-05","text":"외계 행성계에서의 생명가능지대가 중심별의 표면 온도 등에 의해 결정된다는 것을 설명하며, 생명가능지대가 액체 상태의 물이 존재할 수 있는 범위로 설정된다는 사실을 통해 물이 생명 현상의 중요한 요소임을 이해하도록 한다."}],"goryeo":["중학교 1∼3학년군 ‘태양계’, 고등학교 ‘통합과학1’의 물질과 규칙성, ‘지구과학’의 태양계 천체와 별과 우주의 진화와 연계된다.","인공위성을 이용한 태양계 탐사의 역사를 시간순으로 나열하여 다루지는 않으며, 우주탐사 프로젝트를 조사하고 여러 모둠의 데이터를 공유하는 탐구 활동을 수행함으로써 디지털⋅인공지능 소양을 함양할 수 있다.","태양의 광구와 대기에서 관측할 수 있는 현상보다는 우주 환경 변화에 따른 우주 재난의 예측 가능성에 초점을 두며, 우주 환경까지 포함하는 생태주의 관점을 함양하도록 지도한다.","케플러의 법칙을 이용하여 태양계 천체의 데이터를 해석하는 탐구 활동과 수행평가를 실시할 수 있다.","탐사선이 관측한 표면 사진을 이용하여 태양계 행성과 소천체의 지질학적 특징을 조사하고 여러 모둠의 데이터를 공유하고 소통하는 탐구 활동을 수행할 수 있다."],"area":"earth","track":"진로선택","subject":"행성우주과학","electives":["지구과학","통합과학1"],"prev":["m13-07"],"next":[],"related":[],"materials":[],"limits":["인공위성을 이용한 태양계 탐사의 역사를 시간순으로 나열하여 다루지는 않으며, 우주탐사 프로젝트를 조사하고 여러 모둠의 데이터를 공유하는 탐구 활동을 수행함으로써 디지털⋅인공지능 소양을 함양할 수 있다."],"focus":[],"guide":[]},{"id":"행우-02","grade":"행우","num":2,"title":"태양과 별의 관측","standards":[{"code":"12행우02-01","text":"태양의 광구와 대기에서 나타나는 현상을 설명하고, 이러한 현상이 다양한 파장의 관측 자료에서 어떻게 나타나는지 비교⋅분석할 수 있다."},{"code":"12행우02-02","text":"별의 시차와 밝기를 이용하여 거리를 측정하는 다양한 방법을 비교⋅평가할 수 있다."},{"code":"12행우02-03","text":"별의 시선속도와 접선속도의 합으로 공간 운동이 나타남을 이해하고, 별자리를 구성하는 별들의 장시간에 걸친 형태 변화를 추론할 수 있다."},{"code":"12행우02-04","text":"쌍성의 관측 자료를 이용하여 항성의 질량을 직접적으로 구할 수 있음을 이해하고, 질량-광도 관계를 이용하여 쌍성이 아닌 별의 질량을 구할 수 있다."},{"code":"12행우02-05","text":"광도곡선의 특징을 비교하여 맥동변광성과 폭발 변광성을 구분하고, 폭발 변광성 중 초신성 관측 자료를 통해 알 수 있는 과학적 사실을 추론할 수 있다."}],"tamgu":["망원경으로 태양 광구를 관측하고 태양 흑점의 이동 자료를 이용하여 태양의 자전주기 구하기","별자리를 구성하는 별들의 공간 분포를 입체적으로 표현하기","쌍성의 질량과 절대등급 자료를 이용하여 주계열성의 질량-광도 관계 구하기"],"haeseol":[{"code":"12행우02-01","text":"태양 광구에서 흑점과 쌀알 무늬가 나타나는 이유를 이해하고, 흑점의 관측 자료로부터 태양 활동의 주기와 차등 자전을 설명한다. 태양의 위성 영상자료를 컴퓨터로 합성하는 활동을 통해 태양의 차등 자전을 이해한다."},{"code":"12행우02-02","text":"별의 연주시차를 이용하여 거리를 계산하는 방법을 다루고, 별의 겉보기 등급과 절대등급을 이용하여 거리를 계산하는 방법(거리지수)을 설명한다."},{"code":"12행우02-03","text":"별의 접선속도와 시선속도를 관측하여 공간 운동을 계산할 수 있음을 소개하고, 별자리를 구성하는 별들이 물리적인 연관성은 없지만, 시선 방향의 범위가 비슷한 별들의 집단임을 이해하도록 한다."},{"code":"12행우02-04","text":"케플러의 법칙을 쌍성계에 적용하여 쌍성계의 주기와 장반경으로부터 쌍성계를 구성하는 별의 질량을 구하는 과정을 이상적인 조건에 대해서만 다룬다."},{"code":"12행우02-05","text":"변광성의 관측 자료를 제시하여 맥동변광성과 폭발 변광성을 구분하게 하며, 맥동변광성의 맥동 기작은 다루지 않는다. 초신성의 종류와 초신성 폭발 과정은 다루지 않는다."}],"goryeo":["중학교 1∼3학년군 ‘태양계’와 ‘별과 우주’, 고등학교 ‘지구과학’의 태양계 천체와 별과 우주의 진화와 연계된다.","태양을 관측할 때는 태양 관측용 망원경을 사용하거나 망원경에 필터를 장착하여 안전하게 관측할 수 있도록 지도한다.","태양 광구를 주기적으로 관측한 자료를 분석하여 스프레드시트나 파이썬 등의 프로그램으로 태양의 위도에 따른 자전주기를 계산하는 탐구 활동과 수행평가를 실시할 수 있다.","별자리를 구성하는 별들의 데이터를 이용하여 별자리의 입체적인 공간 분포를 시각적으로 표현하는 탐구 활동을 실시할 수 있다."],"area":"earth","track":"진로선택","subject":"행성우주과학","electives":["지구과학"],"prev":["m13-07","m13-15"],"next":[],"related":[],"materials":[],"limits":["변광성의 관측 자료를 제시하여 맥동변광성과 폭발 변광성을 구분하게 하며, 맥동변광성의 맥동 기작은 다루지 않는다.","초신성의 종류와 초신성 폭발 과정은 다루지 않는다."],"focus":[],"guide":[]},{"id":"행우-03","grade":"행우","num":3,"title":"은하와 우주","standards":[{"code":"12행우03-01","text":"성단의 C-M도를 이용하여 성단의 나이와 거리를 비교하고, 맥동변광성의 주기-광도 관계를 이용하여 우리은하의 구조와 규모를 추론할 수 있다."},{"code":"12행우03-02","text":"성간 소광 자료를 통해 성간 티끌의 존재를 추론하고, 성간 티끌의 특징을 설명할 수 있다."},{"code":"12행우03-03","text":"은하의 회전 속도 곡선을 이용하여 질량 분포를 이해하고 은하에 빛을 내지 않는 물질의 존재를 추론할 수 있다."},{"code":"12행우03-04","text":"대규모로 이루어진 외부은하의 적색 편이 탐사의 성과를 이해하고, 은하의 공간 분포를 파악함에 있어서 분광 관측 자료의 중요성을 인식할 수 있다."},{"code":"12행우03-05","text":"은하의 공간 분포 자료를 통해 은하의 집단을 이해하고, 은하 장성, 보이드 등 우주의 거시적인 구조를 현대 우주론과 관련지어 설명할 수 있다."}],"tamgu":["주계열 맞추기를 이용하여 성단의 거리 구하기","세페이드 변광성을 이용하여 우리은하의 중심 찾기와 크기 구하기","전천 탐사를 통해 얻은 은하의 공간 분포 자료에서 은하단, 보이드 등 다양한 구조 식별하기"],"haeseol":[{"code":"12행우03-01","text":"성단은 C-M도를 도입하여 설명하며, 성단의 주계열 맞추기를 이용하여 거리를 구하는 방법을 다룬다. 세페이드 변광성의 주기-광도 관계를 이용하여 우리은하의 규모를 계산하는 방법을 이해할 수 있도록 한다."},{"code":"12행우03-02","text":"성간 기체가 다양한 상태로 분포하고 있음을 설명하고, 성간 소광에 의해 천체의 거리가 실제와 다르게 측정될 수 있음을 알고 관측 결과를 보정해야 하는 이유를 다룬다."},{"code":"12행우03-03","text":"우리은하의 회전 속도 곡선으로부터 계산된 질량과 별의 광도로부터 추정한 은하의 질량이 일치하지 않는다는 사실로부터 빛을 내지 않는 물질의 존재 가능성을 이해할 수 있도록 한다."},{"code":null,"text":"[12행우03-04~05] 다양한 전천 탐사의 성과를 간략히 소개하고, 이로부터 알아낸 은하의 공간 분포를 이해할 수 있도록 한다. 은하군 및 은하단, 초은하단의 특징을 설명하고, 초은하단과 보이드는 우주 팽창의 영향을 받는 규모임을 간략히 다룬다."}],"goryeo":["중학교 1∼3학년군 ‘태양계’와 ‘별과 우주’, 고등학교 ‘지구과학’의 태양계 천체와 별과 우주의 진화와 연계된다.","천체의 거리를 구하는 과정이 거리 규모에 따라 다른 이유를 이해하도록 한다.","성단의 H-R도와 세페이드 변광성의 관측 자료를 이용하여 천체의 거리를 계산하는 탐구 활동과 수행평가를 실시할 수 있다.","우리은하와 외부은하의 회전 속도 곡선을 제시하고 공통적인 특징을 파악하는 모둠별 탐구 활동과 보고서 평가를 실시할 수 있다."],"area":"earth","track":"진로선택","subject":"행성우주과학","electives":["지구과학"],"prev":["m13-07","m13-15"],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["성단은 C-M도를 도입하여 설명하며, 성단의 주계열 맞추기를 이용하여 거리를 구하는 방법을 다룬다. 세페이드 변광성의 주기-광도 관계를 이용하여 우리은하의 규모를 계산하는 방법을 이해할 수 있도록 한다.","성간 기체가 다양한 상태로 분포하고 있음을 설명하고, 성간 소광에 의해 천체의 거리가 실제와 다르게 측정될 수 있음을 알고 관측 결과를 보정해야 하는 이유를 다룬다."]},{"id":"과사-01","grade":"과사","num":1,"title":"과학과 문명의 탄생과 통합","standards":[{"code":"12과사01-01","text":"인류 문명의 탄생 과정에서 인류의 지혜가 담긴 과학적 사례를 발견하고, 이를 통해 과학이 인류 문명의 형성 과정에 기여하였음을 이해할 수 있다."},{"code":"12과사01-02","text":"고대 그리스 철학자의 과학적 사고나 주장 등을 조사하고, 그리스 문명이 고대에서 현대에 이르기까지 인간의 삶에 미친 영향을 설명할 수 있다."},{"code":"12과사01-03","text":"중세 시대 유럽과 중동 지역을 중심으로 종교나 문화가 과학에 기여한 바를 이해하고, 고대 그리스의 과학과 중세 과학의 특징을 비교할 수 있다."},{"code":"12과사01-04","text":"르네상스와 과학혁명이 일어난 사회문화적 배경을 조사하고, 과학과 예술 사이의 융합적 사례를 설명할 수 있다."},{"code":"12과사01-05","text":"과학 지식의 형성 과정에서 과학자의 신념이나 세계관이 영향을 준 사례를 조사하여 발표할 수 있다."}],"tamgu":["르네상스와 과학혁명 시기의 예술 작품에 포함된 과학적 원리 분석하기"],"haeseol":[{"code":"12과사01-02","text":"고대 그리스 시대의 우주관과 자연관을 이해하고, 고대 그리스 철학자들의 생각이 오늘날 과학이나 예술, 철학 등 다양한 분야에서 어떻게 활용되고 있는지 조사하도록 한다."},{"code":"12과사01-04","text":"예술 작품에 등장하는 과학적 소재나 창작 과정에서 나타난 과학적 개념이나 원리를 탐색하도록 한다."}],"goryeo":["고대 그리스 시대의 과학과 16~17세기 과학혁명 시기의 과학을 서로 비교함으로써 고대 그리스 철학이 미친 영향을 이해할 수 있도록 지도한다. 플라톤과 아리스토텔레스의 철학적 관점이 과학과 예술 등 다양한 분야에서 적용된 사례를 이해하고, 오늘날 융합적 사고와는 어떤 차이점이 있는지 생각할 기회를 제공한다.⋅과학 활동의 윤리성⋅과학 문제 해결에 대한 개방성⋅과학 문제 해결의 학문 간 융합적 접근⋅안전⋅지속가능 사회에 기여⋅과학 문화 향유","과거에 있었던 사례나 사건을 조사하는 것에서 그치지 않고, 과거 과학자나 예술가의 아이디어나 사고 과정이 오늘날에 적용된다면 어떤 일이 일어날 것인지 예측하고 토론하도록 한다."],"area":"society","track":"융합선택","subject":"과학의 역사와 문화","electives":[],"prev":[],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["고대 그리스 시대의 우주관과 자연관을 이해하고, 고대 그리스 철학자들의 생각이 오늘날 과학이나 예술, 철학 등 다양한 분야에서 어떻게 활용되고 있는지 조사하도록 한다.","예술 작품에 등장하는 과학적 소재나 창작 과정에서 나타난 과학적 개념이나 원리를 탐색하도록 한다."]},{"id":"과사-02","grade":"과사","num":2,"title":"변화하는 과학과 세계","standards":[{"code":"12과사02-01","text":"상대성 이론 등과 같은 현대 과학의 등장이 당시의 사회문화에 끼친 영향을 이해함으로써 과학의 사회적 가치를 느낄 수 있다."},{"code":"12과사02-02","text":"현대 과학의 등장 과정에서 나타난 과학자들의 논쟁이나 토론 사례를 조사하고, 과학적 의사소통에서 지켜야 할 규범과 태도를 이해할 수 있다."},{"code":"12과사02-03","text":"현대 예술 작품이나 건축물에 과학적 원리가 적용된 사례를 조사하고, 과학과 문화의 관련성을 추론할 수 있다."},{"code":"12과사02-04","text":"감염병이 사회에 영향을 미친 대표적인 사례를 찾고, 과학이 사회 문제 해결에 기여함을 인식할 수 있다."},{"code":"12과사02-05","text":"과학기술이 교통수단의 발달에 미친 영향을 인식하고, 교통수단의 발전이 가져올 미래 사회의 변화를 예측할 수 있다."},{"code":"12과사02-06","text":"산업혁명 이후 나타난 과학기술이 인류 문명에 미친 긍정적 효과와 부정적 효과에 대해 토론할 수 있다."}],"tamgu":["상대성 이론의 관점에서 미래주의 예술 작품 분석하기"],"haeseol":[{"code":"12과사02-04","text":"근대 사회 등장 이래 우리나라뿐만 아니라 유럽 및 세계 전역에서 유행했던 감염병을 조사하고, 감염병 등장이 미친 사회 변화와 이러한 문제를 극복하는 과정에서 과학의 역할을 조사하여 능동적으로 문제를 발견하고 해결하는 자세를 갖도록 한다."},{"code":"12과사02-06","text":"산업혁명 이후 화학 무기, 원자력, 유전자 재조합 등의 과학기술 발전으로 발생한 사회적 갈등을 알아봄으로써 과학기술이 갖는 양면성을 이해하고, 새롭게 등장하는 과학기술에 대해 균형적으로 판단할 수 있는 시야를 갖도록 한다."}],"goryeo":["현대 과학의 등장으로 인해 나타나는 장단점에 대해 근거를 가지고 추론하며, 서로 다른 관점을 가진 경우에도 이해하고 배려할 수 있는 마음을 가질 수 있도록 한다."],"area":"society","track":"융합선택","subject":"과학의 역사와 문화","electives":[],"prev":[],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["근대 사회 등장 이래 우리나라뿐만 아니라 유럽 및 세계 전역에서 유행했던 감염병을 조사하고, 감염병 등장이 미친 사회 변화와 이러한 문제를 극복하는 과정에서 과학의 역할을 조사하여 능동적으로 문제를 발견하고 해결하는 자세를 갖도록 한다.","산업혁명 이후 화학 무기, 원자력, 유전자 재조합 등의 과학기술 발전으로 발생한 사회적 갈등을 알아봄으로써 과학기술이 갖는 양면성을 이해하고, 새롭게 등장하는 과학기술에 대해 균형적으로 판단할 수 있는 시야를 갖도록 한다."]},{"id":"과사-03","grade":"과사","num":3,"title":"과학과 인류의 미래","standards":[{"code":"12과사03-01","text":"과학기술의 발전을 통해 새롭게 나타난 문화적 변화를 찾아보고, 과학을 주제로 하는 예술 작품이나 콘텐츠를 제작하여 발표할 수 있다."},{"code":"12과사03-02","text":"일상생활이나 미디어에서 사용되는 과학 용어를 조사하고, 과 학 용어가 우리 사회에 미치는 파급효과를 설명할 수 있다."},{"code":"12과사03-03","text":"과학기술의 발전이 음악에 영향을 끼친 사례를 탐색하고 인공지능으로 음악을 창작하거나 로봇을 활용한 연주를 통해 과학의 심미적 가치를 느낄 수 있다."},{"code":"12과사03-04","text":"인간과 기계, 사물 등을 연결하는 과학기술의 발전 동향을 파악하고 미래 사회의 변화를 예측할 수 있다."},{"code":"12과사03-05","text":"가상 현실이나 증강 현실을 활용한 우리 주변의 사례를 조사하고, 이러한 기술이 미래 사회에 미칠 수 있는 영향에 대해 토론할 수 있다."},{"code":"12과사03-06","text":"집단적 의사결정을 통해 과학기술과 관련된 사회적 문제를 해결한 사례를 조사하여 과학기술에 대한 시민의 이해와 균형 있는 가치 판단의 필요성을 인식할 수 있다."}],"tamgu":["가상 현실이나 증강 현실을 이용한 과학문화 콘텐츠 제작하기"],"haeseol":[{"code":"12과사03-02","text":"에너지나 DNA와 같은 과학 용어를 뉴스나 미디어 속에서 어떻게 활용하는지 찾아보고 과학적 맥락과 그 밖의 맥락에서 활용하는 용어의 의미를 서로 비교하여 차이점을 이해하도록 한다. 또한, 새로운 과학 용어를 다양한 사회 또는 자연 현상 설명에 활용한다는 점을 통해 과학적 아이디어를 다양한 상황이나 맥락에 적용하도록 한다."},{"code":"12과사03-06","text":"핵발전소 가동 연장이나 자동차의 안전성 논란 등 과학과 관련된 사회적 쟁점의 사례를 조사하여 대중의 과학적 시각과 균형적인 가치 판단이 중요함을 깨닫도록 한다."}],"goryeo":["과학기술이 인류의 발전에 올바른 방향으로 기여하도록 학생들의 능동적 참여를 유도하고 과학기술이 가져올 변화에 대해 균형적인 시각과 비판적인 자세를 견지할 수 있도록 지도한다."],"area":"society","track":"융합선택","subject":"과학의 역사와 문화","electives":[],"prev":[],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["에너지나 DNA와 같은 과학 용어를 뉴스나 미디어 속에서 어떻게 활용하는지 찾아보고 과학적 맥락과 그 밖의 맥락에서 활용하는 용어의 의미를 서로 비교하여 차이점을 이해하도록 한다. 또한, 새로운 과학 용어를 다양한 사회 또는 자연 현상 설명에 활용한다는 점을 통해 과학적 아이디어를 다양한 상황이나 맥락에 적용하도록 한다.","핵발전소 가동 연장이나 자동차의 안전성 논란 등 과학과 관련된 사회적 쟁점의 사례를 조사하여 대중의 과학적 시각과 균형적인 가치 판단이 중요함을 깨닫도록 한다."]},{"id":"기환-01","grade":"기환","num":1,"title":"기후와 환경생태의 특성","standards":[{"code":"12기환01-01","text":"날씨와 기후의 특성을 이해하고, 이를 비교하여 설명할 수 있다."},{"code":"12기환01-02","text":"기후시스템이 유지되는 되먹임 과정을 이해하고 생물권과 다른 권역 간 상호작용을 설 명 할 수 있다."},{"code":"12기환01-03","text":"기후변화가 생태계와 우리의 생활환경에 영향을 미친 사례를 조사하여 발표할 수 있다."}],"tamgu":["우리 지역 생태지도 제작하기"],"haeseol":[{"code":"12기환01-01","text":"기후를 결정하는 기후요소와 기후인자를 구분하여 이해하도록 한다."},{"code":"12기환01-02","text":"지구시스템의 기권, 수권, 지권과 생물권 간 상호작용을 이해하도록 한다."}],"goryeo":["기후와 환경생태에 대한 과도한 개념 설명으로 흥미를 잃지 않도록 하고, 대중 매체를 통해 학생들이 쉽게 접할 수 있는 사례를 중심으로 예상되는 문제점, 또는 파급효과 등을 토의함으로써 우리 주변에서 일어나는 다양한 기후변화 사례에 대해 관심을 가질 수 있도록 지도한다."],"area":"society","track":"융합선택","subject":"기후변화와 환경생태","electives":[],"prev":[],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["기후를 결정하는 기후요소와 기후인자를 구분하여 이해하도록 한다.","지구시스템의 기권, 수권, 지권과 생물권 간 상호작용을 이해하도록 한다."]},{"id":"기환-02","grade":"기환","num":2,"title":"기후위기와 환경생태 변화","standards":[{"code":"12기환02-01","text":"기후위기가 일어나는 주요 원인을 이해하고, 기후위기의 심각성을 인식할 수 있다."},{"code":"12기환02-02","text":"빙상의 융해와 열팽창으로 인한 해수면 상승을 기후변화와 연계하여 설명할 수 있다."},{"code":"12기환02-03","text":"극한 기상 현상의 종류와 원인을 이해하고 극한 기상 현상이 환경생태에 미친 영향을 사례를 들어 설명할 수 있다."},{"code":"12기환02-04","text":"기후변화 시나리오에 따른 미래 생태계 변화 예측 보고서를 찾아보고, 미래의 기후와 생태계의 변화 양상을 추론할 수 있다."},{"code":"12기환02-05","text":"꽃의 개화 시기 변화 자료를 조사하고, 꽃의 개화 시기 변화가 우리 생활에 끼치는 영향을 추론할 수 있다."},{"code":"12기환02-06","text":"꿀벌을 비롯한 곤충의 개체 수 감소 원인을 기후변화와 연계하여 설명할 수 있다."},{"code":"12기환02-07","text":"수생태계의 물꽃 현상을 이해하고, 기후변화가 수생태계의 생물다양성에 끼치는 영향을 추 론 할 수 있다."},{"code":"12기환02-08","text":"모기나 파리와 같은 곤충 매개 감염병이 새롭게 출현하거나 급격히 확산되는 현상을 기후변화와 연계하여 설명할 수 있다."}],"tamgu":[],"haeseol":[{"code":"12기환02-03","text":"극한 기상 현상은 슈퍼 태풍이나 메가 가뭄과 같은 대표적인 사례들을 중심으로 다룬다."},{"code":"12기환02-04","text":"기후변화 시나리오에 따른 생물의 분포 변화와 관련된 다양한 보고서나 자료들을 안내하고, 자기주도적으로 자료를 분석하고 해석한 후 토론이나 발표를 하도록 한다."}],"goryeo":["기후와 환경생태에 대한 개념은 핵심 내용을 중심으로 간략히 다루고, 다양한 사례들을 중심으로 흥미를 유발하도록 한다."],"area":"society","track":"융합선택","subject":"기후변화와 환경생태","electives":[],"prev":[],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["극한 기상 현상은 슈퍼 태풍이나 메가 가뭄과 같은 대표적인 사례들을 중심으로 다룬다.","기후변화 시나리오에 따른 생물의 분포 변화와 관련된 다양한 보고서나 자료들을 안내하고, 자기주도적으로 자료를 분석하고 해석한 후 토론이나 발표를 하도록 한다."]},{"id":"기환-03","grade":"기환","num":3,"title":"기후위기에 대응하는 우리의 노력","standards":[{"code":"12기환03-01","text":"산호의 멸종으로 인한 백화현상의 예를 통해 기후변화가 해양생태계에 미치는 영향을 살펴보고, 바다 사막화를 예방하거나 복원할 수 있는 과학기술의 사례를 제시할 수 있다."},{"code":"12기환03-02","text":"기후변화에 따라 가속화되는 사막화, 대형산불, 지역적 가뭄과 홍수 등을 이해하고, 이를 극복하기 위한 인류의 노력에 대해 토의할 수 있다."},{"code":"12기환03-03","text":"탄소중립 사회를 이루기 위한 탄소 저감 관련 과학기술 개발 현황을 알아보고, 이의 적용 사례를 제시할 수 있다."},{"code":"12기환03-04","text":"기후위기와 환경생태 변화에 대응하기 위한 국제사회의 노력을 알아보고, 민주 시민으로서 참여 방안을 제안할 수 있다."}],"tamgu":["탄소 저감 과학기술 고안하기","기후변화 시나리오에 따른 미래 한반도 생물의 분포 변화 시각화 자료 작성하기"],"haeseol":[{"code":"12기환03-04","text":"국제사회의 생물다양성 협약, 기후변화에 관한 정부 간 협의체나 국제기구를 소개하고, 이들의 노력이나 체결된 국제 협약 등을 다룬다."}],"goryeo":["기후와 환경생태의 변화가 우리의 삶에 직접적인 영향을 미칠 수 있음을 관련된 다양한 사례를 통해 알아볼 수 있도록 지도한다."],"area":"society","track":"융합선택","subject":"기후변화와 환경생태","electives":[],"prev":[],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["국제사회의 생물다양성 협약, 기후변화에 관한 정부 간 협의체나 국제기구를 소개하고, 이들의 노력이나 체결된 국제 협약 등을 다룬다."]},{"id":"융탐-01","grade":"융탐","num":1,"title":"융합과학 탐구의 이해","standards":[{"code":"12융탐01-01","text":"과학이 다양한 분야와 연계하여 인류 사회의 문제해결에 기여하였음을 이해하고, 융합적 탐구의 유용성을 느낄 수 있다."},{"code":"12융탐01-02","text":"예술에서의 창작이나 사회과학적 탐구 과정을 이해하고, 과학적 탐구 과정과의 공통점과 차이점을 비교할 수 있다."},{"code":"12융탐01-03","text":"과학적 탐구 과정에서 사용되는 다양한 데이터의 종류를 이해하고, 지식의 창출 과정에서 데이터의 가치와 중요성을 인식할 수 있다."},{"code":"12융탐01-04","text":"인공지능을 포함한 디지털 탐구 도구나 기술의 활용 사례를 조사하고, 과학적 탐구 과정에서 디지털 탐구 도구와 기술 활용의 의의를 평가할 수 있다."}],"tamgu":["디지털 탐구 도구를 활용하여 가정의 전력 소모량 계산하기"],"haeseol":[{"code":"12융탐01-01","text":"현미경을 이용한 물질의 구조에 대한 분석, X-선 분광학 기술을 이용한 DNA 구조의 발견 등과 같이 다양한 분야의 과학기술이 서로 결합하여 과학의 발전을 가져온 사례 등을 다룬다."}],"goryeo":["과학적 발견의 사례나 사회 문제 해결을 소개할 때 ‘통합과학1, 2’ 수준에서 이해할 수 있는 사례를 중심으로 소개하며, 새로운 과학 개념이나 이론을 설명하는 것을 지양한다.","인공지능이나 빅데이터가 과학 연구에 활용되고, 다 양 한 사회 문제를 해결하거나 그 원 인 을 밝히는 데 기여하였음을 소개하도록 한다."],"area":"society","track":"융합선택","subject":"융합과학 탐구","electives":[],"prev":[],"next":[],"related":[],"materials":[],"limits":["과학적 발견의 사례나 사회 문제 해결을 소개할 때 ‘통합과학1, 2’ 수준에서 이해할 수 있는 사례를 중심으로 소개하며, 새로운 과학 개념이나 이론을 설명하는 것을 지양한다."],"focus":[],"guide":[]},{"id":"융탐-02","grade":"융탐","num":2,"title":"융합과학 탐구의 과정","standards":[{"code":"12융탐02-01","text":"실생활에서 관찰이나 경험을 통해 직접 얻은 데이터나 공개된 데이터를 가공하여 융합적 탐구 문제를 스스로 발견할 수 있다."},{"code":"12융탐02-02","text":"융합적 탐구 문제해결을 위한 가설이나 모형을 고안하고, 문제를 해결할 수 있는 방법이나 절차 등을 설계할 수 있다."},{"code":"12융탐02-03","text":"디지털 탐구 도구를 포함한 다양한 도구를 활용하여 데이터를 수집하고, 수집한 데이터의 타당성과 신뢰성을 평가할 수 있다."},{"code":"12융탐02-04","text":"융합적 탐구 과정을 통해 얻은 데이터를 탐구 목적이나 맥락에 맞게 시각 자료로 표현할 수 있다."},{"code":"12융탐02-05","text":"평균, 표준편차 등을 바탕으로 데이터의 특성을 파악하고, 이를 토대로 가설이나 모형 을 평가할 수 있다."},{"code":"12융탐02-06","text":"데이터 분석 결과를 바탕으로 결론을 도출하고 평가할 수 있다."},{"code":"12융탐02-07","text":"다양한 표현 방법을 활용하여 융합적 탐구 문제, 과정, 결과, 결론 등을 효과적으로 발표하고 토론할 수 있다."}],"tamgu":["공개 데이터셋을 활용하여 데이터를 수집하고 시각화하기","인공지능을 활용하여 미세먼지 농도 예측하기"],"haeseol":[{"code":"12융탐02-03","text":"센서나 기기가 데이터를 측정 또는 수집하는 방법을 경험함으로써 데이터 수집의 한계나 어려움을 이해할 수 있도록 한다."},{"code":"12융탐02-04","text":"표, 막대그래프, 히스토그램, 분산형 그래프 등 다양한 시각 자료의 특성을 이해하고 수집한 데이터를 적절한 형태로 시각화하도록 한다."}],"goryeo":["자기 주도적으로 융합과학 탐구에 적절한 문제를 선정하고 융합과학 탐구의 과정을 수행하여 과학의 가치와 유용성을 느낄 수 있도록 지도한다.","학생이 자신의 관심과 진로, 여건 등을 고려하여 스스로 탐구 주제를 선정 ⋅수행할 수 있도록 하며, 융합적 탐구 목적에 따라 스마트 기기, 인공지능 등과 같은 다양한 디지털 탐구 도구를 활용할 수 있도록 한다.","인공지능이나 빅데이터, 사물인터넷 등 디지털 기술을 활용해서 과학 및 다양한 분야의 문제해결에 도움이 될 수 있음을 설명하며, 이를 통해 디지털 탐구 도구의 활용과 판단을 위해 갖추어야 할 소양과 기본 원칙 등을 포함하여 지도한다.","디지털 탐구 도구 활용을 위해 갖추어야 할 소양과 기본 원칙 등을 다루고, 인공지능이나 빅데이터, 사물인터넷 등 디지털 기술을 과학 및 다양한 분야의 문제해결에 활용할 수 있음을 설명한다.","학생들이 유의미한 자료 탐색을 할 수 있도록 정부출연연구기관이나 학술기관 소장 데이터셋 등을 소개하고, 지능형 과학실을 활용할 수 있다."],"area":"society","track":"융합선택","subject":"융합과학 탐구","electives":[],"prev":[],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["센서나 기기가 데이터를 측정 또는 수집하는 방법을 경험함으로써 데이터 수집의 한계나 어려움을 이해할 수 있도록 한다.","표, 막대그래프, 히스토그램, 분산형 그래프 등 다양한 시각 자료의 특성을 이해하고 수집한 데이터를 적절한 형태로 시각화하도록 한다."]},{"id":"융탐-03","grade":"융탐","num":3,"title":"융합과학 탐구의 전망","standards":[{"code":"12융탐03-01","text":"과학기술의 변화와 발전을 고려하여 미래 사회에 등장할 새로운 융합과학기술을 예측할 수 있다."},{"code":"12융탐03-02","text":"오늘날 인류가 겪고 있는 난제를 융합과학기술을 활용하여 해결할 수 있는 방안에 대해 토의할 수 있다."},{"code":"12융탐03-03","text":"융합과학 탐구 과정에서 준수해야 할 윤리에 대해 알아보고, 과학기술의 발달에 따라 발생할 수 있는 윤리적 쟁점을 토론할 수 있다."},{"code":"12융탐03-04","text":"융합과학기술을 활용하여 사회 문제를 해결하는 과정에서 시민참여가 문제해결에 도움을 준 사례를 제시할 수 있다."}],"tamgu":["식량자원 부족 및 대기오염 문제해결을 위한 융합과학기술 고안하기"],"haeseol":[{"code":"12융탐03-02","text":"오늘날 인류가 직면한 식량이나 물 부족, 각종 자원의 고갈, 기후변화나 싱크홀 등과 같은 난제에 대해 융합과학기술을 통한 간학문적 문제 해결 방안에 대해 토의하도록 한다."}],"goryeo":["융합과학 탐구를 수행하는 과정에서 사회적, 경제적, 윤리적 관점 등에 따라 긍정적인 면과 부정적인 면을 분석할 수 있도록 지도한다."],"area":"society","track":"융합선택","subject":"융합과학 탐구","electives":[],"prev":[],"next":[],"related":[],"materials":[],"limits":[],"focus":[],"guide":["오늘날 인류가 직면한 식량이나 물 부족, 각종 자원의 고갈, 기후변화나 싱크홀 등과 같은 난제에 대해 융합과학기술을 통한 간학문적 문제 해결 방안에 대해 토의하도록 한다."]}],"items":{"e34-01":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"다음 중 물체를 <b>당기는<\/b> 힘을 쓰는 경우는?","choices":["① 문을 밀어서 연다","② 서랍을 잡아 뺀다","③ 공을 발로 찬다","④ 책을 책상에 놓는다"],"answer":"②","checks":"밀기와 당기기 구분","miscon":"밀기·당기기를 '세게/약하게'로만 구분하는 경우. 힘의 <b>방향<\/b>(나에게서 멀어짐/가까워짐)으로 잡아줄 것."},{"type":"선택형","q":"똑같이 생긴 상자 두 개가 있다. 어느 것이 더 무거운지 정확히 알려면?","choices":["① 크기를 잰다","② 색을 본다","③ 저울에 올려 본다","④ 흔들어 본다"],"answer":"③","checks":"무게 비교에 저울이 필요함","miscon":"'큰 것이 무겁다'는 선개념이 매우 강함. 같은 크기의 스타이로폼과 쇠구슬로 반례를 보여줄 것."},{"type":"서답형","q":"무거운 물건을 옮길 때 더 쉽게 옮기려고 사용해 본 도구가 있으면 쓰고, 어떻게 편해졌는지 쓰시오.","answer":"예) 수레를 썼더니 들지 않고 밀 수 있어 편했다 / 미끄럼틀 같은 경사판을 썼더니 힘이 덜 들었다","checks":"도구 사용 경험(선개념)","miscon":"경험을 떠올리지 못하면 교실의 빗자루·가위·병따개 등 주변 도구에서 출발시킬 것."}]},"form":{"items":[{"level":"하","code":"4과01-01","q":"수레를 밀 때와 당길 때의 움직이는 방향을 각각 쓰시오.","answer":"밀면 나에게서 멀어지는 방향으로, 당기면 나에게 가까워지는 방향으로 움직인다.","rubric":"두 방향을 모두 바르게 쓰면 도달."},{"level":"중","code":"4과01-02","q":"시소에 무게가 다른 두 친구가 앉아 수평을 이루려고 한다. 더 무거운 친구는 받침점에서 어떻게 앉아야 하는지 쓰고, 그 까닭을 쓰시오.","answer":"더 무거운 친구가 받침점에 가까이 앉아야 한다. 무거운 쪽이 가까이 앉으면 아래로 누르는 정도가 줄어들어 양쪽이 균형을 이루기 때문이다.","rubric":"'가까이 앉는다' 1점 + 균형을 이루는 까닭 설명 1점. 실제 수평잡기 활동 경험을 근거로 들어도 인정."},{"level":"상","code":"4과01-04","q":"무거운 짐을 트럭에 올릴 때 빗면(경사판)을 쓰면 좋은 점을 쓰고, 우리 주변에서 빗면을 이용한 예를 하나 찾아 쓰시오.","answer":"직접 들어 올릴 때보다 작은 힘으로 올릴 수 있다. 예: 휠체어 경사로, 미끄럼틀, 산길의 굽은 도로 등","rubric":"작은 힘으로 올릴 수 있다는 점(1점) + 알맞은 사례(1점). ※도구의 원리(일의 양)는 다루지 않음."}]}},"e34-02":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"다음 동물 중 <b>날개가 있는<\/b> 동물끼리 묶은 것은?","choices":["① 참새, 나비","② 개구리, 붕어","③ 뱀, 거북","④ 개, 고양이"],"answer":"①","checks":"관찰 가능한 특징으로 묶기","miscon":"'새만 난다'고 생각해 곤충을 빼는 경우. 날개가 있는 여러 무리를 함께 보여줄 것."},{"type":"선택형","q":"물속에서 사는 동물은?","choices":["① 붕어","② 참새","③ 다람쥐","④ 나비"],"answer":"①","checks":"서식지에 대한 선개념","miscon":"개구리처럼 물·땅 모두 사는 동물을 어디에 넣을지 혼란스러워함. 이 단계에서는 대표 서식지로 다루면 충분."},{"type":"서답형","q":"내가 알고 있는 동물 세 가지를 쓰고, 그중 둘을 같은 무리로 묶을 수 있는 기준을 하나 쓰시오.","answer":"예) 참새·비둘기·개구리 → 참새와 비둘기는 '날개가 있다'는 기준으로 묶을 수 있다.","checks":"분류 기준을 스스로 세우는 경험","miscon":"'귀엽다/무섭다' 같은 주관적 기준을 세우는 경우. 누가 봐도 같게 판단할 수 있는 기준이어야 함을 지도."}]},"form":{"items":[{"level":"하","code":"4과02-01","q":"다음 동물을 '다리가 있는 것'과 '다리가 없는 것'으로 분류하시오.\n개미, 뱀, 사슴, 지렁이","answer":"다리가 있는 것: 개미, 사슴 / 다리가 없는 것: 뱀, 지렁이","rubric":"4마리를 모두 바르게 분류하면 도달."},{"level":"중","code":"4과02-01","q":"동물을 분류할 때 사용할 수 있는 좋은 기준을 두 가지 쓰고, '예쁘다'가 분류 기준으로 알맞지 <b>않은<\/b> 까닭을 쓰시오.","answer":"예) 날개가 있는가 / 다리가 몇 개인가 / 알을 낳는가 등. '예쁘다'는 사람마다 판단이 달라 누가 분류해도 같은 결과가 나오지 않으므로 알맞지 않다.","rubric":"알맞은 기준 2가지(1점) + 주관적 기준의 문제점 설명(1점)."},{"level":"상","code":"4과02-02","q":"사막에 사는 낙타의 생김새 특징을 한 가지 쓰고, 그 특징이 사막에서 사는 데 어떻게 도움이 되는지 설명하시오.","answer":"예) 등에 혹이 있어 양분을 저장할 수 있어 먹이가 부족해도 오래 버틴다 / 속눈썹이 길어 모래바람으로부터 눈을 보호한다 / 발바닥이 넓어 모래에 잘 빠지지 않는다","rubric":"생김새 특징(1점) + 환경과 관련지은 설명(1점). ※'적응' 용어는 요구하지 않음."}]}},"e34-03":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"다음 중 식물이 <b>아닌<\/b> 것은?","choices":["① 소나무","② 민들레","③ 버섯","④ 은행나무"],"answer":"③","checks":"식물에 대한 선개념","miscon":"버섯을 식물로 아는 오개념이 매우 흔함. 이 단원에서는 '잎·줄기·뿌리가 있는가'로 구분해 주면 충분."},{"type":"선택형","q":"연잎처럼 물 위에 떠서 사는 식물을 볼 수 있는 곳은?","choices":["① 사막","② 연못","③ 갯벌 위 바위","④ 눈 덮인 산꼭대기"],"answer":"②","checks":"서식지에 대한 선개념","miscon":"식물은 모두 흙에서만 자란다고 생각하는 경우. 물·바위 등 다양한 곳을 사진으로 보여줄 것."},{"type":"서답형","q":"내가 본 나뭇잎 중 서로 다르게 생긴 잎 두 가지를 떠올려, 어떻게 다른지 쓰시오.","answer":"예) 은행잎은 부채 모양이고 끝이 갈라져 있는데, 소나무 잎은 가늘고 뾰족한 바늘 모양이다.","checks":"잎의 외형 관찰 경험","miscon":"색으로만 비교하는 경우. 모양·가장자리·크기 등 형태 특징에 주목시킬 것."}]},"form":{"items":[{"level":"하","code":"4과03-01","q":"다음 잎을 '끝이 뾰족한 바늘 모양'과 '넓적한 모양'으로 분류하시오.\n소나무 잎, 은행잎, 잣나무 잎, 단풍잎","answer":"바늘 모양: 소나무 잎, 잣나무 잎 / 넓적한 모양: 은행잎, 단풍잎","rubric":"4가지를 모두 바르게 분류하면 도달."},{"level":"중","code":"4과03-01","q":"여러 가지 잎을 분류할 수 있는 기준을 두 가지 쓰시오.","answer":"예) 잎의 가장자리가 톱니 모양인가 매끈한가 / 잎맥이 나란한가 그물 모양인가 / 잎이 한 장인가 여러 장으로 나뉘는가 / 크기가 큰가 작은가","rubric":"관찰로 판단할 수 있는 기준 2가지를 쓰면 도달. '예쁘다' 등 주관적 기준은 미도달."},{"level":"상","code":"4과03-02","q":"선인장이 사막에서 살 수 있는 까닭을 생김새와 관련지어 두 가지 설명하시오.","answer":"①줄기가 굵고 통통해 물을 많이 저장할 수 있다 ②잎이 가시로 되어 있어 물이 빠져나가는 것을 줄이고 동물이 먹지 못하게 막는다","rubric":"생김새 특징 2가지와 각각의 도움을 연결(각 1점). ※'적응' 용어는 요구하지 않음."}]}},"e34-04":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"강낭콩 씨를 심었을 때 싹이 트려면 꼭 필요한 것은?","choices":["① 물","② 소리","③ 바람","④ 소금"],"answer":"①","checks":"발아 조건에 대한 선개념","miscon":"'햇빛이 없으면 싹이 안 튼다'고 생각하는 경우가 많음. 씨가 <b>싹트는<\/b> 데는 물과 온도가 필요함(햇빛은 자란 뒤 필요)."},{"type":"선택형","q":"배추흰나비가 알에서 어른벌레가 되기까지 거치는 단계가 <b>아닌<\/b> 것은?","choices":["① 애벌레","② 번데기","③ 어른벌레","④ 씨앗"],"answer":"④","checks":"한살이 단계에 대한 선개념","miscon":"동물과 식물의 한살이를 섞어 생각하는 경우."},{"type":"서답형","q":"내가 길러 보았거나 본 적 있는 동물이나 식물이 자라는 모습을 떠올려, 어떻게 변했는지 쓰시오.","answer":"예) 강낭콩을 심었더니 싹이 나고 잎이 두 장 나온 뒤 점점 키가 커지고 꽃이 피었다.","checks":"생물의 성장 관찰 경험","miscon":"'그냥 커졌다'는 답에 머무는 경우. 단계별 변화에 주목시킬 것."}]},"form":{"items":[{"level":"하","code":"4과04-01","q":"배추흰나비의 한살이 단계를 순서대로 쓰시오.","answer":"알 → 애벌레 → 번데기 → 어른벌레","rubric":"4단계 순서를 모두 맞히면 도달."},{"level":"중","code":"4과04-02","q":"씨가 싹트는 데 물이 필요한지 알아보는 실험을 하려고 한다. 다르게 해야 할 조건과 같게 해야 할 조건을 각각 쓰시오.","answer":"다르게: 물을 주는 것과 주지 않는 것 / 같게: 씨의 종류와 개수, 온도, 그릇, 놓아두는 장소 등","rubric":"다르게 할 조건 정확(1점) + 같게 할 조건 2가지 이상(1점). 변인 통제의 기초."},{"level":"상","code":"4과04-03","q":"한해살이 식물과 여러해살이 식물의 차이를 쓰고, 각각의 예를 하나씩 드시오.","answer":"한해살이 식물은 한 해 동안 싹이 터서 자라고 꽃과 열매를 맺은 뒤 죽는다(예: 벼, 강낭콩, 옥수수). 여러해살이 식물은 여러 해 동안 살면서 해마다 꽃과 열매를 맺는다(예: 감나무, 사과나무, 개나리).","rubric":"차이 설명(1점) + 알맞은 예 각 1개(1점)."}]}},"e34-05":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"'물체'와 '물질'에 대한 설명으로 알맞은 것은?","choices":["① 컵은 물체, 유리는 물질이다","② 유리는 물체, 컵은 물질이다","③ 둘은 같은 말이다","④ 물질은 눈에 보이지 않는다"],"answer":"①","checks":"물체와 물질의 구분(선개념)","miscon":"두 낱말을 같은 뜻으로 쓰는 경우가 대부분. '무엇으로 만들었나'가 물질임을 반복해 짚을 것."},{"type":"선택형","q":"공기처럼 담는 그릇에 따라 모양이 변하고, 그릇 전체를 채우는 것은 어떤 상태인가?","choices":["① 고체","② 액체","③ 기체","④ 알 수 없다"],"answer":"③","checks":"기체의 성질(선개념)","miscon":"'공기는 아무것도 없는 것'이라는 오개념. 부풀린 풍선·비닐봉지로 공간을 차지함을 확인시킬 것."},{"type":"서답형","q":"책상 위 물건 하나를 골라, 그것이 무엇으로 만들어졌는지 쓰시오.","answer":"예) 자 - 플라스틱으로 만들어졌다 / 가위 - 금속과 플라스틱으로 만들어졌다","checks":"물체를 이루는 물질 찾기","miscon":"물건 이름만 반복해 쓰는 경우. '무엇으로'라는 질문에 초점을 맞추게 할 것."}]},"form":{"items":[{"level":"하","code":"4과05-02","q":"고체·액체·기체 중 <b>모양과 부피가 모두 일정한<\/b> 것은 무엇인지 쓰시오.","answer":"고체","rubric":"고체라고 답하면 도달."},{"level":"중","code":"4과05-02","q":"물을 여러 모양의 그릇에 차례로 옮겨 담았다. 이때 모양과 부피(양)는 각각 어떻게 되는지 쓰시오.","answer":"모양은 그릇에 따라 변하지만, 부피(양)는 변하지 않는다.","rubric":"모양 변함(1점) + 부피 일정(1점). ※한 물질이 여러 상태로 존재한다는 내용은 다루지 않음."},{"level":"상","code":"4과05-03","q":"비 오는 날 쓰는 우산을 만들 때, 우산 천과 우산대에 알맞은 물질을 각각 고르고 그 까닭을 쓰시오.","answer":"우산 천: 물이 스며들지 않는 방수 천(비닐·나일론) - 물을 통과시키지 않아야 하므로. 우산대: 금속이나 단단한 플라스틱 - 튼튼해서 바람에 잘 부러지지 않아야 하므로.","rubric":"두 부분의 물질 선택(1점) + 물질의 성질과 쓰임새를 연결한 까닭(1점)."}]}},"e34-06":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"바닷물을 맛보면 어떤 맛이 나는가?","choices":["① 단맛","② 짠맛","③ 신맛","④ 아무 맛도 없다"],"answer":"②","checks":"바닷물의 특징(선개념)","miscon":"바다가 파란 이유를 '물이 파래서'로 아는 경우. 이 문항은 맛(염분)에 초점."},{"type":"선택형","q":"지구 표면에서 바다와 육지 중 더 넓은 것은?","choices":["① 바다","② 육지","③ 똑같다","④ 알 수 없다"],"answer":"①","checks":"지구 표면 구성(선개념)","miscon":"지도를 평면으로만 봐서 육지가 넓다고 생각하는 경우. 지구본으로 확인시킬 것."},{"type":"서답형","q":"바닷가에 가 본 경험을 떠올려, 바닷물이 들어오고 나가는 것을 본 적이 있는지 쓰시오.","answer":"예) 아침에는 물이 멀리 있었는데 낮에는 가까이 들어와 모래사장이 좁아졌다.","checks":"밀물·썰물 경험(선개념)","miscon":"경험이 없으면 갯벌 체험 영상으로 대체. ※조석의 원인은 다루지 않음."}]},"form":{"items":[{"level":"하","code":"4과06-03","q":"바닷물이 육지 쪽으로 밀려 들어오는 것과 바다 쪽으로 빠져나가는 것을 각각 무엇이라 하는지 쓰시오.","answer":"밀려 들어오는 것: 밀물 / 빠져나가는 것: 썰물","rubric":"두 낱말을 바르게 쓰면 도달."},{"level":"중","code":"4과06-02","q":"바닷물과 강물의 다른 점을 한 가지 쓰고, 바닷가에서 볼 수 있는 지형을 하나 쓰시오.","answer":"바닷물은 짠맛이 나지만 강물은 나지 않는다. 바닷가 지형: 모래사장(해변), 갯벌, 절벽(해식 절벽), 바위섬 등","rubric":"차이점(1점) + 지형 1가지(1점). ※침식·운반·퇴적 작용은 다루지 않음."},{"level":"상","code":"4과06-03","q":"갯벌을 보전해야 하는 까닭을 두 가지 쓰고, 친구들에게 알릴 홍보 문구를 한 줄 만드시오.","answer":"①조개·게·물새 등 많은 생물이 사는 삶터이다 ②오염 물질을 걸러 바닷물을 깨끗하게 해 준다(또는 태풍·해일의 피해를 줄여 준다). 문구 예: \"갯벌은 바다의 콩팥, 우리가 지켜요!\"","rubric":"까닭 2가지(각 1점) + 홍보 문구(1점)."}]}},"e34-07":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"소리가 나고 있는 스피커에 손을 대면 어떤 느낌이 드는가?","choices":["① 차갑다","② 떨림이 느껴진다","③ 무겁다","④ 아무 느낌이 없다"],"answer":"②","checks":"소리와 떨림(선개념)","miscon":"소리를 '공기'나 '바람'으로 생각하는 경우. 직접 만져보는 활동이 가장 효과적."},{"type":"선택형","q":"다음 중 <b>큰 소리<\/b>를 내는 방법으로 알맞은 것은?","choices":["① 북을 세게 친다","② 북을 살살 친다","③ 북을 만지기만 한다","④ 북을 뒤집는다"],"answer":"①","checks":"소리의 세기(선개념)","miscon":"'큰 소리'와 '높은 소리'를 같은 말로 쓰는 경우가 매우 흔함. 이 단원에서 반드시 구분시킬 것."},{"type":"서답형","q":"교실에서 나는 소리 중 <b>높은 소리<\/b>와 <b>낮은 소리<\/b>의 예를 각각 하나씩 쓰시오.","answer":"예) 높은 소리: 실로폰의 짧은 음판 소리, 호루라기 소리 / 낮은 소리: 북소리, 큰 북 소리","checks":"소리의 높낮이 구분","miscon":"'높다=크다'로 혼동. 목소리를 직접 높였다 낮췄다 하며 크기와 다름을 체험시킬 것."}]},"form":{"items":[{"level":"하","code":"4과07-01","q":"소리가 나는 물체의 공통점은 무엇인지 쓰시오.","answer":"떨린다(떨림이 있다).","rubric":"'떨린다'는 뜻을 쓰면 도달."},{"level":"중","code":"4과07-02","q":"실로폰에서 음판의 길이에 따라 소리의 높낮이가 어떻게 달라지는지 쓰시오.","answer":"음판이 짧을수록 높은 소리가 나고, 길수록 낮은 소리가 난다.","rubric":"길이와 높낮이의 관계를 바르게 쓰면 도달. 세기와 혼동하면 미도달."},{"level":"상","code":"4과07-03","q":"우리 교실이나 학교에서 소음을 줄일 수 있는 방법을 두 가지 제안하시오.","answer":"예) ①의자 다리에 소음 방지 패드를 붙인다 ②복도에서 뛰지 않고 걷는다 ③문을 살살 닫는다 ④두꺼운 커튼을 달아 소리를 막는다","rubric":"실천 가능한 방법 2가지(각 1점). 소리가 물체를 통해 전달되는 것을 막거나 소리의 세기를 줄이는 방향이면 인정. ※전달 원리는 다루지 않음."}]}},"e34-08":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"감기에 걸린 친구가 기침을 할 때 알맞은 행동은?","choices":["① 손으로 입을 가리고 그대로 친구와 논다","② 옷소매로 입을 가리고 기침한다","③ 가리지 않고 기침한다","④ 친구 얼굴 가까이에서 기침한다"],"answer":"②","checks":"기침 예절(선개념)","miscon":"손으로 가리는 것이 가장 좋다고 배운 경우가 많음. 손은 다시 물건을 만지므로 옷소매가 권장됨을 설명."},{"type":"선택형","q":"손을 씻어야 하는 때로 알맞지 <b>않은<\/b> 것은?","choices":["① 밥 먹기 전","② 화장실 다녀온 뒤","③ 바깥에서 놀고 온 뒤","④ 손을 씻은 직후 다시"],"answer":"④","checks":"손 씻기 습관","miscon":"손 씻기를 '더러워 보일 때만' 하는 것으로 아는 경우. 눈에 안 보여도 필요함을 강조."},{"type":"서답형","q":"내가 아팠던 경험을 떠올려, 어떤 증상이 있었고 어떻게 나았는지 쓰시오.","answer":"예) 열이 나고 목이 아파서 병원에 가서 약을 먹고 푹 쉬었더니 나았다.","checks":"질병 경험(선개념)","miscon":"질병을 '운이 나빠서'로 여기는 경우. 원인과 예방으로 시선을 옮길 것."}]},"form":{"items":[{"level":"하","code":"4과08-03","q":"감염병을 예방하기 위한 생활 수칙을 두 가지 쓰시오.","answer":"예) 손을 자주 깨끗이 씻는다 / 기침할 때 옷소매로 가린다 / 아프면 쉬고 병원에 간다 / 예방접종을 받는다 / 환기를 자주 한다","rubric":"알맞은 수칙 2가지를 쓰면 도달."},{"level":"중","code":"4과08-02","q":"기침이나 재채기로 병이 옮는 것을 무엇이라 하는지 쓰고, 이를 막기 위한 방법을 하나 쓰시오.","answer":"비말 감염(침방울로 옮음). 막는 방법: 마스크 쓰기, 옷소매로 가리고 기침하기, 거리 두기 등","rubric":"감염 방식(1점) + 예방 방법(1점). 용어가 정확하지 않아도 '침방울로 옮는다'는 뜻이면 인정."},{"level":"상","code":"4과08-02","q":"우리 반에서 감염병이 잘 퍼지지 않게 하려면 어떤 생활 습관이 필요한지, <b>감염이 옮는 과정<\/b>과 연결지어 두 가지 제안하시오.","answer":"예) ①손 씻기 - 손으로 만진 물건을 통해 옮는 접촉 감염을 막을 수 있다 ②기침 예절과 환기 - 침방울이나 공기를 통해 옮는 것을 줄일 수 있다","rubric":"습관 2가지(각 0.5점) + 각각을 감염 경로와 연결(각 1점). ※면역 반응은 다루지 않음."}]}},"e34-09":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"자석에 붙는 물체는?","choices":["① 나무 젓가락","② 철 클립","③ 유리컵","④ 플라스틱 자"],"answer":"②","checks":"자석에 붙는 물질(선개념)","miscon":"'반짝이는 금속은 다 붙는다'는 오개념. 알루미늄 캔·구리선은 붙지 않음을 직접 확인시킬 것."},{"type":"선택형","q":"자석 두 개를 가까이 했더니 서로 밀어냈다. 이때 마주 댄 극은?","choices":["① N극과 S극","② 같은 극끼리","③ 극이 없다","④ 알 수 없다"],"answer":"②","checks":"자석의 극(선개념)","miscon":"'자석은 항상 붙는다'고 생각하는 경우. 밀어내는 경험이 놀라움을 주므로 탐구 동기로 활용."},{"type":"서답형","q":"우리 집이나 교실에서 자석이 쓰이는 곳을 하나 찾아 쓰시오.","answer":"예) 냉장고 문, 칠판에 붙이는 자석, 필통 뚜껑, 가방 잠금장치 등","checks":"자석의 이용 경험","miscon":"자석을 '장난감'으로만 아는 경우. 생활 속 쓰임을 찾게 할 것."}]},"form":{"items":[{"level":"하","code":"4과09-01","q":"자석에 붙는 물체와 붙지 않는 물체로 분류하시오.\n철못, 지우개, 클립, 종이","answer":"붙는 것: 철못, 클립 / 붙지 않는 것: 지우개, 종이","rubric":"4가지를 모두 바르게 분류하면 도달."},{"level":"중","code":"4과09-02","q":"막대자석의 N극에 다른 막대자석의 N극을 가까이하면 어떻게 되는지 쓰고, S극을 가까이하면 어떻게 되는지 쓰시오.","answer":"N극과 N극(같은 극)끼리는 서로 밀어내고, N극과 S극(다른 극)끼리는 서로 끌어당긴다.","rubric":"같은 극 밀어냄(1점) + 다른 극 끌어당김(1점). ※자기장 개념은 도입하지 않음."},{"level":"상","code":"4과09-03","q":"자석을 이용해 생활을 편리하게 하는 장치를 하나 생각해 내고, 어떤 점이 편리한지 설명하시오.","answer":"예) 바닥에 떨어진 클립을 줍는 자석 막대 - 허리를 굽히지 않고 한 번에 여러 개를 모을 수 있다 / 자석 필통 - 뚜껑이 저절로 닫혀 물건이 쏟아지지 않는다","rubric":"장치 아이디어(1점) + 자석의 성질을 이용한 편리한 점 설명(1점)."}]}},"e34-10":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"냉동실에 넣어 둔 물이 단단하게 변했다. 이 상태는?","choices":["① 고체","② 액체","③ 기체","④ 없어진 것"],"answer":"①","checks":"물의 세 가지 상태(선개념)","miscon":"얼음을 물과 완전히 다른 물질로 생각하는 경우. 같은 물이 상태만 바뀐 것임을 강조."},{"type":"선택형","q":"빨래를 널어 두면 마르는 까닭은?","choices":["① 물이 옷 속으로 숨어서","② 물이 수증기가 되어 공기 중으로 날아가서","③ 물이 사라져서","④ 옷이 물을 먹어서"],"answer":"②","checks":"증발(선개념)","miscon":"'물이 없어졌다'는 오개념이 매우 흔함. 눈에 보이지 않을 뿐 공기 중에 있음을 짚을 것."},{"type":"서답형","q":"겨울에 유리창이 뿌옇게 되거나 물방울이 맺힌 것을 본 경험을 쓰시오.","answer":"예) 추운 날 버스 창문 안쪽이 뿌옇게 되고 손으로 닦으면 물기가 묻어났다.","checks":"응결 경험(선개념)","miscon":"'창문에서 물이 새어 나왔다'고 생각하는 경우. 공기 중 수증기가 원인임을 이후 실험으로 확인."}]},"form":{"items":[{"level":"하","code":"4과10-01","q":"물의 세 가지 상태를 각각 무엇이라 하는지 쓰고, 우리 주변에서 볼 수 있는 예를 하나씩 쓰시오.","answer":"고체-얼음(빙하, 고드름) / 액체-물(강물, 빗물) / 기체-수증기(끓는 주전자 주변, 공기 중 수증기)","rubric":"세 상태 이름(1점) + 알맞은 예(1점)."},{"level":"중","code":"4과10-02","q":"물이 얼어 얼음이 될 때 부피와 무게는 각각 어떻게 되는지 쓰시오.","answer":"부피는 늘어나고, 무게는 변하지 않는다.","rubric":"부피 증가(1점) + 무게 일정(1점). ※상태가 변하는 까닭은 다루지 않고 관찰 결과만 다룸."},{"level":"상","code":"4과10-03","q":"바닷물처럼 마실 수 없는 물에서 마실 수 있는 물을 얻는 장치를 설계하려고 한다. 물의 어떤 상태 변화를 이용할지 쓰고, 장치가 어떻게 작동할지 설명하시오.","answer":"증발(기화)과 응결을 이용한다. 바닷물을 햇빛이 잘 드는 곳에 두면 물이 수증기가 되어 올라가고, 이 수증기가 차가운 비닐이나 뚜껑에 닿아 물방울로 맺힌다(응결). 그 물방울을 모으면 소금기 없는 물을 얻을 수 있다.","rubric":"증발과 응결을 모두 언급(2점) + 물방울을 모으는 구조 설명(1점)."}]}},"e34-11":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"비가 많이 온 뒤 흙길이 파이거나 흙이 아래로 쓸려 내려간 것을 본 적이 있다. 이렇게 만든 것은?","choices":["① 바람","② 흐르는 물","③ 햇빛","④ 자석"],"answer":"②","checks":"흐르는 물의 작용(선개념)","miscon":"땅 모양은 변하지 않는다고 생각하는 경우. 짧은 시간의 변화(비 온 뒤)부터 보여줄 것."},{"type":"선택형","q":"화산이 분출할 때 나오는 것이 <b>아닌<\/b> 것은?","choices":["① 용암","② 화산 가스","③ 화산재","④ 얼음"],"answer":"④","checks":"화산 분출물(선개념)","miscon":"화산을 영화 이미지로만 알아 용암만 떠올리는 경우. 기체·화산재도 함께 다룰 것."},{"type":"서답형","q":"지진이 났을 때 어떻게 해야 하는지 아는 대로 쓰시오.","answer":"예) 책상 아래로 들어가 머리를 보호하고, 흔들림이 멈추면 계단으로 밖의 넓은 곳으로 나간다.","checks":"지진 대처 선지식","miscon":"엘리베이터를 타려는 경우가 많음. 반드시 계단 이용을 강조."}]},"form":{"items":[{"level":"하","code":"4과11-03","q":"현무암과 화강암을 관찰했을 때 알갱이의 크기가 더 <b>큰<\/b> 것은 무엇인지 쓰시오.","answer":"화강암","rubric":"화강암이라고 답하면 도달. ※화성암은 현무암과 화강암만 다룸."},{"level":"중","code":"4과11-01","q":"강의 상류와 하류에 있는 돌의 모양과 크기가 어떻게 다른지 비교하여 쓰시오.","answer":"상류의 돌은 크고 모난 모양이 많고, 하류의 돌은 작고 둥근 모양이 많다.","rubric":"크기와 모양을 모두 비교하면 도달."},{"level":"상","code":"4과11-04","q":"화산 활동이 우리 생활에 주는 <b>피해<\/b>와 <b>이로운 점<\/b>을 각각 하나씩 쓰시오.","answer":"피해: 용암과 화산재가 마을·농작물을 덮치고, 화산재가 하늘을 덮어 비행기가 뜨지 못한다. 이로운 점: 화산 주변의 땅이 기름져 농사가 잘되고, 온천이나 지열 발전을 이용할 수 있다.","rubric":"피해 1가지(1점) + 이로운 점 1가지(1점). ※지진 발생 원인은 다루지 않음."}]}},"e34-12":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"빵이나 떡을 오래 두었을 때 생기는 푸르스름하고 솜털 같은 것은?","choices":["① 곰팡이","② 먼지","③ 얼음","④ 소금"],"answer":"①","checks":"곰팡이 경험(선개념)","miscon":"곰팡이를 '더러운 먼지'로 아는 경우. 살아 있는 생물임을 알려줄 것."},{"type":"선택형","q":"세균에 대한 설명으로 알맞은 것은?","choices":["① 모두 사람에게 해롭다","② 맨눈으로 잘 보인다","③ 이로운 것도 있다","④ 살아 있지 않다"],"answer":"③","checks":"세균에 대한 선개념","miscon":"'세균=나쁜 것'이라는 인식이 강함. 요구르트·김치 등 발효 식품으로 이로운 면을 보여줄 것."},{"type":"서답형","q":"현미경을 써 본 적이 있다면 무엇을 보았는지 쓰고, 없다면 무엇을 보고 싶은지 쓰시오.","answer":"예) 양파 껍질을 보았더니 벽돌처럼 생긴 칸이 여러 개 보였다.","checks":"관찰 도구 경험","miscon":"맨눈으로 안 보이면 없는 것으로 여기는 경우. 도구로 보이는 세계가 있음을 안내."}]},"form":{"items":[{"level":"하","code":"4과12-01","q":"곰팡이와 버섯이 잘 자라는 환경 조건을 두 가지 쓰시오.","answer":"따뜻하고 축축한(습한) 곳에서 잘 자란다. 또 어둡고 양분이 있는 곳에서 잘 자란다.","rubric":"두 가지 조건을 쓰면 도달."},{"level":"중","code":"4과12-02","q":"균류·원생생물·세균이 우리 생활에 주는 <b>이로운 영향<\/b>과 <b>해로운 영향<\/b>을 각각 하나씩 쓰시오.","answer":"이로운 점: 요구르트·김치·된장 등 발효 식품을 만들고, 죽은 생물을 분해해 자연을 깨끗하게 한다. 해로운 점: 음식을 상하게 하거나 질병을 일으킨다.","rubric":"이로운 점(1점) + 해로운 점(1점)."},{"level":"상","code":"4과12-03","q":"우리 생활에서 생명과학이 이용되는 사례를 하나 조사해 쓰고, 그것이 왜 도움이 되는지 설명하시오.","answer":"예) 곰팡이에서 얻은 항생제로 세균이 일으킨 병을 치료한다 - 예전에는 낫기 어려웠던 병을 고칠 수 있게 되었다. / 세균을 이용해 오염된 물을 깨끗하게 만든다.","rubric":"사례(1점) + 도움이 되는 까닭(1점)."}]}},"e34-13":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"밤하늘에서 달의 모양이 날마다 조금씩 달라 보인 적이 있다. 다음 중 달의 모양이 <b>아닌<\/b> 것은?","choices":["① 보름달","② 반달","③ 초승달","④ 네모난 달"],"answer":"④","checks":"달의 모양 관찰(선개념)","miscon":"달이 구름에 가려 모양이 변한다고 생각하는 경우. ※이 학년에서는 위상변화의 <b>원인<\/b>은 다루지 않음."},{"type":"선택형","q":"태양처럼 <b>스스로 빛을 내는<\/b> 천체를 무엇이라 하는가?","choices":["① 별","② 행성","③ 달","④ 구름"],"answer":"①","checks":"별의 정의(선개념)","miscon":"밤에 보이는 밝은 점을 모두 '별'이라 부르는 일상 어법. 스스로 빛을 내는지로 구분시킬 것."},{"type":"서답형","q":"밤하늘에서 본 것 중 기억에 남는 것을 쓰고, 어떤 모습이었는지 쓰시오.","answer":"예) 보름달이 아주 밝고 둥글었고, 표면에 얼룩덜룩한 무늬가 보였다.","checks":"밤하늘 관찰 경험","miscon":"관찰 경험이 없으면 달 사진이나 천문 앱으로 대체할 것."}]},"form":{"items":[{"level":"하","code":"4과13-02","q":"태양계를 이루는 행성 중 세 가지를 쓰시오.","answer":"수성, 금성, 지구, 화성, 목성, 토성, 천왕성, 해왕성 중 세 가지","rubric":"행성 3개를 바르게 쓰면 도달. 달·태양을 행성으로 쓰면 미도달."},{"level":"중","code":"4과13-03","q":"별과 행성의 차이를 쓰고, 북극성을 찾을 때 이용하는 별자리를 하나 쓰시오.","answer":"별은 스스로 빛을 내지만 행성은 스스로 빛을 내지 못하고 태양 빛을 반사해 빛나 보인다. 북극성은 북두칠성이나 카시오페이아자리를 이용해 찾을 수 있다.","rubric":"별과 행성의 차이(1점) + 별자리 이름(1점). ※계절별 별자리와는 관련짓지 않음."},{"level":"상","code":"4과13-01","q":"한 달 동안 달을 관찰하며 기록하는 계획을 세우려고 한다. 무엇을, 언제, 어떻게 기록할지 구체적으로 쓰시오.","answer":"예) 매일 같은 시각(밤 8시)에 같은 장소에서 달을 보고, 달의 모양을 그림으로 그리고 날짜를 적는다. 보이지 않는 날은 '흐림'이라고 적는다. 한 달 뒤 그림을 순서대로 늘어놓아 모양이 어떻게 변했는지 살펴본다.","rubric":"관찰 대상(모양)(1점) + 같은 시각·장소 등 조건 통제(1점) + 기록 방법(1점)."}]}},"e34-14":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"다음 중 살아 있는 것(생물)이 <b>아닌<\/b> 것은?","choices":["① 개구리","② 소나무","③ 바위","④ 지렁이"],"answer":"③","checks":"생물과 비생물 구분(선개념)","miscon":"움직이는 것만 생물로 보아 식물을 비생물로 넣는 경우가 있음."},{"type":"선택형","q":"'토끼가 풀을 먹고, 여우가 토끼를 먹는다.' 이런 관계를 무엇이라 하는가?","choices":["① 먹고 먹히는 관계","② 친구 관계","③ 도와주는 관계","④ 관계가 없다"],"answer":"①","checks":"먹이 관계(선개념)","miscon":"'힘센 동물이 이긴다'는 승부 개념으로 이해하는 경우. 에너지가 이동하는 관계로 볼 수 있게 안내."},{"type":"서답형","q":"우리 주변에서 환경이 더러워진 모습을 본 경험을 쓰고, 그것이 생물에게 어떤 영향을 줄지 생각해 쓰시오.","answer":"예) 하천에 쓰레기가 떠 있었다. 물고기가 쓰레기를 먹거나 물이 더러워져 살기 어려울 것이다.","checks":"환경오염 경험(선개념)","miscon":"오염을 '보기 싫은 것'으로만 인식. 생물의 생존과 연결시킬 것."}]},"form":{"items":[{"level":"하","code":"4과14-01","q":"다음을 생물 요소와 비생물 요소로 분류하시오.\n메뚜기, 햇빛, 개구리, 물","answer":"생물 요소: 메뚜기, 개구리 / 비생물 요소: 햇빛, 물","rubric":"4가지를 모두 바르게 분류하면 도달."},{"level":"중","code":"4과14-02","q":"'벼 → 메뚜기 → 개구리 → 뱀'과 같이 먹고 먹히는 관계가 사슬처럼 이어진 것을 무엇이라 하는지 쓰고, 여러 사슬이 얽힌 것을 무엇이라 하는지 쓰시오.","answer":"먹이사슬 / 먹이그물","rubric":"두 용어를 바르게 쓰면 도달."},{"level":"상","code":"4과14-02","q":"먹이 관계가 <b>복잡할수록<\/b> 생물이 살아남는 데 유리한 까닭을 설명하시오.","answer":"먹이 관계가 복잡하면 한 종류의 먹이가 줄어들어도 다른 먹이를 먹고 살 수 있기 때문에 생물이 살아남기 유리하다. 반대로 먹이사슬이 단순하면 한 생물이 사라졌을 때 다른 생물도 함께 위험해진다.","rubric":"대체 먹이가 있어 유리함(2점) + 단순할 때의 위험과 대비(1점)."}]}},"e34-15":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"공기에 대한 설명으로 알맞은 것은?","choices":["① 아무것도 없는 것이다","② 무게가 있다","③ 눈에 보인다","④ 공간을 차지하지 않는다"],"answer":"②","checks":"기체의 무게(선개념)","miscon":"'공기는 없는 것'이라는 오개념이 매우 강함. 정밀 저울로 공기를 넣은 공과 뺀 공을 비교해 보여줄 것."},{"type":"선택형","q":"여름철 자전거 타이어에 공기를 가득 넣고 뙤약볕에 두면?","choices":["① 타이어가 더 팽팽해진다","② 타이어가 쭈그러든다","③ 변화가 없다","④ 공기가 사라진다"],"answer":"①","checks":"온도에 따른 기체 부피(선개념)","miscon":"'더우면 공기가 빠진다'고 생각하는 경우. 부피가 커진다는 관찰로 교정."},{"type":"서답형","q":"풍선을 불었을 때 풍선이 커지는 까닭을 자기 말로 쓰시오.","answer":"내가 불어 넣은 공기가 풍선 안에 들어가 공간을 차지하며 밀어내기 때문이다.","checks":"기체가 공간을 차지함","miscon":"'입김의 힘으로 늘어난다'고만 답하는 경우. 공기가 안에 '들어 있다'는 데 초점."}]},"form":{"items":[{"level":"하","code":"4과15-03","q":"우리 생활에서 이용되는 기체를 두 가지 쓰고, 각각 어디에 쓰이는지 쓰시오.","answer":"예) 산소-병원에서 환자의 호흡을 돕는 데 / 이산화 탄소-소화기, 탄산음료에 / 질소-과자 봉지 충전에 / 헬륨-풍선에","rubric":"기체 2가지와 각 쓰임을 쓰면 도달."},{"level":"중","code":"4과15-02","q":"찌그러진 탁구공을 뜨거운 물에 넣으면 다시 펴진다. 그 까닭을 기체의 부피와 관련지어 쓰시오.","answer":"뜨거운 물에 넣으면 탁구공 안 공기의 온도가 높아져 부피가 커지고, 그 공기가 안쪽에서 밀어내어 찌그러진 부분이 펴진다.","rubric":"온도 상승(1점) + 부피 증가로 밀어냄(1점). ※정성적 수준까지만 다룸."},{"level":"상","code":"4과15-04","q":"기체의 성질을 이용해 움직이는 장치를 하나 설계하고, 어떤 성질을 이용했는지 설명하시오.","answer":"예) 풍선 자동차 - 풍선에 공기를 넣었다가 놓으면 공기가 빠져나가면서 그 반대 방향으로 자동차가 나아간다. 기체가 공간을 차지하고 밀어내는 성질을 이용했다.","rubric":"장치 설계(1점) + 이용한 기체의 성질을 바르게 설명(2점)."}]}},"e34-16":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"'날씨'와 '기후'에 대한 설명으로 알맞은 것은?","choices":["① 오늘 비가 오는 것은 날씨이다","② 오늘 비가 오는 것은 기후이다","③ 둘은 같은 말이다","④ 기후는 하루마다 바뀐다"],"answer":"①","checks":"날씨와 기후 구분(선개념)","miscon":"둘을 같은 말로 쓰는 경우가 대부분. 기후는 여러 해 동안의 평균적인 모습임을 짚을 것."},{"type":"선택형","q":"기후변화로 나타나는 현상으로 알맞지 <b>않은<\/b> 것은?","choices":["① 빙하가 녹는다","② 폭염이 잦아진다","③ 해수면이 높아진다","④ 밤과 낮이 사라진다"],"answer":"④","checks":"기후변화 현상(선개념)","miscon":"기후변화를 '날씨가 이상한 것' 정도로만 아는 경우. 구체적 현상과 연결시킬 것."},{"type":"서답형","q":"예전보다 여름이 더 덥거나 겨울이 덜 춥다고 느낀 적이 있는지, 주변 어른께 들은 이야기를 포함해 쓰시오.","answer":"예) 할머니께서 예전에는 겨울에 강이 꽁꽁 얼어 썰매를 탔는데 요즘은 잘 얼지 않는다고 하셨다.","checks":"기후변화 체감 경험","miscon":"하루의 날씨 변화와 혼동하지 않도록 '여러 해에 걸친 변화'로 안내."}]},"form":{"items":[{"level":"하","code":"4과16-01","q":"기후변화가 일어나는 데 영향을 준 인간의 활동을 두 가지 쓰시오.","answer":"예) 자동차·공장에서 화석연료를 많이 사용한다 / 숲을 없애 개발한다 / 쓰레기를 많이 태운다 / 전기를 많이 쓴다","rubric":"인간 활동 2가지를 쓰면 도달."},{"level":"중","code":"4과16-02","q":"기후변화가 우리 생활에 미치는 영향을 두 가지 쓰시오.","answer":"예) 폭염·한파 등 극단적인 날씨가 늘어 건강이 나빠진다 / 농작물이 잘 자라지 않아 먹거리 값이 오른다 / 집중호우·태풍으로 피해를 입는다 / 모기 같은 해충이 늘어난다","rubric":"생활과 연결된 영향 2가지(각 1점). '지구가 더워진다'만 쓰면 1점."},{"level":"상","code":"4과16-03","q":"우리 반이 함께 실천할 수 있는 기후변화 대응 방법을 하나 정하고, 그 방법이 왜 도움이 되는지 설명하시오.","answer":"예) 교실을 나갈 때 불 끄기 - 전기를 만들 때 화석연료를 태워 온실가스가 나오는데, 전기를 아끼면 그만큼 온실가스를 줄일 수 있다.","rubric":"실천 방법(1점) + 온실가스·에너지와 연결한 까닭(2점). 방법만 쓰면 1점."}]}},"e56-01":{"diag":{"from":"초3~4 「땅의 변화」","items":[{"type":"선택형","q":"흐르는 물이 오랜 시간 동안 하는 일이 <b>아닌<\/b> 것은?","choices":["① 땅을 깎는다","② 흙과 돌을 옮긴다","③ 옮긴 것을 쌓는다","④ 돌을 녹여 없앤다"],"answer":"④","checks":"흐르는 물의 작용 [4과11-01]","miscon":"물이 돌을 '녹인다'고 표현하는 학생이 있음. 깎임(침식)과 녹음(용해)을 구분해 줄 것."},{"type":"선택형","q":"화강암과 현무암을 관찰했을 때 구멍이 숭숭 뚫려 있는 것은?","choices":["① 화강암","② 현무암","③ 둘 다","④ 둘 다 아니다"],"answer":"②","checks":"화성암 관찰 [4과11-03]","miscon":"암석 이름만 외우고 실물 특징과 연결하지 못하는 경우. 표본을 직접 만져보게 할 것."},{"type":"서답형","q":"산을 깎아 만든 도로 옆에서 줄무늬가 여러 층으로 보이는 것을 본 적이 있는가? 어떤 모습이었는지 쓰시오.","answer":"예) 색과 두께가 다른 줄이 가로로 여러 겹 쌓여 있었다.","checks":"지층 관찰 경험(선개념)","miscon":"경험이 없으면 사진 자료로 대체. 줄무늬가 '그려진 것'이 아니라 쌓인 결과임을 안내."}]},"form":{"items":[{"level":"하","code":"6과01-02","q":"퇴적암을 알갱이의 크기가 <b>작은 것부터<\/b> 순서대로 쓰시오.\n(사암, 이암, 역암)","answer":"이암 → 사암 → 역암","rubric":"순서를 바르게 쓰면 도달. ※퇴적암은 이암·사암·역암만 다룸."},{"level":"중","code":"6과01-01","q":"지층이 만들어지는 과정을 순서대로 설명하시오.","answer":"물에 의해 운반된 자갈·모래·진흙 등이 바다나 호수 바닥에 쌓이고, 그 위에 새로운 퇴적물이 계속 쌓인다. 오랜 시간 동안 눌리고 굳어져 층이 만들어지며, 땅이 솟아오르고 깎이면 지층이 드러난다.","rubric":"퇴적물이 쌓임(1점) + 오랜 시간 눌려 굳어짐(1점) + 층이 겹겹이 만들어짐(1점)."},{"level":"상","code":"6과01-03","q":"높은 산에서 조개 화석이 발견되었다. 이 지역이 옛날에 어떤 곳이었을지 추리하고, 그렇게 생각한 까닭을 쓰시오.","answer":"옛날에는 바다였을 것이다. 조개는 바다나 물속에 사는 생물인데 그 화석이 발견되었으므로, 그곳이 물속이었다가 땅이 솟아올라 산이 되었다고 추리할 수 있다.","rubric":"과거 환경 추리(1점) + 화석 생물의 서식지를 근거로 제시(2점)."}]}},"e56-02":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"깜깜한 방에서 물체가 보이지 않는 까닭은?","choices":["① 물체가 사라져서","② 빛이 없어서","③ 눈이 감겨서","④ 물체가 작아서"],"answer":"②","checks":"물체를 보는 데 빛이 필요함","miscon":"'눈에서 무언가 나가서 본다'는 오개념. 빛이 눈으로 들어와야 보인다는 방향을 잡아줄 것."},{"type":"선택형","q":"거울에 비친 내 모습에 대한 설명으로 알맞은 것은?","choices":["① 좌우가 바뀌어 보인다","② 위아래가 바뀌어 보인다","③ 색이 바뀌어 보인다","④ 크기가 항상 커진다"],"answer":"①","checks":"거울에 대한 선개념","miscon":"거울 속 상을 '진짜 물체'로 여기는 경우. 글씨를 비춰 좌우가 바뀌는 것을 확인시킬 것."},{"type":"서답형","q":"돋보기로 무언가를 본 경험이 있으면 어떻게 보였는지 쓰시오.","answer":"예) 개미가 훨씬 크게 보였고, 멀리 떼면 거꾸로 보이기도 했다.","checks":"렌즈 경험(선개념)","miscon":"확대만 된다고 알고 있는 경우. 거리에 따라 다르게 보임을 관찰시킬 것."}]},"form":{"items":[{"level":"하","code":"6과02-02","q":"빛이 곧게 나아가는 성질을 무엇이라 하는지 쓰고, 그 예를 하나 쓰시오.","answer":"직진. 예: 손전등 불빛이 곧게 뻗어 나감, 그림자가 생김, 나뭇잎 사이로 들어온 햇빛이 곧게 보임","rubric":"용어와 예를 모두 쓰면 도달."},{"level":"중","code":"6과02-02","q":"물이 담긴 컵에 젓가락을 넣었더니 꺾여 보였다. 이는 빛의 어떤 성질 때문인지 쓰고, 실제로 젓가락이 꺾인 것인지 쓰시오.","answer":"빛의 굴절 때문이다. 젓가락이 실제로 꺾인 것이 아니라, 물과 공기의 경계에서 빛이 꺾여 나아가기 때문에 그렇게 보이는 것이다.","rubric":"굴절 용어(1점) + 실제로는 꺾이지 않음(1점). ※굴절 법칙은 다루지 않음."},{"level":"상","code":"6과02-03","q":"거울이나 렌즈를 이용해 생활을 편리하게 하는 장치를 하나 설계하고, 어떤 성질을 이용했는지 설명하시오.","answer":"예) 잠망경 - 거울 두 개를 비스듬히 넣어 빛의 반사를 두 번 이용하면 담장 너머를 볼 수 있다. / 자동차 뒷거울 - 빛의 반사를 이용해 뒤를 볼 수 있다.","rubric":"장치 설계(1점) + 반사 또는 굴절 성질을 바르게 연결(2점)."}]}},"e56-03":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"물에 설탕을 넣고 저었더니 보이지 않게 되었다. 설탕은 어떻게 되었는가?","choices":["① 사라졌다","② 물속에 골고루 퍼져 있다","③ 물로 변했다","④ 바닥에 그대로 있다"],"answer":"②","checks":"용해에 대한 선개념","miscon":"'녹으면 없어진다'는 오개념이 매우 강함. 맛보기·무게 재기로 확인시킬 것."},{"type":"선택형","q":"다음 중 물에 잘 녹지 <b>않는<\/b> 것은?","choices":["① 소금","② 설탕","③ 밀가루","④ 코코아 가루"],"answer":"③","checks":"용질에 대한 선개념","miscon":"뿌옇게 퍼지는 것을 모두 '녹았다'고 보는 경우. 가라앉는지 관찰하고 거름 실험으로 구분."},{"type":"서답형","q":"따뜻한 물과 차가운 물 중 설탕이 더 잘 녹는 쪽은 어디일지 예상해 쓰고, 그렇게 생각한 까닭을 쓰시오.","answer":"따뜻한 물. 예) 코코아를 탈 때 따뜻한 물에서 더 잘 풀렸던 경험이 있어서.","checks":"온도와 용해량 예상","miscon":"예상 근거를 못 대면 일상 경험(코코아·꿀물)에서 출발시킬 것."}]},"form":{"items":[{"level":"하","code":"6과03-01","q":"소금물에서 소금, 물, 소금물을 각각 무엇이라 하는지 쓰시오.","answer":"소금 - 용질 / 물 - 용매 / 소금물 - 용액","rubric":"세 용어를 모두 바르게 쓰면 도달."},{"level":"중","code":"6과03-01","q":"물의 온도에 따라 백반이 녹는 양이 어떻게 달라지는지 알아보는 실험에서, 같게 해야 할 조건을 두 가지 쓰시오.","answer":"물의 양, 백반의 양(넣는 방법), 젓는 횟수와 시간, 비커의 크기 등","rubric":"통제해야 할 조건 2가지를 쓰면 도달. 온도를 '같게'라고 쓰면 미도달(다르게 할 조건)."},{"level":"상","code":"6과03-02","q":"진하기가 다른 두 설탕물이 있다. 색이 같아 눈으로 구분할 수 없을 때, 어느 쪽이 더 진한지 알아내는 방법을 쓰고 그 원리를 설명하시오.","answer":"방울토마토나 메추리알 같은 같은 물체를 각각 넣어 본다. 더 진한 용액일수록 물체가 더 높이 뜨므로, 물체가 위로 뜨는 쪽이 더 진한 용액이다.","rubric":"같은 물체를 띄우는 방법(1점) + 진할수록 더 높이 뜬다는 원리(2점). ※입자 모형·원리 설명은 다루지 않음."}]}},"e56-04":{"diag":{"from":"초3~4 「동물의 생활」·「생물의 한살이」","items":[{"type":"선택형","q":"동물이 살아가려면 반드시 필요한 것이 <b>아닌<\/b> 것은?","choices":["① 먹이","② 공기","③ 물","④ 장난감"],"answer":"④","checks":"생물의 생존 조건(선개념)","miscon":"생물이 살아가는 데 필요한 것과 편의를 구분하지 못하는 경우."},{"type":"선택형","q":"우리 몸에서 먹은 음식이 가장 먼저 들어가는 곳은?","choices":["① 위","② 입","③ 작은창자","④ 폐"],"answer":"②","checks":"소화의 시작(선개념)","miscon":"소화를 위에서 시작한다고 생각하는 경우. 입에서 씹고 침과 섞이는 것부터임을 짚을 것."},{"type":"서답형","q":"운동을 하고 난 뒤 우리 몸에 어떤 변화가 나타나는지 두 가지 쓰시오.","answer":"예) 숨이 가빠진다, 심장이 빨리 뛴다, 땀이 난다, 얼굴이 붉어진다, 목이 마르다","checks":"몸의 변화 관찰 경험","miscon":"변화의 까닭까지는 몰라도 됨. 관찰한 사실을 표현하는 데 초점."}]},"form":{"items":[{"level":"하","code":"6과04-02","q":"다음 기관이 속한 곳을 소화·순환·호흡·배설 중에서 골라 쓰시오.\n위, 심장, 폐, 콩팥","answer":"위-소화 / 심장-순환 / 폐-호흡 / 콩팥-배설","rubric":"4가지를 모두 바르게 연결하면 도달."},{"level":"중","code":"6과04-01","q":"팔을 굽힐 때 뼈와 근육이 어떻게 움직이는지 설명하시오.","answer":"근육은 뼈에 붙어 있는데, 안쪽 근육이 줄어들면(수축하면) 뼈를 잡아당겨 팔이 굽혀진다. 근육이 스스로 늘어나 미는 것이 아니라 줄어들면서 당기는 것이다.","rubric":"근육이 줄어들며 뼈를 당김(2점) + 뼈가 움직여 팔이 굽음(1점). '근육이 밀어서'라고 쓰면 감점."},{"level":"상","code":"6과04-02","q":"달리기를 할 때 소화·순환·호흡 기관이 어떻게 함께 일하는지 설명하시오.","answer":"소화 기관에서 흡수한 음식물의 양분과 호흡 기관(폐)에서 받아들인 산소를, 순환 기관(심장·혈관)이 혈액을 통해 온몸의 근육으로 보낸다. 근육은 이를 이용해 움직일 힘을 얻고, 이때 생긴 이산화 탄소는 다시 혈액을 타고 폐로 가서 몸 밖으로 나간다.","rubric":"세 기관의 역할 언급(2점) + 서로 연결되어 작동함을 설명(1점)."}]}},"e56-05":{"diag":{"from":"초3~4 「물체와 물질」","items":[{"type":"선택형","q":"물질의 성질에 대한 설명으로 알맞은 것은?","choices":["① 물질마다 성질이 다르다","② 모든 물질의 성질은 같다","③ 물질의 성질은 눈으로만 알 수 있다","④ 물질의 성질은 바뀌지 않는 것이 없다"],"answer":"①","checks":"물질의 성질 [4과05-01]","miscon":"'성질'이라는 말이 추상적이라 어려워함. 단단함·투명함·물에 뜸 등 구체적 성질로 예시할 것."},{"type":"선택형","q":"고체와 액체가 섞여 있을 때, 고체만 걸러내는 데 쓰는 도구는?","choices":["① 거름종이와 깔때기","② 자","③ 온도계","④ 자석"],"answer":"①","checks":"거르기에 대한 선개념","miscon":"모든 분리를 거르기로 해결하려는 경향이 있음. 녹아 있는 것은 걸러지지 않음을 이후에 확인."},{"type":"서답형","q":"쌀에 섞인 콩을 골라낸 경험이 있다면 어떻게 골라냈는지 쓰시오.","answer":"예) 손으로 하나씩 골라냈다 / 체에 쳐서 크기가 큰 콩만 남겼다","checks":"분리 경험(선개념)","miscon":"'손으로 고른다'에 머물면, 더 빠른 방법(체·자석 등)을 고민하게 유도."}]},"form":{"items":[{"level":"하","code":"6과05-01","q":"알갱이의 크기가 다른 고체 혼합물(예: 콩과 좁쌀)을 분리하는 데 알맞은 도구를 쓰시오.","answer":"체","rubric":"체(체 거름)라고 답하면 도달."},{"level":"중","code":"6과05-01","q":"물과 식용유가 섞인 혼합물을 분리하는 방법을 쓰고, 분리할 수 있는 까닭을 쓰시오.","answer":"가만히 두면 두 층으로 나뉘므로 위층의 식용유를 따라내거나 스포이트로 빨아낸다. 물과 식용유는 서로 섞이지 않고, 식용유가 물보다 가벼워 위로 뜨기 때문이다.","rubric":"분리 방법(1점) + 섞이지 않고 층이 생기는 까닭(1점)."},{"level":"상","code":"6과05-02","q":"소금과 모래가 섞인 혼합물에서 소금만 얻으려고 한다. 분리 과정을 순서대로 쓰고, 각 단계에서 이용한 성질을 쓰시오.","answer":"①물을 넣고 저어 소금만 녹인다(소금은 물에 녹고 모래는 녹지 않는 성질) ②거름종이로 걸러 모래를 걸러낸다(녹지 않은 고체는 걸러지는 성질) ③거른 소금물을 가열하거나 햇볕에 두어 물을 증발시키면 소금이 남는다(물은 증발하고 소금은 남는 성질)","rubric":"3단계 순서(2점) + 각 단계에서 이용한 성질(1점)."}]}},"e56-06":{"diag":{"from":"초3~4 「지구와 바다」·「기후변화와 우리 생활」","items":[{"type":"선택형","q":"지구를 둘러싸고 있는 공기층을 무엇이라 하는가?","choices":["① 대기","② 바다","③ 육지","④ 지층"],"answer":"①","checks":"대기 [4과06-01]","miscon":"공기를 '없는 것'으로 여기는 경우. 지구를 감싸는 층으로 그림으로 보여줄 것."},{"type":"선택형","q":"오늘 날씨를 알아볼 때 살펴보는 것이 <b>아닌<\/b> 것은?","choices":["① 기온","② 바람","③ 구름의 양","④ 내 키"],"answer":"④","checks":"기상 요소(선개념)","miscon":"날씨를 '맑음/흐림'으로만 표현하는 경우. 측정 가능한 요소로 넓혀줄 것."},{"type":"서답형","q":"날씨에 따라 우리 생활이 달라지는 예를 두 가지 쓰시오.","answer":"예) 비 오는 날엔 우산을 챙기고 야외 활동을 미룬다 / 더운 날엔 얇은 옷을 입고 물을 많이 마신다 / 눈 오는 날엔 차가 천천히 다닌다","checks":"날씨와 생활의 관계","miscon":"옷차림만 떠올리면 농사·교통·안전 등으로 확장시킬 것."}]},"form":{"items":[{"level":"하","code":"6과06-01","q":"날씨를 나타내는 기상 요소를 세 가지 쓰시오.","answer":"기온, 바람, 습도, 구름의 양, 강수량 중 세 가지","rubric":"기상 요소 3가지를 쓰면 도달."},{"level":"중","code":"6과06-02","q":"이슬, 안개, 구름의 공통점을 쓰고, 세 가지가 만들어지는 위치의 차이를 쓰시오.","answer":"공통점: 모두 공기 중 수증기가 응결하여 생긴 물방울이다. 차이: 이슬은 풀잎 등 물체 표면에, 안개는 지표면 가까운 공기 중에, 구름은 높은 하늘에 생긴다.","rubric":"공통점(응결)(1점) + 위치 차이(2점). ※단열 팽창은 다루지 않음."},{"level":"상","code":"6과06-03","q":"고기압과 저기압 중 맑은 날씨가 나타나는 쪽을 쓰고, 바람이 어느 쪽에서 어느 쪽으로 부는지 쓰시오.","answer":"고기압에서 맑은 날씨가 나타난다. 바람은 고기압에서 저기압 쪽으로 분다.","rubric":"맑은 쪽(1점) + 바람의 방향(2점). ※현상 중심으로만 다룸."}]}},"e56-07":{"diag":{"from":"초3~4 「물의 상태 변화」","items":[{"type":"선택형","q":"물이 끓어 수증기가 되는 것처럼, 물질의 상태가 변하는 예가 <b>아닌<\/b> 것은?","choices":["① 얼음이 녹는다","② 물이 언다","③ 빨래가 마른다","④ 종이를 반으로 자른다"],"answer":"④","checks":"상태 변화 [4과10-01]","miscon":"모양이 변하는 것과 상태가 변하는 것을 혼동."},{"type":"선택형","q":"뜨거운 손난로를 손에 쥐고 있으면 손이 따뜻해진다. 이때 이동한 것은?","choices":["① 열","② 물","③ 공기","④ 빛"],"answer":"①","checks":"열의 이동(선개념)","miscon":"'따뜻함이 옮겨온다'는 표현은 괜찮으나, 반대로 '차가움이 이동한다'는 오개념은 교정 필요."},{"type":"서답형","q":"온도를 나타낼 때 쓰는 단위를 쓰고, 온도를 재는 도구의 이름을 쓰시오.","answer":"단위: ℃(섭씨도), 도구: 온도계","checks":"온도의 표현(선개념)","miscon":"'뜨겁다/차갑다'로만 표현하는 데서 수치화로 넘어가는 단계임을 안내."}]},"form":{"items":[{"level":"하","code":"6과07-01","q":"온도를 측정할 때 온도계를 어떻게 읽어야 하는지 쓰시오.","answer":"온도계의 눈금과 눈높이를 맞추어 액체 기둥의 끝이 가리키는 눈금을 읽는다.","rubric":"눈높이를 맞춘다는 내용이 있으면 도달."},{"level":"중","code":"6과07-02","q":"따뜻한 물이 담긴 그릇에 차가운 음료수 캔을 넣었을 때, 시간이 지나면서 두 물체의 온도가 어떻게 변하는지 쓰고 그 원인을 쓰시오.","answer":"따뜻한 물의 온도는 낮아지고 차가운 캔의 온도는 높아져서 결국 두 물체의 온도가 같아진다. 온도가 높은 물체에서 낮은 물체로 열이 이동하기 때문이다.","rubric":"두 물체의 온도 변화(1점) + 결국 같아짐(1점) + 열의 이동 방향(1점)."},{"level":"상","code":"6과07-04","q":"음료를 오랫동안 차갑게 유지하는 통을 만들려고 한다. 어떤 재료를 어떻게 쓸지 설계하고, 그 까닭을 단열과 관련지어 설명하시오.","answer":"예) 통을 스타이로폼이나 두꺼운 천으로 감싸고 뚜껑을 꼭 닫는다. 스타이로폼은 열이 잘 이동하지 않는 물질이라 바깥의 열이 음료로 들어오는 것을 막아 주기 때문이다(단열).","rubric":"재료와 구조 설계(1점) + 열의 이동을 막는다는 단열 개념으로 설명(2점)."}]}},"e56-08":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"우리가 생활에서 쓰는 자원이 <b>아닌<\/b> 것은?","choices":["① 물","② 나무","③ 석유","④ 소문"],"answer":"④","checks":"자원의 뜻(선개념)","miscon":"'자원'을 광물로만 아는 경우. 물·숲·에너지까지 포함함을 안내."},{"type":"선택형","q":"전기를 만들 때 온실가스가 가장 적게 나오는 방법은?","choices":["① 석탄을 태운다","② 석유를 태운다","③ 태양광을 이용한다","④ 가스를 태운다"],"answer":"③","checks":"에너지원에 대한 선개념","miscon":"전기를 '콘센트에서 저절로 나오는 것'으로 여기는 경우. 발전 과정을 보여줄 것."},{"type":"서답형","q":"우리 집이나 교실에서 전기를 아끼기 위해 하고 있는 일을 쓰시오.","answer":"예) 나갈 때 불을 끈다 / 안 쓰는 플러그를 뽑는다 / 냉방 온도를 적당히 맞춘다","checks":"에너지 절약 실천 경험","miscon":"실천을 '귀찮은 일'로만 여기지 않도록 자원의 유한함과 연결시킬 것."}]},"form":{"items":[{"level":"하","code":"6과08-02","q":"재생에너지의 종류를 세 가지 쓰시오.","answer":"태양 에너지, 풍력, 수력, 해양 에너지, 지열 에너지, 바이오 에너지 중 세 가지","rubric":"재생에너지 3가지를 쓰면 도달. 석탄·석유를 쓰면 미도달."},{"level":"중","code":"6과08-01","q":"자원이 '유한하다'는 것이 무슨 뜻인지 쓰고, 그렇게 말할 수 있는 자원의 예를 하나 드시오.","answer":"양이 정해져 있어 계속 사용하면 언젠가 바닥난다는 뜻이다. 예: 석유, 석탄, 금속 광물 등","rubric":"유한함의 뜻(1점) + 알맞은 예(1점)."},{"level":"상","code":"6과08-03","q":"우리 학교에서 자원이나 에너지를 효율적으로 쓸 수 있는 방법을 두 가지 제안하고, 각각 어떤 자원을 얼마나 아낄 수 있을지 설명하시오.","answer":"예) ①양치할 때 컵을 사용한다 - 물을 틀어 놓을 때보다 물을 훨씬 적게 쓴다 ②이면지를 활용한다 - 종이를 아껴 나무(산림 자원)를 보호할 수 있다","rubric":"방법 2가지(각 1점) + 어떤 자원을 아끼는지 연결(1점)."}]}},"e56-09":{"diag":{"from":"초3~4 「물체와 물질」","items":[{"type":"선택형","q":"레몬즙, 식초처럼 신맛이 나는 용액의 공통점으로 알맞은 것은?","choices":["① 모두 색이 같다","② 모두 신맛이 난다","③ 모두 미끌미끌하다","④ 모두 물에 뜬다"],"answer":"②","checks":"용액의 성질에 대한 선개념","miscon":"용액을 색으로만 구분하려는 경향. 맛·촉감 등 여러 성질로 관찰하게 할 것(단, 함부로 맛보지 않도록 안전 지도)."},{"type":"선택형","q":"물질마다 성질이 다르다는 것을 보여주는 예로 알맞은 것은?","choices":["① 나무는 물에 뜨고 철은 가라앉는다","② 모든 물질은 물에 뜬다","③ 모든 물질은 단단하다","④ 물질의 성질은 모두 같다"],"answer":"①","checks":"물질의 성질 비교 [4과05-01]","miscon":"'성질'을 추상적으로만 이해. 뜨고 가라앉음·단단함 등 관찰 가능한 성질로 예시할 것."},{"type":"서답형","q":"집에서 청소할 때 쓰는 세제나 비누를 만졌을 때 어떤 느낌이었는지 쓰시오.","answer":"예) 미끌미끌하고 손이 매끄러워졌다.","checks":"염기성 용액의 촉감(선개념)","miscon":"경험이 없으면 비누·베이킹소다 물을 만져보게 하여 산성과의 차이를 느끼게 할 것."}]},"form":{"items":[{"level":"하","code":"6과09-01","q":"붉은 리트머스 종이를 푸르게 변화시키는 용액은 산성 용액과 염기성 용액 중 어느 것인지 쓰시오.","answer":"염기성 용액","rubric":"염기성이라고 답하면 도달."},{"level":"중","code":"6과09-02","q":"산성 용액인 묽은 염산에 대리석 조각을 넣었을 때 나타나는 변화를 쓰고, 이 성질 때문에 문화재를 보호해야 하는 까닭을 쓰시오.","answer":"거품(기포)이 발생하며 대리석이 녹아 깎여 나간다. 대리석으로 만든 석탑·석상은 산성비를 맞으면 이런 반응으로 손상되므로 유리 보호막을 씌우는 등 보호가 필요하다.","rubric":"기포 발생·녹음 관찰(1점) + 산성비와 문화재 손상 연결(1점). ※산성=탄산 칼슘과 반응하는 성질 중심."},{"level":"상","code":"6과09-02","q":"묽은 염산에 묽은 수산화 나트륨 용액을 조금씩 계속 넣으면서 붉은 양배추 지시약의 색 변화를 관찰했다. 색이 어떻게 변할지 예상하고, 그렇게 변하는 까닭을 쓰시오.","answer":"처음에는 산성이라 붉은색 계열이었다가, 염기성 용액을 넣을수록 점점 보라색을 거쳐 푸른색·노란색 계열로 변한다. 산성 용액과 염기성 용액이 섞이면서 서로의 성질을 약하게 만들기 때문이다.","rubric":"색이 단계적으로 변함(1점) + 두 용액이 서로의 성질을 약화시킴(2점). '중화'라는 용어는 요구하지 않음."}]}},"e56-10":{"diag":{"from":"초3~4 「힘과 우리 생활」","items":[{"type":"선택형","q":"물체를 밀거나 당길 때 나타나는 현상으로 알맞은 것은?","choices":["① 물체의 색이 변한다","② 물체가 움직이거나 모양이 변한다","③ 물체가 사라진다","④ 아무 변화가 없다"],"answer":"②","checks":"힘의 작용 [4과01-01]","miscon":"힘을 '힘이 센 것'으로만 이해. 움직임·모양 변화라는 결과로 설명하게 할 것."},{"type":"선택형","q":"두 물체 중 어느 것이 더 무거운지 알아보는 방법으로 가장 정확한 것은?","choices":["① 눈으로 크기를 본다","② 손으로 들어 본다","③ 저울로 잰다","④ 색을 비교한다"],"answer":"③","checks":"저울을 이용한 무게 비교 [4과01-03]","miscon":"감각(손으로 들기)에 의존. 측정 도구의 필요성을 인식시킬 것."},{"type":"서답형","q":"친구와 달리기를 했을 때 누가 더 빠른지 어떻게 알 수 있었는지 쓰시오.","answer":"예) 같은 거리를 달렸을 때 먼저 도착한 사람이 더 빠르다 / 같은 시간 동안 더 멀리 간 사람이 더 빠르다.","checks":"빠르기 비교에 대한 선개념","miscon":"'다리가 길어서'처럼 원인만 말하는 경우. 거리와 시간이라는 두 요소로 판단하게 유도."}]},"form":{"items":[{"level":"하","code":"6과10-02","q":"200m를 40초에 달린 사람의 속력을 구하시오.","answer":"200 ÷ 40 = 5 (m/s)","rubric":"5 m/s를 구하면 도달. 단위를 빠뜨려도 값이 맞으면 인정."},{"level":"중","code":"6과10-01","q":"운동하는 물체를 관찰할 때 '위치가 변한다'는 것을 어떻게 확인할 수 있는지, 기준을 무엇으로 삼아야 하는지 포함하여 쓰시오.","answer":"시간이 지남에 따라 물체가 어디에 있는지를 비교하면 된다. 이때 건물이나 표지판처럼 움직이지 않는 것을 기준으로 삼아, 처음 위치와 나중 위치를 비교하면 위치가 변했음을 알 수 있다.","rubric":"시간에 따른 위치 비교(1점) + 움직이지 않는 기준의 필요성(1점). ※두 위치 사이의 거리 계산은 요구하지 않음."},{"level":"상","code":"6과10-03","q":"학교 앞 도로의 제한 속력이 시속 30km인 까닭을 속력과 관련지어 설명하고, 우리가 실천할 수 있는 교통안전 수칙을 하나 쓰시오.","answer":"속력이 빠를수록 위험을 발견하고 멈추기까지 필요한 거리가 길어지고 부딪혔을 때 충격도 커진다. 학교 앞은 어린이가 갑자기 나올 수 있으므로 속력을 낮춰야 사고를 막고 피해를 줄일 수 있다. 실천: 횡단보도에서는 멈춰 서서 좌우를 살피고 건넌다.","rubric":"속력과 정지 거리·충격의 관계(2점) + 실천 수칙(1점)."}]}},"e56-11":{"diag":{"from":"초3~4 「식물의 생활」·「생물의 한살이」","items":[{"type":"선택형","q":"식물이 자라는 데 필요한 조건으로 알맞게 짝지어진 것은?","choices":["① 물과 햇빛","② 소리와 바람","③ 어둠과 추위","④ 소금과 모래"],"answer":"①","checks":"식물이 자라는 조건 [4과04-02]","miscon":"흙에서 모든 양분을 얻는다고 생각. 잎에서 양분을 만든다는 이후 학습으로 연결."},{"type":"선택형","q":"식물을 분류할 때 사용할 수 있는 기준으로 알맞은 것은?","choices":["① 잎의 모양","② 예쁜 정도","③ 이름의 길이","④ 좋아하는 정도"],"answer":"①","checks":"식물 분류 기준 [4과03-01]","miscon":"주관적 기준을 세우는 경우. 누가 봐도 같게 판단되는 기준이어야 함을 강조."},{"type":"서답형","q":"식물의 각 부분(뿌리, 줄기, 잎) 중 하나를 골라, 그 부분이 어떻게 생겼는지 관찰한 대로 쓰시오.","answer":"예) 뿌리는 가늘고 여러 갈래로 갈라져 있으며 흙속으로 뻗어 있다.","checks":"식물 기관 관찰 경험","miscon":"부분의 이름만 알고 생김새를 관찰한 적 없는 경우. 실물 관찰로 시작할 것."}]},"form":{"items":[{"level":"하","code":"6과11-01","q":"현미경으로 양파 표피 세포를 관찰했을 때 볼 수 있는 세포의 구조를 두 가지 쓰시오.","answer":"핵, 세포막, 세포벽 중 두 가지","rubric":"두 가지를 바르게 쓰면 도달. ※세포 구조는 핵·세포막·세포벽을 용어 수준에서만 다룸."},{"level":"중","code":"6과11-02","q":"식물의 뿌리, 줄기, 잎이 하는 일을 각각 한 가지씩 쓰시오.","answer":"뿌리: 물을 흡수하고 식물을 땅에 고정한다 / 줄기: 물과 양분이 이동하는 통로이며 식물을 지지한다 / 잎: 양분을 만들고, 물을 수증기로 내보낸다(증산 작용)","rubric":"세 기관의 기능을 각각 바르게 쓰면 도달(각 1점)."},{"level":"상","code":"6과11-02","q":"잎이 달린 가지와 잎을 모두 딴 가지를 각각 물에 꽂고 비닐봉지를 씌워 두었다. 어느 쪽 비닐봉지 안에 물방울이 더 많이 맺힐지 예상하고, 그 까닭을 식물 기관의 연결과 관련지어 설명하시오.","answer":"잎이 달린 가지 쪽에 물방울이 더 많이 맺힌다. 뿌리(또는 줄기 아랫부분)에서 흡수된 물이 줄기를 통해 잎까지 이동한 뒤, 잎에서 수증기로 빠져나가기 때문이다. 잎이 없으면 물이 빠져나갈 통로가 거의 없어 물방울이 적게 맺힌다.","rubric":"예상 정확(1점) + 물의 이동 경로(뿌리→줄기→잎)(1점) + 잎에서 수증기로 나감(1점)."}]}},"e56-12":{"diag":{"from":"초3~4 「밤하늘 관찰」","items":[{"type":"선택형","q":"밤하늘에서 스스로 빛을 내는 천체는?","choices":["① 달","② 별","③ 구름","④ 인공위성"],"answer":"②","checks":"별의 정의 [4과13-03]","miscon":"달과 행성을 별로 부르는 일상 어법. 스스로 빛을 내는지로 구분시킬 것."},{"type":"선택형","q":"북극성을 찾을 때 이용하면 좋은 별자리는?","choices":["① 북두칠성","② 오리온자리","③ 백조자리","④ 전갈자리"],"answer":"①","checks":"북극성 주변 별자리 [4과13-03]","miscon":"별자리를 모양으로만 외우고 위치 찾기에 활용하지 못하는 경우."},{"type":"서답형","q":"하루 동안 태양이 하늘에서 어떻게 움직이는 것처럼 보이는지 쓰시오.","answer":"동쪽에서 떠서 남쪽 하늘을 지나 서쪽으로 지는 것처럼 보인다.","checks":"태양의 위치 변화 관찰 경험","miscon":"'태양이 실제로 움직인다'고 생각하는 경우. 이 단원에서 지구 자전으로 설명할 것."}]},"form":{"items":[{"level":"하","code":"6과12-02","q":"지구가 하루에 한 바퀴 스스로 도는 것을 무엇이라 하는지 쓰시오.","answer":"자전","rubric":"자전이라고 답하면 도달."},{"level":"중","code":"6과12-02","q":"낮과 밤이 생기는 까닭을 지구의 자전과 관련지어 설명하시오.","answer":"지구가 자전하기 때문에 태양 빛을 받는 쪽은 낮이 되고, 태양 빛을 받지 못하는 반대쪽은 밤이 된다. 지구가 계속 돌면서 낮과 밤이 번갈아 나타난다.","rubric":"자전 언급(1점) + 빛을 받는 쪽/못 받는 쪽 구분(1점) + 번갈아 나타남(1점)."},{"level":"상","code":"6과12-03","q":"계절에 따라 밤하늘에 보이는 별자리가 달라지는 까닭을 지구의 공전으로 설명하시오.","answer":"지구가 태양 둘레를 공전하면서 계절마다 지구의 위치가 달라진다. 그러면 밤이 되는 쪽(태양 반대쪽)에서 보이는 하늘의 방향이 달라지므로, 계절에 따라 보이는 별자리가 바뀐다. 태양 쪽에 있는 별자리는 낮에 떠 있어 볼 수 없다.","rubric":"공전으로 지구 위치가 변함(1점) + 밤에 보이는 방향이 달라짐(1점) + 태양 쪽 별자리는 못 봄(1점)."}]}},"e56-13":{"diag":{"from":"초3~4 「밤하늘 관찰」","items":[{"type":"선택형","q":"하루 중 그림자가 가장 짧은 때는 언제인가?","choices":["① 아침","② 낮 12시 무렵(태양이 가장 높이 떴을 때)","③ 저녁","④ 밤"],"answer":"②","checks":"태양 고도와 그림자에 대한 선개념","miscon":"경험적으로 알지만 '태양 고도'라는 말과 연결하지 못하는 경우."},{"type":"선택형","q":"여름과 겨울 중 낮의 길이가 더 긴 계절은?","choices":["① 여름","② 겨울","③ 같다","④ 알 수 없다"],"answer":"①","checks":"계절과 낮의 길이(선개념)","miscon":"경험으로는 알지만 원인을 '지구가 태양에 가까워서'로 오해하는 경우가 많음."},{"type":"서답형","q":"여름과 겨울에 햇빛이 교실 안으로 들어오는 정도가 어떻게 다른지 관찰한 경험을 쓰시오.","answer":"예) 겨울에는 햇빛이 교실 안쪽 깊숙이 들어오고, 여름에는 창가 근처까지만 들어온다.","checks":"태양 고도 변화 체감","miscon":"관찰 경험이 없으면 남향 창가에서 계절별 그림자 길이를 비교해 보게 할 것."}]},"form":{"items":[{"level":"하","code":"6과13-01","q":"하루 동안 태양 고도가 높아질 때 그림자의 길이는 어떻게 변하는지 쓰시오.","answer":"짧아진다.","rubric":"짧아진다고 답하면 도달."},{"level":"중","code":"6과13-02","q":"여름과 겨울의 태양의 남중 고도와 낮의 길이를 비교하여 쓰시오.","answer":"여름에는 남중 고도가 높고 낮의 길이가 길다. 겨울에는 남중 고도가 낮고 낮의 길이가 짧다.","rubric":"두 계절의 남중 고도와 낮의 길이를 모두 바르게 비교하면 도달."},{"level":"상","code":"6과13-03","q":"계절이 변하는 까닭을 설명하고, '여름에는 지구가 태양에 더 가까워서 덥다'는 생각이 왜 옳지 않은지 쓰시오.","answer":"지구가 자전축이 기울어진 채로 태양 둘레를 공전하기 때문에 계절에 따라 태양의 남중 고도가 달라지고, 그에 따라 같은 넓이의 땅이 받는 태양 에너지의 양이 달라져 계절이 변한다. 만약 거리 때문이라면 지구 전체가 동시에 여름이어야 하는데, 실제로는 북반구가 여름일 때 남반구는 겨울이므로 거리로는 설명할 수 없다.","rubric":"자전축 기울기 + 공전(1점) + 남중 고도에 따른 에너지량 차이(1점) + 남반구 반례로 거리설 반박(1점)."}]}},"e56-14":{"diag":{"from":"초3~4 「물체와 물질」·「여러 가지 기체」","items":[{"type":"선택형","q":"물질이 타려면 반드시 있어야 하는 기체는?","choices":["① 산소","② 이산화 탄소","③ 질소","④ 헬륨"],"answer":"①","checks":"기체의 성질 [4과15-03]","miscon":"'공기'라고만 답하는 경우. 공기 중 산소가 연소를 돕는다는 점을 짚을 것."},{"type":"선택형","q":"물질의 성질에 대한 설명으로 알맞은 것은?","choices":["① 물질마다 성질이 다르다","② 모든 물질은 성질이 같다","③ 성질은 눈으로만 알 수 있다","④ 성질은 항상 변한다"],"answer":"①","checks":"물질의 성질 [4과05-01]","miscon":"성질 개념이 추상적. 관찰 가능한 특징으로 예시할 것."},{"type":"서답형","q":"촛불을 컵으로 덮으면 어떻게 되는지 예상해 쓰고, 그렇게 생각한 까닭을 쓰시오.","answer":"촛불이 꺼진다. 컵 안의 공기(산소)가 다 쓰이면 더 이상 탈 수 없기 때문이다.","checks":"연소와 산소의 관계(선개념)","miscon":"'바람이 없어서 꺼진다'는 오개념. 실제로 덮어 보고 시간을 재는 실험으로 확인."}]},"form":{"items":[{"level":"하","code":"6과14-02","q":"물질이 타기 위해 필요한 세 가지 조건을 쓰시오.","answer":"탈 물질, 산소, 발화점 이상의 온도","rubric":"세 가지를 모두 쓰면 도달."},{"level":"중","code":"6과14-03","q":"초가 탈 때 생기는 물질 두 가지를 쓰고, 각각을 어떤 방법으로 확인할 수 있는지 쓰시오.","answer":"물과 이산화 탄소. 물은 푸른색 염화 코발트 종이를 붉게 변화시키는 것으로, 이산화 탄소는 석회수를 뿌옇게 흐려지게 하는 것으로 확인한다.","rubric":"생성물 2가지(1점) + 각각의 확인 방법(2점). ※그을음은 연소 생성물로 다루지 않음."},{"level":"상","code":"6과14-04","q":"연소 과정에서 나오는 이산화 탄소가 늘어나면 생태계에 어떤 피해가 생길 수 있는지 쓰고, 이를 줄이기 위한 해결책을 하나 제안하시오.","answer":"이산화 탄소가 늘어나면 지구의 평균 기온이 올라가 빙하가 녹고 해수면이 상승하며, 서식지가 변해 생물이 살기 어려워진다. 해결책: 화석연료 사용을 줄이고 태양광 등 재생에너지를 이용하거나, 나무를 심어 이산화 탄소를 흡수하게 한다.","rubric":"생태계 피해 서술(2점) + 실현 가능한 해결책(1점)."}]}},"e56-15":{"diag":{"from":"초3~4 「자석의 이용」","items":[{"type":"선택형","q":"자석에 붙는 물체로 알맞은 것은?","choices":["① 철로 만든 못","② 나무 젓가락","③ 유리컵","④ 고무공"],"answer":"①","checks":"자석에 붙는 물질 [4과09-01]","miscon":"반짝이는 금속은 모두 붙는다고 생각. 알루미늄·구리로 반례를 보일 것."},{"type":"선택형","q":"막대자석의 같은 극끼리 마주 보게 하면 어떻게 되는가?","choices":["① 서로 밀어낸다","② 서로 끌어당긴다","③ 아무 변화 없다","④ 자석이 부러진다"],"answer":"①","checks":"자석의 극 [4과09-02]","miscon":"자석은 항상 붙는다고 생각하는 경우."},{"type":"서답형","q":"우리 생활에서 전기를 이용하는 물건을 두 가지 쓰고, 그 물건이 전기로 무엇을 하는지 쓰시오.","answer":"예) 선풍기 - 전기로 날개를 돌려 바람을 일으킨다 / 전등 - 전기로 빛을 낸다","checks":"전기의 이용에 대한 선개념","miscon":"전기를 '콘센트에 있는 것'으로만 인식. 에너지가 다른 형태로 바뀐다는 관점으로 연결."}]},"form":{"items":[{"level":"하","code":"6과15-01","q":"전구에 불이 켜지려면 전기 회로가 어떻게 연결되어야 하는지 쓰시오.","answer":"전지, 전선, 전구가 끊긴 곳 없이 하나의 길로 이어져 있어야 한다.","rubric":"끊긴 곳 없이 연결(닫힌 회로)이라는 뜻을 쓰면 도달."},{"level":"중","code":"6과15-02","q":"전지 한 개를 연결했을 때와 전지 두 개를 직렬로 연결했을 때 전구의 밝기를 비교하여 쓰시오.","answer":"전지 두 개를 직렬로 연결했을 때가 전지 한 개일 때보다 전구가 더 밝다.","rubric":"직렬연결이 더 밝다고 쓰면 도달. ※전구의 직렬·병렬연결은 다루지 않음."},{"level":"상","code":"6과15-03","q":"전자석이 영구 자석과 다른 점을 두 가지 쓰고, 그 차이를 이용한 생활 속 예를 하나 드시오.","answer":"①전류가 흐를 때만 자석의 성질을 띤다(전류를 끊으면 자석이 아니게 된다) ②전지의 개수로 세기를, 전지의 연결 방향으로 극을 바꿀 수 있다. 예: 폐차장의 기중기 전자석은 전류를 흘려 고철을 붙였다가 전류를 끊어 원하는 곳에 떨어뜨린다.","rubric":"차이점 2가지(각 1점) + 그 차이를 활용한 예(1점)."}]}},"e56-16":{"diag":{"from":"첫 도입 단원 — 학생의 <b>일상 경험·선개념<\/b>을 진단합니다","items":[{"type":"선택형","q":"과학과 관련된 일을 하는 사람으로 알맞지 <b>않은<\/b> 설명은?","choices":["① 연구원은 실험을 한다","② 의사는 사람의 몸을 안다","③ 요리사는 과학과 전혀 관련이 없다","④ 기상 캐스터는 날씨를 다룬다"],"answer":"③","checks":"과학과 직업의 관련성(선개념)","miscon":"과학=실험실 연구원이라는 좁은 인식. 여러 직업 속 과학을 보여줄 것."},{"type":"선택형","q":"미래 사회에 생길 수 있는 문제로 알맞은 것은?","choices":["① 환경오염과 기후변화","② 계절이 사라지는 것","③ 하루가 30시간이 되는 것","④ 중력이 없어지는 것"],"answer":"①","checks":"미래 사회 문제에 대한 인식","miscon":"공상과 현실적 예측을 구분하지 못하는 경우. 현재 자료에 근거해 예상하도록 안내."},{"type":"서답형","q":"내가 커서 하고 싶은 일을 쓰고, 그 일에 과학이 필요할 것 같은 점이 있으면 쓰시오.","answer":"예) 요리사가 되고 싶다. 재료가 익는 과정이나 온도 맞추는 일에 과학이 필요할 것 같다.","checks":"진로와 과학의 연결(선개념)","miscon":"연결을 못 찾으면 그 직업이 쓰는 도구·재료부터 살펴보게 할 것."}]},"form":{"items":[{"level":"하","code":"6과16-02","q":"과학과 관련된 직업을 두 가지 쓰고, 하는 일을 간단히 쓰시오.","answer":"예) 기상 예보관 - 날씨를 관측하고 예보한다 / 수의사 - 동물의 병을 진단하고 치료한다 / 환경 연구원 - 오염 정도를 조사하고 대책을 세운다","rubric":"직업 2가지와 하는 일을 쓰면 도달."},{"level":"중","code":"6과16-01","q":"미래 사회에 일어날 수 있는 문제를 하나 고르고, 그 문제를 해결하는 데 과학이 어떻게 기여할 수 있을지 쓰시오.","answer":"예) 물 부족 - 바닷물에서 소금기를 없애 마실 물을 얻는 기술이나, 쓴 물을 다시 깨끗하게 만드는 기술을 개발해 해결에 기여할 수 있다.","rubric":"문제 선정(1점) + 과학의 구체적 기여 방법(2점). '과학이 해결해 준다'는 막연한 답은 1점."},{"level":"상","code":"6과16-02","q":"자신이 관심 있는 진로를 하나 정하고, 그 진로가 과학의 어떤 분야와 연결되는지 설명한 뒤, 중학교에 가서 그 분야를 위해 무엇을 더 배우고 싶은지 쓰시오.","answer":"예) 운동선수에 관심이 있다. 몸이 움직이는 원리와 영양은 생명 분야, 공이 날아가는 길은 운동과 에너지 분야와 연결된다. 중학교에서 '동물과 에너지'와 '운동과 에너지'를 배워 몸의 작동과 힘의 원리를 더 알고 싶다.","rubric":"진로-과학 분야 연결(1점) + 근거 있는 설명(1점) + 앞으로의 학습 계획(1점)."}]}},"h1-01":{"diag":{"from":"중학교 전반의 측정·탐구 경험 (공식 선수 단원 없음)","items":[{"type":"선택형","q":"다음 중 국제단위계(SI)의 <b>기본량<\/b>이 아닌 것은?","choices":["① 길이","② 질량","③ 시간","④ 속력"],"answer":"④","checks":"기본량과 유도량의 구분","miscon":"속력·부피·농도를 기본량으로 아는 경우가 많음. 기본량의 조합으로 만들어진 유도량임을 짚을 것."},{"type":"선택형","q":"측정값 12.5 cm에서 마지막 자리 '5'가 뜻하는 것은?","choices":["① 정확히 확정된 값","② 어림한(불확실한) 값","③ 오류","④ 의미 없는 값"],"answer":"②","checks":"측정과 어림의 의미","miscon":"측정값에 불확실성이 있다는 개념이 없어 모든 자리를 '정확한 값'으로 여김."},{"type":"서답형","q":"중학교에서 실험할 때 같은 물체를 여러 번 측정하면 값이 조금씩 달랐던 경험이 있는가? 왜 그런지 생각을 쓰시오.","answer":"예) 눈금을 읽는 위치나 도구의 정밀도, 측정하는 사람에 따라 조금씩 달라진다.","checks":"측정의 불확실성 경험","miscon":"'실수해서'라고만 답하는 경우. 측정 자체에 한계가 있다는 점으로 확장."}]},"form":{"items":[{"level":"하","code":"10통과1-01-02","q":"과학의 기본량 중 세 가지를 쓰고, 각각의 SI 단위를 쓰시오.","answer":"길이-m, 질량-kg, 시간-s, 전류-A, 온도-K 중 세 가지","rubric":"기본량 3가지와 단위를 바르게 짝지으면 도달."},{"level":"중","code":"10통과1-01-03","q":"전 세계가 같은 측정 표준을 사용해야 하는 까닭을 무역과 과학 연구의 관점에서 각각 하나씩 설명하시오.","answer":"무역: 나라마다 단위가 다르면 거래한 물건의 양이 달라져 분쟁이 생기고 신뢰가 무너진다. 과학: 다른 연구자의 실험 결과를 비교·재현할 수 없어 지식이 축적되지 않는다.","rubric":"두 관점에서 각각 타당한 이유(각 1.5점). 한쪽만 쓰면 부분 도달."},{"level":"상","code":"10통과1-01-04","q":"체온계로 측정한 체온이 스마트폰 앱에 기록되기까지의 과정을, '신호 → 측정 → 정보 → 디지털 변환'의 흐름으로 설명하시오.","answer":"체온이라는 자연의 변화가 센서에 전달되어 전기 신호가 된다(신호). 이 신호의 크기를 재어 수치로 만들면 측정값이 되고(측정), 이 값에 의미를 부여하면 정보가 된다(정보). 아날로그 전기 신호를 0과 1의 디지털 값으로 바꾸면 저장·전송·분석이 가능해져 앱에 기록된다(디지털 변환).","rubric":"네 단계를 순서대로 연결(3점). 센서·전기 신호·디지털 변환 중 하나라도 빠지면 감점."}]}},"h1-02":{"diag":{"from":"중 「태양계」·「지권의 변화」·「물질의 구성」·「생식과 유전」","items":[{"type":"선택형","q":"원소의 종류를 결정하는 것은?","choices":["① 중성자 수","② 전자 수","③ 양성자 수","④ 질량"],"answer":"③","checks":"원자의 구성 [9과11-02]","miscon":"전자 수로 원소가 정해진다고 오해. 이온이 되어도 원소는 그대로임을 짚을 것."},{"type":"선택형","q":"주기율표에서 세로줄(족)이 같은 원소들의 공통점은?","choices":["① 질량이 같다","② 화학적 성질이 비슷하다","③ 색이 같다","④ 상태가 같다"],"answer":"②","checks":"주기율표 [9과11-03]","miscon":"주기율표를 '외우는 표'로만 인식. 성질의 규칙성이 핵심임을 강조."},{"type":"서답형","q":"암석을 이루는 알갱이를 무엇이라 하는지 쓰고, 중학교에서 배운 조암 광물의 특성을 하나 쓰시오.","answer":"광물(조암 광물). 특성: 색, 조흔색, 굳기, 염산 반응, 자성 등","checks":"조암 광물 [9과09-02]","miscon":"광물과 암석을 같은 말로 쓰는 경우. 광물이 모여 암석이 됨을 정리."}]},"form":{"items":[{"level":"하","code":"10통과1-02-01","q":"우주 초기에 만들어져 현재 우주의 대부분을 차지하는 두 원소를 쓰시오.","answer":"수소, 헬륨","rubric":"두 원소를 모두 쓰면 도달."},{"level":"중","code":"10통과1-02-02","q":"우리 몸을 이루는 탄소·질소·산소와 같은 원소가 어디에서 만들어졌는지 별의 진화와 관련지어 설명하시오.","answer":"별 내부의 핵융합 반응으로 수소와 헬륨이 결합해 탄소, 질소, 산소 같은 무거운 원소가 만들어진다. 철보다 무거운 원소는 초신성 폭발 과정에서 생성되며, 이 물질이 우주로 퍼져 나가 태양계와 지구, 그리고 생명체의 재료가 되었다.","rubric":"별 내부 핵융합(1점) + 초신성 폭발과 철보다 무거운 원소(1점) + 지구·생명의 재료로 연결(1점). ※정성적 수준."},{"level":"상","code":"10통과1-02-04","q":"염화 나트륨(소금)과 물은 서로 다른 종류의 화학 결합으로 만들어진다. 두 결합의 차이를 설명하고, 그 차이가 <b>전기 전도성<\/b>에서 어떻게 나타나는지 쓰시오.","answer":"염화 나트륨은 전자를 주고받아 생긴 이온들이 서로 끌어당기는 이온 결합, 물은 전자를 공유하는 공유 결합으로 이루어진다. 고체 상태의 염화 나트륨은 이온이 이동하지 못해 전기가 통하지 않지만, 물에 녹거나 녹으면 이온이 자유롭게 움직여 전기가 통한다. 반면 물(순수한 물)은 이온이 거의 없어 전기가 잘 통하지 않는다.","rubric":"두 결합의 차이(1.5점) + 전기 전도성의 차이와 그 이유(1.5점). ※성질은 전기 전도성에 한정."}]}},"h1-03":{"diag":{"from":"중 「생물의 구성과 다양성」·「힘의 작용」·「운동과 에너지」·「생식과 유전」","items":[{"type":"선택형","q":"물체에 작용하는 알짜힘이 0일 때 물체의 운동 상태는?","choices":["① 반드시 정지한다","② 속력과 방향이 변하지 않는다","③ 점점 빨라진다","④ 점점 느려진다"],"answer":"②","checks":"알짜힘과 운동 상태 [9과05-03]","miscon":"'알짜힘 0 = 정지'로 오해. 등속 직선 운동도 포함됨을 짚을 것(관성)."},{"type":"선택형","q":"세포에서 유전 정보를 담고 있는 물질은?","choices":["① 단백질","② DNA","③ 지방","④ 녹말"],"answer":"②","checks":"유전자와 염색체 [9과21-02]","miscon":"DNA·유전자·염색체의 포함 관계를 혼동. 위계를 그림으로 정리할 것."},{"type":"서답형","q":"중학교에서 배운 지권의 변화 중, 판의 경계에서 일어나는 현상을 두 가지 쓰시오.","answer":"지진, 화산 활동(또는 산맥 형성, 해구 형성)","checks":"판의 경계 [9과09-05]","miscon":"판 경계와 무관하게 지진이 아무 곳에서나 일어난다고 생각하는 경우."}]},"form":{"items":[{"level":"하","code":"10통과1-03-01","q":"지구시스템을 구성하는 권역을 네 가지 이상 쓰시오.","answer":"지권, 수권, 기권, 생물권, 외권","rubric":"4가지 이상 바르게 쓰면 도달."},{"level":"중","code":"10통과1-03-04","q":"자동차의 에어백이 충돌 사고에서 부상을 줄이는 원리를 <b>충격량과 운동량<\/b>의 관계로 설명하시오.","answer":"충돌에서 사람의 운동량 변화량은 정해져 있고, 이는 충격량(힘 × 시간)과 같다. 에어백은 충돌 시간을 길게 늘려 주므로, 같은 운동량 변화를 만드는 데 필요한 힘이 작아진다. 따라서 사람이 받는 힘이 줄어 부상이 줄어든다.","rubric":"운동량 변화량 = 충격량(1점) + 시간 증가(1점) + 힘 감소 결론(1점)."},{"level":"상","code":"10통과1-03-06","q":"유전자에 담긴 정보로부터 단백질이 만들어지는 과정을 순서대로 설명하고, 이 과정이 생명 시스템 유지에 왜 중요한지 쓰시오.","answer":"DNA의 유전 정보가 RNA로 옮겨지고(전사), 그 RNA의 정보에 따라 아미노산이 순서대로 연결되어 단백질이 만들어진다(번역). 단백질은 효소·구조 물질·신호 전달 물질 등으로 작용하여 세포의 화학 반응과 구조를 담당하므로, 이 정보 흐름이 있어야 생명 시스템이 유지된다.","rubric":"전사와 번역을 순서대로(2점) + 단백질의 역할로 중요성 설명(1점)."}]}},"h2-01":{"diag":{"from":"중 「생물의 구성과 다양성」·「지권의 변화」·「화학 반응의 규칙성」","items":[{"type":"선택형","q":"화학 반응에서 반응 전후에 변하지 <b>않는<\/b> 것은?","choices":["① 원자의 배열","② 물질의 종류","③ 원자의 종류와 개수","④ 물질의 성질"],"answer":"③","checks":"질량 보존 법칙 [9과16-03]","miscon":"원자가 없어지거나 새로 생긴다고 오해. 배열만 바뀐다는 점이 핵심."},{"type":"선택형","q":"산성 용액과 염기성 용액을 섞으면 일어나는 일은?","choices":["① 서로의 성질이 약해진다","② 산성이 더 세진다","③ 아무 변화 없다","④ 폭발한다"],"answer":"①","checks":"산·염기 혼합 [6과09-02]","miscon":"'섞으면 더 세진다'는 오개념. 지시약 변화로 확인시킬 것."},{"type":"서답형","q":"생물다양성이 높으면 생태계에 어떤 점이 좋은지 한 가지 쓰시오.","answer":"환경이 변하거나 한 종이 사라져도 다른 종이 그 역할을 대신할 수 있어 생태계가 안정적으로 유지된다.","checks":"생물다양성 [9과02-03]","miscon":"'종류가 많으면 좋다'는 결론만 아는 경우. 안정성과 연결시킬 것."}]},"form":{"items":[{"level":"하","code":"10통과2-01-03","q":"철이 녹스는 반응에서 철은 산화와 환원 중 어느 것에 해당하는지 쓰고, 그 까닭을 쓰시오.","answer":"산화. 철이 산소와 결합하기 때문이다(또는 전자를 잃기 때문이다).","rubric":"산화라고 답하고 산소와 결합(전자를 잃음)을 근거로 들면 도달. ※산화수는 다루지 않음."},{"level":"중","code":"10통과2-01-04","q":"생활 속에서 중화 반응을 이용하는 사례를 두 가지 들고, 각각 어떤 산과 염기가 관여하는지 설명하시오.","answer":"예) ①위산이 과다할 때 제산제를 먹는다 - 산성인 위산을 염기성 제산제가 중화한다 ②산성화된 토양에 석회를 뿌린다 - 산성 토양을 염기성 석회가 중화한다 ③생선에 레몬즙을 뿌린다 - 염기성 비린내 물질을 산성 레몬즙이 중화한다","rubric":"사례 2가지(각 1점) + 산·염기를 바르게 지목(1점). ※아레니우스 정의 범위."},{"level":"상","code":"10통과2-01-02","q":"항생제를 계속 사용하는 환경에서 항생제 내성 세균이 늘어나는 과정을 <b>변이와 자연선택<\/b>으로 설명하시오.","answer":"세균 집단 안에는 원래 항생제에 견디는 정도가 다른 변이가 존재한다. 항생제를 사용하면 견디지 못하는 개체는 죽고 내성을 가진 개체만 살아남아 번식한다(자연선택). 이 과정이 반복되면 내성 개체의 비율이 점점 높아져 집단 전체가 항생제에 잘 듣지 않게 된다.","rubric":"변이가 미리 존재함(1점) + 선택압에 의한 차등 생존·번식(1점) + 세대를 거쳐 비율 증가(1점). '세균이 적응하려고 변했다'는 목적론적 서술은 감점."}]}},"h2-02":{"diag":{"from":"중 「날씨와 기후변화」·「수권과 해수의 순환」·「운동과 에너지」","items":[{"type":"선택형","q":"온실효과를 일으키는 기체로 알맞은 것은?","choices":["① 이산화 탄소, 메테인","② 질소, 산소","③ 헬륨, 네온","④ 아르곤"],"answer":"①","checks":"온실효과 [9과17-01]","miscon":"공기의 주성분인 질소·산소를 온실기체로 오해."},{"type":"선택형","q":"역학적 에너지가 보존될 때, 물체가 아래로 내려오면서 나타나는 변화는?","choices":["① 위치 에너지 감소, 운동 에너지 증가","② 둘 다 감소","③ 둘 다 증가","④ 위치 에너지 증가, 운동 에너지 감소"],"answer":"①","checks":"역학적 에너지 전환 [9과19-04]","miscon":"에너지가 '없어진다'고 생각하는 경우. 전환됨을 강조."},{"type":"서답형","q":"해류가 기후에 영향을 주는 예를 하나 쓰시오.","answer":"예) 난류가 흐르는 지역은 같은 위도의 다른 지역보다 겨울이 따뜻하다.","checks":"해류의 역할 [9과18-03]","miscon":"해류를 단순한 물의 흐름으로만 보고 에너지 운반 기능을 놓치는 경우."}]},"form":{"items":[{"level":"하","code":"10통과2-02-02","q":"생태 피라미드에서 아래로 갈수록 생물의 양이 많아지는 까닭을 쓰시오.","answer":"에너지가 상위 영양단계로 갈수록 일부만 전달되고 나머지는 호흡 등으로 소모되기 때문에, 상위로 갈수록 유지할 수 있는 생물의 양이 줄어든다.","rubric":"에너지 전달 효율이 낮다는 뜻을 쓰면 도달."},{"level":"중","code":"10통과2-02-04","q":"태양 에너지가 만들어지는 과정을 쓰고, 그 에너지가 지구에서 바람을 일으키기까지의 흐름을 설명하시오.","answer":"태양 중심부에서 수소가 헬륨으로 핵융합할 때 줄어든 질량이 에너지로 바뀌어 방출된다. 이 에너지가 지구에 도달해 지표와 대기를 가열하는데, 위
