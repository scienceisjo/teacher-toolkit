-01":{"A":"인류 문명의 탄생 과정에서 인류의 지혜가 담긴 다양한 과학적 사례를 발견하 고, 각 사례가 문명 형성에 미친 영향을 분석하며, 이를 통해 과학이 인류 문명의 형성 과정에 기여하였음을 설명하고, 과학의 문제 해결에 대한 개방적 인 태도를 가진다.","B":"인류 문명의 탄생 과정에서 인류의 지혜가 담긴 과학적 사례를 발견하고, 문명 형성에 미친 영향을 설명하며, 과학의 문제 해결에 대한 개방적인 태도를 가진다.","C":"인류 문명의 탄생 과정에서 인류의 지혜가 담긴 과학적 사례를 알고, 과학이 인류 문명의 형성 과정에 기여하였음을 말하며, 과학의 문제 해결에 대한 개방 성을 인식한다.","D":"인류 문명의 탄생 과정에서 인류의 지혜가 담긴 과학적 사례를 말하고, 과학의 문제 해결에 대한 개방성을 인식한다.","E":"과학이 인류 문명의 형성 과정에 기여하였음을 말하고, 과학의 문제 해결에 대 한 개방성에 관심을 가 진 다."},"12과사01-02":{"A":"고대 그리스 철학자들의 과학적 사고와 주장들을 조사하여 고대 그리스 시대 의 우주관과 자연관을 이해하고, 고대 그리스 철학자들의 생각이 오늘날 과학 과 예 술, 철 학 등 다양한 분야에 적용된 사례를 찾아 고대에서 현대에 이 르 기 까지 그리스 문명이 인간의 삶에 미친 영향에 대해 예측하고 토론할 수 있다.","B":"고대 그리스 철학자들의 과학적 사고와 주장을 조사하고, 오늘날 과학과 예술, 철학 등 다양한 분야에 적용된 사례를 찾아 그리스 문명이 현대에 이르기까지 인간의 삶에 미친 영향을 말할 수 있다.","C":"고대 그리스 철학자들의 대표적인 과학적 사고나 주장을 조사하고 그리스 문 명이 현대에 이르기까지 인간의 삶에 미친 영향을 말할 수 있다.","D":"플라톤과 아리스토텔레스의 대표적인 주장을 조사하고 그리스 문명이 인간의 삶에 영향을 미쳤음을 말할 수 있다.","E":"플라톤과 아리스토텔레스의 대표적인 주장을 조사할 수 있다."},"12과사01-03":{"A":"중세 시대 유럽과 중동 지역을 중심으로 종교나 문화가 과학에 기여한 바를 이해하고 과학을 종합적으로 인식하며, 고대 그리스의 과학과 중세 과학의 비교를 통해 고대 그리스 철학이 미친 영향을 설명할 수 있다.","B":"중세 시대 유럽과 중동 지역에서 종교나 문화가 과학에 기여한 바를 알고 과학 을 종합적으로 인식하며, 고대 그리스 시대의 과학과 중세 과학의 특징을 말할 수 있다.","C":"중세 시대 유럽과 중동 지역에서 종교나 문화가 과학에 기여한 바와 과학과 상호작용하는 요소에 관심을 가지며, 고대 그리스 시대의 과학과 중세 과학이 차이가 있음을 말할 수 있다.","D":"중세 시대에 종교나 문화가 과학에 영향을 미쳤음을 말하고, 과학과 상호작용 하는 요소에 관심을 가진다.","E":"고대 그리스의 과학과 중세 과학이 차이가 있음을 말할 수 있다."},"12과사01-04":{"A":"르네상스와 과학혁명이 일어난 사회문화적 배경을 조사하여 과학과 예술 사이 의 융합적 사례를 설명하고, 이 시기의 예술 작품에 포함된 과학적 원리를 분석하는 과정에서 과학 문화 향유의 필요성을 인식한다.","B":"르네상스와 과학혁명이 일어난 사회문화적 배경을 조사하여 과학과 예술 사이 의 융합 사례로 제시하고, 이 시기의 예술 작품에 포함된 과학적 원리를 탐색 하는 과정에서 과학 문화 향유의 필요성을 인식한다.","C":"르네상스와 과학혁명이 일어난 사회문화적 배경을 조사하고, 이 시기의 예술 작품 창작 과정에서 과학과 예술의 융합이 있었음을 말하고 과학 문화 향유의 필요성에 관심을 가진다.","D":"르네상스와 과학혁명 시기의 예술 작품에 과학적 요소가 포함되어 있음을 알고, 이 시기에 과학과 예술이 서로 융합되었음을 말하며 과학 문화 향유의 필요성에 관심을 가진다.","E":"르네상스와 과학혁명 시기의 예술 작품에 과학적 요소가 포함되어 있음을 말 할 수 있다."},"12과사01-05":{"A":"과학 지식의 형성 과정에서 과학자의 신념이나 세계관이 영향을 준 사례를 조사하여 발표하고, 과거 과학자의 아이디어나 사고 과정이 현대에 적용된다 면 어떤 결과가 나타날지 예측하고 토론할 수 있다.","B":"과학 지식의 형성 과정에서 과학자의 신념이나 세계관이 영향을 준 사례를 조사하여 발표하고, 과거 과학자의 아이디어나 사고 과정이 현대에 적용되었 을 때의 영향에 대해 의견을 말할 수 있다.","C":"과학 지식의 형성 과정에서 과학자의 신념이나 세계관이 영향을 준 사례를 조 사 하 여 발표할 수 있 다.","D":"과학 지식의 형성 과정에서 과학자의 신념이나 세계관이 영향을 줄 수 있음을 말 할 수 있 다.","E":"과학 지식의 형성과 과학자의 신념이나 세계관이 관련 있음을 말할 수 있다. ⅩⅤ. 과학의 역사와 문화"}},"area":{"A":{"지식·이해":"인류 문명의 탄생 과정에서 인류의 지혜가 담긴 다양한 과학적 사례를 발견하고 각 사례가 문명 형성에 미친 영향을 분석하며 이를 통해 과학이 인류 문명의 형성 과정에 기여하였음을 설명할 수 있다. 고대 그리스 철학자들의 과학적 사고와 주장들을 조사하여 고대 그리스 시대의 우주관과 자연관을 이해하며 중세 시대 유럽과 중동 지역을 중심으로 종교나 문화 가 과학에 기여한 바를 이해하고 고대 그리스 철학이 미친 영향을 설명하고 과학 과 예술 사이의 융합적 사례 를 설명할 수 있 다.","과정·기능":"그리스 문명이 오늘날 과학과 예술, 철학 등 다양한 분야에 적용된 사례를 찾아 고대 에서 현대에 이르기까지 인간의 삶에 미친 영향에 대해 예측하고 토론할 수 있다. 고대 그리스의 과학과 중세 과학을 비교하고 르네상스와 과학혁명이 일어난 사회 문화적 배경을 조사하며 르네상스 시기의 예술 작품에 포함된 과학적 원리를 분석 할 수 있다. 과학 지식의 형성 과정에서 과학자의 신념이나 세계관이 영향을 준 사례를 조사하 여 발표하고 과학자의 아이디어나 사고 과정이 현대에 적용된다면 어떤 결과가 나타날지 예측하고 토론할 수 있다.","가치·태도":"과학을 종합적으로 인식하고 과학의 문제 해결에 대한 개방성을 가지며, 르네상스 시기의 예술 작품에 포함된 과학적 원리를 분석하는 과정에서 과학 문화 향유의 필요성을 인식한다."},"B":{"지식·이해":"인류 문명의 탄생 과정에서 인류의 지혜가 담긴 과학적 사례를 발견하고 각 사례 가 문명 형성에 미친 영향을 설명하며 고대 그리스 철학자들의 과학적 사고와 주장을 조사하여 고대 그리스 시대의 우주관과 자연관을 설명하고 그리스 문명이 오늘에 이르기까지 인간의 삶에 미친 영향을 말할 수 있다. 중세 시대 유럽과 중동 지역에서 종교나 문화가 과학에 기여한 바를 알고 고대 그리스 시대의 과학과 중세 과학의 특징을 말하며 과거 과학자의 아이디어나 사고 과정이 현대에 적용되었을 때의 영향에 대해 의견을 말할 수 있다.","과정·기능":"오늘날 과학과 예술, 철학 등 다양한 분야에 적용된 사례를 찾으며 르네상스와 과학 혁명이 일어난 사회문화적 배경을 조사하여 과학과 예술 사이의 융합 사례로 제시 하고 이 시기의 예술 작품에 포함된 과학적 원리를 탐색하며, 과학 지식의 형성 과정에서 과학자의 신념이나 세계관이 영향을 준 사례를 조사하여 발표할 수 있다.","가치·태도":"과학을 종합적으로 인식하고 과학의 문제 해결에 대한 개방성을 가지고, 르네상스 시기의 예술 작품에 포함된 과학적 원리를 분석하는 과정에서 과학 문화 향유의 필요성을 인식한다."},"C":{"지식·이해":"인류 문명의 탄생 과정에서 인류의 지혜가 담긴 과학적 사례를 알고, 과학이 인류 문명의 형성 과정에 기여하였음을 말하며 그리스 문명이 오늘에 이르기까지 인간 의 삶에 미친 영향을 말할 수 있다. 중세 시대 유럽과 중동 지역에서 종교나 문화가 과학에 기여했음을 알며, 고대 그리스 시대의 과학과 중세 과학이 차이가 있음을 말하고 르네상스 시기의 예술 작품 창작 과정에서 과학과 예술의 융합이 있었음을 말할 수 있다.","과정·기능":"고대 그리스 철학자들의 대표적인 과학적 사고나 주장과 르네상스와 과학혁명이 일어난 사회문화적 배경을 조사하고 과학 지식의 형성 과정에서 과학자의 신념이 나 세계관이 영향을 준 사례를 조사하여 발표할 수 있다.","가치·태도":"과학의 문제 해결에 대한 개방성을 인식하고, 중세 시대 유럽과 중동 지역에서 종교나 문화가 과학에 기여한 바와 과학과 상호작용하는 요소 및 과학 문화 향유 의 필요성에 관심을 가진다."},"D":{"지식·이해":"인류 문명의 탄생 과정에서 인류의 지혜가 담긴 과학적 사례를 말하고 그리스 문명이 인간의 삶에 영향을 미쳤다는 것을 말할 수 있다. 중세 시대에 종교나 문화가 과학에 영향을 미쳤음을 말하고 르네상스와 과학혁명 시기의 예술 작품에 과학적 요소가 포함되어 있음을 알며, 이 시기에 과학과 예술 이 서로 융합되었음을 말하고 과학 지식의 형성 과정에서 과학자의 신념이나 세계 관이 영향을 줄 수 있음을 말할 수 있다.","과정·기능":"플라톤과 아리스토텔레스의 대표적인 주장을 조사하여 말할 수 있다.","가치·태도":"과학의 문제 해결에 대한 개방성을 인식하고, 과학과 상호작용하는 요소 및 과학 문화 향유의 필요성에 관심을 가진다."},"E":{"지식·이해":"과학이 인류 문명의 형성 과정에 기여하였음과 플라톤과 아리스토텔레스의 대표 적인 주장 그리고 고대 그리스의 과학과 중세 과학이 차이가 있음을 말할 수 있다. 르네상스와 과학혁명 시기의 예술 작품에 과학적 요소가 포함되어 있음과 과학 지식의 형성과 과학자의 신념이나 세계관이 관련 있음을 말할 수 있다.","과정·기능":"플라톤과 아리스토텔레스의 대표적인 주장을 조사할 수 있다.","가치·태도":"과학의 문제 해결에 대한 개방성에 관심을 가진다. ⅩⅤ. 과학의 역사와 문화"}}},"과사-02":{"codes":{"12과사02-01":{"A":"상대성 이론의 관점에서 미래주의 예술 작품을 분석하여 설명하고, 상대성 이론 등과 같은 현대 과학의 등장이 당시의 사회문화에 영향을 끼친 사례를 조사하며, 현대 과학의 등장이 사회문화에 끼친 영향을 이해함으로써 과학의 사회적 가치를 인식한다.","B":"상대성 이론의 관점에서 미래주의 예술 작품을 분석하고, 상대성 이론 등과 같은 현대 과학의 등장이 당시의 사회문화에 끼친 영향을 조사하는 과정에서 과학의 사회적 가치를 인식한다.","C":"상대성 이론 등과 같은 현대 과학의 등장이 당시의 사회문화에 끼친 영향을 조사할 수 있다.","D":"상대성 이론 등과 같은 현대 과학의 등장이 당시의 사회문화에 끼친 영향을 찾 을 수 있 다.","E":"상대성 이론이 사회문화에 영향을 끼쳤음을 말할 수 있다."},"12과사02-02":{"A":"현 대 과 학의 등장 과정 에서 나타 난 과 학자 들의 논쟁 이나 토론 사례 를 조 사하 고, 과학적 의사소통에서 지켜야 할 규범과 태도를 이해하며, 서로 다른 관점 을 가진 경우에도 이해하고 배려하는 태도의 중요성을 인식한다.","B":"현대 과학의 등장 과정에서 나타난 과학자들의 논쟁이나 토론 사례를 찾고, 과학적 의사소통에서 지켜야 할 규범과 태도가 있음을 인식한다.","C":"제시된 과학자들의 논쟁이나 토론 사례를 바탕으로 과학적 의사소통에서 지켜 야 할 규범과 태도가 있음을 말할 수 있다.","D":"과학적 의사소통에서 지켜야 할 규범과 태도가 있음을 말할 수 있다.","E":"과학적 의사소통에서 지켜야 할 규범과 태도에 관심을 가진다."},"12과사02-03":{"A":"현대 예술 작품이나 건축물에 과학적 원리가 적용된 사례를 조사하여 제시하 고, 각 작품이나 건축물에 적용된 과학적 원리를 설명하며, 과학이 문화에 미 치는 영향을 근거로 들어 과학과 문화의 관련성을 추론할 수 있다.","B":"현대 예술 작품이나 건축물에 과학적 원리가 적용된 사례를 조사하여 발표하 고, 과학과 문화가 관련이 있음을 말할 수 있다.","C":"제시된 사례를 통해 현대 예술 작품이나 건축물에 과학적 원리가 적용됨을 알고, 과학과 문화가 관련이 있음을 말할 수 있다.","D":"제시된 사례를 통해 현대 예술 작품이나 건축물에 과학적 원리가 적용됨을 말 할 수 있 다.","E":"과학과 문화의 관련성에 관심을 가진다."},"12과사02-04":{"A":"감염병이 사회에 영향을 미친 대표적인 사례를 찾아 제시하고, 과학이 사회 문제 해결에 기여함을 알고, 이를 통해 사회 문제에 대해 능동적으로 접근하는 태도의 중요성을 인식한다.","B":"감염병이 사회에 영향을 미친 대표적인 사례를 찾고, 감염병에 의한 사회 문제 해결에 과학이 기여했음을 말할 수 있다.","C":"제시된 감염병이 사회에 영향을 미친 사례를 통해, 감염병에 의한 사회 문제 해결에 과학이 기여했음을 말할 수 있다.","D":"감염병에 의한 사회 문제 해결에 과학이 기여했음을 말할 수 있다.","E":"감염병이 사회에 미친 영향과 이에 대한 과학적 문제 해결 관심을 가진다."},"12과사02-05":{"A":"과학기술이 교통수단의 발달에 미친 장단점과 주요 영향을 여러 사례를 통해 설명하고, 교통수단의 발전이 가져올 미래 사회의 변화를 다양한 측면에서 예 측 하 고 그 영향을 분 석 하 며, 이 를 통해 미래 교통 기술의 발전 방향에 대 해 자신의 의견을 제시하고 공유할 수 있다.","B":"과학기술이 교통수단의 발달에 미친 영향을 인식하고, 교통수단의 발전이 가 져올 미래 사회의 변화를 과학적 근거를 바탕으로 예측하여 자신의 의견을 제시할 수 있다.","C":"과학기술이 교통수단의 발달에 미친 영향을 말하고, 교통수단의 발전이 가져 올 미래 사회의 변화를 예측할 수 있다.","D":"과학기술이 교통수단의 발달에 미쳤으며 교통수단의 발전이 미래 사회의 변화 에도 영향을 미침을 말할 수 있다.","E":"과학기술이 교통수단의 발달에 영향을 미쳤음을 말할 수 있다."},"12과사02-06":{"A":"산업혁명 이후 나타난 화학 무기, 원자력, 유전자 재조합 등 과학기술의 발전 으로 발생한 사회적 갈등 사례 분석을 통해 과학기술의 양면성을 종합적으로 이해하고, 새롭게 등장하는 과학기술에 대해 균형 잡힌 시각으로 판단하며, 다양한 증거를 바탕으로 과학기술이 인류 문명에 미친 긍정적 효과와 부정적 효과에 대해 토론하며 서로 다른 관점을 가진 경우에도 이해하고 배려할 수 있는 자세를 가진다.","B":"산업혁명 이후 나타난 화학 무기, 원자력, 유전자 재조합 등 과학기술의 발전 으로 발생한 사회적 갈등을 조사하여 과학기술의 양면성을 인식하고, 증거를 바탕으로 과학기술이 인류 문명에 미친 긍정적 효과와 부정적 효과에 대해 균형 잡힌 시각으로 토론하면서 서로 이해하고 배려하는 자세를 가진다.","C":"화학 무기, 원자력, 유전자 재조합 등 과학기술의 발전으로 발생한 사회적 갈 등을 이해하고, 일상 경험에 근거하여 과학기술이 인류 문명에 미친 긍정적 효과와 부정적 효과에 대해 흥미와 관심을 가지며, 과학기술의 양면성에 대해 서로 이야기할 수 있다.","D":"화학 무기, 원자력, 유전자 재조합 등 과학기술이 인류 문명에 미친 긍정적 효과와 부정적 효과를 나열하고, 과학기술의 양면성에 관심을 가진다.","E":"과학기술이 인류 문명에 미치는 긍정적 효과와 부정적 효과에 대해 서로 이야기할 수 있 다. ⅩⅤ. 과학의 역사와 문화"}},"area":{"A":{"지식·이해":"현대 과학의 등장이 사회문화에 영향을 끼친 사례을 이해하고, 현대 예술 작품이 나 건축물에 적용된 과학적 원리를 설명할 수 있다. 감염병 극복 과정에서 과학이 사회 문제 해결에 기여함을 알고, 과학기술이 교통 수단의 발달에 미친 장단점과 주요 영향을 여러 사례를 통해 설명하며, 과학기술 의 양면성을 종합적으로 이해할 수 있다.","과정·기능":"상대성 이론의 관점에서 미래주의 예술 작품을 분석하여 설명하고, 상대성 이론 등과 같은 현대 과학의 등장이 당시의 사회문화에 영향을 끼친 사례를 조사하며, 현대 과학의 등장 과정에서 나타난 과학자들의 논쟁이나 토론 사례를 조사할 수 있다. 현대 예술 작품이나 건축물에 과학적 원리가 적용된 사례를 조사하여 제시하고, 과학 이 문화에 미치는 영향을 근거로 들어 과학과 문화의 관련성을 추론하며, 감염병이 사회에 영향을 미친 대표적인 사례를 찾아 제시하고, 교통수단의 발전이 가져올 미래 사회의 변화를 다양한 측면에서 예측하고 그 영향을 분석하며 이를 통해 미래 교통 기술의 발전 방향에 대해 자신의 의견을 제시하고 다양한 방식으로 공유할 수 있다. 산업혁명 이후 나타난 화학 무기, 원자력, 유전자 재조합 등 과학기술의 발전으로 인한 사회적 갈등 사례를 분석하고, 다양한 증거를 바탕으로 과학기술이 인류 문명에 미친 긍정적 효과와 부정적 효과에 대해 토론할 수 있다.","가치·태도":"현대 과학의 등장이 당시의 사회문화에 끼친 영향을 통해 과학의 사회적 가치를 인식하고, 과학적 의사소통에서 지켜야 할 규범과 태도를 이해하며, 서로 다른 관점을 가진 경우에도 이해하고 배려하는 태도의 중요성을 인식한다. 과학이 사회 문제 해결에 기여한 사례를 통해 사회 문제에 대해 능동적으로 접근 하는 태도의 중요성을 인식하며, 새롭게 등장하는 과학기술에 대해 균형 잡힌 시각으로 판단하고, 서로 다른 관점을 가진 경우에도 이해하고 배려할 수 있는 자세를 가진다."},"B":{"지식·이해":"과학과 문화가 관련이 있음을 말하고, 감염병에 의해 생긴 사회 문제 해결에 과학 이 기여했음을 말할 수 있다. 과학기술이 교통수단의 발달에 미친 영향을 인식하고, 과학기술의 발전으로 발생 한 사회적 갈등을 통해 과학기술이 갖는 양면성을 인식한다.","과정·기능":"상대성 이론의 관점에서 미래주의 예술 작품을 분석하고, 상대성 이론 등과 같은 현대 과학의 등장이 당시의 사회문화에 끼친 영향을 조사하며, 현대 과학의 등장 과정에서 나타난 과학자들의 논쟁이나 토론 사례를 찾고, 현대 예술 작품이나 건 축 물 에 과학적 원리가 적용된 사례를 조사하여 발표할 수 있 다. 감염병이 사회에 영향을 미친 대표적인 사례를 찾고, 교통수단의 발전이 가져올 미래 사회의 변화를 과학적 근거를 바탕으로 예측하여 자신의 의견을 제시하며, 산업혁명 이후 나타난 화학 무기, 원자력, 유전자 재조합 등의 과학기술 발전으로 발생한 사회적 갈등을 조사하고, 증거를 바탕으로 과학기술이 인류 문명에 미친 긍정적 효과와 부정적 효과에 대해 토론할 수 있다.","가치·태도":"현대 과학의 등장이 당시의 사회문화에 끼친 영향을 바탕으로 과학의 사회적 가치를 인식하고, 과학적 의사소통에서 지켜야 할 규범과 태도가 있음을 인식하며, 과학기술 이 인류 문명에 미친 효과에 대해 토론하면서 서로 이해하고 배려하는 자세를 가진다."},"C":{"지식·이해":"제시된 사례를 통해 현대 예술 작품이나 건축물에 과학적 원리가 적용됨을 알고, 과학과 문화가 관련이 있음을 말하며, 과학기술이 교통수단의 발달에 미친 영향을 말하고, 화학 무기, 원자력, 유전자 재조합 등의 과학기술 발전으로 발생한 사회적 갈등을 말할 수 있다.","과정·기능":"상대성 이론 등과 같은 현대 과학의 등장이 당시의 사회문화에 끼친 영향을 조사 하고, 제시된 감염병이 사회에 영향을 미친 사례를 통해 감염병에 의해 생긴 사회 문제 해결에 과학이 기여했음을 말하고, 교통수단의 발전이 가져올 미래 사회의 변화를 예측하고, 일상 경험에 근거하여 과학기술의 양면성에 대해 서로 이야기할 수 있다.","가치·태도":"과학적 의사소통에서 지켜야 할 규범과 태도가 있음을 이해하고, 과학기술이 인류 문명에 미친 긍정적 효과와 부정적 효과에 대해 흥미와 관심을 가진다."},"D":{"지식·이해":"제시된 사례를 통해 현대 예술 작품이나 건축물에 과학적 원리가 적용됨과 감염병 에 의해 생긴 사회 문제 해결에 과학이 기여했음을 말하고, 과학기술이 교통수단 의 발달에 영향을 미쳤으며 교통수단의 발전이 미래 사회의 변화에도 영향을 미침 을 말할 수 있다.","과정·기능":"상대성 이론 등과 같은 현대 과학의 등장이 당시의 사회문화에 끼친 영향을 찾고, 화학 무기, 원자력, 유전자 재조합 등의 과학기술이 인류 문명에 미친 긍정적 효과 와 부정적 효과를 나열할 수 있다.","가치·태도":"과학적 의사소통에서 지켜야 할 규범과 태도가 있음을 언급하고, 과학기술의 양면 성에 관심을 가진다."},"E":{"지식·이해":"상대성 이론이 사회문화에 영향을 끼쳤음과 과학기술이 교통수단의 발달에 영향 을 미쳤음을 말할 수 있다.","과정·기능":"과학기술이 인류 문명에 미치는 긍정적 효과와 부정적 효과에 대해 서로 이야기할 수 있다.","가치·태도":"과학적 의사소통에서 지켜야 할 규범과 태도에 관심을 가지고, 과학과 문화의 관련성과 감염병 극복 과정에 나타난 과학의 기여에 관심을 가진다. ⅩⅤ. 과학의 역사와 문화"}}},"과사-03":{"codes":{"12과사03-01":{"A":"과학기술이 문화에 영향을 미치는 것에 대한 이해를 바탕으로 과학기술 발전 으로 인해 새롭게 나타난 문화의 사례를 조사하고, 과학을 주제로 하는 예술 작품이나 콘텐츠를 발표하는 활동을 통해 과학의 가치를 인식한다.","B":"과학기술이 문화에 영향을 미치는 것에 대한 이해를 바탕으로 과학기술 발전 으로 인해 새롭게 나타난 문화의 사례를 조사하고, 과학을 주제로 하는 예술 작품이나 콘텐츠를 발표할 수 있다.","C":"과학기술 발전으로 인해 새롭게 나타난 문화의 사례를 조사하고, 과학을 주제 로 하는 예술 작품이나 콘텐츠를 제작하여 공유할 수 있다.","D":"과학기술이 문화에 영향을 미치는 것을 알고, 과학을 주제로 하는 예술 작품이 나 콘텐츠를 찾을 수 있다.","E":"과학기술의 발전이 문화적 변화에 영향을 미침을 말할 수 있다."},"12과사03-02":{"A":"일상생활이나 미디어에서 사용되는 과학 용어를 조사하고, 과학 용어가 활용 되는 다양한 사례를 바탕으로 과학 용어가 우리 사회에 미치는 파급효과에 대해 증거를 바탕으로 다양한 방식으로 표현하고 공유할 수 있다.","B":"일상생활이나 미디어에서 사용되는 과학 용어를 조사하고, 과학 용어가 활용 되는 다양한 사례를 바탕으로 과학 용어가 우리 사회에 미치는 파급효과에 대해 말할 수 있다.","C":"일상생활이나 미디어에서 사용되는 과학 용어를 조사하고, 과학 용어가 우리 사회에 미치는 영향을 말할 수 있다.","D":"일상생활이나 미디어에서 과학 용어가 사용됨을 알고, 과학 용어가 활용된 사례를 제시할 수 있다.","E":"과학 용어가 우리 사회에 영향을 미침을 말할 수 있다."},"12과사03-03":{"A":"과학기술의 발전이 음악에 영향을 끼친 사례를 조사하고, 사례 조사에서 수집 한 자료를 표나 그래프 등 다른 형태로 변환하며, 과학기술을 활용하여 음악을 창작하거나 연주를 하는 과정을 통해 과학 문화 향유의 필요성과 과학기술의 심미적 가치를 인식한다.","B":"과학기술의 발전이 음악에 영향을 끼친 사례를 조사하고, 과학기술을 활용하 여 음악을 창작하거나 연주를 하는 과정을 통해 과학 문화 향유의 필요성과 과학기술의 심미적 가치를 인식한다.","C":"과학기술의 발전이 음악에 영향을 끼친 사례를 탐색하고, 과학기술을 활용하 여 음악을 창작하거나 연주를 체험하고 즐긴다.","D":"과학기술을 활용하여 음악을 창작하거나 연주하는 데 흥미와 호기심을 가진다.","E":"과학기술의 발전이 음악에 영향을 끼쳤음을 말할 수 있다."},"12과사03-04":{"A":"인간과 기계, 사물 등을 연결하는 과학기술의 발전 동향을 조사하여 미래 사회 의 변화를 예측하여 발표 자료를 창의적으로 제작하고, 과학의 유용성과 윤리 성에 대해 다양한 방식으로 표현하고 의사 소통할 수 있다.","B":"인간과 기계, 사물 등을 연결하는 과학기술 발전 동향을 조사하고, 미래 사회 의 변화에 대한 발표 자료를 창의적으로 제작하며, 과학기술의 발전에 흥미와 호기심을 가진다.","C":"인간과 기계, 사물 등을 연결하는 과학기술의 발전으로 미래 사회에 변화가 일어날 수 있음을 이해하고, 과학기술의 발전에 흥미와 호기심을 가진다.","D":"인간과 기계, 사물 등을 연결하는 과학기술의 발전을 이해하고 흥미를 가진다.","E":"인간과 기계, 사물 등을 연결하는 과학기술이 발전하고 있음을 말할 수 있다."},"12과사03-05":{"A":"가상 현실이나 증강 현실을 활용한 우리 주변의 사례를 조사하고, 가상 현실이 나 증강 현실을 이용해 과학문화 콘텐츠를 제작하여 발표하며, 과학기술이 미래 사회에 미칠 수 있는 긍정적 영향과 부정적 영향에 대해 타인의 의견을 존 중 하 며 토론할 수 있 다.","B":"가상 현실이나 증강 현실을 활용한 사례를 조사하고, 가상현실이나 증강 현실 을 이용하여 과학문화 콘텐츠를 제작하며, 과학기술이 미래 사회에 미칠 수 있는 영향에 대해 토론할 수 있다.","C":"가상 현실이나 증강 현실을 활용한 우리 주변의 사례를 조사하고, 과학문화 콘텐츠를 제작하는 과정에서 과학 문화에 관심을 가지고 즐긴다.","D":"가상 현실과 증강 현실을 활용한 사례에 대해 조사하고, 과학문화 콘텐츠에 대해 흥미를 가진다.","E":"가상 현실과 증강 현실 콘텐츠에 흥미를 가진다."},"12과사03-06":{"A":"집단적 의사결정을 통해 과학기술과 관련된 사회적 문제를 해결한 사례를 조 사하여 설명하는 과정에서 과학의 유용성에 대해 인식하고, 일상생활 문제를 탐구로 해결하려는 태도를 가지며, 과학기술에 대한 이해와 균형 있는 가치 판단의 필요성을 인식한다.","B":"집단적 의사결정을 통해 과학기술과 관련된 사회적 문제를 해결한 사례를 조 사하여 과학의 유용성에 대해 인식하고, 과학기술에 대한 이해와 가치 판단의 필요성을 인식한다.","C":"집단적 의사결정을 통해 과학기술과 관련된 사회적 문제를 해결한 사례를 조 사하여 과학기술에 대한 이해와 가치 판단이 필요함을 말할 수 있다.","D":"집단적 의사결정을 통해 과학기술과 관련된 사회적 문제를 해결한 사례에 대 해 조사할 수 있다.","E":"과학기술과 관련된 사회적 문제에 대해 말할 수 있다. ⅩⅤ. 과학의 역사와 문화"}},"area":{"A":{"지식·이해":"과학기술 변화에 영향을 끼침을 알고, 일상생활에서 과학 용어의 활용과 사회에 미치는 파급효과에 대해 사례를 통해 설명할 수 있다. 과학기술의 발전 사례를 통해 과학기술이 미래 사회의 변화에 영향을 줄 수 있음 을 종합적으로 말할 수 있다.","과정·기능":"과학기술의 발전으로 인해 새롭게 나타난 문화적 변화 사례와 음악에 끼친 영향에 대한 사례를 조사하고, 과학을 주제로 하는 예술 작품이나 콘텐츠를 제작하여 발표 하는 활동을 통해 과학 지식이 문화와 일상생활에 영향을 미침을 설명할 수 있다. 일상생활이나 미디어에서 사용되는 과학 용어를 조사하여 알아보고, 과학 용어가 우리 사회에 미치는 파급효과에 대해 증거를 바탕으로 다양한 방식으로 표현하고 공유할 수 있다. 인간과 기계, 사물 등을 연결하는 과학기술의 발전 동향과 가상 현실이나 증강 현실을 활용한 사례, 집단적 의사결정을 통해 과학기술과 관련된 사회적 문제를 해결한 사례를 조사하고, 미래 사회의 변화와 과학기술이 미래 사회에 미칠 수 있는 긍정적인 영향과 부정적인 영향에 대해 자신의 의견을 제시하고 타인의 의견 을 존중하며 토론할 수 있다.","가치·태도":"과학기술 발전으로 인한 문화적 변화 사례를 통해 과학 문화 향유의 필요성과 과학기술의 심미적 가치를 인식한다. 과학기술의 발전 동향과 활용 사례를 통해 과학기술의 유용성과 윤리성, 과학기술 에 대한 균형 있는 가치 판단의 필요성을 인식한다.. 과학기술의 발전 동향과 집단적 의사소통을 통한 사회 문제 해결 사례를 기반으로 미래 사회의 변화를 예측하고, 과학의 유용성과 윤리성에 대해 인식한다."},"B":{"지식·이해":"과학기술의 발전이 문화적 변화에 영향을 끼침을 알고, 일상생활에서 과학 용어의 활용과 사회에 미치는 파급효과에 대해 이해할 수 있다. 과학기술의 발전이 미래 사회의 변화에 영향을 줄 수 있음을 종합적으로 이해할 수 있다.","과정·기능":"과학기술의 발전으로 인해 새롭게 나타난 문화적 변화 사례와 음악에 끼친 영향에 대한 사례를 조사하고, 과학을 주제로 하는 예술 작품이나 콘텐츠를 제작하여 발표할 수 있다. 일상생활이나 미디어에서 사용되는 과학 용어를 조사하여 알아보고, 과학 용어가 우리 사회에 미치는 파급효과에 대해 설명할 수 있다. 인간과 기계, 사물 등을 연결하는 과학기술의 발전 동향과 가상 현실이나 증강 현실을 활용한 사례, 집단적 의사결정을 통해 과학기술과 관련된 사회적 문제를 해결한 사례를 조사하고, 미래 사회의 변화와 과학기술이 미래 사회에 미칠 수 있는 영향에 대해 설명할 수 있다.","가치·태도":"과학기술 발전으로 인한 문화적 변화 사례를 통해 과학기술의 심미적 가치를 인식 한다. 과학기술의 발전 동향과 활용 사례를 통해 과학기술의 유용성과 과학기술에 대한 균형 있는 가치판단의 필요성을 인식한다. 집단적 의사소통을 통한 사회 문제 해결 사례를 기반으로 과학의 유용성과 윤리성 에 대해 인식한다."},"C":{"지식·이해":"과학기술의 발전을 통해 문화적 변화가 일어남을 알고, 과학 용어가 우리 사회에 미치는 영향을 말할 수 있다. 과학기술의 발전으로 인하여 미래 사회에 변화가 일어날 수 있음을 말할 수 있다.","과정·기능":"과학기술의 발전으로 인해 새롭게 나타난 문화적 변화 사례와 음악에 끼친 영향에 대한 사례를 조사하고, 과학을 주제로 하는 예술 작품이나 콘텐츠를 사용할 수 있다. 일상생활이나 미디어에서 사용되는 과학 용어를 조사할 수 있다. 가상 현실이나 증강 현실을 활용한 사례와 집단적 의사결정을 통해 과학기술과 관련된 사회적 문제를 해결한 사례를 조사하고, 과학기술이 미래 사회에 미칠 수 있는 영향에 대해 말할 수 있 다.","가치·태도":"과학기술을 활용한 음악 창작과 연주를 체험하고 즐긴다. 과학기술 발전 동향이나 가상 현실, 증강 현실을 통해 과학기술의 유용성에 흥미 와 호기심을 가진다. 집단적 의사소통을 통한 사회 문제 해결 사례를 기반으로 과학의 유용성과 윤리성 에 대해 인식한다."},"D":{"지식·이해":"과학기술의 발전이 문화적 변화에 영향을 끼침을 알고, 일상생활이나 미디어에서 과학 용어가 사용됨을 말할 수 있다. 과학기술이 발전하면 미래사회에 변화가 일어날 수 있음을 말할 수 있다.","과정·기능":"과학을 주제로 하는 예술 작품이나 콘텐츠를 조사할 수 있다. 일상생활에서 사용되는 과학 용어를 조사하여 설명할 수 있다. 집단적 의사결정을 통해 과학기술과 관련된 사회적 문제를 해결한 사례에 대해 조사할 수 있다","가치·태도":"과학기술을 활용한 음악 창작과 연주에 흥미와 호기심을 가진다. 가상 현실이나 증강 현실을 포함하는 활동을 통해 과학기술에 흥미와 호기심을 가진다. 집단적 의사결정을 통한 사회 문제 해결 사례를 기반으로 과학의 유용성에 대해 인식한다."},"E":{"지식·이해":"과학을 주제로하는 예술 작품이나 콘텐츠가 있음을 알고 일상생활이나 미디어에 서 과학 용어가 사용됨을 말할 수 있다. 과학기술이 발전하면 미래사회에 변화가 일어날 수 있음을 안다.","과정·기능":"과학기술을 활용한 예술 작품이나 콘텐츠를 조사할 수 있다. 일상생활에서 사용되는 과학 용어를 조사할 수 있다.","가치·태도":"과학기술을 활용한 음악 창작과 연주와 가상 현실이나 증강 현실에 흥미를 가진다. 과학의 유용성에 대해 인식한다. ⅩⅤ. 과학의 역사와 문화"}}},"기환-01":{"codes":{"12기환01-01":{"A":"날씨와 기후의 특성을 비교하고, 기후요소가 기후인자에 의해 결정된다는 것을 사례를 들어 설명하고, 지구상에 나타나는 기후와 기상 현상에 관심을 가진다.","B":"날씨와 기후의 특성을 비교하고, 기후요소가 기후인자에 의해 결정된다는 것 을 설명하고, 일상에서 경험하는 기상 현상에 관심을 가진다.","C":"날씨와 기후를 구분하고, 기후요소가 기후인자에 의해 결정된다는 것을 설명 할 수 있다.","D":"날씨와 기후를 구분하고, 기후요소와 기후인자의 차이를 말할 수 있다.","E":"날씨와 기후를 구분할 수 있다."},"12기환01-02":{"A":"기후시스템이 유지되는 양의 되먹임 과정과 음의 되먹임 과정을 각각의 사례 를 들어 비교하여 설명하고, 기후시스템을 구성하는 각 권역의 상호작용의 예를 들며, 권역 간에 상호작용하는 지구의 신비로움을 인식한다.","B":"기후시스템이 유지되는 양의 되먹임 과정과 음의 되먹임 과정의 사례를 각각 제시하고, 기후시스템을 구성하는 각 권역의 상호작용  꿀벌의 개체 수 감소 원인에 대한 이해를 바탕으로 곤충의 개체 수 감소와 기후변화의 관련성을 과학적 근거를 바탕으로 설명할 수 있다. 물 꽃 현상의 사례로부터 기후변화가 수생태계에 미치는 영향을 이 해 하 고, 기 후 변 화가 수생태계의 생물다양성에 끼치는 영향을 과학적 근거를 바탕으로 설명할 수 있다. 곤충 매개 감염병이 새롭게 출현하거나 급격히 확산되는 현상을 구체적 사례를 들어 설명하고, 이 현상과 기후변화의 관련성을 과학적 근거를 들어 설명 할 수 있다.","과정·기능":"기후위기를 유발한 주요 원인이 인간 활동에 의해 발생한 온실 기체임을 추론하여 기후위기 극복을 위한 노력의 필요성을 주장하고, 빙상의 융해와 해수의 열팽창이 전 지구 해수면 상승에 미친 영향을 다룬 자료를 통해 기후변화와 해수면 상승의 관 련 성 을 추론할 수 있 다. 기후변화 시나리오에 따른 미래 생태계 변화를 과학적으로 다룬 보고서를 찾아 해석하고, 온실 기체의 배출량에 따른 미래의 기후 및 생태계의 변화 양상을 자료 에 근거하여 추론하며, 미래 한반도 생물의 분포 변화를 시각화 자료로 표현할 수 있다. 꽃의 개화 시기 변화를 다룬 과학적인 자료를 찾고, 이를 기후변화 관련 자료와 함께 해석하여 기후변화와 개화 시기의 관계를 추론하고, 개화 시기 변화가 생물 과 생태계 및 우리 생활에 끼치는 영향을 추론할 수 있다. 곤충의 개체 수 감소와 기후변화의 관련성 및 기후변화가 수생태계의 생물다양성 에 끼치는 영향을 과학적 근거를 바탕으로 추론할 수 있다.","가치·태도":"기후위기의 심각성 및 극한 기상 현상에 대한 사회적 관리의 중요성을 인식하고 극한 기상 현상에 대한 과학적 대처 방안을 제시할 수 있다. 곤충의 개체 수 감소에 대응하기 위한 환경 보전의 중요성 및 수생태계를 포함한 환경 보전의 중요성을 인식하고, 곤충 매개 감염병에 대한 사회적 관리의 중요성 을 인식하고 예방책을 제시할 수 있다."},"B":{"지식·이해":"기후위기를 유발한 다양한 원인을 비교하여 주요 원인이 인간 활동에 의해 발생한 온실 기체임을 설명하고, 빙상의 융해와 해수의 열팽창으로 인한 전 지구 해수면 상승의 원인을 기후변화와 관련지어 이해하며, 해수면 상승과 기후 난민 등 기후 위기 현상을 연계하여 설명할 수 있다. 극한 기상 현상의 종류를 제시하고, 극한 기상 현상이 환경생태에 영향을 주는 과정을 사례를 들어 설명할 수 있다. 꽃의 개화 시기 변화가 생물과 생태계 및 우리 생활에 끼치는 영향의 예를 들고, 꿀벌의 개체 수 감소 원인을 기후변화와 연계하여 설명할 수 있다. 기후변화가 수생태계에 미치는 영향을 물꽃 현상의 사례로 설명하고, 기후변화가 수생태계의 생물다양성에 끼치는 영향을 설명하며, 곤충 매개 감염병이 새롭게 출현하거나 급격히 확산되는 현상과 기후변화의 관련성을 과학적 근거를 들어 설명할 수 있다.","과정·기능":"기후위기를 유발한 다양한 원인을 비교하여 주요 원인이 인간 활동에 의해 발생한 온 실 기체임을 추론할 수 있 다. 기후변화 시나리오에 따른 미래 생태계 변화를 과학적으로 다룬 보고서를 해석하 고, 온실 기체의 배출량에 따른 미래의 기후 및 생태계의 변화 양상을 추론하며, 미래 한반도 생물의 분포 변화를 발표할 수 있다. 꽃의 개화 시기 변화를 다룬 자료를 찾아 이를 기후변화 관련 자료와 함께 해석하 여 기후변화와 개화 시기의 관계를 추론할 수 있다. 기후변화가 수생태계의 생물다양성에 끼치는 영향을 추론할 수 있다.","가치·태도":"기후위기의 심각성을 인식하고, 극한 기상 현상에 대한 사회적 관리의 중요성을 인식한다. 곤충의 개체 수 감소에 대응하기 위한 환경 보전의 중요성과 수생태계를 포함한 환경 보전의 중요성을 인식하고, 곤충 매개 감염병에 대한 사회적 관리의 중요성 을 인식하고 예방책을 제시할 수 있다."},"C":{"지식·이해":"기후위기를 유발한 주요 원인이 인간 활동에 의해 발생한 온실 기체임과 전 지구 해수면 상승의 주요 원인이 기후변화임을 알고, 해수면 상승과 기후 난민 등 기후 위기 현상을 연계하여 말하며, 극한 기 탐구를 수행할 수 있다.","C":"데이터를 분석하고, 미세먼지 농도를 분석하는 탐구를 수행할 수 있다.","D":"데이터를 분석하는 방법을 알고, 제시된 절차에 따라 미세먼지 농도를 분석하 는 탐구를 수행할 수 있다.","E":"결론을 도출하기 위해 데이터 분석이 필요함을 말할 수 있다."},"12융탐02-07":{"A":"다양한 표현 방법을 적절하게 활용하여 융합적 탐구 문제, 과정, 결과, 결론 등을 효과적으로 발표하고 토론할 수 있다.","B":"다양한 표현 방법을 적절하게 활용하여 융합적 탐구 문제, 과정, 결과, 결론 등을 발표할 수 있다.","C":"적절한 표현 방법을 활용하여 융합적 탐구 문제, 과정, 결과, 결론 등을 발표할 수 있다.","D":"융합적 탐구 문제, 과정, 결과, 결론 등에 활용되는 다양한 표현 방법을 말할 수 있다.","E":"융합적 탐구 문제, 과정, 결과, 결론 등을 구분하여 나타낼 수 있다."}},"area":{"A":{"지식·이해":"데이터의 평균과 표준편차를 구하고 그 의미를 해석하여 데이터의 특성을 파악하 며, 이를 토대로 가설이나 모형을 평가할 수 있다. 수집한 데이터의 타당성과 신뢰성을 평가할 수 있다. 다양한 시각 자료의 특성을 설명할 수 있다.","과정·기능":"실생활에서 직접 얻은 데이터나 자기 주도적으로 탐색하여 얻은 공개된 데이터를 가공하여 융합적 탐구 문제를 발견하고, 융합적 탐구 문제해결을 위한 가설이나 모형을 여러 가지 관점에서 고안하며, 과학적인 문제해결 방법이나 절차 등을 여 러 맥락에서 설계할 수 있 다. 연구의 목적과 맥락에 맞게 데이터를 분석하고, 분석 결과를 바탕으로 논리적인 결론을 도출하고 평가하며, 인공지능을 활용하여 미세먼지 농도를 예측하는 탐구 를 수행하여 결론을 도출하고 평가할 수 있다. 디지털 탐구 도구를 포함한 다양한 도구를 활용하여 데이터를 수집하고, 데이터 수집의 한계나 어려움을 설명하며, 융합적 탐구 과정을 통해 얻은 데이터를 탐구 목적이나 맥락에 맞는 다양한 시각 자료로 표현하고, 공개 데이터셋을 활용하여 데이터를 수집하여 탐구 목적이나 맥락에 맞게 시각화할 수 있다.","가치·태도":"실생활 현상에 대한 관심과 관찰하는 태도를 가지고, 실생활에서 관찰이나 경험을 통해 직접 얻은 데이터나 자기 주도적으로 탐색하여 얻은 공개된 데이터에 대한 흥미를 바탕으로 융합적으로 사고하는 태도를 가진다. 다양한 표현 방법을 적절하게 활용하여 융합적 탐구 문제, 과정, 결과, 결론 등을 효과적으로 발표하고 토론할 수 있다."},"B":{"지식·이해":"데이터의 평균과 표준편차를 구하고, 그 의미를 해석하여 데이터의 특성을 파악하 며, 이를 토대로 가설이나 모형을 평가하는 방법을 설명할 수 있다. 수집한 데이터의 타당성과 신뢰성을 평가하는 방법을 설명할 수 있다.","과정·기능":"실생활에서 직접 얻은 데이터나 자기 주도적으로 탐색하여 얻은 공개된 데이터를 가공하여 융합적 탐구 문제를 발견하고, 융합적 탐구 문제해결을 위한 가설이나 모형을 고안하며, 과학적인 문제해결 방법이나 절차 등을 설계할 수 있다. 데이터를 분석하여 분석 결과를 바탕으로 결론을 도출하고, 인공지능을 활용하여 미세먼지 농도를 예측하는 탐구를 수행할 수 있다. 디지털 탐구 도구를 포함한 다양한 도구를 활용하여 데이터를 수집하고, 융합적 탐구 과정을 통해 얻은 데이터를 다양한 시각 자료로 표현하며, 공개 데이터셋을 활용하여 데이터를 수집하고 시각화할 수 있다.","가치·태도":"실생활 현상에 대한 관심과 관찰하는 태도를 가지고, 실생활에서 관찰이나 경험을 통해 직접 얻은 데이터나 자기 주도적으로 탐색하여 얻은 공개된 데이터에 흥미를 느 낄 수 있 다. 다양한 표현 방법을 적절하게 활용하여 융합적 탐구 문제, 과정, 결과, 결론 등을 발표할 수 있다."},"C":{"지식·이해":"데이터의 평균과 표준편차를 구하고, 그 의미를 설명할 수 있다. 데이터의 타당성과 신뢰성의 의미를 설명할 수 있다.","과정·기능":"실생활에서 직접 얻은 데이터나 공개된 데이터를 통해 융합적 탐구 문제를 발견하 고, 융합적 탐구 문제해결을 위한 가설이나 모형을 고안하며 과학적인 문제해결 방법이나 절차의 예를 들 수 있다. 데이터를 분석하고, 미세먼지 농도를 분석하는 탐구를 수행할 수 있다. 적절한 도구를 활용하여 데이터를 수집하고, 융합적 탐구 과정을 통해 얻은 데이 터를 시각 자료로 표현하며, 제공된 데이터를 시각화할 수 있다.","가치·태도":"실생활 현상에 대한 관심과 관찰하는 태도를 가지고, 실생활에서 관찰이나 경험을 통 해 직접 얻은 데이터나 공개된 데이터에 흥미를 느 낀 다. 적절한 표현 방법을 활용하여 융합적 탐구 문제, 과정, 결과, 결론 등을 발표할 수 있다."},"D":{"지식·이해":"데이터의 평균과 표준편차를 구하고, 데이터를 분석하는 방법을 말할 수 있다. 데이터를 시각화하는 표현 방법을 말할 수 있다. 융합적 탐구 문제, 과정, 결과, 결론 등에 활용되는 다양한 표현 방법을 말할 수 있다.","과정·기능":"실생활에서의 관찰이나 경험 및 공개된 데이터를 바탕으로 탐구 문제를 선정할 수 있다. 문제해결을 위한 과학적인 가설이나 모형 및 문제해결 방법이나 절차의 예를 들 수 있다. 적절한 도구를 활용하여 데이터를 수집하고, 데이터를 분석하는 방법을 말하며, 제시된 절차에 따라 미세먼지 농도를 분석하는 탐구를 수행할 수 있다.","가치·태도":"실생활 현상에 대한 관심과 관찰하는 태도를 가지고, 데이터 시각화의 의미와 유용성을 인식한다."},"E":{"지식·이해":"데이터의 평균과 표준편차를 통해 데이터의 특성을 파악할 수 있음을 말할 수 있다. 결론을 도출하기 위해 데이터 분석이 필요함을 말하고, 융합적 탐구 문제, 과정, 결과, 결론 등을 구분하여 나타낼 수 있다.","과정·기능":"실생활에서의 관찰이나 경험을 바탕으로 탐구 문제를 선정하고, 문제해결을 위한 과학적인 가설이나 모형의 예를 들 수 있다. 데이터 수집에 적절한 도구를 선택할 수 있다.","가치·태도":"실생활 현상에 대한 관심을 가지고, 데이터 시각화의 의미와 유용성을 인식한다."}}},"융탐-03":{"codes":{"12융탐03-01":{"A":"과학기술의 다양한 발전 사례와 새로운 융합과학기술을 조사하여 발표하고, 과학기술의 변화와 발전을 고려하여 미래 사회에 등장할 새로운 융합과학기술 을 예측하고 제안하며, 과학기술의 발전이 개인의 삶과 미래 사회에 미칠 수 있는 여러 가지 영향을 종합적으로 평가할 수 있다.","B":"과학기술의 발전 사례와 현대 사회에 등장한 새로운 융합과학기술을 조사하 고, 과학기술의 변화와 발전을 고려하여 미래 사회에 등장할 새로운 융합과학 기술을 예측하며, 과학기술의 발전이 개인의 삶과 미래 사회에 미칠 수 있는 영향을 평가할 수 있다.","C":"과학기술의 발전 사례를 조사하고, 현대 사회의 문제를 해결하기 위한 새로운 융합과학기술을 예측하며, 과학기술의 발전이 개인의 삶과 미래 사회에 미칠 수 있는 영향을 설명할 수 있다.","D":"과학기술의 발전과 새로운 융합과학기술이 개인의 삶과 미래 사회에 영향을 미칠 수 있음을 이해하고, 제시된 자료를 통해 현대 사회의 문제를 해결하기 위한 새로운 융합과학기술의 필요성을 설명할 수 있다.","E":"제시된 사례를 통해 과학기술의 발전과 새로운 융합과학기술이 미래 사회에 영향을 미칠 수 있음을 이해하고, 제시된 자료에서 과학기술의 변화를 찾을 수 있다."},"12융탐03-02":{"A":"융합과학기술을 활용하여 오늘날 인류가 겪고 있는 식량 및 물 부족, 자원 고갈, 기후변화나 싱크홀 등과 같은 여러 가지 사회적 난제를 해결할 수 있음 을 설명하고, 융합과학기술을 통한 간학문적 문제해결 방안을 고안하고 이를 토의할 수 있다.","B":"융합과학기술을 활용하여 오늘날 인류가 겪고 있는 식량 및 물 부족, 자원 고갈, 기후변화나 싱크홀 등과 같은 여러 가지 사회적 난제를 해결할 수 있음 을 이해하고, 융합과학기술을 통한 간학문적 문제해결 방안에 대해 토의할 수 있다.","C":"융합과학기술을 활용하여 오늘날 인류가 겪고 있는 사회적 난제를 해결할 수 있음을 알고, 난제 해결을 위해 어떤 융합과학기술이 필요한지 말할 수 있다.","D":"오늘날 인류가 겪고 있는 사회적 난제를 이해하고, 제시된 자료에서 융합과학 기술을 활용하여 해결할 방안을 찾을 수 있다.","E":"오늘날 인류가 겪고 있는 사회적 난제의 일부를 이해하고, 융합과학기술을 활용해 해결할 수 있음을 인식한다."},"12융탐03-03":{"A":"융합과학 탐구 과정에서 준수해야 할 연구 진실성이 무엇인지 이해하고, 지식 재산권, 생명 윤리, 개인정보 보호, 인공지능 편향성 등에 대한 유의 가 필요함을 알며, 융합과학 탐구 과정과 그 결과에 대해 사회적, 경제적, 윤리적 관점에서 긍정적인 측면과 부정적인 측면을 분석하고, 과학기술의 발달에 따라 발생할 수 있는 여러 가지 윤리적 쟁점을 조사하고 토론할 수 있다.","B":"융합과학 탐구 과정에서 준수해야 할 연구 진실성이 무엇인지 알고, 융합과학 탐구 과정과 그 결과에 대해 사회적, 경제적, 윤리적 관점에서 긍정적인 측면 과 부정적인 측면을 이해하며, 과학기술의 발달에 따라 발생할 수 있는 여러 가지 윤리적 쟁점을 조사하고 발표할 수 있다.","C":"융합과학 탐구 과정에서 준수해야 할 윤리의 일부를 설명하고, 융합과학 탐구 과정과 그 결과에 대해 사회적, 경제적, 윤리적 관점에서 긍정적인 면과 부정 적 인 면이 있을 수 있음을 이 해 하 며, 과 학 기 술 의 발달에 따라 발생할 수 있 는 윤리적 쟁점을 조사할 수 있다.","D":"융합과학 탐구 과정에서 지켜야 할 윤리가 있음을 이해하고, 과학기술의 발달 에 따라 발생할 수 있는 윤리적 쟁점의 일부를 말할 수 있다.","E":"융합과학 탐구 과정에서 지켜야 할 윤리가 있음을 알고, 과학기술의 발달에 따 라 윤리적 쟁점이 발생할 수 있음을 인 식 한 다."},"12융탐03-04":{"A":"융합과학기술을 활용하여 복잡한 사회 문제를 해결하는 과정에서 시민참여가 도움을 줄 수 있음을 설명하고, 시민 과학 프로젝트의 의미를 설명하며, 시민 참여가 문제해결에 도움을 준 여러 가지 사례와 시민 과학 프로젝트의 사례를 조 사 하 고 발표할 수 있 다.","B":"융합과학기술을 활용하여 사회 문제를 해결하는 과정에서 시민참여가 도움을 줄 수 있음을 설명하고, 시민 과학 프로젝트가 무엇인지 알며, 시민참여가 문 제 해 결 에 도움을 준 여러 가지 사례 를 조사하고 발표할 수 있 다.","C":"융합과학기술을 활용하여 사회 문제를 해결하는 과정에서 시민참여가 도움을 줄 수 있음을 이해하고, 시민참여가 문제해결에 도움을 준 여러 가지 사례를 조사할 수 있다.","D":"융합과학기술을 활용하여 사회 문제를 해결하는 과정에서 시민참여가 도움을 줄 수 있음을 알고, 시민참여가 문제해결에 도움을 준 일부 사례를 조사할 수 있다.","E":"융합과학기술을 활용하여 사회 문제를 해결할 때 시민참여가 문제해결에 도움 을 줄 수 있음을 인식한다."}},"area":{"A":{"지식·이해":"융합과학기술을 활용하여 오늘날 인류가 겪고 있는 식량 및 물 부족, 자원 고갈, 기후변화나 싱크홀 등과 같은 여러 가지 사회적 난제를 해결할 수 있음을 설명할 수 있다. 융합과학 탐구 과정에서 준수해야 할 연구 진실성이 무엇인지 이해하고, 지식 재산권, 생명 윤리, 개인정보 보호, 인공지능 편향성 등에 대한 유의가 필요함을 알며, 융합과학 탐구 과정과 그 결과에 대해 사회적, 경제적, 윤리적 관점에서 긍정적인 측면과 부정적인 측면을 분석할 수 있다. 융합과학기술을 활용하여 복잡한 사회 문제를 해결하는 과정에서 시민참여가 도 움을 줄 수 있음을 설명하며, 시민 과학 프로젝트의 의미를 설명할 수 있다.","과정·기능":"과학기술의 다양한 발전 사례와 새로운 융합과학기술을 조사하여 발표하고, 과학 기술의 변화와 발전을 고려하여 미래 사회에 등장할 새로운 융합과학기술을 예측 하고 제안하며, 융합과학기술을 통한 간학문적 문제해결 방안을 고안하여 이를 토의할 수 있다. 융합과학 탐구 과정에서 과학기술의 발달에 따라 발생할 수 있는 여러 가지 윤리 적 쟁점   const inArea = u => u && u.area === id;
  const isHS = u => u && (u.grade in SUBJECTS);
  const starts = DATA.units.filter(u => inArea(u) && (u.grade === 'e34' || u.grade === 'e56'));
  let best = null;
  for(const s of starts){
    const mid = s.next.map(i=>byId[i]).find(u => inArea(u) && u.grade === 'm13');
    if(!mid) continue;
    const hi = mid.next.map(i=>byId[i]).find(u => inArea(u) && isHS(u));
    const chain = hi ? [s, mid, hi] : [s, mid];
    if(!best || chain.length > best.length) best = chain;
    if(best.length === 3) break;
  }
  if(best) return best;
  // 이어지는 경로를 못 찾으면 학년별 대표 단원으로 대체
  const pick = g => DATA.units.find(u => inArea(u) && u.grade === g);
  return [pick('e34') || pick('e56'), pick('m13'), DATA.units.find(u=>inArea(u) && isHS(u))].filter(Boolean);
}

const unitsOf = (gr, areaId) => DATA.units.filter(u=>u.grade===gr && (!areaId || u.area===areaId)).sort((x,y)=>x.num-y.num);
function buildMap(){
  const g = document.getElementById('mapGrid');
  const cols = COLS.filter(c => !fCol || c.id === fCol);
  const areas = AREAS.filter(a => !fArea || a.id === fArea);
  g.style.gridTemplateColumns = `72px ${cols.map(c=>c.w).join(' ')}`;
  g.classList.toggle('compact', dense);
  const inner = document.getElementById('mapInner');
  inner.style.minWidth = (72 + cols.reduce((s,c)=>s + (c.w.includes('minmax') ? 300 : parseInt(c.w)), 0) + cols.length*10) + 'px';

  const H = [];
  H.push('<div style="grid-row:1;grid-column:1"></div>');
  cols.forEach((c,ci)=>{
    const n = c.kind === 'grade' ? DATA.units.filter(u=>u.grade===c.id).length
            : c.kind === 'hcell' ? DATA.units.filter(u=>u.grade==='h1'||u.grade==='h2').length
            : DATA.units.filter(u=>u.grade in SUBJECTS).length;
    H.push(`<button class="gradeHead${fCol===c.id?' on':''}" style="grid-row:1;grid-column:${2+ci}"
      onclick="setCol('${c.id}')" title="이 학년만 보기">${c.label}<small>${c.sub || n+'개 단원'}</small></button>`);
  });
  areas.forEach((a,i)=>{
    const row = 2+i;
    H.push(`<button class="areaLabel${fArea===a.id?' on':''}" style="--c:${a.color};grid-row:${row};grid-column:1"
      onclick="setArea('${a.id}')" title="이 영역만 보기"><i style="background:${a.color}"></i><b>${a.name}</b></button>`);
    cols.forEach((c,ci)=>{
      const col = 2+ci;
      if(c.kind === 'grade'){
        H.push(`<div class="cell" style="--c:${a.color};grid-row:${row};grid-column:${col}">${unitsOf(c.id,a.id).map(u=>pill(u)).join('')}</div>`);
      } else if(c.kind === 'elective'){
        let s2='';
        for(const s of subjectsOf(a.id)){
          s2 += `<div class="esub"><div class="esubh"><span class="trk trk-${TRACK_CLASS[s.track]}">${TRACK_SHORT[s.track]}</span>${s.name}</div>`
             +  `<div class="epills">${unitsOf(s.key).map(u=>pill(u,true)).join('')}</div></div>`;
        }
        H.push(`<div class="ecell" style="--c:${a.color};grid-row:${row};grid-column:${col}">${s2}</div>`);
      }
    });
  });
  const hIdx = cols.findIndex(c=>c.kind==='hcell');
  if(hIdx >= 0){
    H.push(`<div id="hcell" style="--c:var(--integrated);grid-column:${2+hIdx};grid-row:2 / span ${areas.length}">
      <div class="subhead">통합과학 1</div>${unitsOf('h1').map(u=>pill(u)).join('')}
      <div class="subhead" style="margin-top:6px">통합과학 2</div>${unitsOf('h2').map(u=>pill(u)).join('')}
    </div>`);
  }
  g.innerHTML = H.join('');
  g.querySelectorAll('.st').forEach(b=>b.addEventListener('click',()=>select(b.dataset.id)));
  document.getElementById('clearBtn').hidden = !(fArea || fCol);
  document.getElementById('denseBtn').classList.toggle('on', dense);
  document.querySelectorAll('#legend button').forEach(b=>b.classList.toggle('on', b.dataset.area===fArea));
}

/* 계보 레일: 선수(위) → 현재 → 후속(아래), 순차 애니메이션 */
function renderLineage(u){
  const a = AREA_BY[u.area];
  let i = 0;
  const dl = () => `animation-delay:${(i++) * 55}ms`;
  const card = (id, cls) => {
    const t = byId[id];
    return `<button class="lnCard ${cls}" style="${dl()}" onclick="select('${id}')">
      <small>${GRADE_LABEL[t.grade]}</small><b>${esc(t.title)}</b></button>`;
  };
  let h = `<button class="lnBack" onclick="clearSel()">← 지도로 돌아가기</button>`;
  if(u.prev.length){
    h += `<div class="lnLabel">↑ 학생들은 여기서 배우고 옵니다</div>`
       + u.prev.map(id=>card(id,'p')).join('')
       + `<div class="lnArrow" style="${dl()}">↓</div>`;
  } else {
    h += `<div class="lnLabel">시작점</div><div class="lnNone">⭐ 이 개념을 처음 배우는 단원입니다. 학생의 일상 경험에서 출발하세요.</div>`;
  }
  h += `<button class="lnCard cur" style="--c:${a.color};${dl()}"><small>${GRADE_LABEL[u.grade]} · 지금 보는 단원</small><b>${esc(u.title)}</b></button>`;
  if(u.next.length){
    h += `<div class="lnArrow" style="${dl()}">↓</div>`
       + `<div class="lnLabel">이후 여기로 이어집니다</div>`
       + u.next.map(id=>card(id,'n')).join('');
  } else {
    h += `<div class="lnNone" style="margin-top:8px">이 단원에서 이어지는 후속 단원이 교육과정에 명시되어 있지 않습니다.</div>`;
  }
  if(u.related.length){
    h += `<div class="lnLabel" style="margin-top:14px">≈ 같은 시기에 함께 보면 좋은 단원</div>`
       + u.related.map(id=>card(id,'r')).join('');
  }
  document.getElementById('lineage').innerHTML = h;

function unitMiscons(uid){
  const it = ITEMS[uid];
  if(!it || !it.diag) return [];
  return it.diag.items.filter(q=>q.miscon).map(q=>({checks:q.checks||'', text:q.miscon}));

function drawWires(){
  const svg = document.getElementById('wires');
  svg.innerHTML='';
  if(!selected || document.body.classList.contains('v-focus')) return;
  const inner = document.getElementById('mapInner').getBoundingClientRect();
  svg.setAttribute('viewBox', `0 0 ${inner.width} ${inner.height}`);
  const u = byId[selected];
  const selEl = document.querySelector(`.st[data-id="${selected}"]`);
  if(!selEl) return;
  const s = center(selEl, inner);
  const groups = [[u.prev,'#f59f00',''],[u.next,'#339af0',''],[u.related,'#adb5bd','6 5']];
  let paths='';
  for(const [ids,color,dash] of groups){
    for(const tid of ids){
      const tEl = document.querySelector(`.st[data-id="${tid}"]`);
      if(!tEl) continue;
      const t = center(tEl, inner);
      const mx = (s.x+t.x)/2;
      paths += `<path d="M${s.x},${s.y} C${mx},${s.y} ${mx},${t.y} ${t.x},${t.y}"
        fill="none" stroke="${color}" stroke-width="2.6" stroke-linecap="round" opacity=".8"
        ${dash?`stroke-dasharray="${dash}"`:''}/>
        <circle cx="${t.x}" cy="${t.y}" r="4" fill="${color}"/>`;
    }
  }
  svg.innerHTML = paths + `<circle cx="${s.x}" cy="${s.y}" r="5" fill="#212529"/>`;
}
function center(el, ref){
  const r = el.getBoundingClientRect();
  return {x:r.left - ref.left + r.width/2, y:r.top - ref.top + r.height/2};
}

/* 수업 전 확인 — 흩어진 정보를 한 장으로 (선수·범위·오개념·준비물·도입발문) */
function preCheck(u){
  const rows = [];
  // ① 선수 학습
  if(u.prev.length){
    const names = u.prev.map(id=>`<b>${esc(byId[id].title)}</b>(${GRADE_LABEL[byId[id].grade].replace('군','')})`).join(', ');
    rows.push(`학생들은 ${names}에서 배우고 옵니다`);
  } else {
    rows.push(`<b>이 개념을 처음 배우는 단원</b>입니다 — 일상 경험에서 출발하세요`);
  }
  // ② 범위
  const lim = (u.limits||[])[0];
  if(lim) rows.push(`여기까지만 — ${esc(lim)}`);
  // ③ 오개념
  const mis = unitMiscons(u.id);
  if(mis.length){
    const first = stripTags(mis[0].text).split(/[.。]/)[0];
    rows.push(`오개념 <b>${mis.length}가지</b> 확인 — “${esc(first)}” 외 ${mis.length-1}건`);
  }
  // ④ 준비물
  if((u.materials||[]).length){
    rows.push(`준비물 — <b>${u.materials.map(esc).join(', ')}</b> <span style="color:var(--sub)">(탐구 활동에서 추출)</span>`);
  }
  // ⑤ 도입 발문: 진단 문항 중 서답형을 우선 사용
  const it = ITEMS[u.id];
  if(it && it.diag){
    const q = it.diag.items.find(x=>x.type==='서답형') || it.diag.items[0];
    if(q) rows.push(`도입 발문 — “${esc(stripTags(q.q))}”`);
  }
  return `<div class="preCard brAnim">
    <h4>📋 수업 전 확인 <span>5분이면 파악됩니다</span></h4>
    <ol>${rows.map(r=>`<li>${r}</li>`).join('')}</ol>
  </div>`;
}

function briefStd(t){
  const parts = t.split(/(?<=[고며서])\s*,\s*/);
  let s = parts[0];
  if(s.length > 62) s = s.slice(0, 60);
  return s !== t ? s + '…' : s;
}

}

/* ---------- 오개념 모아보기 ---------- */
function openMisc(){ document.getElementById('miscView').classList.add('open'); renderMisc(); }
function closeMisc(){ document.getElementById('miscView').classList.remove('open'); }
function miscList(){
  const out = [];
  for(const u of DATA.units){
    const it = ITEMS[u.id];
    if(!it || !it.diag) continue;
    for(const q of it.diag.items){
      if(q.miscon) out.push({uid:u.id, unit:u.title, grade:u.grade, area:u.area, checks:q.checks||'', text:q.miscon});
    }
  }
  return out;
}
function renderMisc(){
  const q = (document.getElementById('miscQ').value || '').trim().toLowerCase();
  let list = miscList();
  if(fArea) list = list.filter(m=>m.area===fArea);
  if(q) list = list.filter(m=>(m.text+m.unit+m.checks).toLowerCase().includes(q));
  document.getElementById('miscCount').textContent = `${list.length}개` + (fArea?` · ${AREA_BY[fArea].name}만`:'');
  const byArea = {};
  for(const m of list) (byArea[m.area] = byArea[m.area] || []).push(m);
  let h = '';
  for(const a of AREAS.concat([AREA_BY.integrated])){
    const g = byArea[a.id];
    if(!g || !g.length) continue;
    h += `<div class="mGroup" style="--c:${a.color}"><h5>${a.name} <span style="font-weight:400;color:var(--sub)">${g.length}개</span></h5>` +
      g.map(m=>`<div class="mItem">
        <span class="mu" onclick="closeMisc();select('${m.uid}')">${esc(m.unit)}</span>
        <span class="mc">${GRADE_LABEL[m.grade]}${m.checks?' · '+esc(m.checks):''}</span>
        <p>${m.text}</p></div>`).join('') + `</div>`;
  }
  document.getElementById('miscBody').innerHTML = h || `<div class="notice">해당하는 오개념이 없습니다.</div>`;
}
function copyMisc(){
  const q = (document.getElementById('miscQ').value || '').trim().toLowerCase();
  let list = miscList();
  if(fArea) list = list.filter(m=>m.area===fArea);
  if(q) list = list.filter(m=>(m.text+m.unit+m.checks).toLowerCase().includes(q));
  let t = `[과학 오개념 모음] ${list.length}개${fArea?' · '+AREA_BY[fArea].name:''}\n\n`;
  for(const m of list) t += `· ${m.unit} (${GRADE_LABEL[m.grade]})\n  ${stripTags(m.text)}\n\n`;
  copyText(t, `📋 오개념 ${list.length}개를 복사했습니다!`);
}

/* ---------- 성취수준 (KICE) ---------- */
function renderLevels(u, a){
  const L = LEVELS[u.id];
  if(!L){
    return `<section class="blk d-only brAnim" id="sec-lv" style="--ac:${a.color}"><h3>성취수준</h3>
      <div class="notice">초등학교는 국가 수준의 <b>성취기준별 성취수준</b>이 개발·보급되지 않아 표시할 자료가 없습니다.
      (중학교·고등학교 단원에는 A~E 5수준이 들어 있습니다.)</div></section>`;
  }
  let h = `<section class="blk lvblk d-only brAnim" id="sec-lv" style="--ac:${a.color}"><h3>성취수준 <span style="font-weight:400;color:var(--sub);font-size:12px">· KICE 국가 기준 A~E</span></h3>`;

  if(L.area){
    h += `<div class="qsrc">📌 <b>영역(단원) 단위</b> 성취수준 — 학기말 종합 판정·평가계획 기술용</div>`;
    h += `<div class="lvtabs">` + LV.map((l,i)=>
      `<button class="lvtab${i===0?' on':''}" data-lv="${l}" onclick="pickLv(this,'${u.id}')">${l}</button>`).join('') + `</div>`;
    for(const l of LV){
      if(!L.area[l]) continue;
      h += `<div class="lvpane" data-lv="${l}"${l==='A'?'':' hidden'}>
        <div class="lvhead"><span class="lvbadge lv-${l}">${l}</span><span class="lvpct">${LV_PCT[l]}</span></div>` +
        Object.entries(L.area[l]).map(([cat,txt])=>
          `<div class="lvcat"><b>${CAT_ICON[cat]||'•'} ${cat}</b><p>${txt}</p></div>`).join('') +
      `</div>`;
    }
  }

  if(L.codes && Object.keys(L.codes).length){
    h += `<div class="qsrc" style="margin-top:12px">📌 <b>성취기준 단위</b> 성취수준 — 문항 출제·채점 기준용</div>`;
    for(const s of u.standards){
      const lv = L.codes[s.code];
      if(!lv) continue;
      h += `<details class="lvstd"><summary><span class="qcode">${s.code}</span> ${esc(s.text).slice(0,42)}…</summary>
        <table class="lvtable"><tbody>` +
        LV.filter(l=>lv[l]).map(l=>`<tr><td class="lvcell lv-${l}">${l}</td><td>${lv[l]}</td></tr>`).join('') +
        `</tbody></table></details>`;
    }
    h += `<div class="qtools"><button onclick="copyLevels()">📋 성취수준 복사 (평가계획서용)</button></div>`;
  }
  return h + `</section>`;
}
function pickLv(btn, uid){
  const sec = btn.closest('section');
  sec.querySelectorAll('.lvtab').forEach(b=>b.classList.toggle('on', b===btn));
  const l = btn.dataset.lv;
  sec.querySelectorAll('.lvpane').forEach(p=>{ p.hidden = (p.dataset.lv !== l); });
}
function copyLevels(){
  const u = byId[selected], L = LEVELS[u.id];
  if(!L) return;
  let t = `[${GRADE_LABEL[u.grade]} 「${u.title}」 성취수준]\n출처: 2022 개정 교육과정에 따른 성취수준(교육부·한국교육과정평가원)\n\n`;
  if(L.area){
    t += `■ 영역(단원) 단위 성취수준\n`;
    for(const l of LV){
      if(!L.area[l]) continue;
      t += `\n[${l}] (${LV_PCT[l]})\n`;
      for(const [cat, txt] of Object.entries(L.area[l])) t += `  · ${cat}: ${txt}\n`;
    }
  }
  if(L.codes){
    t += `\n■ 성취기준 단위 성취수준\n`;
    for(const s of u.standards){
      const lv = L.codes[s.code];
      if(!lv) continue;
      t += `\n[${s.code}] ${s.text}\n`;
      for(const l of LV) if(lv[l]) t += `  ${l} : ${lv[l]}\n`;
    }
  }
  copyText(t, '📋 성취수준을 복사했습니다! 평가계획서에 붙여넣으세요.');
}

/* ---------- 예시 문항 ---------- */
function renderItems(u, a){
  const it = ITEMS[u.id];
  if(!it){
    return `<section class="blk d-only brAnim" id="sec-q" style="--ac:${a.color}"><h3>예시 문항</h3>
      <div class="notice">이 단원의 <b>미리 만들어 둔 예시 문항</b>은 아직 준비 중입니다.
      아래 <b>AI 문항 도우미</b> 버튼으로 지금 바로 생성할 수 있어요.</div></section>`;
  }
  let h = '';
  if(it.diag){
    h += `<section class="blk d-only brAnim" id="sec-q" style="--ac:${a.color}"><h3>🩺 진단평가 예시 문항 <span style="font-weight:400;color:var(--sub);font-size:12px">· 수업 전 선수학습 확인</span></h3>
      <div class="qsrc">📌 출제 근거: ${it.diag.from}</div>` +
      it.diag.items.map((q,i)=>qCard(q, i+1)).join('') +
      `<div class="qtools">
        <button onclick="copyItems('diag')">📋 문항 복사</button>
        <button onclick="toggleAns(this)">🙈 정답·해설 숨기기</button>
      </div></section>`;
  }
  if(it.form){
    h += `<section class="blk d-only brAnim" style="--ac:${a.color}"><h3>📝 형성평가 예시 문항 <span style="font-weight:400;color:var(--sub);font-size:12px">· 수준별(하·중·상)</span></h3>` +
      it.form.items.map((q,i)=>qCard(q, i+1)).join('') +
      `<div class="qtools">
        <button onclick="copyItems('form')">📋 문항 복사</button>
        <button onclick="toggleAns(this)">🙈 정답·채점기준 숨기기</button>
      </div></section>`;
  }
  return h;
}
function qCard(q, no){
  const lv = q.level ? `<span class="qlv qlv-${q.level}">${q.level}</span>` : '';
  const tp = q.type ? `<span class="qtype">${q.type}</span>` : '';
  const cd = q.code ? `<span class="qcode">${q.code}</span>` : '';
  const ch = q.choices ? `<div class="qchoices">${q.choices.join('<br>')}</div>` : '';
  let m = `<div class="qmeta"><div class="qans"><b>정답</b> ${q.answer}</div>`;
  if(q.checks) m += `<div><b>확인 개념</b> ${q.checks}</div>`;
  if(q.rubric) m += `<div><b>채점 기준</b> ${q.rubric}</div>`;
  if(q.miscon) m += `<div class="qmis"><b>⚠ 오개념·지도 포인트</b> ${q.miscon}</div>`;
  m += `</div>`;
  return `<div class="qitem"><div class="qhead"><span class="qno">${no}</span>${lv}${tp}${cd}</div>
    <div class="qbody">${q.q}</div>${ch}${m}</div>`;
}
function toggleAns(btn){
  const sec = btn.closest('section');
  const off = sec.classList.toggle('answers-off');
  btn.textContent = off ? '👀 정답·해설 보기' : '🙈 정답·해설 숨기기';
}
const stripTags = s => String(s).replace(/<[^>]+>/g, '');
function copyItems(kind){
  const u = byId[selected], it = ITEMS[u.id];
  if(!it || !it[kind]) return;
  const label = kind === 'diag' ? '진단평가' : '형성평가';
  let t = `[${GRADE_LABEL[u.grade]} 「${u.title}」 ${label} 예시 문항]\n`;
  if(kind === 'diag' && it.diag.from) t += `출제 근거(선수 학습): ${it.diag.from}\n`;
  t += '\n';
  it[kind].items.forEach((q, i) => {
    t += `${i+1}. ${q.level?`[${q.level}] `:''}${q.code?`[${q.code}] `:''}${stripTags(q.q)}\n`;
    if(q.choices) t += q.choices.map(c=>'   '+c).join('\n') + '\n';
    t += `   ▸ 정답: ${stripTags(q.answer)}\n`;
    if(q.checks) t += `   ▸ 확인 개념: ${q.checks}\n`;
    if(q.rubric) t += `   ▸ 채점 기준: ${q.rubric}\n`;
    if(q.miscon) t += `   ▸ 오개념·지도: ${q.miscon}\n`;
    t += '\n';
  });
  copyText(t, `📋 ${label} 예시 문항을 복사했습니다!`);
}
function fcard(id, cls){
  const t = byId[id];
  return `<button class="fcard ${cls}" onclick="select('${id}')"><small>${GRADE_LABEL[t.grade]}</small>${esc(t.title)}</button>`;
}
function renderWelcome(){
  const nStd = DATA.units.reduce((s,u)=>s+u.standards.length,0);
  const nQ = Object.values(ITEMS).reduce((s,it)=>s+(it.diag?it.diag.items.length:0)+(it.form?it.form.items.length:0),0);
  document.getElementById('hint').innerHTML =
    `<span><b>단원을 클릭</b>하면 그 단원만 남고 계보·브리핑이 열립니다</span>
     <span class="sep">|</span>
     <span><b>영역 이름</b>·<b>학년 제목</b>을 누르면 그것만 보입니다</span>
     <div class="stats" style="margin-left:auto">
       <div><b>${DATA.units.length}</b> 단원</div>
       <div><b>${nStd}</b> 성취기준</div>
       <div><b>${nQ}</b> 예시문항</div>
       <div><b>${miscList().length}</b> 오개념</div>
     </div>`;
}

/* ---------- AI 프롬프트 ---------- */
function stdLines(u){ return u.standards.map(s=>`- [${s.code}] ${s.text}`).join('\n'); }
function buildPrompt(kind){
  const u = byId[selected];
  const head = `당신은 한국 2022 개정 과학과 교육과정에 정통한 평가 전문가입니다.\n\n[수업 단원] ${GRADE_LABEL[u.grade]} 「${u.title}」\n이 단원의 성취기준:\n${stdLines(u)}\n`;
  if(kind==='diag'){
    let prevTxt = u.prev.length
      ? u.prev.map(id=>{const p=byId[id]; return `▶ ${GRADE_LABEL[p.grade]} 「${p.title}」\n${stdLines(p)}`;}).join('\n\n')
      : '(공식 선수 단원 없음 — 이 개념의 첫 도입 단원입니다. 학생들이 일상 경험으로 갖고 있을 선개념·오개념을 진단 대상으로 삼아 주세요.)';
    return head + `\n[선수 학습] 학생들이 이전에 배운 연계 단원과 성취기준:\n${prevTxt}\n
[요청] 위 단원 수업을 시작하기 전에 실시할 **진단평가**를 만들어 주세요.
1. 선수 학습 내용의 이해도를 확인하는 문항 5개 (선택형 3 + 서답형 2)
2. 각 문항마다: ① 확인하려는 선수 개념 ② 정답과 해설 ③ 오답 선택 시 의심되는 오개념과 보충 지도 포인트
3. 중학생 눈높이의 일상 소재를 사용하고, 1문항은 그림/상황 묘사형으로
4. 마지막에 '오개념 빠른 진단표'(문항–선수개념–오개념–보충지도)를 표로 정리해 주세요.`;
  }
  const hae = u.haeseol.length ? `\n[지도 범위·유의사항] 교육과정 해설 (이 범위를 절대 넘지 마세요):\n${u.haeseol.map(x=>`- ${x.code?`[${x.code}] `:''}${x.text}`).join('\n')}\n` : '';
  const L = LEVELS[u.id];
  let lvTxt = '';
  if(L && L.codes){
    const parts = [];
    for(const s of u.standards){
      const lv = L.codes[s.code];
      if(!lv) continue;
      parts.push(`[${s.code}]\n` + LV.filter(x=>lv[x]).map(x=>`  ${x}: ${lv[x]}`).join('\n'));
    }
    if(parts.length) lvTxt = `\n[국가 성취수준 A~E] 교육부·한국교육과정평가원 공식 진술입니다. 문항의 난이도와 채점 기준을 반드시 이 진술에 맞추세요:\n${parts.join('\n')}\n`;
  }
  return head + hae + lvTxt + `
[요청] 이 단원의 **형성평가** 문항을 만들어 주세요.
1. 성취기준별로 ${lvTxt ? '위 국가 성취수준의 A(상위)·C(중간)·E(기초) 각 1문항씩' : '성취수준 상/중/하 각 1문항씩'} (수준 차이가 분명하게)
2. 위 해설에 명시된 범위 제한(다루지 않는 내용)을 반드시 지킬 것
${lvTxt ? '3. 각 문항이 어느 수준(A~E) 진술에 대응하는지 명시하고, 채점 기준을 그 진술의 표현을 사용해 작성할 것\n4. 각 문항마다: 정답, 도달/미도달 판단 기준, 학생 피드백 문구' : '3. 각 문항마다: 정답, 수준별 도달 판단 기준(채점 기준), 학생 피드백 문구'}
5. 마지막에 교사용 '수준별 지도 한 줄 팁'을 정리해 주세요.`;
}
function copyPrompt(kind){
  copyText(buildPrompt(kind), kind==='diag' ? '🩺 진단평가 프롬프트 복사 완료! AI에 붙여넣으세요.' : '📝 형성평가 프롬프트 복사 완료! AI에 붙여넣으세요.');
}
function copyText(txt, msg){
  const done = ()=>toast(msg);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt, done));
  } else fallbackCopy(txt, done);
}
function fallbackCopy(txt, done){
  const ta = document.createElement('textarea');
  ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){ alert('복사 실패 — 수동으로 복사해 주세요:\n\n'+txt); }
  document.body.removeChild(ta);
}
let toastTimer=null;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ---------- 검색 ---------- */
const qEl = document.getElementById('q');
qEl.addEventListener('input', ()=>{
  if(document.body.classList.contains('v-focus')) clearSel();
  const q = qEl.value.trim().toLowerCase().replace(/\s+/g,'');
  const cnt = document.getElementById('qCount');
  if(!q){
    cnt.textContent='';
    if(selected) select(selected); else document.querySelectorAll('.st').forEach(b=>b.className=baseCls(b));
    return;
  }
  document.getElementById('wires').innerHTML='';
  let n=0;
  document.querySelectorAll('.st').forEach(b=>{
    const u = byId[b.dataset.id];
    const hay = (u.title + u.standards.map(s=>s.code+s.text).join('') ).toLowerCase().replace(/\s+/g,'');
    const hit = hay.includes(q);
    b.className = baseCls(b) + (hit ? '' : ' dim');
    if(hit) n++;
  });
  cnt.textContent = `${n}개 단원`;
});
document.addEventListener('keydown', e=>{
  if(e.key !== 'Escape') return;
  if(document.getElementById('miscView').classList.contains('open')){ closeMisc(); return; }
  if(document.body.classList.contains('v-focus')){ clearSel(); return; }
  qEl.value=''; qEl.dispatchEvent(new Event('input'));
  if(document.body.classList.contains('v-map')) goHub();
});

/* ---------- 범례(= 영역 필터) & 초기화 ---------- */
document.getElementById('legend').innerHTML =
  AREAS.map(a=>`<button data-area="${a.id}" style="--c:${a.color}" onclick="setArea('${a.id}')" title="이 영역만 보기"><i style="background:${a.color}"></i>${a.name}</button>`).join('') +
  `<button data-area="integrated" style="--c:var(--integrated)" onclick="clearFilters()" title="필터 해제"><i style="background:var(--integrated)"></i>전체</button>`;

// 링크 공유: #u=단원id
function applyHash(){
  const h = location.hash || '';
  const mu = h.match(/u=([^&]+)/);
  if(mu && byId[decodeURIComponent(mu[1])]){ select(decodeURIComponent(mu[1])); return; }
  const ma = h.match(/area=([^&]*)/);
  if(ma){ goMap(ma[1] ? decodeURIComponent(ma[1]) : null); return; }
  if(/#map/.test(h)){ goMap(undefined); return; }
  goHub();
}
window.addEventListener('hashchange', applyHash);

buildMap();
renderWelcome();
applyHash();   // 해시가 없으면 허브로 진입
window.addEventListener('resize', ()=>requestAnimationFrame(drawWires));
</script>
